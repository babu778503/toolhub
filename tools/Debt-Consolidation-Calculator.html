<!DOCTYPE html>
<!-- Category: Financial Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt Consolidation Calculator</title>
    
    <!-- SEO Optimization -->
    <meta name="description" content="Free Debt Consolidation Calculator. Compare your current debts with a consolidated loan to see monthly savings and interest reduction. Auto-saves your data.">
    <meta name="keywords" content="Debt Consolidation Calculator, Loan Consolidation, Debt Payoff Tool, APR Calculator, Refinance Calculator, Credit Card Consolidation, toolshub365">
    <meta name="author" content="toolshub365.com">
    <link rel="canonical" href="https://toolshub365.com/debt-consolidation-calculator">
    
    <!-- Schema.org for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialProduct",
      "name": "Debt Consolidation Calculator",
      "description": "A tool to compare multiple existing debts against a single consolidated loan to estimate savings.",
      "brand": {
        "@type": "Brand",
        "name": "ToolsHub365"
      },
      "category": "Financial Tools",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any"
    }
    </script>

    <style>
        /* CSS Variables & Reset */
        :root {
            --primary-color: #2980b9; /* Professional Blue */
            --primary-dark: #2c3e50;
            --accent-color: #27ae60; /* Success Green */
            --danger-color: #c0392b;
            --bg-color: #f0f2f5;
            --text-color: #333;
            --border-color: #ddd;
            --header-height: 50px;
            --container-max: 1200px;
            --card-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: var(--container-max);
            margin: 20px auto;
            background: white;
            display: flex;
            flex-wrap: wrap;
            box-shadow: var(--card-shadow);
            border-radius: 8px;
            overflow: hidden;
        }

        /* Layout Columns */
        .input-section, .result-section {
            padding: 25px;
            width: 50%;
        }

        .result-section {
            background-color: #f8f9fa;
            border-left: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        /* Form Styling */
        h2 {
            font-size: 1.1rem;
            color: var(--primary-dark);
            margin-bottom: 15px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .debt-list-container {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        .debt-row {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            position: relative;
        }

        .debt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #666;
        }

        .btn-remove {
            color: var(--danger-color);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 5px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.8rem;
            color: #555;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.95rem;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-add {
            width: 100%;
            padding: 10px;
            background-color: #ecf0f1;
            color: var(--primary-dark);
            border: 1px dashed #bdc3c7;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            transition: 0.2s;
        }

        .btn-add:hover {
            background-color: #e0e6e8;
            border-color: var(--primary-color);
        }

        /* Consolidation Loan Section */
        .new-loan-section {
            background: #eaf2f8;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #d6eaf8;
        }

        /* Action Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-main {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            background-color: var(--primary-color);
            transition: 0.2s;
        }
        
        .btn-main:hover { background-color: #2471a3; }

        .btn-clear {
            padding: 12px 20px;
            border: 1px solid #ddd;
            background-color: #fff;
            color: #555;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-clear:hover { background-color: #f5f5f5; }

        /* Results Styling */
        .comparison-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .result-card {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #eee;
        }

        .result-card.new {
            border-top: 3px solid var(--accent-color);
        }

        .result-card.current {
            border-top: 3px solid #7f8c8d;
        }

        .res-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #777;
            margin-bottom: 5px;
        }

        .res-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }
        
        .res-sub {
            font-size: 0.8rem;
            color: #888;
        }

        .savings-box {
            background-color: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            margin-top: auto; /* Push to bottom */
            border: 1px solid #c3e6cb;
        }

        .savings-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        /* Mobile Responsive */
        @media screen and (max-width: 768px) {
            body {
                padding-left: 0;
                padding-right: 0;
            }

            .container {
                width: 100%;
                margin: 0;
                border-radius: 0;
                box-shadow: none;
                flex-direction: column;
            }

            .input-section, .result-section {
                width: 100%;
                padding: 15px;
            }

            .result-section {
                border-left: none;
                border-top: 5px solid #eee;
            }

            .input-grid {
                grid-template-columns: 1fr; /* Stack inputs on mobile */
            }
            
            .debt-row {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Debt Consolidation Calculator</h1>
    </header>

    <div class="container">
        <!-- Input Section -->
        <div class="input-section">
            <h2>Current Debts</h2>
            <div id="debtList" class="debt-list-container">
                <!-- Dynamic Debt Rows will appear here -->
            </div>
            
            <button type="button" class="btn-add" onclick="addDebtRow()">+ Add Another Debt</button>

            <div class="new-loan-section">
                <h2 style="font-size: 1rem; border:none; margin-bottom: 10px;">Consolidated Loan Offer</h2>
                <div class="input-grid" style="grid-template-columns: 1fr 1fr;">
                    <div class="form-group">
                        <label>Interest Rate (%)</label>
                        <input type="number" id="newRate" placeholder="8.5" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Loan Term (Years)</label>
                        <input type="number" id="newTerm" placeholder="3" step="1">
                    </div>
                </div>
                <div class="form-group" style="margin-top:10px;">
                    <label>Loan Amount (Auto-filled)</label>
                    <input type="number" id="newAmount" placeholder="Total of above" readonly style="background:#f9f9f9; color:#777;">
                </div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn-main" onclick="calculateConsolidation()">Calculate Savings</button>
                <button type="button" class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>
        </div>

        <!-- Result Section -->
        <div class="result-section">
            <h2>Comparison Results</h2>
            
            <div id="resultsContent" style="opacity: 0.6;">
                <div class="comparison-container">
                    <!-- Current Status -->
                    <div class="result-card current">
                        <div class="res-label">Current Monthly</div>
                        <div class="res-value" id="cur-monthly">$0.00</div>
                        <div class="res-sub">Total Interest: <span id="cur-interest">$0.00</span></div>
                    </div>

                    <!-- New Status -->
                    <div class="result-card new">
                        <div class="res-label">New Monthly</div>
                        <div class="res-value" id="new-monthly">$0.00</div>
                        <div class="res-sub">Total Interest: <span id="new-interest">$0.00</span></div>
                    </div>
                </div>

                <div class="savings-box" id="savings-box">
                    <div style="font-size: 0.9rem; margin-bottom: 5px;">Monthly Savings</div>
                    <div class="savings-value" id="monthly-savings">$0.00</div>
                    <div style="font-size: 0.85rem; margin-top: 10px;">
                        Lifetime Interest Savings: <span id="total-savings" style="font-weight:bold;">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let debts = [];

        // DOM Elements
        const debtListEl = document.getElementById('debtList');
        const newRateInput = document.getElementById('newRate');
        const newTermInput = document.getElementById('newTerm');
        const newAmountInput = document.getElementById('newAmount');
        const resultsContent = document.getElementById('resultsContent');

        // Initial Data Structure
        const defaultDebt = {
            balance: '',
            rate: '',
            payment: ''
        };

        // Formatter
        const formatter = new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
            minimumFractionDigits: 2
        });

        // Initialize
        function init() {
            loadData();
            if (debts.length === 0) {
                addDebtRow(); // Add one empty row by default
                addDebtRow(); // Add a second one for convenience
            }
            renderDebts();
        }

        // Add Row
        function addDebtRow(data = null) {
            const debt = data || { ...defaultDebt };
            debts.push(debt);
            renderDebts();
        }

        // Remove Row
        function removeDebtRow(index) {
            if (debts.length > 1) {
                debts.splice(index, 1);
                renderDebts();
                calculateTotalBalance();
                saveData();
            } else {
                alert("You need at least one debt to calculate.");
            }
        }

        // Render Rows
        function renderDebts() {
            debtListEl.innerHTML = '';
            debts.forEach((debt, index) => {
                const div = document.createElement('div');
                div.className = 'debt-row';
                div.innerHTML = `
                    <div class="debt-header">
                        <span>Debt #${index + 1}</span>
                        ${debts.length > 1 ? `<button class="btn-remove" onclick="removeDebtRow(${index})">Remove</button>` : ''}
                    </div>
                    <div class="input-grid">
                        <div class="form-group">
                            <label>Balance ($)</label>
                            <input type="number" value="${debt.balance}" oninput="updateDebt(${index}, 'balance', this.value)" placeholder="5000">
                        </div>
                        <div class="form-group">
                            <label>APR (%)</label>
                            <input type="number" value="${debt.rate}" oninput="updateDebt(${index}, 'rate', this.value)" placeholder="18.5">
                        </div>
                        <div class="form-group">
                            <label>Monthly Payment ($)</label>
                            <input type="number" value="${debt.payment}" oninput="updateDebt(${index}, 'payment', this.value)" placeholder="150">
                        </div>
                    </div>
                `;
                debtListEl.appendChild(div);
            });
            calculateTotalBalance();
        }

        // Update Data Model
        function updateDebt(index, field, value) {
            debts[index][field] = value;
            calculateTotalBalance();
            saveData();
        }

        // Calculate Total Balance for New Loan
        function calculateTotalBalance() {
            let total = 0;
            debts.forEach(d => {
                total += parseFloat(d.balance) || 0;
            });
            newAmountInput.value = total;
        }

        // Main Calculation
        function calculateConsolidation() {
            // 1. Calculate Consolidated Loan
            const loanAmount = parseFloat(newAmountInput.value) || 0;
            const loanRate = parseFloat(newRateInput.value) || 0;
            const loanTermYears = parseFloat(newTermInput.value) || 0;

            if (loanAmount === 0 || loanRate === 0 || loanTermYears === 0) return;

            const rNew = (loanRate / 100) / 12;
            const nNew = loanTermYears * 12;
            
            // PMT = P * r / (1 - (1+r)^-n)
            const newMonthlyPayment = (loanAmount * rNew) / (1 - Math.pow(1 + rNew, -nNew));
            const newTotalCost = newMonthlyPayment * nNew;
            const newTotalInterest = newTotalCost - loanAmount;

            // 2. Calculate Current Debts Total
            let currentTotalMonthly = 0;
            let currentTotalInterest = 0;
            let infiniteDebt = false;

            debts.forEach(d => {
                const bal = parseFloat(d.balance) || 0;
                const rate = parseFloat(d.rate) || 0;
                const pmt = parseFloat(d.payment) || 0;

                if (bal > 0) {
                    currentTotalMonthly += pmt;

                    // Calculate interest for this specific debt
                    // N = -log(1 - (r*P)/M) / log(1+r)
                    const r = (rate / 100) / 12;
                    
                    // Check if payment covers interest
                    if (pmt <= (bal * r)) {
                        infiniteDebt = true;
                    } else {
                        const n = -Math.log(1 - (r * bal) / pmt) / Math.log(1 + r);
                        const totalCost = n * pmt;
                        currentTotalInterest += (totalCost - bal);
                    }
                }
            });

            // UI Updates
            document.getElementById('new-monthly').innerText = formatter.format(newMonthlyPayment);
            document.getElementById('new-interest').innerText = formatter.format(newTotalInterest);
            document.getElementById('cur-monthly').innerText = formatter.format(currentTotalMonthly);

            if (infiniteDebt) {
                document.getElementById('cur-interest').innerText = "Infinity (Pmt too low)";
                document.getElementById('total-savings').innerText = "Huge (Avoids Debt Trap)";
            } else {
                document.getElementById('cur-interest').innerText = formatter.format(currentTotalInterest);
                const intSavings = currentTotalInterest - newTotalInterest;
                const el = document.getElementById('total-savings');
                el.innerText = formatter.format(intSavings);
                el.style.color = intSavings >= 0 ? 'inherit' : '#c0392b';
            }

            const monthlySavings = currentTotalMonthly - newMonthlyPayment;
            const msBox = document.getElementById('savings-box');
            const msVal = document.getElementById('monthly-savings');
            
            msVal.innerText = formatter.format(monthlySavings);
            
            if (monthlySavings >= 0) {
                msBox.style.backgroundColor = '#d4edda';
                msBox.style.color = '#155724';
                msVal.style.color = '#155724';
            } else {
                msBox.style.backgroundColor = '#f8d7da';
                msBox.style.color = '#721c24';
                msVal.style.color = '#721c24';
            }

            resultsContent.style.opacity = '1';
            saveData();
        }

        // Local Storage
        function saveData() {
            const data = {
                debts: debts,
                newRate: newRateInput.value,
                newTerm: newTermInput.value
            };
            localStorage.setItem('toolsHub_debtConsol_data', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('toolsHub_debtConsol_data');
            if (saved) {
                const data = JSON.parse(saved);
                if (data.debts && data.debts.length > 0) debts = data.debts;
                newRateInput.value = data.newRate || '';
                newTermInput.value = data.newTerm || '';
                
                // Add listener to new inputs
                newRateInput.addEventListener('input', saveData);
                newTermInput.addEventListener('input', saveData);
            }
        }

        function clearData() {
            if (confirm("Clear all entries?")) {
                localStorage.removeItem('toolsHub_debtConsol_data');
                debts = [];
                newRateInput.value = '';
                newTermInput.value = '';
                newAmountInput.value = '';
                resultsContent.style.opacity = '0.6';
                document.getElementById('cur-monthly').innerText = "$0.00";
                document.getElementById('new-monthly').innerText = "$0.00";
                document.getElementById('monthly-savings').innerText = "$0.00";
                init();
            }
        }

        // Start
        window.addEventListener('load', init);

    </script>
</body>
</html>
