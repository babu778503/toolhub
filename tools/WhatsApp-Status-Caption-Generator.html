    <style>
        /* CSS Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Removes blue tap highlight on mobile */
        }

        body {
            background-color: #ece5dd;
            color: #333;
            padding-top: 50px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Prevent accidental UI copying/highlighting on mobile devices */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Allow user selection ONLY inside inputs and textareas */
        input, select, textarea {
            -webkit-user-select: auto;
            -moz-user-select: auto;
            -ms-user-select: auto;
            user-select: auto;
        }

        /* Fixed Header strictly 50px height */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: #128C7E;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Desktop Container: max-width 1200px */
        .container {
            width: 100%;
            max-width: 1200px;
            background-color: #ffffff;
            margin: 30px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Form Group Styles */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #128C7E;
        }

        select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus, textarea:focus {
            border-color: #128C7E;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            background-color: #f9f9f9;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;

        button {
            padding: 12px 20px;

        .btn-generate {

        .btn-copy:hover {

        .btn-clear {

        .status-message {
            margin-top: 10px;
            font-size: 14px;

            min-height: 20px;

        }

        /* Mobile View Adjustments */
        @media (max-width: 768px) {
            body {
                background-color: #ffffff; /* Seamless blend on mobile */

                margin: 0;
                padding: 20px 15px;
                border-radius: 0;

            .btn-group {

</head>
<body>

    <header>
        <h1>WhatsApp Status Caption Generator</h1>
    </header>

    <div class="container">
        <div class="form-group">
            <label for="category">Select Caption Category</label>
            <select id="category">
                <option value="attitude">Attitude</option>
                <option value="love">Love & Romantic</option>
                <option value="motivation">Motivation & Success</option>
                <option value="funny">Funny & Sarcastic</option>
                <option value="sad">Sad & Deep</option>
            </select>
        </div>

        <div class="btn-group" style="margin-bottom: 20px;">
            <button class="btn-generate" id="generateBtn">Generate Caption</button>
        </div>

        <div class="form-group">
            <label for="output">Your Generated Caption</label>
            <textarea id="output" placeholder="Your generated status will appear here..."></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-copy" id="copyBtn">Copy to Clipboard</button>
            <button class="btn-clear" id="clearBtn">Clear Data</button>
        </div>
        
        <div class="status-message" id="statusMessage"></div>
    </div>

    <script>
        // Caption Database
        const captions = {
            attitude:[
                "I don't have an attitude problem, you have a perception problem.",
                "My choices are like fingerprints, they make me unique.",
                "Treat me like a joke and I'll leave you like it's funny.",
                "I'm not changed, it's just I grew up and you should try too.",
                "Silent people have the loudest minds."
            ],
            love:[
                "You are the best thing that's ever been mine.",
                "Every time I look at you, I fall in love all over again.",
                "Together is my favorite place to be.",
                "You stole my heart, but I'll let you keep it.",
                "Loving you is a journey starting at forever and ending at never."
            ],
            motivation:[
                "Push yourself, because no one else is going to do it for you.",
                "Great things never come from comfort zones.",
                "Dream it. Wish it. Do it.",
                "Success doesn't just find you. You have to go out and get it.",
                "The harder you work for something, the greater you'll feel when you achieve it."
            ],
            funny:[
                "I put my phone in airplane mode, but it's not flying.",
                "I am not lazy, I am just on energy saving mode.",
                "My bed is a magical place where I suddenly remember everything I was supposed to do.",
                "I followed my heart, it led me to the fridge.",
                "Common sense is like deodorant. The people who need it most never use it."
            ],
            sad:[
                "Sometimes, the people who are thousands of miles away can make you feel better than people right beside you.",
                "Tears are words the heart can't express.",
                "It's hard to forget someone who gave you so much to remember.",
                "The worst missing is missing your old self.",
                "Behind my smile is a story you would never understand."
            ]
        };

        // DOM Elements
        const categorySelect = document.getElementById('category');
        const outputTextarea = document.getElementById('output');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusMessage = document.getElementById('statusMessage');

        // Local Storage Key
        const STORAGE_KEY = 'wa_status_caption_data';

        // Load auto-saved data on startup
        function loadSavedData() {
            try {
                const savedData = localStorage.getItem(STORAGE_KEY);
                if (savedData) {
                    const parsedData = JSON.parse(savedData);
                    if (parsedData.category) categorySelect.value = parsedData.category;
                    if (parsedData.output) outputTextarea.value = parsedData.output;
                }
            } catch (e) {
                console.warn("Storage access restricted.", e);
            }
        }

        // Auto-save data to user's device (wrapped in Try-Catch for Mobile Private Browsing)
        function autoSaveData() {
            try {
                const dataToSave = {
                    category: categorySelect.value,
                    output: outputTextarea.value
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToSave));
            } catch (e) {
                console.warn("Cannot save data - Private mode enabled.");
            }
        }

        // Generate Random Caption
        function generateCaption() {
            const selectedCategory = categorySelect.value;
            const categoryCaptions = captions[selectedCategory];
            const randomIndex = Math.floor(Math.random() * categoryCaptions.length);
            const newCaption = categoryCaptions[randomIndex];
            
            outputTextarea.value = newCaption;
            autoSaveData();
            showStatus("Caption generated successfully!");
        }

        // Universal Copy to Clipboard (Works on all Mobile Browsers & iOS)
        function copyText() {
            if (!outputTextarea.value.trim()) {
                showStatus("Nothing to copy!");
                return;
            }
            
            // 1st Method: Modern Clipboard API (Requires HTTPS)
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(outputTextarea.value).then(() => {
                    showStatus("Caption copied to clipboard!");
                }).catch(() => {
                    fallbackCopyText(); // If Clipboard API fails, trigger fallback
                });
            } else {
                // 2nd Method: Fallback for Mobile and HTTP
                fallbackCopyText();
            }
        }

        // Fallback for Mobile Users (iOS Safari & older Android browsers)
        function fallbackCopyText() {
            outputTextarea.focus();
            outputTextarea.select();
            outputTextarea.setSelectionRange(0, 99999); // Specific for Mobile Devices

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showStatus("Caption copied to clipboard!");
                } else {
                    showStatus("Failed to copy text.");
                }
            } catch (err) {
                showStatus("Failed to copy text.");
                console.error("Copy error:", err);
            }

            // Deselect text after copying so it looks clean
            if (window.getSelection) {
                window.getSelection().removeAllRanges();
            }
        }

        // Clear Data Function
        function clearData() {
            if(confirm("Are you sure you want to clear your saved caption data?")) {
                try {
                    localStorage.removeItem(STORAGE_KEY);
                } catch(e) {}
                outputTextarea.value = "";
                categorySelect.selectedIndex = 0;
                showStatus("Data cleared successfully!");
            }
        }

        // Helper: Show brief status messages
        let statusTimeout;
        function showStatus(message) {
            statusMessage.textContent = message;
            clearTimeout(statusTimeout);
            statusTimeout = setTimeout(() => {
                statusMessage.textContent = "";
            }, 3000);
        }

        // Event Listeners
        generateBtn.addEventListener('click', generateCaption);
        copyBtn.addEventListener('click', copyText);
        clearBtn.addEventListener('click', clearData);
        
        // Listen to changes to auto-save custom edits
        categorySelect.addEventListener('change', autoSaveData);
        outputTextarea.addEventListener('input', autoSaveData);

        // Initialize on load
        window.addEventListener('DOMContentLoaded', loadSavedData);
    </script>
</body>
</html>
