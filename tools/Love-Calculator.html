    <style>
        /* CSS Variables */
        :root {
            --primary-color: #ff3366;
            --primary-hover: #e60039;
            --bg-color: #fff0f5;
            --card-bg: #ffffff;
            --text-main: #4a001f;
            --text-muted: #800033;
            --border-color: #ffb3c6;
            --danger-color: #ff4d4d;
            --header-height: 50px;
        }

        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--header-height); /* Offset for 50px fixed header */
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* Fixed Header - Exactly 50px */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background: linear-gradient(135deg, #ff3366 0%, #d4003c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(255, 51, 102, 0.3);
        }

        header h1 {
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Main Container - Max Width 1200px */
        .container {
            max-width: 1200px;
            margin: 3rem auto;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(255, 51, 102, 0.08);
            padding: 3rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        /* Input Section */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--text-main);
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1.1rem;
            background-color: #fffafa;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(255, 51, 102, 0.15);
        }

        /* Clear Data Button */
        .btn-clear {
            margin-top: 1rem;
            padding: 1rem;
            width: 100%;
            background-color: #ffffff;
            color: var(--primary-color);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-clear:hover {
            background-color: var(--primary-color);
            color: #ffffff;
            border-color: var(--primary-color);
        }

        .btn-clear:active {
            transform: scale(0.98);
        }

        /* Result Section */
        .result-section {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe6eb 100%);
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            min-height: 350px;
        }

        .heart-shape {
            font-size: 4rem;
            color: var(--primary-color);
            animation: heartbeat 1.5s infinite ease-in-out;
            line-height: 1;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.2); }
            28% { transform: scale(1); }
            42% { transform: scale(1.2); }
            70% { transform: scale(1); }
        }

        .result-percentage {
            font-size: 5.5rem;
            font-weight: 800;
            color: var(--primary-hover);
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(255, 51, 102, 0.1);
        }

        .result-message {
            font-size: 1.25rem;
            color: var(--text-muted);
            font-weight: 600;
            padding: 0 1rem;
            line-height: 1.5;
        }

        /* Responsive Design - Mobile */
        @media (max-width: 768px) {
            body {
                background-color: var(--card-bg); /* Seamless background for mobile */
            }

            .container {
                /* Both side blank space strictly removed for mobile users */
                max-width: 100%;
                width: 100%;
                margin: 0;
                padding: 2rem 1rem;
                border-radius: 0;
                box-shadow: none;
                grid-template-columns: 1fr;
                gap: 2rem;
                border: none;
            }

            .result-section {
                padding: 2.5rem 1rem;
                min-height: auto;
            }

            .result-percentage {
                font-size: 4.5rem;
            }
            
            .heart-shape {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Fixed Header -->
    <header>
        <h1>Love Calculator</h1>
    </header>

    <!-- Main Tool Container -->
    <div class="container">
        
        <!-- Input Area -->
        <div class="input-section">
            <div class="input-group">
                <label for="nameOne">Your Name</label>
                <input type="text" id="nameOne" placeholder="Enter your name" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="nameTwo">Partner's Name</label>
                <input type="text" id="nameTwo" placeholder="Enter partner's name" autocomplete="off">
            </div>

            <button type="button" class="btn-clear" id="clearDataBtn">Clear Data</button>
        </div>

        <!-- Results Area -->
        <div class="result-section">
            <div class="heart-shape">❤️</div>
            <div class="result-percentage" id="lovePercentage">0%</div>
            <div class="result-message" id="loveMessage">Enter both names to calculate your love compatibility!</div>
        </div>

    </div>

    <!-- Application Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const nameOneInput = document.getElementById('nameOne');
            const nameTwoInput = document.getElementById('nameTwo');
            const clearBtn = document.getElementById('clearDataBtn');
            const percentageDisplay = document.getElementById('lovePercentage');
            const messageDisplay = document.getElementById('loveMessage');

            // LocalStorage Keys
            const STORAGE_PREFIX = 'toolshub365_love_calc_';
            const keys = {
                nameOne: STORAGE_PREFIX + 'name1',
                nameTwo: STORAGE_PREFIX + 'name2'
            };

            // Initialize Tool
            loadSavedData();
            calculateCompatibility();

            // Event Listeners for real-time calculation and saving
            [nameOneInput, nameTwoInput].forEach(input => {
                input.addEventListener('input', () => {
                    saveData();
                    calculateCompatibility();
                });
            });

            // Clear Data Button Logic
            clearBtn.addEventListener('click', () => {
                clearData();
            });

            // Core Logic: Love Calculation Algorithm
            function calculateCompatibility() {
                const name1 = nameOneInput.value.trim().toLowerCase();
                const name2 = nameTwoInput.value.trim().toLowerCase();

                if (name1.length > 0 && name2.length > 0) {
                    // Sort names so "Alice and Bob" gives the exact same result as "Bob and Alice"
                    const combinedNames =[name1, name2].sort().join('');
                    
                    let asciiSum = 0;
                    for (let i = 0; i < combinedNames.length; i++) {
                        asciiSum += combinedNames.charCodeAt(i);
                    }

                    // Mathematical operation to ensure a consistent 1-100 percentage based on the characters
                    let percentage = (asciiSum * 43) % 100 + 1; 
                    
                    // Special rule: If names are exactly identical, it's 100%
                    if (name1 === name2) {
                        percentage = 100;
                    }

                    displayResults(percentage);
                } else {
                    // Reset fields if one or both are empty
                    percentageDisplay.textContent = '0%';
                    messageDisplay.textContent = 'Enter both names to calculate your love compatibility!';
                }
            }

            // UI Result Display Logic
            function displayResults(percentage) {
                percentageDisplay.textContent = percentage + '%';

                let message = '';
                if (percentage >= 90) {
                    message = 'A perfect match! Your compatibility is incredibly strong. 💞';
                } else if (percentage >= 75) {
                    message = 'Very strong connection! The chemistry between you two is undeniable. ✨';
                } else if (percentage >= 50) {
                    message = 'Good potential! A solid foundation to build a loving relationship. 🌱';
                } else if (percentage >= 25) {
                    message = 'Opposites attract! It might take some effort, but love can grow. 🤝';
                } else {
                    message = 'A challenging match, but true love always finds a way! 💪';
                }

                messageDisplay.textContent = message;
            }

            // Auto-Save data to User's Browser
            function saveData() {
                localStorage.setItem(keys.nameOne, nameOneInput.value);
                localStorage.setItem(keys.nameTwo, nameTwoInput.value);
            }

            // Load saved data from User's Browser
            function loadSavedData() {
                if (localStorage.getItem(keys.nameOne)) nameOneInput.value = localStorage.getItem(keys.nameOne);
                if (localStorage.getItem(keys.nameTwo)) nameTwoInput.value = localStorage.getItem(keys.nameTwo);
            }

            // Clear Data Functionality
            function clearData() {
                // Clear LocalStorage
                localStorage.removeItem(keys.nameOne);
                localStorage.removeItem(keys.nameTwo);

                // Clear UI Inputs
                nameOneInput.value = '';
                nameTwoInput.value = '';

                // Recalculate (Resets the result view)
                calculateCompatibility();
            }
        });
    </script>
</body>
</html>
