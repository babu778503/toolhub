            // Load saved data to textarea
            const savedText = localStorage.getItem(storageKey);
            if (savedText) {
                inputField.value = savedText;
            }

            // Save text data to local device automatically
            inputField.addEventListener('input', () => {
                localStorage.setItem(storageKey, inputField.value);
            });

            // Populate Emojis in grids
            const populateEmojis = () => {
                Object.keys(emojiDB).forEach(category => {
                    const gridElement = document.getElementById(category);
                    const emojis = emojiDB[category].split(" ");
                    
                    emojis.forEach(emoji => {
                        if (emoji.trim() === "") return;
                        const span = document.createElement('span');
                        span.classList.add('emoji-item');
                        span.textContent = emoji;
                        span.setAttribute('aria-label', `Emoji ${emoji}`);
                        span.onclick = () => insertEmoji(emoji);
                        gridElement.appendChild(span);
                    });
                });
            };

            // Function to insert emoji exactly where cursor is or at the end
            const insertEmoji = (emoji) => {
                if (inputField.selectionStart || inputField.selectionStart === 0) {
                    const startPos = inputField.selectionStart;
                    const endPos = inputField.selectionEnd;
                    inputField.value = inputField.value.substring(0, startPos)
                        + emoji
                        + inputField.value.substring(endPos, inputField.value.length);
                    
                    // Move cursor right after the inserted emoji
                    inputField.selectionStart = startPos + emoji.length;
                    inputField.selectionEnd = startPos + emoji.length;
                } else {
                    inputField.value += emoji;
                }
                
                // Focus back on textarea and trigger save
                inputField.focus();
                localStorage.setItem(storageKey, inputField.value);
            };

            // Clear Data Button functionality
            clearBtn.addEventListener('click', () => {
                inputField.value = '';
                localStorage.removeItem(storageKey);
                inputField.focus();
            });

            // 100% Workable Mobile & Desktop Copy Function
            copyBtn.addEventListener('click', () => {
                if (!inputField.value.trim()) return;

                // Step 1: Select the text for Mobile Devices (iOS/Android fallback requirement)
                inputField.select();
                inputField.setSelectionRange(0, 99999); // For mobile compatibility

                const handleSuccess = () => {
                    const originalText = copyBtn.innerText;
                    copyBtn.innerText = 'Copied!';
                    copyBtn.style.backgroundColor = '#075E54';
                    
                    setTimeout(() => {
                        copyBtn.innerText = originalText;
                        copyBtn.style.backgroundColor = ''; // Restore default class background
                    }, 2000);
                    window.getSelection().removeAllRanges(); // Deselect text
                };

                const handleFailure = () => {
                    alert("Unable to copy to clipboard. Please manually copy the selected text.");
                    window.getSelection().removeAllRanges();
                };

                // Step 2: Try modern Clipboard API first, fallback to execCommand for Mobile WebView/Older browsers
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(inputField.value)
                        .then(handleSuccess)
                        .catch(err => {
                            executeFallbackCopy();
                        });
                } else {
                    executeFallbackCopy();
                }

                // Fallback for Mobile WebViews, iOS, and older browsers
                function executeFallbackCopy() {
                    try {
                        const successful = document.execCommand('copy');
                        if (successful) {
                            handleSuccess();
                        } else {
                            handleFailure();
                        }
                    } catch (err) {
                        handleFailure();
                    }
                }
            });

            // Tab Navigation Logic
            const tabButtons = document.querySelectorAll('.tab-btn');
            const grids = document.querySelectorAll('.emoji-grid');

            tabButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Remove active state from all tabs and grids
                    tabButtons.forEach(t => t.classList.remove('active'));
                    grids.forEach(g => g.classList.remove('active'));

                    // Add active state to clicked tab
                    btn.classList.add('active');
                    
                    // Show corresponding grid
                    const targetId = btn.getAttribute('data-target');
                    document.getElementById(targetId).classList.add('active');
                });
            });

            // Initialize App
            populateEmojis();
        });
    </script>
