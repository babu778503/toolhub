    <style>

<body>

    <header>
        <h1>IP Subnet Calculator</h1>
    </header>

    <main class="container">
        <section class="app-wrapper">
            <!-- Inputs -->
            <div class="input-section">
                <div class="input-group">
                    <label for="ip-input">IP Address</label>
                    <input type="text" id="ip-input" placeholder="e.g. 192.168.1.1" autocomplete="off">
                    <div class="error-message" id="ip-error">Invalid IP Address format.</div>
                </div>
                <div class="input-group">
                    <label for="cidr-input">Subnet Mask / Prefix Length</label>
                    <select id="cidr-input">
                        <!-- Options generated by JS -->
                    </select>
                </div>
            </div>

            <!-- Results -->
            <div class="results-section">
                <div class="results-grid">
                    <div class="result-card">
                        <div class="value" id="res-network">N/A</div>
                        <div class="label">Network Address</div>
                    </div>
                    <div class="result-card">
                        <div class="value" id="res-broadcast">N/A</div>
                        <div class="label">Broadcast Address</div>
                    </div>
                    <div class="result-card">
                        <div class="value" id="res-mask">N/A</div>
                        <div class="label">Subnet Mask</div>
                    </div>
                    <div class="result-card">
                        <div class="value" id="res-range">N/A</div>
                        <div class="label">Usable Host Range</div>
                    </div>
                    <div class="result-card">
                        <div class="value" id="res-usable-hosts">0</div>
                        <div class="label">Usable Hosts</div>
                    </div>
                    <div class="result-card">
                        <div class="value" id="res-total-hosts">0</div>
                        <div class="label">Total IP Addresses</div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>
        </section>
    </main>

    <script>
        // DOM Elements
        const ipInput = document.getElementById('ip-input');
        const cidrInput = document.getElementById('cidr-input');
        const ipError = document.getElementById('ip-error');
        
        const resNetwork = document.getElementById('res-network');
        const resBroadcast = document.getElementById('res-broadcast');
        const resMask = document.getElementById('res-mask');
        const resRange = document.getElementById('res-range');
        const resUsableHosts = document.getElementById('res-usable-hosts');
        const resTotalHosts = document.getElementById('res-total-hosts');

        // Storage Key
        const STORAGE_KEY = 'ipSubnetData_toolshub365';

        // Utility: Generate CIDR Dropdown Options
        function populateCidrOptions() {
            let options = "";
            for (let i = 32; i >= 1; i--) {
                const mask = generateSubnetMaskStr(i);
                options += `<option value="${i}">/${i} (${mask})</option>`;
            }
            cidrInput.innerHTML = options;
        }

        // Utility: CIDR to Subnet Mask String
        function generateSubnetMaskStr(cidr) {
            let mask = ~((1 << (32 - cidr)) - 1) >>> 0;
            return intToIp(mask);
        }

        // Utility: IP String to Integer
        function ipToInt(ipStr) {
            return ipStr.split('.').reduce((int, octet) => (int << 8) + parseInt(octet, 10), 0) >>> 0;
        }

        // Utility: Integer to IP String
        function intToIp(int) {
            return[
                (int >>> 24) & 255,
                (int >>> 16) & 255,
                (int >>> 8) & 255,
                int & 255
            ].join('.');
        }

        // Utility: Validate IP format
        function isValidIP(ip) {
            const regex = /^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
            return regex.test(ip);
        }

        // Core Calculation
        function calculateSubnet() {
            const ip = ipInput.value.trim();
            const cidr = parseInt(cidrInput.value, 10);

            if (!ip) {
                resetUI();
                ipError.style.display = 'none';
                return;
            }

            if (!isValidIP(ip)) {
                resetUI();
                ipError.style.display = 'block';
                return;
            }

            ipError.style.display = 'none';

            // Bitwise calculations
            const maskInt = ~((1 << (32 - cidr)) - 1) >>> 0;
            const ipInt = ipToInt(ip);
            
            const networkInt = (ipInt & maskInt) >>> 0;
            const broadcastInt = (networkInt | ~maskInt) >>> 0;
            
            const totalHosts = Math.pow(2, 32 - cidr);
            let usableHosts = totalHosts - 2;
            if (usableHosts < 0) usableHosts = 0; // for /31 and /32

            const firstHostInt = (cidr >= 31) ? networkInt : (networkInt + 1) >>> 0;
            const lastHostInt = (cidr >= 31) ? broadcastInt : (broadcastInt - 1) >>> 0;

            // Update UI
            resNetwork.textContent = intToIp(networkInt);
            resBroadcast.textContent = intToIp(broadcastInt);
            resMask.textContent = intToIp(maskInt);
            resTotalHosts.textContent = totalHosts.toLocaleString();
            resUsableHosts.textContent = usableHosts.toLocaleString();
            
            if (usableHosts > 0) {
                resRange.textContent = `${intToIp(firstHostInt)} - ${intToIp(lastHostInt)}`;
            } else if (cidr === 31) {
                resRange.textContent = `${intToIp(firstHostInt)} and ${intToIp(lastHostInt)}`;
            } else if (cidr === 32) {
                resRange.textContent = "N/A (Single Host)";
            } else {
                resRange.textContent = "N/A";
            }
            
            saveData();
        }

        function resetUI() {
            resNetwork.textContent = "N/A";
            resBroadcast.textContent = "N/A";
            resMask.textContent = "N/A";
            resRange.textContent = "N/A";
            resTotalHosts.textContent = "0";
            resUsableHosts.textContent = "0";
        }

        // LocalStorage Management
        function saveData() {
            const data = {
                ip: ipInput.value.trim(),
                cidr: cidrInput.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    if (parsed.ip) ipInput.value = parsed.ip;
                    if (parsed.cidr) cidrInput.value = parsed.cidr;
                } catch (e) {
                    // Ignore parse errors
                }
            } else {
                // Default value
                ipInput.value = "192.168.1.1";
                cidrInput.value = "24";
            }
        }

        function clearData() {
            if(confirm("Are you sure you want to clear your data?")) {
                localStorage.removeItem(STORAGE_KEY);
                ipInput.value = "";
                cidrInput.value = "24";
                calculateSubnet();
            }
        }

        // Initialization
        function init() {
            populateCidrOptions();
            loadData();
            calculateSubnet();

            // Event Listeners
            ipInput.addEventListener('input', calculateSubnet);
            cidrInput.addEventListener('change', calculateSubnet);
        }

        window.onload = init;
    </script>
</body>
