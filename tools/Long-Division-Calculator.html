    <style>
        /* --- CSS Reset & Variables --- */

        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height); /* Space for fixed header */
            min-height: 100vh;
        }

        /* --- Header (Fixed 50px) --- */
        header {
            position: fixed;
            top: 0;

        header h1 {

        /* --- Main Container --- */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 30px auto;
            background-color: var(--container-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;

        /* --- Input Section --- */

            display: flex;
            gap: 20px;

        }

            flex: 1;

            transform: translateY(2px);

        /* --- Results Section --- */
        .result-area {
            display: none; /* Hidden by default */
            animation: fadeIn 0.4s ease-out;

        .summary-card {

            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-around;
        }

        .summary-item {
            text-align: center;
        }

        .summary-label {
            font-size: 0.9rem;

        }

        /* --- Long Division Visualization --- */
        .work-area {
            background: #fff;

        .quotient-line {

        }

        @media (max-width: 768px) {

                width: 100%;

            .input-row {

            .btn-row {

<body>

    <header>
        <h1>Long Division Calculator</h1>
    </header>

    <div class="container">
        
        <form onsubmit="return false">
            <div class="input-row">
                <div class="input-group">
                    <label for="dividend">Dividend (Number being divided)</label>
                    <input type="number" id="dividend" placeholder="e.g. 1250" step="1" oninput="autoSave()">
                </div>
                <div class="input-group">
                    <label for="divisor">Divisor (Number dividing by)</label>
                    <input type="number" id="divisor" placeholder="e.g. 5" step="1" oninput="autoSave()">
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-calc" onclick="calculateDivision()">Calculate</button>
                <button class="btn btn-clear" onclick="clearData()">Clear Data</button>
            </div>
        </form>

        <div id="resultSection" class="result-area">
            
            <div class="summary-card">
                <div class="summary-item">
                    <div class="summary-label">Quotient</div>
                    <div class="summary-value" id="quotientResult">-</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Remainder</div>
                    <div class="summary-value" id="remainderResult">-</div>
                </div>
            </div>

            <h3>Step-by-Step Solution:</h3>
            <div class="work-area">
                <div id="visualSteps" class="division-container"></div>
            </div>

        </div>
    </div>

    <script>
        // --- Core Calculation Logic ---

        function calculateDivision() {
            const dividendInput = document.getElementById('dividend').value;
            const divisorInput = document.getElementById('divisor').value;

            // Validation
            if (dividendInput === '' || divisorInput === '') {
                alert("Please enter both the Dividend and the Divisor.");
                return;
            }

            const dividend = parseInt(dividendInput);
            const divisor = parseInt(divisorInput);

            if (isNaN(dividend) || isNaN(divisor)) {
                alert("Please enter valid integers.");
                return;
            }

            if (divisor === 0) {
                alert("Cannot divide by zero.");
                return;
            }

            // Standard Math Results
            const quotient = Math.floor(dividend / divisor);
            const remainder = dividend % divisor;

            // Display Summary
            document.getElementById('quotientResult').innerText = quotient;
            document.getElementById('remainderResult').innerText = remainder;

            // Generate Steps
            generateVisualSteps(Math.abs(dividend), Math.abs(divisor)); // Use absolute values for visual logic

            // Show Results
            const resArea = document.getElementById('resultSection');
            resArea.style.display = 'block';

            // Scroll on mobile
            if (window.innerWidth <= 768) {
                resArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            autoSave();
        }

        // --- Step Generation Algorithm ---

        function generateVisualSteps(dividend, divisor) {
            const output = document.getElementById('visualSteps');
            output.innerHTML = '';

            const dividendStr = dividend.toString();
            const digits = dividendStr.split('').map(Number);
            let currentVal = 0;
            let quotientStr = "";
            let stepsHTML = "";
            
            // 1. Build setup: Divisor ) Dividend
            // Note: We handle the top bar (quotient) separately in CSS/HTML structure
            
            // Indentation logic
            // Each step adds rows. We need to align numbers.
            // Using non-breaking spaces (&nbsp;) for alignment in monospace font.
            
            let spaces = divisor.toString().length + 2; // Initial spacing for steps below dividend
            let visualRows = [];

            for (let i = 0; i < digits.length; i++) {
                currentVal = (currentVal * 10) + digits[i];
                
                const stepQuotient = Math.floor(currentVal / divisor);
                const stepProduct = stepQuotient * divisor;
                
                quotientStr += stepQuotient;

                if (i === 0 && stepQuotient === 0 && digits.length > 1) {
                    // Skip leading zero in quotient visual if strictly decorative
                    // But usually, we process it. Let's keep logic simple:
                    // If quotient is 0 and we are at start, just move to next digit
                    // But we still need to track currentVal
                } else {
                     // Standard Long Division Step Visualization
                     // Only show subtraction if there was a meaningful operation or it's the end
                     if (stepQuotient > 0 || i === digits.length -1) {
                        
                        // Line 1: The product being subtracted
                        // Alignment: Needs to align with the current digit index (i)
                        // Total width reference is roughly digits.length
                        
                        // Simply rendering row by row is hard with simple HTML.
                        // We will build a text block.
                     }
                }
                
                currentVal = currentVal - stepProduct;
            }
            
            // --- Simplified Render Approach ---
            // Constructing complex HTML tables for long division is error-prone.
            // We will use a pre-calculated text approach wrapped in divs.
            
            let resultHTML = "";
            let rem = 0;
            let qText = "";
            let current = "";
            
            // Header parts
            const divLen = divisor.toString().length;
            const dendLen = dividendStr.length;
            
            // Calculate Quotient String
            let tempRem = 0;
            let finalQ = "";
            
            // Pass 1: Get logic
            let workLog = [];
            
            for(let i=0; i<dendLen; i++) {
                let digit = parseInt(dividendStr[i]);
                let num = tempRem * 10 + digit;
                let q = Math.floor(num / divisor);
                let product = q * divisor;
                tempRem = num - product;
                
                finalQ += q;
                
                // We record steps only if q > 0 or it is the final step
                // To mimic standard writing, usually we pull down digits.
            }
            
            // Strip leading zeros from Quotient
            finalQ = finalQ.replace(/^0+/, '') || "0";
            
            // Render Top
            let headerHTML = `
                <div style="margin-left: ${divLen + 2}ch; letter-spacing: 2px;">${finalQ}</div>
                <div class="setup-line">
                    <span>${divisor}</span>
                    <span style="margin: 0 5px;">)</span>
                    <span style="border-top: 1px solid #000; letter-spacing: 2px;">${dividendStr}</span>
                </div>
            `;
            
            resultHTML += headerHTML;
            
            // Render Body Steps
            tempRem = 0;
            let paddingLeft = divLen + 2; // Start after "Divisor )"
            
            for(let i=0; i<dendLen; i++) {
                let digit = parseInt(dividendStr[i]);
                let num = tempRem * 10 + digit;
                let q = Math.floor(num / divisor);
                
                // If this is the first digit and q is 0, we usually skip writing "0" and "-0"
                if (i === 0 && q === 0 && dendLen > 1) {
                    tempRem = num;
                    continue;
                }
                
                // If we have a remainder from previous (tempRem > 0) or we pulled down a digit
                // Actually, standard view:
                //   12
                // 5)60
                //  -5
                //   10
                //  -10
                //    0
                
                let product = q * divisor;
                let remainder = num - product;
                
                // We need to render the subtraction part
                // The position depends on index 'i'
                
                // Current number being divided (visually usually combined with pull down)
                // For simplicity in this HTML tool, we will show the Product indented correctly
                
                if (q > 0 || i === dendLen - 1) {
                    let prodStr = product.toString();
                    
                    // Indentation calculation: 
                    // i is the index of the current digit in dividend.
                    // The number ends at position i.
                    
                    // Indent = (Base padding) + (i - length of product + 1)
                    // We multiply by 2ch because of letter-spacing: 2px (approx 1ch visual)
                    
                    let indent = i - prodStr.length + 1;
                    if(indent < 0) indent = 0; // Safety
                    
                    let rowStyle = `margin-left: calc(${paddingLeft}ch + ${indent * 1.5}ch);`; // Approximate spacing adjustment
                    
                    // Product Row (subtraction)
                    resultHTML += `<div class="step-row" style="${rowStyle}">-${product}</div>`;
                    
                    // Line
                    resultHTML += `<div class="step-row" style="${rowStyle}; border-top: 1px solid #000; display:inline-block; width: ${prodStr.length * 1.5}ch;"></div><br>`;
                    
                    // Remainder Row (becomes part of next step)
                    // If it's the last step, show remainder
                    if (i === dendLen - 1) {
                         let remStr = remainder.toString();
                         let remIndent = i - remStr.length + 1;
                         let remStyle = `margin-left: calc(${paddingLeft}ch + ${remIndent * 1.5}ch); font-weight:bold;`;
                         resultHTML += `<div class="step-row" style="${remStyle}">${remainder}</div>`;
                    } else {
                        // For intermediate steps, usually we visually "bring down" the next digit in the loop header
                        // But since we are iterating, the next `num` calculation implicitly brings it down.
                        // To show it visually like "10" (remainder 1 + digit 0):
                        
                        // We don't print the remainder alone, we print the NEXT working number in the next iteration?
                        // Actually, standard notation prints the remainder, then brings down digit.
                        
                        // Let's print the remainder + next digit for the *next* block visualization
                        // The 'num' of the *next* iteration is what is written below the line.
                        
                        let nextDigit = parseInt(dividendStr[i+1]);
                        let nextNum = remainder * 10 + nextDigit;
                        let nextNumStr = nextNum.toString();
                        
                        let nextIndent = (i+1) - nextNumStr.length + 1;
                        let nextStyle = `margin-left: calc(${paddingLeft}ch + ${nextIndent * 1.5}ch);`;
                        resultHTML += `<div class="step-row" style="${nextStyle}">${nextNum}</div>`;
                    }
                }
                
                tempRem = remainder;
            }

            output.innerHTML = resultHTML;
        }

        // --- Local Storage Functions ---

        function autoSave() {
            const data = {
                dividend: document.getElementById('dividend').value,
                divisor: document.getElementById('divisor').value
            };
            localStorage.setItem('longDivisionData', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('longDivisionData');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('dividend').value = data.dividend || '';
                document.getElementById('divisor').value = data.divisor || '';
            }
        }

        function clearData() {
            if(confirm("Are you sure you want to clear all data?")) {
                localStorage.removeItem('longDivisionData');
                document.getElementById('dividend').value = '';
                document.getElementById('divisor').value = '';
                document.getElementById('resultSection').style.display = 'none';
            }
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
