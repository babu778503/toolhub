    <style>

        body {

        header h1 {

            margin: 0;

        .container {

        .game-dashboard {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
            transition: all 0.3s;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;

            gap: 15px;
            align-items: center;

            color: var(--text-main);
        }

            border-color: var(--excel-green);

            background: var(--correct-bg);
            border-color: var(--correct-border);

        .search-input:focus {

            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;

        .category-header {

            font-size: 1.15rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: filter 0.2s;

        .category-header:hover {
            filter: brightness(0.95);
        }

        .category-header::after {
            content: '▼';
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: transform 0.3s;
        }

        .category-block.active .category-header::after {

            list-style: none;

            align-items: center;

        .func-header-left {
            display: flex;
            align-items: center;
            gap: 10px;

            font-size: 1rem;
            display: none;
        }

            display: inline-block;
        }

        .func-header::after {
            content: '+';
            font-size: 1.3rem;
            color: var(--excel-green);
            font-weight: bold;
        }

        .func-item.active .func-header::after {
            content: '-';
        }

        /* Function Details */
        .func-details {
            display: none;
            padding: 20px;
            background: var(--card-bg);
            position: relative;
        }

        .func-item.active .func-details {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        .detail-section {
            margin-bottom: 18px;

        .detail-section h4 {
            font-size: 0.95rem;
            color: var(--text-muted);

            letter-spacing: 0.5px;

            line-height: 1.5;
            color: var(--text-main);

        .code-wrapper {

        .code-block {
            display: block;
            background: var(--code-bg);
            color: var(--code-color);

            font-size: 0.95rem;

        .btn-copy {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            z-index: 10;
        }

        .code-wrapper:hover .btn-copy {
            opacity: 1;
        }

        .btn-copy:hover {
            background: var(--btn-hover);
            color: var(--text-main);
        }

        .syn-fn { color: var(--syn-fn); font-weight: bold; }
        .syn-str { color: var(--syn-str); }
        .syn-ref { color: var(--syn-ref); }

        /* Practice Mode Logic */
        body.practice-mode-active .code-block {
            filter: blur(6px);
            cursor: pointer;
            user-select: none;
        }
        
        body.practice-mode-active .code-wrapper::after {
            content: "Click to reveal 👀";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            text-shadow: 0 0 5px var(--card-bg);
            pointer-events: none;
            opacity: 1;
        }

        body.practice-mode-active .code-block.revealed {
            filter: none;
            cursor: text;
            user-select: auto;
        }
        
        body.practice-mode-active .code-block.revealed + .btn-copy,
        body.practice-mode-active .code-wrapper:has(.revealed)::after {
            display: none;
        }

        /* Mastery Button */
        .mastery-action {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
            display: flex;
            justify-content: flex-end;
        }

        .btn-mastery {
            padding: 10px 18px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-muted);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-mastery:hover {
            background: var(--btn-hover);
            border-color: var(--excel-green);
        }

        .btn-mastery.mastered {
            background: var(--gold-light);
            border-color: var(--gold);
            color: #b38100;
        }

        /* Confetti Animation */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 9999;
            animation: fall 1.5s ease-out forwards;
        }
        
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(150px) rotate(360deg) scale(0.5); opacity: 0; }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 10px 0 0 0;
            }
            .game-dashboard, .quiz-section {
                border-radius: 0;
                border-left: none;
                border-right: none;
                margin-bottom: 10px;
            }
            .quiz-section {
                border-left: 4px solid var(--gold);
            }
            .game-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .search-wrapper {
                padding: 0 10px 10px 10px;
            }
            .category-block {
                border-radius: 0;
                border-left: none;
                border-right: none;
                margin-bottom: 8px;
            }
            .btn-copy { opacity: 1; }
        }
    </style>
</head>

    <script>
        // --- DATA SETUP ---
        const excelData = [
            ["✅ Core Percentage Calculations", [
                ["% (Percentage operator)", "Divides the preceding number by 100, converting it instantly into a percentage value.", "Percentage.", "value%", "50%\n// Equivalent to 0.5\n=A2*10%"],
                ["ABS", "Returns the absolute value of a number (without its sign). Essential for accurate percent change calculations when negative numbers are involved.", "Number.", "=ABS(number)", "=ABS((New-Old)/Old)\n=ABS((A2-B2)/B2)"],
                ["SUM", "Adds up values to establish the total denominator required for determining percentage contributions.", "Number.", "=SUM(number1, [number2], ...)", "=A2/SUM(A$2:A$10)\n// Calculates % of total sum"],
                ["PRODUCT", "Multiplies multiple values together, useful for compounding percentage growth over periods.", "Number.", "=PRODUCT(number1, [number2], ...)", "=PRODUCT(1+A2:A5)-1\n// Calculates compound % growth"]
            ]],
            ["✅ Basic Percentage Functions", [
                ["PERCENTAGE (Value / Total)", "Calculates the basic percentage that one part represents out of a grand total.", "Percentage.", "=part / total", "=A2 / B2\n// Assuming A2 is 25 and B2 is 100, returns 25%"],
                ["Percent Change (New-Old)/Old", "Determines the percentage increase or decrease from an original value to a new value.", "Percentage.", "=(new_value - old_value) / ABS(old_value)", "=(C2 - B2) / ABS(B2)\n// Finds the % change between years"],
                ["Percent Difference", "Calculates the percentage difference between two distinct values relative to their average.", "Percentage.", "=ABS(A - B) / AVERAGE(A, B)", "=ABS(A2 - B2) / AVERAGE(A2, B2)"],
                ["Percent of Total (SUM)", "Calculates how much a specific row contributes to an entire column's total.", "Percentage.", "=value / SUM(range)", "=A2 / SUM($A$2:$A$100)\n// Absolute reference locks total"]
            ]],
            ["✅ Statistical Percentage Functions", [
                ["PERCENTILE", "Returns the k-th percentile of values in a dataset. (Legacy function).", "Number.", "=PERCENTILE(array, k)", "=PERCENTILE(A2:A100, 0.9)\n// Returns the 90th percentile"],
                ["PERCENTILE.INC", "Returns the k-th percentile of values in a range, where k is in the range 0 to 1, inclusive.", "Number.", "=PERCENTILE.INC(array, k)", "=PERCENTILE.INC(B2:B50, 0.5)\n// Returns the median (50th percentile)"],
                ["PERCENTILE.EXC", "Returns the k-th percentile of values in a range, where k is strictly between 0 and 1, exclusive.", "Number.", "=PERCENTILE.EXC(array, k)", "=PERCENTILE.EXC(C2:C100, 0.25)\n// Returns the 25th percentile"],
                ["PERCENTRANK", "Returns the rank of a value within a data set as a percentage. (Legacy function).", "Percentage.", "=PERCENTRANK(array, x, [significance])", "=PERCENTRANK(A2:A100, 50)"],
                ["PERCENTRANK.INC", "Returns the relative rank of a value as a percentage, inclusive of 0 and 1.", "Percentage.", "=PERCENTRANK.INC(array, x, [significance])", "=PERCENTRANK.INC(B2:B50, B2)\n// Ranks B2 against the array"],
                ["PERCENTRANK.EXC", "Returns the relative rank of a value as a percentage, exclusive of 0 and 1.", "Percentage.", "=PERCENTRANK.EXC(array, x, [significance])", "=PERCENTRANK.EXC(C2:C100, 85, 2)"]
            ]],
            ["✅ Conditional Percentage", [
                ["COUNTIF / COUNTA (for %)", "Calculates the percentage of cells that meet a single criteria compared to all non-empty cells.", "Percentage.", "=COUNTIF(range, criteria) / COUNTA(range)", "=COUNTIF(A2:A100, \"Pass\") / COUNTA(A2:A100)"],
                ["COUNTIFS / COUNT", "Calculates the percentage of numeric cells meeting multiple criteria.", "Percentage.", "=COUNTIFS(criteria_range1, criteria1, ...) / COUNT(range)", "=COUNTIFS(A:A, \">50\", B:B, \"Yes\") / COUNT(A:A)"],
                ["SUMIF / SUM", "Calculates the percentage of a conditioned sum against the overall sum total.", "Percentage.", "=SUMIF(range, criteria, [sum_range]) / SUM(sum_range)", "=SUMIF(Dept, \"Sales\", Revenue) / SUM(Revenue)"],
                ["SUMIFS / SUM", "Calculates a conditioned multi-criteria sum's percentage contribution to the total.", "Percentage.", "=SUMIFS(sum_range, criteria_range1, criteria1, ...) / SUM(sum_range)", "=SUMIFS(C:C, A:A, \"East\", B:B, \"Q1\") / SUM(C:C)"]
            ]],

        function highlightSyntax(codeStr) {
            let s = codeStr.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            s = s.replace(/("[^"]*")/g, '<span class="syn-str">$1</span>');
            s = s.replace(/\b([A-Z.0-9_]+)(\()/g, '<span class="syn-fn">$1</span>$2');
            s = s.replace(/\b([A-Z]{1,3}[0-9]{1,7}(:[A-Z]{1,3}[0-9]{1,7})?)\b/g, '<span class="syn-ref">$1</span>');
            return s;
        }

        // Robust mobile-friendly copy-to-clipboard function
        function copyToClipboard(text, btnElement) {
            const onSuccess = () => {
                let oldText = btnElement.innerText;
                if(oldText === "✅ Copied!") return;
                btnElement.innerText = "✅ Copied!";
                btnElement.style.color = "var(--excel-green)";
                setTimeout(() => {
                    btnElement.innerText = "📋 Copy";
                    btnElement.style.color = "";
                }, 2000);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(onSuccess).catch(() => {
                    fallbackCopy(text, onSuccess);
                });
            } else {
                fallbackCopy(text, onSuccess);
            }
        }

        function fallbackCopy(text, onSuccess) {
            let textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            textArea.setSelectionRange(0, 99999);
            
            try {
                let successful = document.execCommand('copy');
                if (successful) onSuccess();
            } catch (err) {
                console.error("Fallback copy failed", err);
            }
            document.body.removeChild(textArea);
        }

        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

            if (!isQuizActive) {
                quizContainer.style.display = 'block';
                btnToggleQuiz.textContent = "Close Quiz";
                isQuizActive = true;
                startQuiz();
            } else {
                quizContainer.style.display = 'none';
                btnToggleQuiz.textContent = "Start Practice Quiz";
                isQuizActive = false;
            }
        });

        function startQuiz() {
            shuffledQuiz = shuffleArray([...quizQuestions]);
            currentQuizIndex = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const qData = shuffledQuiz[currentQuizIndex];
            quizQuestion.textContent = `${currentQuizIndex + 1}. ${qData.q}`;
            quizOptions.innerHTML = '';
            quizFeedback.style.display = 'none';
            btnNextQuestion.style.display = 'none';

            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option-btn';
                btn.textContent = opt;
                btn.onclick = (e) => handleAnswer(index, qData.answer, qData.explanation, btn, e);
                quizOptions.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex, correctIndex, explanation, btnClicked, event) {
            const buttons = quizOptions.querySelectorAll('.quiz-option-btn');
            buttons.forEach(btn => btn.disabled = true); 

            quizFeedback.style.display = 'block';

            if (selectedIndex === correctIndex) {
                btnClicked.classList.add('correct');
                quizFeedback.className = 'quiz-feedback success';
                quizFeedback.innerHTML = `<strong>✅ Correct! (+${XP_PER_QUIZ} XP)</strong><br>${explanation}`;
                addQuizCorrect(event); 
            } else {
                btnClicked.classList.add('incorrect');
                buttons[correctIndex].classList.add('correct'); 
                quizFeedback.className = 'quiz-feedback error';
                quizFeedback.innerHTML = `<strong>❌ Incorrect.</strong><br>${explanation}`;
            }

            btnNextQuestion.style.display = 'inline-block';
        }

        btnNextQuestion.addEventListener('click', () => {
            currentQuizIndex++;
            if (currentQuizIndex >= shuffledQuiz.length) {
                shuffledQuiz = shuffleArray([...quizQuestions]);
                currentQuizIndex = 0;
            }
            loadQuestion();
        });

        // --- PRACTICE MODE LOGIC ---
        function applyPracticeMode() {
            const isChecked = practiceToggle.checked;
            localStorage.setItem(STORAGE_KEY_PRACTICE, isChecked);
            if(isChecked) {
                document.body.classList.add('practice-mode-active');
            } else {
                document.body.classList.remove('practice-mode-active');
                document.querySelectorAll('.code-block').forEach(el => el.classList.remove('revealed'));
            }
        }

        // --- RENDER CONTENT ---
        function renderUI() {
            container.innerHTML = '';
            let savedCats = [];
            try { savedCats = JSON.parse(localStorage.getItem(STORAGE_KEY_OPEN_CATS)) || []; } catch (e) {}
            const masteryData = getMasteryData();

            excelData.forEach((category, catIndex) => {
                const catName = category[0];
                const functions = category[1];

                const catDiv = document.createElement('div');
                catDiv.className = 'category-block';
                const catId = catName.toLowerCase().replace(/[^a-z0-9]/g, '-');
                catDiv.dataset.catName = catId;

                if (savedCats.includes(catId) || (savedCats.length === 0 && catIndex === 0)) {
                    catDiv.classList.add('active');
                }

                const catHeader = document.createElement('div');
                catHeader.className = 'category-header';
                catHeader.textContent = catName;
                catHeader.onclick = () => {
                    catDiv.classList.toggle('active');
                    saveState();
                };

                const funcList = document.createElement('ul');
                funcList.className = 'func-list';

                functions.forEach((func) => {
                    // Percentage structure: Name, Purpose, Return value, Syntax, Examples
                    const [fName, fPurpose, fReturn, fSyntax, fExample] = func;
                    const fId = fName.toLowerCase().replace(/[^a-z0-9]/g, '-');
                    const isMastered = masteryData.includes(fId);

                    const funcItem = document.createElement('li');
                    funcItem.className = `func-item ${isMastered ? 'is-mastered' : ''}`;
                    funcItem.dataset.funcName = fName.toLowerCase();
                    funcItem.dataset.funcDesc = fPurpose.toLowerCase();

                    const funcHeader = document.createElement('div');
                    funcHeader.className = 'func-header';
                    const headerLeft = document.createElement('div');
                    headerLeft.className = 'func-header-left';
                    headerLeft.innerHTML = `<span>${fName}</span> <span class="badge-icon" title="Mastered">⭐</span>`;
                    funcHeader.appendChild(headerLeft);
                    funcHeader.onclick = () => funcItem.classList.toggle('active');

                    const funcDetails = document.createElement('div');
                    funcDetails.className = 'func-details';
                    
                    const safeSyntax = highlightSyntax(fSyntax);
                    const safeExample = highlightSyntax(fExample);
                    
                    // Pre-calculate escaped strings for the inline copy handler to prevent newline errors
                    const copySyntaxStr = fSyntax.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
                    const copyExampleStr = fExample.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');

                    funcDetails.innerHTML = `
                        <div class="detail-section">
                            <h4>Purpose</h4>
                            <p>${fPurpose}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Return value</h4>
                            <p>${fReturn}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Syntax</h4>
                            <div class="code-wrapper">
                                <code class="code-block" onclick="this.classList.add('revealed')">${safeSyntax}</code>
                                <button type="button" class="btn-copy" onclick="event.stopPropagation(); copyToClipboard('${copySyntaxStr}', this)">📋 Copy</button>
                            </div>
                        </div>
                        <div class="detail-section">
                            <h4>Examples</h4>
                            <div class="code-wrapper">
                                <code class="code-block" onclick="this.classList.add('revealed')">${safeExample}</code>
                                <button type="button" class="btn-copy" onclick="event.stopPropagation(); copyToClipboard('${copyExampleStr}', this)">📋 Copy</button>
                            </div>
                        </div>
                    `;

                    const masteryActionDiv = document.createElement('div');
                    masteryActionDiv.className = 'mastery-action';
                    const masteryBtn = document.createElement('button');
                    masteryBtn.className = `btn-mastery ${isMastered ? 'mastered' : ''}`;
                    masteryBtn.innerHTML = isMastered ? `⭐ Mastered (+${XP_PER_MASTERY} XP)` : `Mark as Mastered (+${XP_PER_MASTERY} XP)`;
                    masteryBtn.onclick = (e) => {
                        e.stopPropagation(); 
                        toggleMastery(fId, masteryBtn, funcItem, e);
                    };
                    masteryActionDiv.appendChild(masteryBtn);
                    funcDetails.appendChild(masteryActionDiv);

                    funcItem.appendChild(funcHeader);
                    funcItem.appendChild(funcDetails);
                    funcList.appendChild(funcItem);
                });

                catDiv.appendChild(catHeader);
                catDiv.appendChild(funcList);
                container.appendChild(catDiv);
            });

            updateGamificationDashboard();
        }

        // --- SEARCH FILTER ---
        function filterUI() {
            const query = searchInput.value.toLowerCase().trim();
            const categories = document.querySelectorAll('.category-block');

            categories.forEach(cat => {
                let hasVisibleItems = false;
                const items = cat.querySelectorAll('.func-item');

                items.forEach(item => {
                    const fName = item.dataset.funcName;
                    const fDesc = item.dataset.funcDesc;
                    
                    if (fName.includes(query) || fDesc.includes(query)) {
                        item.style.display = 'block';
                        hasVisibleItems = true;
                        if(query.length > 2) item.classList.add('active');
                    } else {
                        item.style.display = 'none';
                        item.classList.remove('active');
                    }
                });

                if (hasVisibleItems) {
                    cat.style.display = 'block';
                    if(query.length > 0) cat.classList.add('active');
                } else {
                    cat.style.display = 'none';
                }
            });
            saveState();
        }

        // Listeners
        searchInput.addEventListener('input', filterUI);
        practiceToggle.addEventListener('change', applyPracticeMode);

        // Keyboard Shortcut for Search
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderUI();
            
            const savedSearch = localStorage.getItem(STORAGE_KEY_SEARCH);
            if (savedSearch) searchInput.value = savedSearch;
            
            const savedPractice = localStorage.getItem(STORAGE_KEY_PRACTICE);
            if (savedPractice === 'true') {
                practiceToggle.checked = true;
                applyPracticeMode();
            }

            filterUI();
        });
    </script>
</body>
</html>
