<!DOCTYPE html>
<!-- Category: Math Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO & Technical Metadata -->
    <title>Rounding Calculator</title>
    <meta name="description" content="Free online Rounding Calculator by toolshub365.com. Round numbers to nearest integers, decimals, tens, or hundreds using standard, floor, or ceiling modes.">
    <meta name="keywords" content="Rounding Calculator, Round Numbers, Round Decimals, Round to Nearest 10, Round to Nearest 100, Math Tool, toolshub365, Significant Figures">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/rounding-calculator">
    
    <!-- JSON-LD for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Rounding Calculator",
      "operatingSystem": "Any",
      "applicationCategory": "MathApplication",
      "offer": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "A responsive mathematical tool to round numbers to specific precisions using various rounding modes."
    }
    </script>

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #20bf6b; /* Green shade */
            --primary-hover: #0fb9b1;
            --header-bg: #2d3436;
            --header-text: #ffffff;
            --bg-color: #f1f2f6;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --border-color: #d1d8e0;
            --input-bg: #f5f6fa;
            --result-bg: #e6ffea;
            --result-border: #20bf6b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Space for fixed header */
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Calculator Card */
        .calculator-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            padding: 30px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Input Section */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color);
            font-size: 0.95rem;
        }

        input[type="number"], select {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.1rem;
            background-color: var(--input-bg);
            transition: all 0.3s ease;
            color: var(--text-color);
            appearance: none; /* Removes native UI for selects */
        }

        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23333%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(32, 191, 107, 0.15);
        }

        /* Buttons */
        .btn-controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
        }

        .btn-clear {
            background-color: #ff7675;
            color: white;
        }

        .btn-clear:hover {
            background-color: #d63031;
        }

        /* Result Area */
        .result-box {
            margin-top: 30px;
            padding: 25px;
            background-color: var(--result-bg);
            border-left: 6px solid var(--result-border);
            border-radius: 4px;
            display: none; /* Hidden by default */
            animation: fadeIn 0.3s ease-out;
            text-align: center;
        }

        .result-label {
            font-size: 0.9rem;
            color: #218c74;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #218c74;
            margin: 10px 0;
            word-break: break-all;
        }

        .error-msg {
            color: #d63031;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;
                padding: 0; /* Remove blank space */
                margin: 0;
            }

            .calculator-card {
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
                border: none;
                min-height: calc(100vh - 50px);
                padding: 25px 20px;
                display: flex;
                flex-direction: column;
            }

            .btn-controls {
                flex-direction: column;
            }

            .form-group {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        Rounding Calculator
    </header>

    <div class="container">
        <div class="calculator-card">
            
            <div class="form-group">
                <label for="inputNumber">Number to Round</label>
                <input type="number" id="inputNumber" placeholder="e.g. 123.456" step="any" oninput="autoSave()">
            </div>

            <div class="form-group">
                <label for="roundingMode">Rounding Mode</label>
                <select id="roundingMode" onchange="autoSave()">
                    <option value="standard">Standard (Round Half Up)</option>
                    <option value="ceil">Round Up (Ceiling)</option>
                    <option value="floor">Round Down (Floor)</option>
                    <option value="truncate">Truncate (Remove decimals)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="precision">Round To</label>
                <select id="precision" onchange="autoSave()">
                    <option value="0">Nearest Integer (Ones)</option>
                    <option value="1">Tenths (1 decimal place)</option>
                    <option value="2">Hundredths (2 decimal places)</option>
                    <option value="3">Thousandths (3 decimal places)</option>
                    <option value="4">4 Decimal Places</option>
                    <option value="5">5 Decimal Places</option>
                    <option value="6">6 Decimal Places</option>
                    <option value="-1">Nearest 10 (Tens)</option>
                    <option value="-2">Nearest 100 (Hundreds)</option>
                    <option value="-3">Nearest 1000 (Thousands)</option>
                    <option value="-6">Nearest Million</option>
                </select>
            </div>

            <div class="error-msg" id="errorDisplay">Please enter a valid number.</div>

            <div class="btn-controls">
                <button class="btn-calc" onclick="calculateRounding()">Calculate</button>
                <button class="btn-clear" onclick="clearData()">Clear</button>
            </div>

            <div class="result-box" id="resultBox">
                <div class="result-label">Rounded Result</div>
                <div class="result-value" id="resultValue">0</div>
            </div>

        </div>
    </div>

    <script>
        const STORAGE_KEY = 'toolshub365_rounding_calc';
        
        // DOM Elements
        const elInput = document.getElementById('inputNumber');
        const elMode = document.getElementById('roundingMode');
        const elPrecision = document.getElementById('precision');
        const elResultBox = document.getElementById('resultBox');
        const elResultValue = document.getElementById('resultValue');
        const elError = document.getElementById('errorDisplay');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        function calculateRounding() {
            const val = parseFloat(elInput.value);
            const mode = elMode.value;
            // Precision value represents power of 10 for decimals
            // e.g., 2 means 2 decimal places (multiply by 100)
            // -2 means nearest 100 (multiply by 0.01)
            const precision = parseInt(elPrecision.value);

            // Validation
            if (isNaN(val)) {
                showError("Please enter a valid number.");
                return;
            }

            elError.style.display = 'none';

            let result;
            const factor = Math.pow(10, precision);

            try {
                // To avoid floating point issues (e.g. 1.005 * 100 = 100.49999), 
                // we use a small epsilon adjustment for standard rounding or specific logic.
                // However, for a general calculator, the standard approach is usually:
                // result = Op(val * factor) / factor

                switch (mode) {
                    case 'standard':
                        // Math.round handles the 0.5 case by rounding to nearest integer towards +Infinity
                        result = Math.round(val * factor) / factor;
                        break;
                    case 'ceil':
                        result = Math.ceil(val * factor) / factor;
                        break;
                    case 'floor':
                        result = Math.floor(val * factor) / factor;
                        break;
                    case 'truncate':
                        // Math.trunc removes fractional digits
                        result = Math.trunc(val * factor) / factor;
                        break;
                    default:
                        result = Math.round(val * factor) / factor;
                }

                // Force formatting for decimal places if precision > 0
                // This ensures "Round to 2 decimals" of 1.5 shows "1.50"
                if (precision > 0) {
                    elResultValue.innerText = result.toFixed(precision);
                } else {
                    elResultValue.innerText = result;
                }
                
                elResultBox.style.display = 'block';
                saveData(true);

            } catch (e) {
                showError("Calculation Error");
            }
        }

        function showError(msg) {
            elError.innerText = msg;
            elError.style.display = 'block';
            elResultBox.style.display = 'none';
        }

        // --- Local Storage Functions ---

        function autoSave() {
            // Save as input changes, do not flag result as visible immediately to avoid flickering logic
            // unless user specifically clicks Calculate. However, we can keep the calculated state 
            // if it was already calculated? For simplicity, we just save inputs.
            saveData(false);
            elError.style.display = 'none';
        }

        function saveData(showResult = false) {
            const data = {
                number: elInput.value,
                mode: elMode.value,
                precision: elPrecision.value,
                hasResult: showResult || (elResultBox.style.display === 'block')
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.number !== undefined) elInput.value = data.number;
                    if (data.mode !== undefined) elMode.value = data.mode;
                    if (data.precision !== undefined) elPrecision.value = data.precision;
                    
                    if (data.hasResult && data.number) {
                        calculateRounding();
                    }
                } catch (e) {
                    console.error("Error loading data");
                }
            }
        }

        function clearData() {
            if(confirm("Are you sure you want to clear all data?")) {
                localStorage.removeItem(STORAGE_KEY);
                elInput.value = '';
                elMode.value = 'standard';
                elPrecision.value = '0';
                elResultBox.style.display = 'none';
                elError.style.display = 'none';
            }
        }
    </script>
</body>
</html>
