<!DOCTYPE html>
<!-- Category: Fitness and Health Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Type Calculator</title>
    
    <!-- SEO & Technical Metadata -->
    <meta name="description" content="Free Body Type Calculator. Discover your body shape (Hourglass, Pear, Apple, Rectangle) based on your bust, waist, and hip measurements. Auto-saves results.">
    <meta name="keywords" content="Body Type Calculator, Body Shape Calculator, Figure Calculator, Hourglass Calculator, Pear Shape, Body Measurements, toolshub365">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/body-type-calculator">

    <!-- Structured Data for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Body Type Calculator",
      "operatingSystem": "Any",
      "applicationCategory": "HealthApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "Calculate body shape classification based on bust, waist, and hip measurements."
    }
    </script>

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #7c3aed; /* Violet */
            --primary-dark: #6d28d9;
            --accent-color: #f5f3ff;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-light: #6b7280;
            --header-height: 50px;
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
            line-height: var(--header-height);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Tool Wrapper */
        .tool-wrapper {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
            border-top: 4px solid var(--primary-dark);
        }

        /* Input Section */
        .input-section {
            flex: 1;
            padding: 30px;
            min-width: 320px;
            border-right: 1px solid #e5e7eb;
        }

        /* Result Section */
        .result-section {
            flex: 1;
            padding: 30px;
            min-width: 320px;
            background-color: #fdf4ff; /* Light violet tint */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #fff;
        }

        input[type="number"]:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        }

        /* Toggle Buttons */
        .toggle-group {
            display: flex;
            background: #e5e7eb;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: white;
            color: var(--primary-color);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .gender-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: 500;
        }

        .radio-label input {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            accent-color: var(--primary-color);
        }

        /* Buttons */
        .btn-clear {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-clear:hover {
            background-color: #dc2626;
        }

        /* Result Cards */
        .result-card {
            background: white;
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(124, 58, 237, 0.1);
        }

        .shape-title {
            color: var(--primary-dark);
            font-size: 1rem;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .shape-result {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.1;
        }

        .shape-desc {
            font-size: 0.95rem;
            color: var(--text-light);
            margin-top: 15px;
            line-height: 1.5;
        }

        .whr-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e5e7eb;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                padding: 0;
                width: 100%;
                margin-top: 10px;
            }
            
            .tool-wrapper {
                box-shadow: none;
                border-radius: 0;
                flex-direction: column;
                border-top: none;
            }

            .input-section {
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
                padding: 20px;
            }

            .result-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Body Type Calculator</h1>
    </header>

    <div class="container">
        <div class="tool-wrapper">
            
            <!-- Inputs -->
            <div class="input-section">
                
                <div class="form-group">
                    <label>Gender</label>
                    <div class="gender-group">
                        <label class="radio-label">
                            <input type="radio" name="gender" value="female" checked onchange="calculate()"> Female
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="gender" value="male" onchange="calculate()"> Male
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Measurement Unit</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" id="btn-metric" onclick="setUnit('metric')">Metric (cm)</button>
                        <button class="toggle-btn" id="btn-imperial" onclick="setUnit('imperial')">Imperial (in)</button>
                    </div>
                </div>

                <!-- Input Fields -->
                <div class="form-group">
                    <label>Bust / Chest</label>
                    <input type="number" id="bust" placeholder="Fullest point" oninput="calculate()">
                </div>

                <div class="form-group">
                    <label>Waist</label>
                    <input type="number" id="waist" placeholder="Narrowest point" oninput="calculate()">
                </div>

                <div class="form-group">
                    <label>Hips</label>
                    <input type="number" id="hips" placeholder="Widest point" oninput="calculate()">
                </div>

                <!-- Optional High Hip for better accuracy? Keeping it simple for standard UX -->
                
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <!-- Results -->
            <div class="result-section">
                
                <div class="result-card">
                    <div class="shape-title">Your Body Shape</div>
                    <div class="shape-result" id="res-shape">--</div>
                    <div class="shape-desc" id="res-desc">
                        Please enter your measurements to determine your body shape classification.
                    </div>
                </div>

                <div class="whr-box">
                    <div style="font-size: 0.85rem; color: #6b7280; text-transform: uppercase;">Waist-to-Hip Ratio</div>
                    <div style="font-size: 1.5rem; font-weight: 700; color: var(--primary-color);" id="res-whr">--</div>
                </div>

                <p style="margin-top: 20px; font-size: 0.8rem; color: #9ca3af; text-align: center;">
                    *Results are estimates based on standard anthropometric ratios.
                </p>

            </div>

        </div>
    </div>

    <script>
        let currentUnit = 'metric';

        document.addEventListener('DOMContentLoaded', () => {
            loadSavedData();
        });

        function setUnit(unit) {
            currentUnit = unit;
            document.getElementById('btn-metric').className = unit === 'metric' ? 'toggle-btn active' : 'toggle-btn';
            document.getElementById('btn-imperial').className = unit === 'imperial' ? 'toggle-btn active' : 'toggle-btn';
            
            // Adjust placeholders based on unit
            const suffix = unit === 'metric' ? ' (cm)' : ' (in)';
            document.querySelector('label[for="bust"] ~ input').placeholder = "Fullest point" + suffix;
            document.querySelector('label[for="waist"] ~ input').placeholder = "Narrowest point" + suffix;
            document.querySelector('label[for="hips"] ~ input').placeholder = "Widest point" + suffix;

            localStorage.setItem('btc_unit', unit);
            calculate();
        }

        function calculate() {
            let bust = parseFloat(document.getElementById('bust').value);
            let waist = parseFloat(document.getElementById('waist').value);
            let hips = parseFloat(document.getElementById('hips').value);
            const gender = document.querySelector('input[name="gender"]:checked').value;

            if (!bust || !waist || !hips) {
                resetResults();
                return;
            }

            // Save Inputs
            saveData(bust, waist, hips, gender);

            // Calculate WHR
            const whr = waist / hips;
            document.getElementById('res-whr').textContent = whr.toFixed(2);

            let shape = "Unknown";
            let desc = "";

            // Logic Logic Logic
            // Note: Ratios are generally unit-independent, but difference thresholds depend on units.
            // Let's normalize everything to inches for the logic comparison if using difference thresholds.
            // Or use ratios.
            
            // Converting to inches for standard difference logic if in metric
            let bustIn = bust;
            let waistIn = waist;
            let hipsIn = hips;

            if (currentUnit === 'metric') {
                bustIn = bust / 2.54;
                waistIn = waist / 2.54;
                hipsIn = hips / 2.54;
            }

            // Calculate differences
            const bustHipsDiff = bustIn - hipsIn;
            const hipsBustDiff = hipsIn - bustIn;
            const bustWaistDiff = bustIn - waistIn;
            const hipsWaistDiff = hipsIn - waistIn;

            if (gender === 'female') {
                // Female Logic (Standard 4 shapes)
                
                // Hourglass: Bust and Hips similar, Waist significantly smaller
                // (Bust - Hips) <= 1" AND (Hips - Bust) < 3.6" AND (Bust - Waist) >= 9" OR (Hips - Waist) >= 10"
                if (Math.abs(bustHipsDiff) <= 1 && (bustWaistDiff >= 9 || hipsWaistDiff >= 10)) {
                    shape = "Hourglass";
                    desc = "Your bust and hips are approximately the same width, and you have a well-defined waist.";
                }
                // Bottom Hourglass: Hips > Bust, Waist defined
                else if (hipsBustDiff >= 3.6 && hipsBustDiff < 10 && hipsWaistDiff >= 9 && bustWaistDiff < 9) {
                    shape = "Bottom Hourglass"; // Often grouped with Pear or Hourglass
                    desc = "Your hips are slightly larger than your bust, with a defined waist.";
                }
                // Top Hourglass: Bust > Hips, Waist defined
                else if (bustHipsDiff > 1 && bustHipsDiff < 10 && bustWaistDiff >= 9 && hipsWaistDiff < 9) {
                    shape = "Top Hourglass"; // Often grouped with Inverted Triangle or Hourglass
                    desc = "Your bust is larger than your hips, with a defined waist.";
                }
                // Spoon / Pear (Triangle): Hips significantly larger than bust
                else if (hipsBustDiff >= 2) {
                    shape = "Pear (Triangle)";
                    desc = "Your hips are wider than your bust. You likely carry weight in your hips and thighs.";
                }
                // Inverted Triangle (Apple-ish features): Bust significantly larger than hips
                else if (bustHipsDiff >= 3.6) {
                    shape = "Inverted Triangle";
                    desc = "Your shoulders or bust are broader than your hips. You likely have an athletic build.";
                }
                // Rectangle (Banana): Bust, Waist, Hips relatively similar
                else if ((bustHipsDiff < 3.6 && hipsBustDiff < 3.6) && (bustWaistDiff < 9 && hipsWaistDiff < 10)) {
                    shape = "Rectangle";
                    desc = "Your bust, waist, and hips are fairly uniform in width. You have an athletic or straight silhouette.";
                }
                // Apple (Oval): Waist larger than Bust/Hips or High WHR
                // Often defined by WHR > 0.85
                if (whr > 0.85 && shape !== "Inverted Triangle") {
                    // Check if waist is actually the largest measurement or close to it
                    if (waistIn > bustIn * 0.95 && waistIn > hipsIn * 0.95) {
                        shape = "Apple (Oval)";
                        desc = "Your waist is wider than or equal to your hips and bust. You likely carry weight around your midsection.";
                    }
                }
                
                // Fallback for edge cases
                if (shape === "Unknown") {
                     if (hipsIn > bustIn) shape = "Pear (Triangle)";
                     else if (bustIn > hipsIn) shape = "Inverted Triangle";
                     else shape = "Rectangle";
                     desc = "Based on your measurements, this is the closest approximation.";
                }

            } else {
                // Male Logic (Simpler)
                // Inverted Triangle (Ideal V): Shoulders/Chest > Waist significantly
                // Rectangle: Chest approx Waist
                // Triangle: Waist > Chest
                
                // Using WHR and Chest-Waist diff
                if (whr > 1.0) {
                    shape = "Oval / Apple";
                    desc = "Your waist is larger than your hips. You likely carry weight in the midsection.";
                } else if (bustIn - waistIn >= 4) { // Chest broader than waist
                    shape = "Inverted Triangle";
                    desc = "Your chest and shoulders are significantly broader than your waist (V-Shape).";
                } else if (Math.abs(bustIn - waistIn) < 4) {
                    shape = "Rectangle";
                    desc = "Your chest and waist are roughly the same width.";
                } else if (waistIn > bustIn) {
                    shape = "Triangle";
                    desc = "Your waist is wider than your chest.";
                }
            }

            document.getElementById('res-shape').textContent = shape;
            document.getElementById('res-desc').textContent = desc;
        }

        function resetResults() {
            document.getElementById('res-shape').textContent = "--";
            document.getElementById('res-desc').textContent = "Please enter your measurements to determine your body shape classification.";
            document.getElementById('res-whr').textContent = "--";
        }

        // Local Storage
        function saveData(b, w, h, g) {
            localStorage.setItem('btc_bust', b);
            localStorage.setItem('btc_waist', w);
            localStorage.setItem('btc_hips', h);
            localStorage.setItem('btc_gender', g);
        }

        function loadSavedData() {
            const unit = localStorage.getItem('btc_unit') || 'metric';
            setUnit(unit);

            const b = localStorage.getItem('btc_bust');
            const w = localStorage.getItem('btc_waist');
            const h = localStorage.getItem('btc_hips');
            const g = localStorage.getItem('btc_gender');

            if (b) document.getElementById('bust').value = b;
            if (w) document.getElementById('waist').value = w;
            if (h) document.getElementById('hips').value = h;
            if (g) {
                const el = document.querySelector(`input[name="gender"][value="${g}"]`);
                if(el) el.checked = true;
            }

            if (b && w && h) calculate();
        }

        function clearData() {
            localStorage.clear();
            document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
            document.querySelector('input[name="gender"][value="female"]').checked = true;
            setUnit('metric');
            resetResults();
        }
    </script>
</body>
</html>
