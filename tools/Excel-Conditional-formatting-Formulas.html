                ["INDIRECT", "Evaluates text as a cell reference for rule generation.", "TRUE/FALSE logic.", "=INDIRECT(\"A\"&ROW())>50", "=INDIRECT(\"Sheet2!A\"&ROW())=$B1", "=SUM(INDIRECT(\"B1:B10\"))"],
                ["SUBTOTAL", "Highlights visible cells only after filters are applied.", "TRUE/FALSE evaluation.", "=$B1>SUBTOTAL(1, $B$2:$B$100)", "=$C2=SUBTOTAL(4, $C$2:$C$50)", "=SUBTOTAL(9, A1:A10)"],
                ["AGGREGATE", "Advanced subtotaling ignoring errors/hidden rows for CF limits.", "TRUE/FALSE evaluation.", "=$B1>AGGREGATE(1, 7, $B$2:$B$100)", "=$D2=AGGREGATE(4, 5, $D$2:$D$50)", "=AGGREGATE(9, 6, A1:A10)"],
                ["FORMULATEXT", "Highlights cells based on inspecting the underlying formula string.", "TRUE/FALSE via text search.", "=ISNUMBER(SEARCH(\"VLOOKUP\", FORMULATEXT($A1)))", "=ISNUMBER(FIND(\"+\", FORMULATEXT($B2)))", "=SUM(IF(ISNUMBER(SEARCH(\"SUM\", FORMULATEXT(A1:A10))), 1, 0))"]
            ]],
            ["🔥 Bonus Conditional Formatting Uses", [
                ["Duplicate Highlight (COUNTIF)", "Finds items appearing more than once in a range.", "TRUE if count > 1.", "=COUNTIF($A$1:$A$100, $A1)>1", "=COUNTIF($B:$B, $B2)>1", "=SUM(IF(COUNTIF(A:A, A1:A10)>1, B1:B10, 0))"],
                ["Unique Values (COUNTIF)", "Finds items appearing exactly once in a range.", "TRUE if count = 1.", "=COUNTIF($A$1:$A$100, $A1)=1", "=COUNTIF($C:$C, $C2)=1", "=SUM(IF(COUNTIF(A:A, A1:A10)=1, B1:B10, 0))"],
                ["Top/Bottom Values (LARGE/SMALL)", "Dynamic Top N or Bottom N styling via CF formula.", "TRUE/FALSE threshold comparison.", "=$A1>=LARGE($A$1:$A$100, 10)", "=$B1<=SMALL($B$1:$B$100, 5)", "=SUM(IF(A1:A10>=LARGE(A1:A10, 10), B1:B10, 0))"],
                ["Above/Below Average (AVERAGE)", "Highlights statistical variance from the overall mean.", "TRUE/FALSE mean comparison.", "=$A1>AVERAGE($A$1:$A$100)", "=$C2<AVERAGE($C$2:$C$500)", "=SUM(IF(A1:A10>AVERAGE(A1:A10), B1:B10, 0))"],
                ["Alternate Row Highlight (MOD + ROW)", "Zebra striping rows automatically for extreme readability.", "TRUE if row is evenly divisible.", "=MOD(ROW(), 2)=0", "=MOD(ROW(), 2)=1", "=SUMPRODUCT((MOD(ROW(A1:A10),2)=0)*A1:A10)"]
            ]]
        ];

        const container = document.getElementById('dataContainer');
        const searchInput = document.getElementById('searchInput');

        // Render Data into DOM
        function renderUI() {
            container.innerHTML = '';
            
            excelData.forEach((category, catIndex) => {
                const catName = category[0];
                const functions = category[1];

                // Create Category Block
                const catDiv = document.createElement('div');
                catDiv.className = 'category-block active'; // Default open initially to populate layout
                catDiv.dataset.catName = catName.toLowerCase();

                // Header
                const catHeader = document.createElement('div');
                catHeader.className = 'category-header';
                catHeader.textContent = catName;
                catHeader.onclick = () => {
                    catDiv.classList.toggle('active');
                };

                // Function List
                const funcList = document.createElement('ul');
                funcList.className = 'func-list';

                functions.forEach((func, funcIndex) => {
                    const [fName, fPurpose, fReturn, fSyntax, fExample, fSum] = func;

                    const funcItem = document.createElement('li');
                    funcItem.className = 'func-item';
                    funcItem.dataset.funcName = fName.toLowerCase();
                    funcItem.dataset.funcDesc = fPurpose.toLowerCase();

                    // Func Header wrapper
                    const funcHeader = document.createElement('div');
                    funcHeader.className = 'func-header';
                    funcHeader.textContent = fName;

                    funcHeader.onclick = () => {
                        funcItem.classList.toggle('active');
                    };

                    // Func Details
                    const funcDetails = document.createElement('div');
                    funcDetails.className = 'func-details';
                    
                    // Escape < and > to prevent HTML rendering breakage in code blocks
                    const safeSyntax = fSyntax.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    const safeExample = fExample.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    const safeSum = fSum.replace(/</g, "&lt;").replace(/>/g, "&gt;");

                    funcDetails.innerHTML = `
                        <div class="detail-section">
                            <h4>Purpose</h4>
                            <p>${fPurpose}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Return value</h4>
                            <p>${fReturn}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Syntax</h4>
                            <code>${safeSyntax}</code>
                        </div>
                        <div class="detail-section">
                            <h4>Examples</h4>
                            <code>${safeExample}</code>
                        </div>
                        <div class="detail-section">
                            <h4>Using the SUM function</h4>
                            <code>${safeSum}</code>
                        </div>
                    `;

                    funcItem.appendChild(funcHeader);
                    funcItem.appendChild(funcDetails);
                    funcList.appendChild(funcItem);
                });

                catDiv.appendChild(catHeader);
                catDiv.appendChild(funcList);
                container.appendChild(catDiv);
            });
        }

        // Live Search/Filter functionality
        function filterUI() {
            const query = searchInput.value.toLowerCase().trim();
            const categories = document.querySelectorAll('.category-block');

            categories.forEach(cat => {
                let hasVisibleItems = false;
                const items = cat.querySelectorAll('.func-item');

                items.forEach(item => {
                    const fName = item.dataset.funcName;
                    const fDesc = item.dataset.funcDesc;
                    
                    if (fName.includes(query) || fDesc.includes(query)) {
                        item.style.display = 'block';
                        hasVisibleItems = true;
                        // Auto-expand item if query is descriptive enough
                        if(query.length > 2) {
                            item.classList.add('active');
                        }
                    } else {
                        item.style.display = 'none';
                        item.classList.remove('active');
                    }
                });

                if (hasVisibleItems) {
                    cat.style.display = 'block';
                    if(query.length > 0) cat.classList.add('active');
                } else {
                    cat.style.display = 'none';
                }
            });
        }

        searchInput.addEventListener('input', filterUI);

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            renderUI();
            // Start with only the first category open for a clean UI upon loading
            const cats = document.querySelectorAll('.category-block');
            cats.forEach((cat, index) => {
                if(index !== 0) cat.classList.remove('active');
            });
        });
    </script>
</body>
</html>
