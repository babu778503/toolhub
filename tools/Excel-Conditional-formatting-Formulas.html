    <style>

            --syn-fn: #0000ff;

            margin: 0;
            padding: 0;
        }

        body {

            color: var(--text-main);

            left: 0;

            justify-content: center;

        header h1 {

            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;

        /* Desktop Container */
        .container {

            margin: 0 auto;
            padding: 20px;
        }

        .game-dashboard {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
            transition: all 0.3s;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .game-stats {
            display: flex;
            gap: 15px;
            align-items: center;

            color: white;

            font-weight: bold;

        .control-group {

            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-main);
        }

        .quiz-option-btn:hover:not(:disabled) {

            border-color: var(--excel-green);
        }

        .quiz-option-btn:disabled {

            background: var(--correct-bg);
            border-color: var(--correct-border);

        .search-input:focus {
            border-color: var(--excel-green);

        .category-block {

            border: 1px solid var(--border-color);
            border-radius: 8px;

            overflow: hidden;

            cursor: pointer;
            font-size: 1.15rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: filter 0.2s;
        }

        .category-header:hover {
            filter: brightness(0.95);
        }

        .category-header::after {
            content: '▼';
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: transform 0.3s;
        }

        .category-block.active .category-header::after {
            transform: rotate(-180deg);
        }

        .func-list {
            display: none;
            list-style: none;
        }

            display: block;

            font-weight: 600;
            color: var(--excel-green);
            background: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background 0.2s;
        }

        .func-header:hover {
            background: var(--bg-color);
        }

        .func-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge-icon {
            font-size: 1rem;
            display: none;
        }
        
        .func-item.is-mastered .badge-icon {
            display: inline-block;
        }

        .func-header::after {
            content: '+';
            font-size: 1.3rem;
            color: var(--excel-green);
            font-weight: bold;
        }

        .func-item.active .func-header::after {
            content: '-';
        }

        /* Function Details */
        .func-details {
            display: none;
            padding: 20px;
            background: var(--card-bg);
            position: relative;
        }

        .func-item.active .func-details {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        .detail-section {
            margin-bottom: 18px;
        }

        .detail-section h4 {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-main);
        }

        /* Syntax Highlighting & Code Blocks */
        .code-wrapper {
            position: relative;
        }

        .code-block {
            display: block;
            background: var(--code-bg);
            color: var(--code-color);
            padding: 12px 15px;
            border-radius: 6px;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 0.95rem;
            border-left: 4px solid var(--excel-green);
            word-wrap: break-word;
            transition: filter 0.3s, background 0.3s;
        }

        .btn-copy {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            z-index: 10;
        }

        .code-wrapper:hover .btn-copy {
            opacity: 1;
        }

        .btn-copy:hover {
            background: var(--btn-hover);
            color: var(--text-main);
        }

        .syn-fn { color: var(--syn-fn); font-weight: bold; }
        .syn-str { color: var(--syn-str); }
        .syn-ref { color: var(--syn-ref); }

        /* Practice Mode Logic */
        body.practice-mode-active .code-block {
            filter: blur(6px);
            cursor: pointer;
            user-select: none;
        }
        
        body.practice-mode-active .code-wrapper::after {
            content: "Click to reveal 👀";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            text-shadow: 0 0 5px var(--card-bg);
            pointer-events: none;
            opacity: 1;
        }

        body.practice-mode-active .code-block.revealed {
            filter: none;
            cursor: text;
            user-select: auto;
        }
        
        body.practice-mode-active .code-block.revealed + .btn-copy,
        body.practice-mode-active .code-wrapper:has(.revealed)::after {
            display: none;
        }

        /* Mastery Button */
        .mastery-action {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
            display: flex;
            justify-content: flex-end;
        }

        .btn-mastery {
            padding: 10px 18px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-muted);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-mastery:hover {
            background: var(--btn-hover);
            border-color: var(--excel-green);
        }

        .btn-mastery.mastered {
            background: var(--gold-light);
            border-color: var(--gold);
            color: #b38100;
        }

        /* Confetti Animation */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 9999;
            animation: fall 1.5s ease-out forwards;
        }
        
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(150px) rotate(360deg) scale(0.5); opacity: 0; }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 10px 0 0 0;
            }
            .game-dashboard, .quiz-section {
                border-radius: 0;
                border-left: none;
                border-right: none;
                margin-bottom: 10px;
            }
            .quiz-section {
                border-left: 4px solid var(--gold);
            }
            .game-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .search-wrapper {
                padding: 0 10px 10px 10px;
            }
            .category-block {
                border-radius: 0;
                border-left: none;
                border-right: none;
                margin-bottom: 8px;
            }
            .btn-copy { opacity: 1; }
        }
    </style>
</head>

    <script>
        // --- DATA SETUP ---
        const excelData = [
            ["Core Conditional Formatting Functions", [
                ["IF", "Evaluates a logical test to determine if formatting should be applied.", "TRUE or FALSE.", "=IF(logical_test, TRUE, FALSE)", "=IF($A1>100, TRUE, FALSE)", "=SUM(IF(A1:A10>100, B1:B10, 0))"],
                ["AND", "Checks if multiple conditions are met to trigger formatting.", "TRUE only if ALL conditions are met.", "=AND(cond1, cond2, ...)", "=AND($A1>50, $B1=\"Yes\")", "=SUM(IF(AND(A1>50, B1=\"Yes\"), C1:C10, 0))"],
                ["OR", "Checks if at least one condition is met to trigger formatting.", "TRUE if ANY condition is met.", "=OR(cond1, cond2, ...)", "=OR($A1=\"Urgent\", $A1=\"High\")", "=SUM(IF(OR(A1=\"Urgent\", A1=\"High\"), B1:B10, 0))"],
                ["NOT", "Reverses logical value, highlighting cells that do NOT meet criteria.", "TRUE if the condition is FALSE.", "=NOT(condition)", "=NOT($A1=\"Completed\")", "=SUM(IF(NOT(A1=\"Completed\"), B1:B10, 0))"],
                ["IFS", "Evaluates multiple conditions sequentially for tiered logic.", "TRUE/FALSE based on the first matched condition.", "=IFS(cond1, TRUE, cond2, FALSE)", "=IFS(A1>90, TRUE, A1<50, FALSE)", "=SUM(IFS(A1:A10>90, B1:B10, TRUE, 0))"]
            ]],
            ["✅ Logical & Comparison Functions", [
                ["= (Equal)", "Highlights cells exactly matching a specific value.", "TRUE/FALSE.", "=$A1=\"Target\"", "=$B2=100", "=SUMIF(A1:A10, \"=100\", B1:B10)"],
                ["<> (Not Equal)", "Highlights cells that differ from a specific value.", "TRUE/FALSE.", "=$A1<>\"\"", "=$A2<>\"Draft\"", "=SUMIF(A1:A10, \"<>Draft\", B1:B10)"],
                ["> (Greater Than)", "Highlights cells strictly larger than a given threshold.", "TRUE/FALSE.", "=$A1>50", "=$C2>$D2", "=SUMIF(A1:A10, \">50\", B1:B10)"],
                ["< (Less Than)", "Highlights cells strictly smaller than a given threshold.", "TRUE/FALSE.", "=$A1<0", "=$E2<TODAY()", "=SUMIF(A1:A10, \"<0\", B1:B10)"],
                [">= (Greater/Equal)", "Highlights cells larger than or equal to a threshold.", "TRUE/FALSE.", "=$A1>=100", "=$B2>=$C$1", "=SUMIF(A1:A10, \">=100\", B1:B10)"],
                ["<= (Less/Equal)", "Highlights cells smaller than or equal to a threshold.", "TRUE/FALSE.", "=$A1<=10", "=$A2<=5", "=SUMIF(A1:A10, \"<=10\", B1:B10)"]
            ]],
            ["✅ Ranking & Position-Based", [
                ["SMALL", "Highlights the Nth smallest values within a dataset.", "Numeric threshold comparison.", "=A1<=SMALL($A$1:$A$100, 5)", "=$B2<=SMALL($B$2:$B$50, 3)", "=SUM(IF(A1:A10<=SMALL(A1:A10,3), B1:B10, 0))"],
                ["LARGE", "Highlights the Nth largest values within a dataset.", "Numeric threshold comparison.", "=A1>=LARGE($A$1:$A$100, 5)", "=$C2>=LARGE($C$2:$C$50, 10)", "=SUM(IF(A1:A10>=LARGE(A1:A10,5), B1:B10, 0))"],
                ["RANK", "Highlights based on a cell's rank compared to others.", "Rank integer comparison.", "=RANK($A1, $A$1:$A$100)<=5", "=RANK($B2, $B$2:$B$100, 0)<=3", "=SUM(IF(RANK(A1:A10, A1:A10)<=5, B1:B10, 0))"],
                ["RANK.EQ", "Modern equivalent of RANK to trigger top/bottom formatting.", "Rank integer comparison.", "=RANK.EQ($A1, $A$1:$A$100)<=5", "=RANK.EQ($C2, $C$2:$C$50)<=1", "=SUM(IF(RANK.EQ(A1:A10, A1:A10)=1, B1:B10, 0))"],
                ["RANK.AVG", "Highlights based on average rank when ties occur.", "Average Rank comparison.", "=RANK.AVG($A1, $A$1:$A$100)<=5", "=RANK.AVG($B2, $B$2:$B$20)<3", "=SUM(IF(RANK.AVG(A1:A10, A1:A10)<3, B1:B10, 0))"]
            ]],

        const btnNextQuestion = document.getElementById('btnNextQuestion');

        // --- STATE & STORAGE ---
        const STORAGE_KEY_SEARCH = 'excelCFFSearchQuery';
        const STORAGE_KEY_OPEN_CATS = 'excelCFFOpenCats';
        const STORAGE_KEY_MASTERY = 'excelCFFMasteryArray';
        const STORAGE_KEY_PRACTICE = 'excelCFFPracticeMode';
        const STORAGE_KEY_QUIZ_CORRECT = 'excelCFFQuizCorrect';

        const TOTAL_FORMULAS = excelData.reduce((acc, cat) => acc + cat[1].length, 0);
        const XP_PER_MASTERY = 10;
        const XP_PER_QUIZ = 5;

        let currentQuizIndex = 0;
        let isQuizActive = false;
        let shuffledQuiz = [];

        function saveState() {
            localStorage.setItem(STORAGE_KEY_SEARCH, searchInput.value);
            const openCats = [];
            document.querySelectorAll('.category-block.active').forEach(cat => {
                openCats.push(cat.dataset.catName);
            });
            localStorage.setItem(STORAGE_KEY_OPEN_CATS, JSON.stringify(openCats));
        }

        // --- VISUAL EFFECTS ---
        function shootConfetti(x, y) {
            const colors = ['#ffb900', '#107c41', '#0078d4', '#e81123'];
            for(let i=0; i<40; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti-piece';
                
                let dx = (Math.random() - 0.5) * 200;
                let dy = (Math.random() - 0.5) * 200;
                
                conf.style.left = x + 'px';
                conf.style.top = y + 'px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                conf.style.setProperty('--dx', `${dx}px`);
                conf.style.setProperty('--dy', `${dy}px`);
                
                conf.style.animation = 'none';
                conf.offsetHeight; 
                conf.style.animation = `scatter ${1 + Math.random()*0.5}s ease-out forwards`;
                
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 1500);
            }
        }
        
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes scatter {
                0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
                100% { transform: translate(var(--dx), calc(var(--dy) + 150px)) rotate(720deg) scale(0); opacity: 0; }
            }
        `;
        document.head.appendChild(styleSheet);

        function highlightSyntax(codeStr) {
            let s = codeStr.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            s = s.replace(/("[^"]*")/g, '<span class="syn-str">$1</span>');
            s = s.replace(/\b([A-Z.0-9_]+)(\()/g, '<span class="syn-fn">$1</span>$2');
            s = s.replace(/\b([$A-Z]{1,4}[0-9]{1,7}(:[$A-Z]{1,4}[0-9]{1,7})?)\b/g, '<span class="syn-ref">$1</span>');
            return s;
        }

        function copyToClipboard(text, btnElement) {
            const onSuccess = () => {
                let oldText = btnElement.innerText;
                if(oldText === "✅ Copied!") return;
                btnElement.innerText = "✅ Copied!";
                btnElement.style.color = "var(--excel-green)";
                setTimeout(() => {
                    btnElement.innerText = "📋 Copy";
                    btnElement.style.color = "";
                }, 2000);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(onSuccess).catch(() => fallbackCopy(text, onSuccess));
            } else {
                fallbackCopy(text, onSuccess);
            }
        }

        function fallbackCopy(text, onSuccess) {
            let textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            textArea.setSelectionRange(0, 99999);
            try {
                let successful = document.execCommand('copy');
                if (successful) onSuccess();
            } catch (err) {
                console.error("Fallback copy failed", err);
            }
            document.body.removeChild(textArea);
        }

        // --- GAMIFICATION LOGIC ---
        function getMasteryData() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY_MASTERY)) || []; } catch (e) { return []; }
        }
        function saveMasteryData(data) { localStorage.setItem(STORAGE_KEY_MASTERY, JSON.stringify(data)); }
        function getQuizCorrect() { return parseInt(localStorage.getItem(STORAGE_KEY_QUIZ_CORRECT)) || 0; }
        function addQuizCorrect(e) {
            let correct = getQuizCorrect() + 1;
            localStorage.setItem(STORAGE_KEY_QUIZ_CORRECT, correct);
            updateGamificationDashboard();
            if(e) shootConfetti(e.clientX, e.clientY);
        }

        function toggleMastery(formulaId, btnElement, liElement, event) {
            let mastery = getMasteryData();
            if (mastery.includes(formulaId)) {
                mastery = mastery.filter(id => id !== formulaId);
                btnElement.classList.remove('mastered');
                btnElement.innerHTML = `Mark as Mastered (+${XP_PER_MASTERY} XP)`;
                liElement.classList.remove('is-mastered');
            } else {
                mastery.push(formulaId);
                btnElement.classList.add('mastered');
                btnElement.innerHTML = `⭐ Mastered (+${XP_PER_MASTERY} XP)`;
                liElement.classList.add('is-mastered');
                shootConfetti(event.clientX, event.clientY);
            }
            saveMasteryData(mastery);
            updateGamificationDashboard();
        }

        function updateGamificationDashboard() {
            const masteryCount = getMasteryData().length;
            const quizCorrect = getQuizCorrect();
            
            const progress = (masteryCount / TOTAL_FORMULAS) * 100;
            const totalXp = (masteryCount * XP_PER_MASTERY) + (quizCorrect * XP_PER_QUIZ);

            masteredCountEl.textContent = masteryCount;
            totalCountEl.textContent = TOTAL_FORMULAS;
            quizScoreDisplay.textContent = quizCorrect;
            gameProgressBar.style.width = `${progress}%`;
            xpDisplay.textContent = `⭐ ${totalXp} XP`;

            let levelText = "Novice";
            if (totalXp >= 800) levelText = "Formatting Grandmaster";
            else if (totalXp >= 400) levelText = "Logic Wizard";
            else if (totalXp >= 150) levelText = "Data Analyst";
            else if (totalXp >= 50) levelText = "Intermediate";

            levelDisplay.textContent = `Rank: ${levelText}`;
        }

        // --- QUIZ LOGIC ---
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        btnToggleQuiz.addEventListener('click', () => {
            if (!isQuizActive) {
                quizContainer.style.display = 'block';
                btnToggleQuiz.textContent = "Close Quiz";
                isQuizActive = true;
                startQuiz();
            } else {
                quizContainer.style.display = 'none';
                btnToggleQuiz.textContent = "Start Practice Quiz";
                isQuizActive = false;
            }
        });

        function startQuiz() {
            shuffledQuiz = shuffleArray([...quizQuestions]);
            currentQuizIndex = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const qData = shuffledQuiz[currentQuizIndex];
            quizQuestion.textContent = `${currentQuizIndex + 1}. ${qData.q}`;
            quizOptions.innerHTML = '';
            quizFeedback.style.display = 'none';
            btnNextQuestion.style.display = 'none';

            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option-btn';
                btn.textContent = opt;
                btn.onclick = (e) => handleAnswer(index, qData.answer, qData.explanation, btn, e);
                quizOptions.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex, correctIndex, explanation, btnClicked, event) {
            const buttons = quizOptions.querySelectorAll('.quiz-option-btn');
            buttons.forEach(btn => btn.disabled = true); 

            quizFeedback.style.display = 'block';

            if (selectedIndex === correctIndex) {
                btnClicked.classList.add('correct');
                quizFeedback.className = 'quiz-feedback success';
                quizFeedback.innerHTML = `<strong>✅ Correct! (+${XP_PER_QUIZ} XP)</strong><br>${explanation}`;
                addQuizCorrect(event); 
            } else {
                btnClicked.classList.add('incorrect');
                buttons[correctIndex].classList.add('correct'); 
                quizFeedback.className = 'quiz-feedback error';
                quizFeedback.innerHTML = `<strong>❌ Incorrect.</strong><br>${explanation}`;
            }

            btnNextQuestion.style.display = 'inline-block';
        }

        btnNextQuestion.addEventListener('click', () => {
            currentQuizIndex++;
            if (currentQuizIndex >= shuffledQuiz.length) {
                shuffledQuiz = shuffleArray([...quizQuestions]);
                currentQuizIndex = 0;
            }
            loadQuestion();
        });

        // --- PRACTICE MODE LOGIC ---
        function applyPracticeMode() {
            const isChecked = practiceToggle.checked;
            localStorage.setItem(STORAGE_KEY_PRACTICE, isChecked);
            if(isChecked) {
                document.body.classList.add('practice-mode-active');
            } else {
                document.body.classList.remove('practice-mode-active');
                document.querySelectorAll('.code-block').forEach(el => el.classList.remove('revealed'));
            }
        }

        // --- RENDER CONTENT ---
        function renderUI() {
            container.innerHTML = '';
            let savedCats = [];
            try { savedCats = JSON.parse(localStorage.getItem(STORAGE_KEY_OPEN_CATS)) || []; } catch (e) {}
            const masteryData = getMasteryData();

            excelData.forEach((category, catIndex) => {
                const catName = category[0];
                const functions = category[1];

                const catDiv = document.createElement('div');
                catDiv.className = 'category-block';
                const catId = catName.toLowerCase().replace(/[^a-z0-9]/g, '-');
                catDiv.dataset.catName = catId;

                if (savedCats.includes(catId) || (savedCats.length === 0 && catIndex === 0)) {
                    catDiv.classList.add('active');
                }

                const catHeader = document.createElement('div');
                catHeader.className = 'category-header';
                catHeader.textContent = catName;
                catHeader.onclick = () => {
                    catDiv.classList.toggle('active');
                    saveState();
                };

                const funcList = document.createElement('ul');
                funcList.className = 'func-list';

                functions.forEach((func) => {
                    const [fName, fPurpose, fReturn, fSyntax, fExample, fSum] = func;
                    const fId = fName.toLowerCase().replace(/[^a-z0-9]/g, '-');
                    const isMastered = masteryData.includes(fId);

                    const funcItem = document.createElement('li');
                    funcItem.className = `func-item ${isMastered ? 'is-mastered' : ''}`;
                    funcItem.dataset.funcName = fName.toLowerCase();
                    funcItem.dataset.funcDesc = fPurpose.toLowerCase();

                    const funcHeader = document.createElement('div');
                    funcHeader.className = 'func-header';
                    const headerLeft = document.createElement('div');
                    headerLeft.className = 'func-header-left';
                    headerLeft.innerHTML = `<span>${fName}</span> <span class="badge-icon" title="Mastered">⭐</span>`;
                    funcHeader.appendChild(headerLeft);
                    funcHeader.onclick = () => funcItem.classList.toggle('active');

                    const funcDetails = document.createElement('div');
                    funcDetails.className = 'func-details';
                    
                    const safeSyntax = highlightSyntax(fSyntax);
                    const safeExample = highlightSyntax(fExample);
                    const safeSum = highlightSyntax(fSum);

                    funcDetails.innerHTML = `
                        <div class="detail-section">
                            <h4>Purpose</h4>
                            <p>${fPurpose}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Condition Return</h4>
                            <p>${fReturn}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Syntax</h4>
                            <div class="code-wrapper">
                                <code class="code-block" onclick="this.classList.add('revealed')">${safeSyntax}</code>
                                <button type="button" class="btn-copy" onclick="event.stopPropagation(); copyToClipboard('${fSyntax.replace(/'/g, "\\'")}', this)">📋 Copy</button>
                            </div>
                        </div>
                        <div class="detail-section">
                            <h4>Formatting Rule Example</h4>
                            <div class="code-wrapper">
                                <code class="code-block" onclick="this.classList.add('revealed')">${safeExample}</code>
                                <button type="button" class="btn-copy" onclick="event.stopPropagation(); copyToClipboard('${fExample.replace(/'/g, "\\'")}', this)">📋 Copy</button>
                            </div>
                        </div>
                        <div class="detail-section">
                            <h4>Standard Formula Context</h4>
                            <div class="code-wrapper">
                                <code class="code-block" onclick="this.classList.add('revealed')">${safeSum}</code>
                                <button type="button" class="btn-copy" onclick="event.stopPropagation(); copyToClipboard('${fSum.replace(/'/g, "\\'")}', this)">📋 Copy</button>
                            </div>
                        </div>
                    `;

                    const masteryActionDiv = document.createElement('div');
                    masteryActionDiv.className = 'mastery-action';
                    const masteryBtn = document.createElement('button');
                    masteryBtn.className = `btn-mastery ${isMastered ? 'mastered' : ''}`;
                    masteryBtn.innerHTML = isMastered ? `⭐ Mastered (+${XP_PER_MASTERY} XP)` : `Mark as Mastered (+${XP_PER_MASTERY} XP)`;
                    masteryBtn.onclick = (e) => {
                        e.stopPropagation(); 
                        toggleMastery(fId, masteryBtn, funcItem, e);
                    };
                    masteryActionDiv.appendChild(masteryBtn);
                    funcDetails.appendChild(masteryActionDiv);

                    funcItem.appendChild(funcHeader);
                    funcItem.appendChild(funcDetails);
                    funcList.appendChild(funcItem);
                });

                catDiv.appendChild(catHeader);
                catDiv.appendChild(funcList);
                container.appendChild(catDiv);
            });

            updateGamificationDashboard();
        }

        // --- SEARCH FILTER ---
        function filterUI() {
            const query = searchInput.value.toLowerCase().trim();
            const categories = document.querySelectorAll('.category-block');

            categories.forEach(cat => {
                let hasVisibleItems = false;
                const items = cat.querySelectorAll('.func-item');

                items.forEach(item => {
                    const fName = item.dataset.funcName;
                    const fDesc = item.dataset.funcDesc;
                    
                    if (fName.includes(query) || fDesc.includes(query)) {
                        item.style.display = 'block';
                        hasVisibleItems = true;
                        if(query.length > 2) item.classList.add('active');
                    } else {
                        item.style.display = 'none';
                        item.classList.remove('active');
                    }
                });

                if (hasVisibleItems) {
                    cat.style.display = 'block';
                    if(query.length > 0) cat.classList.add('active');
                } else {
                    cat.style.display = 'none';
                }
            });
            saveState();
        }

        // Listeners
        searchInput.addEventListener('input', filterUI);
        practiceToggle.addEventListener('change', applyPracticeMode);

        // Keyboard Shortcut for Search
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderUI();
            
            const savedSearch = localStorage.getItem(STORAGE_KEY_SEARCH);
            if (savedSearch) searchInput.value = savedSearch;
            
            const savedPractice = localStorage.getItem(STORAGE_KEY_PRACTICE);
            if (savedPractice === 'true') {
                practiceToggle.checked = true;
                applyPracticeMode();
            }

            filterUI();
        });
    </script>
</body>
</html>
