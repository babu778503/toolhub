<!DOCTYPE html>
<!-- Category: PDF -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotate PDF</title>
    
    <!-- SEO & Metadata for toolshub365.com -->
    <meta name="description" content="Free online PDF Rotate tool. Permanently rotate PDF pages left or right. Fix upside-down PDF documents instantly. Mobile-friendly and secure.">
    <meta name="keywords" content="Rotate PDF, turn pdf pages, fix pdf orientation, rotate pdf permanently, pdf editor, toolshub365, technical SEO tools">
    <meta name="author" content="ToolsHub365">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/rotate-pdf">

    <!-- External Libraries -->
    <!-- PDF.js for viewing pages -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- PDF-Lib for modifying and saving (Updated Version) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script>
        // Initialize PDF.js Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        /* --- CSS Variables --- */
        :root {
            --primary: #6366f1; /* Indigo */
            --primary-hover: #4f46e5;
            --bg-body: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --border: #e2e8f0;
            --header-h: 50px;
            --max-w: 1200px;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* --- Reset --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-top: var(--header-h);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Header (Fixed 50px) --- */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%; height: var(--header-h);
            background-color: var(--primary);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- Main Layout --- */
        .main-container {
            width: 100%;
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- Upload Section --- */
        .upload-zone {
            background: var(--white);
            border: 2px dashed #94a3b8;
            border-radius: 8px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background-color: #eef2ff;
        }

        .icon-rotate {
            width: 50px; height: 50px; fill: var(--primary); margin-bottom: 15px;
        }
        
        .upload-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; }
        .upload-desc { font-size: 0.9rem; color: #64748b; }
        
        input[type="file"] {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
        }

        /* --- Workspace --- */
        .workspace {
            display: none;
            background: var(--white);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 20px;
            flex-direction: column;
            flex: 1;
        }

        /* --- Toolbar --- */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
            background: var(--white);
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .toolbar-group { display: flex; gap: 10px; align-items: center; }
        
        .file-name {
            font-weight: 600; color: var(--primary);
            max-width: 200px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
        }

        /* --- Grid of Pages --- */
        .pages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 6px;
            min-height: 300px;
        }

        .page-card {
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .canvas-wrapper {
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
            background: white;
            /* Wrapper handles the rotation visual */
        }

        .page-num {
            margin-top: 10px; font-size: 0.85rem; color: #64748b; font-weight: 500;
        }

        /* Overlay Rotate Buttons */
        .rotate-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; gap: 10px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .page-card:hover .rotate-overlay { opacity: 1; }

        .btn-icon {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.6);
            color: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .btn-icon:hover { background: var(--primary); }

        /* --- Main Buttons --- */
        .btn {
            padding: 10px 20px; border: none; border-radius: 6px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-secondary { background: white; border: 1px solid #cbd5e1; color: #334155; }
        .btn-secondary:hover { background: #f1f5f9; }

        .btn-danger { background: white; border: 1px solid #fecaca; color: #ef4444; }
        .btn-danger:hover { background: #fef2f2; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Mobile Optimization --- */
        @media screen and (max-width: 768px) {
            .main-container {
                padding: 0; width: 100%; max-width: 100%; gap: 0;
            }
            .upload-zone {
                border-radius: 0; border: none; border-bottom: 1px solid var(--border);
                margin-bottom: 0; padding: 40px 20px;
            }
            .workspace {
                border-radius: 0; box-shadow: none; padding: 10px;
            }
            .toolbar {
                flex-direction: column; gap: 10px; align-items: stretch; position: static;
            }
            .toolbar-group { justify-content: space-between; }
            .pages-grid {
                grid-template-columns: repeat(2, 1fr); gap: 10px;
            }
            .rotate-overlay { opacity: 1; /* Always show buttons on mobile */ }
            .btn-icon { width: 32px; height: 32px; font-size: 1rem; background: rgba(30, 41, 59, 0.8); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Rotate PDF</h1>
    </header>

    <div class="main-container">

        <!-- Upload Zone -->
        <div class="upload-zone" id="dropZone">
            <svg class="icon-rotate" viewBox="0 0 24 24">
                <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8zm-1.25 9.75L9.5 16l-3.5-3.5 1.25-1.25 2.25 2.25 5.25-5.25 1.25 1.25z" fill="none"/>
                <path d="M7.11 8.53L5.7 7.11C4.8 8.27 4.24 9.61 4.07 11h2.02c.14-.87.49-1.72 1.02-2.47zM6.09 13H4.07c.17 1.39.72 2.73 1.62 3.89l1.41-1.42c-.52-.75-.87-1.59-1.01-2.47zm1.01 5.32c1.16.9 2.51 1.44 3.9 1.61V17.9c-.87-.15-1.71-.49-2.46-1.03L7.1 18.32zM13 4.07V1L8.45 5.55 13 10V6.09c2.84.48 5 2.94 5 5.91s-2.16 5.43-5 5.91v2.02c3.95-.49 7-3.85 7-7.93s-3.05-7.44-7-7.93z"/>
            </svg>
            <div class="upload-title">Select PDF to Rotate</div>
            <div class="upload-desc">Drag & Drop file here</div>
            <input type="file" id="fileInput" accept="application/pdf">
        </div>

        <!-- Workspace -->
        <div class="workspace" id="workspace">
            
            <!-- Toolbar -->
            <div class="toolbar">
                <div class="toolbar-group">
                    <span class="file-name" id="fileName">file.pdf</span>
                </div>
                
                <div class="toolbar-group" style="justify-content: center;">
                    <button class="btn btn-secondary" onclick="rotateAll(-90)">
                        <span style="font-size:1.2rem;">&#8634;</span> Left
                    </button>
                    <button class="btn btn-secondary" onclick="rotateAll(90)">
                        Right <span style="font-size:1.2rem;">&#8635;</span>
                    </button>
                </div>

                <div class="toolbar-group">
                    <button class="btn btn-danger" onclick="clearData()">Clear</button>
                    <button class="btn btn-primary" id="saveBtn" onclick="saveAndDownload()">Save PDF</button>
                </div>
            </div>

            <!-- Page Grid -->
            <div class="pages-grid" id="pagesGrid"></div>
        </div>

    </div>

    <script>
        // DOM Elements
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const workspace = document.getElementById('workspace');
        const pagesGrid = document.getElementById('pagesGrid');
        const fileNameDisplay = document.getElementById('fileName');
        const saveBtn = document.getElementById('saveBtn');

        // State Variables
        let currentFile = null;
        let rotations = []; // Stores accumulated rotation for each page (e.g. 0, 90, 180, 270)

        // --- Initialization ---
        window.addEventListener('load', () => {
            // Auto Save Logic Check
            const savedName = localStorage.getItem('toolshub365_rotate_filename');
            if(savedName) console.log("Last session file: " + savedName);
        });

        // --- Event Listeners ---
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        
        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length) handleFile(e.target.files[0]);
        });

        // --- Core Functions ---

        async function handleFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Please upload a valid PDF file.');
                return;
            }

            clearData(false);
            
            currentFile = file;
            fileNameDisplay.textContent = file.name;
            dropZone.style.display = 'none';
            workspace.style.display = 'flex';
            saveBtn.innerText = "Processing...";
            saveBtn.disabled = true;

            localStorage.setItem('toolshub365_rotate_filename', file.name);

            try {
                // Read File for Rendering
                const arrayBuffer = await file.arrayBuffer();

                // Load into PDF.js
                const loadingTask = pdfjsLib.getDocument(arrayBuffer);
                const pdf = await loadingTask.promise;
                const numPages = pdf.numPages;

                rotations = new Array(numPages).fill(0);

                // Render Thumbnails
                for (let i = 1; i <= numPages; i++) {
                    const page = await pdf.getPage(i);
                    renderPageThumbnail(page, i);
                }

                saveBtn.innerText = "Save PDF";
                saveBtn.disabled = false;

            } catch (err) {
                console.error(err);
                alert("Error loading PDF. Please try another file.");
                clearData();
            }
        }

        async function renderPageThumbnail(page, pageNum) {
            // Smaller scale for thumbnails
            const viewport = page.getViewport({ scale: 0.4 }); 
            
            const card = document.createElement('div');
            card.className = 'page-card';

            const wrapper = document.createElement('div');
            wrapper.className = 'canvas-wrapper';
            wrapper.id = `wrapper-${pageNum-1}`;

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            // Render page
            await page.render({ canvasContext: context, viewport: viewport }).promise;

            // Controls
            const overlay = document.createElement('div');
            overlay.className = 'rotate-overlay';
            
            const btnLeft = document.createElement('button');
            btnLeft.className = 'btn-icon';
            btnLeft.innerHTML = '&#8634;';
            btnLeft.title = "Rotate Left";
            btnLeft.onclick = () => rotateSingle(pageNum-1, -90);

            const btnRight = document.createElement('button');
            btnRight.className = 'btn-icon';
            btnRight.innerHTML = '&#8635;';
            btnRight.title = "Rotate Right";
            btnRight.onclick = () => rotateSingle(pageNum-1, 90);

            overlay.appendChild(btnLeft);
            overlay.appendChild(btnRight);

            wrapper.appendChild(canvas);
            wrapper.appendChild(overlay);
            card.appendChild(wrapper);
            
            const numLabel = document.createElement('div');
            numLabel.className = 'page-num';
            numLabel.innerText = `Page ${pageNum}`;
            card.appendChild(numLabel);

            pagesGrid.appendChild(card);
        }

        // --- Rotation Logic ---

        function rotateSingle(index, degrees) {
            rotations[index] = (rotations[index] + degrees) % 360;
            updateVisualRotation(index);
        }

        function rotateAll(degrees) {
            for(let i = 0; i < rotations.length; i++) {
                rotations[i] = (rotations[i] + degrees) % 360;
                updateVisualRotation(i);
            }
        }

        function updateVisualRotation(index) {
            const wrapper = document.getElementById(`wrapper-${index}`);
            if(wrapper) {
                // Visual update using CSS transform
                wrapper.style.transform = `rotate(${rotations[index]}deg)`;
            }
        }

        // --- Save & Download (Fixed Logic) ---

        async function saveAndDownload() {
            if (!currentFile) return;
            
            saveBtn.innerText = "Saving...";
            saveBtn.disabled = true;

            try {
                // 1. Read the file freshly (Fixes buffer detachment issues)
                const arrayBuffer = await currentFile.arrayBuffer();

                // 2. Load into PDF-Lib
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                const pages = pdfDoc.getPages();

                // 3. Apply rotations
                pages.forEach((page, index) => {
                    const angleToAdd = rotations[index] || 0;
                    if (angleToAdd !== 0) {
                        // Get current rotation (default to 0 if undefined)
                        const currentRotation = page.getRotation().angle ?? 0;
                        // Calculate new angle
                        const newAngle = currentRotation + angleToAdd;
                        // Apply using PDFLib.degrees
                        page.setRotation(PDFLib.degrees(newAngle));
                    }
                });

                // 4. Serialize & Save
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const newName = currentFile.name.replace('.pdf', '_Rotated.pdf');
                
                saveAs(blob, newName);

                saveBtn.innerText = "Save PDF";
                saveBtn.disabled = false;

            } catch (err) {
                console.error("Save Error Details:", err);
                alert("Error saving PDF: " + err.message);
                saveBtn.innerText = "Save PDF";
                saveBtn.disabled = false;
            }
        }

        function clearData(fullReset = true) {
            if(fullReset && !confirm('Clear all changes and start over?')) return;

            currentFile = null;
            rotations = [];
            
            fileInput.value = '';
            pagesGrid.innerHTML = '';
            
            workspace.style.display = 'none';
            dropZone.style.display = 'block';

            if(fullReset) {
                localStorage.removeItem('toolshub365_rotate_filename');
            }
        }
    </script>
</body>
</html>
