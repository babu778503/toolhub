<!DOCTYPE html>
<!-- Category: Math Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO & Technical Metadata -->
    <title>Slope Calculator</title>
    <meta name="description" content="Free online Slope Calculator by toolshub365.com. Calculate the slope (gradient), distance, angle, and equation of a line between two points automatically.">
    <meta name="keywords" content="Slope Calculator, Gradient Calculator, Rise over Run, Line Equation Calculator, Geometry Tool, toolshub365, Coordinate Geometry">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/slope-calculator">
    
    <!-- JSON-LD for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Slope Calculator",
      "operatingSystem": "Any",
      "applicationCategory": "MathApplication",
      "offer": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "A responsive tool to calculate slope, distance, and linear equations from two coordinate points."
    }
    </script>

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --header-bg: #2d3436;
            --header-text: #ffffff;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dfe6e9;
            --input-bg: #fdfdfd;
            --success-color: #00b894;
            --error-color: #d63031;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Space for fixed header */
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Calculator Card */
        .calculator-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 700px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        /* Coordinate Inputs Grid */
        .coordinates-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .point-group {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .point-title {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: block;
            text-align: center;
        }

        .input-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .input-row label {
            width: 30px;
            font-weight: bold;
            color: #555;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background-color: var(--input-bg);
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        /* Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
        }

        .btn-clear {
            background-color: #fab1a0;
            color: #d63031;
            max-width: 150px;
        }

        .btn-clear:hover {
            background-color: #ff7675;
            color: white;
        }

        /* Results Display */
        .results-container {
            display: none; /* Hidden by default */
            background-color: #f1f8ff;
            border-radius: 8px;
            padding: 20px;
            border-left: 5px solid var(--primary-color);
        }

        .result-item {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 8px;
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .res-label {
            font-weight: 600;
            color: #555;
        }

        .res-value {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .error-msg {
            display: none;
            color: var(--error-color);
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;
                padding: 0; /* Remove blank space */
                margin: 0;
            }

            .calculator-card {
                max-width: 100%;
                border-radius: 0;
                border: none;
                box-shadow: none;
                min-height: calc(100vh - 50px);
                padding: 20px;
            }

            .coordinates-wrapper {
                grid-template-columns: 1fr; /* Stack inputs vertically */
                gap: 15px;
            }
            
            .action-buttons {
                flex-direction: column;
            }

            .btn-clear {
                max-width: 100%;
                order: 2;
            }
            
            .btn-calc {
                order: 1;
            }
        }
    </style>
</head>
<body>

    <header>
        Slope Calculator
    </header>

    <div class="container">
        <div class="calculator-card">
            
            <p class="error-msg" id="errorMsg">Please enter valid numbers for both points.</p>

            <div class="coordinates-wrapper">
                <!-- Point 1 -->
                <div class="point-group">
                    <span class="point-title">Point 1 (x₁, y₁)</span>
                    <div class="input-row">
                        <label for="x1">x₁:</label>
                        <input type="number" id="x1" placeholder="0" step="any" oninput="autoSave()">
                    </div>
                    <div class="input-row">
                        <label for="y1">y₁:</label>
                        <input type="number" id="y1" placeholder="0" step="any" oninput="autoSave()">
                    </div>
                </div>

                <!-- Point 2 -->
                <div class="point-group">
                    <span class="point-title">Point 2 (x₂, y₂)</span>
                    <div class="input-row">
                        <label for="x2">x₂:</label>
                        <input type="number" id="x2" placeholder="0" step="any" oninput="autoSave()">
                    </div>
                    <div class="input-row">
                        <label for="y2">y₂:</label>
                        <input type="number" id="y2" placeholder="0" step="any" oninput="autoSave()">
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-calc" onclick="calculateSlope()">Calculate Slope</button>
                <button class="btn-clear" onclick="clearData()">Clear</button>
            </div>

            <div class="results-container" id="resultsBox">
                <div class="result-item">
                    <span class="res-label">Slope (m):</span>
                    <span class="res-value" id="resSlope">0</span>
                </div>
                <div class="result-item">
                    <span class="res-label">Line Equation:</span>
                    <span class="res-value" id="resEq">y = mx + b</span>
                </div>
                <div class="result-item">
                    <span class="res-label">Angle (θ):</span>
                    <span class="res-value" id="resAngle">0°</span>
                </div>
                <div class="result-item">
                    <span class="res-label">Distance (d):</span>
                    <span class="res-value" id="resDist">0</span>
                </div>
                <div class="result-item">
                    <span class="res-label">Δx (Run):</span>
                    <span class="res-value" id="resRun">0</span>
                </div>
                <div class="result-item">
                    <span class="res-label">Δy (Rise):</span>
                    <span class="res-value" id="resRise">0</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Storage Key
        const STORAGE_KEY = 'toolshub365_slope_data';

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        function calculateSlope() {
            // Get inputs
            const x1 = parseFloat(document.getElementById('x1').value);
            const y1 = parseFloat(document.getElementById('y1').value);
            const x2 = parseFloat(document.getElementById('x2').value);
            const y2 = parseFloat(document.getElementById('y2').value);
            const errorMsg = document.getElementById('errorMsg');
            const resultsBox = document.getElementById('resultsBox');

            // Validate
            if (isNaN(x1) || isNaN(y1) || isNaN(x2) || isNaN(y2)) {
                errorMsg.style.display = 'block';
                resultsBox.style.display = 'none';
                return;
            }

            errorMsg.style.display = 'none';
            resultsBox.style.display = 'block';

            // Calculations
            const rise = y2 - y1;
            const run = x2 - x1;
            const distance = Math.sqrt(Math.pow(run, 2) + Math.pow(rise, 2));
            
            let slope, angleDeg, equation;

            // Handle Vertical Line
            if (run === 0) {
                slope = "Undefined (Vertical Line)";
                angleDeg = 90;
                equation = `x = ${x1}`;
            } else {
                const m = rise / run;
                slope = formatNumber(m);
                
                // Angle
                const angleRad = Math.atan(m);
                angleDeg = angleRad * (180 / Math.PI);
                
                // Y-Intercept (b = y - mx)
                const b = y1 - (m * x1);
                
                // Format Equation String
                const operator = b >= 0 ? '+' : '-';
                const bAbs = Math.abs(b);
                equation = `y = ${formatNumber(m)}x ${operator} ${formatNumber(bAbs)}`;
            }

            // Update DOM
            document.getElementById('resSlope').innerText = slope;
            document.getElementById('resEq').innerText = equation;
            document.getElementById('resAngle').innerText = formatNumber(angleDeg) + "°";
            document.getElementById('resDist').innerText = formatNumber(distance);
            document.getElementById('resRun').innerText = formatNumber(run);
            document.getElementById('resRise').innerText = formatNumber(rise);

            // Save state (including result visibility implicitly via input values)
            autoSave();
        }

        function formatNumber(num) {
            if (typeof num === 'string') return num;
            if (Number.isInteger(num)) return num;
            return parseFloat(num.toFixed(4));
        }

        // --- Data Persistence ---

        function autoSave() {
            const data = {
                x1: document.getElementById('x1').value,
                y1: document.getElementById('y1').value,
                x2: document.getElementById('x2').value,
                y2: document.getElementById('y2').value,
                hasCalculated: document.getElementById('resultsBox').style.display === 'block'
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            
            // If the user is typing, hide error messages
            document.getElementById('errorMsg').style.display = 'none';
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    document.getElementById('x1').value = data.x1 || '';
                    document.getElementById('y1').value = data.y1 || '';
                    document.getElementById('x2').value = data.x2 || '';
                    document.getElementById('y2').value = data.y2 || '';

                    // If previously calculated and valid, recalculate to show results
                    if (data.hasCalculated && data.x1 && data.x2) {
                        calculateSlope();
                    }
                } catch (e) {
                    console.error("Error loading saved data");
                }
            }
        }

        function clearData() {
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('x1').value = '';
            document.getElementById('y1').value = '';
            document.getElementById('x2').value = '';
            document.getElementById('y2').value = '';
            
            document.getElementById('resultsBox').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
        }
    </script>
</body>
</html>
