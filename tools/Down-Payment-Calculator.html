<!DOCTYPE html>
<!-- Category: Financial Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Down Payment Calculator</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="Free Down Payment Calculator by ToolsHub365. Calculate the upfront cash required for a home loan, estimate mortgage amounts, and monthly payments.">
    <meta name="keywords" content="Down Payment Calculator, Mortgage Down Payment, Home Loan Deposit Calculator, Real Estate Calculator, ToolsHub365, FHA Down Payment">
    <meta name="author" content="ToolsHub365">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Down Payment Calculator - Calculate Cash & Loan Amount">
    <meta property="og:description" content="Determine how much cash you need upfront for your home purchase. Calculates percentage vs. dollar amount instantly.">
    <meta property="og:url" content="https://toolshub365.com/down-payment-calculator">
    <meta property="og:site_name" content="ToolsHub365">

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialProduct",
      "name": "Down Payment Calculator",
      "description": "Calculates the down payment amount based on home price and percentage, and estimates the resulting mortgage loan.",
      "brand": {
        "@type": "Brand",
        "name": "ToolsHub365"
      },
      "category": "Real Estate Tools"
    }
    </script>

    <style>
        /* --- CSS Variables & Theme --- */
        :root {
            --primary: #10b981;       /* Emerald Green (Money/Cash) */
            --primary-dark: #059669;
            --secondary: #3b82f6;     /* Blue (Loan) */
            --header-bg: #111827;     /* Dark Header */
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --header-h: 50px;
        }

        /* --- Reset --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-top: var(--header-h);
            line-height: 1.5;
        }

        /* --- Header (Fixed 50px) --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-h);
            background-color: var(--header-bg);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.125rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* --- Main Layout --- */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            gap: 25px;
            align-items: flex-start;
        }

        /* --- Card Styling --- */
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
            padding: 25px;
            width: 100%;
        }

        .input-section { flex: 1; }
        .result-section { flex: 1; background: #fff; }

        h2 {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 20px;
            font-weight: 600;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--bg-body);
        }

        /* --- Form Elements --- */
        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
            font-weight: 500;
            pointer-events: none;
        }

        .input-suffix {
            position: absolute;
            right: 12px;
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 12px 12px 30px; /* Space for icon */
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background-color: #f9fafb;
            transition: all 0.2s;
        }
        
        input[type="number"]:focus {
            background-color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .dual-input {
            display: flex;
            gap: 10px;
        }

        /* --- Buttons --- */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-calc { background: var(--primary); color: white; }
        .btn-calc:hover { background: var(--primary-dark); }
        .btn-clear { background: #e5e7eb; color: var(--text-main); }
        .btn-clear:hover { background: #d1d5db; }

        /* --- Results Visuals --- */
        .result-highlight {
            text-align: center;
            padding: 20px;
            background: #ecfdf5;
            border-radius: 10px;
            border: 1px solid #d1fae5;
            margin-bottom: 25px;
        }

        .result-label { color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .result-value { font-size: 2.25rem; font-weight: 800; color: var(--primary); margin-top: 5px; }

        /* Visual Bar Chart */
        .visual-bar-container {
            margin-bottom: 25px;
        }
        
        .visual-bar {
            height: 24px;
            width: 100%;
            background: #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
        }

        .bar-segment { height: 100%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .bg-down { background: var(--primary); }
        .bg-loan { background: var(--secondary); }

        .legend {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }

        .details-list {
            list-style: none;
            border-top: 1px solid var(--border);
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }
        
        .val-loan { color: var(--secondary); font-weight: 600; }

        /* --- Mobile Specifics --- */
        @media screen and (max-width: 768px) {
            .container {
                flex-direction: column;
                padding: 0; /* Full width */
                gap: 0;
                margin-top: 10px; /* Slight gap from header */
            }

            .card {
                border-radius: 0;
                border-left: none;
                border-right: none;
                border-top: 1px solid var(--border);
                box-shadow: none;
            }
            
            /* Add separation between input and result on mobile */
            .input-section { margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Down Payment Calculator</h1>
    </header>

    <div class="container">
        
        <!-- Input Section -->
        <div class="card input-section">
            <h2>Purchase Details</h2>
            <form id="dpForm" onsubmit="event.preventDefault(); calculate();">
                
                <div class="form-group">
                    <label for="homePrice">Home Price</label>
                    <div class="input-group">
                        <span class="input-icon">$</span>
                        <input type="number" id="homePrice" placeholder="300000" oninput="syncFromPrice()">
                    </div>
                </div>

                <div class="form-group">
                    <label>Down Payment</label>
                    <div class="dual-input">
                        <!-- Percentage Input -->
                        <div class="input-group" style="flex: 1;">
                            <input type="number" id="downPercent" placeholder="20" step="0.1" oninput="syncFromPercent()">
                            <span class="input-suffix">%</span>
                        </div>
                        <!-- Amount Input -->
                        <div class="input-group" style="flex: 1.5;">
                            <span class="input-icon">$</span>
                            <input type="number" id="downAmount" placeholder="60000" oninput="syncFromAmount()">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="interestRate">Interest Rate <small style="font-weight:400; color:var(--text-muted)">(For monthly est.)</small></label>
                    <div class="input-group">
                        <input type="number" id="interestRate" placeholder="6.5" step="0.01" oninput="calculate()">
                        <span class="input-suffix">%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="loanTerm">Loan Term</label>
                    <div class="input-group">
                        <input type="number" id="loanTerm" placeholder="30" oninput="calculate()">
                        <span class="input-suffix">Years</span>
                    </div>
                </div>

                <div class="btn-row">
                    <button class="btn btn-calc" onclick="calculate()">Calculate</button>
                    <button class="btn btn-clear" onclick="clearData()">Clear</button>
                </div>
            </form>
        </div>

        <!-- Result Section -->
        <div class="card result-section" id="resultCard">
            <h2>Results</h2>
            
            <div class="result-highlight">
                <div class="result-label">Cash Required Upfront</div>
                <div class="result-value" id="resDownPayment">$0.00</div>
            </div>

            <div class="visual-bar-container">
                <div class="visual-bar">
                    <div class="bar-segment bg-down" id="barDown" style="width: 20%"></div>
                    <div class="bar-segment bg-loan" id="barLoan" style="width: 80%"></div>
                </div>
                <div class="legend">
                    <div class="legend-item"><div class="dot bg-down"></div> Down Payment</div>
                    <div class="legend-item"><div class="dot bg-loan"></div> Mortgage Loan</div>
                </div>
            </div>

            <ul class="details-list">
                <li class="detail-item">
                    <span>Down Payment %</span>
                    <strong id="resPercent">0%</strong>
                </li>
                <li class="detail-item">
                    <span>Mortgage Loan Amount</span>
                    <span class="val-loan" id="resLoanAmount">$0.00</span>
                </li>
                <li class="detail-item">
                    <span>Est. Monthly P&I</span>
                    <strong id="resMonthly">$0.00</strong>
                </li>
            </ul>
            
            <p style="margin-top:15px; font-size:0.8rem; color:var(--text-muted); text-align:center;">
                *Monthly payment excludes taxes and insurance.
            </p>
        </div>

    </div>

    <script>
        // DOM Elements
        const els = {
            price: document.getElementById('homePrice'),
            percent: document.getElementById('downPercent'),
            amount: document.getElementById('downAmount'),
            rate: document.getElementById('interestRate'),
            term: document.getElementById('loanTerm'),
            // Outputs
            resDown: document.getElementById('resDownPayment'),
            resPercent: document.getElementById('resPercent'),
            resLoan: document.getElementById('resLoanAmount'),
            resMonthly: document.getElementById('resMonthly'),
            barDown: document.getElementById('barDown'),
            barLoan: document.getElementById('barLoan')
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            // Trigger initial calc if data exists
            if (els.price.value && (els.amount.value || els.percent.value)) {
                calculate();
            }
        });

        // --- Logic: Two-way binding for Down Payment ---

        // User changes Price -> Update Amount based on current Percent
        function syncFromPrice() {
            const price = parseFloat(els.price.value) || 0;
            const pct = parseFloat(els.percent.value) || 0;
            if(pct > 0) {
                els.amount.value = (price * (pct / 100)).toFixed(0);
            }
            calculate();
        }

        // User changes Percent -> Calculate Amount
        function syncFromPercent() {
            const price = parseFloat(els.price.value) || 0;
            const pct = parseFloat(els.percent.value) || 0;
            if(price > 0) {
                els.amount.value = (price * (pct / 100)).toFixed(0);
            }
            calculate();
        }

        // User changes Amount -> Calculate Percent
        function syncFromAmount() {
            const price = parseFloat(els.price.value) || 0;
            const amt = parseFloat(els.amount.value) || 0;
            if(price > 0) {
                els.percent.value = ((amt / price) * 100).toFixed(2);
            }
            calculate();
        }

        // --- Main Calculation ---
        function calculate() {
            const price = parseFloat(els.price.value) || 0;
            const downAmt = parseFloat(els.amount.value) || 0;
            const pct = parseFloat(els.percent.value) || 0;
            const rate = parseFloat(els.rate.value) || 0;
            const years = parseFloat(els.term.value) || 30;

            saveData();

            // 1. Validate Basic
            if(price <= 0) return;

            // 2. Calculate Loan Amount
            let loanAmt = price - downAmt;
            if(loanAmt < 0) loanAmt = 0;

            // 3. Calculate Monthly Payment (Standard Amortization)
            let monthly = 0;
            if (loanAmt > 0 && rate > 0 && years > 0) {
                const r = rate / 100 / 12;
                const n = years * 12;
                monthly = loanAmt * ( (r * Math.pow(1+r, n)) / (Math.pow(1+r, n) - 1) );
            } else if (loanAmt > 0 && rate === 0) {
                monthly = loanAmt / (years * 12);
            }

            // 4. Update UI
            els.resDown.textContent = formatMoney(downAmt);
            els.resPercent.textContent = pct.toFixed(2) + '%';
            els.resLoan.textContent = formatMoney(loanAmt);
            els.resMonthly.textContent = formatMoney(monthly);

            // 5. Update Visual Bar
            let downPctDisplay = pct > 100 ? 100 : pct;
            if(downAmt > price) downPctDisplay = 100; // Cap visual
            
            els.barDown.style.width = `${downPctDisplay}%`;
            els.barLoan.style.width = `${100 - downPctDisplay}%`;
        }

        // Helper: Format Money
        function formatMoney(num) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num);
        }

        // --- Local Storage ---
        function saveData() {
            const data = {
                price: els.price.value,
                percent: els.percent.value,
                amount: els.amount.value,
                rate: els.rate.value,
                term: els.term.value
            };
            localStorage.setItem('dp_calc_data', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('dp_calc_data');
            if (saved) {
                const data = JSON.parse(saved);
                if(data.price) els.price.value = data.price;
                if(data.percent) els.percent.value = data.percent;
                if(data.amount) els.amount.value = data.amount;
                if(data.rate) els.rate.value = data.rate;
                if(data.term) els.term.value = data.term;
            }
        }

        function clearData() {
            localStorage.removeItem('dp_calc_data');
            // Clear inputs
            els.price.value = '';
            els.percent.value = '';
            els.amount.value = '';
            els.rate.value = '';
            els.term.value = '';
            
            // Clear Results
            els.resDown.textContent = '$0.00';
            els.resPercent.textContent = '0%';
            els.resLoan.textContent = '$0.00';
            els.resMonthly.textContent = '$0.00';
            els.barDown.style.width = '20%';
            els.barLoan.style.width = '80%';
        }
    </script>
</body>
</html>
