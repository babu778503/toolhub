            user-select: auto;

        body.practice-mode-active .code-block.revealed + .btn-copy,

            display: none;

        /* Mastery Button */
        .mastery-action {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
            display: flex;
            justify-content: flex-end;

        .btn-mastery {

            background: var(--gold-light);
            border-color: var(--gold);
            color: #b38100;
        }

        /* Confetti Animation */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;

            animation: fall 1.5s ease-out forwards;

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(150px) rotate(360deg) scale(0.5); opacity: 0; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {

                margin-bottom: 10px;

            .quiz-section {
                border-left: 4px solid var(--gold);

            .game-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .search-wrapper {
                padding: 0 10px 10px 10px;
            }
            .category-block {
                border-radius: 0;
                border-left: none;
                border-right: none;
                margin-bottom: 8px;
            }
            .btn-copy { opacity: 1; }
        }
    </style>

    <script>
        // --- DATA SETUP ---
        const excelData = [
            ["Core Rounding Functions", [
                ["ROUND", "Rounds a number to a specified number of digits.", "Rounded Number", "ROUND(number, num_digits)", "=ROUND(23.456, 2) // Returns 23.46"],
                ["ROUNDUP", "Rounds a number up, away from zero, to a specific number of digits.", "Rounded Up Number", "ROUNDUP(number, num_digits)", "=ROUNDUP(3.14159, 3) // Returns 3.142"],
                ["ROUNDDOWN", "Rounds a number down, toward zero, to a specific number of digits.", "Rounded Down Number", "ROUNDDOWN(number, num_digits)", "=ROUNDDOWN(3.14159, 3) // Returns 3.141"]
            ]],
            ["✅ Ceiling / Floor Functions", [
                ["CEILING", "Rounds a number up, away from zero, to the nearest multiple of significance.", "Rounded Up Multiple", "CEILING(number, significance)", "=CEILING(2.5, 1) // Returns 3"],
                ["CEILING.MATH", "Rounds a number up to the nearest integer or multiple, with control over negative numbers.", "Rounded Up Number", "CEILING.MATH(number, [significance], [mode])", "=CEILING.MATH(-4.3, 2, 1) // Returns -4"],
                ["CEILING.PRECISE", "Rounds a number up to the nearest integer or multiple, regardless of sign.", "Rounded Up Number", "CEILING.PRECISE(number, [significance])", "=CEILING.PRECISE(-4.3, 2) // Returns -4"],
                ["FLOOR", "Rounds a number down, toward zero, to the nearest multiple of significance.", "Rounded Down Multiple", "FLOOR(number, significance)", "=FLOOR(2.5, 1) // Returns 2"],
                ["FLOOR.MATH", "Rounds a number down to the nearest integer or multiple, with negative number control.", "Rounded Down Number", "FLOOR.MATH(number, [significance], [mode])", "=FLOOR.MATH(4.7, 2) // Returns 4"],
                ["FLOOR.PRECISE", "Rounds a number down to the nearest integer or multiple, regardless of sign.", "Rounded Down Number", "FLOOR.PRECISE(number, [significance])", "=FLOOR.PRECISE(-4.7, 2) // Returns -6"]
            ]],
            ["✅ Multiple-Based Rounding", [
                ["MROUND", "Rounds a number to the nearest specified multiple.", "Rounded Multiple", "MROUND(number, multiple)", "=MROUND(10, 3) // Returns 9"]
            ]],
            ["✅ Basic Number Adjustment", [
                ["TRUNC", "Truncates a number to an integer by simply removing the fractional part.", "Truncated Number", "TRUNC(number, [num_digits])", "=TRUNC(8.9) // Returns 8"],
                ["INT", "Rounds a number down to the nearest integer. (Differs from TRUNC on negatives).", "Integer", "INT(number)", "=INT(-8.9) // Returns -9"],
                ["ODD", "Rounds a positive number up and negative number down to the nearest odd integer.", "Odd Integer", "ODD(number)", "=ODD(1.5) // Returns 3"],
                ["EVEN", "Rounds a positive number up and negative number down to the nearest even integer.", "Even Integer", "EVEN(number)", "=EVEN(1.5) // Returns 2"]
            ]],
            ["✅ Conditional Rounding", [
                ["ROUND + IF", "Applies ROUND logic only if a specific condition is met.", "Conditionally Rounded Number", "=IF(condition, ROUND(num, digits), num)", "=IF(A1>10, ROUND(A1, 0), A1)"],
                ["ROUNDUP + IF", "Applies ROUNDUP based on a logical test or threshold.", "Conditionally Rounded Up Number", "=IF(condition, ROUNDUP(num, digits), num)", "=IF(B2=\"Markup\", ROUNDUP(C2, 2), C2)"],
                ["ROUNDDOWN + IF", "Applies ROUNDDOWN based on conditional logic.", "Conditionally Rounded Down Number", "=IF(condition, ROUNDDOWN(num, digits), num)", "=IF(D2<0, ROUNDDOWN(D2, 0), D2)"],
                ["CEILING + IF", "Conditionally rounds a number up to a specified multiple.", "Conditionally Ceiled Number", "=IF(condition, CEILING(num, sig), num)", "=IF(A2>100, CEILING(A2, 10), A2)"],
                ["FLOOR + IF", "Conditionally rounds a number down to a specified multiple.", "Conditionally Floored Number", "=IF(condition, FLOOR(num, sig), num)", "=IF(B2=\"Discount\", FLOOR(C2, 5), C2)"]
            ]],
            ["✅ Dynamic Array (Excel 365)", [

        function highlightSyntax(codeStr) {
            let s = codeStr.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            s = s.replace(/("[^"]*")/g, '<span class="syn-str">$1</span>');
            s = s.replace(/\b([A-Z.0-9_]+)(\()/g, '<span class="syn-fn">$1</span>$2');
            s = s.replace(/\b([A-Z]{1,3}[0-9]{1,7}(:[A-Z]{1,3}[0-9]{1,7})?)\b/g, '<span class="syn-ref">$1</span>');
            return s;
        }

        // Robust mobile-friendly copy-to-clipboard function
        function copyToClipboard(text, btnElement) {
            const onSuccess = () => {
                let oldText = btnElement.innerText;
                if(oldText === "✅ Copied!") return;
                btnElement.innerText = "✅ Copied!";
                btnElement.style.color = "var(--excel-green)";
                setTimeout(() => {
                    btnElement.innerText = "📋 Copy";
                    btnElement.style.color = "";
                }, 2000);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(onSuccess).catch(() => {
                    fallbackCopy(text, onSuccess);
                });
            } else {
                fallbackCopy(text, onSuccess);
            }
        }

        function fallbackCopy(text, onSuccess) {
            let textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            textArea.setSelectionRange(0, 99999);
            
            try {
                let successful = document.execCommand('copy');
                if (successful) onSuccess();
            } catch (err) {
                console.error("Fallback copy failed", err);
            }
            document.body.removeChild(textArea);
        }

        // --- GAMIFICATION LOGIC ---
        function getMasteryData() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY_MASTERY)) || []; } catch (e) { return []; }

        function saveMasteryData(data) { localStorage.setItem(STORAGE_KEY_MASTERY, JSON.stringify(data)); }
        function getQuizCorrect() { return parseInt(localStorage.getItem(STORAGE_KEY_QUIZ_CORRECT)) || 0; }
        function addQuizCorrect(e) {
            let correct = getQuizCorrect() + 1;
            localStorage.setItem(STORAGE_KEY_QUIZ_CORRECT, correct);
            updateGamificationDashboard();
            if(e) shootConfetti(e.clientX, e.clientY);
        }

        function toggleMastery(formulaId, btnElement, liElement, event) {
            let mastery = getMasteryData();
            if (mastery.includes(formulaId)) {
                mastery = mastery.filter(id => id !== formulaId);
                btnElement.classList.remove('mastered');
                btnElement.innerHTML = `Mark as Mastered (+${XP_PER_MASTERY} XP)`;
                liElement.classList.remove('is-mastered');
            } else {
                mastery.push(formulaId);
                btnElement.classList.add('mastered');
                btnElement.innerHTML = `⭐ Mastered (+${XP_PER_MASTERY} XP)`;
                liElement.classList.add('is-mastered');
                shootConfetti(event.clientX, event.clientY);
            }
            saveMasteryData(mastery);
            updateGamificationDashboard();
        }

        function updateGamificationDashboard() {
            const masteryCount = getMasteryData().length;
            const quizCorrect = getQuizCorrect();
            
            const progress = (masteryCount / TOTAL_FORMULAS) * 100;
            const totalXp = (masteryCount * XP_PER_MASTERY) + (quizCorrect * XP_PER_QUIZ);

            masteredCountEl.textContent = masteryCount;
            totalCountEl.textContent = TOTAL_FORMULAS;
            quizScoreDisplay.textContent = quizCorrect;
            gameProgressBar.style.width = `${progress}%`;
            xpDisplay.textContent = `⭐ ${totalXp} XP`;

            let levelText = "Novice";
            if (totalXp >= 600) levelText = "Excel Grandmaster";
            else if (totalXp >= 300) levelText = "Formula Wizard";
            else if (totalXp >= 100) levelText = "Data Analyst";
            else if (totalXp >= 40) levelText = "Intermediate";

            levelDisplay.textContent = `Rank: ${levelText}`;
        }

        // --- QUIZ LOGIC ---
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        btnToggleQuiz.addEventListener('click', () => {
            if (!isQuizActive) {
                quizContainer.style.display = 'block';
                btnToggleQuiz.textContent = "Close Quiz";
                isQuizActive = true;
                startQuiz();
            } else {
                quizContainer.style.display = 'none';
                btnToggleQuiz.textContent = "Start Practice Quiz";
                isQuizActive = false;
            }
        });

        function startQuiz() {
            shuffledQuiz = shuffleArray([...quizQuestions]);
            currentQuizIndex = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const qData = shuffledQuiz[currentQuizIndex];
            quizQuestion.textContent = `${currentQuizIndex + 1}. ${qData.q}`;
            quizOptions.innerHTML = '';
            quizFeedback.style.display = 'none';
            btnNextQuestion.style.display = 'none';

            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option-btn';
                btn.textContent = opt;
                btn.onclick = (e) => handleAnswer(index, qData.answer, qData.explanation, btn, e);
                quizOptions.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex, correctIndex, explanation, btnClicked, event) {
            const buttons = quizOptions.querySelectorAll('.quiz-option-btn');
            buttons.forEach(btn => btn.disabled = true); 

            quizFeedback.style.display = 'block';

            if (selectedIndex === correctIndex) {
                btnClicked.classList.add('correct');
                quizFeedback.className = 'quiz-feedback success';
                quizFeedback.innerHTML = `<strong>✅ Correct! (+${XP_PER_QUIZ} XP)</strong><br>${explanation}`;
                addQuizCorrect(event); 
            } else {
                btnClicked.classList.add('incorrect');
                buttons[correctIndex].classList.add('correct'); 
                quizFeedback.className = 'quiz-feedback error';
                quizFeedback.innerHTML = `<strong>❌ Incorrect.</strong><br>${explanation}`;
            }

            btnNextQuestion.style.display = 'inline-block';
        }

        btnNextQuestion.addEventListener('click', () => {
            currentQuizIndex++;
            if (currentQuizIndex >= shuffledQuiz.length) {
                shuffledQuiz = shuffleArray([...quizQuestions]);
                currentQuizIndex = 0;
            }
            loadQuestion();
        });

        // --- PRACTICE MODE LOGIC ---
        function applyPracticeMode() {
            const isChecked = practiceToggle.checked;
            localStorage.setItem(STORAGE_KEY_PRACTICE, isChecked);
            if(isChecked) {
                document.body.classList.add('practice-mode-active');
            } else {
                document.body.classList.remove('practice-mode-active');
                document.querySelectorAll('.code-block').forEach(el => el.classList.remove('revealed'));
            }
        }

        // --- RENDER CONTENT ---
        function renderUI() {
            container.innerHTML = '';
            let savedCats = [];
            try { savedCats = JSON.parse(localStorage.getItem(STORAGE_KEY_OPEN_CATS)) || []; } catch (e) {}
            const masteryData = getMasteryData();

            excelData.forEach((category, index) => {
                const catName = category[0];
                const functions = category[1];

                const catDiv = document.createElement('div');
                catDiv.className = 'category-block'; 
                const catId = catName.toLowerCase().replace(/[^a-z0-9]/g, '-');
                catDiv.dataset.catName = catId;

                if (savedCats.includes(catId) || (savedCats.length === 0 && index === 0)) {
                    catDiv.classList.add('active');
                }

                const catHeader = document.createElement('div');
                catHeader.className = 'category-header';
                catHeader.textContent = catName;
                catHeader.onclick = () => {
                    catDiv.classList.toggle('active');
                    saveState();
                };

                const funcList = document.createElement('ul');
                funcList.className = 'func-list';

                functions.forEach(func => {
                    const [fName, fPurpose, fReturn, fSyntax, fExample] = func;
                    const fId = fName.toLowerCase().replace(/[^a-z0-9]/g, '-');
                    const isMastered = masteryData.includes(fId);

                    const funcItem = document.createElement('li');
                    funcItem.className = `func-item ${isMastered ? 'is-mastered' : ''}`;
                    funcItem.dataset.funcName = fName.toLowerCase();
                    funcItem.dataset.funcDesc = fPurpose.toLowerCase();

                    const funcHeader = document.createElement('div');
                    funcHeader.className = 'func-header';
                    const headerLeft = document.createElement('div');
                    headerLeft.className = 'func-header-left';
                    headerLeft.innerHTML = `<span>${fName}</span> <span class="badge-icon" title="Mastered">⭐</span>`;
                    funcHeader.appendChild(headerLeft);
                    funcHeader.onclick = () => funcItem.classList.toggle('active');

                    const funcDetails = document.createElement('div');
                    funcDetails.className = 'func-details';
                    
                    const safeSyntax = highlightSyntax(fSyntax);
                    const safeExample = highlightSyntax(fExample);
                    
                    // Stringify properly to prevent code breaks on inline handlers
                    const copySyntaxStr = fSyntax.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
                    const copyExampleStr = fExample.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');

                    funcDetails.innerHTML = `
                        <div class="detail-section">
                            <h4>Purpose</h4>
                            <p>${fPurpose}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Return value</h4>
                            <p>${fReturn}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Syntax</h4>
                            <div class="code-wrapper">
                                <code class="code-block" onclick="this.classList.add('revealed')">${safeSyntax}</code>
                                <button type="button" class="btn-copy" onclick="event.stopPropagation(); copyToClipboard('${copySyntaxStr}', this)">📋 Copy</button>
                            </div>
                        </div>
                        <div class="detail-section">
                            <h4>Examples</h4>
                            <div class="code-wrapper">
                                <code class="code-block" onclick="this.classList.add('revealed')">${safeExample}</code>
                                <button type="button" class="btn-copy" onclick="event.stopPropagation(); copyToClipboard('${copyExampleStr}', this)">📋 Copy</button>
                            </div>
                        </div>
                    `;

                    const masteryActionDiv = document.createElement('div');
                    masteryActionDiv.className = 'mastery-action';
                    const masteryBtn = document.createElement('button');
                    masteryBtn.className = `btn-mastery ${isMastered ? 'mastered' : ''}`;
                    masteryBtn.innerHTML = isMastered ? `⭐ Mastered (+${XP_PER_MASTERY} XP)` : `Mark as Mastered (+${XP_PER_MASTERY} XP)`;
                    masteryBtn.onclick = (e) => {
                        e.stopPropagation(); 
                        toggleMastery(fId, masteryBtn, funcItem, e);
                    };
                    masteryActionDiv.appendChild(masteryBtn);
                    funcDetails.appendChild(masteryActionDiv);

                    funcItem.appendChild(funcHeader);
                    funcItem.appendChild(funcDetails);
                    funcList.appendChild(funcItem);
                });

                catDiv.appendChild(catHeader);
                catDiv.appendChild(funcList);
                container.appendChild(catDiv);
            });

            updateGamificationDashboard();
        }

        // Live Search / Filter
        function filterUI() {
            const query = searchInput.value.toLowerCase().trim();
            const categories = document.querySelectorAll('.category-block');

            categories.forEach(cat => {
                let hasVisibleItems = false;
                const items = cat.querySelectorAll('.func-item');

                items.forEach(item => {
                    const fName = item.dataset.funcName;
                    const fDesc = item.dataset.funcDesc;
                    
                    if (fName.includes(query) || fDesc.includes(query)) {
                        item.style.display = 'block';
                        hasVisibleItems = true;
                        // Auto-expand if search query is specific enough
                        if (query.length > 2) {
                            item.classList.add('active');
                        }
                    } else {
                        item.style.display = 'none';
                        item.classList.remove('active');
                    }
                });

                if (hasVisibleItems) {
                    cat.style.display = 'block';
                    if (query.length > 0) cat.classList.add('active');
                } else {
                    cat.style.display = 'none';
                }
            });
            saveState();
        }

        searchInput.addEventListener('input', filterUI);
        practiceToggle.addEventListener('change', applyPracticeMode);

        // Keyboard Shortcut for Search
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            renderUI();
            
            const savedSearch = localStorage.getItem(STORAGE_KEY_SEARCH);
            if (savedSearch) searchInput.value = savedSearch;
            
            const savedPractice = localStorage.getItem(STORAGE_KEY_PRACTICE);
            if (savedPractice === 'true') {
                practiceToggle.checked = true;
                applyPracticeMode();
            }

            filterUI();
        });
    </script>
</body>
</html>
