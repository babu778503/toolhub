    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;

        /* Fixed Header Constraint: exactly 50px height */

        header h1 {

        /* Desktop Container Measurements: Max-width 1200px */
        .container {
            max-width: 1200px;

        /* App Layout */
        .app-wrapper {

        /* Category Selection */
        .category-nav {
            display: flex;

        /* Responsive Constraints for Mobile */
        @media (max-width: 768px) {
            /* Remove both side blank space for mobile users */

                border-radius: 0;

                flex-direction: column;

            .controls {

<body>

    <header>
        <h1>Conversion Calculator</h1>
    </header>

    <main class="container">
        <section class="app-wrapper">
            <!-- Navigation -->
            <nav class="category-nav">
                <button class="cat-btn active" onclick="setCategory('length')" id="btn-length">Length</button>
                <button class="cat-btn" onclick="setCategory('weight')" id="btn-weight">Weight</button>
                <button class="cat-btn" onclick="setCategory('temperature')" id="btn-temperature">Temperature</button>
            </nav>

            <!-- Converter -->
            <div class="converter-body">
                <div class="input-group">
                    <label for="input-from">From</label>
                    <div class="input-wrapper">
                        <input type="number" id="input-from" step="any" oninput="calculate('from')" placeholder="0">
                        <select id="unit-from" onchange="unitChanged('from')"></select>
                    </div>
                </div>

                <div class="swap-btn-container">
                    <button class="swap-btn" onclick="swapUnits()" aria-label="Swap Units">⇄</button>
                </div>

                <div class="input-group">
                    <label for="input-to">To</label>
                    <div class="input-wrapper">
                        <input type="number" id="input-to" step="any" oninput="calculate('to')" placeholder="0">
                        <select id="unit-to" onchange="unitChanged('to')"></select>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>
        </section>
    </main>

    <script>
        // DOM Elements
        const inputFrom = document.getElementById('input-from');
        const inputTo = document.getElementById('input-to');
        const unitFrom = document.getElementById('unit-from');
        const unitTo = document.getElementById('unit-to');
        const catBtns = document.querySelectorAll('.cat-btn');

        // Storage Key
        const STORAGE_KEY = 'conversionCalcData_toolshub365';

        // Conversion Multipliers relative to base unit
        const conversionRates = {
            length: {
                Meter: 1,
                Kilometer: 1000,
                Centimeter: 0.01,
                Millimeter: 0.001,
                Mile: 1609.34,
                Yard: 0.9144,
                Foot: 0.3048,
                Inch: 0.0254
            },
            weight: {
                Kilogram: 1,
                Gram: 0.001,
                Milligram: 0.000001,
                Pound: 0.453592,
                Ounce: 0.0283495
            },
            temperature: {
                Celsius: 'c',
                Fahrenheit: 'f',
                Kelvin: 'k'
            }
        };

        // App State
        let appState = {
            category: 'length',
            length: { from: 'Meter', to: 'Foot' },
            weight: { from: 'Kilogram', to: 'Pound' },
            temperature: { from: 'Celsius', to: 'Fahrenheit' },
            lastInput: 'from',
            inputValue: 1
        };

        // Initialize
        function init() {
            loadData();
            applyCategory(appState.category);
        }

        // Set Active Category UI
        function setCategory(category) {
            appState.category = category;
            applyCategory(category);
            saveData();
        }

        function applyCategory(category) {
            // Update Buttons
            catBtns.forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${category}`).classList.add('active');

            // Populate Dropdowns
            const units = Object.keys(conversionRates[category]);
            unitFrom.innerHTML = units.map(u => `<option value="${u}">${u}</option>`).join('');
            unitTo.innerHTML = units.map(u => `<option value="${u}">${u}</option>`).join('');

            // Set Dropdown Values from State
            unitFrom.value = appState[category].from;
            unitTo.value = appState[category].to;

            // Set Input Values
            if (appState.lastInput === 'from') {
                inputFrom.value = appState.inputValue;
                calculate('from');
            } else {
                inputTo.value = appState.inputValue;
                calculate('to');
            }
        }

        // Handle dropdown changes
        function unitChanged(source) {
            const category = appState.category;
            appState[category].from = unitFrom.value;
            appState[category].to = unitTo.value;
            
            // Recalculate based on the last edited input
            calculate(appState.lastInput);
            saveData();
        }

        // Swap functionality
        function swapUnits() {
            const temp = unitFrom.value;
            unitFrom.value = unitTo.value;
            unitTo.value = temp;
            
            unitChanged('swap');
        }

        // Core Calculation Engine
        function calculate(source) {
            appState.lastInput = source;
            const category = appState.category;
            
            let sourceInput = source === 'from' ? inputFrom : inputTo;
            let targetInput = source === 'from' ? inputTo : inputFrom;
            let sourceUnit = source === 'from' ? unitFrom.value : unitTo.value;
            let targetUnit = source === 'from' ? unitTo.value : unitFrom.value;

            let val = parseFloat(sourceInput.value);
            appState.inputValue = isNaN(val) ? '' : val;

            if (isNaN(val)) {
                targetInput.value = '';
                saveData();
                return;
            }

            let result;

            if (category === 'temperature') {
                result = convertTemperature(val, sourceUnit, targetUnit);
            } else {
                // Ratio calculation: (val * sourceRate) / targetRate
                const rateSource = conversionRates[category][sourceUnit];
                const rateTarget = conversionRates[category][targetUnit];
                result = (val * rateSource) / rateTarget;
            }

            // Clean up floating point anomalies and display
            targetInput.value = formatNumber(result);
            saveData();
        }

        // Temperature Logic
        function convertTemperature(val, from, to) {
            if (from === to) return val;
            let celsius;

            // Convert everything to Celsius first
            if (from === 'Celsius') celsius = val;
            else if (from === 'Fahrenheit') celsius = (val - 32) * (5/9);
            else if (from === 'Kelvin') celsius = val - 273.15;

            // Convert Celsius to Target
            if (to === 'Celsius') return celsius;
            if (to === 'Fahrenheit') return (celsius * (9/5)) + 32;
            if (to === 'Kelvin') return celsius + 273.15;
        }

        // Format Number to avoid floating point precision issues like 0.300000000004
        function formatNumber(num) {
            // Maximum 6 decimal places, trailing zeros removed
            return parseFloat(num.toFixed(6));
        }

        // Save & Load Data
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
        }

        function loadData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    appState = { ...appState, ...parsed };
                } catch (e) {
                    console.error("Failed to parse conversion data");
                }
            }
        }

        function clearData() {
            if (confirm("Are you sure you want to clear your data and reset the calculator?")) {
                localStorage.removeItem(STORAGE_KEY);
                appState = {
                    category: 'length',
                    length: { from: 'Meter', to: 'Foot' },
                    weight: { from: 'Kilogram', to: 'Pound' },
                    temperature: { from: 'Celsius', to: 'Fahrenheit' },
                    lastInput: 'from',
                    inputValue: 1
                };
                inputFrom.value = "1";
                applyCategory(appState.category);
            }
        }

        // Run Init
        window.onload = init;
    </script>
</body>
