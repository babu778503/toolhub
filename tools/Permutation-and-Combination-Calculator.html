    <style>
        :root {
            --primary-color: #7c3aed; /* Violet */
            --primary-hover: #6d28d9;
            --header-bg: #111827;
            --header-text: #ffffff;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --header-height: 50px;
            --danger-color: #ef4444;
            --input-bg: #f9fafb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Tool Wrapper */
        .tool-wrapper {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        /* Input Section */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #4b5563;
            font-size: 0.95rem;
        }

        .helper-text {
            font-size: 0.8rem;
            color: #9ca3af;
            margin-bottom: 5px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.1rem;
            background-color: var(--input-bg);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
            background-color: #fff;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-clear {
            background-color: white;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        button:hover {
            opacity: 0.9;
        }

        /* Results Display */
        .result-section {
            display: none; /* Hidden by default */
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: #f5f3ff;
            border: 1px solid #ddd6fe;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .result-card.combination {
            background: #eff6ff;
            border-color: #bfdbfe;
        }

        .card-header {
            font-size: 1.1rem;
            font-weight: bold;
            color: #4b5563;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 10px;
        }

        .big-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-color);
            word-wrap: break-word;
            margin: 10px 0;
        }
        
        .combination .big-value {
            color: #2563eb; /* Blue for combination */
        }

        .formula-display {
            font-family: monospace;
            background: rgba(255,255,255,0.6);
            padding: 5px;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #555;
        }

        .error-msg {
            color: var(--danger-color);
            text-align: center;
            font-weight: bold;
            display: none;
            margin-bottom: 15px;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 0;
                margin: 0;
            }

            .tool-wrapper {
                border-radius: 0;
                box-shadow: none;
                border: none;
                width: 100%;
                min-height: calc(100vh - var(--header-height));
                padding: 20px;
            }

            .input-grid {
                grid-template-columns: 1fr;
            }

            .btn-row {
                flex-direction: column;
            }

            .result-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Permutation and Combination Calculator</h1>
    </header>

    <div class="container">
        <main class="tool-wrapper">
            
            <div id="error-message" class="error-msg"></div>

            <div class="input-grid">
                <!-- N Value -->
                <div class="input-group">
                    <label for="val-n">Total Objects (n)</label>
                    <div class="helper-text">The total size of the set.</div>
                    <input type="number" id="val-n" placeholder="e.g. 10" min="0" oninput="saveData()">
                </div>

                <!-- R Value -->
                <div class="input-group">
                    <label for="val-r">Sample Size (r)</label>
                    <div class="helper-text">Number of items selected.</div>
                    <input type="number" id="val-r" placeholder="e.g. 3" min="0" oninput="saveData()">
                </div>
            </div>

            <div class="btn-row">
                <button class="btn-calc" onclick="calculate()">Calculate</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div id="result-section" class="result-section">
                
                <!-- Permutation Result -->
                <div class="result-card">
                    <div class="card-header">Permutation (nPr)</div>
                    <div class="formula-display">Order Matters</div>
                    <div class="big-value" id="res-p">-</div>
                    <div class="formula-display">Formula: n! / (n-r)!</div>
                </div>

                <!-- Combination Result -->
                <div class="result-card combination">
                    <div class="card-header">Combination (nCr)</div>
                    <div class="formula-display">Order Doesn't Matter</div>
                    <div class="big-value" id="res-c">-</div>
                    <div class="formula-display">Formula: n! / (r! * (n-r)!)</div>
                </div>

            </div>

        </main>
    </div>

    <script>
        // --- Logic ---

        // Helper: Factorial
        function factorial(num) {
            if (num < 0) return -1;
            if (num === 0 || num === 1) return 1;
            // Prevent infinity loop or freeze for massive numbers
            if (num > 170) return Infinity; 
            
            let result = 1;
            for (let i = 2; i <= num; i++) {
                result *= i;
            }
            return result;
        }

        // Helper: Number Formatter
        function formatNumber(num) {
            if (num === Infinity) return "Too Large";
            if (num > 1e14) return num.toExponential(4);
            return num.toLocaleString();
        }

        function calculate() {
            const nInput = document.getElementById('val-n');
            const rInput = document.getElementById('val-r');
            const errorDiv = document.getElementById('error-message');
            const resultSection = document.getElementById('result-section');

            const n = parseInt(nInput.value);
            const r = parseInt(rInput.value);

            // Validation
            errorDiv.style.display = 'none';
            resultSection.style.display = 'none';

            if (isNaN(n) || isNaN(r)) {
                showError("Please enter valid numbers for n and r.");
                return;
            }

            if (n < 0 || r < 0) {
                showError("Values must be non-negative integers.");
                return;
            }

            if (r > n) {
                showError("Sample size (r) cannot be greater than Total objects (n).");
                return;
            }

            // Calculation
            // nPr = n! / (n-r)!
            // nCr = nPr / r!

            // Optimization: Calculate nPr without full factorial to avoid Infinity too early
            // nPr = n * (n-1) * ... * (n-r+1)
            let nPr = 1;
            for(let i = 0; i < r; i++) {
                nPr *= (n - i);
            }

            // Calculate r! for Combination
            const rFact = factorial(r);
            
            let nCr = 0;
            if (rFact === Infinity) {
                // If r! is infinite, check if nPr is also infinite.
                // Handling massive numbers logic is tricky in JS float, keep simple:
                nCr = Infinity; 
            } else {
                nCr = nPr / rFact;
            }

            // Update UI
            document.getElementById('res-p').textContent = formatNumber(nPr);
            document.getElementById('res-c').textContent = formatNumber(nCr);
            resultSection.style.display = 'grid';

            saveData();
        }

        function showError(msg) {
            const el = document.getElementById('error-message');
            el.textContent = msg;
            el.style.display = 'block';
        }

        // --- Data Persistence ---
        const STORAGE_KEY = 'permCombData';

        function saveData() {
            const data = {
                n: document.getElementById('val-n').value,
                r: document.getElementById('val-r').value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                if (data.n) document.getElementById('val-n').value = data.n;
                if (data.r) document.getElementById('val-r').value = data.r;
                
                // Auto calculate if data exists
                if (data.n && data.r) {
                    calculate();
                }
            }
        }

        function clearData() {
            document.getElementById('val-n').value = '';
            document.getElementById('val-r').value = '';
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('error-message').style.display = 'none';
            localStorage.removeItem(STORAGE_KEY);
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
