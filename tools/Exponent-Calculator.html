    <style>
        :root {
            --primary-color: #7c3aed; /* Violet */
            --primary-hover: #6d28d9;
            --header-bg: #111827;
            --header-text: #ffffff;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --header-height: 50px;
            --danger-color: #dc2626;
            --success-color: #059669;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tool-wrapper {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px; /* Focused width for this specific tool */
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        /* Input Visualization Area (x^n look) */
        .input-visual {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 5px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f9fafb;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 5px;
        }

        /* Base Input styling */
        .base-input input {
            width: 120px;
            height: 60px;
            font-size: 2rem;
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: white;
            color: var(--primary-color);
        }

        /* Exponent Input styling (Superscript look) */
        .exponent-input {
            margin-top: -10px; /* Lift it up */
        }

        .exponent-input input {
            width: 70px;
            height: 40px;
            font-size: 1.2rem;
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-clear {
            background-color: #fff;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            opacity: 0.9;
        }

        /* Result Section */
        .result-section {
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: #f5f3ff;
            border-left: 5px solid var(--primary-color);
            border-radius: 6px;

            text-align: center;

        .result-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-color);
            word-wrap: break-word;
        }

        .steps-box {
            margin-top: 20px;
            padding: 15px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            color: #4b5563;
        }

        .equation {
            font-family: "Courier New", Courier, monospace;
            font-weight: bold;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 0;
                margin: 0;
            }

            .tool-wrapper {
                border-radius: 0;
                box-shadow: none;
                border: none;
                width: 100%;
                min-height: calc(100vh - var(--header-height));
                padding: 20px;
            }

            .base-input input {
                width: 100px;
                font-size: 1.5rem;
            }

            .btn-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Exponent Calculator</h1>
    </header>

    <div class="container">
        <main class="tool-wrapper">
            
            <div class="input-visual">
                <div class="input-group base-input">
                    <label for="base">Base (x)</label>
                    <input type="number" id="base" placeholder="2" oninput="saveData()" step="any">
                </div>
                <div class="input-group exponent-input">
                    <label for="exponent">Exponent (n)</label>
                    <input type="number" id="exponent" placeholder="3" oninput="saveData()" step="any">
                </div>
            </div>

            <div class="btn-row">
                <button class="btn-calc" onclick="calculate()">Calculate</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div id="result-section" class="result-section">
                
                <div class="result-card">
                    <div class="result-label">Result</div>
                    <div class="result-value" id="final-result">-</div>
                </div>

                <div class="steps-box">
                    <strong>Explanation:</strong>
                    <div id="step-explanation" class="equation" style="margin-top: 10px;">
                        <!-- Steps injected here -->
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script>
        // --- Logic ---

        function calculate() {
            const baseStr = document.getElementById('base').value;
            const expStr = document.getElementById('exponent').value;

            if (baseStr === '' || expStr === '') {
                alert("Please enter both a Base and an Exponent.");
                return;
            }

            const base = parseFloat(baseStr);
            const exponent = parseFloat(expStr);

            // Calculation
            const result = Math.pow(base, exponent);

            // Formatting Result
            let displayResult;
            if (Math.abs(result) > 1e14 || (Math.abs(result) < 1e-6 && result !== 0)) {
                displayResult = result.toExponential(5);
            } else {
                // Round to reasonable decimals if float
                displayResult = parseFloat(result.toFixed(8)); 
            }

            document.getElementById('final-result').textContent = displayResult;

            // Generate Steps/Explanation
            generateSteps(base, exponent, displayResult);

            document.getElementById('result-section').style.display = 'block';
            saveData();
        }

        function generateSteps(base, exponent, result) {
            const container = document.getElementById('step-explanation');
            let html = `Calculated: ${base}<sup>${exponent}</sup> = ${result}`;

            // 1. Standard positive integer exponent
            if (Number.isInteger(exponent) && exponent > 0 && exponent < 11) {
                const parts = [];
                for(let i=0; i<exponent; i++) parts.push(base);
                html += `<br><br>Expanded: ${parts.join(' × ')} = ${result}`;
            }
            
            // 2. Exponent = 0
            else if (exponent === 0) {
                html += `<br><br>Rule: Any non-zero number raised to the power of 0 is 1.`;
            }

            // 3. Exponent = 1
            else if (exponent === 1) {
                html += `<br><br>Rule: Any number raised to the power of 1 is itself.`;
            }

            // 4. Negative Exponent
            else if (exponent < 0) {
                const posExp = Math.abs(exponent);
                html += `<br><br>Negative Exponent Rule: x<sup>-n</sup> = 1 / x<sup>n</sup>`;
                html += `<br>= 1 / ${base}<sup>${posExp}</sup>`;
                html += `<br>= 1 / ${Math.pow(base, posExp)}`;
                html += `<br>= ${result}`;
            }

            // 5. Fractional Exponent
            else if (!Number.isInteger(exponent)) {
                html += `<br><br>Fractional Exponent Calculation (Standard Power Function).`;
            }

            container.innerHTML = html;
        }


        // --- Data Persistence ---

        const STORAGE_KEY = 'exponentCalcData';

        function saveData() {
            const data = {
                base: document.getElementById('base').value,
                exponent: document.getElementById('exponent').value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                if (data.base) document.getElementById('base').value = data.base;
                if (data.exponent) document.getElementById('exponent').value = data.exponent;
                
                // Optional: Auto Calculate on load if data exists
                if (data.base && data.exponent) {
                    calculate();
                }
            }
        }

        function clearData() {
            document.getElementById('base').value = '';
            document.getElementById('exponent').value = '';
            document.getElementById('result-section').style.display = 'none';
            localStorage.removeItem(STORAGE_KEY);
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
