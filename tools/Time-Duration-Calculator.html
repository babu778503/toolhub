    <style>
        /* CSS Reset & Global Styles */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f7f9fc;
            color: #2d3748;
            -webkit-font-smoothing: antialiased;
        }

        /* Fixed Header - Exactly 50px */
        header {
            height: 50px;
            background-color: #2b6cb0;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        /* Main Container - Desktop Max Width 1200px */
        .container {
            max-width: 1200px;
            margin: 80px auto 30px auto; /* 50px header + 30px gap */
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .content-wrapper {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        /* Input Controls */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-group label {
            font-weight: 600;
            color: #4a5568;
            font-size: 15px;
        }

        input[type="time"] {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
            background-color: #fcfcfc;
            color: #2d3748;
            cursor: pointer;
        }

        input[type="time"]:focus {
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.15);
            background-color: #ffffff;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        button {
            padding: 15px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            flex: 1;
        }

        .btn-calc {
            background-color: #3182ce;
            color: white;
            box-shadow: 0 4px 6px rgba(49, 130, 206, 0.2);

        .btn-calc:hover {

        .btn-clear {

            color: #4a5568;

        .btn-clear:hover {

        }

        button:active {
            transform: translateY(1px);
        }

        /* Results Display */
        .result-box {
            display: none;
            margin-top: 25px;
            padding: 35px 20px;
            background: linear-gradient(135deg, #ebf8ff 0%, #bee3f8 100%);
            border: 1px solid #90cdf4;

        .result-box h2 {

        }
        
        .result-secondary {
            font-size: 18px;
            color: #2c5282;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .result-msg {
            font-size: 14px;
            color: #2c5282;
            line-height: 1.5;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 10px 15px;
            border-radius: 6px;
            display: inline-block;
        }

        /* Mobile Optimization: Remove side spacing completely */
        @media (max-width: 768px) {
            .container {
                margin: 50px 0 0 0; /* Exactly 50px top to clear fixed header, 0 side margins */
                border-radius: 0;
                box-shadow: none;
                width: 100%;
                max-width: 100%;
            }
            .content-wrapper {
                padding: 25px 15px; /* Comfortable padding inside, no empty container space outside */
            }
            .form-row {
                grid-template-columns: 1fr; /* Stack inputs on mobile */
                gap: 15px;
            }
            .action-buttons {
                flex-direction: column;
            }
            .result-value {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>

    <!-- Exactly 50px Fixed Header -->
    <header>
        <h1>Time Duration Calculator</h1>
    </header>

    <div class="container">
        <div class="content-wrapper">
            
            <div class="form-row">
                <div class="form-group">
                    <label for="startTime">Start Time</label>
                    <input type="time" id="startTime" required>
                </div>

                <div class="form-group">
                    <label for="endTime">End Time</label>
                    <input type="time" id="endTime" required>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-calc" onclick="calculateDuration()">Calculate Duration</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div class="result-box" id="resultBox">
                <h2>Total Duration</h2>
                <div class="result-value" id="resultValueMain">--</div>
                <div class="result-secondary" id="resultValueSub">--</div>
                <div class="result-msg" id="resultMsg"></div>
            </div>

        </div>
    </div>

    <!-- JavaScript integrated for functionality and auto-saving -->
    <script>
        // DOM Elements
        const startTimeInput = document.getElementById('startTime');
        const endTimeInput = document.getElementById('endTime');
        const resultBox = document.getElementById('resultBox');
        const resultValueMain = document.getElementById('resultValueMain');
        const resultValueSub = document.getElementById('resultValueSub');
        const resultMsg = document.getElementById('resultMsg');

        // Automatically load saved data from LocalStorage
        function loadSavedData() {
            if (localStorage.getItem('tdc_startTime')) {
                startTimeInput.value = localStorage.getItem('tdc_startTime');
            }
            if (localStorage.getItem('tdc_endTime')) {
                endTimeInput.value = localStorage.getItem('tdc_endTime');
            }
        }

        // Save data to LocalStorage automatically
        function saveCurrentData() {
            localStorage.setItem('tdc_startTime', startTimeInput.value);
            localStorage.setItem('tdc_endTime', endTimeInput.value);
        }

        // Attach event listeners for automatic saving upon input
        startTimeInput.addEventListener('input', saveCurrentData);
        endTimeInput.addEventListener('input', saveCurrentData);

        // Core Calculation Logic
        function calculateDuration() {
            const startTimeVal = startTimeInput.value;
            const endTimeVal = endTimeInput.value;

            // Trigger save
            saveCurrentData();

            // Input Validation
            if (!startTimeVal || !endTimeVal) {
                alert('Please select both Start Time and End Time.');
                return;
            }

            // Parse time into minutes from midnight
            const [startHours, startMins] = startTimeVal.split(':').map(Number);
            const [endHours, endMins] = endTimeVal.split(':').map(Number);

            let startTotalMinutes = (startHours * 60) + startMins;
            let endTotalMinutes = (endHours * 60) + endMins;
            let crossesMidnight = false;

            // Handle crossing midnight logic (if end time is earlier than start time)
            if (endTotalMinutes < startTotalMinutes) {
                endTotalMinutes += (24 * 60);
                crossesMidnight = true;
            }

            // Calculate exact difference
            const diffMinutesTotal = endTotalMinutes - startTotalMinutes;
            const diffHours = Math.floor(diffMinutesTotal / 60);
            const diffMinutes = diffMinutesTotal % 60;

            // Format Output text
            let mainResultText = "";
            if (diffHours > 0) {
                mainResultText += `${diffHours} Hour${diffHours > 1 ? 's' : ''} `;
            }
            if (diffMinutes > 0 || diffHours === 0) {
                mainResultText += `${diffMinutes} Minute${diffMinutes !== 1 ? 's' : ''}`;
            }

            // Total Minutes secondary output
            let subResultText = `Total: ${diffMinutesTotal} minutes`;

            // Display Results
            resultBox.style.display = 'block';
            resultValueMain.innerText = mainResultText.trim();
            resultValueSub.innerText = subResultText;

            // Additional context message
            if (crossesMidnight) {
                resultMsg.innerText = "Note: The end time is earlier than the start time, so we assumed the duration crosses over midnight into the next day.";
            } else if (diffMinutesTotal === 0) {
                resultMsg.innerText = "Start time and end time are exactly the same.";
            } else {
                resultMsg.innerText = "Duration calculated successfully.";
            }
        }

        // Clear Data Function
        function clearData() {
            // Reset fields
            startTimeInput.value = '';
            endTimeInput.value = '';
            
            // Hide result box
            resultBox.style.display = 'none';
            resultValueMain.innerText = '--';
            resultValueSub.innerText = '--';
            resultMsg.innerText = '';
            
            // Clear LocalStorage data
            localStorage.removeItem('tdc_startTime');
            localStorage.removeItem('tdc_endTime');
        }

        // Initialize tool on page load
        window.onload = loadSavedData;
    </script>
</body>
</html>
