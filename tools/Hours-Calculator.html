<!DOCTYPE html>
<!-- Category: Other Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hours Calculator</title>
    
    <!-- SEO & Technical SEO for AI Crawlers -->
    <meta name="description" content="Calculate the exact total hours and minutes between two times, including break deductions. Free online Hours Calculator tool with automatic save.">
    <meta name="keywords" content="Hours Calculator, time calculator, calculate work hours, timesheet calculator, hours between times, toolshub365.com, time duration tool">
    <meta name="robots" content="index, follow, max-snippet:-1, max-video-preview:-1, max-image-preview:large">
    <link rel="canonical" href="https://toolshub365.com/hours-calculator">
    
    <!-- Open Graph for Social and Search Engines -->
    <meta property="og:title" content="Hours Calculator">
    <meta property="og:description" content="Easily calculate work hours or time duration between two times. Features optional break deductions and auto-save.">
    <meta property="og:url" content="https://toolshub365.com/hours-calculator">
    <meta property="og:type" content="website">

    <!-- JSON-LD Schema Markup for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Hours Calculator",
      "url": "https://toolshub365.com/hours-calculator",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "All",
      "description": "An interactive web utility designed to calculate total hours and minutes between a start and end time, featuring offline auto-save and break deduction."
    }
    </script>

    <style>
        :root {
            --primary-color: #8b5cf6;
            --primary-hover: #7c3aed;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --bg-color: #f5f3ff;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --header-height: 50px;
        }

        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--header-height); /* Offset for fixed header */
            -webkit-font-smoothing: antialiased;
        }

        /* Header (Fixed 50px height) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Desktop Container (Max 1200px) */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Interactive UI Card */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="time"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #f8fafc;
            color: var(--text-main);
            transition: all 0.2s ease;
            outline: none;
            font-family: inherit;
        }

        input[type="time"]:focus,
        input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
            background-color: #ffffff;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            margin-top: 15px;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            color: #ffffff;
        }

        .btn-clear {
            background-color: var(--danger-color);
        }

        .btn-clear:hover {
            background-color: var(--danger-hover);
        }

        /* Results Display */
        .result-container {
            margin-top: 30px;
            padding: 25px 15px;
            background-color: #faf5ff;
            border: 1px solid #e9d5ff;
            border-radius: 8px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .result-label {
            font-size: 0.95rem;
            color: #6b21a8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .result-value-main {
            font-size: 2.5rem;
            font-weight: 800;
            color: #581c87;
            line-height: 1.2;
            margin-bottom: 5px;
        }

        .result-value-sub {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Mobile Adjustments */
        @media screen and (max-width: 768px) {
            .container {
                /* Both side blank space removed for mobile users */
                padding: 20px 0;
                width: 100%;
            }
            .card {
                /* Edge to edge layout */
                border-radius: 0;
                border-left: none;
                border-right: none;
                box-shadow: none;
                padding: 20px 15px;
            }
            .row {
                flex-direction: column;
                gap: 20px;
            }
            .result-value-main {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Hours Calculator</h1>
    </header>

    <div class="container">
        <div class="card">
            
            <div class="row">
                <div class="col">
                    <label for="startTime">Start Time</label>
                    <input type="time" id="startTime" required>
                </div>
                <div class="col">
                    <label for="endTime">End Time</label>
                    <input type="time" id="endTime" required>
                </div>
            </div>

            <div class="form-group">
                <label for="breakTime">Break Time Deduction (Minutes)</label>
                <input type="number" id="breakTime" min="0" placeholder="e.g. 30">
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-clear" id="clearDataBtn">Clear Data</button>
            </div>

            <div class="result-container">
                <div class="result-label">Total Duration</div>
                <div id="resultValueMain" class="result-value-main">0h 0m</div>
                <div id="resultValueSub" class="result-value-sub">0.00 Decimal Hours</div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const startTimeInput = document.getElementById('startTime');
            const endTimeInput = document.getElementById('endTime');
            const breakTimeInput = document.getElementById('breakTime');
            const resultValueMain = document.getElementById('resultValueMain');
            const resultValueSub = document.getElementById('resultValueSub');
            const clearDataBtn = document.getElementById('clearDataBtn');

            // Load Saved Data
            loadData();

            // Event Listeners for auto-calculation and auto-save
            const inputs = [startTimeInput, endTimeInput, breakTimeInput];
            inputs.forEach(input => {
                input.addEventListener('input', updateAndSave);
            });
            
            // Clear Data Event
            clearDataBtn.addEventListener('click', clearData);

            // Time parsing helper
            function parseTimeToMinutes(timeStr) {
                if (!timeStr) return 0;
                const[hours, minutes] = timeStr.split(':').map(Number);
                return (hours * 60) + minutes;
            }

            // Calculation Logic
            function calculateHours() {
                const startVal = startTimeInput.value;
                const endVal = endTimeInput.value;
                const breakVal = parseInt(breakTimeInput.value) || 0;

                if (!startVal || !endVal) {
                    resultValueMain.textContent = '0h 0m';
                    resultValueSub.textContent = '0.00 Decimal Hours';
                    return;
                }

                const startMinutes = parseTimeToMinutes(startVal);
                let endMinutes = parseTimeToMinutes(endVal);

                // Handle passing midnight
                if (endMinutes < startMinutes) {
                    endMinutes += 24 * 60; // add 24 hours
                }

                // Calculate total duration
                let totalMinutes = endMinutes - startMinutes - breakVal;

                // Prevent negative time if break is longer than worked hours
                if (totalMinutes < 0) {
                    totalMinutes = 0;
                }

                const hours = Math.floor(totalMinutes / 60);
                const minutes = totalMinutes % 60;
                const decimalHours = (totalMinutes / 60).toFixed(2);

                // Update UI
                resultValueMain.textContent = `${hours}h ${minutes}m`;
                resultValueSub.textContent = `${decimalHours} Decimal Hours`;
            }

            // Save Data to Local Storage
            function updateAndSave() {
                calculateHours();
                
                const data = {
                    startTime: startTimeInput.value,
                    endTime: endTimeInput.value,
                    breakTime: breakTimeInput.value
                };
                localStorage.setItem('hoursCalcData_toolshub365', JSON.stringify(data));
            }

            // Load Data from Local Storage
            function loadData() {
                const savedData = localStorage.getItem('hoursCalcData_toolshub365');
                if (savedData) {
                    try {
                        const data = JSON.parse(savedData);
                        if (data.startTime) startTimeInput.value = data.startTime;
                        if (data.endTime) endTimeInput.value = data.endTime;
                        if (data.breakTime) breakTimeInput.value = data.breakTime;
                        
                        calculateHours();
                    } catch (e) {
                        console.error('Error parsing saved data', e);
                        calculateHours();
                    }
                }
            }

            // Clear Data Function
            function clearData() {
                startTimeInput.value = '';
                endTimeInput.value = '';
                breakTimeInput.value = '';
                
                localStorage.removeItem('hoursCalcData_toolshub365');
                calculateHours();
            }
        });
    </script>
</body>
</html>
