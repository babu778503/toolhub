<!DOCTYPE html>
<!-- Category: Financial Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto Loan Calculator</title>
    <meta name="description" content="Free online Auto Loan Calculator by toolshub365.com. Calculate monthly car payments, interest rates, trade-in values, and sales tax instantly. Mobile-friendly.">
    <meta name="keywords" content="Auto Loan Calculator, Car Payment Calculator, Vehicle Loan Estimator, Car Finance Tool, Monthly Car Payment, toolshub365">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/auto-loan-calculator">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://toolshub365.com/auto-loan-calculator">
    <meta property="og:title" content="Auto Loan Calculator">
    <meta property="og:description" content="Calculate your monthly car payment including trade-in, tax, and fees.">
    
    <!-- Technical SEO for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Auto Loan Calculator",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": "Calculate monthly car payment, Trade-in estimation, Sales tax calculation, Auto-save data"
    }
    </script>

    <style>
        :root {
            /* Theme Colors: Automotive Blue/Slate */
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dce1e6;
            --header-height: 50px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height); /* Space for fixed header */
            -webkit-font-smoothing: antialiased;
        }

        /* --- Header --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* --- Main Container --- */
        .container {
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Desktop Specifics */
        @media (min-width: 769px) {
            .container {
                max-width: 1200px;
                padding: 40px 20px;
            }
            .col-left, .col-right {
                flex: 1;
                background: var(--card-bg);
                border-radius: 8px;
                padding: 30px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            }
        }

        /* Mobile Specifics */
        @media (max-width: 768px) {
            .container {
                padding: 0; /* Remove blank space */
                gap: 0;
            }
            .col-left, .col-right {
                width: 100%;
                border-radius: 0;
                padding: 25px 15px;
                background: var(--card-bg);
                border-bottom: 1px solid var(--border-color);
            }
            /* Stack order: Input first, then results */
            .col-left { order: 1; }
            .col-right { order: 2; }
        }

        /* --- Typography & Titles --- */
        h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--primary-color);
            border-left: 4px solid var(--secondary-color);
            padding-left: 10px;
        }

        /* --- Form Elements --- */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-prefix, .input-suffix {
            position: absolute;
            color: #777;
            font-weight: 500;
            font-size: 0.95rem;
            pointer-events: none;
        }

        .input-prefix { left: 12px; }
        .input-suffix { right: 12px; }

        input[type="number"] {
            width: 100%;
            padding: 12px 12px 12px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            -moz-appearance: textfield;
            background-color: #fafafa;
        }

        /* Adjust padding based on prefix/suffix */
        .has-prefix input { padding-left: 25px; }
        .has-suffix input { padding-right: 35px; }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"]:focus {
            border-color: var(--secondary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
            background-color: #fff;
        }

        .range-slider {
            width: 100%;
            margin-top: 8px;
            accent-color: var(--secondary-color);
            cursor: pointer;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            appearance: none;
        }
        
        /* --- Buttons --- */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-clear {
            background-color: #e0e0e0;
            color: #555;
        }
        
        .btn-clear:hover {
            background-color: #d5d5d5;
        }

        button:active {
            transform: scale(0.98);
        }

        /* --- Results Section --- */
        .result-header {
            text-align: center;
            margin-bottom: 30px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .payment-label {
            font-size: 0.85rem;
            color: #777;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .monthly-payment {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1.1;
        }

        /* CSS Chart (Donut) */
        .chart-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            position: relative;
        }

        .donut-chart {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            /* Conic gradient set dynamically via JS */
            background: conic-gradient(var(--secondary-color) 0deg 360deg); 
            position: relative;
            transition: background 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .donut-hole {
            width: 160px;
            height: 160px;
            background: var(--card-bg);
            border-radius: 50%;
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .donut-total-label {
            font-size: 0.8rem;
            color: #999;
        }
        
        .donut-total-val {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
        }

        /* Breakdown List */
        .breakdown-list {
            list-style: none;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }

        .breakdown-item:last-child {
            border-bottom: none;
            border-top: 2px solid #eee;
            margin-top: 5px;
            font-weight: 700;
            font-size: 1.05rem;
        }

        .legend-indicator {
            display: flex;
            align-items: center;
        }

        .legend-color {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-right: 10px;
        }

        /* Colors for Chart/Legend */
        .c-principal { background-color: var(--secondary-color); } /* Loan Amount */
        .c-interest { background-color: var(--accent-color); }
        .c-tax { background-color: var(--success-color); }
        .c-fees { background-color: #f39c12; }

    </style>
</head>
<body>

<header>
    <h1>Auto Loan Calculator</h1>
</header>

<div class="container">
    <!-- Input Section -->
    <div class="col-left">
        <h2>Vehicle Details</h2>
        <form id="autoLoanForm">
            
            <!-- Vehicle Price -->
            <div class="form-group">
                <label for="vehiclePrice">Vehicle Price</label>
                <div class="input-wrapper has-prefix">
                    <span class="input-prefix">$</span>
                    <input type="number" id="vehiclePrice" min="0" step="100" placeholder="35000">
                </div>
            </div>

            <!-- Down Payment -->
            <div class="form-group">
                <label for="downPayment">Down Payment</label>
                <div class="input-wrapper has-prefix">
                    <span class="input-prefix">$</span>
                    <input type="number" id="downPayment" min="0" placeholder="5000">
                </div>
            </div>

            <!-- Trade-in Value -->
            <div class="form-group">
                <label for="tradeIn">Trade-in Value</label>
                <div class="input-wrapper has-prefix">
                    <span class="input-prefix">$</span>
                    <input type="number" id="tradeIn" min="0" placeholder="0">
                </div>
            </div>

            <!-- Sales Tax -->
            <div class="form-group">
                <label for="salesTax">Sales Tax</label>
                <div class="input-wrapper has-suffix">
                    <input type="number" id="salesTax" min="0" max="20" step="0.1" placeholder="7">
                    <span class="input-suffix">%</span>
                </div>
            </div>

            <!-- Other Fees -->
            <div class="form-group">
                <label for="fees">Title, Registration & Fees</label>
                <div class="input-wrapper has-prefix">
                    <span class="input-prefix">$</span>
                    <input type="number" id="fees" min="0" placeholder="400">
                </div>
            </div>

            <hr style="border: 0; border-top: 1px dashed #ccc; margin: 25px 0;">

            <!-- Interest Rate -->
            <div class="form-group">
                <label for="interestRate">Interest Rate (APR)</label>
                <div class="input-wrapper has-suffix">
                    <input type="number" id="interestRate" min="0" max="30" step="0.1" placeholder="6.5">
                    <span class="input-suffix">%</span>
                </div>
                <input type="range" class="range-slider" id="rateSlider" min="0" max="25" step="0.1" value="6.5">
            </div>

            <!-- Loan Term -->
            <div class="form-group">
                <label for="loanTerm">Loan Term (Months)</label>
                <div class="input-wrapper has-suffix">
                    <input type="number" id="loanTerm" min="12" max="96" step="12" placeholder="60">
                    <span class="input-suffix">Months</span>
                </div>
                <div style="margin-top:8px; display:flex; gap:5px;">
                    <button type="button" class="term-btn" onclick="setTerm(36)" style="padding:6px; font-size:0.8rem; background:#eee; color:#333;">36</button>
                    <button type="button" class="term-btn" onclick="setTerm(48)" style="padding:6px; font-size:0.8rem; background:#eee; color:#333;">48</button>
                    <button type="button" class="term-btn" onclick="setTerm(60)" style="padding:6px; font-size:0.8rem; background:#eee; color:#333;">60</button>
                    <button type="button" class="term-btn" onclick="setTerm(72)" style="padding:6px; font-size:0.8rem; background:#eee; color:#333;">72</button>
                    <button type="button" class="term-btn" onclick="setTerm(84)" style="padding:6px; font-size:0.8rem; background:#eee; color:#333;">84</button>
                </div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn-clear" id="clearBtn">Clear Data</button>
            </div>
        </form>
    </div>

    <!-- Results Section -->
    <div class="col-right">
        <h2>Loan Summary</h2>
        <div class="result-header">
            <div class="payment-label">Estimated Monthly Payment</div>
            <div class="monthly-payment" id="outMonthlyPayment">$0.00</div>
        </div>

        <div class="chart-container">
            <div class="donut-chart" id="chartVisual"></div>
            <div class="donut-hole">
                <span class="donut-total-label">Total Cost</span>
                <span class="donut-total-val" id="outTotalCost">$0k</span>
            </div>
        </div>

        <ul class="breakdown-list">
            <li class="breakdown-item">
                <div class="legend-indicator">
                    <span class="legend-color c-principal"></span>
                    <span>Loan Amount</span>
                </div>
                <strong id="outLoanAmount">$0.00</strong>
            </li>
            <li class="breakdown-item">
                <div class="legend-indicator">
                    <span class="legend-color c-tax"></span>
                    <span>Sales Tax</span>
                </div>
                <strong id="outSalesTax">$0.00</strong>
            </li>
            <li class="breakdown-item">
                <div class="legend-indicator">
                    <span class="legend-color c-fees"></span>
                    <span>Fees</span>
                </div>
                <strong id="outFees">$0.00</strong>
            </li>
            <li class="breakdown-item">
                <div class="legend-indicator">
                    <span class="legend-color c-interest"></span>
                    <span>Total Interest</span>
                </div>
                <strong id="outTotalInterest">$0.00</strong>
            </li>
            <li class="breakdown-item">
                <span>Total Cost (Price + Tax + Fees + Int)</span>
                <strong id="outFinalTotal">$0.00</strong>
            </li>
        </ul>
    </div>
</div>

<script>
    // Global setTerm function for the quick buttons
    function setTerm(months) {
        document.getElementById('loanTerm').value = months;
        document.getElementById('loanTerm').dispatchEvent(new Event('input'));
    }

    document.addEventListener('DOMContentLoaded', function() {
        // --- DOM Elements ---
        const inputs = {
            vehiclePrice: document.getElementById('vehiclePrice'),
            downPayment: document.getElementById('downPayment'),
            tradeIn: document.getElementById('tradeIn'),
            salesTax: document.getElementById('salesTax'),
            fees: document.getElementById('fees'),
            interestRate: document.getElementById('interestRate'),
            rateSlider: document.getElementById('rateSlider'),
            loanTerm: document.getElementById('loanTerm')
        };

        const outputs = {
            monthlyPayment: document.getElementById('outMonthlyPayment'),
            loanAmount: document.getElementById('outLoanAmount'),
            salesTax: document.getElementById('outSalesTax'),
            fees: document.getElementById('outFees'),
            totalInterest: document.getElementById('outTotalInterest'),
            totalCost: document.getElementById('outTotalCost'), // Inner Circle
            finalTotal: document.getElementById('outFinalTotal'), // List Bottom
            chartVisual: document.getElementById('chartVisual')
        };

        const clearBtn = document.getElementById('clearBtn');

        // --- Defaults ---
        const DEFAULTS = {
            vehiclePrice: 35000,
            downPayment: 5000,
            tradeIn: 0,
            salesTax: 7,
            fees: 400,
            interestRate: 6.5,
            loanTerm: 60
        };

        // --- Helper: Format Currency ---
        const formatMoney = (num) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num);
        };

        // --- Calculation Logic ---
        const calculate = () => {
            // Get values safely
            let price = parseFloat(inputs.vehiclePrice.value) || 0;
            let down = parseFloat(inputs.downPayment.value) || 0;
            let trade = parseFloat(inputs.tradeIn.value) || 0;
            let taxRate = parseFloat(inputs.salesTax.value) || 0;
            let fees = parseFloat(inputs.fees.value) || 0;
            let rate = parseFloat(inputs.interestRate.value) || 0;
            let months = parseFloat(inputs.loanTerm.value) || 0;

            // Sync Slider
            inputs.rateSlider.value = rate;

            // 1. Calculate Taxable Amount
            // Standard: (Price - TradeIn) is taxable in most US states. 
            // Some states tax the full price. We will use (Price - TradeIn) as the common standard.
            let taxableAmount = Math.max(0, price - trade);
            let taxAmount = taxableAmount * (taxRate / 100);

            // 2. Calculate Loan Principal
            // Principal = Price - Down - TradeIn + Tax + Fees
            // (Note: Usually Down Payment is applied after tax, so we add tax/fees first then subtract down/trade)
            let totalCashRequired = price + taxAmount + fees;
            let principal = totalCashRequired - down - trade;
            
            if (principal < 0) principal = 0;

            // 3. Calculate Monthly Payment
            let monthlyRate = (rate / 100) / 12;
            let monthlyPayment = 0;
            let totalInterest = 0;

            if (months > 0) {
                if (rate === 0) {
                    monthlyPayment = principal / months;
                } else {
                    let x = Math.pow(1 + monthlyRate, months);
                    if (isFinite(x) && x !== 1) {
                        monthlyPayment = (principal * x * monthlyRate) / (x - 1);
                    }
                }
            }

            // 4. Totals
            let totalPayments = monthlyPayment * months;
            totalInterest = totalPayments - principal;
            if (totalInterest < 0) totalInterest = 0; // Edge case if principal is 0

            let grandTotalCost = totalPayments + down + trade; 
            // Grand Total Cost = Total Loan Payments + Down Payment + Trade In Value (Asset used)
            // Alternatively, user might just want "Total Cost of purchase" = Price + Tax + Fees + Interest.
            // Let's display "Total Cost" as (Principal + Interest + Down + Trade) which equals (Price + Tax + Fees + Interest).
            let displayTotalCost = price + taxAmount + fees + totalInterest;

            // --- Update UI Text ---
            outputs.monthlyPayment.innerText = formatMoney(monthlyPayment);
            outputs.loanAmount.innerText = formatMoney(principal);
            outputs.salesTax.innerText = formatMoney(taxAmount);
            outputs.fees.innerText = formatMoney(fees);
            outputs.totalInterest.innerText = formatMoney(totalInterest);
            outputs.totalCost.innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumSignificantDigits: 3 }).format(displayTotalCost);
            outputs.finalTotal.innerText = formatMoney(displayTotalCost);

            // --- Update Chart ---
            updateChart(principal, taxAmount, fees, totalInterest);
            saveData();
        };

        const updateChart = (principal, tax, fees, interest) => {
            let total = principal + tax + fees + interest;
            
            if (total > 0) {
                // Calculate percentages
                let pPct = (principal / total) * 100;
                let tPct = (tax / total) * 100;
                let fPct = (fees / total) * 100;
                // Interest is the rest

                // Gradient stops
                let stop1 = pPct;
                let stop2 = stop1 + tPct;
                let stop3 = stop2 + fPct;

                // Color mapping:
                // Principal: secondary-color
                // Tax: success-color
                // Fees: orange (#f39c12)
                // Interest: accent-color

                outputs.chartVisual.style.background = `conic-gradient(
                    var(--secondary-color) 0% ${stop1}%,
                    var(--success-color) ${stop1}% ${stop2}%,
                    #f39c12 ${stop2}% ${stop3}%,
                    var(--accent-color) ${stop3}% 100%
                )`;
            } else {
                outputs.chartVisual.style.background = '#e0e0e0';
            }
        };

        // --- Data Persistence ---
        const saveData = () => {
            const data = {
                vehiclePrice: inputs.vehiclePrice.value,
                downPayment: inputs.downPayment.value,
                tradeIn: inputs.tradeIn.value,
                salesTax: inputs.salesTax.value,
                fees: inputs.fees.value,
                interestRate: inputs.interestRate.value,
                loanTerm: inputs.loanTerm.value
            };
            localStorage.setItem('autoLoanData_v1', JSON.stringify(data));
        };

        const loadData = () => {
            const saved = localStorage.getItem('autoLoanData_v1');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    inputs.vehiclePrice.value = data.vehiclePrice;
                    inputs.downPayment.value = data.downPayment;
                    inputs.tradeIn.value = data.tradeIn;
                    inputs.salesTax.value = data.salesTax;
                    inputs.fees.value = data.fees;
                    inputs.interestRate.value = data.interestRate;
                    inputs.loanTerm.value = data.loanTerm;
                } catch (e) {
                    console.error("Error loading data", e);
                    resetDefaults();
                }
            } else {
                resetDefaults();
            }
            calculate();
        };

        const resetDefaults = () => {
            inputs.vehiclePrice.value = DEFAULTS.vehiclePrice;
            inputs.downPayment.value = DEFAULTS.downPayment;
            inputs.tradeIn.value = DEFAULTS.tradeIn;
            inputs.salesTax.value = DEFAULTS.salesTax;
            inputs.fees.value = DEFAULTS.fees;
            inputs.interestRate.value = DEFAULTS.interestRate;
            inputs.loanTerm.value = DEFAULTS.loanTerm;
        };

        const clearData = () => {
            localStorage.removeItem('autoLoanData_v1');
            // Clear inputs visually to standard or empty
            inputs.vehiclePrice.value = '';
            inputs.downPayment.value = '';
            inputs.tradeIn.value = '';
            inputs.salesTax.value = '';
            inputs.fees.value = '';
            inputs.interestRate.value = '';
            inputs.loanTerm.value = 60;
            calculate();
        };

        // --- Event Listeners ---
        Object.values(inputs).forEach(input => {
            input.addEventListener('input', calculate);
        });

        inputs.rateSlider.addEventListener('input', function() {
            inputs.interestRate.value = this.value;
            calculate();
        });

        inputs.interestRate.addEventListener('input', function() {
            inputs.rateSlider.value = this.value;
        });

        clearBtn.addEventListener('click', clearData);

        // Init
        loadData();
    });
</script>

</body>
</html>
