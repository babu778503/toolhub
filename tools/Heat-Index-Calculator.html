<head>

    <!-- Schema.org Markup for AI Crawlers -->

    <style>
        /* CSS Variables */
        :root {
            --primary-color: #e74c3c;
            --primary-dark: #c0392b;
            --bg-color: #f9fbfc;
            --box-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dcdde1;
            
            /* Risk Colors */
            --safe: #27ae60;
            --caution: #f1c40f;
            --extreme-caution: #e67e22;
            --danger: #e74c3c;
            --extreme-danger: #8e44ad;
        }

        /* Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Clears fixed header */
        }

        /* Header (Fixed 50px height) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: var(--primary-color);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Desktop Container */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            background: var(--box-bg);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 30px;
        }

        /* Layout Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* Form Elements */
        .section-title {
            font-size: 18px;
            color: var(--primary-dark);
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--border-color);
            font-weight: 600;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #555;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 2;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-group select {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 16px;
            outline: none;
            background-color: #fff;
        }

        .form-group input:focus, .input-group select:focus {
            border-color: var(--primary-color);
        }

        /* Full width input for humidity */
        .full-width-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }
        .full-width-input:focus {
            border-color: var(--primary-color);
        }

        /* Clear Button */
        .btn-clear {
            width: 100%;
            padding: 14px;
            background-color: #95a5a6;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .btn-clear:hover {
            background-color: #7f8c8d;
        }

        /* Results Section */
        .results-box {
            background: #fff;
            border: 1px solid #ffeaea;
            border-radius: 8px;
            padding: 25px;
            height: 100%;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 10px rgba(231, 76, 60, 0.05);
        }

        .result-main {
            text-align: center;
            margin: 20px 0;
            padding: 25px;
            background-color: #fdf2f2;
            border-radius: 8px;
            border: 2px solid var(--primary-color);
            transition: all 0.3s ease;
        }

        .result-main h3 {
            font-size: 16px;
            color: #555;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .result-value {
            font-size: 38px;
            font-weight: bold;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }

        .result-sub {
            font-size: 18px;
            color: #777;
        }

        .risk-level {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            background-color: #eee;
            color: #333;
            transition: all 0.3s ease;
        }

        .risk-desc {
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.6;
            color: #555;
            text-align: justify;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .container {
                max-width: 100%;
                margin: 0;
                padding: 20px 0; /* Removes both side blank space visually outside container */
                border-radius: 0;
                box-shadow: none;
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .inner-padding {
                padding: 0 15px; /* Keeps text from touching edge inside */
            }
            .form-row {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Heat Index Calculator</h1>
    </header>

    <div class="container">
        <div class="grid">
            
            <!-- Input Section -->
            <div class="inner-padding">
                <div class="section-title">Environmental Conditions</div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="temp">Air Temperature</label>
                        <div class="input-group">
                            <input type="number" id="temp" placeholder="e.g. 90" step="any">
                            <select id="tempUnit">
                                <option value="F">&deg;F</option>
                                <option value="C">&deg;C</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="humidity">Relative Humidity (%)</label>
                        <input type="number" id="humidity" class="full-width-input" placeholder="e.g. 60" min="0" max="100" step="any">
                    </div>
                </div>

                <button class="btn-clear" id="clearBtn">Clear Data</button>
            </div>

            <!-- Result Section -->
            <div class="inner-padding">
                <div class="results-box">
                    <div class="section-title">Feels Like</div>
                    
                    <div class="result-main" id="resultBox">
                        <h3>Heat Index</h3>
                        <div class="result-value" id="resF">-- &deg;F</div>
                        <div class="result-sub" id="resC">-- &deg;C</div>
                    </div>

                    <div class="risk-level" id="riskLevel">
                        Awaiting Input...
                    </div>
                    
                    <div class="risk-desc" id="riskDesc">
                        Enter the air temperature and relative humidity to see the calculated heat index and relevant safety warnings.
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- JavaScript for Functionality and Auto-Save -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const tempInput = document.getElementById("temp");
            const tempUnit = document.getElementById("tempUnit");
            const humidityInput = document.getElementById("humidity");
            const clearBtn = document.getElementById("clearBtn");

            // Load saved data and initialize
            loadData();
            calculate();

            // Event Listeners for auto-save and real-time calculation
            [tempInput, tempUnit, humidityInput].forEach(el => {
                el.addEventListener("input", () => {
                    saveData();
                    calculate();
                });
            });

            // Clear Data Button Logic
            clearBtn.addEventListener("click", () => {
                if(confirm("Are you sure you want to clear all data?")) {
                    clearData();
                }
            });
        });

        // NOAA Heat Index Calculation Method
        function computeHeatIndexF(t, rh) {
            // If temperature is below 80F, the Heat Index is equal to the actual temperature
            // A simple formula is used to check if full formula is needed
            let hi = 0.5 * (t + 61.0 + ((t - 68.0) * 1.2) + (rh * 0.094));
            
            if (hi >= 80) {
                // Full Rothfusz regression
                hi = -42.379 + 2.04901523*t + 10.14333127*rh - 0.22475541*t*rh - 0.00683783*t*t - 0.05481717*rh*rh + 0.00122874*t*t*rh + 0.00085282*t*rh*rh - 0.00000199*t*t*rh*rh;
                
                // Adjustments
                if (rh < 13 && t >= 80 && t <= 112) {
                    hi -= ((13 - rh) / 4) * Math.sqrt((17 - Math.abs(t - 95)) / 17);
                } else if (rh > 85 && t >= 80 && t <= 87) {
                    hi += ((rh - 85) / 10) * ((87 - t) / 5);
                }
            }
            return hi;
        }

        function calculate() {
            let temp = parseFloat(document.getElementById("temp").value);
            const unit = document.getElementById("tempUnit").value;
            let rh = parseFloat(document.getElementById("humidity").value);

            const resF = document.getElementById("resF");
            const resC = document.getElementById("resC");
            const riskLevel = document.getElementById("riskLevel");
            const riskDesc = document.getElementById("riskDesc");
            const resultBox = document.getElementById("resultBox");

            // Validate inputs
            if (isNaN(temp) || isNaN(rh)) {
                resF.innerHTML = "-- &deg;F";
                resC.innerHTML = "-- &deg;C";
                riskLevel.innerText = "Awaiting Input...";
                riskLevel.style.backgroundColor = "#eee";
                riskLevel.style.color = "#333";
                riskDesc.innerText = "Enter the air temperature and relative humidity to see the calculated heat index and relevant safety warnings.";
                resultBox.style.borderColor = "var(--primary-color)";
                return;
            }

            // Cap humidity between 0 and 100
            if (rh < 0) rh = 0;
            if (rh > 100) rh = 100;

            // Convert temp to Fahrenheit for calculation if needed
            let tempF = (unit === "C") ? (temp * 9/5) + 32 : temp;
            
            // Calculate Heat Index in Fahrenheit
            let heatIndexF = computeHeatIndexF(tempF, rh);
            
            // Convert Heat Index back to Celsius
            let heatIndexC = (heatIndexF - 32) * 5/9;

            // Update UI with calculated values
            resF.innerHTML = heatIndexF.toFixed(1) + " &deg;F";
            resC.innerHTML = heatIndexC.toFixed(1) + " &deg;C";

            // Determine Risk Level based on NOAA categories (Uses Fahrenheit)
            let color = "";
            let textColor = "#fff";
            let levelText = "";
            let descText = "";

            if (heatIndexF < 80) {
                levelText = "Normal / Safe";
                color = "var(--safe)";
                descText = "No significant heat-related risk. The perceived temperature is close to the actual air temperature.";
            } else if (heatIndexF >= 80 && heatIndexF < 90) {
                levelText = "Caution";
                color = "var(--caution)";
                textColor = "#333";
                descText = "Fatigue is possible with prolonged exposure and physical activity.";
            } else if (heatIndexF >= 90 && heatIndexF < 103) {
                levelText = "Extreme Caution";
                color = "var(--extreme-caution)";
                descText = "Sunstroke, muscle cramps, and heat exhaustion are possible with prolonged exposure and physical activity.";
            } else if (heatIndexF >= 103 && heatIndexF < 125) {
                levelText = "Danger";
                color = "var(--danger)";
                descText = "Sunstroke, muscle cramps, and heat exhaustion are likely. Heatstroke is possible with prolonged exposure and physical activity.";
            } else {
                levelText = "Extreme Danger";
                color = "var(--extreme-danger)";
                descText = "Heatstroke or sunstroke is highly likely. Seek cooling and hydration immediately.";
            }

            // Apply risk styles
            riskLevel.innerText = levelText;
            riskLevel.style.backgroundColor = color;
            riskLevel.style.color = textColor;
            resultBox.style.borderColor = color;
            riskDesc.innerText = descText;
        }

        function saveData() {
            const data = {
                temp: document.getElementById("temp").value,
                tempUnit: document.getElementById("tempUnit").value,
                humidity: document.getElementById("humidity").value
            };
            localStorage.setItem("heatIndexCalcData", JSON.stringify(data));
        }

        function loadData() {
            const data = JSON.parse(localStorage.getItem("heatIndexCalcData"));
            if (data) {
                if (data.temp !== undefined) document.getElementById("temp").value = data.temp;
                if (data.tempUnit) document.getElementById("tempUnit").value = data.tempUnit;
                if (data.humidity !== undefined) document.getElementById("humidity").value = data.humidity;
            }
        }

        function clearData() {
            localStorage.removeItem("heatIndexCalcData");
            document.getElementById("temp").value = "";
            document.getElementById("tempUnit").value = "F";
            document.getElementById("humidity").value = "";
            calculate();
        }
    </script>
</body>
</html>
