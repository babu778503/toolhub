<head>

    <style>
        /* --- CSS Reset & Variables --- */
        :root {
            --primary-color: #2980b9;
            --primary-hover: #21618c;
            --secondary-bg: #ecf0f1;
            --container-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #bdc3c7;
            --header-height: 50px;
            --shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--secondary-bg);
            color: var(--text-color);
            padding-top: var(--header-height); /* Prevent content hiding behind fixed header */
            min-height: 100vh;
        }

        /* --- Fixed Header --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        /* --- Main Container --- */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 30px auto;
            background-color: var(--container-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- Input Section --- */
        .input-group {
            width: 100%;
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            transition: border-color 0.3s;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(41, 128, 185, 0.1);
        }

        /* --- Buttons --- */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
            flex: 2;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
            flex: 1;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        .btn:active {
            transform: translateY(2px);
        }

        /* --- Results Section --- */
        #result-area {
            display: none; /* Hidden initially */
            animation: fadeIn 0.4s ease-out;
        }

        .result-card {
            background-color: #f8f9fa;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
        }

        .result-content {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #333;
            word-wrap: break-word;
        }

        .number-badge {
            display: inline-block;
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            margin: 3px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;
                margin: 0; /* Remove top margin, handled by body padding */
                padding: 20px;
                border-radius: 0;
                box-shadow: none;
                min-height: calc(100vh - var(--header-height));
            }

            .btn-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Factor Calculator</h1>
    </header>

    <div class="container">
        
        <div class="input-group">
            <label for="inputNumber">Enter a Positive Integer</label>
            <div class="input-wrapper">
                <input type="number" id="inputNumber" placeholder="e.g. 36" min="1" step="1" oninput="autoSave()">
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-calc" onclick="calculateFactors()">Calculate Factors</button>
            <button class="btn btn-clear" onclick="clearData()">Clear Data</button>
        </div>

        <div id="result-area">
            
            <div class="summary-stats">
                <div class="stat-box">
                    <div class="stat-val" id="totalFactorsCount">0</div>
                    <div class="stat-label">Total Factors</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="isPrimeBox">No</div>
                    <div class="stat-label">Is Prime?</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="sumFactors">0</div>
                    <div class="stat-label">Sum of Factors</div>
                </div>
            </div>

            <div class="result-card">
                <div class="result-title">Factors</div>
                <div class="result-content" id="factorsList"></div>
            </div>

            <div class="result-card">
                <div class="result-title">Factor Pairs</div>
                <div class="result-content" id="factorPairs"></div>
            </div>

            <div class="result-card">
                <div class="result-title">Prime Factorization</div>
                <div class="result-content" id="primeFactors" style="font-size: 1.3rem; font-weight: bold; color: var(--primary-color);"></div>
            </div>
            
        </div>

    </div>

    <script>
        // --- Calculation Logic ---

        function calculateFactors() {
            const input = document.getElementById('inputNumber').value;
            const n = parseInt(input);

            if (isNaN(n) || n <= 0 || !Number.isInteger(n)) {
                alert("Please enter a valid positive integer greater than 0.");
                return;
            }

            // 1. Find Factors and Pairs
            let factors = [];
            let pairs = [];
            let sum = 0;

            // Iterate up to square root for efficiency
            for (let i = 1; i <= Math.sqrt(n); i++) {
                if (n % i === 0) {
                    factors.push(i);
                    sum += i;
                    
                    let pair2 = n / i;
                    
                    if (i !== pair2) {
                        factors.push(pair2);
                        sum += pair2;
                        pairs.push([i, pair2]);
                    } else {
                        // Perfect square case
                        pairs.push([i, i]);
                    }
                }
            }

            // Sort factors numerically
            factors.sort((a, b) => a - b);

            // 2. Prime Factorization
            let primeFactorsArr = [];
            let tempN = n;
            let divisor = 2;

            while (tempN >= 2) {
                if (tempN % divisor === 0) {
                    primeFactorsArr.push(divisor);
                    tempN = tempN / divisor;
                } else {
                    divisor++;
                }
            }

            // Format Prime Factors (e.g., 2^2 x 3^2)
            const primeCounts = {};
            primeFactorsArr.forEach(x => { primeCounts[x] = (primeCounts[x] || 0) + 1; });
            
            let primeString = Object.keys(primeCounts).map(p => {
                return primeCounts[p] > 1 ? `${p}<sup>${primeCounts[p]}</sup>` : p;
            }).join(' × ');
            
            if (n === 1) primeString = "1";

            // --- Update UI ---
            
            // Stats
            document.getElementById('totalFactorsCount').innerText = factors.length;
            document.getElementById('isPrimeBox').innerText = (factors.length === 2) ? "Yes" : "No";
            document.getElementById('sumFactors').innerText = sum;

            // Factors List
            const factorsHTML = factors.map(f => `<span class="number-badge">${f}</span>`).join(' ');
            document.getElementById('factorsList').innerHTML = factorsHTML;

            // Pairs List
            const pairsHTML = pairs.map(p => `<span class="number-badge">(${p[0]}, ${p[1]})</span>`).join(' ');
            document.getElementById('factorPairs').innerHTML = pairsHTML;

            // Prime Factorization
            document.getElementById('primeFactors').innerHTML = primeString;

            // Show Results
            const resArea = document.getElementById('result-area');
            resArea.style.display = 'block';

            // Scroll to results on mobile
            if(window.innerWidth <= 768) {
                resArea.scrollIntoView({behavior: 'smooth', block: 'start'});
            }

            autoSave();
        }

        // --- Local Storage Functions ---

        function autoSave() {
            const val = document.getElementById('inputNumber').value;
            localStorage.setItem('factor_calc_data', val);
        }

        function loadData() {
            const saved = localStorage.getItem('factor_calc_data');
            if (saved) {
                document.getElementById('inputNumber').value = saved;
                // Optional: Auto calculate on load
                // calculateFactors();
            }
        }

        function clearData() {
            if(confirm("Are you sure you want to clear the data?")) {
                localStorage.removeItem('factor_calc_data');
                document.getElementById('inputNumber').value = '';
                document.getElementById('result-area').style.display = 'none';
            }
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
