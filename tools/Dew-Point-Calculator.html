    <style>
        /* CSS Reset & Global Styles */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

        body {

<body>

    <!-- 50px Fixed Header -->
    <header>
        <h1>Dew Point Calculator</h1>
    </header>

    <div class="container">
        <div class="content-wrapper">
            
            <div class="form-group">
                <label for="temp">Air Temperature</label>
                <div class="input-row">
                    <input type="number" id="temp" step="any" placeholder="Enter air temperature">
                    <select id="tempUnit">
                        <option value="C">°C</option>
                        <option value="F">°F</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="humidity">Relative Humidity</label>
                <div class="input-row">
                    <input type="number" id="humidity" step="any" min="0" max="100" placeholder="Enter relative humidity">
                    <div class="input-suffix">%</div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-calc" onclick="calculateDewPoint()">Calculate</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div class="result-box" id="resultBox">
                <h2>Dew Point Temperature</h2>
                <div class="result-value" id="resultValueMain">--</div>
                <div class="result-secondary" id="resultValueSub">--</div>
                <div class="result-msg" id="resultMsg"></div>
            </div>

        </div>
    </div>

    <!-- JavaScript integrated for functionality and auto-saving -->
    <script>
        // DOM Elements
        const tempInput = document.getElementById('temp');
        const tempUnitSelect = document.getElementById('tempUnit');
        const humidityInput = document.getElementById('humidity');
        const resultBox = document.getElementById('resultBox');
        const resultValueMain = document.getElementById('resultValueMain');
        const resultValueSub = document.getElementById('resultValueSub');
        const resultMsg = document.getElementById('resultMsg');

        // Automatically load saved data from LocalStorage
        function loadSavedData() {
            if (localStorage.getItem('dpc_temp')) tempInput.value = localStorage.getItem('dpc_temp');
            if (localStorage.getItem('dpc_tempUnit')) tempUnitSelect.value = localStorage.getItem('dpc_tempUnit');
            if (localStorage.getItem('dpc_humidity')) humidityInput.value = localStorage.getItem('dpc_humidity');
        }

        // Save data to LocalStorage automatically
        function saveCurrentData() {
            localStorage.setItem('dpc_temp', tempInput.value);
            localStorage.setItem('dpc_tempUnit', tempUnitSelect.value);
            localStorage.setItem('dpc_humidity', humidityInput.value);
        }

        // Event listeners attached to inputs for automatic saving
        tempInput.addEventListener('input', saveCurrentData);
        tempUnitSelect.addEventListener('change', saveCurrentData);
        humidityInput.addEventListener('input', saveCurrentData);

        // Core Calculation Logic (Magnus-Tetens Formula)
        function calculateDewPoint() {
            const tempVal = parseFloat(tempInput.value);
            const humidityVal = parseFloat(humidityInput.value);
            const tUnit = tempUnitSelect.value;

            // Trigger manual save
            saveCurrentData();

            // Input Validation
            if (isNaN(tempVal) || isNaN(humidityVal)) {
                alert('Please enter valid numerical values for both Temperature and Humidity.');
                return;
            }

            if (humidityVal < 0 || humidityVal > 100) {
                alert('Relative Humidity must be between 0% and 100%.');
                return;
            }

            // Convert to Celsius for formula
            let tempC = tUnit === 'F' ? (tempVal - 32) * 5/9 : tempVal;

            // Magnus-Tetens Formula Constants
            const a = 17.27;
            const b = 237.3;

            // Calculate Alpha
            let alpha = ((a * tempC) / (b + tempC)) + Math.log(humidityVal / 100.0);

            // Calculate Dew Point in Celsius
            let dewPointC = (b * alpha) / (a - alpha);
            
            // Calculate Dew Point in Fahrenheit
            let dewPointF = (dewPointC * 9/5) + 32;

            // Display Logic
            resultBox.style.display = 'block';

            if (tUnit === 'C') {
                resultValueMain.innerText = dewPointC.toFixed(2) + ' °C';
                resultValueSub.innerText = dewPointF.toFixed(2) + ' °F';
            } else {
                resultValueMain.innerText = dewPointF.toFixed(2) + ' °F';
                resultValueSub.innerText = dewPointC.toFixed(2) + ' °C';
            }

            // Comfort Level Logic (Based on Dew Point in Fahrenheit)
            let comfortLevel = "";
            if (dewPointF <= 55) {
                comfortLevel = "Comfortable and dry.";
            } else if (dewPointF > 55 && dewPointF <= 60) {
                comfortLevel = "Pleasant, slightly noticeable moisture.";
            } else if (dewPointF > 60 && dewPointF <= 65) {
                comfortLevel = "Getting sticky, muggy feeling.";
            } else if (dewPointF > 65 && dewPointF <= 70) {
                comfortLevel = "Very muggy and uncomfortable.";
            } else if (dewPointF > 70 && dewPointF <= 75) {
                comfortLevel = "Oppressive, heavy moisture in the air.";
            } else {
                comfortLevel = "Severely high humidity, highly oppressive.";
            }

            // Humidity 100% check
            if (humidityVal === 100) {
                comfortLevel += " (At 100% humidity, dew point equals air temperature).";
            }

            resultMsg.innerText = comfortLevel;
        }

        // Clear Data Function
        function clearData() {
            // Reset fields
            tempInput.value = '';
            humidityInput.value = '';
            tempUnitSelect.value = 'C';
            
            // Hide result box
            resultBox.style.display = 'none';
            resultValueMain.innerText = '--';
            resultValueSub.innerText = '--';
            resultMsg.innerText = '';
            
            // Clear LocalStorage data
            localStorage.removeItem('dpc_temp');
            localStorage.removeItem('dpc_tempUnit');
            localStorage.removeItem('dpc_humidity');
        }

        // Initialize tool on page load
        window.onload = loadSavedData;
    </script>
</body>
