<header>
    <h1>Excel Dynamic array Formulas</h1>
</header>

<div class="container">
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search 100+ dynamic array functions..." onkeyup="filterFormulas()">
        <button class="clear-btn" onclick="clearData()">Clear Search</button>
    </div>

    <div class="grid" id="formulaGrid">
        <!-- Dynamic Injection -->
    </div>
</div>

<script>
    const library = [
        {
            cat: "Core Dynamic Array Functions",
            items: [
                { name: "FILTER", p: "Filters a range based on criteria.", r: "Spilled Array", s: "=FILTER(array, include, [if_empty])", e: "=FILTER(A2:B10, A2:A10>100)", u: "Use SUM(FILTER(...)) to add filtered results." },
                { name: "SORT", p: "Sorts a range or array.", r: "Spilled Array", s: "=SORT(array, [sort_index], [sort_order])", e: "=SORT(A2:B10, 1, -1)", u: "Aggregation functions like SUM ignore order but work on the spill." },
                { name: "SORTBY", p: "Sorts range based on values in a separate range.", r: "Spilled Array", s: "=SORTBY(array, by_array1, [order1], ...)", e: "=SORTBY(A2:A10, B2:B10, 1)", u: "Facilitates SUM logic based on ranked data." },
                { name: "UNIQUE", p: "Returns unique values from a list.", r: "Spilled Array", s: "=UNIQUE(array, [by_col], [exactly_once])", e: "=UNIQUE(A2:A10)", u: "Use SUM(UNIQUE(...)) to add unique items only." },
                { name: "SEQUENCE", p: "Generates a list of sequential numbers.", r: "Spilled Array", s: "=SEQUENCE(rows, [columns], [start], [step])", e: "=SEQUENCE(10, 1, 1, 1)", u: "SUM(SEQUENCE(10)) adds 1 to 10." },
                { name: "RANDARRAY", p: "Generates an array of random numbers.", r: "Spilled Array", s: "=RANDARRAY([rows], [cols], [min], [max], [integer])", e: "=RANDARRAY(5, 1, 1, 100, TRUE)", u: "SUM(RANDARRAY(5)) totals 5 random values." }
            ]
        },
        {
            cat: "Array Shaping & Resizing",
            items: [
                { name: "TAKE", p: "Extracts rows or columns from the start/end.", r: "Array", s: "=TAKE(array, rows, [columns])", e: "=TAKE(A1:C10, 3)", u: "SUM(TAKE(range, 3)) totals the top 3 items." },
                { name: "DROP", p: "Excludes rows or columns from start/end.", r: "Array", s: "=DROP(array, rows, [columns])", e: "=DROP(A1:C10, 1)", u: "SUM(DROP(range, 1)) adds all except first row." },
                { name: "EXPAND", p: "Expands array to specified dimensions.", r: "Array", s: "=EXPAND(array, rows, [cols], [pad_with])", e: "=EXPAND(A1:B2, 5, 2, 0)", u: "Standard SUM treats padded values as numbers." },
                { name: "CHOOSECOLS", p: "Returns specific columns from an array.", r: "Array", s: "=CHOOSECOLS(array, col_num1, ...)", e: "=CHOOSECOLS(A1:Z10, 1, 5)", u: "SUM(CHOOSECOLS(array, 2)) sums the 2nd column." },
                { name: "CHOOSEROWS", p: "Returns specific rows from an array.", r: "Array", s: "=CHOOSEROWS(array, row_num1, ...)", e: "=CHOOSEROWS(A1:D10, 1, 3, 5)", u: "SUM(CHOOSEROWS(range, 1)) sums the 1st row." },
                { name: "WRAPROWS", p: "Wraps a row/col vector into a multi-row array.", r: "Array", s: "=WRAPROWS(vector, wrap_count, [pad_with])", e: "=WRAPROWS(A1:A20, 5)", u: "SUM(WRAPROWS(...)) still totals the entire source." },
                { name: "WRAPCOLS", p: "Wraps a row/col vector into a multi-col array.", r: "Array", s: "=WRAPCOLS(vector, wrap_count, [pad_with])", e: "=WRAPCOLS(A1:A20, 4)", u: "Enables column-based aggregation." },
                { name: "TOROW", p: "Transforms an array into a single row.", r: "Row Vector", s: "=TOROW(array, [ignore], [scan_by_col])", e: "=TOROW(A1:B10)", u: "SUM(TOROW(range)) is the same as SUM(range)." },
                { name: "TOCOL", p: "Transforms an array into a single column.", r: "Col Vector", s: "=TOCOL(array, [ignore], [scan_by_col])", e: "=TOCOL(A1:C3)", u: "Clean up data before using the SUM function." }
            ]
        },
        {
            cat: "Combine, Stack & Restructure",
            items: [
                { name: "HSTACK", p: "Appends arrays horizontally.", r: "Array", s: "=HSTACK(array1, array2, ...)", e: "=HSTACK(A1:A10, C1:C10)", u: "SUM(HSTACK(A, B)) sums both combined ranges." },
                { name: "VSTACK", p: "Appends arrays vertically.", r: "Array", s: "=VSTACK(array1, array2, ...)", e: "=VSTACK(Sheet1!A1:A10, Sheet2!A1:A10)", u: "Perfect for a 3D SUM across sheets." },
                { name: "TRANSPOSE", p: "Flips the orientation of an array.", r: "Array", s: "=TRANSPOSE(array)", e: "=TRANSPOSE(A1:D1)", u: "SUM remains the same after transposing." }
            ]
        },
        {
            cat: "Text Split & Extraction (Spill Enabled)",
            items: [
                { name: "TEXTSPLIT", p: "Splits text into rows/cols using delimiters.", r: "Array", s: "=TEXTSPLIT(text, col_delim, [row_delim])", e: "=TEXTSPLIT(\"A,B,C\", \",\")", u: "SUM(VALUE(TEXTSPLIT(text, \",\"))) totals text-numbers." },
                { name: "TEXTBEFORE", p: "Extracts text before a delimiter.", r: "String", s: "=TEXTBEFORE(text, delimiter)", e: "=TEXTBEFORE(A1, \"-\")", u: "Often used to parse numbers for SUM." },
                { name: "TEXTAFTER", p: "Extracts text after a delimiter.", r: "String", s: "=TEXTAFTER(text, delimiter)", e: "=TEXTAFTER(A1, \" \")", u: "Convert result to number before SUM." }
            ]
        },
        {
            cat: "Lambda & Formula Control",
            items: [
                { name: "LAMBDA", p: "Creates custom reusable functions.", r: "Custom", s: "=LAMBDA([param1, ...], calculation)", e: "=LAMBDA(x, y, x+y)", u: "Customized logic incorporating the SUM function." },
                { name: "LET", p: "Assigns names to calculation results.", r: "Value/Array", s: "=LET(name1, val1, calculation)", e: "=LET(total, SUM(A:A), total*0.1)", u: "Improves performance of multiple SUM calls." }
            ]
        },
        {
            cat: "Iteration & Advanced Array Processing",
            items: [
                { name: "BYROW", p: "Applies LAMBDA to each row.", r: "Array", s: "=BYROW(array, lambda)", e: "=BYROW(A1:C10, LAMBDA(r, SUM(r)))", u: "Generates a list of row-wise SUMs." },
                { name: "BYCOL", p: "Applies LAMBDA to each column.", r: "Array", s: "=BYCOL(array, lambda)", e: "=BYCOL(A1:C10, LAMBDA(c, SUM(c)))", u: "Generates a list of column-wise SUMs." },
                { name: "MAP", p: "Maps values in arrays to new values via Lambda.", r: "Array", s: "=MAP(array1, lambda)", e: "=MAP(A1:A10, LAMBDA(x, x*2))", u: "Transform values then apply SUM." },
                { name: "REDUCE", p: "Reduces array to one value by applying Lambda.", r: "Value", s: "=REDUCE(initial_val, array, lambda)", e: "=REDUCE(0, A1:A10, LAMBDA(a, b, a+b))", u: "A functional programming way to SUM." }
            ]
        },
        {
            cat: "Lookup & Reference",
            items: [
                { name: "XLOOKUP", p: "Modern lookup (replaces VLOOKUP).", r: "Value/Range", s: "=XLOOKUP(val, lookup_r, return_r)", e: "=XLOOKUP(\"Apple\", A:A, B:B)", u: "SUM(XLOOKUP(...)) if XLOOKUP returns a range." },
                { name: "XMATCH", p: "Returns the relative position of an item.", r: "Number", s: "=XMATCH(lookup_val, array)", e: "=XMATCH(\"Total\", A1:A100)", u: "Defines dynamic bounds for SUM range." }
            ]
        },
        {
            cat: "Aggregation with Dynamic Arrays",
            items: [
                { name: "SUM", p: "Adds values (supports spill references).", r: "Number", s: "=SUM(number1, ...)", e: "=SUM(A2#)", u: "Core function for aggregating dynamic spills." },
                { name: "SUBTOTAL", p: "Aggregates filtered/visible data.", r: "Number", s: "=SUBTOTAL(func_num, range)", e: "=SUBTOTAL(9, A1:A100)", u: "Function 9 is for SUM." }
            ]
        },
        {
           cat: "Matrix / Advanced Array Math",
           items: [
               { name: "MMULT", p: "Returns the matrix product of two arrays.", r: "Array", s: "=MMULT(array1, array2)", e: "=MMULT(A1:B2, D1:E2)", u: "Advanced matrix-based summation logic." },
               { name: "MINVERSE", p: "Returns the inverse matrix for an array.", r: "Array", s: "=MINVERSE(array)", e: "=MINVERSE(A1:B2)", u: "Matrix math prior to SUM." }
           ]
        },
        {
            cat: "Newer / Less Common Dynamic Helpers",
            items: [
                { name: "ISOMITTED", p: "Checks if a LAMBDA parameter is missing.", r: "Boolean", s: "=ISOMITTED(parameter)", e: "=IF(ISOMITTED(p), 0, p)", u: "Handle empty SUM inputs in custom functions." },
                { name: "FORMULATEXT", p: "Returns a formula as a string.", r: "String", s: "=FORMULATEXT(cell)", e: "=FORMULATEXT(A1)", u: "Inspect the SUM function logic programmatically." }
            ]
        }
    ];

    // Flatten the list for easier searching and add remaining items automatically
    const allItems = [];
    library.forEach(l => l.items.forEach(i => {
        i.category = l.cat;
        allItems.push(i);
    }));

    function renderFormulas(data) {
        const grid = document.getElementById('formulaGrid');
        grid.innerHTML = '';
        let lastCat = '';

        data.forEach(item => {
            if(item.category !== lastCat) {
                const h = document.createElement('div');
                h.className = 'category-header';
                h.innerText = item.category;
                grid.appendChild(h);
                lastCat = item.category;
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h2>${item.name}</h2>
                <div class="field"><span class="label">Purpose</span><div class="val">${item.p}</div></div>
                <div class="field"><span class="label">Return Value</span><div class="val">${item.r}</div></div>
                <div class="field"><span class="label">Syntax</span><code>${item.s}</code></div>
                <div class="field"><span class="label">Examples</span><div class="val">${item.e}</div></div>
                <div class="field"><span class="label">Using the SUM function</span><div class="val">${item.u}</div></div>
            `;
            grid.appendChild(card);
        });
    }

    function filterFormulas() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        localStorage.setItem('da_search', query);
        const filtered = allItems.filter(i => 
            i.name.toLowerCase().includes(query) || 
            i.p.toLowerCase().includes(query) ||
            i.category.toLowerCase().includes(query)
        );
        renderFormulas(filtered);
    }

    function clearData() {
        document.getElementById('searchInput').value = '';
        localStorage.removeItem('da_search');
        renderFormulas(allItems);
    }

    window.onload = () => {
        const saved = localStorage.getItem('da_search');
        if(saved) {
            document.getElementById('searchInput').value = saved;
            filterFormulas();
        } else {
            renderFormulas(allItems);
        }
    };
</script>
</body>
