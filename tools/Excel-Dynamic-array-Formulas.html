                ["NOW", "Returns the serial number of the current date and time.", "Current date and time.", "=NOW()", "=NOW()", "=AVERAGE(A1:A10-NOW())"],
                ["YEAR", "Returns the year of a date.", "Numeric year array.", "=YEAR(serial_number)", "=YEAR(A1:A10)", "=SUM(IF(YEAR(A1:A10)=2024, 1, 0))"],
                ["MONTH", "Returns the month of a date.", "Numeric month array (1-12).", "=MONTH(serial_number)", "=MONTH(A1:A10)", "=SUM(IF(MONTH(A1:A10)=1, 1, 0))"],
                ["DAY", "Returns the day of a date.", "Numeric day array (1-31).", "=DAY(serial_number)", "=DAY(A1:A10)", "=SUM(DAY(A1:A10))"],
                ["EOMONTH", "Returns the serial number of the last day of the month before or after a specified number of months.", "Date array.", "=EOMONTH(start_date, months)", "=EOMONTH(A1:A10, 0)", "=SUM(IF(A1:A10=EOMONTH(A1:A10, 0), 1, 0))"]
            ]],
            ["✅ Matrix / Advanced Array Math", [
                ["MMULT", "Returns the matrix product of two arrays.", "Product matrix.", "=MMULT(array1, array2)", "=MMULT(A1:B2, D1:E2)", "=SUM(MMULT(A1:B2, D1:E2))"],
                ["MINVERSE", "Returns the inverse matrix for an array.", "Inverse matrix.", "=MINVERSE(array)", "=MINVERSE(A1:B2)", "=SUM(MINVERSE(A1:B2))"],
                ["MDETERM", "Returns the matrix determinant of an array.", "Numeric determinant.", "=MDETERM(array)", "=MDETERM(A1:C3)", "=ABS(MDETERM(A1:C3))"]
            ]],
            ["✅ Newer / Less Common Dynamic Helpers", [
                ["ISOMITTED", "Checks whether the value in a LAMBDA is missing and returns TRUE or FALSE.", "Boolean.", "=ISOMITTED([argument])", "=ISOMITTED(x)", "=SUM(IF(ISOMITTED(x), 1, 0))"],
                ["FORMULATEXT", "Returns the formula at the given reference as text.", "Text string/array.", "=FORMULATEXT(reference)", "=FORMULATEXT(A1:A10)", "=COUNTA(FILTER(A1:A10, ISNUMBER(SEARCH(\"SUM\", FORMULATEXT(A1:A10)))))"],
                ["N", "Returns a value converted to a number.", "Numeric array.", "=N(value)", "=N(A1:A10)", "=SUM(N(A1:A10))"],
                ["TYPE", "Returns an integer indicating the data type of a value.", "Numeric type code array.", "=TYPE(value)", "=TYPE(A1:A10)", "=SUM(IF(TYPE(A1:A10)=64, 1, 0))"]
            ]]
        ];

        const container = document.getElementById('dataContainer');
        const searchInput = document.getElementById('searchInput');

        function renderUI() {
            container.innerHTML = '';
            excelData.forEach((category, catIndex) => {
                const catName = category[0];
                const functions = category[1];

                const catDiv = document.createElement('div');
                catDiv.className = 'category-block' + (catIndex === 0 ? ' active' : '');
                catDiv.dataset.catName = catName.toLowerCase();

                const catHeader = document.createElement('div');
                catHeader.className = 'category-header';
                catHeader.textContent = catName;
                catHeader.onclick = () => catDiv.classList.toggle('active');

                const funcList = document.createElement('ul');
                funcList.className = 'func-list';

                functions.forEach(func => {
                    const [fName, fPurpose, fReturn, fSyntax, fExample, fSum] = func;

                    const funcItem = document.createElement('li');
                    funcItem.className = 'func-item';
                    funcItem.dataset.funcName = fName.toLowerCase();
                    funcItem.dataset.funcDesc = fPurpose.toLowerCase();

                    const funcHeader = document.createElement('div');
                    funcHeader.className = 'func-header';
                    funcHeader.textContent = fName;
                    funcHeader.onclick = () => funcItem.classList.toggle('active');

                    const funcDetails = document.createElement('div');
                    funcDetails.className = 'func-details';
                    
                    funcDetails.innerHTML = `
                        <div class="detail-section">
                            <h4>Purpose</h4>
                            <p>${fPurpose}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Return value</h4>
                            <p>${fReturn}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Syntax</h4>
                            <code>${fSyntax.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>
                        </div>
                        <div class="detail-section">
                            <h4>Examples</h4>
                            <code>${fExample.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>
                        </div>
                        <div class="detail-section">
                            <h4>Using the SUM function</h4>
                            <code>${fSum.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>
                        </div>
                    `;

                    funcItem.appendChild(funcHeader);
                    funcItem.appendChild(funcDetails);
                    funcList.appendChild(funcItem);
                });

                catDiv.appendChild(catHeader);
                catDiv.appendChild(funcList);
                container.appendChild(catDiv);
            });
        }

        function filterUI() {
            const query = searchInput.value.toLowerCase().trim();
            const categories = document.querySelectorAll('.category-block');

            categories.forEach(cat => {
                let hasVisibleItems = false;
                const items = cat.querySelectorAll('.func-item');

                items.forEach(item => {
                    const fName = item.dataset.funcName;
                    const fDesc = item.dataset.funcDesc;
                    
                    if (fName.includes(query) || fDesc.includes(query)) {
                        item.style.display = 'block';
                        hasVisibleItems = true;
                    } else {
                        item.style.display = 'none';
                    }
                });

                if (hasVisibleItems) {
                    cat.style.display = 'block';
                    if(query.length > 0) cat.classList.add('active');
                } else {
                    cat.style.display = 'none';
                }
            });
        }

        searchInput.addEventListener('input', filterUI);
        document.addEventListener('DOMContentLoaded', renderUI);
    </script>
</body>
</html>
