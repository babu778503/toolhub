    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #2ecc71;
            --primary-dark: #27ae60;
            --header-bg: #2c3e50;
            --header-text: #fff;
            --text-color: #34495e;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
            --border-radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Space for fixed header */
            min-height: 100vh;
        }

        /* Header Styling (Fixed, 50px Height) */
        header {
            width: 100%;
            height: 50px;
            background-color: var(--header-bg);
            color: var(--header-text);
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* Container Layout */
        .container {
            background-color: var(--card-bg);
            margin: 0 auto;
            min-height: calc(100vh - 50px);
        }

        /* Desktop specific layout */
        @media (min-width: 769px) {
            .container {
                max-width: 1200px;
                margin: 30px auto;
                border-radius: var(--border-radius);
                box-shadow: var(--shadow);
                padding: 40px;
                min-height: auto;
            }

            .calc-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 50px;
                align-items: start;
            }
        }

        /* Mobile specific layout */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 20px; /* Internal content padding */
                box-shadow: none;
                border-radius: 0;
            }

            .calc-grid {
                display: flex;
                flex-direction: column;
                gap: 30px;
            }
        }

        /* Input Styles */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            color: #7f8c8d;
            font-weight: bold;
        }
        
        .input-suffix {
            position: absolute;
            right: 15px;
            color: #7f8c8d;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            padding-left: 35px; /* Space for icon */
            font-size: 16px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            background-color: #fff;
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.2);
        }

        .term-inputs {
            display: flex;
            gap: 15px;
        }

        .term-field {
            flex: 1;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        /* Results Display */
        .results-panel {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
        }

        .main-result {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #dcdcdc;
        }

        .result-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .sub-results {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .sub-result-item {
            flex: 1;
        }

        .sub-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #34495e;
        }

        /* Range Slider Styling (Optional visual enhancement) */
        input[type=range] {
            width: 100%;
            margin-top: 5px;
            cursor: pointer;
        }

        /* Accessibility */
        *:focus-visible {
            outline: 2px solid var(--primary-dark);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Loan Calculator</h1>
    </header>

    <div class="container">
        <div class="calc-grid">
            
            <!-- Inputs Section -->
            <div class="inputs-section">
                
                <div class="input-group">
                    <label for="loanAmount">Loan Amount</label>
                    <div class="input-wrapper">
                        <span class="input-icon">$</span>
                        <input type="number" id="loanAmount" placeholder="Example: 10000" min="0" step="100" oninput="calculate()">
                    </div>
                </div>

                <div class="input-group">
                    <label for="interestRate">Annual Interest Rate</label>
                    <div class="input-wrapper">
                        <span class="input-icon">%</span>
                        <input type="number" id="interestRate" placeholder="Example: 5.5" min="0" step="0.1" oninput="calculate()">
                    </div>
                </div>

                <div class="input-group">
                    <label>Loan Term</label>
                    <div class="term-inputs">
                        <div class="term-field">
                            <div class="input-wrapper">
                                <input type="number" id="termYears" placeholder="Years" min="0" oninput="calculate()">
                                <span class="input-suffix">Yr</span>
                            </div>
                        </div>
                        <div class="term-field">
                            <div class="input-wrapper">
                                <input type="number" id="termMonths" placeholder="Months" min="0" max="11" oninput="calculate()">
                                <span class="input-suffix">Mo</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="btn-row">
                    <button class="btn-clear" onclick="clearData()">Reset / Clear</button>
                </div>

            </div>

            <!-- Results Section -->
            <div class="results-panel">
                <div class="main-result">
                    <div class="result-label">Monthly Payment</div>
                    <div class="result-value" id="monthlyPayment">$0.00</div>
                </div>

                <div class="sub-results">
                    <div class="sub-result-item">
                        <div class="result-label">Total Interest</div>
                        <div class="sub-value" id="totalInterest">$0.00</div>
                    </div>
                    <div class="sub-result-item">
                        <div class="result-label">Total Payment</div>
                        <div class="sub-value" id="totalPayment">$0.00</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // DOM Elements
        const elAmount = document.getElementById('loanAmount');
        const elRate = document.getElementById('interestRate');
        const elYears = document.getElementById('termYears');
        const elMonths = document.getElementById('termMonths');
        
        const elMonthlyPayment = document.getElementById('monthlyPayment');
        const elTotalInterest = document.getElementById('totalInterest');
        const elTotalPayment = document.getElementById('totalPayment');

        // Formatter for Currency
        const moneyFormatter = new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
            minimumFractionDigits: 2
        });

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        function calculate() {
            // Get values
            let principal = parseFloat(elAmount.value) || 0;
            let annualRate = parseFloat(elRate.value) || 0;
            let years = parseInt(elYears.value) || 0;
            let months = parseInt(elMonths.value) || 0;

            // Logic: Calculate total months
            let totalMonths = (years * 12) + months;

            let monthlyPayment = 0;
            let totalPayment = 0;
            let totalInterest = 0;

            if (principal > 0 && totalMonths > 0) {
                if (annualRate > 0) {
                    // Standard Amortization Formula: M = P [ i(1 + i)^n ] / [ (1 + i)^n – 1 ]
                    let monthlyRate = (annualRate / 100) / 12;
                    let x = Math.pow(1 + monthlyRate, totalMonths);
                    
                    monthlyPayment = (principal * x * monthlyRate) / (x - 1);
                } else {
                    // Simple division if 0% interest
                    monthlyPayment = principal / totalMonths;
                }

                totalPayment = monthlyPayment * totalMonths;
                totalInterest = totalPayment - principal;
            }

            // Update UI
            elMonthlyPayment.textContent = moneyFormatter.format(monthlyPayment);
            elTotalPayment.textContent = moneyFormatter.format(totalPayment);
            elTotalInterest.textContent = moneyFormatter.format(totalInterest);

            // Save Data
            saveData();
        }

        function saveData() {
            const data = {
                amount: elAmount.value,
                rate: elRate.value,
                years: elYears.value,
                months: elMonths.value
            };
            localStorage.setItem('toolshub365_loan_calc', JSON.stringify(data));
        }

        function loadData() {
            const stored = localStorage.getItem('toolshub365_loan_calc');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    if(data.amount) elAmount.value = data.amount;
                    if(data.rate) elRate.value = data.rate;
                    if(data.years) elYears.value = data.years;
                    if(data.months) elMonths.value = data.months;
                    
                    // Trigger calculation if data exists
                    if(data.amount && (data.years || data.months)) {
                        calculate();
                    }
                } catch (e) {
                    console.error("Error loading data", e);
                }
            }
        }

        function clearData() {
            elAmount.value = '';
            elRate.value = '';
            elYears.value = '';
            elMonths.value = '';
            
            elMonthlyPayment.textContent = '$0.00';
            elTotalInterest.textContent = '$0.00';
            elTotalPayment.textContent = '$0.00';
            
            localStorage.removeItem('toolshub365_loan_calc');
        }
    </script>
</body>
</html>
