    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;

        body {
            background-color: #ece5dd; /* WhatsApp chat background color */

        }

        /* Fixed Header Structure */
        header {
            height: 50px;
            background-color: #075E54;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            font-size: 20px;

        /* Desktop Container */
        .container {
            max-width: 1200px;

        .tool-panel {
            background: #ffffff;

        /* Section Layouts */

            display: block;
            font-size: 14px;

            color: #4a4a4a;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            padding: 15px;

            border: 1px solid #d1d1d1;

        textarea:focus {

            background-color: #ffffff;
        }

        .input-section textarea {
            height: 120px;
        }

        .output-section textarea {
            flex-grow: 1;
            background-color: #f0fdfa;

            color: #212529;
            margin-bottom: 15px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 15px;

            border: 1px solid #d1d1d1;

        /* Mobile specific design */

<body>

    <header>WhatsApp Text Repeater</header>

    <main class="container">
        <div class="tool-panel">
            
            <!-- Input Area -->
            <div class="input-section">
                <div class="form-group">
                    <label for="textInput">Text to Repeat</label>
                    <textarea id="textInput" placeholder="Enter the text you want to multiply..."></textarea>
                </div>

                <div class="form-group">
                    <label for="countInput">Number of Repetitions (Max: 100,000)</label>
                    <input type="number" id="countInput" min="1" max="100000" value="10" placeholder="e.g. 100">
                </div>

                <div class="options">
                    <label class="checkbox-label" aria-label="Add a new line after each repetition">
                        <input type="checkbox" id="newLineCheck" checked> Add New Line
                    </label>
                    <label class="checkbox-label" aria-label="Add a space after each repetition">
                        <input type="checkbox" id="spaceCheck"> Add Space
                    </label>
                </div>

                <div class="action-bar">
                    <button id="clearBtn" class="btn clear-btn" aria-label="Clear all inputs and outputs">Clear Data</button>
                    <button id="generateBtn" class="btn primary-btn" aria-label="Generate repeated text">Generate Text</button>
                </div>
            </div>

            <!-- Output Area -->
            <div class="output-section">
                <label for="textOutput">Repeated Text Output</label>
                <textarea id="textOutput" readonly placeholder="Your generated text will appear here..."></textarea>
                <button id="copyBtn" class="btn copy-btn" aria-label="Copy generated text to clipboard">Copy Text</button>
            </div>

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const textInput = document.getElementById('textInput');
            const countInput = document.getElementById('countInput');
            const newLineCheck = document.getElementById('newLineCheck');
            const spaceCheck = document.getElementById('spaceCheck');
            const textOutput = document.getElementById('textOutput');
            const generateBtn = document.getElementById('generateBtn');
            const clearBtn = document.getElementById('clearBtn');
            const copyBtn = document.getElementById('copyBtn');
            
            const storageKey = 'toolshub365_whatsappTextRepeater';

            // Function to save form data to localStorage
            const saveData = () => {
                const data = {
                    text: textInput.value,
                    count: countInput.value,
                    newLine: newLineCheck.checked,
                    space: spaceCheck.checked,
                    output: textOutput.value
                };
                localStorage.setItem(storageKey, JSON.stringify(data));
            };

            // Function to load form data from localStorage
            const loadData = () => {
                const savedData = localStorage.getItem(storageKey);
                if (savedData) {
                    try {
                        const data = JSON.parse(savedData);
                        textInput.value = data.text || '';
                        countInput.value = data.count || 10;
                        newLineCheck.checked = data.newLine !== undefined ? data.newLine : true;
                        spaceCheck.checked = data.space !== undefined ? data.space : false;
                        textOutput.value = data.output || '';
                    } catch (e) {
                        console.error("Error parsing saved data");
                    }
                }
            };

            // Generate Logic
            const generateRepeatedText = () => {
                const text = textInput.value;
                let count = parseInt(countInput.value, 10);

                if (!text) {
                    textOutput.value = '';
                    saveData();
                    return;
                }

                if (isNaN(count) || count < 1) count = 1;
                if (count > 100000) count = 100000; // Cap at 100,000 to prevent browser crash
                countInput.value = count; // Reflect actual processed count

                let separator = '';
                if (newLineCheck.checked) {
                    separator = '\n';
                } else if (spaceCheck.checked) {
                    separator = ' ';
                }

                // Fast array repetition
                const result = new Array(count).fill(text).join(separator);
                textOutput.value = result;
                saveData();
            };

            // 100% Workable Mobile & Desktop Copy Function
            const copyToClipboard = () => {
                if (!textOutput.value.trim()) return;

                // Step 1: Select the text for Mobile Devices (iOS/Android fallback requirement)
                textOutput.select();
                textOutput.setSelectionRange(0, 99999); // For mobile compatibility

                const handleSuccess = () => {
                    const originalText = copyBtn.innerText;
                    copyBtn.innerText = 'Copied!';
                    copyBtn.style.backgroundColor = '#075E54';
                    
                    setTimeout(() => {
                        copyBtn.innerText = originalText;
                        copyBtn.style.backgroundColor = ''; // Reverts to CSS default background
                    }, 2000);
                    window.getSelection().removeAllRanges(); // Deselect text
                };

                const handleFailure = () => {
                    alert("Unable to copy to clipboard. Please manually copy the selected text.");
                    window.getSelection().removeAllRanges();
                };

                // Step 2: Try modern Clipboard API first, fallback to execCommand for Mobile WebView/Older browsers
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(textOutput.value)
                        .then(handleSuccess)
                        .catch(err => {
                            executeFallbackCopy();
                        });
                } else {
                    executeFallbackCopy();
                }

                // Fallback for Mobile WebViews, iOS, and older browsers
                function executeFallbackCopy() {
                    try {
                        const successful = document.execCommand('copy');
                        if (successful) {
                            handleSuccess();
                        } else {
                            handleFailure();
                        }
                    } catch (err) {
                        handleFailure();
                    }
                }
            };

            // Clear Data
            const clearData = () => {
                textInput.value = '';
                countInput.value = 10;
                newLineCheck.checked = true;
                spaceCheck.checked = false;
                textOutput.value = '';
                localStorage.removeItem(storageKey);
                textInput.focus();
            };

            // Event Listeners
            generateBtn.addEventListener('click', generateRepeatedText);
            copyBtn.addEventListener('click', copyToClipboard);
            clearBtn.addEventListener('click', clearData);
            
            // Auto-save settings on change without necessarily regenerating immediately for performance
            textInput.addEventListener('input', saveData);
            countInput.addEventListener('input', saveData);
            newLineCheck.addEventListener('change', saveData);
            spaceCheck.addEventListener('change', saveData);

            // Initialize App
            loadData();
        });
    </script>
</body>
