<!DOCTYPE html>
<!-- Category: Financial Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    
    <!-- SEO & Metadata -->
    <title>Real Estate Calculator</title>
    <meta name="description" content="Free Real Estate Calculator for investors and homebuyers. Calculate Mortgage Payments, Rental Cash Flow, Cap Rate, and Cash on Cash Return. Features auto-save.">
    <meta name="keywords" content="Real Estate Calculator, Rental Property Calculator, Cap Rate Calculator, Cash Flow Calculator, Real Estate Investment Tool, Toolshub365, ROI Calculator">
    <meta name="author" content="Toolshub365">
    <meta name="robots" content="index, follow">
    
    <!-- AI Crawler Optimization -->
    <meta name="gpt-bot" content="index, follow">
    <meta name="googlebot" content="index, follow">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://toolshub365.com/real-estate-calculator">

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Real Estate Calculator",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "url": "https://toolshub365.com/real-estate-calculator",
      "description": "Calculates mortgage payments, cash flow, and investment returns for real estate properties.",
      "offer": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #27ae60;
            --accent-color: #3498db;
            --danger-color: #e74c3c;
            --bg-color: #f4f6f7;
            --card-bg: #ffffff;
            --text-color: #333;
            --header-height: 50px;
            --container-width: 1200px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* Main Container */
        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        /* Calculator Layout */
        .calculator-card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
        }

        .input-section, .result-section {
            padding: 30px;
            flex: 1;
            min-width: 320px;
        }

        .input-section {
            border-right: 1px solid #eee;
        }

        .result-section {
            background-color: #fbfbfb;
            display: flex;
            flex-direction: column;
        }

        /* Form Styling */
        .section-header {
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
            font-weight: 700;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            flex: 1;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
        }

        .input-group {
            position: relative;
        }

        .input-group span {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 0.9rem;
        }

        .prefix { left: 12px; }
        .suffix { right: 12px; }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95rem;
            transition: border 0.3s;
        }

        .has-prefix input { padding-left: 25px; }
        .has-suffix input { padding-right: 30px; }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        /* Buttons */
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 1rem;
        }

        .btn-calc {
            background-color: var(--secondary-color);
            color: white;
        }

        .btn-calc:hover { opacity: 0.9; }

        .btn-clear {
            background-color: #ecf0f1;
            color: #333;
            border: 1px solid #ccc;
        }

        .btn-clear:hover { background-color: #d5d8dc; }

        /* Result Styling */
        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .metric-card {
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #eee;
            text-align: center;
        }

        .metric-label {
            font-size: 0.8rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .metric-value.positive { color: var(--secondary-color); }
        .metric-value.negative { color: var(--danger-color); }

        .highlight-box {
            background-color: var(--primary-color);
            color: #fff;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 25px;
        }

        .highlight-title { font-size: 0.9rem; opacity: 0.9; }
        .highlight-amount { font-size: 2.2rem; font-weight: 700; margin-top: 5px; }

        .breakdown-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .breakdown-table td {
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }

        .breakdown-table td:last-child {
            text-align: right;
            font-weight: 600;
        }

        /* Mobile Optimization */
        @media screen and (max-width: 768px) {
            .container {
                padding: 0;
                margin: 0;
                max-width: 100%;
            }

            .calculator-card {
                border-radius: 0;
                box-shadow: none;
                flex-direction: column;
            }

            .input-section {
                border-right: none;
                border-bottom: 1px solid #eee;
                padding: 20px;
            }

            .result-section {
                padding: 20px;
                background-color: #fff;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }

            input[type="number"] {
                font-size: 16px; /* Prevent iOS zoom */
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Real Estate Calculator</h1>
    </header>

    <div class="container">
        <div class="calculator-card">
            
            <!-- Input Section -->
            <div class="input-section">
                <form id="reForm" onsubmit="return false;">
                    
                    <div class="section-header">Purchase Info</div>
                    
                    <div class="form-group">
                        <label for="price">Purchase Price</label>
                        <div class="input-group has-prefix">
                            <span class="prefix">$</span>
                            <input type="number" id="price" placeholder="e.g. 300000" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="downPayment">Down Payment (%)</label>
                            <div class="input-group has-suffix">
                                <input type="number" id="downPayment" placeholder="20" step="0.1" required>
                                <span class="suffix">%</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="term">Loan Term (Years)</label>
                            <div class="input-group">
                                <input type="number" id="term" placeholder="30" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="rate">Interest Rate (%)</label>
                        <div class="input-group has-suffix">
                            <input type="number" id="rate" placeholder="6.5" step="0.01" required>
                            <span class="suffix">%</span>
                        </div>
                    </div>

                    <div class="section-header" style="margin-top: 25px;">Income & Expenses</div>

                    <div class="form-group">
                        <label for="rent">Monthly Rental Income</label>
                        <div class="input-group has-prefix">
                            <span class="prefix">$</span>
                            <input type="number" id="rent" placeholder="e.g. 2500">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="tax">Property Tax ($/yr)</label>
                            <div class="input-group has-prefix">
                                <span class="prefix">$</span>
                                <input type="number" id="tax" placeholder="3000">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="insurance">Insurance ($/yr)</label>
                            <div class="input-group has-prefix">
                                <span class="prefix">$</span>
                                <input type="number" id="insurance" placeholder="1200">
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="hoa">HOA ($/mo)</label>
                            <div class="input-group has-prefix">
                                <span class="prefix">$</span>
                                <input type="number" id="hoa" placeholder="0">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="maintenance">Maint. Cost ($/mo)</label>
                            <div class="input-group has-prefix">
                                <span class="prefix">$</span>
                                <input type="number" id="maintenance" placeholder="150">
                            </div>
                        </div>
                    </div>

                    <div class="controls">
                        <button type="button" class="btn-clear" id="clearBtn">Clear</button>
                        <button type="submit" class="btn-calc" id="calcBtn">Calculate</button>
                    </div>
                </form>
            </div>

            <!-- Result Section -->
            <div class="result-section">
                
                <div class="highlight-box">
                    <div class="highlight-title">Estimated Monthly Cash Flow</div>
                    <div class="highlight-amount" id="cashFlowResult">$0.00</div>
                </div>

                <div class="metric-grid">
                    <div class="metric-card">
                        <div class="metric-label">Cap Rate</div>
                        <div class="metric-value" id="capRateResult">0.00%</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Cash on Cash</div>
                        <div class="metric-value" id="cocResult">0.00%</div>
                    </div>
                </div>

                <div class="section-header">Monthly Breakdown</div>
                <table class="breakdown-table">
                    <tr>
                        <td>Rental Income</td>
                        <td id="incomeVal" style="color: var(--secondary-color);">$0.00</td>
                    </tr>
                    <tr>
                        <td>Mortgage Payment (P&I)</td>
                        <td id="mortgageVal" style="color: var(--danger-color);">$0.00</td>
                    </tr>
                    <tr>
                        <td>Property Tax</td>
                        <td id="taxVal" style="color: var(--danger-color);">$0.00</td>
                    </tr>
                    <tr>
                        <td>Home Insurance</td>
                        <td id="insVal" style="color: var(--danger-color);">$0.00</td>
                    </tr>
                    <tr>
                        <td>HOA / Maintenance</td>
                        <td id="otherExpVal" style="color: var(--danger-color);">$0.00</td>
                    </tr>
                    <tr style="border-top: 1px solid #ccc; border-bottom: none;">
                        <td style="padding-top:10px;"><strong>Total Expenses</strong></td>
                        <td id="totalExpVal" style="padding-top:10px;">$0.00</td>
                    </tr>
                </table>

            </div>

        </div>
    </div>

    <script>
        // DOM Elements
        const els = {
            price: document.getElementById('price'),
            down: document.getElementById('downPayment'),
            term: document.getElementById('term'),
            rate: document.getElementById('rate'),
            rent: document.getElementById('rent'),
            tax: document.getElementById('tax'),
            insurance: document.getElementById('insurance'),
            hoa: document.getElementById('hoa'),
            maint: document.getElementById('maintenance'),
            calcBtn: document.getElementById('calcBtn'),
            clearBtn: document.getElementById('clearBtn'),
            // Outputs
            cashFlow: document.getElementById('cashFlowResult'),
            capRate: document.getElementById('capRateResult'),
            coc: document.getElementById('cocResult'),
            incomeVal: document.getElementById('incomeVal'),
            mortgageVal: document.getElementById('mortgageVal'),
            taxVal: document.getElementById('taxVal'),
            insVal: document.getElementById('insVal'),
            otherExpVal: document.getElementById('otherExpVal'),
            totalExpVal: document.getElementById('totalExpVal')
        };

        const STORAGE_KEY = 'toolshub365_real_estate_calc';

        // Initialize
        window.addEventListener('load', () => {
            loadData();
            // Attach auto-save to inputs
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('input', saveData);
            });
        });

        els.calcBtn.addEventListener('click', calculate);
        els.clearBtn.addEventListener('click', clearData);

        function calculate() {
            // Get Values
            const price = parseFloat(els.price.value) || 0;
            const downPercent = parseFloat(els.down.value) || 0;
            const years = parseFloat(els.term.value) || 0;
            const rateAnnual = parseFloat(els.rate.value) || 0;
            
            const rent = parseFloat(els.rent.value) || 0;
            const taxYearly = parseFloat(els.tax.value) || 0;
            const insYearly = parseFloat(els.insurance.value) || 0;
            const hoa = parseFloat(els.hoa.value) || 0;
            const maint = parseFloat(els.maint.value) || 0;

            if (price <= 0 || years <= 0) {
                alert("Please enter a valid Purchase Price and Loan Term.");
                return;
            }

            // Calculations
            const downPaymentAmount = price * (downPercent / 100);
            const loanAmount = price - downPaymentAmount;
            
            // Mortgage (PI)
            let mortgagePayment = 0;
            if (loanAmount > 0) {
                const monthlyRate = rateAnnual / 100 / 12;
                const numPayments = years * 12;
                if (rateAnnual === 0) {
                    mortgagePayment = loanAmount / numPayments;
                } else {
                    mortgagePayment = loanAmount * (monthlyRate * Math.pow(1 + monthlyRate, numPayments)) / (Math.pow(1 + monthlyRate, numPayments) - 1);
                }
            }

            // Monthly Expenses
            const monthlyTax = taxYearly / 12;
            const monthlyIns = insYearly / 12;
            const monthlyOther = hoa + maint;
            
            const totalMonthlyExpenses = mortgagePayment + monthlyTax + monthlyIns + monthlyOther;
            const cashFlow = rent - totalMonthlyExpenses;

            // Annual Metrics
            const annualNOI = (rent * 12) - (monthlyTax * 12) - (monthlyIns * 12) - (monthlyOther * 12);
            const annualCashFlow = cashFlow * 12;
            
            const capRate = (price > 0) ? (annualNOI / price) * 100 : 0;
            const cashOnCash = (downPaymentAmount > 0) ? (annualCashFlow / downPaymentAmount) * 100 : 0;

            // Update UI
            els.cashFlow.textContent = formatMoney(cashFlow);
            els.cashFlow.style.color = cashFlow >= 0 ? '#2ecc71' : '#e74c3c'; // Green or Red logic for Highlight box text only if needed, kept white/styled in CSS usually, but simple green/red helps. CSS overrides highlight box text color usually so let's check style. Metric value logic:

            els.capRate.textContent = capRate.toFixed(2) + "%";
            els.coc.textContent = cashOnCash.toFixed(2) + "%";
            
            // Apply colors to metrics
            els.coc.className = `metric-value ${cashOnCash >= 0 ? 'positive' : 'negative'}`;

            // Breakdown
            els.incomeVal.textContent = formatMoney(rent);
            els.mortgageVal.textContent = "(" + formatMoney(mortgagePayment) + ")";
            els.taxVal.textContent = "(" + formatMoney(monthlyTax) + ")";
            els.insVal.textContent = "(" + formatMoney(monthlyIns) + ")";
            els.otherExpVal.textContent = "(" + formatMoney(monthlyOther) + ")";
            els.totalExpVal.textContent = "(" + formatMoney(totalMonthlyExpenses) + ")";

            saveData();
        }

        function formatMoney(num) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2
            }).format(num);
        }

        // Local Storage
        function saveData() {
            const data = {
                price: els.price.value,
                down: els.down.value,
                term: els.term.value,
                rate: els.rate.value,
                rent: els.rent.value,
                tax: els.tax.value,
                ins: els.insurance.value,
                hoa: els.hoa.value,
                maint: els.maint.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                if(data.price) els.price.value = data.price;
                if(data.down) els.down.value = data.down;
                if(data.term) els.term.value = data.term;
                if(data.rate) els.rate.value = data.rate;
                if(data.rent) els.rent.value = data.rent;
                if(data.tax) els.tax.value = data.tax;
                if(data.ins) els.insurance.value = data.ins;
                if(data.hoa) els.hoa.value = data.hoa;
                if(data.maint) els.maint.value = data.maint;
            }
        }

        function clearData() {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => input.value = '');
            
            // Reset Results
            els.cashFlow.textContent = "$0.00";
            els.capRate.textContent = "0.00%";
            els.coc.textContent = "0.00%";
            els.incomeVal.textContent = "$0.00";
            els.mortgageVal.textContent = "$0.00";
            els.taxVal.textContent = "$0.00";
            els.insVal.textContent = "$0.00";
            els.otherExpVal.textContent = "$0.00";
            els.totalExpVal.textContent = "$0.00";
            
            localStorage.removeItem(STORAGE_KEY);
        }
    </script>
</body>
</html>
