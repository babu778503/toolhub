<!DOCTYPE html>
<!-- Category: Other Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concrete Calculator</title>
    
    <!-- SEO & Technical SEO for AI Crawlers -->
    <meta name="description" content="Calculate the exact amount of concrete needed for your project in cubic yards, and estimate the number of bags required. Free Concrete Calculator with auto-save.">
    <meta name="keywords" content="Concrete Calculator, concrete volume calculator, calculate concrete yards, concrete bag estimator, slab calculator, toolshub365.com, construction calculator">
    <meta name="robots" content="index, follow, max-snippet:-1, max-video-preview:-1, max-image-preview:large">
    <link rel="canonical" href="https://toolshub365.com/concrete-calculator">
    
    <!-- Open Graph for Social and Search Engines -->
    <meta property="og:title" content="Concrete Calculator">
    <meta property="og:description" content="Quickly calculate concrete volume in cubic yards and estimate the number of pre-mixed bags needed for your slab or footing.">
    <meta property="og:url" content="https://toolshub365.com/concrete-calculator">
    <meta property="og:type" content="website">

    <!-- JSON-LD Schema Markup for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Concrete Calculator",
      "url": "https://toolshub365.com/concrete-calculator",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "All",
      "description": "An interactive web utility designed to calculate concrete volume for slabs and footings in cubic yards and estimate required pre-mixed bags, featuring offline auto-save."
    }
    </script>

    <style>
        :root {
            --primary-color: #f97316; /* Construction Orange */
            --primary-hover: #ea580c;
            --secondary-color: #334155; /* Slate */
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --header-height: 50px;
        }

        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--header-height); /* Offset for fixed header */
            -webkit-font-smoothing: antialiased;
        }

        /* Header (Fixed 50px height) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--secondary-color);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            border-bottom: 3px solid var(--primary-color);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Desktop Container (Max 1200px) */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Interactive UI Card */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #f1f5f9;
            color: var(--text-main);
            transition: all 0.2s ease;
            outline: none;
            font-family: inherit;
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
            background-color: #ffffff;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            padding-right: 45px;
        }

        .unit-label {
            position: absolute;
            right: 15px;
            color: var(--text-muted);
            font-weight: 500;
            pointer-events: none;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            margin-top: 10px;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            color: #ffffff;
        }

        .btn-clear {
            background-color: var(--danger-color);
        }

        .btn-clear:hover {
            background-color: var(--danger-hover);
        }

        /* Results Display */
        .result-container {
            margin-top: 30px;
            padding: 25px 20px;
            background-color: #fff7ed;
            border: 1px solid #ffedd5;
            border-radius: 8px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .result-main {
            padding-bottom: 15px;
            border-bottom: 1px solid #fed7aa;
        }

        .result-label {
            font-size: 0.95rem;
            color: #c2410c;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #9a3412;
            line-height: 1.2;
        }

        .result-bags-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .bag-item {
            display: flex;
            flex-direction: column;
        }

        .bag-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ea580c;
        }

        .bag-label {
            font-size: 0.85rem;
            color: #9a3412;
            font-weight: 500;
        }

        /* Mobile Adjustments */
        @media screen and (max-width: 768px) {
            .container {
                /* Both side blank space removed for mobile users */
                padding: 20px 0;
                width: 100%;
            }
            .card {
                /* Edge to edge */
                border-radius: 0;
                border-left: none;
                border-right: none;
                box-shadow: none;
                padding: 20px 15px;
            }
            .row {
                flex-direction: column;
                gap: 20px;
            }
            .result-bags-grid {
                gap: 15px;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Concrete Calculator</h1>
    </header>

    <div class="container">
        <div class="card">
            
            <div class="row">
                <div class="col">
                    <label for="calcLength">Length</label>
                    <div class="input-wrapper">
                        <input type="number" id="calcLength" min="0" step="0.1" placeholder="0">
                        <span class="unit-label">ft</span>
                    </div>
                </div>
                <div class="col">
                    <label for="calcWidth">Width</label>
                    <div class="input-wrapper">
                        <input type="number" id="calcWidth" min="0" step="0.1" placeholder="0">
                        <span class="unit-label">ft</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="calcThickness">Thickness / Depth</label>
                <div class="input-wrapper">
                    <input type="number" id="calcThickness" min="0" step="0.5" placeholder="0">
                    <span class="unit-label">in</span>
                </div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-clear" id="clearDataBtn">Clear Data</button>
            </div>

            <div class="result-container">
                <div class="result-main">
                    <div class="result-label">Total Volume Required</div>
                    <div id="resultYards" class="result-value">0.00 yd³</div>
                </div>
                
                <div class="result-label" style="margin-bottom: 0;">Estimated Bags Needed</div>
                <div class="result-bags-grid">
                    <div class="bag-item">
                        <div id="bags80" class="bag-value">0</div>
                        <div class="bag-label">80 lb Bags</div>
                    </div>
                    <div class="bag-item">
                        <div id="bags60" class="bag-value">0</div>
                        <div class="bag-label">60 lb Bags</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const lengthInput = document.getElementById('calcLength');
            const widthInput = document.getElementById('calcWidth');
            const thicknessInput = document.getElementById('calcThickness');
            
            const resultYards = document.getElementById('resultYards');
            const bags80 = document.getElementById('bags80');
            const bags60 = document.getElementById('bags60');
            
            const clearDataBtn = document.getElementById('clearDataBtn');

            // Load Saved Data
            loadData();

            // Event Listeners for auto-calculation and auto-save
            const inputs = [lengthInput, widthInput, thicknessInput];
            inputs.forEach(input => {
                input.addEventListener('input', updateAndSave);
            });
            
            // Clear Data Event
            clearDataBtn.addEventListener('click', clearData);

            // Calculation Logic
            function calculateConcrete() {
                const length = parseFloat(lengthInput.value) || 0;
                const width = parseFloat(widthInput.value) || 0;
                const thickness = parseFloat(thicknessInput.value) || 0;

                if (length === 0 || width === 0 || thickness === 0) {
                    resultYards.textContent = '0.00 yd³';
                    bags80.textContent = '0';
                    bags60.textContent = '0';
                    return;
                }

                // Calculations
                // Volume in cubic feet = length(ft) * width(ft) * (thickness(in) / 12)
                const cubicFeet = length * width * (thickness / 12);
                
                // Volume in cubic yards = cubic feet / 27
                const cubicYards = cubicFeet / 27;

                // Estimate Bags (Standard yields: 80lb bag ~ 0.60 cu ft, 60lb bag ~ 0.45 cu ft)
                const numBags80 = Math.ceil(cubicFeet / 0.60);
                const numBags60 = Math.ceil(cubicFeet / 0.45);

                // Update UI
                resultYards.textContent = cubicYards.toFixed(2) + ' yd³';
                bags80.textContent = numBags80;
                bags60.textContent = numBags60;
            }

            // Save Data to Local Storage
            function updateAndSave() {
                calculateConcrete();
                
                const data = {
                    length: lengthInput.value,
                    width: widthInput.value,
                    thickness: thicknessInput.value
                };
                localStorage.setItem('concreteCalcData_toolshub365', JSON.stringify(data));
            }

            // Load Data from Local Storage
            function loadData() {
                const savedData = localStorage.getItem('concreteCalcData_toolshub365');
                if (savedData) {
                    try {
                        const data = JSON.parse(savedData);
                        if (data.length) lengthInput.value = data.length;
                        if (data.width) widthInput.value = data.width;
                        if (data.thickness) thicknessInput.value = data.thickness;
                        
                        calculateConcrete();
                    } catch (e) {
                        console.error('Error parsing saved data', e);
                        calculateConcrete();
                    }
                }
            }

            // Clear Data Function
            function clearData() {
                lengthInput.value = '';
                widthInput.value = '';
                thicknessInput.value = '';
                
                localStorage.removeItem('concreteCalcData_toolshub365');
                calculateConcrete();
            }
        });
    </script>
</body>
</html>
