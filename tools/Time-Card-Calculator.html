<!DOCTYPE html>
<!-- Category: Other Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Card Calculator</title>
    
    <!-- SEO & Metadata for AI Crawlers & Search Engines -->

    <meta name="keywords" content="Time Card Calculator, timesheet calculator, work hours calculator, payroll calculator, hourly pay calculator, time clock calculator, toolshub365.com">
    <meta name="author" content="toolshub365.com">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <link rel="canonical" href="https://toolshub365.com/time-card-calculator">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://toolshub365.com/time-card-calculator">
    <meta property="og:title" content="Time Card Calculator">
    <meta property="og:description" content="Calculate your daily and weekly work hours and total pay effortlessly with this auto-saving timesheet tool.">
    
    <!-- Structured Data (JSON-LD) for Technical SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "url": "https://toolshub365.com/time-card-calculator",

      "applicationCategory": "CalculatorApplication",

      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "provider": {
        "@type": "Organization",
        "name": "toolshub365.com",
        "url": "https://toolshub365.com"
      }

    </script>

    <style>
        /* CSS Variables */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #18bc9c;
            --secondary-hover: #128f76;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #34495e;
            --text-muted: #7f8c8d;
            --border-color: #dee2e6;
            --danger-color: #e74c3c;
            --danger-hover: #c0392b;
            --header-height: 50px;
        }

        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--header-height); /* Offset for fixed header */
            -webkit-font-smoothing: antialiased;
        }

        /* Fixed Header - Exactly 50px */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        header h1 {
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Main Container - Max Width 1200px */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            background-color: var(--bg-color);
            padding: 0 1.5rem;
        }

        /* Top Control Panel */
        .control-panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .input-group label {
            font-weight: 600;
            font-size: 1rem;
        }

        .input-group input {
            padding: 0.6rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            width: 150px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 2px rgba(24, 188, 156, 0.2);
        }

        .btn-clear {
            padding: 0.7rem 1.5rem;
            background-color: #fdf2f2;
            color: var(--danger-color);
            border: 1px solid #fadbd8;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-clear:hover {
            background-color: var(--danger-color);
            color: #ffffff;
            border-color: var(--danger-color);
        }

        /* Timesheet Grid */
        .timesheet-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .ts-header {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr;
            background-color: var(--primary-color);
            color: #ffffff;
            font-weight: 600;
            padding: 1rem 1.5rem;
        }

        .ts-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            gap: 1rem;
        }

        .ts-row:last-child {
            border-bottom: none;
        }

        .ts-day {
            font-weight: 600;
            color: var(--text-main);
        }

        .ts-input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            background-color: #fafbfc;
        }
        
        .ts-input:focus {
            outline: none;
            border-color: var(--secondary-color);
        }

        .ts-total {
            font-weight: 700;
            color: var(--secondary-color);
            text-align: right;
            font-size: 1.1rem;
        }

        /* Results Summary Panel */
        .summary-panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            margin-top: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 2rem;
            border-top: 4px solid var(--secondary-color);
        }

        .summary-box {
            text-align: center;
        }

        .summary-label {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .summary-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        /* Desktop specific alignment */
        @media (min-width: 769px) {
            .ts-header div:last-child, .ts-total {
                text-align: right;
            }
        }

        /* Responsive Design - Mobile */
        @media (max-width: 768px) {
            .container {
                /* Both side blank space removed for mobile users */
                padding: 0;
                margin: 0;
            }

            .control-panel, .summary-panel {
                border-radius: 0;
                box-shadow: none;
                border-bottom: 1px solid var(--border-color);
                margin-bottom: 0;
            }

            .timesheet-container {
                border-radius: 0;
                box-shadow: none;
                background-color: var(--bg-color);
            }

            .ts-header {
                display: none; /* Hide standard headers on mobile */
            }

            .ts-row {
                display: flex;
                flex-direction: column;
                background-color: var(--card-bg);
                margin-bottom: 0.5rem;
                padding: 1.25rem;
                gap: 0.8rem;
                border-bottom: 1px solid var(--border-color);
                border-top: 1px solid var(--border-color);
            }

            .ts-day {
                font-size: 1.1rem;
                border-bottom: 2px solid var(--bg-color);
                padding-bottom: 0.5rem;
                margin-bottom: 0.5rem;
                color: var(--primary-color);
            }

            .mobile-label {
                display: flex;
                flex-direction: column;
                font-size: 0.85rem;
                color: var(--text-muted);
                font-weight: 600;
                gap: 0.3rem;
            }

            .mobile-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
                width: 100%;
            }

            .ts-total {
                text-align: left;
                background-color: #f1f8f6;
                padding: 0.75rem;
                border-radius: 6px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 0.5rem;
            }

            .ts-total::before {
                content: "Daily Total:";
                font-size: 0.9rem;
                color: var(--text-main);
                font-weight: 600;
            }

            .input-group {
                width: 100%;
                justify-content: space-between;
            }
            
            .btn-clear {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- Fixed Header -->
    <header>
        <h1>Time Card Calculator</h1>
    </header>

    <!-- Main Application Container -->
    <div class="container">
        
        <!-- Top Control Panel -->
        <div class="control-panel">
            <div class="input-group">
                <label for="hourlyRate">Hourly Rate ($)</label>
                <input type="number" id="hourlyRate" placeholder="e.g. 20.00" min="0" step="any">
            </div>
            <button type="button" class="btn-clear" id="clearDataBtn">Clear All Data</button>
        </div>

        <!-- Timesheet Grid -->
        <div class="timesheet-container" id="timesheetContainer">
            <!-- Headers (Desktop only) -->
            <div class="ts-header">
                <div>Day</div>
                <div>Start Time</div>
                <div>End Time</div>
                <div>Break (mins)</div>
                <div>Total Hours</div>
            </div>
            <!-- Rows will be injected by JavaScript -->
        </div>

        <!-- Results Summary Panel -->
        <div class="summary-panel">
            <div class="summary-box">
                <div class="summary-label">Total Hours</div>
                <div class="summary-value" id="grandTotalHours">0.00</div>
            </div>
            <div class="summary-box">
                <div class="summary-label">Total Pay</div>
                <div class="summary-value" id="grandTotalPay">$0.00</div>
            </div>
        </div>

    </div>

    <!-- Application Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
            const timesheetContainer = document.getElementById('timesheetContainer');
            const hourlyRateInput = document.getElementById('hourlyRate');
            const grandTotalHoursEl = document.getElementById('grandTotalHours');
            const grandTotalPayEl = document.getElementById('grandTotalPay');
            const clearDataBtn = document.getElementById('clearDataBtn');

            const STORAGE_PREFIX = 'toolshub365_timecard_';

            // Initialize Grid
            function buildGrid() {
                daysOfWeek.forEach((day, index) => {
                    const row = document.createElement('div');
                    row.className = 'ts-row';

                    row.innerHTML = `
                        <div class="ts-day">${day}</div>
                        <label class="mobile-label">
                            <span class="desktop-hidden">Start Time</span>
                            <input type="time" class="ts-input start-time" data-day="${index}">
                        </label>
                        <label class="mobile-label">
                            <span class="desktop-hidden">End Time</span>
                            <input type="time" class="ts-input end-time" data-day="${index}">
                        </label>
                        <label class="mobile-label">
                            <span class="desktop-hidden">Break (mins)</span>
                            <input type="number" class="ts-input break-time" data-day="${index}" placeholder="0" min="0">
                        </label>
                        <div class="ts-total" id="total-${index}">0.00 h</div>
                    `;

                    // For mobile responsiveness layout adjustments via JS creation
                    const labels = row.querySelectorAll('.mobile-label');
                    if (window.innerWidth <= 768) {
                        const gridDiv = document.createElement('div');
                        gridDiv.className = 'mobile-grid';
                        gridDiv.appendChild(labels[0]);
                        gridDiv.appendChild(labels[1]);
                        row.insertBefore(gridDiv, labels[2]);
                    } else {
                        // Hide mobile labels on desktop
                        row.querySelectorAll('.desktop-hidden').forEach(el => el.style.display = 'none');
                    }

                    timesheetContainer.appendChild(row);
                });
            }

            buildGrid();

            const startInputs = document.querySelectorAll('.start-time');
            const endInputs = document.querySelectorAll('.end-time');
            const breakInputs = document.querySelectorAll('.break-time');

            // Load saved data
            loadData();
            calculateTotals();

            // Event Listeners for real-time calculation and auto-save
            const allInputs =[...startInputs, ...endInputs, ...breakInputs, hourlyRateInput];
            allInputs.forEach(input => {
                input.addEventListener('input', () => {
                    calculateTotals();
                    saveData();
                });
            });

            // Clear Button Logic
            clearDataBtn.addEventListener('click', () => {
                if(confirm("Are you sure you want to clear all timesheet data?")) {
                    clearData();
                }
            });

            // Calculate hours for a specific day
            function calculateDayHours(startStr, endStr, breakMinsStr) {
                if (!startStr || !endStr) return 0;
                
                const startParts = startStr.split(':');
                const endParts = endStr.split(':');
                
                let startMins = parseInt(startParts[0]) * 60 + parseInt(startParts[1]);
                let endMins = parseInt(endParts[0]) * 60 + parseInt(endParts[1]);

                // Handle overnight shifts (end time is past midnight)
                if (endMins < startMins) {
                    endMins += 24 * 60;
                }

                const breakMins = parseInt(breakMinsStr) || 0;
                let totalMins = endMins - startMins - breakMins;
                
                if (totalMins < 0) totalMins = 0;
                
                return totalMins / 60;
            }

            // Core Calculation Logic
            function calculateTotals() {
                let weeklyTotalHours = 0;

                for (let i = 0; i < 7; i++) {
                    const start = startInputs[i].value;
                    const end = endInputs[i].value;
                    const brk = breakInputs[i].value;

                    const dayHours = calculateDayHours(start, end, brk);
                    document.getElementById(`total-${i}`).textContent = dayHours.toFixed(2) + ' h';
                    weeklyTotalHours += dayHours;
                }

                const rate = parseFloat(hourlyRateInput.value) || 0;
                const totalPay = weeklyTotalHours * rate;

                // Update UI
                grandTotalHoursEl.textContent = weeklyTotalHours.toFixed(2);
                
                // Format Pay to currency
                grandTotalPayEl.textContent = '$' + totalPay.toLocaleString('en-US', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
            }

            // Auto-Save to User Device (LocalStorage)
            function saveData() {
                localStorage.setItem(STORAGE_PREFIX + 'rate', hourlyRateInput.value);
                
                const weeklyData =[];
                for (let i = 0; i < 7; i++) {
                    weeklyData.push({
                        start: startInputs[i].value,
                        end: endInputs[i].value,
                        brk: breakInputs[i].value
                    });
                }
                localStorage.setItem(STORAGE_PREFIX + 'weekly', JSON.stringify(weeklyData));
            }

            // Load saved data from User Device
            function loadData() {
                const savedRate = localStorage.getItem(STORAGE_PREFIX + 'rate');
                if (savedRate) hourlyRateInput.value = savedRate;

                const savedWeeklyData = localStorage.getItem(STORAGE_PREFIX + 'weekly');
                if (savedWeeklyData) {
                    try {
                        const parsedData = JSON.parse(savedWeeklyData);
                        for (let i = 0; i < 7; i++) {
                            if (parsedData[i]) {
                                startInputs[i].value = parsedData[i].start || '';
                                endInputs[i].value = parsedData[i].end || '';
                                breakInputs[i].value = parsedData[i].brk || '';
                            }
                        }
                    } catch (e) {
                        console.error("Error loading saved timesheet data");
                    }
                }
            }

            // Clear Data Function
            function clearData() {
                // Clear inputs
                hourlyRateInput.value = '';
                for (let i = 0; i < 7; i++) {
                    startInputs[i].value = '';
                    endInputs[i].value = '';
                    breakInputs[i].value = '';
                }

                // Remove from LocalStorage
                localStorage.removeItem(STORAGE_PREFIX + 'rate');
                localStorage.removeItem(STORAGE_PREFIX + 'weekly');

                // Recalculate to reset displays
                calculateTotals();
            }
        });
    </script>
</body>
</html>
