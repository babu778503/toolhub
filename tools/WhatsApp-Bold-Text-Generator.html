<body>

    <header>WhatsApp Bold Text Generator</header>

    <main class="container">
        <div class="tool-panel">
            <div class="input-group">
                <textarea id="textInput" placeholder="Type your text here to make it bold..." aria-label="Input text to generate bold styles"></textarea>
            </div>
            
            <div class="action-bar">
                <button id="clearBtn" class="clear-btn" aria-label="Clear all input data">Clear Data</button>
            </div>

            <div id="resultsContainer" class="results" aria-live="polite">
                <!-- Dynamically generated bold styles will appear here -->
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputField = document.getElementById('textInput');
            const resultsContainer = document.getElementById('resultsContainer');
            const clearBtn = document.getElementById('clearBtn');
            const storageKey = 'toolshub365_whatsappBoldTextData';

            // Auto-load previously saved data from user's device
            const savedText = localStorage.getItem(storageKey);
            if (savedText) {
                inputField.value = savedText;
            }

            // Character Mapping for Unicode Bold Text Variations
            const normalChars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            
            const boldMaps = {
                sansBold: '𝗮𝗯𝗰𝗱𝗲𝗳𝗴𝗵𝗶𝗷𝗸𝗹𝗺𝗻𝗼𝗽𝗾𝗿𝘀𝘁𝘂𝘃𝘄𝘅𝘆𝘇𝗔𝗕𝗖𝗗𝗘𝗙𝗚𝗛𝗜𝗝𝗞𝗟𝗠𝗡𝗢𝗣𝗤𝗥𝗦𝗧𝗨𝗩𝗪𝗫𝗬𝗭𝟬𝟭𝟮𝟯𝟰𝟱𝟲𝟳𝟴𝟵',
                serifBold: '𝐚𝐛𝐜𝐝𝐞𝐟𝐠𝐡𝐢𝐣𝐤𝐥𝐦𝐧𝐨𝐩𝐪𝐫𝐬𝐭𝐮𝐯𝐰𝐱𝐲𝐳𝐀𝐁𝐂𝐃𝐄𝐅𝐆𝐇𝐈𝐉𝐊𝐋𝐌𝐍𝐎𝐏𝐐𝐑𝐒𝐓𝐔𝐕𝐖𝐗𝐘𝐙𝟎𝟏𝟐𝟑𝟒𝟓𝟔𝟕𝟖𝟗',
                sansBoldItalic: '𝙖𝙗𝙘𝙙𝙚𝙛𝙜𝙝𝙞𝙟𝙠𝙡𝙢𝙣𝙤𝙥𝙦𝙧𝙨𝙩𝙪𝙫𝙬𝙭𝙮𝙯𝘼𝘽𝘾𝘿𝙀𝙁𝙂𝙃𝙄𝙅𝙆𝙇𝙈𝙉𝙊𝙋𝙌𝙍𝙎𝙏𝙐𝙑𝙒𝙓𝙔𝙕𝟬𝟭𝟮𝟯𝟰𝟱𝟲𝟳𝟴𝟵',
                serifBoldItalic: '𝒂𝒃𝒄𝒅𝒆𝒇𝒈𝒉𝒊𝒋𝒌𝒍𝒎𝒏𝒐𝒑𝒒𝒓𝒔𝒕𝒖𝒗𝒘𝒙𝒚𝒛𝑨𝑩𝑪𝑫𝑬𝑭𝑮𝑯𝑰𝑱𝑲𝑳𝑴𝑵𝑶𝑷𝑸𝑹𝑺𝑻𝑼𝑽𝑾𝑿𝒀𝒁𝟎𝟏𝟐𝟑𝟒𝟓𝟔𝟕𝟖𝟗',
                frakturBold: '𝖆𝖇𝖈𝖉𝖊𝖋𝖌𝖍𝖎𝖏𝖐𝖑𝖒𝖓𝖔𝖕𝖖𝖗𝖘𝖙𝖚𝖛𝖜𝖝𝖞𝖟𝕬𝕭𝕮𝕯𝕰𝕱𝕲𝕳𝕴𝕵𝕶𝕷𝕸𝕹𝕺𝕻𝕼𝕽𝕾𝕿𝖀𝖁𝖂𝖃𝖄𝖅0123456789',
                scriptBold: '𝓪𝓫𝓬𝓭𝓮𝓯𝓰𝓱𝓲𝓳𝓴𝓵𝓶𝓷𝓸𝓹𝓺𝓻𝓼𝓽𝓾𝓿𝔀𝔁𝔂𝔃𝓐𝓑𝓒𝓓𝓔𝓕𝓖𝓗𝓘𝓙𝓚𝓛𝓜𝓝𝓞𝓟𝓠𝓡𝓢𝓣𝓤𝓥𝓦𝓧𝓨𝓩𝟎𝟏𝟐𝟑𝟒𝟓𝟔𝟕𝟖𝟗',
                wideBold: 'ａｂｃｄｅｆｇｈｉｊｋｌｍｎｏｐｑｒｓｔｕｖｗｘｙｚＡＢＣＤＥＦＧＨＩＪＫＬＭＮＯＰＱＲＳＴＵＶＷＸＹＺ０１２３４５６７８９' 
            };

            // Convert string using specified unicode map
            function applyUnicodeBold(text, mapKey) {
                let result = '';
                // Array.from splits string correctly accounting for surrogate pairs
                const mapChars = Array.from(boldMaps[mapKey]); 
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const index = normalChars.indexOf(char);
                    if (index !== -1) {
                        result += mapChars[index] || char;
                    } else {
                        result += char; // Leave unmapped characters (spaces, punctuation) unchanged
                    }
                }
                return result;
            }

            // Build output elements
            function processBoldStyles(text) {
                resultsContainer.innerHTML = ''; 
                
                if (!text.trim()) {
                    resultsContainer.innerHTML = '<div class="empty-state">Start typing to generate bold text variations...</div>';
                    return;
                }

                // Array of bold styles to generate
                const boldVariations =[
                    { label: 'WhatsApp Native Bold (Uses *)', value: `*${text}*` },
                    { label: 'Sans-Serif Bold', value: applyUnicodeBold(text, 'sansBold') },
                    { label: 'Serif Bold', value: applyUnicodeBold(text, 'serifBold') },
                    { label: 'Sans-Serif Bold Italic', value: applyUnicodeBold(text, 'sansBoldItalic') },
                    { label: 'Serif Bold Italic', value: applyUnicodeBold(text, 'serifBoldItalic') },
                    { label: 'Fraktur / Gothic Bold', value: applyUnicodeBold(text, 'frakturBold') },
                    { label: 'Script Cursive Bold', value: applyUnicodeBold(text, 'scriptBold') },
                    { label: 'Wide Block Bold', value: applyUnicodeBold(text, 'wideBold') }
                ];

                boldVariations.forEach((item) => {
                    // Container
                    const wrapDiv = document.createElement('div');
                    wrapDiv.className = 'result-item';

                    // Text Info
                    const textDiv = document.createElement('div');
                    textDiv.className = 'text-container';
                    
                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'style-name';
                    labelDiv.innerText = item.label;

                    const valDiv = document.createElement('div');
                    valDiv.className = 'result-text';
                    valDiv.innerText = item.value;

                    textDiv.appendChild(labelDiv);
                    textDiv.appendChild(valDiv);

                    // Action Button
                    const copyButton = document.createElement('button');
                    copyButton.className = 'copy-btn';
                    copyButton.innerText = 'Copy';
                    
                    // 100% Workable Mobile & Desktop Copy Function
                    copyButton.onclick = () => {
                        const textToCopy = item.value;

                        const handleSuccess = () => {
                            const originalText = copyButton.innerText;
                            copyButton.innerText = 'Copied!';
                            copyButton.style.backgroundColor = '#075E54';
                            setTimeout(() => {
                                copyButton.innerText = originalText;
                                copyButton.style.backgroundColor = ''; // Reverts to default CSS hover/background
                            }, 2000);
                        };

                        const handleFailure = () => {
                            alert("Clipboard copy failed. Please copy manually.");
                        };

                        const executeFallbackCopy = () => {
                            // Create temporary textarea for mobile selection
                            const tempTextArea = document.createElement('textarea');
                            tempTextArea.value = textToCopy;
                            
                            // Styling to prevent layout shifting or scrolling to bottom
                            tempTextArea.style.position = 'fixed';
                            tempTextArea.style.top = '0';
                            tempTextArea.style.left = '-9999px';
                            tempTextArea.style.opacity = '0';
                            
                            document.body.appendChild(tempTextArea);
                            
                            // Step 1: Select the text for Mobile Devices (iOS/Android)
                            tempTextArea.select();
                            tempTextArea.setSelectionRange(0, 99999); 

                            try {
                                const successful = document.execCommand('copy');
                                if (successful) {
                                    handleSuccess();
                                } else {
                                    handleFailure();
                                }
                            } catch (err) {
                                handleFailure();
                            }
                            
                            // Cleanup
                            document.body.removeChild(tempTextArea);
                            window.getSelection().removeAllRanges(); // Deselect text
                        };

                        // Step 2: Try modern Clipboard API first, fallback to execCommand for Mobile WebView/Older browsers
                        if (navigator.clipboard && window.isSecureContext) {
                            navigator.clipboard.writeText(textToCopy)
                                .then(handleSuccess)
                                .catch(err => {
                                    executeFallbackCopy();
                                });
                        } else {
                            executeFallbackCopy();
                        }
                    };

                    wrapDiv.appendChild(textDiv);
                    wrapDiv.appendChild(copyButton);

                    resultsContainer.appendChild(wrapDiv);
                });
            }

            // Event Listeners
            inputField.addEventListener('input', (event) => {
                const currentText = event.target.value;
                localStorage.setItem(storageKey, currentText); // Auto-save to user device
                processBoldStyles(currentText);
            });

            clearBtn.addEventListener('click', () => {
                inputField.value = '';
                localStorage.removeItem(storageKey); // Clear data from device
                processBoldStyles('');
                inputField.focus();
            });

            // Trigger initial render
            processBoldStyles(inputField.value);
        });
    </script>
</body>
