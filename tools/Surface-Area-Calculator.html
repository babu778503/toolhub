    <style>
        /* CSS Variables & Reset */
        :root {
            --primary-color: #27ae60;
            --primary-hover: #219150;
            --header-bg: #ffffff;
            --bg-color: #f4f6f8;
            --text-color: #333;
            --border-color: #ddd;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --header-height: 50px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding-top: var(--header-height); /* Space for fixed header */
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--header-bg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        header h1 {
            font-size: 1.25rem; /* ~20px */
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Main Container */
        .container {
            background-color: #ffffff;
            margin: 30px auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 1200px;
            min-height: 400px;
        }

        /* Shape Selector */
        .shape-select-container {
            margin-bottom: 25px;
        }

        .shape-select-container label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: #fff;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.1);
        }

        /* Input Fields Grid */
        .input-group {
            display: none; /* Hidden by default */
            animation: fadeIn 0.3s ease-in-out;
        }

        .input-group.active {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
        }

        .input-wrapper label {
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #444;
        }

        .input-wrapper input {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
        }

        /* Buttons */
        .btn-group {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
            flex: 2;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
            flex: 1;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        /* Results */
        .result-area {
            margin-top: 30px;
            padding: 20px;
            background-color: #f9fbfd;
            border: 1px solid #e1e4e8;
            border-left: 5px solid var(--primary-color);
            border-radius: 4px;
            display: none;
        }

        .result-title {
            font-size: 1rem;
            color: #666;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .formula-display {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #777;
            font-style: italic;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Desktop Optimization */
        @media (min-width: 769px) {
            .container {
                margin: 40px auto; /* Centered with vertical spacing */
            }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;
                margin: 0;
                border-radius: 0;
                box-shadow: none;
                min-height: calc(100vh - var(--header-height));
            }

            .btn-group {
                flex-direction: column;
            }

            .btn-calc, .btn-clear {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Surface Area Calculator</h1>
    </header>

    <div class="container">
        
        <div class="shape-select-container">
            <label for="shapeType">Select 3D Shape:</label>
            <select id="shapeType" onchange="changeShape()">
                <option value="cube">Cube</option>
                <option value="rectPrism">Rectangular Prism (Box)</option>
                <option value="cylinder">Cylinder</option>
                <option value="sphere">Sphere</option>
                <option value="cone">Cone</option>
            </select>
        </div>

        <form id="calcForm" onsubmit="return false">
            
            <!-- Cube Inputs -->
            <div id="cube-inputs" class="input-group">
                <div class="input-wrapper">
                    <label>Edge Length (a)</label>
                    <input type="number" id="cubeEdge" step="any" placeholder="e.g. 5" oninput="autoSave()">
                </div>
            </div>

            <!-- Rectangular Prism Inputs -->
            <div id="rectPrism-inputs" class="input-group">
                <div class="input-wrapper">
                    <label>Length (l)</label>
                    <input type="number" id="prismLen" step="any" placeholder="e.g. 10" oninput="autoSave()">
                </div>
                <div class="input-wrapper">
                    <label>Width (w)</label>
                    <input type="number" id="prismWid" step="any" placeholder="e.g. 5" oninput="autoSave()">
                </div>
                <div class="input-wrapper">
                    <label>Height (h)</label>
                    <input type="number" id="prismHeight" step="any" placeholder="e.g. 8" oninput="autoSave()">
                </div>
            </div>

            <!-- Cylinder Inputs -->
            <div id="cylinder-inputs" class="input-group">
                <div class="input-wrapper">
                    <label>Radius (r)</label>
                    <input type="number" id="cylRadius" step="any" placeholder="e.g. 3" oninput="autoSave()">
                </div>
                <div class="input-wrapper">
                    <label>Height (h)</label>
                    <input type="number" id="cylHeight" step="any" placeholder="e.g. 10" oninput="autoSave()">
                </div>
            </div>

            <!-- Sphere Inputs -->
            <div id="sphere-inputs" class="input-group">
                <div class="input-wrapper">
                    <label>Radius (r)</label>
                    <input type="number" id="sphereRadius" step="any" placeholder="e.g. 7" oninput="autoSave()">
                </div>
            </div>

            <!-- Cone Inputs -->
            <div id="cone-inputs" class="input-group">
                <div class="input-wrapper">
                    <label>Radius (r)</label>
                    <input type="number" id="coneRadius" step="any" placeholder="e.g. 4" oninput="autoSave()">
                </div>
                <div class="input-wrapper">
                    <label>Height (h)</label>
                    <input type="number" id="coneHeight" step="any" placeholder="e.g. 9" oninput="autoSave()">
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-calc" onclick="calculate()">Calculate Surface Area</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

        </form>

        <div id="result-box" class="result-area">
            <div class="result-title">Total Surface Area (A)</div>
            <div class="result-value" id="finalResult">0</div>
            <div class="formula-display" id="formulaText"></div>
        </div>

    </div>

    <script>
        // --- Logic & Functions ---

        // Map inputs to shapes for visibility toggling
        const shapes = ['cube', 'rectPrism', 'cylinder', 'sphere', 'cone'];

        function changeShape() {
            const selected = document.getElementById('shapeType').value;
            
            // Hide all input groups
            shapes.forEach(shape => {
                document.getElementById(shape + '-inputs').classList.remove('active');
            });

            // Show selected input group
            document.getElementById(selected + '-inputs').classList.add('active');
            
            // Hide result when switching shapes until recalculated
            document.getElementById('result-box').style.display = 'none';
            
            autoSave();
        }

        function calculate() {
            const shape = document.getElementById('shapeType').value;
            let area = 0;
            let formula = "";
            let isValid = true;

            try {
                switch(shape) {
                    case 'cube':
                        const a = parseFloat(document.getElementById('cubeEdge').value);
                        if(validate(a)) {
                            area = 6 * a * a;
                            formula = "Formula: A = 6a²";
                        } else isValid = false;
                        break;

                    case 'rectPrism':
                        const l = parseFloat(document.getElementById('prismLen').value);
                        const w = parseFloat(document.getElementById('prismWid').value);
                        const h = parseFloat(document.getElementById('prismHeight').value);
                        if(validate(l, w, h)) {
                            area = 2 * ((l * w) + (l * h) + (w * h));
                            formula = "Formula: A = 2(lw + lh + wh)";
                        } else isValid = false;
                        break;

                    case 'cylinder':
                        const cr = parseFloat(document.getElementById('cylRadius').value);
                        const ch = parseFloat(document.getElementById('cylHeight').value);
                        if(validate(cr, ch)) {
                            area = (2 * Math.PI * cr * ch) + (2 * Math.PI * cr * cr);
                            formula = "Formula: A = 2πrh + 2πr²";
                        } else isValid = false;
                        break;

                    case 'sphere':
                        const sr = parseFloat(document.getElementById('sphereRadius').value);
                        if(validate(sr)) {
                            area = 4 * Math.PI * sr * sr;
                            formula = "Formula: A = 4πr²";
                        } else isValid = false;
                        break;

                    case 'cone':
                        const cor = parseFloat(document.getElementById('coneRadius').value);
                        const coh = parseFloat(document.getElementById('coneHeight').value);
                        if(validate(cor, coh)) {
                            // Slant height (s) = sqrt(r^2 + h^2)
                            const s = Math.sqrt((cor * cor) + (coh * coh));
                            area = (Math.PI * cor * s) + (Math.PI * cor * cor);
                            formula = "Formula: A = πr(r + √(h² + r²))";
                        } else isValid = false;
                        break;
                }

                if (isValid) {
                    const resultBox = document.getElementById('result-box');
                    document.getElementById('finalResult').innerText = area.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 }) + " sq units";
                    document.getElementById('formulaText').innerText = formula;
                    resultBox.style.display = 'block';
                    
                    // Scroll to result on mobile
                    if(window.innerWidth <= 768) {
                        resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                } else {
                    alert("Please enter positive numeric values for all fields.");
                }

            } catch (e) {
                console.error(e);
            }
        }

        function validate(...values) {
            for(let val of values) {
                if(isNaN(val) || val <= 0) return false;
            }
            return true;
        }

        // --- Local Storage (Auto Save/Load) ---

        function autoSave() {
            const data = {
                shape: document.getElementById('shapeType').value,
                cube: document.getElementById('cubeEdge').value,
                pL: document.getElementById('prismLen').value,
                pW: document.getElementById('prismWid').value,
                pH: document.getElementById('prismHeight').value,
                cR: document.getElementById('cylRadius').value,
                cH: document.getElementById('cylHeight').value,
                sR: document.getElementById('sphereRadius').value,
                coR: document.getElementById('coneRadius').value,
                coH: document.getElementById('coneHeight').value
            };
            localStorage.setItem('surfaceAreaCalcData', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('surfaceAreaCalcData');
            if(saved) {
                const data = JSON.parse(saved);
                
                // Set Shape
                document.getElementById('shapeType').value = data.shape || 'cube';
                
                // Set Values
                document.getElementById('cubeEdge').value = data.cube || '';
                document.getElementById('prismLen').value = data.pL || '';
                document.getElementById('prismWid').value = data.pW || '';
                document.getElementById('prismHeight').value = data.pH || '';
                document.getElementById('cylRadius').value = data.cR || '';
                document.getElementById('cylHeight').value = data.cH || '';
                document.getElementById('sphereRadius').value = data.sR || '';
                document.getElementById('coneRadius').value = data.coR || '';
                document.getElementById('coneHeight').value = data.coH || '';
                
                // Refresh UI
                changeShape();
            } else {
                changeShape(); // Initialize default
            }
        }

        function clearData() {
            if(confirm("Are you sure you want to clear all data?")) {
                localStorage.removeItem('surfaceAreaCalcData');
                document.getElementById('calcForm').reset();
                document.getElementById('result-box').style.display = 'none';
                document.getElementById('shapeType').value = 'cube';
                changeShape();
            }
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
