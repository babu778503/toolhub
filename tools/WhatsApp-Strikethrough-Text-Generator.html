<body>

    <header>WhatsApp Strikethrough Text Generator</header>

    <main class="container">
        <div class="tool-panel">
            <div class="input-group">
                <textarea id="textInput" placeholder="Type your text here to cross it out..." aria-label="Input text to generate strikethrough styles"></textarea>
            </div>
            
            <div class="action-bar">
                <button id="clearBtn" class="clear-btn" aria-label="Clear all input data">Clear Data</button>
            </div>

            <div id="resultsContainer" class="results" aria-live="polite">
                <!-- Dynamically generated strikethrough styles will appear here -->
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputField = document.getElementById('textInput');
            const resultsContainer = document.getElementById('resultsContainer');
            const clearBtn = document.getElementById('clearBtn');
            const storageKey = 'toolshub365_whatsappStrikethroughTextData';

            // Auto-load previously saved data from user's device
            const savedText = localStorage.getItem(storageKey);
            if (savedText) {
                inputField.value = savedText;
            }

            // Function to apply combining unicode characters to text
            function applyCombiningChar(text, combiningChar) {
                let result = '';
                // Split correctly dealing with standard characters
                const chars = Array.from(text);
                for (let i = 0; i < chars.length; i++) {
                    const char = chars[i];
                    // Skip adding combining char to newlines or spaces (optional, but spaces look better with it)
                    if (char === '\n') {
                        result += char;
                    } else {
                        result += char + combiningChar;
                    }
                }
                return result;
            }

            // Build output elements
            function processStrikethroughStyles(text) {
                resultsContainer.innerHTML = ''; 
                
                if (!text.trim()) {
                    resultsContainer.innerHTML = '<div class="empty-state">Start typing to generate crossed-out text variations...</div>';
                    return;
                }

                // Array of strikethrough styles to generate using different unicode combining marks
                const strikethroughVariations =[
                    { label: 'WhatsApp Native Strikethrough (Uses ~)', value: `~${text}~` },
                    { label: 'Standard Unicode Strikethrough', value: applyCombiningChar(text, '\u0336') },
                    { label: 'Short Stroke Overlay', value: applyCombiningChar(text, '\u0335') },
                    { label: 'Slash Strikethrough', value: applyCombiningChar(text, '\u0337') },
                    { label: 'Long Slash Strikethrough', value: applyCombiningChar(text, '\u0338') },
                    { label: 'Tilde Overlay (Squiggly Cross)', value: applyCombiningChar(text, '\u0334') },
                    { label: 'Double Strikethrough', value: applyCombiningChar(text, '\u0336\u0336') }
                ];

                strikethroughVariations.forEach((item) => {
                    // Container
                    const wrapDiv = document.createElement('div');
                    wrapDiv.className = 'result-item';

                    // Text Info
                    const textDiv = document.createElement('div');
                    textDiv.className = 'text-container';
                    
                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'style-name';
                    labelDiv.innerText = item.label;

                    const valDiv = document.createElement('div');
                    valDiv.className = 'result-text';
                    valDiv.innerText = item.value;

                    textDiv.appendChild(labelDiv);
                    textDiv.appendChild(valDiv);

                    // Action Button
                    const copyButton = document.createElement('button');
                    copyButton.className = 'copy-btn';
                    copyButton.innerText = 'Copy';
                    
                    // 100% Workable Mobile & Desktop Copy Function
                    copyButton.onclick = () => {
                        const textToCopy = item.value;

                        const handleSuccess = () => {
                            const originalText = copyButton.innerText;
                            copyButton.innerText = 'Copied!';
                            copyButton.style.backgroundColor = '#075E54';
                            setTimeout(() => {
                                copyButton.innerText = originalText;
                                copyButton.style.backgroundColor = ''; // Reverts to default CSS background
                            }, 2000);
                        };

                        const handleFailure = () => {
                            alert("Clipboard copy failed. Please copy manually.");
                        };

                        const executeFallbackCopy = () => {
                            // Create temporary textarea for mobile selection
                            const tempTextArea = document.createElement('textarea');
                            tempTextArea.value = textToCopy;
                            
                            // Styling to prevent layout shifting or scrolling to bottom
                            tempTextArea.style.position = 'fixed';
                            tempTextArea.style.top = '0';
                            tempTextArea.style.left = '-9999px';
                            tempTextArea.style.opacity = '0';
                            
                            document.body.appendChild(tempTextArea);
                            
                            // Step 1: Select the text for Mobile Devices (iOS/Android fallback requirement)
                            tempTextArea.select();
                            tempTextArea.setSelectionRange(0, 99999); 

                            try {
                                const successful = document.execCommand('copy');
                                if (successful) {
                                    handleSuccess();
                                } else {
                                    handleFailure();
                                }
                            } catch (err) {
                                handleFailure();
                            }
                            
                            // Cleanup
                            document.body.removeChild(tempTextArea);
                            window.getSelection().removeAllRanges(); // Deselect text
                        };

                        // Step 2: Try modern Clipboard API first, fallback to execCommand for Mobile WebView/Older browsers
                        if (navigator.clipboard && window.isSecureContext) {
                            navigator.clipboard.writeText(textToCopy)
                                .then(handleSuccess)
                                .catch(err => {
                                    executeFallbackCopy();
                                });
                        } else {
                            executeFallbackCopy();
                        }
                    };

                    wrapDiv.appendChild(textDiv);
                    wrapDiv.appendChild(copyButton);

                    resultsContainer.appendChild(wrapDiv);
                });
            }

            // Event Listeners
            inputField.addEventListener('input', (event) => {
                const currentText = event.target.value;
                localStorage.setItem(storageKey, currentText); // Auto-save to user device
                processStrikethroughStyles(currentText);
            });

            clearBtn.addEventListener('click', () => {
                inputField.value = '';
                localStorage.removeItem(storageKey); // Clear data from device
                processStrikethroughStyles('');
                inputField.focus();
            });

            // Trigger initial render
            processStrikethroughStyles(inputField.value);
        });
    </script>
</body>
