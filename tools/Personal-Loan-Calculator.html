<!DOCTYPE html>
<!-- Category: Financial Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    
    <!-- SEO & Metadata -->
    <title>Personal Loan Calculator</title>
    <meta name="description" content="Free Personal Loan Calculator. Calculate monthly payments, total interest, and payoff costs for personal loans. Fast, accurate, and mobile-friendly with auto-save.">
    <meta name="keywords" content="Personal Loan Calculator, Monthly Payment Calculator, Loan Amortization, Interest Calculator, Debt Payoff Tool, Toolshub365">
    <meta name="author" content="Toolshub365">
    <meta name="robots" content="index, follow">
    
    <!-- AI Crawler Optimization -->
    <meta name="gpt-bot" content="index, follow">
    <meta name="googlebot" content="index, follow">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://toolshub365.com/personal-loan-calculator">

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialProduct",
      "name": "Personal Loan Calculator",
      "category": "Finance Tools",

      "description": "Calculates monthly payments and total interest for personal loans.",
      "brand": {
        "@type": "Brand",

      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f4f6f7;
            --text-color: #333;
            --header-height: 50px;
            --container-width: 1200px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        /* Calculator Card */
        .calculator-wrapper {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
        }

        /* Input Section */
        .input-panel {
            flex: 1;
            min-width: 320px;
            padding: 30px;
            border-right: 1px solid #ecf0f1;
        }

        /* Result Section */
        .result-panel {
            flex: 1;
            min-width: 320px;
            padding: 30px;
            background-color: #fbfbfb;
            display: flex;
            flex-direction: column;
        }

        /* Typography */
        h2 {
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.95rem;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group span {
            position: absolute;
            color: #7f8c8d;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .prefix { left: 12px; }
        .suffix { right: 12px; }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .has-prefix input { padding-left: 25px; }
        .has-suffix input { padding-right: 35px; }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        /* Split inputs (Years/Months) */
        .split-group {
            display: flex;
            gap: 15px;
        }
        
        .split-group .form-subgroup {
            flex: 1;
        }

        /* Buttons */
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:active { transform: translateY(1px); }

        .btn-calc {
            background-color: var(--secondary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
        }

        .btn-calc:hover { background-color: #2980b9; }

        .btn-clear {
            background-color: #ecf0f1;
            color: var(--text-color);
            border: 1px solid #bdc3c7;
        }

        .btn-clear:hover { background-color: #bdc3c7; }

        /* Results Display */
        .result-card {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #eee;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .result-label {
            font-size: 0.9rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .main-result {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .grid-item {
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #eee;
            text-align: center;
        }

        .grid-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-top: 5px;
        }

        .disclaimer {
            font-size: 0.8rem;
            color: #999;
            margin-top: 20px;
            text-align: center;
        }

        /* Mobile Responsive Design */
        @media screen and (max-width: 768px) {
            /* Remove blank spaces for mobile users */
            .container {
                padding: 0;
                margin: 0;
                max-width: 100%;
            }

            .calculator-wrapper {
                border-radius: 0;
                box-shadow: none;
                flex-direction: column;
            }

            .input-panel {
                border-right: none;
                border-bottom: 1px solid #ecf0f1;
                padding: 25px 20px;
            }

            .result-panel {
                padding: 25px 20px;
                background-color: #fff;
                border-top: 5px solid #f4f6f7;
            }

            header h1 {
                font-size: 1.1rem;
            }

            /* Prevent iOS zoom */
            input[type="number"] {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Personal Loan Calculator</h1>
    </header>

    <div class="container">
        <div class="calculator-wrapper">
            
            <!-- Input Section -->
            <div class="input-panel">
                <h2>Loan Details</h2>
                <form id="loanForm" onsubmit="return false;">
                    
                    <div class="form-group">
                        <label for="amount">Loan Amount</label>
                        <div class="input-group has-prefix">
                            <span class="prefix">$</span>
                            <input type="number" id="amount" placeholder="e.g. 10000" min="1" step="0.01" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="rate">Interest Rate (APR)</label>
                        <div class="input-group has-suffix">
                            <input type="number" id="rate" placeholder="e.g. 8.5" min="0" step="0.01" required>
                            <span class="suffix">%</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Loan Term</label>
                        <div class="split-group">
                            <div class="form-subgroup">
                                <div class="input-group has-suffix">
                                    <input type="number" id="years" placeholder="Yrs" min="0" step="1">
                                    <span class="suffix">Yrs</span>
                                </div>
                            </div>
                            <div class="form-subgroup">
                                <div class="input-group has-suffix">
                                    <input type="number" id="months" placeholder="Mos" min="0" step="1">
                                    <span class="suffix">Mos</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="controls">
                        <button type="button" class="btn-clear" id="clearBtn">Clear</button>
                        <button type="submit" class="btn-calc" id="calcBtn">Calculate Payment</button>
                    </div>
                </form>
            </div>

            <!-- Result Section -->
            <div class="result-panel">
                <h2>Repayment Summary</h2>
                
                <div class="result-card">
                    <div class="result-label">Estimated Monthly Payment</div>
                    <div class="main-result" id="monthlyPayment">$0.00</div>
                </div>

                <div class="result-grid">
                    <div class="grid-item">
                        <div class="result-label">Total Principal</div>
                        <div class="grid-value" id="totalPrincipal">$0.00</div>
                    </div>
                    <div class="grid-item">
                        <div class="result-label">Total Interest</div>
                        <div class="grid-value" id="totalInterest">$0.00</div>
                    </div>
                </div>

                <div class="result-card" style="margin-top: 15px; margin-bottom: 0;">
                    <div class="result-label">Total Cost of Loan</div>
                    <div style="font-size: 1.5rem; font-weight: 700; color: var(--primary-color);" id="totalCost">$0.00</div>
                </div>

                <div class="disclaimer">
                    *Calculations are estimates based on standard amortization formulas. Actual payments may vary by lender.
                </div>
            </div>

        </div>
    </div>

    <script>
        // DOM Elements
        const els = {
            amount: document.getElementById('amount'),
            rate: document.getElementById('rate'),
            years: document.getElementById('years'),
            months: document.getElementById('months'),
            calcBtn: document.getElementById('calcBtn'),
            clearBtn: document.getElementById('clearBtn'),
            // Result elements
            monthlyPayment: document.getElementById('monthlyPayment'),
            totalPrincipal: document.getElementById('totalPrincipal'),
            totalInterest: document.getElementById('totalInterest'),
            totalCost: document.getElementById('totalCost')
        };

        const STORAGE_KEY = 'toolshub365_personal_loan_data';

        // Initialize
        window.addEventListener('load', () => {
            loadData();
            // Attach auto-save listener to inputs
            [els.amount, els.rate, els.years, els.months].forEach(input => {
                input.addEventListener('input', saveData);
            });
        });

        // Event Listeners
        els.calcBtn.addEventListener('click', calculateLoan);
        els.clearBtn.addEventListener('click', clearData);

        function calculateLoan() {
            // Get values
            const principal = parseFloat(els.amount.value) || 0;
            const annualRate = parseFloat(els.rate.value) || 0;
            const termYears = parseInt(els.years.value) || 0;
            const termMonths = parseInt(els.months.value) || 0;

            // Validation
            if (principal <= 0) {
                alert("Please enter a valid loan amount.");
                return;
            }

            const totalMonths = (termYears * 12) + termMonths;
            if (totalMonths <= 0) {
                alert("Please enter a valid loan term (Years or Months).");
                return;
            }

            // Calculation
            let monthlyPayment = 0;
            let totalInterest = 0;
            let totalPayment = 0;

            if (annualRate === 0) {
                monthlyPayment = principal / totalMonths;
                totalPayment = principal;
                totalInterest = 0;
            } else {
                const monthlyRate = (annualRate / 100) / 12;
                // Amortization Formula: P * (r * (1+r)^n) / ((1+r)^n - 1)
                const x = Math.pow(1 + monthlyRate, totalMonths);
                monthlyPayment = (principal * x * monthlyRate) / (x - 1);
                totalPayment = monthlyPayment * totalMonths;
                totalInterest = totalPayment - principal;
            }

            // Update UI
            els.monthlyPayment.textContent = formatCurrency(monthlyPayment);
            els.totalPrincipal.textContent = formatCurrency(principal);
            els.totalInterest.textContent = formatCurrency(totalInterest);
            els.totalCost.textContent = formatCurrency(totalPayment);

            saveData();
        }

        function formatCurrency(num) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(num);
        }

        // Local Storage Functions
        function saveData() {
            const data = {
                amount: els.amount.value,
                rate: els.rate.value,
                years: els.years.value,
                months: els.months.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                const data = JSON.parse(savedData);
                if(data.amount) els.amount.value = data.amount;
                if(data.rate) els.rate.value = data.rate;
                if(data.years) els.years.value = data.years;
                if(data.months) els.months.value = data.months;
            }
        }

        function clearData() {
            // Clear inputs
            els.amount.value = '';
            els.rate.value = '';
            els.years.value = '';
            els.months.value = '';
            
            // Clear results
            els.monthlyPayment.textContent = '$0.00';
            els.totalPrincipal.textContent = '$0.00';
            els.totalInterest.textContent = '$0.00';
            els.totalCost.textContent = '$0.00';

            // Clear storage
            localStorage.removeItem(STORAGE_KEY);
        }
    </script>
</body>
</html>
