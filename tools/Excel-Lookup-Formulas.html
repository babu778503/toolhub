                ["BYROW (lookup per row)", "Applies a custom LAMBDA lookup across each row in an array.", "Vertical spill array.", "=BYROW(array, LAMBDA(row, logic))", "=BYROW(A1:C5, LAMBDA(r, MAX(r)))", "=SUM(BYROW(A2:D10, LAMBDA(rw, XLOOKUP(\"X\", rw, rw))))"],
                ["BYCOL (lookup per column)", "Applies a custom LAMBDA lookup across each column in an array.", "Horizontal spill array.", "=BYCOL(array, LAMBDA(col, logic))", "=BYCOL(A1:E5, LAMBDA(c, COUNTA(c)))", "=SUM(BYCOL(B2:Z10, LAMBDA(cl, MATCH(\"Target\", cl, 0))))"],
                ["MAP (custom lookup arrays)", "Maps each value in arrays to a new value by applying a LAMBDA lookup.", "Array of equal dimensions.", "=MAP(array1, LAMBDA(val, lookup_logic))", "=MAP(A1:A5, LAMBDA(x, VLOOKUP(x, Grid, 2, 0)))", "=SUM(MAP(D1:D10, LAMBDA(v, XLOOKUP(v, A:A, B:B))))"]
            ]],
            ["🔥 Bonus Lookup Techniques", [
                ["2D Lookup (INDEX + MATCH + MATCH)", "Locate data at the exact intersection of a specific row and column header.", "Value at matrix intersection.", "=INDEX(Data, MATCH(RowVal, RowH, 0), MATCH(ColVal, ColH, 0))", "=INDEX(B2:Z100, MATCH(\"ProductA\", A2:A100, 0), MATCH(\"June\", B1:Z1, 0))", "=SUM(INDEX(Grid, MATCH(X1:X3, Rows, 0), MATCH(\"Total\", Cols, 0)))"],
                ["Case-Sensitive Lookup (EXACT + MATCH)", "Bypasses Excel's default case-insensitivity to find strict exact matches.", "Matched index or value.", "=INDEX(Return, MATCH(TRUE, EXACT(Target, LookupCol), 0))", "=XLOOKUP(TRUE, EXACT(\"mAC\", A2:A10), B2:B10)", "=SUM(INDEX(Values, MATCH(TRUE, EXACT(Keys, \"aBc\"), 0)))"],
                ["Nearest Value Lookup", "Finds the closest numerical match utilizing absolute differences and XLOOKUP.", "Closest value.", "=XLOOKUP(MIN(ABS(Range - Target)), ABS(Range - Target), Range)", "=XLOOKUP(MIN(ABS(A2:A10-50)), ABS(A2:A10-50), B2:B10)", "=SUM(XLOOKUP(MIN(ABS(A1:A10-D1)), ABS(A1:A10-D1), C1:C10))"],
                ["Last Value Lookup", "Retrieves the bottom-most entry in a dataset, useful for chronologically sorted logs.", "Last non-empty matched value.", "=LOOKUP(2, 1/(Range<>\"\"), Range) OR XLOOKUP(..., -1)", "=XLOOKUP(\"Pending\", StatusCol, DateCol, \"\", 0, -1)", "=SUM(LOOKUP(2, 1/(A1:A100=E1), B1:B100))"],
                ["Partial Match Lookup", "Uses wildcard characters (*, ?) to look up items based on substrings.", "First value containing substring.", "=VLOOKUP(\"*\"&String&\"*\", Range, Col, 0)", "=XLOOKUP(\"*Apple*\", A2:A20, B2:B20, \"\", 2)", "=SUM(SUMIFS(Values, Names, \"*\"&Target&\"*\"))"]
            ]]
        ];

        const container = document.getElementById('dataContainer');
        const searchInput = document.getElementById('searchInput');

        // Render Data into DOM
        function renderUI() {
            container.innerHTML = '';
            
            excelData.forEach((category, catIndex) => {
                const catName = category[0];
                const functions = category[1];

                // Create Category Block
                const catDiv = document.createElement('div');
                catDiv.className = 'category-block active'; // Default open initially to populate layout
                catDiv.dataset.catName = catName.toLowerCase();

                // Header
                const catHeader = document.createElement('div');
                catHeader.className = 'category-header';
                catHeader.textContent = catName;
                catHeader.onclick = () => {
                    catDiv.classList.toggle('active');
                };

                // Function List
                const funcList = document.createElement('ul');
                funcList.className = 'func-list';

                functions.forEach((func, funcIndex) => {
                    const [fName, fPurpose, fReturn, fSyntax, fExample, fSum] = func;

                    const funcItem = document.createElement('li');
                    funcItem.className = 'func-item';
                    funcItem.dataset.funcName = fName.toLowerCase();
                    funcItem.dataset.funcDesc = fPurpose.toLowerCase();

                    // Func Header wrapper
                    const funcHeader = document.createElement('div');
                    funcHeader.className = 'func-header';
                    funcHeader.textContent = fName;

                    funcHeader.onclick = () => {
                        funcItem.classList.toggle('active');
                    };

                    // Func Details
                    const funcDetails = document.createElement('div');
                    funcDetails.className = 'func-details';
                    
                    // Escape < and > to prevent HTML rendering breakage in code blocks
                    const safeSyntax = fSyntax.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    const safeExample = fExample.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    const safeSum = fSum.replace(/</g, "&lt;").replace(/>/g, "&gt;");

                    funcDetails.innerHTML = `
                        <div class="detail-section">
                            <h4>Purpose</h4>
                            <p>${fPurpose}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Return value</h4>
                            <p>${fReturn}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Syntax</h4>
                            <code>${safeSyntax}</code>
                        </div>
                        <div class="detail-section">
                            <h4>Examples</h4>
                            <code>${safeExample}</code>
                        </div>
                        <div class="detail-section">
                            <h4>Using the SUM function</h4>
                            <code>${safeSum}</code>
                        </div>
                    `;

                    funcItem.appendChild(funcHeader);
                    funcItem.appendChild(funcDetails);
                    funcList.appendChild(funcItem);
                });

                catDiv.appendChild(catHeader);
                catDiv.appendChild(funcList);
                container.appendChild(catDiv);
            });
        }

        // Live Search/Filter functionality
        function filterUI() {
            const query = searchInput.value.toLowerCase().trim();
            const categories = document.querySelectorAll('.category-block');

            categories.forEach(cat => {
                let hasVisibleItems = false;
                const items = cat.querySelectorAll('.func-item');

                items.forEach(item => {
                    const fName = item.dataset.funcName;
                    const fDesc = item.dataset.funcDesc;
                    
                    if (fName.includes(query) || fDesc.includes(query)) {
                        item.style.display = 'block';
                        hasVisibleItems = true;
                        // Auto-expand item if query is descriptive enough
                        if(query.length > 2) {
                            item.classList.add('active');
                        }
                    } else {
                        item.style.display = 'none';
                        item.classList.remove('active');
                    }
                });

                if (hasVisibleItems) {
                    cat.style.display = 'block';
                    if(query.length > 0) cat.classList.add('active');
                } else {
                    cat.style.display = 'none';
                }
            });
        }

        searchInput.addEventListener('input', filterUI);

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            renderUI();
            // Start with only the first category open for a clean UI upon loading
            const cats = document.querySelectorAll('.category-block');
            cats.forEach((cat, index) => {
                if(index !== 0) cat.classList.remove('active');
            });
        });
    </script>
</body>
</html>
