    // Initialize and Render
    function render() {
        const grid = document.getElementById('mainGrid');
        let html = '';
        formulas.forEach(section => {
            html += `<div class="category-header">${section.cat}</div>`;
            section.items.forEach(item => {
                html += `
                    <div class="card" data-keywords="${(item.name + item.p + section.cat).toLowerCase()}">
                        <h2>${item.name}</h2>
                        <div class="info-row"><span class="label">Purpose:</span>${item.p}</div>
                        <div class="info-row"><span class="label">Return Value:</span>${item.r}</div>
                        <div class="info-row"><span class="label">Syntax:</span><code>${item.s}</code></div>
                        <div class="info-row"><span class="label">Examples:</span>${item.e}</div>
                        <div class="info-row"><span class="label">Using the SUM function:</span>${item.u}</div>
                    </div>
                `;
            });
        });
        grid.innerHTML = html;
    }

    // Search Filter Logic
    function filterFormulas() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        localStorage.setItem('lookupSearch', query);
        const cards = document.querySelectorAll('.card');
        const headers = document.querySelectorAll('.category-header');

        cards.forEach(card => {
            if (card.getAttribute('data-keywords').includes(query)) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });

        // Hide headers if all children are hidden
        headers.forEach(header => {
            let sibling = header.nextElementSibling;
            let visible = false;
            while (sibling && !sibling.classList.contains('category-header')) {
                if (!sibling.classList.contains('hidden')) {
                    visible = true;
                    break;
                }
                sibling = sibling.nextElementSibling;
            }
            header.style.display = visible ? 'block' : 'none';
        });
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        localStorage.removeItem('lookupSearch');
        filterFormulas();
    }

    // Auto-save and persistence
    window.onload = () => {
        render();
        const savedSearch = localStorage.getItem('lookupSearch');
        if (savedSearch) {
            document.getElementById('searchInput').value = savedSearch;
            filterFormulas();
        }
    };
</script>
