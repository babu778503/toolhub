    <style>
        :root {
            --primary-color: #0891b2; /* Cyan/Teal */
            --primary-hover: #0e7490;
            --header-bg: #1e293b;
            --header-text: #ffffff;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
            --header-height: 50px;
            --danger-color: #ef4444;
            --input-bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tool-wrapper {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        /* Visual Formula */
        .formula-visual {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 25px;
            font-family: "Times New Roman", Times, serif;
            background: #eff6ff;
            padding: 15px;
            border-radius: 8px;
            color: #1e3a8a;
        }

        .sub {
            font-size: 1rem;
            vertical-align: sub;
        }

        /* Inputs */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #64748b;
            font-size: 0.9rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.1rem;
            background-color: var(--input-bg);
            transition: all 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
        }

        /* Quick Buttons */
        .quick-select {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.9rem;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            cursor: pointer;
            color: #475569;
            transition: all 0.2s;
        }

        .btn-sm:hover {
            background: var(--bg-color);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* Action Buttons */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button.action-btn {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-clear {
            background-color: white;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        button.action-btn:hover {
            opacity: 0.9;
        }

        /* Results */
        .result-section {
            margin-top: 20px;
            border-top: 2px dashed var(--border-color);
            padding-top: 20px;
            display: none;
        }

        .result-card {
            background: #ecfeff;
            border-left: 5px solid var(--primary-color);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .result-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #64748b;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .result-val {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .explanation {
            font-size: 0.95rem;
            color: #475569;
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            line-height: 1.6;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 0;
                margin: 0;
            }

            .tool-wrapper {
                border-radius: 0;
                box-shadow: none;
                border: none;
                width: 100%;
                min-height: calc(100vh - var(--header-height));
                padding: 20px;
            }

            .input-grid {
                grid-template-columns: 1fr;
            }

            .btn-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Log Calculator</h1>
    </header>

    <div class="container">
        <main class="tool-wrapper">
            
            <div class="formula-visual">
                <span id="formula-display">log<span class="sub">b</span>(x) = y</span>
            </div>

            <!-- Quick Selection -->
            <div class="quick-select">
                <button class="btn-sm" onclick="setMode('ln')">Natural Log (ln)</button>
                <button class="btn-sm" onclick="setMode(10)">Log Base 10</button>
                <button class="btn-sm" onclick="setMode(2)">Log Base 2</button>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label for="val-num">Number (x)</label>
                    <input type="number" id="val-num" placeholder="e.g. 100" step="any" oninput="saveData()">
                </div>
                <div class="input-group">
                    <label for="val-base">Base (b)</label>
                    <input type="number" id="val-base" placeholder="e.g. 10" step="any" oninput="saveData()">
                </div>
            </div>

            <div class="btn-row">
                <button class="action-btn btn-calc" onclick="calculate()">Calculate</button>
                <button class="action-btn btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div id="result-section" class="result-section">
                
                <div class="result-card">
                    <div class="result-title">Result (y)</div>
                    <div class="result-val" id="final-result">-</div>
                </div>

                <div class="explanation">
                    <strong>Solution Steps:</strong>
                    <div id="step-content" style="margin-top: 10px;">
                        <!-- Steps injected by JS -->
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script>
        // --- Logic ---
        const EULER = 2.718281828459;

        function setMode(mode) {
            const baseInput = document.getElementById('val-base');
            if (mode === 'ln') {
                baseInput.value = EULER; // Approx e
                // We'll show "e" visually in steps
            } else {
                baseInput.value = mode;
            }
            // Add a brief highlight effect
            baseInput.focus();
            saveData();
        }

        function calculate() {
            const xVal = parseFloat(document.getElementById('val-num').value);
            let bVal = parseFloat(document.getElementById('val-base').value);

            if (isNaN(xVal) || isNaN(bVal)) {
                alert("Please enter valid numbers for both Number (x) and Base (b).");
                return;
            }

            // Validation
            if (xVal <= 0) {
                alert("Logarithm number (x) must be greater than 0.");
                return;
            }
            if (bVal <= 0 || bVal === 1) {
                alert("Base (b) must be greater than 0 and not equal to 1.");
                return;
            }

            // Calculation: log_b(x) = ln(x) / ln(b)
            const result = Math.log(xVal) / Math.log(bVal);

            // Update UI
            updateUI(xVal, bVal, result);
            saveData();
        }

        function updateUI(x, b, result) {
            const resDiv = document.getElementById('result-section');
            const resVal = document.getElementById('final-result');
            const steps = document.getElementById('step-content');
            const visual = document.getElementById('formula-display');

            // Determine if Base is close to 'e'
            const isE = Math.abs(b - EULER) < 0.00001;
            const bDisplay = isE ? 'e' : parseFloat(b.toFixed(4)); // clean up long decimals
            const opDisplay = isE ? 'ln' : 'log';
            const subDisplay = isE ? '' : `<span class="sub">${bDisplay}</span>`;

            // Update Header Visual
            visual.innerHTML = `${opDisplay}${subDisplay}(${x}) = ?`;

            // Format Result
            // If it's an integer, show no decimals. Else show up to 5.
            const fmtResult = Number.isInteger(result) ? result : parseFloat(result.toFixed(6));
            resVal.textContent = fmtResult;

            // Steps
            let html = `
                <p>To solve <strong>log<sub>${bDisplay}</sub>(${x})</strong>, we use the change of base formula:</p>
                <p style="font-family: monospace; background: #f1f5f9; padding: 5px; display: inline-block;">
                    log<sub>b</sub>(x) = ln(x) / ln(b)
                </p>
                <p>
                    = ln(${x}) / ln(${bDisplay})<br>
                    ≈ ${parseFloat(Math.log(x).toFixed(4))} / ${parseFloat(Math.log(b).toFixed(4))}<br>
                    = <strong>${fmtResult}</strong>
                </p>
                <hr style="margin: 10px 0; border:0; border-top:1px solid #e2e8f0;">
                <p><strong>Inverse (Exponential Form):</strong><br>
                ${bDisplay}<sup>${fmtResult}</sup> = ${x}
                </p>
            `;

            steps.innerHTML = html;
            resDiv.style.display = 'block';
        }


        // --- Data Persistence ---
        const STORAGE_KEY = 'logCalcData';

        function saveData() {
            const data = {
                num: document.getElementById('val-num').value,
                base: document.getElementById('val-base').value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                if (data.num) document.getElementById('val-num').value = data.num;
                if (data.base) document.getElementById('val-base').value = data.base;
                
                // Auto calculate if data present
                if (data.num && data.base) {
                    calculate();
                }
            }
        }

        function clearData() {
            document.getElementById('val-num').value = '';
            document.getElementById('val-base').value = '';
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('formula-display').innerHTML = 'log<span class="sub">b</span>(x) = y';
            localStorage.removeItem(STORAGE_KEY);
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
