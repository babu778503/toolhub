<!DOCTYPE html>
<!-- Category: Math Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO & Technical Metadata -->
    <title>Prime Factorization Calculator</title>
    <meta name="description" content="Free online Prime Factorization Calculator by toolshub365.com. Find prime factors of any number instantly with exponential and expanded forms. Automatic data saving included.">
    <meta name="keywords" content="Prime Factorization Calculator, Prime Factors, Prime Number Checker, Integer Factorization, Math Tool, toolshub365, Factor Tree">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/prime-factorization-calculator">
    
    <!-- JSON-LD for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Prime Factorization Calculator",
      "operatingSystem": "Any",
      "applicationCategory": "MathApplication",
      "offer": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "A responsive mathematical tool to calculate the prime factorization of integers, determining if a number is prime or composite."
    }
    </script>

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #00b894; /* Mint/Teal */
            --primary-hover: #00a884;
            --header-bg: #2d3436;
            --header-text: #ffffff;
            --bg-color: #dfe6e9;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --border-color: #b2bec3;
            --input-bg: #f5f6fa;
            --result-bg: #e0f7fa;
            --result-border: #00b894;
            --badge-prime: #e17055;
            --badge-composite: #6c5ce7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Space for fixed header */
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Calculator Card */
        .calculator-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 650px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            padding: 30px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Input Section */
        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-color);
            font-size: 1rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.2rem;
            background-color: var(--input-bg);
            transition: all 0.3s ease;
            color: var(--text-color);
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0, 184, 148, 0.15);
        }

        /* Buttons */
        .btn-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
        }

        .btn-clear {
            background-color: #fab1a0;
            color: #d63031;
        }

        .btn-clear:hover {
            background-color: #ff7675;
            color: white;
        }

        /* Result Area */
        .result-box {
            margin-top: 30px;
            padding: 25px;
            background-color: var(--result-bg);
            border-left: 6px solid var(--result-border);
            border-radius: 4px;
            display: none; /* Hidden by default */
            animation: fadeIn 0.3s ease-out;
            position: relative;
        }

        .result-title {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 800;
            color: #00695c;
            margin-bottom: 15px;
            word-break: break-all;
        }

        .expanded-form {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 15px;
            font-family: monospace;
            background: rgba(255,255,255,0.6);
            padding: 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .number-type-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 5px 10px;
            border-radius: 20px;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-prime { background-color: var(--badge-prime); }
        .badge-composite { background-color: var(--badge-composite); }

        .error-msg {
            color: #d63031;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
            display: none;
            background: #ffeaa7;
            padding: 10px;
            border-radius: 4px;
        }

        .sup {
            font-size: 0.6em;
            vertical-align: super;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;
                padding: 0; /* Remove blank space on sides */
                margin: 0;
            }

            .calculator-card {
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
                border: none;
                min-height: calc(100vh - 50px);
                padding: 25px 20px;
                display: flex;
                flex-direction: column;
            }

            .btn-controls {
                flex-direction: column;
            }

            .number-type-badge {
                position: static;
                display: inline-block;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        Prime Factorization Calculator
    </header>

    <div class="container">
        <div class="calculator-card">
            
            <div class="input-group">
                <label for="inputNumber">Enter an Integer</label>
                <input type="number" id="inputNumber" placeholder="e.g. 150" min="2" step="1" oninput="autoSave()">
            </div>

            <div class="error-msg" id="errorDisplay">Please enter an integer greater than 1.</div>

            <div class="btn-controls">
                <button class="btn-calc" onclick="calculateFactors()">Factorize</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div class="result-box" id="resultBox">
                <span id="typeBadge" class="number-type-badge"></span>
                
                <div class="result-title">Exponential Form</div>
                <div class="result-value" id="resultExponential"></div>
                
                <div class="result-title">Expanded Form</div>
                <div class="expanded-form" id="resultExpanded"></div>
            </div>

        </div>
    </div>

    <script>
        const STORAGE_KEY = 'toolshub365_prime_fact';
        
        // DOM Elements
        const elInput = document.getElementById('inputNumber');
        const elResultBox = document.getElementById('resultBox');
        const elExp = document.getElementById('resultExponential');
        const elExpand = document.getElementById('resultExpanded');
        const elBadge = document.getElementById('typeBadge');
        const elError = document.getElementById('errorDisplay');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        function calculateFactors() {
            const num = parseInt(elInput.value);

            // Validation
            if (isNaN(num) || num < 2 || !Number.isInteger(parseFloat(elInput.value))) {
                showError("Please enter a positive integer greater than 1.");
                return;
            }
            if (num > 9007199254740991) { // MAX_SAFE_INTEGER check
                showError("Number is too large to calculate precisely.");
                return;
            }

            elError.style.display = 'none';

            // Factorization Logic
            const factors = getPrimeFactors(num);
            
            // Generate Outputs
            const isPrime = factors.length === 1;
            
            // Format: Expanded (e.g., 2 x 2 x 3)
            const expandedStr = factors.join(' × ');

            // Format: Exponential (e.g., 2^2 x 3)
            const counts = {};
            factors.forEach(x => { counts[x] = (counts[x] || 0) + 1; });
            
            let expParts = [];
            // Sort keys numerically
            Object.keys(counts).sort((a,b) => a-b).forEach(factor => {
                const count = counts[factor];
                if (count > 1) {
                    expParts.push(`${factor}<span class="sup">${count}</span>`);
                } else {
                    expParts.push(`${factor}`);
                }
            });
            const expStr = expParts.join(' × ');

            // UI Updates
            elExp.innerHTML = expStr;
            elExpand.innerText = expandedStr;
            
            elBadge.innerText = isPrime ? "Prime Number" : "Composite Number";
            elBadge.className = 'number-type-badge ' + (isPrime ? 'badge-prime' : 'badge-composite');
            
            elResultBox.style.display = 'block';
            saveData(true);
        }

        function getPrimeFactors(n) {
            const factors = [];
            // Handle 2 separately
            while (n % 2 === 0) {
                factors.push(2);
                n = n / 2;
            }
            // Handle odd numbers
            for (let i = 3; i <= Math.sqrt(n); i += 2) {
                while (n % i === 0) {
                    factors.push(i);
                    n = n / i;
                }
            }
            // If n > 2, the remainder is prime
            if (n > 2) {
                factors.push(n);
            }
            return factors;
        }

        function showError(msg) {
            elError.innerText = msg;
            elError.style.display = 'block';
            elResultBox.style.display = 'none';
        }

        // --- Local Storage Functions ---

        function autoSave() {
            saveData(false);
            elError.style.display = 'none';
        }

        function saveData(showResult = false) {
            const data = {
                input: elInput.value,
                hasResult: showResult || (elResultBox.style.display === 'block')
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.input) elInput.value = data.input;
                    
                    if (data.hasResult && data.input) {
                        calculateFactors();
                    }
                } catch (e) {
                    console.error("Error loading data");
                }
            }
        }

        function clearData() {
            if(confirm("Are you sure you want to clear all data?")) {
                localStorage.removeItem(STORAGE_KEY);
                elInput.value = '';
                elResultBox.style.display = 'none';
                elError.style.display = 'none';
            }
        }
    </script>
</body>
</html>
