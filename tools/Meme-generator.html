    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #4A90E2;
            --primary-hover: #357ABD;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #ffffff;
            --border-radius: 8px;
            --header-height: 50px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height); /* Offset for fixed header */
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Main Container */
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 0 auto;
        }

        /* Desktop Layout */
        @media (min-width: 769px) {
            .container {
                max-width: 1200px;
                flex-direction: row;
                padding: 30px 20px;
                align-items: flex-start;
            }
            .controls-panel {
                flex: 0 0 350px;
            }
            .canvas-panel {
                flex: 1;
                min-width: 0; /* Prevents flex blowout */
            }
        }

        /* Mobile Layout */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 15px 10px; /* Internal padding, no outer margin blank space */
            }
            .controls-panel, .canvas-panel {
                width: 100%;
            }
        }

        /* Panels */
        .panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Controls */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
        }

        input[type="text"], input[type="range"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .color-pickers {
            display: flex;
            gap: 15px;
        }

        .color-pickers div {
            flex: 1;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            padding: 2px;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 10px;
        }

        .btn-upload {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-upload:hover {
            background-color: var(--primary-hover);
        }

        .btn-download {
            background-color: #27ae60;
            color: white;
            margin-top: 10px;
        }

        .btn-download:hover {
            background-color: #219653;
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        input[type="file"] {
            display: none;
        }

        /* Canvas Area */
        .canvas-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            min-height: 300px;
            border: 2px dashed #ccc;
        }

        canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .placeholder-text {
            color: #888;
            font-size: 1.1rem;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Meme generator</h1>
    </header>

    <main class="container">
        
        <!-- Controls Panel -->
        <div class="panel controls-panel">
            <div class="form-group">
                <label for="imageUpload" class="btn btn-upload">Choose Image</label>
                <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/webp">
            </div>

            <div class="form-group">
                <label for="topText">Top Text</label>
                <input type="text" id="topText" placeholder="Enter top text">
            </div>

            <div class="form-group">
                <label for="bottomText">Bottom Text</label>
                <input type="text" id="bottomText" placeholder="Enter bottom text">
            </div>

            <div class="form-group">
                <label for="textSize">Text Size</label>
                <input type="range" id="textSize" min="10" max="150" value="40">
            </div>

            <div class="form-group color-pickers">
                <div>
                    <label for="textColor">Text Color</label>
                    <input type="color" id="textColor" value="#ffffff">
                </div>
                <div>
                    <label for="strokeColor">Border Color</label>
                    <input type="color" id="strokeColor" value="#000000">
                </div>
            </div>

            <button class="btn btn-download" id="downloadBtn">Download Meme</button>
            <button class="btn btn-clear" id="clearBtn">Clear Data & Reset</button>
        </div>

        <!-- Canvas Panel -->
        <div class="panel canvas-panel">
            <div class="canvas-container" id="canvasWrapper">
                <span class="placeholder-text" id="placeholder">Upload an image to start generating your meme!</span>
                <canvas id="memeCanvas" style="display: none;"></canvas>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Elements
            const canvas = document.getElementById('memeCanvas');
            const ctx = canvas.getContext('2d');
            const imageUpload = document.getElementById('imageUpload');
            const topTextInput = document.getElementById('topText');
            const bottomTextInput = document.getElementById('bottomText');
            const textSizeInput = document.getElementById('textSize');
            const textColorInput = document.getElementById('textColor');
            const strokeColorInput = document.getElementById('strokeColor');
            const downloadBtn = document.getElementById('downloadBtn');
            const clearBtn = document.getElementById('clearBtn');
            const canvasWrapper = document.getElementById('canvasWrapper');
            const placeholder = document.getElementById('placeholder');

            let image = null;

            // Load saved settings from Local Storage
            const loadData = () => {
                topTextInput.value = localStorage.getItem('meme_topText') || '';
                bottomTextInput.value = localStorage.getItem('meme_bottomText') || '';
                textSizeInput.value = localStorage.getItem('meme_textSize') || '40';
                textColorInput.value = localStorage.getItem('meme_textColor') || '#ffffff';
                strokeColorInput.value = localStorage.getItem('meme_strokeColor') || '#000000';
            };

            // Save settings to Local Storage
            const saveData = () => {
                localStorage.setItem('meme_topText', topTextInput.value);
                localStorage.setItem('meme_bottomText', bottomTextInput.value);
                localStorage.setItem('meme_textSize', textSizeInput.value);
                localStorage.setItem('meme_textColor', textColorInput.value);
                localStorage.setItem('meme_strokeColor', strokeColorInput.value);
            };

            // Initialize Load
            loadData();

            // Handle Image Upload
            imageUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            image = img;
                            placeholder.style.display = 'none';
                            canvas.style.display = 'block';
                            canvasWrapper.style.border = 'none';
                            canvasWrapper.style.background = 'transparent';
                            generateMeme();
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Text Wrapping Function for Canvas
            const wrapText = (context, text, x, y, maxWidth, lineHeight, isBottom) => {
                const words = text.split(' ');
                let line = '';
                const lines = [];

                for (let n = 0; n < words.length; n++) {
                    const testLine = line + words[n] + ' ';
                    const metrics = context.measureText(testLine);
                    const testWidth = metrics.width;
                    if (testWidth > maxWidth && n > 0) {
                        lines.push(line);
                        line = words[n] + ' ';
                    } else {
                        line = testLine;
                    }
                }
                lines.push(line);

                let currentY = isBottom ? y - (lines.length - 1) * lineHeight : y;

                for (let i = 0; i < lines.length; i++) {
                    context.strokeText(lines[i], x, currentY);
                    context.fillText(lines[i], x, currentY);
                    currentY += lineHeight;
                }
            };

            // Main Draw Function
            const generateMeme = () => {
                if (!image) return;

                // Set canvas dimensions based on image, bounded by screen width for performance/display
                const maxWidth = canvasWrapper.clientWidth;
                let width = image.width;
                let height = image.height;

                // Scale down if image is too large
                if (width > maxWidth) {
                    const ratio = maxWidth / width;
                    width = maxWidth;
                    height = height * ratio;
                }

                canvas.width = width;
                canvas.height = height;

                // Draw Image
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(image, 0, 0, canvas.width, canvas.height);

                // Setup Text Style
                const fontSize = textSizeInput.value;
                ctx.font = `bold ${fontSize}px Impact, sans-serif`;
                ctx.fillStyle = textColorInput.value;
                ctx.strokeStyle = strokeColorInput.value;
                ctx.lineWidth = Math.max(fontSize / 15, 2); // Dynamic stroke width
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';

                const textMaxWidth = canvas.width - 20;
                const lineHeight = parseInt(fontSize) * 1.2;
                const x = canvas.width / 2;

                // Draw Top Text
                if (topTextInput.value) {
                    const text = topTextInput.value.toUpperCase();
                    wrapText(ctx, text, x, 10, textMaxWidth, lineHeight, false);
                }

                // Draw Bottom Text
                if (bottomTextInput.value) {
                    ctx.textBaseline = 'bottom';
                    const text = bottomTextInput.value.toUpperCase();
                    wrapText(ctx, text, x, canvas.height - 10, textMaxWidth, lineHeight, true);
                }
            };

            // Event Listeners for Live Preview & Auto Save
            const inputs = [topTextInput, bottomTextInput, textSizeInput, textColorInput, strokeColorInput];
            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    saveData();
                    generateMeme();
                });
            });

            // Handle Resize to redraw canvas properly
            window.addEventListener('resize', () => {
                if(image) generateMeme();
            });

            // Download Logic
            downloadBtn.addEventListener('click', () => {
                if (!image) {
                    alert('Please upload an image first.');
                    return;
                }
                const dataURL = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'generated-meme.png';
                link.href = dataURL;
                link.click();
            });

            // Clear Data Logic
            clearBtn.addEventListener('click', () => {
                if(confirm('Are you sure you want to clear all data and reset the tool?')) {
                    localStorage.removeItem('meme_topText');
                    localStorage.removeItem('meme_bottomText');
                    localStorage.removeItem('meme_textSize');
                    localStorage.removeItem('meme_textColor');
                    localStorage.removeItem('meme_strokeColor');
                    
                    topTextInput.value = '';
                    bottomTextInput.value = '';
                    textSizeInput.value = '40';
                    textColorInput.value = '#ffffff';
                    strokeColorInput.value = '#000000';
                    imageUpload.value = '';
                    
                    image = null;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    canvas.style.display = 'none';
                    placeholder.style.display = 'block';
                    canvasWrapper.style.border = '2px dashed #ccc';
                    canvasWrapper.style.background = '#e9ecef';
                }
            });
        });
    </script>
</body>
</html>
