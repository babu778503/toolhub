    <style>
        :root {
            /* Theme: Professional Navy & Green */
            --primary-color: #2c3e50;
            --secondary-color: #27ae60;
            --accent-color: #e67e22;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #34495e;
            --border-color: #bdc3c7;
            --header-height: 50px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height); /* Space for fixed header */
            -webkit-font-smoothing: antialiased;
        }

        /* --- Header --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* --- Layout --- */
        .container {
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Desktop Specifics */
        @media (min-width: 769px) {
            .container {
                max-width: 1200px;
                padding: 30px 20px;
            }
            .panel {
                background: var(--card-bg);
                border-radius: 8px;
                padding: 25px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            }
            .col-inputs {
                flex: 1;
                min-width: 300px;
            }
            .col-summary {
                flex: 1;
                min-width: 300px;
            }
            .col-full {
                flex-basis: 100%;
            }
        }

        /* Mobile Specifics */
        @media (max-width: 768px) {
            .container {
                padding: 0;
                gap: 0;
            }
            .panel {
                width: 100%;
                border-radius: 0;
                padding: 20px 15px;
                background: var(--card-bg);
                border-bottom: 1px solid var(--border-color);
            }
            .col-inputs, .col-summary, .col-full {
                width: 100%;
            }
            /* Visual hierarchy */
            .col-inputs { order: 1; }
            .col-summary { order: 2; }
            .col-full { order: 3; }
        }

        /* --- Typography --- */
        h2 {
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            border-left: 4px solid var(--secondary-color);
            padding-left: 10px;
            font-weight: 700;
        }

        /* --- Forms --- */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            color: #7f8c8d;
            font-weight: bold;
        }
        
        .input-suffix {
            position: absolute;
            right: 12px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        input[type="number"], input[type="date"] {
            width: 100%;
            padding: 12px 12px 12px 35px; /* space for icon */
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
            background: #fdfdfd;
        }
        
        /* Adjust padding if no icon */
        input.no-icon { padding-left: 12px; }

        input:focus {
            outline: none;
            border-color: var(--secondary-color);
            background: #fff;
        }

        .btn-clear {
            width: 100%;
            padding: 12px;
            background-color: #ecf0f1;
            color: #7f8c8d;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-clear:hover {
            background-color: #bdc3c7;
            color: #2c3e50;
        }

        /* --- Summary Section --- */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .summary-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #eee;
        }

        .summary-label {
            font-size: 0.8rem;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .summary-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .highlight {
            color: var(--secondary-color);
            font-size: 1.5rem;
        }

        /* --- Chart (CSS Only) --- */
        .chart-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        
        .pie-chart {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(var(--secondary-color) 0deg 360deg);
            margin-bottom: 15px;
            transition: background 0.5s ease;
        }

        .legend {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-p { background-color: var(--secondary-color); }
        .dot-i { background-color: var(--accent-color); }

        /* --- Amortization Table --- */
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px; /* Force scroll on mobile */
            font-size: 0.95rem;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            text-align: left;
            padding: 12px 15px;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        td {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            color: #555;
        }

        tr:nth-child(even) { background-color: #fafafa; }
        
        tr.year-row {
            background-color: #e8f6f3;
            font-weight: bold;
        }
        tr.year-row td {
            color: var(--primary-color);
            border-top: 1px solid var(--secondary-color);
        }

    </style>
</head>
<body>

<header>
    <h1>Amortization Calculator</h1>
</header>

<div class="container">
    <!-- Input Section -->
    <div class="col-inputs panel">
        <h2>Loan Settings</h2>
        <form id="amortizationForm">
            <div class="form-group">
                <label for="loanAmount">Loan Amount</label>
                <div class="input-wrapper">
                    <span class="input-icon">$</span>
                    <input type="number" id="loanAmount" placeholder="20000" min="0" step="100">
                </div>
            </div>

            <div class="form-group">
                <label for="interestRate">Annual Interest Rate</label>
                <div class="input-wrapper">
                    <span class="input-icon">%</span>
                    <input type="number" id="interestRate" placeholder="5.5" min="0" step="0.01">
                </div>
            </div>

            <div class="form-group">
                <label for="loanTerm">Loan Term (Years)</label>
                <div class="input-wrapper">
                    <span class="input-icon">#</span>
                    <input type="number" id="loanTerm" placeholder="5" min="1" max="50">
                </div>
            </div>

            <div class="form-group">
                <label for="startDate">Start Date</label>
                <input type="date" id="startDate" class="no-icon">
            </div>

            <button type="button" class="btn-clear" id="clearBtn">Reset / Clear Data</button>
        </form>
    </div>

    <!-- Summary Section -->
    <div class="col-summary panel">
        <h2>Repayment Summary</h2>
        <div class="summary-grid">
            <div class="summary-item" style="grid-column: 1 / -1;">
                <div class="summary-label">Monthly Payment</div>
                <div class="summary-value highlight" id="outMonthly">$0.00</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Total Principal</div>
                <div class="summary-value" id="outPrincipal">$0.00</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Total Interest</div>
                <div class="summary-value" id="outInterest">$0.00</div>
            </div>
            <div class="summary-item" style="grid-column: 1 / -1;">
                <div class="summary-label">Total Cost of Loan</div>
                <div class="summary-value" id="outTotal">$0.00</div>
            </div>
        </div>

        <div class="chart-box">
            <div class="pie-chart" id="chartVisual"></div>
            <div class="legend">
                <div class="legend-item"><span class="dot dot-p"></span> Principal</div>
                <div class="legend-item"><span class="dot dot-i"></span> Interest</div>
            </div>
        </div>
    </div>

    <!-- Table Section -->
    <div class="col-full panel">
        <h2>Amortization Schedule</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Payment</th>
                        <th>Principal</th>
                        <th>Interest</th>
                        <th>Balance</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody">
                    <tr><td colspan="5" style="text-align:center; padding: 20px;">Enter loan details to see schedule.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // --- Elements ---
        const inputs = {
            amount: document.getElementById('loanAmount'),
            rate: document.getElementById('interestRate'),
            term: document.getElementById('loanTerm'),
            date: document.getElementById('startDate')
        };

        const outputs = {
            monthly: document.getElementById('outMonthly'),
            principal: document.getElementById('outPrincipal'),
            interest: document.getElementById('outInterest'),
            total: document.getElementById('outTotal'),
            table: document.getElementById('scheduleBody'),
            chart: document.getElementById('chartVisual')
        };

        const clearBtn = document.getElementById('clearBtn');

        // --- Defaults ---
        const DEFAULTS = {
            amount: 25000,
            rate: 6.0,
            term: 5,
            date: new Date().toISOString().split('T')[0]
        };

        // --- Formatters ---
        const formatMoney = (num) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num);
        };
        const formatDate = (dateObj) => {
            return dateObj.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
        };

        // --- Core Calculation ---
        function calculate() {
            let P = parseFloat(inputs.amount.value) || 0;
            let rAnnual = parseFloat(inputs.rate.value) || 0;
            let years = parseFloat(inputs.term.value) || 0;
            let startVal = inputs.date.value || new Date().toISOString().split('T')[0];

            if (P <= 0 || years <= 0) {
                clearResults();
                return;
            }

            let rMonthly = (rAnnual / 100) / 12;
            let n = years * 12;
            
            let monthlyPayment = 0;
            if (rAnnual === 0) {
                monthlyPayment = P / n;
            } else {
                monthlyPayment = P * (rMonthly * Math.pow(1 + rMonthly, n)) / (Math.pow(1 + rMonthly, n) - 1);
            }

            // Summary Calculation
            let totalPayment = monthlyPayment * n;
            let totalInterest = totalPayment - P;

            // Update Summary UI
            outputs.monthly.textContent = formatMoney(monthlyPayment);
            outputs.principal.textContent = formatMoney(P);
            outputs.interest.textContent = formatMoney(totalInterest);
            outputs.total.textContent = formatMoney(totalPayment);

            // Update Chart
            updateChart(P, totalInterest, totalPayment);

            // Generate Table
            generateSchedule(P, rMonthly, monthlyPayment, n, startVal);
            
            // Save Data
            saveData();
        }

        // --- Chart Logic ---
        function updateChart(principal, interest, total) {
            if (total > 0) {
                let pPercent = (principal / total) * 100;
                // Conic Gradient: Principal Color (0% -> pPercent), Interest Color (pPercent -> 100%)
                outputs.chart.style.background = `conic-gradient(
                    var(--secondary-color) 0% ${pPercent}%, 
                    var(--accent-color) ${pPercent}% 100%
                )`;
            } else {
                outputs.chart.style.background = '#ecf0f1';
            }
        }

        // --- Table Logic ---
        function generateSchedule(principal, monthlyRate, monthlyPayment, totalMonths, startDateStr) {
            let balance = principal;
            let html = '';
            let currentDate = new Date(startDateStr);
            
            // Adjust to start paying next month typically, but let's stick to simple increment
            // currentDate.setMonth(currentDate.getMonth() + 1);

            let yearAccumulator = { p: 0, i: 0 };
            
            for (let i = 1; i <= totalMonths; i++) {
                let interestPart = balance * monthlyRate;
                let principalPart = monthlyPayment - interestPart;

                // Handle last month rounding issues
                if (balance - principalPart < 0.01) {
                    principalPart = balance;
                    interestPart = monthlyPayment - principalPart; // Adjust interest slightly
                    balance = 0;
                } else {
                    balance -= principalPart;
                }

                // Accumulate for year end row (optional, usually nice to have)
                // For this simple version, we list months.
                
                // Add Month Row
                currentDate.setMonth(currentDate.getMonth() + 1);
                
                // Add Year Divider every 12 months
                if (i % 12 === 0 && i !== totalMonths) {
                     // Optionally add summary row here
                }

                html += `<tr>
                    <td>${formatDate(currentDate)}</td>
                    <td>${formatMoney(interestPart + principalPart)}</td>
                    <td>${formatMoney(principalPart)}</td>
                    <td>${formatMoney(interestPart)}</td>
                    <td>${formatMoney(Math.max(0, balance))}</td>
                </tr>`;

                if (balance <= 0) break;
            }

            outputs.table.innerHTML = html;
        }

        function clearResults() {
            outputs.monthly.textContent = '$0.00';
            outputs.principal.textContent = '$0.00';
            outputs.interest.textContent = '$0.00';
            outputs.total.textContent = '$0.00';
            outputs.table.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px;">Enter loan details to see schedule.</td></tr>';
            outputs.chart.style.background = '#ecf0f1';
        }

        // --- Storage ---
        function saveData() {
            const data = {
                amount: inputs.amount.value,
                rate: inputs.rate.value,
                term: inputs.term.value,
                date: inputs.date.value
            };
            localStorage.setItem('amortizationTool_v1', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('amortizationTool_v1');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    inputs.amount.value = data.amount;
                    inputs.rate.value = data.rate;
                    inputs.term.value = data.term;
                    inputs.date.value = data.date;
                    calculate();
                } catch (e) {
                    resetInputs();
                }
            } else {
                resetInputs();
            }
        }

        function resetInputs() {
            inputs.amount.value = DEFAULTS.amount;
            inputs.rate.value = DEFAULTS.rate;
            inputs.term.value = DEFAULTS.term;
            inputs.date.value = DEFAULTS.date;
            calculate();
        }

        function fullClear() {
            localStorage.removeItem('amortizationTool_v1');
            inputs.amount.value = '';
            inputs.rate.value = '';
            inputs.term.value = '';
            inputs.date.value = '';
            clearResults();
        }

        // --- Listeners ---
        Object.values(inputs).forEach(input => {
            input.addEventListener('input', calculate);
            input.addEventListener('change', calculate); // For date picker
        });

        clearBtn.addEventListener('click', fullClear);

        // --- Init ---
        loadData();
    });
</script>

</body>
</html>
