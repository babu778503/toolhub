    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            /* Fixed 50px header constraint */
            padding-top: 50px; 
        }

        /* Fixed Header Constraint: exactly 50px height */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: #2c3e50;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }

        /* Desktop Container Measurements: Max-width 1200px */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* Layout */
        .app-wrapper {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 600px; /* Optimal reading width for a generator */
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Result Display Area */
        .display-container {
            background: #1a252f;
            padding: 30px 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .password-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.8rem;
            color: #2ecc71;
            word-break: break-all;
            padding-right: 20px;
            flex: 1;
            letter-spacing: 2px;
            min-height: 40px;
        }

        .btn-copy {
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            flex-shrink: 0;
        }

        .btn-copy:hover {
            background-color: #2980b9;
        }

        /* Settings Area */
        .settings-container {
            padding: 30px;
            background: #ffffff;
        }

        .setting-group {
            margin-bottom: 25px;
        }

        .length-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: 600;
            color: #2c3e50;
        }

        .length-value {
            font-size: 1.2rem;
            color: #3498db;
            background: #ecf0f1;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #bdc3c7;
            border-radius: 4px;
        }

        /* Checkboxes Styling */
        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.05rem;
            color: #34495e;
            cursor: pointer;
        }

        .checkbox-group label {
            cursor: pointer;
            flex: 1;
        }

        .checkbox-group input {
            cursor: pointer;
            width: 20px;
            height: 20px;
            accent-color: #3498db;
        }

        /* Action Buttons */
        .btn-generate {
            width: 100%;
            padding: 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 10px;
        }

        .btn-generate:hover {
            background-color: #27ae60;
        }

        .btn-generate:active {
            transform: scale(0.98);
        }

        .controls {
            display: flex;
            justify-content: center;
            padding-top: 25px;
            margin-top: 25px;
            border-top: 1px solid #ecf0f1;
        }

        .btn-clear {
            background-color: #95a5a6;
            color: white;
            padding: 10px 30px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-clear:hover {
            background-color: #7f8c8d;
        }

        /* Notification Toast */
        .toast {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            transition: bottom 0.3s;
            z-index: 2000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .toast.show {
            bottom: 20px;
        }

        /* Responsive Constraints for Mobile */
        @media (max-width: 768px) {
            /* Remove both side blank space for mobile users */
            .container {
                padding: 0;
                width: 100%;
                max-width: 100%;
            }
            .app-wrapper {
                border-radius: 0;
                box-shadow: none;
                max-width: 100%;
                border: none;
            }
            .display-container {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
                gap: 15px;
            }
            .password-display {
                padding-right: 0;
                font-size: 1.5rem;
            }
            .btn-clear {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Password Generator</h1>
    </header>

    <main class="container">
        <section class="app-wrapper">
            <!-- Output Display -->
            <div class="display-container">
                <div class="password-display" id="password-display">Loading...</div>
                <button class="btn-copy" onclick="copyToClipboard()" id="copy-btn">Copy</button>
            </div>

            <!-- Configuration Area -->
            <div class="settings-container">
                <div class="setting-group">
                    <div class="length-header">
                        <span>Password Length</span>
                        <span class="length-value" id="length-val">16</span>
                    </div>
                    <input type="range" id="slider-length" min="6" max="64" value="16" oninput="updateLength(this.value)">
                </div>

                <div class="setting-group">
                    <div class="checkbox-group">
                        <label for="chk-uppercase">Include Uppercase Letters (A-Z)</label>
                        <input type="checkbox" id="chk-uppercase" checked onchange="saveAndGenerate()">
                    </div>
                    <div class="checkbox-group">
                        <label for="chk-lowercase">Include Lowercase Letters (a-z)</label>
                        <input type="checkbox" id="chk-lowercase" checked onchange="saveAndGenerate()">
                    </div>
                    <div class="checkbox-group">
                        <label for="chk-numbers">Include Numbers (0-9)</label>
                        <input type="checkbox" id="chk-numbers" checked onchange="saveAndGenerate()">
                    </div>
                    <div class="checkbox-group">
                        <label for="chk-symbols">Include Symbols (!@#$)</label>
                        <input type="checkbox" id="chk-symbols" checked onchange="saveAndGenerate()">
                    </div>
                </div>

                <button class="btn-generate" onclick="generatePassword()">Generate New Password</button>

                <div class="controls">
                    <button class="btn-clear" onclick="clearData()">Clear Data</button>
                </div>
            </div>
        </section>
    </main>

    <div class="toast" id="toast">Password Copied!</div>

    <script>
        // DOM Elements
        const passwordDisplay = document.getElementById('password-display');
        const sliderLength = document.getElementById('slider-length');
        const lengthVal = document.getElementById('length-val');
        const chkUppercase = document.getElementById('chk-uppercase');
        const chkLowercase = document.getElementById('chk-lowercase');
        const chkNumbers = document.getElementById('chk-numbers');
        const chkSymbols = document.getElementById('chk-symbols');
        const toast = document.getElementById('toast');
        const copyBtn = document.getElementById('copy-btn');

        // Character Sets
        const chars = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+~`|}{[]:;?><,./-='
        };

        const STORAGE_KEY = 'passwordGenData_toolshub365';

        // Initialize Application
        function init() {
            loadData();
            generatePassword();
        }

        // Update Slider Length UI & Data
        function updateLength(val) {
            lengthVal.textContent = val;
            saveAndGenerate();
        }

        // Generate the Password
        function generatePassword() {
            let length = parseInt(sliderLength.value);
            let hasUpper = chkUppercase.checked;
            let hasLower = chkLowercase.checked;
            let hasNumber = chkNumbers.checked;
            let hasSymbol = chkSymbols.checked;

            // Ensure at least one option is checked
            if (!hasUpper && !hasLower && !hasNumber && !hasSymbol) {
                chkLowercase.checked = true;
                hasLower = true;
            }

            let availableChars = '';
            let guaranteedChars = '';

            if (hasUpper) {
                availableChars += chars.uppercase;
                guaranteedChars += chars.uppercase[Math.floor(Math.random() * chars.uppercase.length)];
            }
            if (hasLower) {
                availableChars += chars.lowercase;
                guaranteedChars += chars.lowercase[Math.floor(Math.random() * chars.lowercase.length)];
            }
            if (hasNumber) {
                availableChars += chars.numbers;
                guaranteedChars += chars.numbers[Math.floor(Math.random() * chars.numbers.length)];
            }
            if (hasSymbol) {
                availableChars += chars.symbols;
                guaranteedChars += chars.symbols[Math.floor(Math.random() * chars.symbols.length)];
            }

            let password = guaranteedChars;
            
            // Fill the rest of the password length
            for (let i = password.length; i < length; i++) {
                password += availableChars[Math.floor(Math.random() * availableChars.length)];
            }

            // Shuffle the password to mix the guaranteed characters
            password = password.split('').sort(() => 0.5 - Math.random()).join('');
            
            // Handle edge case if slider is manually set lower than checked options (e.g. length 2, 4 checked options)
            if (password.length > length) {
                password = password.substring(0, length);
            }

            passwordDisplay.textContent = password;
        }

        // Save preferences and regenerate
        function saveAndGenerate() {
            saveData();
            generatePassword();
        }

        // Copy to Clipboard Functionality
        function copyToClipboard() {
            const password = passwordDisplay.textContent;
            if (!password || password === 'Loading...') return;

            navigator.clipboard.writeText(password).then(() => {
                showToast();
                copyBtn.textContent = 'Copied!';
                setTimeout(() => { copyBtn.textContent = 'Copy'; }, 2000);
            }).catch(err => {
                alert('Failed to copy text: ', err);
            });
        }

        // Show Notification Toast
        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // Save Data to LocalStorage
        function saveData() {
            const data = {
                length: sliderLength.value,
                uppercase: chkUppercase.checked,
                lowercase: chkLowercase.checked,
                numbers: chkNumbers.checked,
                symbols: chkSymbols.checked
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // Load Data from LocalStorage
        function loadData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    sliderLength.value = parsed.length || 16;
                    lengthVal.textContent = sliderLength.value;
                    
                    // Explicitly checking against undefined to allow false values
                    chkUppercase.checked = parsed.uppercase !== undefined ? parsed.uppercase : true;
                    chkLowercase.checked = parsed.lowercase !== undefined ? parsed.lowercase : true;
                    chkNumbers.checked = parsed.numbers !== undefined ? parsed.numbers : true;
                    chkSymbols.checked = parsed.symbols !== undefined ? parsed.symbols : true;
                } catch (e) {
                    console.error("Error loading settings");
                }
            }
        }

        // Clear Data & Reset to Defaults
        function clearData() {
            if(confirm("Are you sure you want to reset your preferences to default?")) {
                localStorage.removeItem(STORAGE_KEY);
                
                // Reset to defaults
                sliderLength.value = 16;
                lengthVal.textContent = '16';
                chkUppercase.checked = true;
                chkLowercase.checked = true;
                chkNumbers.checked = true;
                chkSymbols.checked = true;

                generatePassword();
            }
        }

        // Run on load
        window.onload = init;
    </script>
</body>
</html>
