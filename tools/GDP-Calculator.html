    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            /* Fixed exactly 50px header constraint */
            padding-top: 50px; 
        }

        /* Fixed Header Constraint: exactly 50px height */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: #1e272e;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Desktop Container Measurements: Max-width 1200px */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* App Layout */
        .app-wrapper {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 700px; /* Optimal reading width for a form-based calculator */
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Result Section */
        .result-container {
            background: #0fb9b1;
            color: #ffffff;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid #0b8781;
        }

        .result-container .gdp-score {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 5px;
            line-height: 1.2;
            word-break: break-all;
        }

        .result-container .gdp-label {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            opacity: 0.9;
        }

        .formula-hint {
            margin-top: 15px;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.1);
            display: inline-block;
            padding: 6px 15px;
            border-radius: 20px;
            letter-spacing: 1px;
            font-family: monospace;
        }

        /* Calculation Form */
        .calculator-body {
            padding: 30px;
        }

        .input-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            color: #4b6584;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
        }

        .input-group label .symbol {
            background: #f1f2f6;
            color: #747d8c;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-family: monospace;
            font-weight: bold;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 15px;
            color: #a4b0be;
            font-weight: bold;
            font-size: 1.1rem;
            pointer-events: none;
        }

        input[type="number"] {
            width: 100%;
            padding: 14px 15px 14px 35px; /* left padding for currency symbol */

            border-radius: 6px;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #fdfdfd;
            color: #2f3542;
            -moz-appearance: textfield; /* remove spinners */
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"]:focus {
            border-color: #0fb9b1;
            box-shadow: 0 0 0 2px rgba(15, 185, 177, 0.2);
        }

        .sub-result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f2f6;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;

        /* Controls */

            display: flex;

            cursor: pointer;
            transition: background 0.3s, transform 0.1s;

        .btn-clear:hover {
            background-color: #747d8c;
        }

        .btn-clear:active {
            transform: scale(0.98);
        }

        /* Responsive Constraints for Mobile */
        @media (max-width: 768px) {
            /* Remove both side blank space for mobile users */
            .container {
                padding: 0;
                width: 100%;
                max-width: 100%;
            }

                border-radius: 0;
                box-shadow: none;
                border: none;

<body>

    <header>
        <h1>GDP Calculator</h1>
    </header>

    <main class="container">
        <section class="app-wrapper">
            <!-- Result Display -->
            <div class="result-container">
                <div class="gdp-score" id="gdp-display">0</div>
                <div class="gdp-label">Gross Domestic Product</div>
                <div class="formula-hint">GDP = C + I + G + (X - M)</div>
            </div>

            <!-- Input Form -->
            <div class="calculator-body">
                <div class="input-grid">
                    <div class="input-group">
                        <label for="input-c">Private Consumption <span class="symbol">C</span></label>
                        <div class="input-wrapper">
                            <span class="currency-symbol">$</span>
                            <input type="number" id="input-c" placeholder="0" step="any" oninput="calculateGDP()">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="input-i">Gross Investment <span class="symbol">I</span></label>
                        <div class="input-wrapper">
                            <span class="currency-symbol">$</span>
                            <input type="number" id="input-i" placeholder="0" step="any" oninput="calculateGDP()">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="input-g">Government Spending <span class="symbol">G</span></label>
                        <div class="input-wrapper">
                            <span class="currency-symbol">$</span>
                            <input type="number" id="input-g" placeholder="0" step="any" oninput="calculateGDP()">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="input-x">Exports <span class="symbol">X</span></label>
                        <div class="input-wrapper">
                            <span class="currency-symbol">$</span>
                            <input type="number" id="input-x" placeholder="0" step="any" oninput="calculateGDP()">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="input-m">Imports <span class="symbol">M</span></label>
                        <div class="input-wrapper">
                            <span class="currency-symbol">$</span>
                            <input type="number" id="input-m" placeholder="0" step="any" oninput="calculateGDP()">
                        </div>
                    </div>
                </div>

                <div class="sub-result">
                    <span>Net Exports (X - M):</span>
                    <span class="val" id="net-exports-display">$0</span>
                </div>

                <!-- Controls -->
                <div class="controls">
                    <button class="btn-clear" onclick="clearData()">Clear Data</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // DOM Elements
        const inputC = document.getElementById('input-c');
        const inputI = document.getElementById('input-i');
        const inputG = document.getElementById('input-g');
        const inputX = document.getElementById('input-x');
        const inputM = document.getElementById('input-m');
        
        const gdpDisplay = document.getElementById('gdp-display');
        const netExportsDisplay = document.getElementById('net-exports-display');

        // Local Storage Key
        const STORAGE_KEY = 'gdpCalcData_toolshub365';

        // State Object
        let appState = {
            c: '',
            i: '',
            g: '',
            x: '',
            m: ''
        };

        // Format number with commas
        function formatNumber(num) {
            if (isNaN(num)) return "0";
            // Check if it has decimals
            if (num % 1 !== 0) {
                return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
            return num.toLocaleString('en-US');
        }

        // Parse input value safely
        function parseVal(val) {
            const parsed = parseFloat(val);
            return isNaN(parsed) ? 0 : parsed;
        }

        // Initialize App
        function init() {
            loadData();
            calculateGDP();
        }

        // Core Calculation function
        function calculateGDP() {
            // Update State
            appState.c = inputC.value;
            appState.i = inputI.value;
            appState.g = inputG.value;
            appState.x = inputX.value;
            appState.m = inputM.value;

            // Variables
            const c = parseVal(appState.c);
            const i = parseVal(appState.i);
            const g = parseVal(appState.g);
            const x = parseVal(appState.x);
            const m = parseVal(appState.m);

            // Formulas
            const netExports = x - m;
            const gdp = c + i + g + netExports;

            // Update UI
            gdpDisplay.textContent = formatNumber(gdp);
            netExportsDisplay.textContent = (netExports < 0 ? "-$" : "$") + formatNumber(Math.abs(netExports));

            // Change color for negative net exports
            if (netExports < 0) {
                netExportsDisplay.style.color = '#e55039';
            } else {
                netExportsDisplay.style.color = '#0fb9b1';
            }

            saveData();
        }

        // Save Data to Local Storage
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
        }

        // Load Data from Local Storage
        function loadData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    appState = { ...appState, ...parsed };
                    
                    // Apply to inputs
                    inputC.value = appState.c;
                    inputI.value = appState.i;
                    inputG.value = appState.g;
                    inputX.value = appState.x;
                    inputM.value = appState.m;
                } catch (e) {
                    console.error("Error loading saved data");
                }
            }
        }

        // Clear All Data
        function clearData() {
            if (confirm("Are you sure you want to clear your data?")) {
                localStorage.removeItem(STORAGE_KEY);
                
                appState = { c: '', i: '', g: '', x: '', m: '' };
                
                inputC.value = '';
                inputI.value = '';
                inputG.value = '';
                inputX.value = '';
                inputM.value = '';

                calculateGDP();
            }
        }

        // Run Init on window load
        window.onload = init;
    </script>
</body>
</html>
