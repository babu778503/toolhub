<!DOCTYPE html>
<!-- Category: Other Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Calculator</title>
    
    <!-- SEO & Technical SEO for AI Crawlers -->
    <meta name="description" content="Easily add or subtract days, weeks, months, and years from a date. Free Date Calculator tool with auto-save functionality.">
    <meta name="keywords" content="Date Calculator, add days to date, subtract dates, date math, calculate future date, toolshub365.com, time calculator">
    <meta name="robots" content="index, follow, max-snippet:-1, max-video-preview:-1, max-image-preview:large">
    <link rel="canonical" href="https://toolshub365.com/date-calculator">
    
    <!-- Open Graph for Social and Search Engines -->
    <meta property="og:title" content="Date Calculator">
    <meta property="og:description" content="Easily calculate a past or future date by adding or subtracting years, months, weeks, and days.">
    <meta property="og:url" content="https://toolshub365.com/date-calculator">
    <meta property="og:type" content="website">

    <!-- JSON-LD Schema Markup for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Date Calculator",
      "url": "https://toolshub365.com/date-calculator",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "All",
      "description": "An interactive web utility that allows users to precisely calculate a future or past date by adding or subtracting years, months, weeks, and days, featuring offline automatic save."
    }
    </script>

    <style>
        :root {
            --primary-color: #0ea5e9;
            --primary-hover: #0284c7;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --header-height: 50px;
        }

        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--header-height); /* Offset for fixed header */
            -webkit-font-smoothing: antialiased;
        }

        /* Header (Fixed 50px height) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Desktop Container (Max 1200px) */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Interactive UI Card */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="date"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #f1f5f9;
            color: var(--text-main);
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="date"]:focus,
        input[type="number"]:focus,
        select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
            background-color: #ffffff;
        }

        /* Radio Buttons for Operation */
        .operation-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 10px 0;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-transform: none;
            letter-spacing: 0;
        }

        .radio-label input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            margin-top: 10px;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            color: #ffffff;
        }

        .btn-clear {
            background-color: var(--danger-color);
        }

        .btn-clear:hover {
            background-color: var(--danger-hover);
        }

        /* Results Display */
        .result-container {
            margin-top: 30px;
            padding: 25px 15px;
            background-color: #f0fdfa;
            border: 1px solid #ccfbf1;
            border-radius: 8px;
            text-align: center;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .result-label {
            font-size: 0.95rem;
            color: #0f766e;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 1.75rem;
            font-weight: 800;
            color: #115e59;
            line-height: 1.3;
        }

        /* Mobile Adjustments */
        @media screen and (max-width: 768px) {
            .container {
                /* Both side blank space removed for mobile users */
                padding: 20px 0;
                width: 100%;
            }
            .card {
                /* Edge to edge */
                border-radius: 0;
                border-left: none;
                border-right: none;
                box-shadow: none;
                padding: 20px 15px;
            }
            .row {
                flex-wrap: wrap;
                gap: 10px;
            }
            .col {
                flex: 1 1 45%;
            }
            .result-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Date Calculator</h1>
    </header>

    <div class="container">
        <div class="card">
            
            <div class="form-group">
                <label for="startDate">Start Date</label>
                <input type="date" id="startDate" required>
            </div>

            <div class="operation-group">
                <label class="radio-label">
                    <input type="radio" name="operation" value="add" checked>
                    Add to Date
                </label>
                <label class="radio-label">
                    <input type="radio" name="operation" value="subtract">
                    Subtract from Date
                </label>
            </div>

            <div class="row">
                <div class="col">
                    <label for="years">Years</label>
                    <input type="number" id="years" min="0" value="0">
                </div>
                <div class="col">
                    <label for="months">Months</label>
                    <input type="number" id="months" min="0" value="0">
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label for="weeks">Weeks</label>
                    <input type="number" id="weeks" min="0" value="0">
                </div>
                <div class="col">
                    <label for="days">Days</label>
                    <input type="number" id="days" min="0" value="0">
                </div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-clear" id="clearDataBtn">Clear Data</button>
            </div>

            <div class="result-container">
                <div class="result-label">Calculated Date</div>
                <div id="resultValue" class="result-value">--</div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const startDateInput = document.getElementById('startDate');
            const opRadios = document.getElementsByName('operation');
            const yearsInput = document.getElementById('years');
            const monthsInput = document.getElementById('months');
            const weeksInput = document.getElementById('weeks');
            const daysInput = document.getElementById('days');
            const resultValue = document.getElementById('resultValue');
            const clearDataBtn = document.getElementById('clearDataBtn');

            // Set default date to today if empty initially
            const today = new Date();
            const todayStr = today.getFullYear() + '-' + 
                             String(today.getMonth() + 1).padStart(2, '0') + '-' + 
                             String(today.getDate()).padStart(2, '0');

            // Load Saved Data
            loadData();

            // Event Listeners for auto-calculation and auto-save
            const inputs =[startDateInput, yearsInput, monthsInput, weeksInput, daysInput];
            inputs.forEach(input => {
                input.addEventListener('input', updateAndSave);
            });
            opRadios.forEach(radio => {
                radio.addEventListener('change', updateAndSave);
            });
            
            // Clear Data Event
            clearDataBtn.addEventListener('click', clearData);

            // Calculation Logic
            function calculateDate() {
                const startVal = startDateInput.value;
                if (!startVal) {
                    resultValue.textContent = '--';
                    return;
                }

                // Parse input date safely without shifting timezone
                const[y, m, d] = startVal.split('-');
                let targetDate = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));

                // Get Operation
                let operation = 'add';
                for (const radio of opRadios) {
                    if (radio.checked) operation = radio.value;
                }

                // Get Values
                const years = parseInt(yearsInput.value) || 0;
                const months = parseInt(monthsInput.value) || 0;
                const weeks = parseInt(weeksInput.value) || 0;
                const days = parseInt(daysInput.value) || 0;

                const multiplier = (operation === 'add') ? 1 : -1;

                // Standard JavaScript Date math
                targetDate.setFullYear(targetDate.getFullYear() + (years * multiplier));
                targetDate.setMonth(targetDate.getMonth() + (months * multiplier));
                targetDate.setDate(targetDate.getDate() + ((weeks * 7 + days) * multiplier));

                // Format Results Nicely
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                resultValue.textContent = targetDate.toLocaleDateString(undefined, options);
            }

            // Save Data to Local Storage
            function updateAndSave() {
                calculateDate();
                
                let operation = 'add';
                for (const radio of opRadios) {
                    if (radio.checked) operation = radio.value;
                }

                const data = {
                    startDate: startDateInput.value,
                    operation: operation,
                    years: yearsInput.value,
                    months: monthsInput.value,
                    weeks: weeksInput.value,
                    days: daysInput.value
                };
                localStorage.setItem('dateCalcData_toolshub365', JSON.stringify(data));
            }

            // Load Data from Local Storage
            function loadData() {
                const savedData = localStorage.getItem('dateCalcData_toolshub365');
                if (savedData) {
                    try {
                        const data = JSON.parse(savedData);
                        if (data.startDate) startDateInput.value = data.startDate;
                        else startDateInput.value = todayStr;
                        
                        if (data.operation) {
                            for (const radio of opRadios) {
                                radio.checked = (radio.value === data.operation);
                            }
                        }
                        
                        if (data.years !== undefined) yearsInput.value = data.years;
                        if (data.months !== undefined) monthsInput.value = data.months;
                        if (data.weeks !== undefined) weeksInput.value = data.weeks;
                        if (data.days !== undefined) daysInput.value = data.days;
                        
                        calculateDate();
                    } catch (e) {
                        console.error('Error parsing saved data', e);
                        startDateInput.value = todayStr;
                        calculateDate();
                    }
                } else {
                    startDateInput.value = todayStr;
                    calculateDate();
                }
            }

            // Clear Data Function
            function clearData() {
                startDateInput.value = todayStr;
                for (const radio of opRadios) {
                    radio.checked = (radio.value === 'add');
                }
                yearsInput.value = '0';
                monthsInput.value = '0';
                weeksInput.value = '0';
                daysInput.value = '0';
                
                localStorage.removeItem('dateCalcData_toolshub365');
                calculateDate();
            }
        });
    </script>
</body>
</html>
