<!DOCTYPE html>
<!-- Category: Financial Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    
    <!-- SEO & Metadata -->
    <title>Business Loan Calculator</title>
    <meta name="description" content="Free Business Loan Calculator. Calculate monthly payments, total interest, and amortization for SBA loans, term loans, and commercial financing. Features auto-save.">
    <meta name="keywords" content="Business Loan Calculator, SBA Loan Calculator, Commercial Loan Calculator, Business Mortgage Calculator, Amortization Schedule, Toolshub365">
    <meta name="author" content="Toolshub365">
    <meta name="robots" content="index, follow">
    
    <!-- AI Crawler Optimization -->
    <meta name="gpt-bot" content="index, follow">
    <meta name="googlebot" content="index, follow">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://toolshub365.com/business-loan-calculator">

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialProduct",
      "name": "Business Loan Calculator",
      "category": "Business Finance",
      "url": "https://toolshub365.com/business-loan-calculator",
      "description": "Calculates business loan payments including interest and origination fees.",
      "brand": {
        "@type": "Brand",
        "name": "Toolshub365"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #27ae60;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --header-height: 50px;
            --container-width: 1200px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        /* Calculator Card */
        .calculator-wrapper {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
        }

        .input-section {
            flex: 1;
            min-width: 320px;
            padding: 30px;
            border-right: 1px solid #ecf0f1;
        }

        .result-section {
            flex: 1;
            min-width: 320px;
            padding: 30px;
            background-color: #fcfcfc;
            display: flex;
            flex-direction: column;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group span {
            position: absolute;
            color: #7f8c8d;
            font-weight: 500;
        }

        .prefix { left: 12px; }
        .suffix { right: 12px; }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .has-prefix input { padding-left: 25px; }
        .has-suffix input { padding-right: 30px; }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        /* Buttons */
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:active { transform: translateY(1px); }

        .btn-calc {
            background-color: var(--secondary-color);
            color: white;
        }

        .btn-calc:hover { background-color: #2980b9; }

        .btn-clear {
            background-color: #ecf0f1;
            color: var(--text-color);
            border: 1px solid #bdc3c7;
        }

        .btn-clear:hover { background-color: #bdc3c7; }

        /* Results Styling */
        .result-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #ecf0f1;
        }

        .result-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8c8d;
        }

        .main-result {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--accent-color);
            margin: 10px 0;
        }

        .result-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .detail-card {
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #eee;
            text-align: center;
        }

        .detail-val {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-top: 5px;
        }

        .schedule-btn-container {
            margin-top: 20px;
            text-align: center;
        }

        /* Mobile Optimization */
        @media screen and (max-width: 768px) {
            .container {
                padding: 0;
                margin: 0;
                max-width: 100%;
            }

            .calculator-wrapper {
                border-radius: 0;
                box-shadow: none;
                flex-direction: column;
            }

            .input-section {
                border-right: none;
                border-bottom: 1px solid #ecf0f1;
                padding: 20px;
            }

            .result-section {
                padding: 20px;
                background-color: #fff;
            }
            
            /* Prevent iOS zoom */
            input[type="number"] {
                font-size: 16px;
            }

            header h1 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Business Loan Calculator</h1>
    </header>

    <div class="container">
        <div class="calculator-wrapper">
            
            <!-- Input Section -->
            <div class="input-section">
                <form id="loanForm" onsubmit="return false;">
                    
                    <div class="form-group">
                        <label for="amount">Loan Amount ($)</label>
                        <div class="input-group has-prefix">
                            <span class="prefix">$</span>
                            <input type="number" id="amount" placeholder="e.g. 100000" min="0" step="100" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="rate">Annual Interest Rate (%)</label>
                        <div class="input-group has-suffix">
                            <input type="number" id="rate" placeholder="e.g. 6.5" min="0" step="0.01" required>
                            <span class="suffix">%</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="term">Loan Term (Years)</label>
                        <div class="input-group">
                            <input type="number" id="term" placeholder="e.g. 5" min="0.5" step="0.5" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="fees">Origination Fees (%) <small style="color:#999; font-weight:400;">(Optional)</small></label>
                        <div class="input-group has-suffix">
                            <input type="number" id="fees" placeholder="e.g. 2.0" min="0" step="0.1" value="0">
                            <span class="suffix">%</span>
                        </div>
                    </div>

                    <div class="controls">
                        <button type="button" class="btn-clear" id="clearBtn">Clear</button>
                        <button type="submit" class="btn-calc" id="calcBtn">Calculate</button>
                    </div>
                </form>
            </div>

            <!-- Result Section -->
            <div class="result-section">
                <div class="result-header">
                    <div class="result-label">Estimated Monthly Payment</div>
                    <div class="main-result" id="monthlyPayment">$0.00</div>
                </div>

                <div class="result-details">
                    <div class="detail-card">
                        <div class="result-label">Total Interest</div>
                        <div class="detail-val" id="totalInterest">$0.00</div>
                    </div>
                    <div class="detail-card">
                        <div class="result-label">Total Cost</div>
                        <div class="detail-val" id="totalCost">$0.00</div>
                    </div>
                    <div class="detail-card">
                        <div class="result-label">Upfront Fees</div>
                        <div class="detail-val" id="totalFees">$0.00</div>
                    </div>
                    <div class="detail-card">
                        <div class="result-label">Total Payments</div>
                        <div class="detail-val" id="numPayments">0</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // DOM Elements
        const els = {
            amount: document.getElementById('amount'),
            rate: document.getElementById('rate'),
            term: document.getElementById('term'),
            fees: document.getElementById('fees'),
            calcBtn: document.getElementById('calcBtn'),
            clearBtn: document.getElementById('clearBtn'),
            // Outputs
            monthly: document.getElementById('monthlyPayment'),
            totalInterest: document.getElementById('totalInterest'),
            totalCost: document.getElementById('totalCost'),
            totalFees: document.getElementById('totalFees'),
            numPayments: document.getElementById('numPayments')
        };

        const STORAGE_KEY = 'toolshub365_biz_loan_data';

        // Initialization
        window.addEventListener('load', () => {
            loadData();
            // Attach auto-save listener
            [els.amount, els.rate, els.term, els.fees].forEach(input => {
                input.addEventListener('input', saveData);
            });
        });

        els.calcBtn.addEventListener('click', calculateLoan);
        els.clearBtn.addEventListener('click', clearData);

        function calculateLoan() {
            // Get Values
            const P = parseFloat(els.amount.value) || 0;
            const annualRate = parseFloat(els.rate.value) || 0;
            const years = parseFloat(els.term.value) || 0;
            const feePercent = parseFloat(els.fees.value) || 0;

            if (P <= 0 || years <= 0) {
                alert("Please enter a valid loan amount and term.");
                return;
            }

            // Calculations
            const r = annualRate / 100 / 12; // Monthly rate
            const n = Math.ceil(years * 12); // Total months
            
            let monthlyPayment = 0;
            let totalInterest = 0;
            
            // Standard Amortization Formula: P * ( r(1+r)^n ) / ( (1+r)^n - 1 )
            if (annualRate === 0) {
                monthlyPayment = P / n;
                totalInterest = 0;
            } else {
                monthlyPayment = P * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
                const totalPaid = monthlyPayment * n;
                totalInterest = totalPaid - P;
            }

            // Fees
            const feeAmount = P * (feePercent / 100);
            const totalCost = P + totalInterest + feeAmount;

            // Update UI
            els.monthly.textContent = formatMoney(monthlyPayment);
            els.totalInterest.textContent = formatMoney(totalInterest);
            els.totalCost.textContent = formatMoney(totalCost);
            els.totalFees.textContent = formatMoney(feeAmount);
            els.numPayments.textContent = n;

            saveData();
        }

        function formatMoney(num) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2
            }).format(num);
        }

        // Auto-Save Logic
        function saveData() {
            const data = {
                amount: els.amount.value,
                rate: els.rate.value,
                term: els.term.value,
                fees: els.fees.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                if (data.amount) els.amount.value = data.amount;
                if (data.rate) els.rate.value = data.rate;
                if (data.term) els.term.value = data.term;
                if (data.fees) els.fees.value = data.fees;
            }
        }

        function clearData() {
            els.amount.value = '';
            els.rate.value = '';
            els.term.value = '';
            els.fees.value = '0';
            
            // Reset Results
            els.monthly.textContent = '$0.00';
            els.totalInterest.textContent = '$0.00';
            els.totalCost.textContent = '$0.00';
            els.totalFees.textContent = '$0.00';
            els.numPayments.textContent = '0';
            
            localStorage.removeItem(STORAGE_KEY);
        }
    </script>
</body>
</html>
