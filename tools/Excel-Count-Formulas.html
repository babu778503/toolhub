            display: inline-block;

        .func-header::after {
            content: '+';
            font-size: 1.3rem;
            color: var(--excel-green);
            font-weight: bold;

        .func-item.active .func-header::after {

        /* Function Details */
        .func-details {
            display: none;
            padding: 20px;
            background: var(--card-bg);
            position: relative;

        .func-item.active .func-details {
            display: block;
            animation: fadeIn 0.3s ease-in;

        .detail-section {

            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;

            background: var(--btn-hover);
            color: var(--text-main);
        }

        .syn-fn { color: var(--syn-fn); font-weight: bold; }
        .syn-str { color: var(--syn-str); }
        .syn-ref { color: var(--syn-ref); }

        body.practice-mode-active .code-block {
            filter: blur(6px);
            cursor: pointer;
            user-select: none;

        body.practice-mode-active .code-wrapper::after {

            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);

            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            text-shadow: 0 0 5px var(--card-bg);
            pointer-events: none;
            opacity: 1;
        }

        body.practice-mode-active .code-block.revealed {
            filter: none;
            cursor: text;
            user-select: auto;
        }
        
        body.practice-mode-active .code-block.revealed + .btn-copy,
        body.practice-mode-active .code-wrapper:has(.revealed)::after {
            display: none;
        }

        /* Mastery Button */
        .mastery-action {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
            display: flex;
            justify-content: flex-end;
        }

        .btn-mastery {
            padding: 10px 18px;
            font-size: 0.95rem;

            border-radius: 6px;

            border: 2px solid var(--border-color);
            background: var(--bg-color);

        .btn-mastery:hover {
            background: var(--btn-hover);
            border-color: var(--excel-green);
        }

        .btn-mastery.mastered {
            background: var(--gold-light);
            border-color: var(--gold);
            color: #b38100;
        }

        /* Confetti Animation */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 9999;
            animation: fall 1.5s ease-out forwards;
        }
        
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(150px) rotate(360deg) scale(0.5); opacity: 0; }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 10px 0 0 0;
            }
            .game-dashboard, .quiz-section {
                border-radius: 0;
                border-left: none;
                border-right: none;
                margin-bottom: 10px;
            }
            .quiz-section {
                border-left: 4px solid var(--gold);
            }
            .game-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .search-wrapper {
                padding: 0 10px 10px 10px;
            }
            .category-block {
                border-radius: 0;
                border-left: none;
                border-right: none;
                margin-bottom: 8px;
            }
            .btn-copy { opacity: 1; } /* Always show copy on mobile */
        }
    </style>
</head>

    <script>
        // --- DATA SETUP ---
        const excelData = [
            ["Basic Count Functions", [
                ["COUNT", "Counts the number of cells that contain numeric values.", "Numeric integer.", "=COUNT(value1, [value2], ...)", "=COUNT(A1:A10)", "=SUM(COUNT(A1:A10), B1:B10)"],
                ["COUNTA", "Counts the number of cells that are not empty (includes text, numbers, and errors).", "Numeric integer.", "=COUNTA(value1, [value2], ...)", "=COUNTA(A1:A10)", "=SUM(COUNTA(A1:A10), COUNTA(B1:B10))"],
                ["COUNTBLANK", "Counts the number of completely empty cells within a specified range.", "Numeric integer.", "=COUNTBLANK(range)", "=COUNTBLANK(A1:A10)", "=SUM(COUNTBLANK(A1:A10), COUNTBLANK(B1:B10))"],
                ["COUNTIF", "Counts the number of cells within a range that meet a single condition.", "Numeric integer.", "=COUNTIF(range, criteria)", "=COUNTIF(A1:A10, \">10\")", "=SUM(COUNTIF(A1:A10, \"Yes\"), COUNTIF(B1:B10, \"No\"))"],
                ["COUNTIFS", "Counts the number of cells that meet multiple criteria across multiple ranges.", "Numeric integer.", "=COUNTIFS(criteria_range1, criteria1, ...)", "=COUNTIFS(A1:A10, \"Red\", B1:B10, \">10\")", "=SUM(COUNTIFS(A:A, \"X\", B:B, \"Y\"), 50)"]
            ]],
            ["✅ Conditional & Logical Count Combinations", [
                ["COUNTIF + SUM", "Counts cells using an array of criteria and sums the total counts.", "Numeric integer.", "=SUM(COUNTIF(range, {criteria1, criteria2}))", "=SUM(COUNTIF(A1:A10, {\"Red\", \"Blue\"}))", "=SUM(COUNTIF(A1:A10, {\"Apples\",\"Oranges\"}))"],
                ["COUNTIF + SUMPRODUCT", "Uses SUMPRODUCT to handle arrays and count without needing Ctrl+Shift+Enter.", "Numeric integer.", "=SUMPRODUCT(COUNTIF(range, criteria_range))", "=SUMPRODUCT(COUNTIF(A1:A10, C1:C3))", "=SUMPRODUCT(COUNTIF(A1:A10, C1:C3)) + SUM(B1:B10)"],
                ["COUNTIFS + SUMPRODUCT", "Handles complex multiple OR conditions across arrays natively.", "Numeric integer.", "=SUMPRODUCT(COUNTIFS(range1, crit1, range2, array_crit))", "=SUMPRODUCT(COUNTIFS(A1:A10, \"Active\", B1:B10, {\"East\",\"West\"}))", "=SUM(SUMPRODUCT(COUNTIFS(A:A, \"X\", B:B, {\"Y\",\"Z\"})))"],
                ["COUNTIF + ISNUMBER", "Combines logic to specifically count numerical or calculated logic fields.", "Numeric integer.", "=SUMPRODUCT(--ISNUMBER(range))", "=SUMPRODUCT(--ISNUMBER(A1:A10))", "=SUM(SUMPRODUCT(--ISNUMBER(A1:A10)), 10)"],
                ["COUNTIF + MATCH", "Counts occurrences of items that exist in another list.", "Numeric integer.", "=SUMPRODUCT(--ISNUMBER(MATCH(range, list, 0)))", "=SUMPRODUCT(--ISNUMBER(MATCH(A1:A10, D1:D5, 0)))", "=SUM(SUMPRODUCT(--ISNUMBER(MATCH(A1:A10, D1:D5, 0))), 1)"],
                ["COUNTIFS + IF", "Embeds counting inside logical conditions to toggle outputs.", "Value or Count.", "=IF(COUNTIFS(range, crit)>0, \"Found\", \"Missing\")", "=IF(COUNTIFS(A1:A10, \"Pass\")>5, \"Target Met\", \"Failed\")", "=SUM(IF(COUNTIFS(A:A, \"X\")>0, B1:B10, 0))"],
                ["COUNTIFS + OR (via array)", "Executes an OR operation in a COUNTIFS context utilizing an array.", "Numeric integer.", "=SUM(COUNTIFS(range, {\"Crit1\",\"Crit2\"}))", "=SUM(COUNTIFS(A1:A10, {\"Urgent\", \"High\"}))", "=SUM(COUNTIFS(A1:A10, {\"Urgent\", \"High\"}))"]
            ]],
            ["✅ Advanced / Dynamic Count Functions", [
                ["UNIQUE", "Extracts unique items to be counted by COUNTA.", "Numeric integer.", "=COUNTA(UNIQUE(array))", "=COUNTA(UNIQUE(A1:A100))", "=SUM(COUNTA(UNIQUE(A1:A10)), 5)"],

            { q: "How do you count how many items appear more than once (duplicates)?", options: ["=SUMPRODUCT(--(COUNTIF(range, range)>1))", "=COUNTIF(range, \">1\")", "=DUPLICATES(range)", "=COUNT(UNIQUE(range))"], answer: 0, explanation: "COUNTIF generates an array of counts for each item; SUMPRODUCT tallies the ones > 1." },
            { q: "In COUNTIF(A1:A10, A1:A10), what does Excel return?", options: ["A single number", "An array of counts for each item", "An error", "TRUE/FALSE"], answer: 1, explanation: "Passing an array as the criteria tells Excel to return the count for every single item." },
            { q: "What is the pre-Excel 365 formula for counting distinct values?", options: ["=SUMPRODUCT(1/COUNTIF(range, range))", "=COUNTIFS(range)", "=DISTINCT(range)", "=COUNTA(UNIQUE(range))"], answer: 0, explanation: "This classic array trick divides 1 by the item's occurrence count, so duplicates sum to exactly 1." },
            { q: "In =SUMPRODUCT(1/COUNTIF(range, range)), what happens to a value appearing 4 times?", options: ["It causes a DIV/0 error", "It is counted as 1/4 four times, summing to 1", "It is counted 4 times", "It is ignored"], answer: 1, explanation: "4 occurrences equal 0.25 each. Summed together, they count as exactly 1 distinct item." },
            { q: "How do you count dates between Jan 1 and Dec 31 using COUNTIFS?", options: ["=COUNTIFS(range, \"Jan 1 to Dec 31\")", "=COUNTIFS(range, \">=\"&date1, range, \"<=\"&date2)", "=SUMPRODUCT(date1, date2)", "=BETWEEN(date1, date2)"], answer: 1, explanation: "You must concatenate logical operators with your date references." },
            { q: "Must all ranges in COUNTIFS be the exact same size?", options: ["Yes", "No", "Only for numbers", "Only the criteria range"], answer: 0, explanation: "Yes, COUNTIFS requires symmetrical arrays; otherwise, it returns a #VALUE! error." },
            { q: "Which function is used to count only visible cells after applying an auto-filter?", options: ["COUNT", "COUNTIFS", "SUBTOTAL", "SUM"], answer: 2, explanation: "SUBTOTAL (with specific function nums like 3 or 103) inherently ignores filtered rows." },
            { q: "What is the function_num used in SUBTOTAL for COUNTA (ignoring hidden rows)?", options: ["1", "9", "103", "111"], answer: 2, explanation: "103 is the code for COUNTA while forcing the formula to ignore hidden/filtered rows." },
            { q: "Which function ignores both hidden rows AND errors when counting?", options: ["SUBTOTAL", "AGGREGATE", "SUMPRODUCT", "COUNTIFS"], answer: 1, explanation: "AGGREGATE is more robust than SUBTOTAL, allowing you to ignore errors explicitly via its options parameter." },
            { q: "What is the function_num in AGGREGATE for COUNTA?", options: ["1", "2", "3", "4"], answer: 2, explanation: "Function 3 corresponds to COUNTA within the AGGREGATE formula." }
        ];

        // --- DOM ELEMENTS ---
        const container = document.getElementById('dataContainer');
        const searchInput = document.getElementById('searchInput');
        const practiceToggle = document.getElementById('practiceModeToggle');
        
        // Gamification
        const totalCountEl = document.getElementById('totalCount');
        const masteredCountEl = document.getElementById('masteredCount');
        const gameProgressBar = document.getElementById('gameProgressBar');
        const xpDisplay = document.getElementById('xpDisplay');
        const levelDisplay = document.getElementById('levelDisplay');
        const quizScoreDisplay = document.getElementById('quizScoreDisplay');

        // Quiz
        const btnToggleQuiz = document.getElementById('btnToggleQuiz');
        const quizContainer = document.getElementById('quizContainer');
        const quizQuestion = document.getElementById('quizQuestion');
        const quizOptions = document.getElementById('quizOptions');
        const quizFeedback = document.getElementById('quizFeedback');
        const btnNextQuestion = document.getElementById('btnNextQuestion');

        // --- STATE & STORAGE ---
        const STORAGE_KEY_SEARCH = 'excelCountSearchQuery';
        const STORAGE_KEY_OPEN_CATS = 'excelCountOpenCats';
        const STORAGE_KEY_MASTERY = 'excelCountMasteryArray';
        const STORAGE_KEY_PRACTICE = 'excelCountPracticeMode';
        const STORAGE_KEY_QUIZ_CORRECT = 'excelCountQuizCorrect';

        const TOTAL_FORMULAS = excelData.reduce((acc, cat) => acc + cat[1].length, 0);
        const XP_PER_MASTERY = 10;
        const XP_PER_QUIZ = 5;

        let currentQuizIndex = 0;
        let isQuizActive = false;
        let shuffledQuiz = [];

        function saveState() {
            localStorage.setItem(STORAGE_KEY_SEARCH, searchInput.value);
            const openCats = [];
            document.querySelectorAll('.category-block.active').forEach(cat => {
                openCats.push(cat.dataset.catName);
            });
            localStorage.setItem(STORAGE_KEY_OPEN_CATS, JSON.stringify(openCats));
        }

        // --- VISUAL EFFECTS ---
        function shootConfetti(x, y) {
            const colors = ['#ffb900', '#107c41', '#0078d4', '#e81123'];
            for(let i=0; i<40; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti-piece';
                
                let dx = (Math.random() - 0.5) * 200;
                let dy = (Math.random() - 0.5) * 200;
                
                conf.style.left = x + 'px';
                conf.style.top = y + 'px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                conf.style.setProperty('--dx', `${dx}px`);
                conf.style.setProperty('--dy', `${dy}px`);
                
                conf.style.animation = 'none';
                conf.offsetHeight; 
                conf.style.animation = `scatter ${1 + Math.random()*0.5}s ease-out forwards`;
                
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 1500);
            }
        }
        
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes scatter {
                0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
                100% { transform: translate(var(--dx), calc(var(--dy) + 150px)) rotate(720deg) scale(0); opacity: 0; }
            }
        `;
        document.head.appendChild(styleSheet);

        function highlightSyntax(codeStr) {
            let s = codeStr.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            s = s.replace(/("[^"]*")/g, '<span class="syn-str">$1</span>');
            s = s.replace(/\b([A-Z.0-9_]+)(\()/g, '<span class="syn-fn">$1</span>$2');
            s = s.replace(/\b([A-Z]{1,3}[0-9]{1,7}(:[A-Z]{1,3}[0-9]{1,7})?)\b/g, '<span class="syn-ref">$1</span>');
            return s;
        }

        // Fix: Robust mobile-friendly copy-to-clipboard function
        function copyToClipboard(text, btnElement) {
            const onSuccess = () => {
                let oldText = btnElement.innerText;
                if(oldText === "✅ Copied!") return; // prevent spam visual glitch
                btnElement.innerText = "✅ Copied!";
                btnElement.style.color = "var(--excel-green)";
                setTimeout(() => {
                    btnElement.innerText = "📋 Copy";
                    btnElement.style.color = "";
                }, 2000);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(onSuccess).catch(() => {
                    fallbackCopy(text, onSuccess);
                });
            } else {
                fallbackCopy(text, onSuccess);
            }
        }

        function fallbackCopy(text, onSuccess) {
            let textArea = document.createElement("textarea");
            textArea.value = text;
            
            // Prevent zooming & scrolling on mobile
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            
            document.body.appendChild(textArea);
            
            textArea.focus();
            textArea.select();
            textArea.setSelectionRange(0, 99999); // Mobile specific select
            
            try {
                let successful = document.execCommand('copy');
                if (successful) onSuccess();
            } catch (err) {
                console.error("Fallback copy failed", err);
            }
            
            document.body.removeChild(textArea);
        }

        // --- GAMIFICATION LOGIC ---
        function getMasteryData() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY_MASTERY)) || []; } catch (e) { return []; }
        }
        function saveMasteryData(data) { localStorage.setItem(STORAGE_KEY_MASTERY, JSON.stringify(data)); }
        function getQuizCorrect() { return parseInt(localStorage.getItem(STORAGE_KEY_QUIZ_CORRECT)) || 0; }
        function addQuizCorrect(e) {
            let correct = getQuizCorrect() + 1;
            localStorage.setItem(STORAGE_KEY_QUIZ_CORRECT, correct);
            updateGamificationDashboard();
            if(e) shootConfetti(e.clientX, e.clientY);
        }

        function toggleMastery(formulaId, btnElement, liElement, event) {
            let mastery = getMasteryData();
            if (mastery.includes(formulaId)) {
                mastery = mastery.filter(id => id !== formulaId);
                btnElement.classList.remove('mastered');
                btnElement.innerHTML = `Mark as Mastered (+${XP_PER_MASTERY} XP)`;
                liElement.classList.remove('is-mastered');
            } else {
                mastery.push(formulaId);
                btnElement.classList.add('mastered');
                btnElement.innerHTML = `⭐ Mastered (+${XP_PER_MASTERY} XP)`;
                liElement.classList.add('is-mastered');
                shootConfetti(event.clientX, event.clientY);
            }
            saveMasteryData(mastery);
            updateGamificationDashboard();
        }

        function updateGamificationDashboard() {
            const masteryCount = getMasteryData().length;
            const quizCorrect = getQuizCorrect();
            
            const progress = (masteryCount / TOTAL_FORMULAS) * 100;
            const totalXp = (masteryCount * XP_PER_MASTERY) + (quizCorrect * XP_PER_QUIZ);

            masteredCountEl.textContent = masteryCount;
            totalCountEl.textContent = TOTAL_FORMULAS;
            quizScoreDisplay.textContent = quizCorrect;
            gameProgressBar.style.width = `${progress}%`;
            xpDisplay.textContent = `⭐ ${totalXp} XP`;

            let levelText = "Novice";
            if (totalXp >= 800) levelText = "Excel Grandmaster";
            else if (totalXp >= 400) levelText = "Formula Wizard";
            else if (totalXp >= 150) levelText = "Data Analyst";
            else if (totalXp >= 50) levelText = "Intermediate";

            levelDisplay.textContent = `Rank: ${levelText}`;
        }

        // --- QUIZ LOGIC ---
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        btnToggleQuiz.addEventListener('click', () => {
            if (!isQuizActive) {
                quizContainer.style.display = 'block';
                btnToggleQuiz.textContent = "Close Quiz";
                isQuizActive = true;
                startQuiz();
            } else {
                quizContainer.style.display = 'none';
                btnToggleQuiz.textContent = "Start Practice Quiz";
                isQuizActive = false;
            }
        });

        function startQuiz() {
            shuffledQuiz = shuffleArray([...quizQuestions]);
            currentQuizIndex = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const qData = shuffledQuiz[currentQuizIndex];
            quizQuestion.textContent = `${currentQuizIndex + 1}. ${qData.q}`;
            quizOptions.innerHTML = '';
            quizFeedback.style.display = 'none';
            btnNextQuestion.style.display = 'none';

            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option-btn';
                btn.textContent = opt;
                btn.onclick = (e) => handleAnswer(index, qData.answer, qData.explanation, btn, e);
                quizOptions.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex, correctIndex, explanation, btnClicked, event) {
            const buttons = quizOptions.querySelectorAll('.quiz-option-btn');
            buttons.forEach(btn => btn.disabled = true); 

            quizFeedback.style.display = 'block';

            if (selectedIndex === correctIndex) {
                btnClicked.classList.add('correct');
                quizFeedback.className = 'quiz-feedback success';
                quizFeedback.innerHTML = `<strong>✅ Correct! (+${XP_PER_QUIZ} XP)</strong><br>${explanation}`;
                addQuizCorrect(event); 
            } else {
                btnClicked.classList.add('incorrect');
                buttons[correctIndex].classList.add('correct'); 
                quizFeedback.className = 'quiz-feedback error';
                quizFeedback.innerHTML = `<strong>❌ Incorrect.</strong><br>${explanation}`;
            }

            btnNextQuestion.style.display = 'inline-block';
        }

        btnNextQuestion.addEventListener('click', () => {
            currentQuizIndex++;
            if (currentQuizIndex >= shuffledQuiz.length) {
                shuffledQuiz = shuffleArray([...quizQuestions]);
                currentQuizIndex = 0;
            }
            loadQuestion();
        });

        // --- PRACTICE MODE LOGIC ---
        function applyPracticeMode() {
            const isChecked = practiceToggle.checked;
            localStorage.setItem(STORAGE_KEY_PRACTICE, isChecked);
            if(isChecked) {
                document.body.classList.add('practice-mode-active');
            } else {
                document.body.classList.remove('practice-mode-active');
                document.querySelectorAll('.code-block').forEach(el => el.classList.remove('revealed'));
            }
        }

        // --- RENDER CONTENT ---
        function renderUI() {
            container.innerHTML = '';
            let savedCats = [];
            try { savedCats = JSON.parse(localStorage.getItem(STORAGE_KEY_OPEN_CATS)) || []; } catch (e) {}
            const masteryData = getMasteryData();

            excelData.forEach((category, catIndex) => {
                const catName = category[0];
                const functions = category[1];

                const catDiv = document.createElement('div');
                catDiv.className = 'category-block';
                const catId = catName.toLowerCase().replace(/[^a-z0-9]/g, '-');
                catDiv.dataset.catName = catId;

                if (savedCats.includes(catId) || (savedCats.length === 0 && catIndex === 0)) {
                    catDiv.classList.add('active');
                }

                const catHeader = document.createElement('div');
                catHeader.className = 'category-header';
                catHeader.textContent = catName;
                catHeader.onclick = () => {
                    catDiv.classList.toggle('active');
                    saveState();
                };

                const funcList = document.createElement('ul');
                funcList.className = 'func-list';

                functions.forEach((func) => {
                    const [fName, fPurpose, fReturn, fSyntax, fExample, fSum] = func;
                    const fId = fName.toLowerCase().replace(/[^a-z0-9]/g, '-');
                    const isMastered = masteryData.includes(fId);

                    const funcItem = document.createElement('li');
                    funcItem.className = `func-item ${isMastered ? 'is-mastered' : ''}`;
                    funcItem.dataset.funcName = fName.toLowerCase();
                    funcItem.dataset.funcDesc = fPurpose.toLowerCase();

                    const funcHeader = document.createElement('div');
                    funcHeader.className = 'func-header';
                    const headerLeft = document.createElement('div');
                    headerLeft.className = 'func-header-left';
                    headerLeft.innerHTML = `<span>${fName}</span> <span class="badge-icon" title="Mastered">⭐</span>`;
                    funcHeader.appendChild(headerLeft);
                    funcHeader.onclick = () => funcItem.classList.toggle('active');

                    const funcDetails = document.createElement('div');
                    funcDetails.className = 'func-details';
                    
                    const safeSyntax = highlightSyntax(fSyntax);
                    const safeExample = highlightSyntax(fExample);
                    const safeSum = highlightSyntax(fSum);

                    // Added event.stopPropagation() to Copy buttons to prevent any touch-bubble issues on mobile
                    funcDetails.innerHTML = `
                        <div class="detail-section">
                            <h4>Purpose</h4>
                            <p>${fPurpose}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Return value</h4>
                            <p>${fReturn}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Syntax</h4>
                            <div class="code-wrapper">
                                <code class="code-block" onclick="this.classList.add('revealed')">${safeSyntax}</code>
                                <button type="button" class="btn-copy" onclick="event.stopPropagation(); copyToClipboard('${fSyntax.replace(/'/g, "\\'")}', this)">📋 Copy</button>
                            </div>
                        </div>
                        <div class="detail-section">
                            <h4>Examples</h4>
                            <div class="code-wrapper">
                                <code class="code-block" onclick="this.classList.add('revealed')">${safeExample}</code>
                                <button type="button" class="btn-copy" onclick="event.stopPropagation(); copyToClipboard('${fExample.replace(/'/g, "\\'")}', this)">📋 Copy</button>
                            </div>
                        </div>
                        <div class="detail-section">
                            <h4>Using the SUM function</h4>
                            <div class="code-wrapper">
                                <code class="code-block" onclick="this.classList.add('revealed')">${safeSum}</code>
                                <button type="button" class="btn-copy" onclick="event.stopPropagation(); copyToClipboard('${fSum.replace(/'/g, "\\'")}', this)">📋 Copy</button>
                            </div>
                        </div>
                    `;

                    const masteryActionDiv = document.createElement('div');
                    masteryActionDiv.className = 'mastery-action';
                    const masteryBtn = document.createElement('button');
                    masteryBtn.className = `btn-mastery ${isMastered ? 'mastered' : ''}`;
                    masteryBtn.innerHTML = isMastered ? `⭐ Mastered (+${XP_PER_MASTERY} XP)` : `Mark as Mastered (+${XP_PER_MASTERY} XP)`;
                    masteryBtn.onclick = (e) => {
                        e.stopPropagation(); 
                        toggleMastery(fId, masteryBtn, funcItem, e);
                    };
                    masteryActionDiv.appendChild(masteryBtn);
                    funcDetails.appendChild(masteryActionDiv);

                    funcItem.appendChild(funcHeader);
                    funcItem.appendChild(funcDetails);
                    funcList.appendChild(funcItem);
                });

                catDiv.appendChild(catHeader);
                catDiv.appendChild(funcList);
                container.appendChild(catDiv);
            });

            updateGamificationDashboard();
        }

        // --- SEARCH FILTER ---
        function filterUI() {
            const query = searchInput.value.toLowerCase().trim();
            const categories = document.querySelectorAll('.category-block');

            categories.forEach(cat => {
                let hasVisibleItems = false;
                const items = cat.querySelectorAll('.func-item');

                items.forEach(item => {
                    const fName = item.dataset.funcName;
                    const fDesc = item.dataset.funcDesc;
                    
                    if (fName.includes(query) || fDesc.includes(query)) {
                        item.style.display = 'block';
                        hasVisibleItems = true;
                        if(query.length > 2) item.classList.add('active');
                    } else {
                        item.style.display = 'none';
                        item.classList.remove('active');
                    }
                });

                if (hasVisibleItems) {
                    cat.style.display = 'block';
                    if(query.length > 0) cat.classList.add('active');
                } else {
                    cat.style.display = 'none';
                }
            });
            saveState();
        }

        // Listeners
        searchInput.addEventListener('input', filterUI);
        practiceToggle.addEventListener('change', applyPracticeMode);

        // Keyboard Shortcut for Search
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderUI();
            
            const savedSearch = localStorage.getItem(STORAGE_KEY_SEARCH);
            if (savedSearch) searchInput.value = savedSearch;
            
            const savedPractice = localStorage.getItem(STORAGE_KEY_PRACTICE);
            if (savedPractice === 'true') {
                practiceToggle.checked = true;
                applyPracticeMode();
            }

            filterUI();
        });
    </script>
</body>
</html>
