<style>
    :root {
        --primary-color: #217346; /* Excel Green */
        --header-bg: #ffffff;
        --bg-color: #f4f7f6;
        --text-color: #333;
        --card-bg: #ffffff;
        --border-color: #e0e0e0;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-color);
        line-height: 1.6;
    }

    /* Header Styles - Fixed 50px */
    header {
        height: 50px;
        background-color: var(--header-bg);
        border-bottom: 2px solid var(--primary-color);
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    header h1 {
        font-size: 1.3rem;
        color: var(--primary-color);
        font-weight: 700;
        text-transform: uppercase;
    }

    /* Container Styles - 1200px max */
    .container {
        max-width: 1200px;
        margin: 70px auto 20px auto;
        padding: 0 20px;
    }

    /* Dynamic Search Section */
    .search-section {
        background: #fff;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        margin-bottom: 30px;
        position: sticky;
        top: 60px;
        z-index: 999;
    }

    .search-container {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    #searchInput {
        flex: 1;
        min-width: 250px;
        padding: 12px 15px;
        border: 2px solid var(--border-color);
        border-radius: 5px;
        font-size: 16px;
        outline: none;
        transition: border-color 0.3s;
    }

    #searchInput:focus {
        border-color: var(--primary-color);
    }

    .btn-clear {
        background-color: #d9534f;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-clear:hover {
        background-color: #c9302c;
    }

    /* Formula Card Grid */
    .formula-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 20px;
    }

    .category-title {
        grid-column: 1 / -1;
        background: var(--primary-color);
        color: white;
        padding: 8px 15px;
        border-radius: 5px;
        margin-top: 15px;
        font-size: 1rem;
    }

    .formula-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        padding: 20px;
        border-radius: 8px;
        transition: all 0.3s ease;
    }

    .formula-card.hidden {
        display: none;
    }

    .formula-card h3 {
        color: var(--primary-color);
        margin-bottom: 12px;
        border-bottom: 1px solid #eee;
        padding-bottom: 5px;
        font-size: 1.1rem;
    }

    .detail-item { margin-bottom: 8px; font-size: 0.9rem; }
    .label { font-weight: bold; color: #555; display: block; margin-bottom: 2px; }
    
    code {
        background: #f8f8f8;
        padding: 4px 8px;
        border-radius: 4px;
        font-family: 'Consolas', 'Monaco', monospace;
        color: #d11141;
        display: block;
        margin-top: 4px;
        border: 1px solid #eee;
    }

    /* Mobile Adjustments */
    @media (max-width: 768px) {
        .container {
            width: 100%;

            margin-top: 50px;

            border-radius: 0;

        .formula-card {
            border-radius: 0;
            border-left: none;
            border-right: none;
        }
        .category-title {
            border-radius: 0;
        }
        .formula-grid {
            grid-template-columns: 1fr;
        }
    }

<header>
    <h1>Excel Count Formulas</h1>

<div class="container">
    <!-- Dynamic Search Bar -->
    <section class="search-section">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search formulas (e.g., 'unique', 'sumproduct', 'countif')..." onkeyup="filterFormulas()">
            <button class="btn-clear" onclick="clearSearch()">Clear History</button>
        </div>
        <div id="searchStatus" style="font-size: 12px; margin-top: 8px; color: #666;"></div>
    </section>

    <div class="formula-grid" id="formulaContainer">
        <!-- Data will be injected here by JavaScript -->
    </div>
</div>

<script>
    const formulas = [
        { cat: "Basic Count Functions", name: "COUNT", purpose: "Counts cells containing numbers.", return: "Number", syntax: "=COUNT(value1, [value2], ...)", example: "Using the SUM function style: =COUNT(A1:A10)" },
        { cat: "Basic Count Functions", name: "COUNTA", purpose: "Counts non-empty cells (text, numbers, errors).", return: "Number", syntax: "=COUNTA(value1, ...)", example: "=COUNTA(B1:B100)" },
        { cat: "Basic Count Functions", name: "COUNTBLANK", purpose: "Counts empty cells in a range.", return: "Number", syntax: "=COUNTBLANK(range)", example: "=COUNTBLANK(C1:C20)" },
        { cat: "Basic Count Functions", name: "COUNTIF", purpose: "Counts cells that meet a single criterion.", return: "Number", syntax: "=COUNTIF(range, criteria)", example: "=COUNTIF(D1:D10, \">50\")" },
        { cat: "Basic Count Functions", name: "COUNTIFS", purpose: "Counts cells that meet multiple criteria.", return: "Number", syntax: "=COUNTIFS(range1, crit1, [range2, crit2], ...)", example: "=COUNTIFS(A1:A10, \"Red\", B1:B10, \">5\")" },
        
        { cat: "Conditional & Logical Count Combinations", name: "COUNTIF + SUM", purpose: "Count multiple specific values using an array constant.", return: "Number", syntax: "=SUM(COUNTIF(range, {\"Val1\",\"Val2\"}))", example: "=SUM(COUNTIF(A1:A10, {\"Closed\",\"Pending\"}))" },
        { cat: "Conditional & Logical Count Combinations", name: "COUNTIF + SUMPRODUCT", purpose: "Advanced counting without Ctrl+Shift+Enter.", return: "Number", syntax: "=SUMPRODUCT(COUNTIF(range, list))", example: "=SUMPRODUCT(COUNTIF(A1:A10, E1:E3))" },
        { cat: "Conditional & Logical Count Combinations", name: "COUNTIFS + SUMPRODUCT", purpose: "Count logic for multiple dynamic ranges.", return: "Number", syntax: "=SUMPRODUCT(COUNTIFS(...))", example: "Using the SUM function logic to aggregate counts." },
        { cat: "Conditional & Logical Count Combinations", name: "COUNTIF + ISNUMBER", purpose: "Count cells based on numeric conditions inside arrays.", return: "Number", syntax: "=SUMPRODUCT(--ISNUMBER(SEARCH(\"text\", range)))", example: "=COUNTIF(A1:A10, \"*\"&B1&\"*\")" },
        { cat: "Conditional & Logical Count Combinations", name: "COUNTIF + MATCH", purpose: "Verify exists and count across lists.", return: "Number", syntax: "=SUMPRODUCT(--(ISNUMBER(MATCH(range1, range2, 0))))", example: "Compare two lists." },
        { cat: "Conditional & Logical Count Combinations", name: "COUNTIFS + IF", purpose: "Logical branching inside counts.", return: "Logical Count", syntax: "=COUNTIFS(range, IF(cond, val1, val2))", example: "Complex conditional reporting." },
        { cat: "Conditional & Logical Count Combinations", name: "COUNTIFS + OR (via array)", purpose: "Count if criteria is A OR B.", return: "Number", syntax: "=SUM(COUNTIFS(range, {\"A\",\"B\"}))", example: "=SUM(COUNTIFS(A:A, {\"North\",\"South\"}))" },
        
        { cat: "Advanced / Dynamic Count Functions", name: "UNIQUE", purpose: "Returns unique values from a range.", return: "Array", syntax: "=UNIQUE(array)", example: "=COUNTA(UNIQUE(A1:A100))" },
        { cat: "Advanced / Dynamic Count Functions", name: "FILTER", purpose: "Filters a range based on criteria.", return: "Array", syntax: "=FILTER(array, include, [if_empty])", example: "=ROWS(FILTER(A1:B10, A1:A10=\"Apples\"))" },
        { cat: "Advanced / Dynamic Count Functions", name: "SORT", purpose: "Sorts a range.", return: "Array", syntax: "=SORT(array)", example: "=SORT(UNIQUE(A1:A10))" },
        { cat: "Advanced / Dynamic Count Functions", name: "SORTBY", purpose: "Sorts range based on another range.", return: "Array", syntax: "=SORTBY(array, by_array)", example: "=SORTBY(A1:A10, B1:B10)" },
        { cat: "Advanced / Dynamic Count Functions", name: "LET", purpose: "Assigns names to calculation results.", return: "Calculated Value", syntax: "=LET(name1, val1, calculation)", example: "=LET(u, UNIQUE(A:A), COUNTA(u))" },
        { cat: "Advanced / Dynamic Count Functions", name: "BYROW", purpose: "Apply LAMBDA to each row.", return: "Array", syntax: "=BYROW(array, lambda)", example: "=BYROW(A1:C10, LAMBDA(row, SUM(row)))" },
        { cat: "Advanced / Dynamic Count Functions", name: "BYCOL", purpose: "Apply LAMBDA to each column.", return: "Array", syntax: "=BYCOL(array, lambda)", example: "=BYCOL(A1:C10, LAMBDA(col, COUNTA(col)))" },
        { cat: "Advanced / Dynamic Count Functions", name: "LAMBDA", purpose: "Create custom reusable functions.", return: "Custom", syntax: "=LAMBDA(param, calculation)", example: "Custom counting logic." },

        { cat: "Count with Text / String Functions", name: "COUNTIF + LEFT", purpose: "Count based on prefix.", return: "Number", syntax: "=COUNTIF(range, \"A*\")", example: "Count starting with 'A'." },
        { cat: "Count with Text / String Functions", name: "COUNTIF + RIGHT", purpose: "Count based on suffix.", return: "Number", syntax: "=COUNTIF(range, \"*Z\")", example: "Count ending with 'Z'." },
        { cat: "Count with Text / String Functions", name: "COUNTIF + MID", purpose: "Count based on string position.", return: "Number", syntax: "=SUMPRODUCT(--(MID(range, 2, 1)=\"X\"))", example: "X as second character." },
        { cat: "Count with Text / String Functions", name: "COUNTIF + FIND", purpose: "Case-sensitive search count.", return: "Number", syntax: "=SUMPRODUCT(--ISNUMBER(FIND(\"Text\", range)))", example: "Find exact match." },
        { cat: "Count with Text / String Functions", name: "COUNTIF + SEARCH", purpose: "Case-insensitive search count.", return: "Number", syntax: "=COUNTIF(range, \"*\"&B1&\"*\")", example: "Wildcard search count." },
        { cat: "Count with Text / String Functions", name: "COUNTIF + LEN", purpose: "Count by character length.", return: "Number", syntax: "=SUMPRODUCT(--(LEN(range)>5))", example: "Count long text entries." },
        { cat: "Count with Text / String Functions", name: "TEXTBEFORE", purpose: "Extract text before delimiter.", return: "String", syntax: "=TEXTBEFORE(text, delimiter)", example: "=COUNTA(TEXTBEFORE(A1:A10, \" \"))" },
        { cat: "Count with Text / String Functions", name: "TEXTAFTER", purpose: "Extract text after delimiter.", return: "String", syntax: "=TEXTAFTER(text, delimiter)", example: "=COUNTA(TEXTAFTER(A1:A10, \"-\"))" },

        { cat: "Count with Array / Advanced Logic", name: "SUMPRODUCT", purpose: "The Swiss Army Knife for counting.", return: "Number", syntax: "=SUMPRODUCT((criteria1)*(criteria2))", example: "Using the SUM function behavior: =SUMPRODUCT((A1:A10=\"Yes\")*1)" },
        { cat: "Count with Array / Advanced Logic", name: "SUMPRODUCT + EXACT", purpose: "Case-sensitive counting.", return: "Number", syntax: "=SUMPRODUCT(--EXACT(\"Target\", range))", example: "Counts 'Excel' but not 'excel'." },
        { cat: "Count with Array / Advanced Logic", name: "SUMPRODUCT + ISNUMBER", purpose: "Count based on numeric validation.", return: "Number", syntax: "=SUMPRODUCT(--ISNUMBER(range))", example: "Verify and count numbers." },
        { cat: "Count with Array / Advanced Logic", name: "SUMPRODUCT + MATCH", purpose: "Count matching items across two arrays.", return: "Number", syntax: "=SUMPRODUCT(--ISNUMBER(MATCH(range, list, 0)))", example: "Cross-reference lists." },
        { cat: "Count with Array / Advanced Logic", name: "SUMPRODUCT + LEN", purpose: "Sum character counts.", return: "Number", syntax: "=SUMPRODUCT(LEN(range))", example: "Total characters in range." },

        { cat: "Specialized Counting Techniques", name: "COUNT UNIQUE", purpose: "Count unique items only (UNIQUE + COUNTA).", return: "Number", syntax: "=COUNTA(UNIQUE(range))", example: "Modern 365 method." },
        { cat: "Specialized Counting Techniques", name: "COUNT DUPLICATES", purpose: "Identify non-unique items (COUNTIF).", return: "Number", syntax: "=SUMPRODUCT(--(COUNTIF(range, range)>1))", example: "Count redundant data." },
        { cat: "Specialized Counting Techniques", name: "COUNT DISTINCT", purpose: "Traditional unique count method.", return: "Number", syntax: "=SUMPRODUCT(1/COUNTIF(range, range))", example: "Old-school array method." },
        { cat: "Specialized Counting Techniques", name: "COUNT WITH MULTIPLE CRITERIA", purpose: "Complex condition counting (COUNTIFS).", return: "Number", syntax: "=COUNTIFS(R1, C1, R2, C2)", example: "Date and Category count." },
        { cat: "Specialized Counting Techniques", name: "COUNT VISIBLE CELLS", purpose: "Count only seen cells (SUBTOTAL).", return: "Number", syntax: "=SUBTOTAL(3, range)", example: "Ignores hidden rows." },
        { cat: "Specialized Counting Techniques", name: "COUNT FILTERED DATA", purpose: "Advanced filtered list counting (AGGREGATE).", return: "Number", syntax: "=AGGREGATE(3, 5, range)", example: "Skips hidden rows and errors." }
    ];

    function init() {
        renderFormulas(formulas);
        const savedSearch = localStorage.getItem('excelSearchTerm');
        if (savedSearch) {
            document.getElementById('searchInput').value = savedSearch;
            filterFormulas();
        }
    }

    function renderFormulas(data) {
        const container = document.getElementById('formulaContainer');
        container.innerHTML = '';
        
        let currentCat = '';
        data.forEach((item, index) => {
            if (item.cat !== currentCat) {
                currentCat = item.cat;
                const catTitle = document.createElement('h2');
                catTitle.className = 'category-title';
                catTitle.innerText = currentCat;
                container.appendChild(catTitle);
            }

            const card = document.createElement('div');
            card.className = 'formula-card';
            card.setAttribute('data-name', item.name.toLowerCase());
            card.setAttribute('data-cat', item.cat.toLowerCase());
            card.setAttribute('data-purpose', item.purpose.toLowerCase());
            
            card.innerHTML = `
                <h3>${item.name}</h3>
                <div class="detail-item"><span class="label">Purpose:</span> ${item.purpose}</div>
                <div class="detail-item"><span class="label">Return Value:</span> ${item.return}</div>
                <div class="detail-item"><span class="label">Syntax:</span> <code>${item.syntax}</code></div>
                <div class="detail-item"><span class="label">Example:</span> ${item.example}</div>
            `;
            container.appendChild(card);
        });
    }

    function filterFormulas() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        localStorage.setItem('excelSearchTerm', query);
        
        const cards = document.querySelectorAll('.formula-card');
        const titles = document.querySelectorAll('.category-title');
        let visibleCount = 0;

        cards.forEach(card => {
            const name = card.getAttribute('data-name');
            const cat = card.getAttribute('data-cat');
            const purpose = card.getAttribute('data-purpose');

            if (name.includes(query) || cat.includes(query) || purpose.includes(query)) {
                card.classList.remove('hidden');
                visibleCount++;
            } else {
                card.classList.add('hidden');
            }
        });

        // Hide titles if no cards under them are visible
        titles.forEach(title => {
            let next = title.nextElementSibling;
            let hasVisible = false;
            while (next && next.classList.contains('formula-card')) {
                if (!next.classList.contains('hidden')) {
                    hasVisible = true;
                    break;
                }
                next = next.nextElementSibling;
            }
            title.style.display = hasVisible ? 'block' : 'none';
        });

        document.getElementById('searchStatus').innerText = query ? `Found ${visibleCount} matches.` : '';
    }

    function clearSearch() {
        localStorage.removeItem('excelSearchTerm');
        document.getElementById('searchInput').value = '';
        filterFormulas();
        document.getElementById('searchStatus').innerText = "History cleared.";
        setTimeout(() => document.getElementById('searchStatus').innerText = "", 2000);
    }

    // Initialize on load
    window.onload = init;
</script>
