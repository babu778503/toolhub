    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #1abc9c;
            --bg-color: #f4f6f7;
            --text-color: #34495e;
            --header-height: 50px;
            --container-width: 1200px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Header Styling */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        /* Card Design */
        .tool-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Input Section */
        .input-section {
            padding: 30px;
            border-bottom: 1px solid #ecf0f1;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--primary-color);
        }

        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #fff;
        }

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        /* Buttons */
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: flex-end;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: translateY(1px);
        }

        .btn-calc {
            background-color: var(--secondary-color);
            color: white;
            flex: 2;
        }

        .btn-calc:hover {
            background-color: #2980b9;
        }

        .btn-clear {
            background-color: #ecf0f1;
            color: var(--text-color);
            border: 1px solid #bdc3c7;
            flex: 1;
        }

        .btn-clear:hover {
            background-color: #bdc3c7;
        }

        /* Result Section */
        .result-section {
            padding: 30px;
            background-color: #fff;
            display: none; /* Hidden by default */
        }

        .summary-box {
            display: flex;
            justify-content: space-around;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .summary-item {
            text-align: center;
        }

        .summary-label {
            font-size: 0.85rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .summary-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        /* Table Styling */
        .table-responsive {
            overflow-x: auto;
            border-radius: 6px;
            border: 1px solid #ecf0f1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px; /* Ensure table doesn't squash too much */
        }

        th, td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid #ecf0f1;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            font-weight: 500;
            text-align: center;
        }

        td:first-child, th:first-child {
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        /* Mobile Specifics */
        @media screen and (max-width: 768px) {
            /* Remove blank space on mobile */
            .container {
                padding: 0;
                margin: 0;
                max-width: 100%;
            }

            .tool-card {
                border-radius: 0;
                box-shadow: none;
            }

            .input-section {
                padding: 20px;
            }

            .result-section {
                padding: 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column-reverse;
            }

            button {
                width: 100%;
            }
            
            /* Prevent input zoom */
            input, select {
                font-size: 16px; 
            }
            
            .summary-box {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Depreciation Calculator</h1>
    </header>

    <div class="container">
        <div class="tool-card">
            
            <!-- Input Area -->
            <div class="input-section">
                <form id="depForm" onsubmit="return false;">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="assetCost">Asset Cost ($)</label>
                            <input type="number" id="assetCost" placeholder="e.g. 50000" min="0" step="0.01" required>
                        </div>

                        <div class="form-group">
                            <label for="salvageValue">Salvage Value ($)</label>
                            <input type="number" id="salvageValue" placeholder="e.g. 5000" min="0" step="0.01" required>
                        </div>

                        <div class="form-group">
                            <label for="usefulLife">Useful Life (Years)</label>
                            <input type="number" id="usefulLife" placeholder="e.g. 5" min="1" step="1" required>
                        </div>

                        <div class="form-group">
                            <label for="method">Depreciation Method</label>
                            <select id="method">
                                <option value="SL">Straight Line</option>
                                <option value="DDB">Double Declining Balance</option>
                                <option value="SYD">Sum of Years' Digits</option>
                            </select>
                        </div>
                    </div>

                    <div class="controls">
                        <button type="button" class="btn-clear" id="clearBtn">Clear Data</button>
                        <button type="submit" class="btn-calc" id="calcBtn">Calculate Schedule</button>
                    </div>
                </form>
            </div>

            <!-- Result Area -->
            <div class="result-section" id="resultSection">
                <div class="summary-box">
                    <div class="summary-item">
                        <div class="summary-label">Depreciable Base</div>
                        <div class="summary-value" id="resBase">$0.00</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">First Year Expense</div>
                        <div class="summary-value" id="resFirstYear">$0.00</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Total Depreciation</div>
                        <div class="summary-value" id="resTotal">$0.00</div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Year</th>
                                <th>Start Book Value</th>
                                <th>Depreciation Expense</th>
                                <th>Ending Book Value</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleBody">
                            <!-- Rows generated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // DOM Elements
        const els = {
            cost: document.getElementById('assetCost'),
            salvage: document.getElementById('salvageValue'),
            life: document.getElementById('usefulLife'),
            method: document.getElementById('method'),
            calcBtn: document.getElementById('calcBtn'),
            clearBtn: document.getElementById('clearBtn'),
            resultSection: document.getElementById('resultSection'),
            tbody: document.getElementById('scheduleBody'),
            resBase: document.getElementById('resBase'),
            resFirstYear: document.getElementById('resFirstYear'),
            resTotal: document.getElementById('resTotal')
        };

        const STORAGE_KEY = 'toolshub365_depreciation_data';

        // Initialization
        window.addEventListener('load', () => {
            loadData();
            // Attach auto-save listener to inputs
            [els.cost, els.salvage, els.life, els.method].forEach(input => {
                input.addEventListener('input', saveData);
                input.addEventListener('change', saveData);
            });
        });

        els.calcBtn.addEventListener('click', calculateDepreciation);
        els.clearBtn.addEventListener('click', clearData);

        // Core Calculation Logic
        function calculateDepreciation() {
            const cost = parseFloat(els.cost.value);
            const salvage = parseFloat(els.salvage.value) || 0;
            const life = parseInt(els.life.value);
            const method = els.method.value;

            // Validation
            if (isNaN(cost) || cost <= 0 || isNaN(life) || life < 1) {
                alert("Please enter valid positive numbers for Cost and Useful Life.");
                return;
            }

            if (salvage >= cost) {
                alert("Salvage value must be less than Asset Cost.");
                return;
            }

            let schedule = [];
            let currentBookValue = cost;
            let totalDepreciation = 0;
            const depreciableBase = cost - salvage;

            els.tbody.innerHTML = ''; // Clear previous table

            for (let year = 1; year <= life; year++) {
                let expense = 0;

                // 1. Straight Line Method
                if (method === 'SL') {
                    expense = depreciableBase / life;
                } 
                
                // 2. Double Declining Balance
                else if (method === 'DDB') {
                    const rate = 2 / life;
                    expense = currentBookValue * rate;
                    // Cap depreciation so book value doesn't go below salvage
                    if ((currentBookValue - expense) < salvage) {
                        expense = currentBookValue - salvage;
                    }
                } 
                
                // 3. Sum of Years' Digits
                else if (method === 'SYD') {
                    const sumOfDigits = (life * (life + 1)) / 2;
                    const remainingLife = life - year + 1;
                    expense = depreciableBase * (remainingLife / sumOfDigits);
                }

                // Final safety check for rounding errors
                if (expense < 0) expense = 0;
                
                const startValue = currentBookValue;
                currentBookValue -= expense;
                totalDepreciation += expense;

                schedule.push({
                    year,
                    start: startValue,
                    expense,
                    end: currentBookValue
                });
            }

            // Render Table
            schedule.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.year}</td>
                    <td>${formatMoney(row.start)}</td>
                    <td style="color: var(--secondary-color); font-weight:600;">${formatMoney(row.expense)}</td>
                    <td>${formatMoney(row.end)}</td>
                `;
                els.tbody.appendChild(tr);
            });

            // Update Summary
            els.resBase.textContent = formatMoney(depreciableBase);
            els.resFirstYear.textContent = formatMoney(schedule[0].expense);
            els.resTotal.textContent = formatMoney(totalDepreciation);

            // Show Results
            els.resultSection.style.display = 'block';
            
            saveData();
        }

        // Helper: Money Formatter
        function formatMoney(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount);
        }

        // Auto-Save Functions
        function saveData() {
            const data = {
                cost: els.cost.value,
                salvage: els.salvage.value,
                life: els.life.value,
                method: els.method.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                if (data.cost) els.cost.value = data.cost;
                if (data.salvage) els.salvage.value = data.salvage;
                if (data.life) els.life.value = data.life;
                if (data.method) els.method.value = data.method;
            }
        }

        function clearData() {
            // Clear inputs
            els.cost.value = '';
            els.salvage.value = '';
            els.life.value = '';
            els.method.value = 'SL';
            
            // Hide results
            els.resultSection.style.display = 'none';
            els.tbody.innerHTML = '';
            
            // Clear storage
            localStorage.removeItem(STORAGE_KEY);
        }
    </script>
</body>
</html>
