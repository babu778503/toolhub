<!DOCTYPE html>
<!-- Category: Math Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO & Technical Metadata -->
    <title>Average Calculator</title>
    <meta name="description" content="Free online Average Calculator by toolshub365.com. Calculate the mean, sum, count, and median of a data set instantly with automatic data saving.">
    <meta name="keywords" content="Average Calculator, Mean Calculator, Arithmetic Mean, Math Tool, Statistics Calculator, toolshub365, Average Finder">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/average-calculator">
    
    <!-- JSON-LD for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Average Calculator",
      "operatingSystem": "Any",
      "applicationCategory": "MathApplication",
      "offer": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "A responsive mathematical tool to calculate the average (arithmetic mean), sum, and count of a series of numbers."
    }
    </script>

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #2980b9; /* Strong Blue */
            --primary-hover: #1abc9c;
            --header-bg: #2c3e50;
            --header-text: #ffffff;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #bdc3c7;
            --input-bg: #fdfdfd;
            --result-bg: #dff9fb;
            --result-border: #2980b9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Space for fixed header */
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Calculator Card */
        .calculator-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            padding: 30px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Input Section */
        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-color);
            font-size: 1rem;
        }

        .helper-text {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 10px;
            font-style: italic;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.1rem;
            background-color: var(--input-bg);
            resize: vertical;
            transition: all 0.3s ease;
            color: var(--text-color);
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(41, 128, 185, 0.15);
        }

        /* Buttons */
        .btn-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
            flex: 2; /* Bigger calculate button */
        }

        .btn-calc:hover {
            background-color: #2573a7;
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
            flex: 1;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        /* Result Area */
        .result-box {
            margin-top: 30px;
            display: none; /* Hidden by default */
            animation: fadeIn 0.3s ease-out;
        }

        .main-result {
            background-color: var(--result-bg);
            border-left: 6px solid var(--result-border);
            padding: 20px;
            border-radius: 4px;
            text-align: center;
            margin-bottom: 20px;
        }

        .result-label {
            font-size: 1rem;
            color: #555;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .result-value {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary-color);
            margin: 5px 0;
            line-height: 1;
        }

        /* Grid for details */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: #f8f9fa;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-name {
            display: block;
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .stat-val {
            font-size: 1.25rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .error-msg {
            color: #c0392b;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
            display: none;
            background: #fadbd8;
            padding: 10px;
            border-radius: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;
                padding: 0; /* Remove blank space on sides */
                margin: 0;
            }

            .calculator-card {
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
                border: none;
                min-height: calc(100vh - 50px);
                padding: 25px 20px;
                display: flex;
                flex-direction: column;
            }

            .btn-controls {
                flex-direction: column;
            }
            
            .stats-grid {
                grid-template-columns: 1fr; /* Stack detailed stats */
            }

            .result-value {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        Average Calculator
    </header>

    <div class="container">
        <div class="calculator-card">
            
            <div class="input-group">
                <label for="inputData">Enter Numbers</label>
                <div class="helper-text">Enter numbers separated by commas, spaces, or new lines.</div>
                <textarea id="inputData" placeholder="Example: 10, 20, 30, 40..." oninput="autoSave()"></textarea>
            </div>

            <div class="error-msg" id="errorDisplay">Please enter valid numbers.</div>

            <div class="btn-controls">
                <button class="btn-calc" onclick="calculateAverage()">Calculate Average</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div class="result-box" id="resultBox">
                <!-- Main Result -->
                <div class="main-result">
                    <div class="result-label">Average (Mean)</div>
                    <div class="result-value" id="resAverage">0</div>
                </div>

                <!-- Detailed Stats -->
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-name">Sum</span>
                        <span class="stat-val" id="resSum">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-name">Count (n)</span>
                        <span class="stat-val" id="resCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-name">Median</span>
                        <span class="stat-val" id="resMedian">0</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const STORAGE_KEY = 'toolshub365_avg_calc';
        
        // DOM Elements
        const elInput = document.getElementById('inputData');
        const elResultBox = document.getElementById('resultBox');
        const elAverage = document.getElementById('resAverage');
        const elSum = document.getElementById('resSum');
        const elCount = document.getElementById('resCount');
        const elMedian = document.getElementById('resMedian');
        const elError = document.getElementById('errorDisplay');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        function calculateAverage() {
            const rawText = elInput.value;
            // Split by comma, space, newline, or tab
            const tokens = rawText.split(/[,\s\n\t]+/);
            
            // Filter valid numbers
            const numbers = tokens
                .filter(token => token.trim() !== '' && !isNaN(Number(token)))
                .map(Number);

            // Validation
            if (numbers.length === 0) {
                showError("Please enter at least one valid number.");
                return;
            }

            elError.style.display = 'none';

            // Calculations
            const count = numbers.length;
            const sum = numbers.reduce((a, b) => a + b, 0);
            const average = sum / count;

            // Median Calculation
            numbers.sort((a, b) => a - b);
            let median;
            const mid = Math.floor(count / 2);
            if (count % 2 !== 0) {
                median = numbers[mid];
            } else {
                median = (numbers[mid - 1] + numbers[mid]) / 2;
            }

            // Display Results
            elAverage.innerText = formatNumber(average);
            elSum.innerText = formatNumber(sum);
            elCount.innerText = count;
            elMedian.innerText = formatNumber(median);

            elResultBox.style.display = 'block';
            
            // Save state (calculated)
            saveData(true);
        }

        function formatNumber(num) {
            // Avoid excessively long decimals
            if (Number.isInteger(num)) return num;
            // If it has many decimals, limit to 6
            return parseFloat(num.toFixed(6));
        }

        function showError(msg) {
            elError.innerText = msg;
            elError.style.display = 'block';
            elResultBox.style.display = 'none';
        }

        // --- Local Storage Functions ---

        function autoSave() {
            // Save as typing, do not flag result as visible yet (avoids flickering/premature calc)
            saveData(false);
            // Hide errors while typing
            elError.style.display = 'none';
        }

        function saveData(showResult = false) {
            const data = {
                input: elInput.value,
                hasResult: showResult || (elResultBox.style.display === 'block')
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.input !== undefined) elInput.value = data.input;
                    
                    if (data.hasResult && data.input) {
                        calculateAverage();
                    }
                } catch (e) {
                    console.error("Error loading data");
                }
            }
        }

        function clearData() {
            if(confirm("Are you sure you want to clear all data?")) {
                localStorage.removeItem(STORAGE_KEY);
                elInput.value = '';
                elResultBox.style.display = 'none';
                elError.style.display = 'none';
            }
        }
    </script>
</body>
</html>
