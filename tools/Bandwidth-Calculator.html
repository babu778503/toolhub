<!DOCTYPE html>
<!-- Category: Other Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandwidth Calculator</title>

    <!-- SEO & AI Crawler Optimization -->
    <meta name="description" content="Free online Bandwidth Calculator to estimate file download/upload time, network data transfer usage, and required internet speeds.">
    <meta name="keywords" content="Bandwidth Calculator, file transfer time calculator, download speed calculator, network bandwidth estimator, upload time calculator, data transfer calculator">

    <meta name="robots" content="index, follow">

    <meta property="og:title" content="Bandwidth Calculator">
    <meta property="og:description" content="Calculate file transfer times, required bandwidth speeds, and data usage efficiently with this auto-saving networking tool.">
    <meta property="og:url" content="https://toolshub365.com/bandwidth-calculator">
    <meta property="og:type" content="website">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://toolshub365.com/bandwidth-calculator">

    <!-- Schema.org Markup for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Bandwidth Calculator",
      "url": "https://toolshub365.com/bandwidth-calculator",

      "applicationCategory": "CalculatorApplication",
      "operatingSystem": "All",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <style>
        /* CSS Variables */
        :root {
            --primary-color: #1e3799;
            --primary-dark: #0c2461;
            --secondary-color: #4a69bd;
            --accent-color: #e58e26;
            --bg-color: #f1f2f6;
            --box-bg: #ffffff;
            --text-color: #2f3542;
            --border-color: #ced6e0;
        }

        /* Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Clears fixed header */
        }

        /* Header (Fixed 50px height) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: var(--primary-color);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Desktop Container */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            background: var(--box-bg);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 30px;
        }

        /* Layout Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* Form Elements */
        .section-title {
            font-size: 18px;
            color: var(--primary-dark);
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--border-color);
            font-weight: 600;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-direction: column;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #555;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 2;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-group select, .full-width-select {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 16px;
            outline: none;
            background-color: #fff;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .full-width-select {
            width: 100%;
        }

        .input-group input:focus, .input-group select:focus, .full-width-select:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 2px rgba(74, 105, 189, 0.2);
        }

        /* Dynamic Sections */
        .dynamic-section {
            display: none;
        }
        .dynamic-section.active {
            display: block;
        }

        /* Buttons */
        .btn-clear {
            width: 100%;
            padding: 14px;
            background-color: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        /* Results Section */
        .results-box {
            background: #f8f9fc;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            padding: 25px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .result-main {
            text-align: center;
            margin: 20px 0;
            padding: 30px 20px;
            background-color: #fff;
            border-radius: 8px;
            border: 2px solid var(--primary-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-main h3 {
            font-size: 16px;
            color: #7f8fa6;
            margin-bottom: 15px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-dark);
            margin-bottom: 10px;
            word-break: break-word;
        }

        .result-sub {
            font-size: 16px;
            color: var(--accent-color);
            font-weight: 500;
            margin-top: 10px;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .container {
                max-width: 100%;
                margin: 0;
                padding: 20px 0; /* Removes both side blank space visually outside container */
                border-radius: 0;
                box-shadow: none;
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .inner-padding {
                padding: 0 15px; /* Keeps text from touching edge inside */
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Bandwidth Calculator</h1>
    </header>

    <div class="container">
        <div class="grid">
            
            <!-- Input Section -->
            <div class="inner-padding">
                <div class="section-title">Configuration</div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="calcMode">What do you want to calculate?</label>
                        <select id="calcMode" class="full-width-select">
                            <option value="time">Download / Upload Time</option>
                            <option value="data">Data Transferred (Usage)</option>
                            <option value="speed">Required Bandwidth Speed</option>
                        </select>
                    </div>
                </div>

                <!-- Input: File / Data Size -->
                <div class="form-row dynamic-section" id="secSize">
                    <div class="form-group">
                        <label for="valSize">File / Data Size</label>
                        <div class="input-group">
                            <input type="number" id="valSize" placeholder="e.g. 10" min="0" step="any">
                            <select id="unitSize">
                                <option value="1">Bytes (B)</option>
                                <option value="1024">Kilobytes (KB)</option>
                                <option value="1048576" selected>Megabytes (MB)</option>
                                <option value="1073741824">Gigabytes (GB)</option>
                                <option value="1099511627776">Terabytes (TB)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Input: Bandwidth Speed -->
                <div class="form-row dynamic-section" id="secSpeed">
                    <div class="form-group">
                        <label for="valSpeed">Bandwidth Speed</label>
                        <div class="input-group">
                            <input type="number" id="valSpeed" placeholder="e.g. 50" min="0" step="any">
                            <select id="unitSpeed">
                                <option value="1000">Kbps (Kilobits/s)</option>
                                <option value="1000000" selected>Mbps (Megabits/s)</option>
                                <option value="1000000000">Gbps (Gigabits/s)</option>
                                <option value="8192">KB/s (Kilobytes/s)</option>
                                <option value="8388608">MB/s (Megabytes/s)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Input: Time / Duration -->
                <div class="form-row dynamic-section" id="secTime">
                    <div class="form-group">
                        <label for="valTime">Transfer Time / Duration</label>
                        <div class="input-group">
                            <input type="number" id="valTime" placeholder="e.g. 60" min="0" step="any">
                            <select id="unitTime">
                                <option value="1">Seconds</option>
                                <option value="60" selected>Minutes</option>
                                <option value="3600">Hours</option>
                                <option value="86400">Days</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button class="btn-clear" id="clearBtn">Clear Data</button>
            </div>

            <!-- Result Section -->
            <div class="inner-padding">
                <div class="results-box">
                    <div class="section-title">Calculation Result</div>
                    
                    <div class="result-main">
                        <h3 id="resTitle">Estimated Time</h3>
                        <div class="result-value" id="resValue">00:00:00</div>
                        <div class="result-sub" id="resSub">Awaiting Input...</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- JavaScript for Functionality and Auto-Save -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const calcMode = document.getElementById("calcMode");
            const inputs = document.querySelectorAll("input, select");
            
            // Sections
            const secSize = document.getElementById("secSize");
            const secSpeed = document.getElementById("secSpeed");
            const secTime = document.getElementById("secTime");

            // Update UI based on mode
            function updateVisibility() {
                const mode = calcMode.value;
                secSize.classList.remove("active");
                secSpeed.classList.remove("active");
                secTime.classList.remove("active");

                if (mode === "time") {
                    secSize.classList.add("active");
                    secSpeed.classList.add("active");
                    document.getElementById("resTitle").innerText = "Estimated Transfer Time";
                } else if (mode === "data") {
                    secSpeed.classList.add("active");
                    secTime.classList.add("active");
                    document.getElementById("resTitle").innerText = "Total Data Transferred";
                } else if (mode === "speed") {
                    secSize.classList.add("active");
                    secTime.classList.add("active");
                    document.getElementById("resTitle").innerText = "Required Bandwidth Speed";
                }
                calculate();
            }

            // Load saved data and initialize
            loadData();
            updateVisibility();

            // Event Listeners for auto-save and real-time calculation
            inputs.forEach(el => {
                el.addEventListener("input", () => {
                    if(el.id === "calcMode") {
                        updateVisibility();
                    }
                    saveData();
                    calculate();
                });
            });

            // Clear Data Button Logic
            document.getElementById("clearBtn").addEventListener("click", () => {
                if(confirm("Are you sure you want to clear all data?")) {
                    clearData();
                }
            });
        });

        // Format Seconds to dd:hh:mm:ss string
        function formatTime(totalSeconds) {
            if (!isFinite(totalSeconds) || totalSeconds < 0) return "0 Seconds";
            if (totalSeconds === 0) return "0 Seconds";

            const days = Math.floor(totalSeconds / 86400);
            totalSeconds %= 86400;
            const hours = Math.floor(totalSeconds / 3600);
            totalSeconds %= 3600;
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = (totalSeconds % 60).toFixed(2); // Keep 2 decimals for precision

            let result =[];
            if (days > 0) result.push(`${days} Days`);
            if (hours > 0) result.push(`${hours} Hours`);
            if (minutes > 0) result.push(`${minutes} Mins`);
            if (seconds > 0 || result.length === 0) result.push(`${seconds} Secs`);

            return result.join(", ");
        }

        // Format Bytes to human readable Size
        function formatBytes(bytes) {
            if (!isFinite(bytes) || bytes === 0) return "0 Bytes";
            const k = 1024;
            const sizes =['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Format bps to human readable Speed
        function formatSpeed(bps) {
            if (!isFinite(bps) || bps === 0) return "0 bps";
            
            // We usually represent speed in bits per second (Kbps, Mbps, Gbps) base 1000
            const k = 1000;
            const sizes =['bps', 'Kbps', 'Mbps', 'Gbps', 'Tbps'];
            const i = Math.floor(Math.log(bps) / Math.log(k));
            
            // Also provide equivalent in MB/s (base 1024)
            const bytesPerSec = bps / 8;
            const MBps = bytesPerSec / (1024 * 1024);

            const primary = parseFloat((bps / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            const secondary = `(~${MBps.toFixed(2)} MB/s)`;
            
            return { primary, secondary };
        }

        function calculate() {
            const mode = document.getElementById("calcMode").value;
            
            // Get raw input values
            const valSize = parseFloat(document.getElementById("valSize").value) || 0;
            const unitSize = parseFloat(document.getElementById("unitSize").value);
            
            const valSpeed = parseFloat(document.getElementById("valSpeed").value) || 0;
            const unitSpeed = parseFloat(document.getElementById("unitSpeed").value);
            
            const valTime = parseFloat(document.getElementById("valTime").value) || 0;
            const unitTime = parseFloat(document.getElementById("unitTime").value);

            const resValue = document.getElementById("resValue");
            const resSub = document.getElementById("resSub");

            // Convert to standard units: Size in Bytes, Speed in bps, Time in seconds
            const sizeInBytes = valSize * unitSize;
            const speedInBps = valSpeed * unitSpeed;
            const timeInSeconds = valTime * unitTime;

            if (mode === "time") {
                if (speedInBps > 0 && sizeInBytes > 0) {
                    const totalBits = sizeInBytes * 8;
                    const calcSeconds = totalBits / speedInBps;
                    resValue.innerText = formatTime(calcSeconds);
                    resSub.innerText = `Based on a constant speed of ${formatSpeed(speedInBps).primary}`;
                } else {
                    resValue.innerText = "--";
                    resSub.innerText = "Please enter valid size and speed.";
                }
            } 
            else if (mode === "data") {
                if (speedInBps > 0 && timeInSeconds > 0) {
                    const totalBits = speedInBps * timeInSeconds;
                    const calcBytes = totalBits / 8;
                    resValue.innerText = formatBytes(calcBytes);
                    resSub.innerText = `In ${formatTime(timeInSeconds)}`;
                } else {
                    resValue.innerText = "--";
                    resSub.innerText = "Please enter valid speed and time.";
                }
            } 
            else if (mode === "speed") {
                if (sizeInBytes > 0 && timeInSeconds > 0) {
                    const totalBits = sizeInBytes * 8;
                    const calcBps = totalBits / timeInSeconds;
                    const speedFmt = formatSpeed(calcBps);
                    resValue.innerText = speedFmt.primary;
                    resSub.innerText = speedFmt.secondary;
                } else {
                    resValue.innerText = "--";
                    resSub.innerText = "Please enter valid size and time.";
                }
            }
        }

        function saveData() {
            const data = {
                calcMode: document.getElementById("calcMode").value,
                valSize: document.getElementById("valSize").value,
                unitSize: document.getElementById("unitSize").value,
                valSpeed: document.getElementById("valSpeed").value,
                unitSpeed: document.getElementById("unitSpeed").value,
                valTime: document.getElementById("valTime").value,
                unitTime: document.getElementById("unitTime").value
            };
            localStorage.setItem("bandwidthCalcData", JSON.stringify(data));
        }

        function loadData() {
            const data = JSON.parse(localStorage.getItem("bandwidthCalcData"));
            if (data) {
                if(data.calcMode) document.getElementById("calcMode").value = data.calcMode;
                if(data.valSize !== undefined) document.getElementById("valSize").value = data.valSize;
                if(data.unitSize) document.getElementById("unitSize").value = data.unitSize;
                if(data.valSpeed !== undefined) document.getElementById("valSpeed").value = data.valSpeed;
                if(data.unitSpeed) document.getElementById("unitSpeed").value = data.unitSpeed;
                if(data.valTime !== undefined) document.getElementById("valTime").value = data.valTime;
                if(data.unitTime) document.getElementById("unitTime").value = data.unitTime;
            }
        }

        function clearData() {
            localStorage.removeItem("bandwidthCalcData");
            
            // Reset to defaults
            document.getElementById("calcMode").value = "time";
            
            document.getElementById("valSize").value = "";
            document.getElementById("unitSize").value = "1048576"; // MB
            
            document.getElementById("valSpeed").value = "";
            document.getElementById("unitSpeed").value = "1000000"; // Mbps
            
            document.getElementById("valTime").value = "";
            document.getElementById("unitTime").value = "60"; // Minutes

            // Manually trigger visual updates
            const calcMode = document.getElementById("calcMode");
            calcMode.dispatchEvent(new Event('change'));
            
            // Call change to force active views
            const event = new Event('input');
            calcMode.dispatchEvent(event);
        }
    </script>
</body>
</html>
