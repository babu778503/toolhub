<!DOCTYPE html>
<!-- Category: Math Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="keywords" content="Greatest Common Factor Calculator, GCF Calculator, GCD Calculator, Greatest Common Divisor, Highest Common Factor, HCF Calculator, Math Tool, toolshub365">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/greatest-common-factor-calculator">
    
    <!-- JSON-LD for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #e67e22; /* Orange for GCF */
            --primary-hover: #d35400;
            --header-bg: #2d3436;
            --header-text: #ffffff;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #dfe6e9;
            --input-bg: #fdfdfd;
            --result-bg: #fff3e0;
            --result-border: #e67e22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Space for fixed header */
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Calculator Card */
        .calculator-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 700px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            padding: 30px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Input Section */
        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-color);
            font-size: 1rem;
        }

        .helper-text {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 10px;
            font-style: italic;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.2rem;
            background-color: var(--input-bg);
            resize: vertical;
            transition: all 0.3s ease;
            color: var(--text-color);
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.15);
        }

        /* Buttons */
        .btn-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
        }

        .btn-clear {
            background-color: #bdc3c7;
            color: #2c3e50;
        }

        .btn-clear:hover {
            background-color: #a0a6ab;
        }

        /* Result Area */
        .result-box {
            margin-top: 30px;
            padding: 25px;
            background-color: var(--result-bg);
            border-left: 6px solid var(--result-border);
            border-radius: 4px;
            display: none; /* Hidden by default */
            animation: fadeIn 0.3s ease-out;
            text-align: center;
        }

        .result-label {
            font-size: 1rem;
            color: #e67e22; /* Darker orange */
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .result-value {
            font-size: 3rem;
            font-weight: 800;
            color: #d35400;
            margin: 10px 0;
            line-height: 1;
        }

        .data-summary {
            font-size: 0.9rem;
            color: #666;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed rgba(0,0,0,0.1);
        }

        .error-msg {
            color: #c0392b;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
            display: none;
            background: #fadbd8;
            padding: 10px;
            border-radius: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;
                padding: 0; /* Remove blank space on sides as requested */
                margin: 0;
            }

            .calculator-card {
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
                border: none;
                min-height: calc(100vh - 50px);
                padding: 25px 20px;
                display: flex;
                flex-direction: column;
            }

            .btn-controls {
                flex-direction: column;
            }

            textarea {
                height: 100px;
            }

            .result-value {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        Greatest Common Factor Calculator
    </header>

    <div class="container">
        <div class="calculator-card">
            
            <div class="input-group">
                <label for="inputNumbers">Enter Numbers</label>
                <div class="helper-text">Separate numbers with commas, spaces, or new lines (e.g., 24, 36, 48)</div>
                <textarea id="inputNumbers" placeholder="Enter your numbers here..." oninput="autoSave()"></textarea>
            </div>

            <div class="error-msg" id="errorDisplay">Please enter at least two valid numbers.</div>

            <div class="btn-controls">
                <button class="btn-calc" onclick="calculateGCF()">Calculate GCF</button>
                <button class="btn-clear" onclick="clearData()">Clear</button>
            </div>

            <div class="result-box" id="resultBox">
                <div class="result-label">Greatest Common Factor (GCF)</div>
                <div class="result-value" id="resultValue">0</div>
                
                <div class="data-summary">
                    <span id="resultCount">0</span> numbers processed.<br>
                    <span id="sortedInput" style="font-family: monospace; color: #555;"></span>
                </div>
            </div>

        </div>
    </div>

    <script>
        const STORAGE_KEY = 'toolshub365_gcf_calc';
        
        // DOM Elements
        const elInput = document.getElementById('inputNumbers');
        const elResultBox = document.getElementById('resultBox');
        const elResultValue = document.getElementById('resultValue');
        const elResultCount = document.getElementById('resultCount');
        const elSortedInput = document.getElementById('sortedInput');
        const elError = document.getElementById('errorDisplay');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // Euclidean Algorithm for GCD of two numbers
        function gcdTwo(a, b) {
            a = Math.abs(a);
            b = Math.abs(b);
            while (b) {
                let temp = b;
                b = a % b;
                a = temp;
            }
            return a;
        }

        function calculateGCF() {
            const rawText = elInput.value;
            // Split by comma, space, newline, or tab
            const tokens = rawText.split(/[,\s\n\t]+/);
            
            // Filter valid integer numbers
            const numbers = tokens
                .filter(token => token.trim() !== '' && !isNaN(Number(token)))
                .map(token => Math.abs(parseInt(token, 10))); // Use absolute values for GCF

            // Validation
            if (numbers.length < 2) {
                showError("Please enter at least two valid integers.");
                return;
            }

            elError.style.display = 'none';

            // Calculate GCF for the array
            // GCF(a, b, c) = GCF(GCF(a, b), c)
            let result = numbers[0];
            for (let i = 1; i < numbers.length; i++) {
                result = gcdTwo(result, numbers[i]);
                if (result === 1) break; // Optimization: if GCF reaches 1, it won't get higher
            }

            // Display Results
            elResultValue.innerText = result;
            elResultCount.innerText = numbers.length;
            
            // Show sorted input for verification (limit length for UI)
            const sorted = numbers.sort((a,b) => a-b);
            if(sorted.length > 20) {
                elSortedInput.innerText = `Set: { ${sorted.slice(0, 20).join(', ')} ... }`;
            } else {
                elSortedInput.innerText = `Set: { ${sorted.join(', ')} }`;
            }

            elResultBox.style.display = 'block';
            
            // Save state (calculated)
            saveData(true);
        }

        function showError(msg) {
            elError.innerText = msg;
            elError.style.display = 'block';
            elResultBox.style.display = 'none';
        }

        // --- Local Storage Functions ---

        function autoSave() {
            // Save as typing, do not flag result as visible yet
            saveData(false);
            // Hide errors while typing
            elError.style.display = 'none';
        }

        function saveData(showResult = false) {
            const data = {
                input: elInput.value,
                hasResult: showResult || (elResultBox.style.display === 'block')
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.input !== undefined) elInput.value = data.input;
                    
                    if (data.hasResult && data.input) {
                        calculateGCF();
                    }
                } catch (e) {
                    console.error("Error loading data");
                }
            }
        }

        function clearData() {
            if(confirm("Are you sure you want to clear all data?")) {
                localStorage.removeItem(STORAGE_KEY);
                elInput.value = '';
                elResultBox.style.display = 'none';
                elError.style.display = 'none';
            }
        }
    </script>
</body>
</html>
