<!DOCTYPE html>
<!-- Category: Math Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distance Calculator</title>
    <meta name="description" content="Free online Distance Calculator. Calculate the distance between two geographic coordinates (latitude/longitude) or 2D/3D points. Features auto-save and unit conversions.">
    <meta name="keywords" content="Distance Calculator, Coordinate Distance, Haversine Formula, Euclidean Distance, Geometry Calculator, Straight Line Distance, ToolsHub365">
    <meta name="author" content="ToolsHub365">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/distance-calculator">

    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Distance Calculator",
      "applicationCategory": "UtilityApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "A versatile tool to calculate straight-line distances between geographic coordinates or geometric points."
    }
    </script>

    <style>
        /* CSS Variables & Reset */
        :root {
            --header-height: 50px;
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #ddd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--container-bg);
            min-height: calc(100vh - var(--header-height));
            /* Shadow for desktop look */
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }

        /* Tabs Styling */
        .tabs {
            display: flex;
            background: #e9ecef;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--container-bg);
            color: var(--accent-color);
            border-top: 3px solid var(--accent-color);
        }

        /* Calculator Content */
        .calc-content {
            padding: 20px 40px; /* Default desktop padding */
        }

        .section-title {
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: var(--primary-color);
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        /* Input Grids */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #555;
        }

        .input-group input, 
        .input-group select {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 600;
        }

        .btn-calc {
            background-color: var(--accent-color);
            color: white;
            flex: 2;
        }

        .btn-calc:hover {
            background-color: #2980b9;
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
            flex: 1;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        /* Results */
        .result-box {
            background: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            display: none; /* Hidden by default */
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin: 10px 0;
        }

        .result-unit {
            font-size: 1rem;
            color: #777;
        }

        .secondary-results {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            font-size: 0.9rem;
            color: #555;
        }

        .sec-item {
            background: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        /* 3D Checkbox specific */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                margin: 0;
                box-shadow: none;
            }

            .calc-content {
                padding: 15px; /* Minimal padding for content readability */
            }

            /* Stack inputs on mobile */
            .input-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .btn-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .result-value {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Distance Calculator</h1>
    </header>

    <div class="container">
        <!-- Calculation Mode Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('geo')">Geographic (Map)</button>
            <button class="tab-btn" onclick="switchTab('geom')">Geometry (2D/3D)</button>
        </div>

        <div class="calc-content">
            
            <!-- GEOGRAPHIC CALCULATOR -->
            <div id="geo-panel">
                <div class="section-title">Calculate Distance Between Coordinates</div>
                <p style="margin-bottom: 20px; color: #666; font-size: 0.9rem;">
                    Enter Latitude and Longitude for two points to find the straight-line (Great Circle) distance.
                </p>

                <div class="input-grid">
                    <!-- Point 1 -->
                    <div style="grid-column: span 1;">
                        <h4 style="margin-bottom:10px;">Point A</h4>
                        <div class="input-group" style="margin-bottom:10px;">
                            <label>Latitude</label>
                            <input type="number" id="lat1" placeholder="e.g. 40.7128" step="any" oninput="autoSave()">
                        </div>
                        <div class="input-group">
                            <label>Longitude</label>
                            <input type="number" id="lon1" placeholder="e.g. -74.0060" step="any" oninput="autoSave()">
                        </div>
                    </div>
                    <!-- Point 2 -->
                    <div style="grid-column: span 1;">
                        <h4 style="margin-bottom:10px;">Point B</h4>
                        <div class="input-group" style="margin-bottom:10px;">
                            <label>Latitude</label>
                            <input type="number" id="lat2" placeholder="e.g. 34.0522" step="any" oninput="autoSave()">
                        </div>
                        <div class="input-group">
                            <label>Longitude</label>
                            <input type="number" id="lon2" placeholder="e.g. -118.2437" step="any" oninput="autoSave()">
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label>Output Unit</label>
                    <select id="geoUnit" onchange="autoSave()">
                        <option value="km">Kilometers (km)</option>
                        <option value="mi">Miles (mi)</option>
                        <option value="m">Meters (m)</option>
                        <option value="nm">Nautical Miles (nm)</option>
                    </select>
                </div>
            </div>

            <!-- GEOMETRIC CALCULATOR -->
            <div id="geom-panel" style="display: none;">
                <div class="section-title">Euclidean Distance (2D / 3D Points)</div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="is3D" onchange="toggle3D(); autoSave();">
                    <label for="is3D" style="cursor: pointer;">Enable 3D (Z-axis)</label>
                </div>

                <div class="input-grid">
                    <!-- Point 1 -->
                    <div>
                        <h4 style="margin-bottom:10px;">Point 1</h4>
                        <div class="input-group" style="margin-bottom:10px;">
                            <label>X1</label>
                            <input type="number" id="x1" placeholder="0" step="any" oninput="autoSave()">
                        </div>
                        <div class="input-group" style="margin-bottom:10px;">
                            <label>Y1</label>
                            <input type="number" id="y1" placeholder="0" step="any" oninput="autoSave()">
                        </div>
                        <div class="input-group z-input" style="display:none;">
                            <label>Z1</label>
                            <input type="number" id="z1" placeholder="0" step="any" oninput="autoSave()">
                        </div>
                    </div>

                    <!-- Point 2 -->
                    <div>
                        <h4 style="margin-bottom:10px;">Point 2</h4>
                        <div class="input-group" style="margin-bottom:10px;">
                            <label>X2</label>
                            <input type="number" id="x2" placeholder="0" step="any" oninput="autoSave()">
                        </div>
                        <div class="input-group" style="margin-bottom:10px;">
                            <label>Y2</label>
                            <input type="number" id="y2" placeholder="0" step="any" oninput="autoSave()">
                        </div>
                        <div class="input-group z-input" style="display:none;">
                            <label>Z2</label>
                            <input type="number" id="z2" placeholder="0" step="any" oninput="autoSave()">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="btn-row">
                <button class="btn btn-calc" onclick="calculate()">Calculate Distance</button>
                <button class="btn btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <!-- Result Display -->
            <div id="result" class="result-box">
                <div>Distance:</div>
                <div class="result-value" id="resValue">0</div>
                <div class="result-unit" id="resUnit"></div>
                <div class="secondary-results" id="secResults"></div>
            </div>

        </div>
    </div>

    <script>
        // State Management
        let currentTab = 'geo';

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // Tab Switching
        function switchTab(tab) {
            currentTab = tab;
            const geoPanel = document.getElementById('geo-panel');
            const geomPanel = document.getElementById('geom-panel');
            const tabs = document.querySelectorAll('.tab-btn');
            const resultBox = document.getElementById('result');

            if (tab === 'geo') {
                geoPanel.style.display = 'block';
                geomPanel.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                geoPanel.style.display = 'none';
                geomPanel.style.display = 'block';
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
            
            resultBox.style.display = 'none'; // Hide result on tab switch
            autoSave();
        }

        // Toggle 3D inputs
        function toggle3D() {
            const is3D = document.getElementById('is3D').checked;
            const zInputs = document.querySelectorAll('.z-input');
            zInputs.forEach(el => {
                el.style.display = is3D ? 'flex' : 'none';
            });
        }

        // Calculation Logic
        function calculate() {
            const resultBox = document.getElementById('result');
            const resValue = document.getElementById('resValue');
            const resUnit = document.getElementById('resUnit');
            const secResults = document.getElementById('secResults');

            if (currentTab === 'geo') {
                // Haversine Formula
                const lat1 = parseFloat(document.getElementById('lat1').value);
                const lon1 = parseFloat(document.getElementById('lon1').value);
                const lat2 = parseFloat(document.getElementById('lat2').value);
                const lon2 = parseFloat(document.getElementById('lon2').value);
                const unit = document.getElementById('geoUnit').value;

                if (isNaN(lat1) || isNaN(lon1) || isNaN(lat2) || isNaN(lon2)) {
                    alert('Please enter valid coordinates for both points.');
                    return;
                }

                const R = 6371; // Earth radius in km
                const dLat = toRad(lat2 - lat1);
                const dLon = toRad(lon2 - lon1);
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                          Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * 
                          Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                let d = R * c; // Distance in km

                // Conversions
                let displayVal = d;
                let unitLabel = "Kilometers";
                let conversions = "";

                if (unit === 'mi') {
                    displayVal = d * 0.621371;
                    unitLabel = "Miles";
                } else if (unit === 'm') {
                    displayVal = d * 1000;
                    unitLabel = "Meters";
                } else if (unit === 'nm') {
                    displayVal = d * 0.539957;
                    unitLabel = "Nautical Miles";
                }

                resValue.innerText = displayVal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4});
                resUnit.innerText = unitLabel;
                
                // Secondary details
                secResults.innerHTML = `
                    <span class="sec-item">${(d).toFixed(2)} km</span>
                    <span class="sec-item">${(d * 0.621371).toFixed(2)} mi</span>
                `;

            } else {
                // Euclidean Distance
                const x1 = parseFloat(document.getElementById('x1').value) || 0;
                const y1 = parseFloat(document.getElementById('y1').value) || 0;
                const x2 = parseFloat(document.getElementById('x2').value) || 0;
                const y2 = parseFloat(document.getElementById('y2').value) || 0;
                const is3D = document.getElementById('is3D').checked;

                let dist = 0;
                let formula = "";

                if (is3D) {
                    const z1 = parseFloat(document.getElementById('z1').value) || 0;
                    const z2 = parseFloat(document.getElementById('z2').value) || 0;
                    dist = Math.sqrt(Math.pow(x2-x1, 2) + Math.pow(y2-y1, 2) + Math.pow(z2-z1, 2));
                    formula = "3D Euclidean";
                } else {
                    dist = Math.sqrt(Math.pow(x2-x1, 2) + Math.pow(y2-y1, 2));
                    formula = "2D Euclidean";
                }

                resValue.innerText = dist.toLocaleString(undefined, {maximumFractionDigits: 5});
                resUnit.innerText = "Units";
                secResults.innerHTML = `<span class="sec-item">${formula}</span>`;
            }

            resultBox.style.display = 'block';
            // Scroll to result on mobile
            if(window.innerWidth < 768) {
                resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function toRad(Value) {
            return Value * Math.PI / 180;
        }

        // Local Storage Functions
        function autoSave() {
            const data = {
                tab: currentTab,
                // Geo Inputs
                lat1: document.getElementById('lat1').value,
                lon1: document.getElementById('lon1').value,
                lat2: document.getElementById('lat2').value,
                lon2: document.getElementById('lon2').value,
                geoUnit: document.getElementById('geoUnit').value,
                // Geom Inputs
                x1: document.getElementById('x1').value,
                y1: document.getElementById('y1').value,
                z1: document.getElementById('z1').value,
                x2: document.getElementById('x2').value,
                y2: document.getElementById('y2').value,
                z2: document.getElementById('z2').value,
                is3D: document.getElementById('is3D').checked
            };
            localStorage.setItem('distCalcData', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('distCalcData');
            if (saved) {
                const data = JSON.parse(saved);
                
                // Restore Geo
                document.getElementById('lat1').value = data.lat1 || '';
                document.getElementById('lon1').value = data.lon1 || '';
                document.getElementById('lat2').value = data.lat2 || '';
                document.getElementById('lon2').value = data.lon2 || '';
                document.getElementById('geoUnit').value = data.geoUnit || 'km';

                // Restore Geom
                document.getElementById('x1').value = data.x1 || '';
                document.getElementById('y1').value = data.y1 || '';
                document.getElementById('z1').value = data.z1 || '';
                document.getElementById('x2').value = data.x2 || '';
                document.getElementById('y2').value = data.y2 || '';
                document.getElementById('z2').value = data.z2 || '';
                document.getElementById('is3D').checked = data.is3D || false;

                toggle3D();
                
                if (data.tab) {
                    switchTab(data.tab);
                } else {
                    switchTab('geo');
                }
            } else {
                switchTab('geo');
            }
        }

        function clearData() {
            if(confirm("Are you sure you want to clear all data?")) {
                localStorage.removeItem('distCalcData');
                // Reset inputs
                const inputs = document.querySelectorAll('input');
                inputs.forEach(input => {
                    if(input.type === 'checkbox') input.checked = false;
                    else input.value = '';
                });
                document.getElementById('geoUnit').value = 'km';
                document.getElementById('result').style.display = 'none';
                toggle3D();
                autoSave(); // Save cleared state
            }
        }
    </script>
</body>
</html>
