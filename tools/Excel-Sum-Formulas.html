    function render() {
        const grid = document.getElementById('mainGrid');
        let html = '';
        data.forEach(section => {
            html += `<div class="category-header">${section.cat}</div>`;
            section.items.forEach(item => {
                html += `
                    <div class="card" data-search="${(item.name + item.p + section.cat).toLowerCase()}">
                        <h2>${item.name}</h2>
                        <div class="item"><span class="label">Purpose:</span>${item.p}</div>
                        <div class="item"><span class="label">Return Value:</span>${item.r}</div>
                        <div class="item"><span class="label">Syntax:</span><code>${item.s}</code></div>
                        <div class="item"><span class="label">Example:</span>${item.e}</div>
                        <div class="item"><span class="label">Using the SUM function:</span>${item.u}</div>
                    </div>
                `;
            });
        });
        grid.innerHTML = html;
    }

    function doSearch() {
        const query = document.getElementById('formulaSearch').value.toLowerCase();
        localStorage.setItem('sumSearch', query);
        const cards = document.querySelectorAll('.card');
        const headers = document.querySelectorAll('.category-header');

        cards.forEach(card => {
            if(card.getAttribute('data-search').includes(query)) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });

        // Clean up headers with no visible cards
        headers.forEach(header => {
            let sibling = header.nextElementSibling;
            let hasVisible = false;
            while(sibling && sibling.classList.contains('card')) {
                if(!sibling.classList.contains('hidden')) {
                    hasVisible = true;
                    break;
                }
                sibling = sibling.nextElementSibling;
            }
            header.style.display = hasVisible ? 'block' : 'none';
        });
    }

    function resetAll() {
        document.getElementById('formulaSearch').value = '';
        localStorage.removeItem('sumSearch');
        doSearch();
    }

    window.onload = () => {
        render();
        const saved = localStorage.getItem('sumSearch');
        if(saved) {
            document.getElementById('formulaSearch').value = saved;
            doSearch();
        }
    };
</script>
