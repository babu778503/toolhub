<!DOCTYPE html>
<!-- Category: Financial Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Rate Calculator</title>
    
    <!-- SEO Optimization -->
    <meta name="description" content="Free online Interest Rate Calculator. Calculate simple and compound interest accurately. Auto-saves your data. Optimized for mobile and desktop.">
    <meta name="keywords" content="Interest Rate Calculator, Simple Interest, Compound Interest, Investment Calculator, Finance Tool, Loan Calculator, toolshub365">
    <meta name="author" content="toolshub365.com">
    <link rel="canonical" href="https://toolshub365.com/interest-rate-calculator">
    
    <!-- Schema.org for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialProduct",
      "name": "Interest Rate Calculator",
      "description": "A tool to calculate simple and compound interest with auto-save functionality.",
      "brand": {
        "@type": "Brand",
        "name": "ToolsHub365"
      },
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any"
    }
    </script>

    <style>
        /* CSS Variables & Reset */
        :root {
            --primary-color: #0056b3;
            --secondary-color: #f8f9fa;
            --text-color: #333;
            --border-color: #ced4da;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --header-height: 50px;
            --container-max: 1200px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: var(--text-color);
            padding-top: var(--header-height); /* Space for fixed header */
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: var(--container-max);
            margin: 20px auto;
            background: white;
            display: flex;
            flex-wrap: wrap;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            border-radius: 8px;
            overflow: hidden;
        }

        /* Layout Columns */
        .input-section, .result-section {
            padding: 25px;
            width: 50%;
        }

        .result-section {
            background-color: #fcfcfc;
            border-left: 1px solid #eee;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 0.95rem;
        }

        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        .input-group {
            position: relative;
        }

        .input-suffix {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
            pointer-events: none;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.3s, transform 0.1s;
            flex: 1;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-calc:hover {
            background-color: #004494;
        }

        .btn-clear {
            background-color: var(--secondary-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .btn-clear:hover {
            background-color: #e2e6ea;
            color: var(--danger-color);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Result Styling */
        .result-header {
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .result-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid #eee;
        }

        .result-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .result-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .result-value.total {
            color: var(--success-color);
        }

        /* Decorative visual bar */
        .visual-bar-container {
            height: 20px;
            width: 100%;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            margin-top: 30px;
        }
        
        .visual-bar-principal {
            background: #6c757d;
            height: 100%;
        }
        
        .visual-bar-interest {
            background: var(--success-color);
            height: 100%;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-p { background: #6c757d; }
        .dot-i { background: var(--success-color); }

        /* Responsive Design */
        @media screen and (max-width: 768px) {
            .container {
                width: 100%;
                margin: 0; /* Remove top/bottom margin */
                border-radius: 0; /* Full width means no corners */
                box-shadow: none;
                flex-direction: column;
            }

            .input-section, .result-section {
                width: 100%;
                padding: 15px;
                border: none;
            }

            .result-section {
                border-top: 5px solid #f0f2f5;
            }

            /* Specifically remove side blank spaces */
            body {
                padding-left: 0;
                padding-right: 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Interest Rate Calculator</h1>
    </header>

    <div class="container">
        <!-- Input Section -->
        <div class="input-section">
            <form id="calcForm" onsubmit="event.preventDefault(); calculate();">
                <div class="form-group">
                    <label for="principal">Principal Amount</label>
                    <div class="input-group">
                        <input type="number" id="principal" placeholder="10000" min="0" step="0.01" required>
                        <span class="input-suffix">$</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="rate">Annual Interest Rate</label>
                    <div class="input-group">
                        <input type="number" id="rate" placeholder="5.5" min="0" step="0.01" required>
                        <span class="input-suffix">%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="time">Time Period (Years)</label>
                    <input type="number" id="time" placeholder="5" min="0" step="0.1" required>
                </div>

                <div class="form-group">
                    <label for="type">Interest Type</label>
                    <select id="type" onchange="toggleCompoundOptions()">
                        <option value="simple">Simple Interest</option>
                        <option value="compound">Compound Interest</option>
                    </select>
                </div>

                <div class="form-group" id="compoundFreqGroup" style="display: none;">
                    <label for="frequency">Compounding Frequency</label>
                    <select id="frequency">
                        <option value="1">Annually (1x/year)</option>
                        <option value="2">Semi-Annually (2x/year)</option>
                        <option value="4">Quarterly (4x/year)</option>
                        <option value="12">Monthly (12x/year)</option>
                        <option value="365">Daily (365x/year)</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-calc">Calculate</button>
                    <button type="button" class="btn-clear" onclick="clearData()">Clear Data</button>
                </div>
            </form>
        </div>

        <!-- Result Section -->
        <div class="result-section">
            <div class="result-header">
                <h3>Calculation Results</h3>
            </div>
            
            <div id="resultsArea" style="opacity: 0.5;">
                <div class="result-card">
                    <div class="result-label">Total Interest Earned</div>
                    <div class="result-value" id="res-interest">$0.00</div>
                </div>

                <div class="result-card">
                    <div class="result-label">Total Maturity Amount</div>
                    <div class="result-value total" id="res-total">$0.00</div>
                </div>
                
                <div class="visual-bar-container">
                    <div class="visual-bar-principal" id="bar-principal" style="width: 100%"></div>
                    <div class="visual-bar-interest" id="bar-interest" style="width: 0%"></div>
                </div>
                <div class="legend">
                    <div class="legend-item"><div class="dot dot-p"></div>Principal</div>
                    <div class="legend-item"><div class="dot dot-i"></div>Interest</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const form = document.getElementById('calcForm');
        const principalInput = document.getElementById('principal');
        const rateInput = document.getElementById('rate');
        const timeInput = document.getElementById('time');
        const typeSelect = document.getElementById('type');
        const freqSelect = document.getElementById('frequency');
        const freqGroup = document.getElementById('compoundFreqGroup');
        
        const resInterest = document.getElementById('res-interest');
        const resTotal = document.getElementById('res-total');
        const resultsArea = document.getElementById('resultsArea');
        const barPrincipal = document.getElementById('bar-principal');
        const barInterest = document.getElementById('bar-interest');

        // Toggle Compound Options
        function toggleCompoundOptions() {
            if (typeSelect.value === 'compound') {
                freqGroup.style.display = 'block';
            } else {
                freqGroup.style.display = 'none';
            }
            saveToLocal();
        }

        // Format Currency
        const formatter = new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
            minimumFractionDigits: 2
        });

        // Calculate Logic
        function calculate() {
            const P = parseFloat(principalInput.value);
            const r = parseFloat(rateInput.value) / 100;
            const t = parseFloat(timeInput.value);
            const type = typeSelect.value;
            
            if (isNaN(P) || isNaN(r) || isNaN(t)) return;

            let A = 0; // Total Amount
            let I = 0; // Interest

            if (type === 'simple') {
                // A = P(1 + rt)
                A = P * (1 + (r * t));
                I = A - P;
            } else {
                // A = P(1 + r/n)^(nt)
                const n = parseFloat(freqSelect.value);
                A = P * Math.pow((1 + (r / n)), (n * t));
                I = A - P;
            }

            // Update UI
            resInterest.innerText = formatter.format(I);
            resTotal.innerText = formatter.format(A);
            resultsArea.style.opacity = '1';

            // Update Visual Bar
            const totalPercent = 100;
            const principalPercent = (P / A) * 100;
            const interestPercent = 100 - principalPercent;

            barPrincipal.style.width = `${principalPercent}%`;
            barInterest.style.width = `${interestPercent}%`;

            saveToLocal();
        }

        // Local Storage Functions
        function saveToLocal() {
            const data = {
                principal: principalInput.value,
                rate: rateInput.value,
                time: timeInput.value,
                type: typeSelect.value,
                frequency: freqSelect.value
            };
            localStorage.setItem('toolsHub_interestCalc_data', JSON.stringify(data));
        }

        function loadFromLocal() {
            const savedData = localStorage.getItem('toolsHub_interestCalc_data');
            if (savedData) {
                const data = JSON.parse(savedData);
                principalInput.value = data.principal || '';
                rateInput.value = data.rate || '';
                timeInput.value = data.time || '';
                typeSelect.value = data.type || 'simple';
                freqSelect.value = data.frequency || '1';
                
                toggleCompoundOptions();
                
                // Auto calculate if data exists
                if(data.principal && data.rate && data.time) {
                    calculate();
                }
            }
        }

        function clearData() {
            if(confirm('Are you sure you want to clear all data?')) {
                localStorage.removeItem('toolsHub_interestCalc_data');
                form.reset();
                toggleCompoundOptions();
                
                // Reset Results
                resInterest.innerText = '$0.00';
                resTotal.innerText = '$0.00';
                barPrincipal.style.width = '100%';
                barInterest.style.width = '0%';
                resultsArea.style.opacity = '0.5';
            }
        }

        // Event Listeners for auto-save on input change
        const inputs = [principalInput, rateInput, timeInput, freqSelect, typeSelect];
        inputs.forEach(input => {
            input.addEventListener('input', saveToLocal);
        });

        // Initialize
        window.onload = loadFromLocal;

    </script>
</body>
</html>
