    function renderFormulas() {
        const grid = document.getElementById('formulaGrid');
        grid.innerHTML = '';

        formulaData.forEach(cat => {
            const title = document.createElement('div');
            title.className = 'cat-title';
            title.innerText = cat.category;
            grid.appendChild(title);

            cat.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-keywords', (item.name + item.p + cat.category).toLowerCase());
                
                card.innerHTML = `
                    <h2>${item.name}</h2>
                    <div class="data-row"><span class="label">Purpose:</span><div class="content">${item.p}</div></div>
                    <div class="data-row"><span class="label">Return Value:</span><div class="content">${item.r}</div></div>
                    <div class="data-row"><span class="label">Syntax:</span><code>${item.s}</code></div>
                    <div class="data-row"><span class="label">Examples:</span><div class="content">${item.e}</div></div>
                    <div class="data-row"><span class="label">Using the SUM function:</span><div class="content">${item.u}</div></div>
                `;
                grid.appendChild(card);
            });
        });
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        localStorage.setItem('minmax_search', query);
        
        const cards = document.querySelectorAll('.card');
        const titles = document.querySelectorAll('.cat-title');

        cards.forEach(card => {
            if(card.getAttribute('data-keywords').includes(query)) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });

        // Hide titles if all cards under them are hidden
        titles.forEach(title => {
            let sibling = title.nextElementSibling;
            let hasVisible = false;
            while (sibling && sibling.classList.contains('card')) {
                if (!sibling.classList.contains('hidden')) {
                    hasVisible = true;
                    break;
                }
                sibling = sibling.nextElementSibling;
            }
            title.style.display = hasVisible ? 'block' : 'none';
        });
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        localStorage.removeItem('minmax_search');
        handleSearch();
    }

    window.onload = () => {
        renderFormulas();
        const saved = localStorage.getItem('minmax_search');
        if (saved) {
            document.getElementById('searchInput').value = saved;
            handleSearch();
        }
    };
</script>
