                    card.className = 'func-card';
                    card.setAttribute('data-name', item.name.toLowerCase());
                    card.setAttribute('data-keywords', `${item.purpose} ${item.category}`.toLowerCase());

                    // Escape HTML in example so it displays properly
                    const escapedExample = item.example.replace(/</g, "&lt;").replace(/>/g, "&gt;");

                    card.innerHTML = `
                        <div class="func-header">${item.name}</div>
                        <div class="func-body">
                            <div class="section-wrap">
                                <div class="section-title">Purpose</div>
                                <div class="content-text">${item.purpose}</div>
                            </div>
                            <div class="section-wrap">
                                <div class="section-title">Return Value</div>
                                <div class="content-text">${item.returnValue}</div>
                            </div>
                            <div class="section-wrap">
                                <div class="section-title">Syntax</div>
                                <div class="code-block">
                                    ${item.syntax}
                                </div>
                            </div>
                            <div class="section-wrap">
                                <div class="section-title">Examples</div>
                                <div class="code-block">
                                    <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                                    <span class="code-text">${escapedExample}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    catGroup.appendChild(card);
                });

                contentArea.appendChild(catGroup);
            });

            attachEvents();
        }

        function attachEvents() {
            const headers = document.querySelectorAll('.func-header');
            headers.forEach(header => {
                header.addEventListener('click', function() {
                    const card = this.parentElement;
                    card.classList.toggle('active');
                });
            });
        }

        function copyCode(btn) {
            const codeSpan = btn.nextElementSibling;
            // Extract code before the comment for clean copying
            const textToCopy = codeSpan.textContent.split('//')[0].trim();
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                btn.style.background = '#107c41';
                btn.style.color = '#fff';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '';
                    btn.style.color = '';
                }, 2000);
            });
        }

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            const groups = document.querySelectorAll('.category-group');
            let hasVisibleCards = false;

            groups.forEach(group => {
                const cards = group.querySelectorAll('.func-card');
                let groupHasVisible = false;

                cards.forEach(card => {
                    const name = card.getAttribute('data-name');
                    const keywords = card.getAttribute('data-keywords');
                    
                    if (name.includes(term) || keywords.includes(term)) {
                        card.style.display = 'block';
                        groupHasVisible = true;
                        hasVisibleCards = true;
                        // Auto-expand if searching
                        if (term !== '') {
                            card.classList.add('active');
                        } else {
                            card.classList.remove('active');
                        }
                    } else {
                        card.style.display = 'none';
                        card.classList.remove('active');
                    }
                });

                group.style.display = groupHasVisible ? 'block' : 'none';
            });

            noResults.style.display = hasVisibleCards ? 'none' : 'block';
        });

        // Initial render
        renderContent();
    </script>
</body>
</html>
