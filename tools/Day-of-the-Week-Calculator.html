    <style>
        /* CSS Reset & Global Styles */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f3f4f6;
            color: #1f2937;
            -webkit-font-smoothing: antialiased;
        }

        /* Fixed Header - Exactly 50px */
        header {
            height: 50px;
            background-color: #4f46e5;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        /* Main Container - Desktop Max Width 1200px */
        .container {
            max-width: 1200px;
            margin: 80px auto 30px auto; /* 50px header + 30px gap */
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .content-wrapper {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        /* Input Controls */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-group label {
            font-weight: 600;
            color: #374151;
            font-size: 16px;
        }

        input[type="date"] {
            width: 100%;
            padding: 15px 18px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 18px;
            outline: none;
            transition: all 0.2s ease;
            background-color: #f9fafb;
            color: #111827;
            cursor: pointer;
        }

        input[type="date"]:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
            background-color: #ffffff;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            padding: 15px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            flex: 1;
        }

        .btn-calc {
            background-color: #4f46e5;
            color: white;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
        }

        .btn-calc:hover {
            background-color: #4338ca;
        }

        .btn-clear {
            background-color: #e5e7eb;
            color: #374151;
        }

        .btn-clear:hover {
            background-color: #d1d5db;
        }

        button:active {
            transform: translateY(1px);
        }

        /* Results Display */
        .result-box {
            display: none;
            margin-top: 25px;
            padding: 40px 20px;
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            border: 1px solid #c7d2fe;
            border-radius: 10px;
            text-align: center;
        }

        .result-box h2 {
            font-size: 18px;
            color: #3730a3;
            margin-bottom: 15px;
            font-weight: 600;
            text-transform: uppercase;

        }

        .result-value {
            font-size: 48px;
            font-weight: 700;
            color: #4338ca;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .result-msg {
            font-size: 16px;
            color: #3730a3;
            line-height: 1.5;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 12px 18px;
            border-radius: 8px;
            display: inline-block;
            font-weight: 500;
        }

        /* Mobile Optimization: Remove side spacing completely */
        @media (max-width: 768px) {
            .container {
                margin: 50px 0 0 0; /* Exactly 50px top to clear fixed header, 0 side margins */
                border-radius: 0;
                box-shadow: none;
                width: 100%;
                max-width: 100%;
            }
            .content-wrapper {
                padding: 30px 20px; /* Comfortable padding inside, no empty container space outside */
            }
            .action-buttons {
                flex-direction: column;
            }
            .result-value {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>

    <!-- Exactly 50px Fixed Header -->
    <header>
        <h1>Day of the Week Calculator</h1>
    </header>

    <div class="container">
        <div class="content-wrapper">
            
            <div class="form-group">
                <label for="dateInput">Select Date</label>
                <input type="date" id="dateInput" required>
            </div>

            <div class="action-buttons">
                <button class="btn-calc" onclick="calculateDay()">Calculate Day</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div class="result-box" id="resultBox">
                <h2>The Day of the Week is</h2>
                <div class="result-value" id="resultValueMain">--</div>
                <div class="result-msg" id="resultMsg"></div>
            </div>

        </div>
    </div>

    <!-- JavaScript integrated for functionality and auto-saving -->
    <script>
        // DOM Elements
        const dateInput = document.getElementById('dateInput');
        const resultBox = document.getElementById('resultBox');
        const resultValueMain = document.getElementById('resultValueMain');
        const resultMsg = document.getElementById('resultMsg');

        // Days of the week array
        const daysOfWeek =["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const months =["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        // Automatically load saved data from LocalStorage
        function loadSavedData() {
            if (localStorage.getItem('dow_date')) {
                dateInput.value = localStorage.getItem('dow_date');
            }
        }

        // Save data to LocalStorage automatically
        function saveCurrentData() {
            localStorage.setItem('dow_date', dateInput.value);
        }

        // Attach event listeners for automatic saving upon input
        dateInput.addEventListener('change', saveCurrentData);

        // Core Calculation Logic
        function calculateDay() {
            const dateVal = dateInput.value;

            // Trigger save
            saveCurrentData();

            // Input Validation
            if (!dateVal) {
                alert('Please select a valid date.');
                return;
            }

            // Split the YYYY-MM-DD input to parse safely into local time avoiding UTC timezone shifts
            const [year, month, day] = dateVal.split('-');
            
            // Note: Month in Date object is 0-indexed (0 = January)
            const dateObj = new Date(year, month - 1, day);

            // Get day index (0-6)
            const dayIndex = dateObj.getDay();
            const dayName = daysOfWeek[dayIndex];
            
            // Format nice string for secondary output (e.g. October 15, 2024)
            const formattedDate = `${months[dateObj.getMonth()]} ${parseInt(day)}, ${year}`;

            // Display Results
            resultBox.style.display = 'block';
            resultValueMain.innerText = dayName;
            resultMsg.innerText = `The exact day for ${formattedDate} is a ${dayName}.`;
        }

        // Clear Data Function
        function clearData() {
            // Reset field
            dateInput.value = '';
            
            // Hide result box
            resultBox.style.display = 'none';
            resultValueMain.innerText = '--';
            resultMsg.innerText = '';
            
            // Clear LocalStorage data
            localStorage.removeItem('dow_date');
        }

        // Initialize tool on page load
        window.onload = loadSavedData;
    </script>
</body>
</html>
