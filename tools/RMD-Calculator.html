<!DOCTYPE html>
<!-- Category: Financial Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    
    <!-- SEO & Metadata -->
    <title>RMD Calculator</title>
    <meta name="description" content="Free RMD Calculator to estimate your Required Minimum Distributions from retirement accounts using the IRS Uniform Lifetime Table. Fast, accurate, and mobile-friendly.">
    <meta name="keywords" content="RMD Calculator, Required Minimum Distribution, IRS Uniform Lifetime Table, Retirement Calculator, 401k RMD, IRA Withdrawal, Toolshub365">
    <meta name="author" content="Toolshub365">
    <meta name="robots" content="index, follow">
    
    <!-- AI Crawler Optimization -->
    <meta name="gpt-bot" content="index, follow">
    <meta name="googlebot" content="index, follow">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://toolshub365.com/rmd-calculator">

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "RMD Calculator",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "url": "https://toolshub365.com/rmd-calculator",
      "description": "Calculates Required Minimum Distributions (RMD) for retirement accounts.",
      "offer": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --header-height: 50px;
            --container-width: 1200px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height); /* Space for fixed header */
            min-height: 100vh;
        }

        /* Header Styling */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* Main Container */
        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        /* Tool Card Styling */
        .calculator-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
        }

        .input-section, .result-section {
            padding: 30px;
            flex: 1;
            min-width: 300px;
        }

        .input-section {
            border-right: 1px solid #eee;
        }

        .result-section {
            background-color: #fcfcfc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--primary-color);
            font-size: 0.95rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:active {
            transform: translateY(1px);
        }

        .btn-calc {
            background-color: var(--secondary-color);
            color: white;
        }

        .btn-calc:hover {
            background-color: #2980b9;
        }

        .btn-clear {
            background-color: #ecf0f1;
            color: var(--text-color);
            border: 1px solid #bdc3c7;
        }

        .btn-clear:hover {
            background-color: #bdc3c7;
        }

        /* Result Styling */
        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-color);
            margin: 10px 0;
        }

        .result-label {
            color: #7f8c8d;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-details {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #555;
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #eee;
            width: 100%;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            padding-bottom: 5px;
            border-bottom: 1px dashed #eee;
        }

        .detail-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .error-msg {
            color: var(--danger-color);
            font-size: 0.9rem;
            margin-top: 5px;
            display: none;
        }

        /* Mobile Responsive Design */
        @media screen and (max-width: 768px) {
            /* Remove blank spaces for mobile users */
            .container {
                padding: 0;
                margin: 0;
                max-width: 100%;
            }

            .calculator-card {
                border-radius: 0;
                box-shadow: none;
                flex-direction: column;
            }

            .input-section {
                border-right: none;
                border-bottom: 1px solid #eee;
                padding: 20px;
            }

            .result-section {
                padding: 20px;
                background-color: #fff;
            }
            
            /* Ensure inputs don't zoom on iOS */
            input[type="number"] {
                font-size: 16px; 
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>RMD Calculator</h1>
    </header>

    <div class="container">
        <div class="calculator-card">
            
            <!-- Input Section -->
            <div class="input-section">
                <form id="rmdForm" onsubmit="return false;">
                    
                    <div class="form-group">
                        <label for="age">Your Age (at end of year)</label>
                        <input type="number" id="age" placeholder="e.g., 73" min="1" max="120" required>
                        <div id="ageError" class="error-msg">Please enter a valid age.</div>
                    </div>

                    <div class="form-group">
                        <label for="balance">Account Balance (Dec 31 last year)</label>
                        <input type="number" id="balance" placeholder="e.g., 500000" step="0.01" min="0" required>
                    </div>

                    <div class="controls">
                        <button type="button" class="btn-clear" id="clearBtn">Clear Data</button>
                        <button type="submit" class="btn-calc" id="calcBtn">Calculate RMD</button>
                    </div>
                </form>
            </div>

            <!-- Result Section -->
            <div class="result-section">
                <div class="result-label">Estimated RMD Amount</div>
                <div class="result-value" id="rmdResult">$0.00</div>
                
                <div class="result-details" id="detailsBox" style="display:none;">
                    <div class="detail-row">
                        <span>Distribution Period:</span>
                        <strong id="factorValue">-</strong>
                    </div>
                    <div class="detail-row">
                        <span>Account Balance:</span>
                        <strong id="balanceValue">-</strong>
                    </div>
                    <div style="margin-top: 10px; font-size: 0.8rem; color: #888;">
                        *Based on IRS Uniform Lifetime Table
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // IRS Uniform Lifetime Table (Publication 590-B)
        // Age: Distribution Period Factor
        const irsTable = {
            72: 27.4, 73: 26.5, 74: 25.5, 75: 24.6, 76: 23.7,
            77: 22.9, 78: 22.0, 79: 21.1, 80: 20.2, 81: 19.4,
            82: 18.5, 83: 17.7, 84: 16.8, 85: 16.0, 86: 15.2,
            87: 14.4, 88: 13.7, 89: 12.9, 90: 12.2, 91: 11.5,
            92: 10.8, 93: 10.1, 94: 9.5, 95: 8.9, 96: 8.4,
            97: 7.8, 98: 7.3, 99: 6.8, 100: 6.4, 101: 6.0,
            102: 5.6, 103: 5.2, 104: 4.9, 105: 4.6, 106: 4.3,
            107: 4.1, 108: 3.9, 109: 3.7, 110: 3.5, 111: 3.4,
            112: 3.3, 113: 3.1, 114: 3.0, 115: 2.9, 116: 2.8,
            117: 2.7, 118: 2.5, 119: 2.3, 120: 2.0
        };

        const ageInput = document.getElementById('age');
        const balanceInput = document.getElementById('balance');
        const calcBtn = document.getElementById('calcBtn');
        const clearBtn = document.getElementById('clearBtn');
        const rmdResult = document.getElementById('rmdResult');
        const factorValue = document.getElementById('factorValue');
        const balanceValue = document.getElementById('balanceValue');
        const detailsBox = document.getElementById('detailsBox');
        const ageError = document.getElementById('ageError');

        // Load data on startup
        window.addEventListener('load', loadData);

        // Event Listeners for Auto-Save
        ageInput.addEventListener('input', saveData);
        balanceInput.addEventListener('input', saveData);

        // Calculate Action
        calcBtn.addEventListener('click', calculateRMD);

        // Clear Action
        clearBtn.addEventListener('click', clearData);

        function calculateRMD() {
            const age = parseInt(ageInput.value);
            const balance = parseFloat(balanceInput.value);

            // Validation
            if (!age || age < 1) {
                ageError.style.display = 'block';
                return;
            } else {
                ageError.style.display = 'none';
            }

            if (isNaN(balance)) {
                return; // Let browser validation handle empty balance if type=number
            }

            // Logic
            let rmd = 0;
            let factor = 0;

            if (age < 72) {
                rmdResult.textContent = "$0.00";
                rmdResult.style.color = "#7f8c8d";
                detailsBox.style.display = "block";
                factorValue.textContent = "N/A";
                balanceValue.textContent = formatCurrency(balance);
                alert("Note: Generally, RMDs are not required before age 73 (depending on birth year).");
                return;
            } 
            
            // Get factor from table or use max age factor if older
            if (age >= 120) {
                factor = 2.0;
            } else if (irsTable[age]) {
                factor = irsTable[age];
            } else {
                // Fallback (should cover range, but for safety)
                factor = 0;
            }

            if (factor > 0) {
                rmd = balance / factor;
                
                // Update UI
                rmdResult.textContent = formatCurrency(rmd);
                rmdResult.style.color = "var(--accent-color)";
                factorValue.textContent = factor;
                balanceValue.textContent = formatCurrency(balance);
                detailsBox.style.display = "block";
            }
            
            saveData(); // Save on calculate
        }

        function formatCurrency(num) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(num);
        }

        // Local Storage Functions
        function saveData() {
            const data = {
                age: ageInput.value,
                balance: balanceInput.value
            };
            localStorage.setItem('rmdCalcData_toolshub365', JSON.stringify(data));
        }

        function loadData() {
            const savedData = localStorage.getItem('rmdCalcData_toolshub365');
            if (savedData) {
                const data = JSON.parse(savedData);
                if(data.age) ageInput.value = data.age;
                if(data.balance) balanceInput.value = data.balance;
            }
        }

        function clearData() {
            // Clear inputs
            ageInput.value = '';
            balanceInput.value = '';
            
            // Clear result display
            rmdResult.textContent = '$0.00';
            rmdResult.style.color = 'var(--accent-color)';
            detailsBox.style.display = 'none';
            ageError.style.display = 'none';

            // Clear Storage
            localStorage.removeItem('rmdCalcData_toolshub365');
        }
    </script>
</body>
</html>
