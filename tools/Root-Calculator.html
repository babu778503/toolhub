<!DOCTYPE html>
<!-- Category: Math Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO & Technical Metadata -->
    <title>Root Calculator</title>
    <meta name="description" content="Free online Root Calculator by toolshub365.com. Calculate Square Roots, Cube Roots, and Nth Roots of any number instantly with automatic data saving.">
    <meta name="keywords" content="Root Calculator, Square Root Calculator, Cube Root Calculator, Nth Root Calculator, Radical Calculator, Math Tool, toolshub365, Algebra Calculator">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/root-calculator">
    
    <!-- JSON-LD for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Root Calculator",

      "offer": {

        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "A responsive mathematical tool to calculate the principal nth root of a number, including square and cube roots."
    }
    </script>

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #8e44ad; /* Purple shade */
            --primary-hover: #732d91;
            --header-bg: #2c3e50;
            --header-text: #ffffff;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #bdc3c7;
            --input-bg: #fdfdfd;
            --result-bg: #f3e5f5;
            --result-border: #8e44ad;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Space for fixed header */
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Calculator Card */
        .calculator-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            padding: 30px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Input Grid */
        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color);
            font-size: 0.95rem;
        }

        /* Visual Representation of Root */
        .visual-root-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            font-size: 1.5rem;
            color: #555;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }

        .root-symbol {
            font-size: 2.5rem;
            line-height: 1;
            margin-right: 5px;
            position: relative;
        }

        .root-degree-sup {
            font-size: 1rem;
            position: absolute;
            top: -5px;
            left: -10px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .radicand-val {
            border-top: 2px solid #555;
            padding-top: 5px;
            padding-left: 5px;
            font-weight: bold;
        }

        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.1rem;
            background-color: var(--input-bg);
            transition: all 0.3s ease;
            color: var(--text-color);
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(142, 68, 173, 0.15);
        }

        .preset-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .preset-btn {
            background: #e0e0e0;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            flex: 1;
            transition: background 0.2s;
        }

        .preset-btn:hover {
            background: #d0d0d0;
        }
        
        .preset-btn.active {
            background: var(--primary-color);
            color: white;
        }

        /* Action Buttons */
        .btn-controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button.action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s;
        }

        button.action-btn:active {
            transform: scale(0.98);
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        /* Result Area */
        .result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: var(--result-bg);
            border-left: 5px solid var(--result-border);
            border-radius: 4px;
            display: none; /* Hidden by default */
            animation: fadeIn 0.3s ease-out;
        }

        .result-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-color);
            word-break: break-all;
        }

        .formula-display {
            margin-top: 10px;
            font-style: italic;
            color: #555;
            font-size: 0.9rem;
        }

        .error-msg {
            color: #e74c3c;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;
                padding: 0; /* Remove blank space on sides */
                margin: 0;
            }

            .calculator-card {
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
                border: none;
                min-height: calc(100vh - 50px);
                padding: 25px 20px;
                display: flex;
                flex-direction: column;
            }

            .btn-controls {
                flex-direction: column;
            }

            .visual-root-container {
                margin-top: auto; /* Push visual down if needed, or keep standard flow */
            }
        }
    </style>
</head>
<body>

    <header>
        Root Calculator
    </header>

    <div class="container">
        <div class="calculator-card">
            
            <div class="input-group">
                <label for="inputNumber">Radicand (Number inside root, x)</label>
                <input type="number" id="inputNumber" placeholder="e.g. 64" step="any" oninput="updatePreview(); autoSave();">
            </div>

            <div class="input-group">
                <label for="rootDegree">Root Degree (n)</label>
                <div class="preset-buttons">
                    <button class="preset-btn active" onclick="setDegree(2)" id="btn-sq">Square (2)</button>
                    <button class="preset-btn" onclick="setDegree(3)" id="btn-cu">Cube (3)</button>
                    <button class="preset-btn" onclick="focusDegree()" id="btn-custom">Custom</button>
                </div>
                <input type="number" id="rootDegree" placeholder="e.g. 2" value="2" step="any" oninput="updatePreview(); autoSave(); checkPresets();">
            </div>

            <!-- Visual Preview -->
            <div class="visual-root-container">
                <span class="root-symbol">
                    √<span class="root-degree-sup" id="preview-n">2</span>
                </span>
                <span class="radicand-val" id="preview-x">x</span>
                <span style="margin: 0 10px;">=</span>
                <span style="font-weight:bold; color:var(--primary-color);">?</span>
            </div>

            <p class="error-msg" id="errorDisplay">Invalid calculation</p>

            <div class="btn-controls">
                <button class="action-btn btn-calc" onclick="calculateRoot()">Calculate Root</button>
                <button class="action-btn btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div class="result-box" id="resultBox">
                <div class="result-label">Result</div>
                <div class="result-value" id="resultValue">0</div>
                <div class="formula-display" id="formulaText"></div>
            </div>

        </div>
    </div>

    <script>
        const STORAGE_KEY = 'toolshub365_root_calc';
        
        // DOM Elements
        const elNumber = document.getElementById('inputNumber');
        const elDegree = document.getElementById('rootDegree');
        const elResultBox = document.getElementById('resultBox');
        const elResultValue = document.getElementById('resultValue');
        const elFormula = document.getElementById('formulaText');
        const elError = document.getElementById('errorDisplay');
        const elPreviewN = document.getElementById('preview-n');
        const elPreviewX = document.getElementById('preview-x');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            updatePreview();
            checkPresets();
        });

        // Preset Button Logic
        function setDegree(n) {
            elDegree.value = n;
            checkPresets();
            updatePreview();
            autoSave();
        }

        function focusDegree() {
            elDegree.value = '';
            elDegree.focus();
            checkPresets();
        }

        function checkPresets() {
            const val = parseFloat(elDegree.value);
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            
            if (val === 2) document.getElementById('btn-sq').classList.add('active');
            else if (val === 3) document.getElementById('btn-cu').classList.add('active');
            else document.getElementById('btn-custom').classList.add('active');
        }

        function updatePreview() {
            const x = elNumber.value;
            const n = elDegree.value;
            
            elPreviewX.innerText = x === '' ? 'x' : x;
            elPreviewN.innerText = n === '' ? 'n' : n;
        }

        function calculateRoot() {
            const x = parseFloat(elNumber.value);
            const n = parseFloat(elDegree.value);
            
            elError.style.display = 'none';
            elResultBox.style.display = 'none';

            // Validation
            if (isNaN(x) || isNaN(n)) {
                showError("Please enter valid numbers for both fields.");
                return;
            }

            if (n === 0) {
                showError("The zeroth root is undefined.");
                return;
            }

            let result;
            let calculationNote = "";

            try {
                // Handling negative numbers
                if (x < 0) {
                    if (n % 2 === 1 || n % 2 === -1) {
                        // Odd root of negative number is negative
                        // e.g., cbrt(-8) = -2
                        result = -Math.pow(-x, 1/n);
                    } else {
                        // Even root of negative number is complex/imaginary
                        showError("Even root of a negative number is not a real number.");
                        return;
                    }
                } else {
                    result = Math.pow(x, 1/n);
                }

                // Check for infinity
                if (!isFinite(result)) {
                    showError("Result is undefined or infinite.");
                    return;
                }

                // Display
                elResultValue.innerText = formatNumber(result);
                
                // Construct Formula Text
                let ordinal = "th";
                if(n===2) ordinal = "Square";
                else if(n===3) ordinal = "Cube";
                else ordinal = n + "th";
                
                const rootName = (n===2 || n===3) ? ordinal + " Root" : ordinal + " Root";

                elFormula.innerText = `${rootName} of ${x} ≈ ${formatNumber(result)}`;
                elResultBox.style.display = 'block';
                
                // Save state with result visible
                saveData(true);

            } catch (e) {
                showError("Calculation Error.");
            }
        }

        function formatNumber(num) {
            if (Number.isInteger(num)) return num;
            // Clean up float precision issues (e.g. 3.00000000004)
            return parseFloat(num.toFixed(8));
        }

        function showError(msg) {
            elError.innerText = msg;
            elError.style.display = 'block';
        }

        // --- Local Storage Functions ---

        function autoSave() {
            saveData(false);
        }

        function saveData(showResult = false) {
            const data = {
                number: elNumber.value,
                degree: elDegree.value,
                hasResult: showResult || (elResultBox.style.display === 'block')
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.number !== undefined) elNumber.value = data.number;
                    if (data.degree !== undefined) elDegree.value = data.degree;
                    
                    if (data.hasResult && data.number && data.degree) {
                        calculateRoot();
                    }
                } catch (e) {
                    console.error("Error loading data");
                }
            }
        }

        function clearData() {
            if(confirm("Are you sure you want to clear all data?")) {
                localStorage.removeItem(STORAGE_KEY);
                elNumber.value = '';
                elDegree.value = '2'; // Reset to square root default
                elResultBox.style.display = 'none';
                elError.style.display = 'none';
                updatePreview();
                checkPresets();
            }
        }
    </script>
</body>
</html>
