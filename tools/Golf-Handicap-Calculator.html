    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

        /* Fixed Header */

            height: 50px;
            background-color: #047857; /* Golf Green */

            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;

            z-index: 1000;

        header h1 {
            font-size: 20px;

        .container {
            max-width: 1200px;

            box-shadow: 0 8px 24px rgba(0,0,0,0.08);

        .grid {
            display: grid;

        /* Form Inputs Section */

        .input-group input {
            width: 100%;

        .main-result-label {

        .main-result-value {

        .main-result-sub {
            font-size: 14px;

            margin-top: 5px;
            display: block;
        }

        /* Table Styles */
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            text-align: center;

        th, td {
            padding: 12px 10px;

        th {
            background-color: #f8fafc;
            color: #4a5568;

        .btn-delete {

        .btn-delete:hover {

        }

        /* Mobile Responsive Layout - Both side blank spaces removed */
        @media (max-width: 768px) {
            body {
                background-color: #ffffff; 
            }
            .container {
                max-width: 100%;
                margin: 0;
                padding: 20px 15px; /* Removes outer margins completely, maintains slight inner padding for readability */
                border-radius: 0;
                box-shadow: none;
                min-height: calc(100vh - 50px);
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 30px;

                padding: 20px 15px;

</head>
<body>

    <header>
        <h1>Golf Handicap Calculator</h1>
    </header>

    <div class="container">
        <div class="grid">
            
            <!-- Inputs Panel -->
            <div class="calculator-inputs">
                <h2 style="font-size: 18px; color: #1e293b; margin-bottom: 10px;">Add a Round</h2>
                
                <div class="input-group">
                    <label for="score">18-Hole Score (Adjusted Gross)</label>
                    <input type="number" id="score" placeholder="e.g. 85" min="30" max="200">
                </div>
                
                <div class="input-group">
                    <label for="rating">Course Rating</label>
                    <input type="number" id="rating" placeholder="e.g. 71.2" step="0.1" min="50" max="90">
                </div>

                <div class="input-group">
                    <label for="slope">Slope Rating</label>
                    <input type="number" id="slope" placeholder="e.g. 125" min="55" max="155">
                </div>
                
                <button class="btn-add" id="addBtn">Add Round to History</button>
                <button class="btn-clear" id="clearBtn">Clear All Data</button>
                
                <p style="font-size: 12px; color: #64748b; margin-top: 10px;">
                    *Enter at least 3 rounds to calculate your initial Handicap Index. Calculations use the standard World Handicap System (WHS) logic.
                </p>
            </div>

            <!-- Results Panel -->
            <div class="results-section">
                
                <div class="main-result">
                    <span class="main-result-label">Your Handicap Index</span>
                    <span class="main-result-value" id="handicapIndex">N/A</span>
                    <span class="main-result-sub" id="handicapSub">Need at least 3 rounds to calculate</span>
                </div>

                <div class="table-container">
                    <table id="roundsTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Score</th>
                                <th>Course Rtg</th>
                                <th>Slope</th>
                                <th>Diff</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>

            </div>

        </div>
    </div>

    <!-- JavaScript Logic & Local Storage -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const elScore = document.getElementById('score');
            const elRating = document.getElementById('rating');
            const elSlope = document.getElementById('slope');
            
            const btnAdd = document.getElementById('addBtn');
            const btnClear = document.getElementById('clearBtn');
            
            const tableBody = document.getElementById('tableBody');
            const handicapIndexEl = document.getElementById('handicapIndex');
            const handicapSubEl = document.getElementById('handicapSub');

            const STORAGE_KEY = 'toolshub365_golf_handicap_data';
            
            // Array to store rounds
            let rounds =[];

            // Helper to format numbers safely
            const formatDec = (num) => (Math.round(num * 10) / 10).toFixed(1);

            // Calculate Handicap logic based on WHS
            const calculateHandicap = () => {
                if (rounds.length < 3) {
                    handicapIndexEl.innerText = 'N/A';
                    handicapSubEl.innerText = `Need ${3 - rounds.length} more round(s) to calculate`;
                    return;
                }

                // Get differentials of up to the last 20 rounds
                let recentRounds = rounds.slice(-20);
                let differentials = recentRounds.map(r => r.differential);
                let count = differentials.length;

                // Sort differentials lowest to highest
                differentials.sort((a, b) => a - b);

                let index = 0;
                let usedCount = 0;
                let adjustment = 0;

                if (count === 3) { usedCount = 1; adjustment = -2.0; }
                else if (count === 4) { usedCount = 1; adjustment = -1.0; }
                else if (count === 5) { usedCount = 1; adjustment = 0; }
                else if (count === 6) { usedCount = 2; adjustment = -1.0; }
                else if (count >= 7 && count <= 8) { usedCount = 2; adjustment = 0; }
                else if (count >= 9 && count <= 11) { usedCount = 3; adjustment = 0; }
                else if (count >= 12 && count <= 14) { usedCount = 4; adjustment = 0; }
                else if (count >= 15 && count <= 16) { usedCount = 5; adjustment = 0; }
                else if (count >= 17 && count <= 18) { usedCount = 6; adjustment = 0; }
                else if (count === 19) { usedCount = 7; adjustment = 0; }
                else if (count === 20) { usedCount = 8; adjustment = 0; }

                // Sum the used lowest differentials
                let sum = 0;
                for (let i = 0; i < usedCount; i++) {
                    sum += differentials[i];
                }

                // Average and adjust
                index = (sum / usedCount) + adjustment;

                // Cap logic (Max handicap index is 54.0)
                if (index > 54.0) index = 54.0;
                
                // Format display
                let formattedIndex = formatDec(index);
                // "+" handicaps are for better than scratch golfers
                if (index < 0) {
                    formattedIndex = "+" + formatDec(Math.abs(index));
                }

                handicapIndexEl.innerText = formattedIndex;
                handicapSubEl.innerText = `Based on lowest ${usedCount} of last ${count} round(s)`;
            };

            // Render Table
            const renderTable = () => {
                tableBody.innerHTML = '';
                
                if (rounds.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="6" style="color:#94a3b8; padding: 20px;">No rounds added yet.</td></tr>`;
                    return;
                }

                rounds.forEach((round, i) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${i + 1}</td>
                        <td><strong>${round.score}</strong></td>
                        <td>${formatDec(round.rating)}</td>
                        <td>${round.slope}</td>
                        <td style="color: #047857; font-weight: 600;">${formatDec(round.differential)}</td>
                        <td><button class="btn-delete" data-index="${i}">X</button></td>
                    `;
                    tableBody.appendChild(tr);
                });

                // Attach event listeners to newly created delete buttons
                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const index = parseInt(e.target.getAttribute('data-index'));
                        rounds.splice(index, 1);
                        updateApp();
                    });
                });
            };

            // Add new round
            const addRound = () => {
                const score = parseInt(elScore.value);
                const rating = parseFloat(elRating.value);
                const slope = parseInt(elSlope.value);

                if (isNaN(score) || isNaN(rating) || isNaN(slope)) {
                    alert("Please fill in all fields with valid numbers.");
                    return;
                }
                if (slope < 55 || slope > 155) {
                    alert("Slope rating must be between 55 and 155.");
                    return;
                }

                // Calculate Differential: (Score - Course Rating) x 113 / Slope Rating
                const differential = ((score - rating) * 113) / slope;

                rounds.push({
                    score: score,
                    rating: rating,
                    slope: slope,
                    differential: differential
                });

                // Clear inputs
                elScore.value = '';
                // Optional: Keep rating and slope as they are often the same course
                elScore.focus();

                updateApp();
            };

            // Update App State
            const updateApp = () => {
                renderTable();
                calculateHandicap();
                saveData();
            };

            // Save user data securely
            const saveData = () => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(rounds));
            };

            // Auto-load data from device
            const loadSavedData = () => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        rounds = JSON.parse(saved);
                        if (!Array.isArray(rounds)) rounds =[];
                    } catch (e) {
                        rounds =[];
                    }
                }
                updateApp();
            };

            // Event Listeners
            btnAdd.addEventListener('click', addRound);
            
            btnClear.addEventListener('click', () => {
                if(confirm("Are you sure you want to clear all rounds?")) {
                    rounds =[];
                    elScore.value = '';
                    elRating.value = '';
                    elSlope.value = '';
                    updateApp();
                }
            });

            // Allow "Enter" key to automatically trigger the Add Round logic
            [elScore, elRating, elSlope].forEach(el => {
                el.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        addRound();
                    }
                });
            });

            // Initialize
            loadSavedData();
        });
    </script>
</body>
</html>
