<!DOCTYPE html>

<html lang="en">

    <meta charset="UTF-8">

    <meta property="og:title" content="Payment Calculator">

    <script type="application/ld+json">

    <style>
        :root {
            /* Theme: Trustworthy Teal/Blue */
            --primary-color: #00897b;
            --secondary-color: #004d40;
            --accent-color: #ff6f00;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #37474f;
            --border-color: #cfd8dc;
            --header-height: 50px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            -webkit-font-smoothing: antialiased;
        }

        /* --- Header --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* --- Main Container --- */
        .container {
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Desktop Specifics */
        @media (min-width: 769px) {
            .container {
                max-width: 1200px;
                padding: 40px 20px;
            }
            .col-left, .col-right {
                flex: 1;
                background: var(--card-bg);
                border-radius: 12px;
                padding: 35px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            }
        }

        /* Mobile Specifics */
        @media (max-width: 768px) {
            .container {
                padding: 0; /* Remove blank space */
                gap: 0;
            }
            .col-left, .col-right {
                width: 100%;
                border-radius: 0;
                padding: 25px 20px;
                background: var(--card-bg);
                border-bottom: 1px solid var(--border-color);
            }
            /* Stack: Inputs first */
            .col-left { order: 1; }
            .col-right { order: 2; }
        }

        /* --- Typography --- */
        h2 {
            font-size: 1.4rem;
            margin-bottom: 25px;
            color: var(--secondary-color);
            font-weight: 600;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        /* --- Form Elements --- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #546e7a;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-prefix, .input-suffix {
            position: absolute;
            color: #78909c;
            font-weight: 500;
            pointer-events: none;
        }

        .input-prefix { left: 14px; }
        .input-suffix { right: 14px; }

        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.05rem;
            transition: all 0.2s ease;
            background-color: #fafafa;
            color: #333;
        }

        .has-prefix input { padding-left: 28px; }
        .has-suffix input { padding-right: 35px; }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 137, 123, 0.15);
        }

        /* Range Slider */
        .range-wrapper {
            margin-top: 10px;
        }
        
        input[type="range"] {
            width: 100%;
            accent-color: var(--primary-color);
            cursor: pointer;
            height: 6px;
            background: #eceff1;
            border-radius: 3px;
            appearance: none;
        }

        /* Term Inputs (Years/Months) */
        .term-container {
            display: flex;
            gap: 15px;
        }
        .term-box {
            flex: 1;
        }

        /* --- Buttons --- */
        .btn-group {
            display: flex;
            margin-top: 30px;
        }

        .btn-clear {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            background-color: white;
            color: #546e7a;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-clear:hover {
            background-color: #f5f5f5;
            color: #333;
        }

        /* --- Results Area --- */
        .result-card {
            background: #e0f2f1;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid #b2dfdb;
        }

        .payment-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--secondary-color);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .payment-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        /* Chart */
        .chart-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .pie-chart {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: conic-gradient(var(--primary-color) 0deg 360deg);
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: background 0.5s ease;
        }

        /* Summary List */
        .summary-list {
            list-style: none;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            font-size: 1rem;
        }

        .summary-item:last-child {
            border-bottom: none;
            font-weight: 700;
            color: var(--secondary-color);
            font-size: 1.1rem;
            margin-top: 10px;
            border-top: 2px solid #eee;
        }

        .legend-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .dot-principal { background-color: var(--primary-color); }
        .dot-interest { background-color: var(--accent-color); }

    </style>
</head>
<body>

<header>
    <h1>Payment Calculator</h1>
</header>

<div class="container">
    <!-- Input Section -->
    <div class="col-left">
        <h2>Loan Details</h2>
        <form id="paymentForm">
            
            <!-- Loan Amount -->
            <div class="form-group">
                <label for="loanAmount">Loan Amount</label>
                <div class="input-group has-prefix">
                    <span class="input-prefix">$</span>
                    <input type="number" id="loanAmount" min="0" step="100" placeholder="10000">
                </div>
            </div>

            <!-- Interest Rate -->
            <div class="form-group">
                <label for="interestRate">Annual Interest Rate</label>
                <div class="input-group has-suffix">
                    <input type="number" id="interestRate" min="0" max="100" step="0.01" placeholder="5.5">
                    <span class="input-suffix">%</span>
                </div>
                <div class="range-wrapper">
                    <input type="range" id="rateSlider" min="0" max="25" step="0.1" value="5.5">
                </div>
            </div>

            <!-- Loan Term -->
            <div class="form-group">
                <label>Loan Term</label>
                <div class="term-container">
                    <div class="term-box">
                        <div class="input-group has-suffix">
                            <input type="number" id="termYears" min="0" max="50" placeholder="Years">
                            <span class="input-suffix">Yrs</span>
                        </div>
                    </div>
                    <div class="term-box">
                        <div class="input-group has-suffix">
                            <input type="number" id="termMonths" min="0" max="11" placeholder="Months">
                            <span class="input-suffix">Mos</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn-clear" id="clearBtn">Clear Data</button>
            </div>
        </form>
    </div>

    <!-- Results Section -->
    <div class="col-right">
        <h2>Payment Breakdown</h2>
        
        <div class="result-card">
            <div class="payment-title">Monthly Payment</div>
            <div class="payment-value" id="outMonthlyPayment">$0.00</div>
        </div>

        <div class="chart-wrapper">
            <div class="pie-chart" id="chartVisual"></div>
        </div>

        <ul class="summary-list">
            <li class="summary-item">
                <span><span class="legend-dot dot-principal"></span>Principal Amount</span>
                <strong id="outPrincipal">$0.00</strong>
            </li>
            <li class="summary-item">
                <span><span class="legend-dot dot-interest"></span>Total Interest</span>
                <strong id="outInterest">$0.00</strong>
            </li>
            <li class="summary-item">
                <span>Total Payback</span>
                <strong id="outTotal">$0.00</strong>
            </li>
        </ul>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        
        // --- DOM References ---
        const inputs = {
            amount: document.getElementById('loanAmount'),
            rate: document.getElementById('interestRate'),
            slider: document.getElementById('rateSlider'),
            years: document.getElementById('termYears'),
            months: document.getElementById('termMonths')
        };

        const outputs = {
            monthly: document.getElementById('outMonthlyPayment'),
            principal: document.getElementById('outPrincipal'),
            interest: document.getElementById('outInterest'),
            total: document.getElementById('outTotal'),
            chart: document.getElementById('chartVisual')
        };

        const clearBtn = document.getElementById('clearBtn');

        // --- Defaults ---
        const DEFAULTS = {
            amount: 25000,
            rate: 5.0,
            years: 5,
            months: 0
        };

        // --- Helper: Currency Format ---
        const toCurrency = (num) => {
            return new Intl.NumberFormat('en-US', { 
                style: 'currency', 
                currency: 'USD',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2 
            }).format(num);
        };

        // --- Calculation Logic ---
        const calculate = () => {
            let P = parseFloat(inputs.amount.value) || 0;
            let rAnnual = parseFloat(inputs.rate.value) || 0;
            let termY = parseFloat(inputs.years.value) || 0;
            let termM = parseFloat(inputs.months.value) || 0;

            // Sync slider
            inputs.slider.value = rAnnual;

            // Total months
            let n = (termY * 12) + termM;
            
            // Monthly interest rate
            let rMonthly = (rAnnual / 100) / 12;

            let monthlyPayment = 0;
            let totalPayment = 0;
            let totalInterest = 0;

            if (P > 0 && n > 0) {
                if (rAnnual === 0) {
                    monthlyPayment = P / n;
                } else {
                    // Standard Amortization Formula
                    // M = P * ( r(1+r)^n ) / ( (1+r)^n - 1 )
                    let mathPow = Math.pow(1 + rMonthly, n);
                    if (isFinite(mathPow)) {
                        monthlyPayment = P * ((rMonthly * mathPow) / (mathPow - 1));
                    }
                }
                
                totalPayment = monthlyPayment * n;
                totalInterest = totalPayment - P;
            } else if (P > 0 && n === 0) {
                // No term defined, simple view
                monthlyPayment = 0; 
                totalPayment = P; 
                totalInterest = 0; 
            }

            // --- Update UI ---
            outputs.monthly.textContent = toCurrency(monthlyPayment);
            outputs.principal.textContent = toCurrency(P);
            outputs.interest.textContent = toCurrency(totalInterest);
            outputs.total.textContent = toCurrency(totalPayment);

            // --- Update Chart (Principal vs Interest) ---
            if (totalPayment > 0) {
                let pPercent = (P / totalPayment) * 100;
                let iPercent = 100 - pPercent; // Remainder is interest

                // CSS Conic Gradient: 
                // Color 1 (Principal) from 0% to pPercent
                // Color 2 (Interest) from pPercent to 100%
                outputs.chart.style.background = `conic-gradient(
                    var(--primary-color) 0% ${pPercent}%,
                    var(--accent-color) ${pPercent}% 100%
                )`;
            } else {
                outputs.chart.style.background = '#eceff1'; // Grey placeholder
            }

            saveData();
        };

        // --- Data Persistence ---
        const saveData = () => {
            const data = {
                amount: inputs.amount.value,
                rate: inputs.rate.value,
                years: inputs.years.value,
                months: inputs.months.value
            };
            localStorage.setItem('paymentCalc_v1', JSON.stringify(data));
        };

        const loadData = () => {
            const saved = localStorage.getItem('paymentCalc_v1');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    inputs.amount.value = data.amount;
                    inputs.rate.value = data.rate;
                    inputs.years.value = data.years;
                    inputs.months.value = data.months;
                } catch (e) {
                    resetForm();
                }
            } else {
                resetForm();
            }
            calculate();
        };

        const resetForm = () => {
            inputs.amount.value = DEFAULTS.amount;
            inputs.rate.value = DEFAULTS.rate;
            inputs.years.value = DEFAULTS.years;
            inputs.months.value = DEFAULTS.months;
        };

        const clearData = () => {
            localStorage.removeItem('paymentCalc_v1');
            inputs.amount.value = '';
            inputs.rate.value = '';
            inputs.years.value = '';
            inputs.months.value = '';
            // Reset slider visual
            inputs.slider.value = 0;
            // Recalculate to show zeros
            calculate();
        };

        // --- Event Listeners ---
        
        // Listen to all text/number inputs
        Object.values(inputs).forEach(el => {
            if(el) el.addEventListener('input', calculate);
        });

        // Specific slider listener logic (bi-directional sync handled in calculate, but needs trigger)
        inputs.slider.addEventListener('input', function() {
            inputs.rate.value = this.value;
            calculate();
        });

        clearBtn.addEventListener('click', clearData);

        // Initialize
        loadData();

    });
</script>

</body>
</html>
