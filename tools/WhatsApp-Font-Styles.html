            function applyUnicodeMap(text, mapKey) {
                let result = '';
                const mapChars = Array.from(maps[mapKey]); // Array.from safely parses surrogate pairs
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const index = normalChars.indexOf(char);
                    if (index !== -1) {
                        result += mapChars[index] || char;
                    } else {
                        result += char; // Keep special characters & spaces as is
                    }
                }
                return result;
            }

            function processStyles(text) {
                resultsContainer.innerHTML = ''; // Clear prior results
                
                if (!text.trim()) {
                    resultsContainer.innerHTML = '<div class="empty-state">Begin typing to preview exciting font styles!</div>';
                    return;
                }

                const fontVariations =[
                    { label: 'WhatsApp Native Bold', value: `*${text}*` },
                    { label: 'WhatsApp Native Italic', value: `_${text}_` },
                    { label: 'WhatsApp Native Strikethrough', value: `~${text}~` },
                    { label: 'WhatsApp Native Monospace', value: "```" + text + "```" },
                    
                    // Fancy unicode mappings
                    { label: 'Fancy Bold', value: applyUnicodeMap(text, 'fancyBold') },
                    { label: 'Fancy Italic', value: applyUnicodeMap(text, 'fancyItalic') },
                    { label: 'Serif Bold Italic', value: applyUnicodeMap(text, 'mathBoldItalic') },
                    { label: 'Sans Bold Italic', value: applyUnicodeMap(text, 'mathSansBoldItalic') },
                    { label: 'Script Cursive', value: applyUnicodeMap(text, 'script') },
                    { label: 'Script Bold', value: applyUnicodeMap(text, 'scriptBold') },
                    { label: 'Fraktur Normal', value: applyUnicodeMap(text, 'frakturNormal') },
                    { label: 'Fraktur Bold', value: applyUnicodeMap(text, 'frakturBold') },
                    { label: 'Double Struck', value: applyUnicodeMap(text, 'doubleStruck') },
                    { label: 'Wide Text', value: applyUnicodeMap(text, 'wide') },
                    { label: 'Small Caps', value: applyUnicodeMap(text, 'smallCaps') },
                    { label: 'Circled', value: applyUnicodeMap(text, 'circled') },
                    { label: 'Dark Circled', value: applyUnicodeMap(text, 'darkCircled') },
                    { label: 'Squared', value: applyUnicodeMap(text, 'squared') },
                    { label: 'Dark Squared', value: applyUnicodeMap(text, 'darkSquared') },
                    { label: 'Parenthesized', value: applyUnicodeMap(text, 'parenthesized') },
                    { label: 'Monospace (Unicode)', value: applyUnicodeMap(text, 'monospace') },
                    
                    // Transformation effects
                    { label: 'Reversed Text', value: text.split('').reverse().join('') },
                    { label: 'Upside Down', value: applyUnicodeMap(text, 'inverted').split('').reverse().join('') },
                    { label: 'Unicode Strikethrough', value: text.split('').map(c => c + '\u0336').join('') },
                    { label: 'Unicode Underline', value: text.split('').map(c => c + '\u0332').join('') },
                    { label: 'Dotted Underneath', value: text.split('').map(c => c + '\u0324').join('') }
                ];

                // Build DOM Elements
                fontVariations.forEach((item) => {
                    const wrapDiv = document.createElement('div');
                    wrapDiv.className = 'result-item';

                    const textDiv = document.createElement('div');
                    textDiv.className = 'text-container';
                    
                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'style-name';
                    labelDiv.innerText = item.label;

                    const valDiv = document.createElement('div');
                    valDiv.className = 'result-text';
                    valDiv.innerText = item.value;

                    textDiv.appendChild(labelDiv);
                    textDiv.appendChild(valDiv);

                    const copyButton = document.createElement('button');
                    copyButton.className = 'copy-btn';
                    copyButton.innerText = 'Copy';
                    copyButton.onclick = () => {
                        navigator.clipboard.writeText(item.value).then(() => {
                            copyButton.innerText = 'Copied!';
                            copyButton.style.backgroundColor = '#075E54';
                            setTimeout(() => {
                                copyButton.innerText = 'Copy';
                                copyButton.style.backgroundColor = '#25D366';
                            }, 2000);
                        });
                    };

                    wrapDiv.appendChild(textDiv);
                    wrapDiv.appendChild(copyButton);

                    resultsContainer.appendChild(wrapDiv);
                });
            }

            // Listeners
            inputField.addEventListener('input', (event) => {
                const currentText = event.target.value;
                localStorage.setItem(storageKey, currentText); // Auto-save
                processStyles(currentText);
            });

            clearBtn.addEventListener('click', () => {
                inputField.value = '';
                localStorage.removeItem(storageKey); // Clear saved data
                processStyles('');
            });

            // Initial trigger
            processStyles(inputField.value);
        });
    </script>
</body>
</html>
