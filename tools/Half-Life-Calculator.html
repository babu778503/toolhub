<!DOCTYPE html>
<!-- Category: Math Calculators -->
<html lang="en">
<head>

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --accent-hover: #219150;
            --header-bg: #1a1a1a;
            --header-text: #ffffff;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --input-bg: #f8f9fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Space for fixed header */
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 700;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Calculator Card */
        .calculator-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--primary-color);
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background-color: var(--input-bg);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.1);
        }

        /* Visual cue for disabled inputs */
        .input-hidden {
            display: none;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            flex: 1;
        }

        .btn-calc {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-calc:hover {
            background-color: var(--accent-hover);
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        /* Result Display */
        .result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #e8f5e9;
            border-left: 5px solid var(--accent-color);
            border-radius: 4px;
            display: none; /* Hidden by default */
        }

        .result-box h3 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .result-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-color);
            word-break: break-all;
        }

        .formula-display {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9rem;
            color: #666;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                padding: 0;
                margin: 0;
                width: 100%;
                max-width: 100%;
            }

            .calculator-card {
                max-width: 100%;
                border-radius: 0;
                border: none;
                box-shadow: none;
                padding: 20px;
                min-height: calc(100vh - 50px);
            }

            h2 {
                font-size: 1.2rem;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        Half-Life Calculator
    </header>

    <div class="container">
        <div class="calculator-card">
            
            <div class="form-group">
                <label for="calcMode">What would you like to calculate?</label>
                <select id="calcMode" onchange="updateInputs()">
                    <option value="Nt">Remaining Amount (Nt)</option>
                    <option value="N0">Initial Amount (N0)</option>
                    <option value="time">Time Elapsed (t)</option>
                    <option value="halfLife">Half-Life (t½)</option>
                </select>
            </div>

            <!-- Input: Initial Amount -->
            <div class="form-group" id="group-N0">
                <label for="inputN0">Initial Amount (N₀)</label>
                <input type="number" id="inputN0" placeholder="e.g. 100" step="any">
            </div>

            <!-- Input: Remaining Amount -->
            <div class="form-group" id="group-Nt">
                <label for="inputNt">Remaining Amount (Nₜ)</label>
                <input type="number" id="inputNt" placeholder="e.g. 50" step="any">
            </div>

            <!-- Input: Time Elapsed -->
            <div class="form-group" id="group-time">
                <label for="inputTime">Time Elapsed (t)</label>
                <input type="number" id="inputTime" placeholder="e.g. 10" step="any">
            </div>

            <!-- Input: Half Life -->
            <div class="form-group" id="group-halfLife">
                <label for="inputHalfLife">Half-Life (t½)</label>
                <input type="number" id="inputHalfLife" placeholder="e.g. 5" step="any">
            </div>

            <div class="btn-group">
                <button class="btn-calc" onclick="calculate()">Calculate</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div class="result-box" id="resultContainer">
                <h3>Result:</h3>
                <div class="result-value" id="resultDisplay">0</div>
                <div class="formula-display" id="formulaDisplay"></div>
            </div>

        </div>
    </div>

    <script>
        // DOM Elements
        const modeSelect = document.getElementById('calcMode');
        const inputN0 = document.getElementById('inputN0');
        const inputNt = document.getElementById('inputNt');
        const inputTime = document.getElementById('inputTime');
        const inputHalfLife = document.getElementById('inputHalfLife');
        
        const groupN0 = document.getElementById('group-N0');
        const groupNt = document.getElementById('group-Nt');
        const groupTime = document.getElementById('group-time');
        const groupHalfLife = document.getElementById('group-halfLife');

        const resultContainer = document.getElementById('resultContainer');
        const resultDisplay = document.getElementById('resultDisplay');
        const formulaDisplay = document.getElementById('formulaDisplay');

        // Storage Key
        const STORAGE_KEY = 'toolshub365_halflife_data';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            updateInputs();
        });

        // Toggle Input Visibility based on Calculation Mode
        function updateInputs() {
            const mode = modeSelect.value;
            
            // Show all first
            groupN0.style.display = 'block';
            groupNt.style.display = 'block';
            groupTime.style.display = 'block';
            groupHalfLife.style.display = 'block';

            // Hide the one being calculated
            if (mode === 'N0') groupN0.style.display = 'none';
            if (mode === 'Nt') groupNt.style.display = 'none';
            if (mode === 'time') groupTime.style.display = 'none';
            if (mode === 'halfLife') groupHalfLife.style.display = 'none';
            
            // Hide result when mode changes until calculated
            resultContainer.style.display = 'none';
        }

        function calculate() {
            const mode = modeSelect.value;
            let result = 0;
            let formulaText = '';
            let valid = true;

            // Get values
            const N0 = parseFloat(inputN0.value);
            const Nt = parseFloat(inputNt.value);
            const t = parseFloat(inputTime.value);
            const tHalf = parseFloat(inputHalfLife.value);

            try {
                switch(mode) {
                    case 'Nt': // Find Remaining
                        if (isNaN(N0) || isNaN(t) || isNaN(tHalf)) throw "Please fill all fields";
                        if (tHalf === 0) throw "Half-life cannot be zero";
                        
                        // Formula: Nt = N0 * (0.5)^(t/tHalf)
                        result = N0 * Math.pow(0.5, t / tHalf);
                        formulaText = `Nₜ = ${N0} × (0.5)^(${t}/${tHalf})`;
                        break;

                    case 'N0': // Find Initial
                        if (isNaN(Nt) || isNaN(t) || isNaN(tHalf)) throw "Please fill all fields";
                        if (tHalf === 0) throw "Half-life cannot be zero";
                        
                        // Formula: N0 = Nt / (0.5)^(t/tHalf)
                        result = Nt / Math.pow(0.5, t / tHalf);
                        formulaText = `N₀ = ${Nt} / (0.5)^(${t}/${tHalf})`;
                        break;

                    case 'time': // Find Time
                        if (isNaN(N0) || isNaN(Nt) || isNaN(tHalf)) throw "Please fill all fields";
                        if (N0 <= 0 || Nt <= 0) throw "Amounts must be greater than zero for time calc";
                        if (Nt > N0) throw "Remaining amount cannot be greater than initial amount";
                        
                        // Formula: t = tHalf * log2(N0 / Nt)
                        // Equivalent: t = (tHalf * ln(N0/Nt)) / ln(2)
                        result = (tHalf * Math.log(N0 / Nt)) / Math.log(2);
                        formulaText = `t = ${tHalf} × log₂(${N0}/${Nt})`;
                        break;

                    case 'halfLife': // Find Half Life
                        if (isNaN(N0) || isNaN(Nt) || isNaN(t)) throw "Please fill all fields";
                        if (N0 <= 0 || Nt <= 0) throw "Amounts must be greater than zero";
                        if (Nt > N0) throw "Remaining amount cannot be greater than initial amount";
                        
                        // Formula: tHalf = (t * ln(2)) / ln(N0/Nt)
                        result = (t * Math.log(2)) / Math.log(N0 / Nt);
                        formulaText = `t½ = (${t} × ln(2)) / ln(${N0}/${Nt})`;
                        break;
                }

                // Display Result
                resultDisplay.innerText = formatNumber(result);
                formulaDisplay.innerText = formulaText;
                resultContainer.style.display = 'block';
                
                saveData();

            } catch (error) {
                alert(error);
                resultContainer.style.display = 'none';
            }
        }

        // Helper to format nice numbers
        function formatNumber(num) {
            if (Number.isInteger(num)) return num;
            if (Math.abs(num) < 0.0001 || Math.abs(num) > 1000000) {
                return num.toExponential(4);
            }
            return parseFloat(num.toFixed(6)); // Clean up floating point errors
        }

        // --- Local Storage Functions ---

        function saveData() {
            const data = {
                mode: modeSelect.value,
                n0: inputN0.value,
                nt: inputNt.value,
                time: inputTime.value,
                halfLife: inputHalfLife.value,
                result: resultDisplay.innerText,
                resultVisible: resultContainer.style.display
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if(data.mode) modeSelect.value = data.mode;
                    if(data.n0) inputN0.value = data.n0;
                    if(data.nt) inputNt.value = data.nt;
                    if(data.time) inputTime.value = data.time;
                    if(data.halfLife) inputHalfLife.value = data.halfLife;
                    
                    if(data.result && data.resultVisible === 'block') {
                        resultDisplay.innerText = data.result;
                        resultContainer.style.display = 'block';
                    }
                } catch (e) {
                    console.error("Error loading saved data");
                }
            }
        }

        function clearData() {
            if(confirm('Are you sure you want to clear all data?')) {
                localStorage.removeItem(STORAGE_KEY);
                inputN0.value = '';
                inputNt.value = '';
                inputTime.value = '';
                inputHalfLife.value = '';
                resultContainer.style.display = 'none';
                modeSelect.value = 'Nt';
                updateInputs();
            }
        }
    </script>
</body>
</html>
