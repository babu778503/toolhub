<!-- Category: Financial Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #007bff;
            --primary-dark: #0056b3;
            --secondary-color: #f8f9fa;
            --text-color: #333;
            --header-bg: #2c3e50;
            --header-text: #fff;
            --success-color: #28a745;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: var(--text-color);
            padding-top: 50px; /* Space for fixed header */
        }

        /* Header Styling (Fixed, 50px Height) */
        header {
            width: 100%;
            height: 50px;
            background-color: var(--header-bg);
            color: var(--header-text);
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Main Container Styling */
        .container {
            width: 100%;
            margin: 0 auto;
            background-color: #fff;
            min-height: calc(100vh - 50px);
        }

        /* Desktop specific layout */
        @media (min-width: 769px) {
            .container {
                max-width: 1200px;
                margin: 20px auto; /* Centered with margin */
                border-radius: 8px;
                box-shadow: var(--shadow);
                padding: 40px;
                min-height: auto;
            }
            
            .calculator-wrapper {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 40px;
            }
        }

        /* Mobile specific layout */
        @media (max-width: 768px) {
            .container {
                width: 100%; /* Full width */
                padding: 20px; /* Internal padding for content */
                border-radius: 0;
                box-shadow: none;
            }

            .calculator-wrapper {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
        }

        /* Form Elements */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol, .percent-symbol {
            position: absolute;
            color: #777;
            font-weight: bold;
        }

        .currency-symbol { left: 15px; }
        .percent-symbol { right: 15px; }

        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            padding-left: 30px; /* Space for currency symbol */
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        /* Results Section */
        .results-box {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            border: 1px solid #dee2e6;
        }

        .result-item {
            margin-bottom: 20px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-label {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .result-value.saved {
            color: var(--success-color);
            font-size: 1.8rem;
        }

        /* Buttons */
        .btn-container {
            margin-top: 25px;
            display: flex;
            justify-content: flex-end;
        }

        .btn-clear {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .btn-clear:hover {
            background-color: #c82333;
        }

        /* Accessibility Focus */
        *:focus-visible {
            outline: 2px solid var(--primary-dark);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Percent Off Calculator</h1>
    </header>

    <div class="container">
        <div class="calculator-wrapper">
            <!-- Input Section -->
            <div class="inputs-section">
                <div class="input-group">
                    <label for="originalPrice">Original Price</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="originalPrice" placeholder="0.00" min="0" step="0.01" oninput="calculate()">
                    </div>
                </div>

                <div class="input-group">
                    <label for="discountPercent">Discount Percentage</label>
                    <div class="input-wrapper">
                        <input type="number" id="discountPercent" placeholder="0" min="0" max="100" step="0.1" oninput="calculate()">
                        <span class="percent-symbol">%</span>
                    </div>
                </div>

                <div class="btn-container">
                    <button class="btn-clear" onclick="clearData()">Clear Data</button>
                </div>
            </div>

            <!-- Result Section -->
            <div class="results-box">
                <div class="result-item">
                    <div class="result-label">Final Price</div>
                    <div class="result-value" id="finalPrice">$0.00</div>
                </div>
                <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;">
                <div class="result-item">
                    <div class="result-label">You Save</div>
                    <div class="result-value saved" id="savedAmount">$0.00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const originalPriceInput = document.getElementById('originalPrice');
        const discountPercentInput = document.getElementById('discountPercent');
        const finalPriceDisplay = document.getElementById('finalPrice');
        const savedAmountDisplay = document.getElementById('savedAmount');

        // Load data on page startup
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // Main Calculation Function
        function calculate() {
            let price = parseFloat(originalPriceInput.value);
            let discount = parseFloat(discountPercentInput.value);

            // Validation
            if (isNaN(price) || price < 0) {
                price = 0;
            }
            if (isNaN(discount) || discount < 0) {
                discount = 0;
            }
            if (discount > 100) {
                discount = 100; // Cap at 100%
            }

            // Math Logic
            const savings = price * (discount / 100);
            const finalPrice = price - savings;

            // Update UI
            // Using Intl.NumberFormat for nice currency formatting
            const formatter = new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2
            });

            finalPriceDisplay.textContent = formatter.format(finalPrice);
            savedAmountDisplay.textContent = formatter.format(savings);

            // Save to Local Storage automatically
            saveData();
        }

        // Save Data to Local Storage
        function saveData() {
            const data = {
                price: originalPriceInput.value,
                discount: discountPercentInput.value
            };
            localStorage.setItem('percentOffTool_data', JSON.stringify(data));
        }

        // Load Data from Local Storage
        function loadData() {
            const storedData = localStorage.getItem('percentOffTool_data');
            if (storedData) {
                const data = JSON.parse(storedData);
                if (data.price) originalPriceInput.value = data.price;
                if (data.discount) discountPercentInput.value = data.discount;
                
                // Recalculate if data exists
                if (data.price || data.discount) {
                    calculate();
                }
            }
        }

        // Clear Data Function
        function clearData() {
            // Clear inputs
            originalPriceInput.value = '';
            discountPercentInput.value = '';
            
            // Clear display
            finalPriceDisplay.textContent = '$0.00';
            savedAmountDisplay.textContent = '$0.00';
            
            // Remove from storage
            localStorage.removeItem('percentOffTool_data');
        }
    </script>
</body>
</html>
