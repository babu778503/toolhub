    <style>
        /* --- CSS Reset & Variables --- */
        :root {
            --primary-color: #4834d4;
            --primary-hover: #3c2bb3;
            --bg-color: #f1f2f6;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dcdde1;
            --header-height: 50px;
            --shadow: 0 4px 6px rgba(0,0,0,0.08);
            --highlight-bg: #e056fd15;
            --highlight-border: #e056fd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* --- Header (Fixed, 50px) --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 15px;
        }

        /* --- Main Container --- */
        .container {
            width: 100%;
            max-width: 1200px; /* Desktop Constraint */
            margin: 30px auto;
            background-color: var(--container-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* --- Input Section --- */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 1.05rem;
            color: #555;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            transition: all 0.3s;
            outline: none;
            color: #444;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(72, 52, 212, 0.1);
        }

        .helper-text {
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        /* --- Buttons --- */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
            flex: 2;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
        }

        .btn-clear {
            background-color: #eb4d4b;
            color: white;
            flex: 1;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        .btn:active {
            transform: translateY(2px);
        }

        /* --- Results Section --- */
        .result-area {
            display: none; /* Hidden by default */
            animation: fadeIn 0.4s ease-out;
        }

        .result-card {
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .result-header {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
            display: inline-block;
        }

        .factors-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            background-color: #dfe6e9;
            color: #2d3436;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .badge.common {
            background-color: var(--highlight-bg);
            color: #8e44ad;
            border: 1px solid var(--highlight-border);
            font-weight: bold;
        }

        .gcf-display {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .gcf-label {
            font-size: 0.9rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .gcf-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin-top: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Responsive Logic --- */

        /* Desktop Optimization */
        @media (min-width: 769px) {
            .container {
                margin: 40px auto;
            }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;
                margin: 0; /* Remove blank space on sides */
                border-radius: 0;
                box-shadow: none;
                padding: 20px;
                min-height: calc(100vh - var(--header-height));
            }

            .btn-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                padding: 15px; /* Larger touch target */
            }

            .gcf-value {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Common Factor Calculator</h1>
    </header>

    <div class="container">
        
        <div class="input-group">
            <label for="numbersInput">Enter Integers</label>
            <div class="input-wrapper">
                <input type="text" id="numbersInput" placeholder="e.g. 12, 18, 30" oninput="autoSave()">
            </div>
            <div class="helper-text">Separate numbers with commas, spaces, or tabs.</div>
        </div>

        <div class="btn-row">
            <button class="btn btn-calc" onclick="calculate()">Calculate Common Factors</button>
            <button class="btn btn-clear" onclick="clearData()">Clear Data</button>
        </div>

        <div id="resultSection" class="result-area">
            
            <!-- Breakdown of individual factors -->
            <div id="individualFactorsContainer"></div>

            <!-- Common Factors List -->
            <div class="result-card">
                <div class="result-header">Common Factors</div>
                <div class="factors-list" id="commonFactorsList"></div>
            </div>

            <!-- GCF Result -->
            <div class="gcf-display">
                <div class="gcf-label">Greatest Common Factor (GCF)</div>
                <div class="gcf-value" id="gcfOutput">0</div>
            </div>

        </div>

    </div>

    <script>
        // --- Core Logic ---

        // Function to get factors of a single number
        function getFactors(n) {
            if (n < 1) return [];
            const factors = [];
            for (let i = 1; i <= Math.sqrt(n); i++) {
                if (n % i === 0) {
                    factors.push(i);
                    if (i !== n / i) {
                        factors.push(n / i);
                    }
                }
            }
            return factors.sort((a, b) => a - b);
        }

        // Function to find intersection of multiple arrays
        function getCommonFactors(arrays) {
            if (arrays.length === 0) return [];
            // Start with the first array
            let common = arrays[0];
            
            // Filter common values against subsequent arrays
            for (let i = 1; i < arrays.length; i++) {
                common = common.filter(value => arrays[i].includes(value));
            }
            return common.sort((a, b) => a - b);
        }

        // Main Calculation Function
        function calculate() {
            const inputStr = document.getElementById('numbersInput').value;
            const resultSection = document.getElementById('resultSection');
            const individualContainer = document.getElementById('individualFactorsContainer');
            const commonList = document.getElementById('commonFactorsList');
            const gcfOutput = document.getElementById('gcfOutput');

            // 1. Parse Input
            // Split by comma, space, or tab, filter empty, convert to Number
            const numbers = inputStr.split(/[\s,]+/).filter(s => s.trim() !== '').map(Number);

            // 2. Validate
            if (numbers.length < 2) {
                alert("Please enter at least two positive integers.");
                return;
            }

            for (let num of numbers) {
                if (isNaN(num) || num <= 0 || !Number.isInteger(num)) {
                    alert("Please enter only positive whole numbers.");
                    return;
                }
            }

            // 3. Calculate Factors
            const allFactors = [];
            individualContainer.innerHTML = ''; // Clear previous

            numbers.forEach(num => {
                const factors = getFactors(num);
                allFactors.push(factors);

                // Create UI for individual breakdown
                const div = document.createElement('div');
                div.className = 'result-card';
                let html = `<div class="result-header">Factors of ${num}</div><div class="factors-list">`;
                factors.forEach(f => {
                    html += `<span class="badge">${f}</span>`;
                });
                html += `</div>`;
                div.innerHTML = html;
                individualContainer.appendChild(div);
            });

            // 4. Find Common Factors
            const common = getCommonFactors(allFactors);

            // 5. Update UI for Common Factors
            commonList.innerHTML = '';
            if (common.length > 0) {
                common.forEach(f => {
                    const span = document.createElement('span');
                    span.className = 'badge common';
                    span.textContent = f;
                    commonList.appendChild(span);
                });
                // GCF is the last element because it's sorted
                gcfOutput.textContent = common[common.length - 1];
            } else {
                commonList.innerHTML = '<span>No common factors found (Error).</span>';
                gcfOutput.textContent = 'None';
            }

            // Show results
            resultSection.style.display = 'block';

            // Scroll to results on mobile
            if (window.innerWidth <= 768) {
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            autoSave();
        }

        // --- Local Storage Functionality ---

        function autoSave() {
            const val = document.getElementById('numbersInput').value;
            localStorage.setItem('commonFactorData', val);
        }

        function loadData() {
            const saved = localStorage.getItem('commonFactorData');
            if (saved) {
                document.getElementById('numbersInput').value = saved;
                // Optional: Auto-calculate on load if data exists
                // calculate(); 
            }
        }

        function clearData() {
            if (confirm("Are you sure you want to clear all data?")) {
                localStorage.removeItem('commonFactorData');
                document.getElementById('numbersInput').value = '';
                document.getElementById('resultSection').style.display = 'none';
            }
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
