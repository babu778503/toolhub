        :root {
            --primary-color: #217346;

        body {

            color: var(--text-color);

        /* Fixed Header */
        header {

            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;

            font-weight: 600;
        }

        /* Container */
        .container {
            width: 100%;
            max-width: var(--container-max);
            margin: 0 auto;
            padding: 20px;
        }

        /* Tool Controls */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            position: sticky;
            top: 60px;
            background: var(--bg-color);
            padding: 10px 0;
            z-index: 900;
        }

        #searchInput {

            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #searchInput:focus {
            border-color: var(--primary-color);
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        /* Table Styling */
        .table-wrapper {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            padding: 15px;
            font-weight: 700;
            border-bottom: 2px solid #edf2f7;
            color: var(--primary-color);
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        td {
            padding: 14px 15px;
            border-bottom: 1px solid #edf2f7;
            font-size: 0.95rem;
        }

        .category-row {
            background-color: #eafaf1;
            font-weight: bold;
            color: #1b5e20;
            pointer-events: none;
        }

        .category-row td {
            padding: 10px 15px;
            font-size: 1rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover:not(.category-row) {
            background-color: #f1f9f4;
        }

        kbd {
            background-color: #f7f7f7;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.2), 0 0 0 2px #fff inset;

            display: inline-block;

            .container {
                padding: 0;
            }
            .controls {
                padding: 10px;
                margin-bottom: 0;
            }
            .table-wrapper {

            th, td {

            ]},

                { s: "Go to next worksheet", w: "Ctrl PgDn", m: "⌥ →" },
                { s: "Go to previous worksheet", w: "Ctrl PgUp", m: "⌥ ←" }
            ]},

                { s: "Open VBA Editor", w: "Alt F11", m: "Fn ⌥ F11" },
                { s: "Duplicate object", w: "Ctrl D", m: "⌘ D" },
                { s: "Insert or edit note", w: "Shift F2", m: "Fn ⇧ F2" }
            ]}

        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');

        // Function to render table
        function renderTable(data) {
            tableBody.innerHTML = '';
            data.forEach(category => {
                // Category Header
                const catRow = document.createElement('tr');
                catRow.className = 'category-row';
                catRow.innerHTML = `<td colspan="3">${category.cat}</td>`;
                tableBody.appendChild(catRow);

                // Items
                category.items.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.s}</td>
                        <td>${formatKeys(item.w)}</td>
                        <td>${formatKeys(item.m)}</td>
                    `;
                    tableBody.appendChild(row);
                });
            });
        }

        // Helper to wrap keys in <kbd>
        function formatKeys(keyString) {
            if (!keyString || keyString === "") return "-";
            if (keyString === "drag") return "<em>Drag</em>";
            return keyString.split(' ').map(key => `<kbd>${key}</kbd>`).join(' + ');
        }

        // Filter Function
        function filterData() {
            const query = searchInput.value.toLowerCase();
            localStorage.setItem('excel_search_query', query); // Auto save to device

            const filtered = excelShortcuts.map(category => {
                const filteredItems = category.items.filter(item => 
                    item.s.toLowerCase().includes(query) || 
                    item.w.toLowerCase().includes(query) || 
                    item.m.toLowerCase().includes(query)
                );
                return { ...category, items: filteredItems };
            }).filter(category => category.items.length > 0);

            renderTable(filtered);
        }

        // Clear Function
        function clearSearch() {
            searchInput.value = '';
            localStorage.removeItem('excel_search_query');
            renderTable(excelShortcuts);
        }

        // Initial Load from LocalStorage
        window.onload = () => {
            const savedQuery = localStorage.getItem('excel_search_query');
            if (savedQuery) {
                searchInput.value = savedQuery;
                filterData();
            } else {
                renderTable(excelShortcuts);
            }
        };
