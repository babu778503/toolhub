            text-transform: uppercase;

            .converter-section {

                padding-right: 40px;
            }

            .container {

            position: relative;
        }

            margin-bottom: 8px;

            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Input & Select Styling */
        .input-wrapper {
            position: relative;
            border-radius: 8px;
            background-color: var(--input-bg);
            transition: box-shadow 0.3s ease;

        .input-wrapper:focus-within {
            box-shadow: 0 0 0 2px #667eea;
            background-color: #fff;
        }

        input[type="number"], select {
            width: 100%;
            padding: 16px;
            border: none;
            background: transparent;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            font-family: inherit;
            appearance: none;
            outline: none;
        }

            right: 15px;

            font-size: 0.8rem;

            border-radius: 50%;

            font-size: 1.2rem;

            justify-content: center;

<header>

<div class="container">
    <div class="main-card">
        
        <!-- Left: Inputs -->
        <div class="converter-section">
            <h2>Convert</h2>
            <form id="currencyForm">
                
                <!-- Amount -->
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <div class="input-wrapper">
                        <input type="number" id="amount" value="1" min="0" step="any" placeholder="0.00">
                    </div>
                </div>

                <!-- From Currency -->
                <div class="form-group">
                    <label>From</label>
                    <div class="input-wrapper">
                        <select id="fromCurrency"></select>
                        <span class="select-arrow">▼</span>
                    </div>
                </div>

                <!-- Swap Button -->
                <div class="swap-container">
                    <button type="button" class="btn-swap" id="swapBtn" title="Swap Currencies">⇅</button>
                </div>

                <!-- To Currency -->
                <div class="form-group">
                    <label>To</label>
                    <div class="input-wrapper">
                        <select id="toCurrency"></select>
                        <span class="select-arrow">▼</span>
                    </div>
                </div>
            </form>
            
            <button type="button" class="btn-clear" id="clearBtn">Reset / Clear Data</button>
        </div>

        <!-- Right: Results -->
        <div class="result-section">
            <h2>Result</h2>
            
            <div class="result-card">
                <div class="result-label" id="resultLabel">1 USD =</div>
                <div class="result-value" id="resultValue">...</div>
                <div class="result-code" id="resultCode">Waiting...</div>
                
                <div class="exchange-rate">
                    <span>Market Rate</span>
                    <strong id="singleRate">...</strong>
                </div>
            </div>

            <div class="last-updated">
                <span class="dot-status"></span>
                <span id="updateTime">Updating...</span>
            </div>

            <!-- Mini Cheat Sheet -->
            <div class="ref-table-container">
                <div class="ref-title">Quick Conversion</div>
                <table class="ref-table">
                    <tbody id="quickTable">
                        <!-- JS populated -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

            { code: "TWD", name: "New Taiwan Dollar", flag: "🇹🇼" },
            { code: "TZS", name: "Tanzanian Shilling", flag: "🇹🇿" },
            { code: "UAH", name: "Ukrainian Hryvnia", flag: "🇺🇦" },
            { code: "UGX", name: "Ugandan Shilling", flag: "🇺🇬" },
            { code: "USD", name: "United States Dollar", flag: "🇺🇸" },
            { code: "UYU", name: "Uruguayan Peso", flag: "🇺🇾" },
            { code: "UZS", name: "Uzbekistani So'm", flag: "🇺🇿" },
            { code: "VES", name: "Venezuelan Bolívar Soberano", flag: "🇻🇪" },
            { code: "VND", name: "Vietnamese Đồng", flag: "🇻🇳" },
            { code: "VUV", name: "Vanuatu Vatu", flag: "🇻🇺" },
            { code: "WST", name: "Samoan Tālā", flag: "🇼🇸" },
            { code: "XAF", name: "Central African CFA Franc", flag: "🇨🇲" },
            { code: "XCD", name: "East Caribbean Dollar", flag: "🇦🇬" },
            { code: "XDR", name: "Special Drawing Rights", flag: "🏦" },
            { code: "XOF", name: "West African CFA Franc", flag: "🇨🇮" },
            { code: "XPF", name: "CFP Franc", flag: "🇵🇫" },
            { code: "YER", name: "Yemeni Rial", flag: "🇾🇪" },
            { code: "ZAR", name: "South African Rand", flag: "🇿🇦" },
            { code: "ZMW", name: "Zambian Kwacha", flag: "🇿🇲" },
            { code: "ZWL", name: "Zimbabwean Dollar", flag: "🇿🇼" }
        ];

        // --- DOM Elements ---
        const amountInput = document.getElementById('amount');
        const fromSelect = document.getElementById('fromCurrency');
        const toSelect = document.getElementById('toCurrency');
        const swapBtn = document.getElementById('swapBtn');
        const clearBtn = document.getElementById('clearBtn');
        
        const resultValue = document.getElementById('resultValue');
        const resultLabel = document.getElementById('resultLabel');
        const resultCode = document.getElementById('resultCode');
        const singleRate = document.getElementById('singleRate');
        const updateTime = document.getElementById('updateTime');
        
        const quickTable = document.getElementById('quickTable');
        
        let exchangeRates = {};

        // --- Initialization ---
        
        const init = () => {
            // Sort currencies alphabetically by Code
            currencies.sort((a, b) => a.code.localeCompare(b.code));
            
            // Populate Selects
            let options = '';
            currencies.forEach(c => {
                options += `<option value="${c.code}">${c.flag} ${c.code} - ${c.name}</option>`;
            });
            
            fromSelect.innerHTML = options;
            toSelect.innerHTML = options;

            // Load saved data or defaults
            loadData();
        };

        // --- Logic ---
        
        const fetchRates = async (base) => {
            updateTime.innerText = "Fetching live rates...";
            try {
                // Free API, no key required for client-side
                const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${base}`);
                const data = await res.json();
                
                if (data && data.rates) {
                    exchangeRates = data.rates;
                    
                    // Add date
                    const date = new Date(data.time_last_updated * 1000);
                    updateTime.innerText = `Updated: ${date.toLocaleString()}`;
                    
                    calculate();
                }
            } catch (err) {
                console.error(err);
                updateTime.innerText = "Offline mode / Rate Error";
                // Fallback: If we have cached rates?
                // For this single file, we rely on live fetch mostly.
            }
        };

        const calculate = () => {
            const amount = parseFloat(amountInput.value) || 0;
            const from = fromSelect.value;
            const to = toSelect.value;
            
            const rate = exchangeRates[to];

            if (rate) {
                const finalAmt = amount * rate;
                
                // Format Currency
                const formatter = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: to,
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });

                resultLabel.innerText = `${amount} ${from} =`;
                resultValue.innerText = formatter.format(finalAmt);
                resultCode.innerText = currencies.find(c => c.code === to)?.name || to;
                
                singleRate.innerText = `1 ${from} ≈ ${rate.toFixed(4)} ${to}`;

                updateTable(rate, to);
                saveData();
            }
        };

        const updateTable = (rate, toCode) => {
            const amounts = [1, 10, 50, 100];
            let html = '';
            
            amounts.forEach(amt => {
                let converted = (amt * rate).toFixed(2);
                html += `
                <tr>
                    <td>${amt}</td>
                    <td>${converted} ${toCode}</td>
                </tr>
                `;
            });
            quickTable.innerHTML = html;
        };

        const swap = () => {
            // Animation class
            swapBtn.style.transform = "rotate(180deg)";
            setTimeout(() => { swapBtn.style.transform = "rotate(0deg)"; }, 300);

            const temp = fromSelect.value;
            fromSelect.value = toSelect.value;
            toSelect.value = temp;

            // Fetch new base
            fetchRates(fromSelect.value);
        };

        // --- Data Persistence ---
        const saveData = () => {
            const data = {
                amount: amountInput.value,
                from: fromSelect.value,
                to: toSelect.value
            };
            localStorage.setItem('advCurrency_v2', JSON.stringify(data));
        };

        const loadData = () => {
            const saved = localStorage.getItem('advCurrency_v2');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    amountInput.value = data.amount;
                    fromSelect.value = data.from;
                    toSelect.value = data.to;
                } catch (e) {
                    setDefaults();
                }
            } else {
                setDefaults();
            }
            // Fetch initial
            fetchRates(fromSelect.value);
        };

        const setDefaults = () => {
            amountInput.value = 1;
            fromSelect.value = "USD";
            toSelect.value = "BDT"; // Defaulting to BDT since user context implies it might be useful, or EUR/GBP
        };

        const clearData = () => {
            localStorage.removeItem('advCurrency_v2');
            setDefaults();
            fetchRates("USD");
        };

        // --- Event Listeners ---
        fromSelect.addEventListener('change', () => fetchRates(fromSelect.value));
        toSelect.addEventListener('change', calculate);
        amountInput.addEventListener('input', calculate);
        swapBtn.addEventListener('click', swap);
        clearBtn.addEventListener('click', clearData);

        // Start
        init();
    });
</script>

</body>
</html>
