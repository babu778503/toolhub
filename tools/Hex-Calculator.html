    <style>
        :root {
            --primary-color: #0d9488; /* Teal */
            --primary-hover: #0f766e;
            --header-bg: #1e293b;
            --header-text: #ffffff;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
            --header-height: 50px;
            --danger-color: #ef4444;
            --input-bg: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Main Tool Wrapper */
        .tool-wrapper {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        /* Input Grid */
        .calc-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #64748b;
            font-size: 0.9rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-family: "Courier New", Courier, monospace; /* Monospace for code/hex */
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--text-color);
            text-transform: uppercase; /* Force uppercase visual */
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
        }

        .operator-select {
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            background: white;
            cursor: pointer;
            text-align: center;
            width: 80px;
            align-self: center;
        }

        .operator-row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -10px 0; /* Tighten up spacing */
        }

        /* Decimal Preview (Small Helper Text) */
        .dec-preview {
            position: absolute;
            right: 10px;
            top: 42px;
            font-size: 0.8rem;
            color: #94a3b8;
            font-family: monospace;
            pointer-events: none;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-clear {
            background-color: #fff;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        button:hover {
            opacity: 0.9;
        }

        /* Results */
        .result-section {
            background-color: #f8fafc;
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: none; /* Hidden by default */
        }

        .result-item {
            margin-bottom: 15px;
            text-align: center;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .res-label {
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .res-value {
            font-size: 1.5rem;
            font-weight: bold;
            font-family: "Courier New", Courier, monospace;
            color: var(--primary-color);
            word-break: break-all;
        }

        .res-dec {
            color: var(--text-color);
            font-size: 1.2rem;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 0;
                margin: 0;
            }

            .tool-wrapper {
                border-radius: 0;
                box-shadow: none;
                border: none;
                width: 100%;
                min-height: calc(100vh - var(--header-height));
                padding: 20px;
            }

            .btn-row {
                flex-direction: column;
            }

            input[type="text"] {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Hex Calculator</h1>
    </header>

    <div class="container">
        <main class="tool-wrapper">
            
            <div class="calc-grid">
                <!-- Hex 1 -->
                <div class="input-group">
                    <label for="hex1">Hex Value A</label>
                    <input type="text" id="hex1" placeholder="e.g. 1A" oninput="updatePreview('hex1', 'prev1'); saveData();">
                    <span id="prev1" class="dec-preview">Dec: 0</span>
                </div>

                <!-- Operator -->
                <div class="operator-row">
                    <select id="operator" class="operator-select" onchange="saveData()">
                        <option value="+">+</option>
                        <option value="-">-</option>
                        <option value="*">×</option>
                        <option value="/">÷</option>
                    </select>
                </div>

                <!-- Hex 2 -->
                <div class="input-group">
                    <label for="hex2">Hex Value B</label>
                    <input type="text" id="hex2" placeholder="e.g. FF" oninput="updatePreview('hex2', 'prev2'); saveData();">
                    <span id="prev2" class="dec-preview">Dec: 0</span>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn-calc" onclick="calculate()">Calculate</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div id="result-section" class="result-section">
                <div class="result-item">
                    <div class="res-label">Hex Result</div>
                    <div class="res-value" id="res-hex">0</div>
                </div>
                <div style="border-top: 1px solid #e2e8f0; margin: 15px 0;"></div>
                <div class="result-item">
                    <div class="res-label">Decimal Result</div>
                    <div class="res-value res-dec" id="res-dec">0</div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // --- Logic ---

        // Helper: Validate Hex String
        function isValidHex(str) {
            return /^[0-9A-Fa-f]+$/.test(str);
        }

        // Helper: Live Decimal Preview
        function updatePreview(inputId, previewId) {
            const val = document.getElementById(inputId).value.trim();
            const prevEl = document.getElementById(previewId);
            
            if (!val) {
                prevEl.textContent = "Dec: 0";
                return;
            }

            if (isValidHex(val)) {
                const dec = parseInt(val, 16);
                prevEl.textContent = "Dec: " + dec;
                prevEl.style.color = "#94a3b8";
            } else {
                prevEl.textContent = "Invalid Hex";
                prevEl.style.color = "#ef4444";
            }
        }

        function calculate() {
            const h1 = document.getElementById('hex1').value.trim();
            const h2 = document.getElementById('hex2').value.trim();
            const op = document.getElementById('operator').value;

            if (!h1 || !h2) {
                alert("Please enter both Hex values.");
                return;
            }

            if (!isValidHex(h1) || !isValidHex(h2)) {
                alert("Please enter valid Hexadecimal characters (0-9, A-F).");
                return;
            }

            // Convert to Decimal
            const d1 = parseInt(h1, 16);
            const d2 = parseInt(h2, 16);
            let resDec = 0;

            // Compute
            switch (op) {
                case '+':
                    resDec = d1 + d2;
                    break;
                case '-':
                    resDec = d1 - d2;
                    break;
                case '*':
                    resDec = d1 * d2;
                    break;
                case '/':
                    if (d2 === 0) {
                        alert("Cannot divide by zero.");
                        return;
                    }
                    resDec = Math.floor(d1 / d2); // Integer division for Hex usually implies integer result
                    break;
            }

            // Convert back to Hex
            // Handle negative hex representation if subtraction results in negative
            let resHex = resDec.toString(16).toUpperCase();
            
            // If negative, toString(16) gives "-A". 
            // Often in hex calc, we might want 2's complement, but standard calc usually just shows sign.
            // We stick to standard signed display for simplicity.

            // Display
            document.getElementById('res-hex').textContent = resHex;
            document.getElementById('res-dec').textContent = resDec;
            document.getElementById('result-section').style.display = 'block';
            
            saveData();
        }

        // --- Data Persistence ---
        const STORAGE_KEY = 'hexCalcData';

        function saveData() {
            const data = {
                hex1: document.getElementById('hex1').value,
                hex2: document.getElementById('hex2').value,
                op: document.getElementById('operator').value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                if (data.hex1) {
                    document.getElementById('hex1').value = data.hex1;
                    updatePreview('hex1', 'prev1');
                }
                if (data.hex2) {
                    document.getElementById('hex2').value = data.hex2;
                    updatePreview('hex2', 'prev2');
                }
                if (data.op) document.getElementById('operator').value = data.op;

                // Auto calculate if data exists
                if (data.hex1 && data.hex2) {
                    calculate();
                }
            }
        }

        function clearData() {
            document.getElementById('hex1').value = '';
            document.getElementById('hex2').value = '';
            document.getElementById('operator').value = '+';
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('prev1').textContent = "Dec: 0";
            document.getElementById('prev2').textContent = "Dec: 0";
            localStorage.removeItem(STORAGE_KEY);
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
