    <style>
        /* --- CSS Variables & Reset --- */

<body>

    <header>
        <h1>Least Common Multiple Calculator</h1>
    </header>

    <div class="container">
        
        <div class="input-group">
            <label for="numbersInput">Enter Numbers</label>
            <div class="input-wrapper">
                <input type="text" id="numbersInput" placeholder="e.g. 12, 18, 30" oninput="autoSave()">
            </div>
            <div class="helper-text">Separate numbers with commas, spaces, or tabs.</div>
        </div>

        <div class="btn-group">
            <button class="btn-calc" onclick="calculateLCM()">Calculate LCM</button>
            <button class="btn-clear" onclick="clearData()">Clear Data</button>
        </div>

        <div id="resultSection" class="result-area">
            <div class="result-header">Result (LCM)</div>
            <div class="result-value" id="lcmOutput">0</div>
            
            <div class="steps-container">
                <div class="step-title">Prime Factorization Steps:</div>
                <ul class="factor-list" id="factorSteps">
                    <!-- Steps injected here -->
                </ul>
                <p style="margin-top: 15px; color: #666; font-size: 0.95rem;">
                    The LCM is calculated by multiplying the highest power of every prime number found in the numbers.
                </p>
            </div>
        </div>

    </div>

    <script>
        // --- Core Math Functions ---

        // Greatest Common Divisor (Euclidean Algorithm)
        function gcd(a, b) {
            return !b ? a : gcd(b, a % b);
        }

        // Least Common Multiple for two numbers
        function lcm(a, b) {
            if (a === 0 || b === 0) return 0;
            return Math.abs((a * b) / gcd(a, b));
        }

        // Prime Factorization Helper
        function getPrimeFactors(n) {
            const factors = {};
            let d = 2;
            let temp = n;
            while (d * d <= temp) {
                while (temp % d === 0) {
                    factors[d] = (factors[d] || 0) + 1;
                    temp /= d;
                }
                d++;
            }
            if (temp > 1) {
                factors[temp] = (factors[temp] || 0) + 1;
            }
            return factors;
        }

        // --- Main Calculation Logic ---

        function calculateLCM() {
            const inputStr = document.getElementById('numbersInput').value;
            // Split by comma, space, or tab and filter empty strings
            const numArr = inputStr.split(/[\s,]+/).filter(val => val.trim() !== "").map(Number);

            // Validation
            if (numArr.length < 2) {
                alert("Please enter at least two numbers to calculate LCM.");
                return;
            }

            for(let n of numArr) {
                if(isNaN(n)) {
                    alert("Please enter valid numbers only.");
                    return;
                }
            }

            // Calculate LCM of array
            let result = numArr[0];
            for (let i = 1; i < numArr.length; i++) {
                result = lcm(result, numArr[i]);
            }

            // Display Result
            document.getElementById('lcmOutput').innerText = result;

            // Generate Steps (Prime Factorization Display)
            const stepsList = document.getElementById('factorSteps');
            stepsList.innerHTML = "";

            numArr.forEach(num => {
                const factors = getPrimeFactors(num);
                let factorStr = [];
                for (let [prime, power] of Object.entries(factors)) {
                    factorStr.push(power > 1 ? `${prime}<sup>${power}</sup>` : prime);
                }
                
                const li = document.createElement('li');
                li.innerHTML = `<strong>${num}</strong> = ${factorStr.length > 0 ? factorStr.join(' × ') : num}`;
                stepsList.appendChild(li);
            });

            // Show Result Section
            const resSection = document.getElementById('resultSection');
            resSection.style.display = 'block';
            
            // Scroll to result on mobile
            if(window.innerWidth <= 768) {
                resSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            autoSave(); // Save valid result state
        }

        // --- Local Storage Functionality ---

        function autoSave() {
            const inputVal = document.getElementById('numbersInput').value;
            localStorage.setItem('lcm_tool_data', inputVal);
        }

        function loadData() {
            const savedData = localStorage.getItem('lcm_tool_data');
            if (savedData) {
                document.getElementById('numbersInput').value = savedData;
                // Optional: Auto calculate on load if data exists
                // calculateLCM(); 
            }
        }

        function clearData() {
            if(confirm("Are you sure you want to clear all data?")) {
                localStorage.removeItem('lcm_tool_data');
                document.getElementById('numbersInput').value = "";
                document.getElementById('resultSection').style.display = 'none';
            }
        }

        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

    </script>
</body>
