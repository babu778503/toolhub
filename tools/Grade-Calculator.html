<!DOCTYPE html>
<!-- Category: Other Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
    
    <!-- SEO & Technical SEO for AI Crawlers -->
    <meta name="description" content="Calculate your current class grade or final grade with this easy-to-use Grade Calculator. Features weighted averages, auto-save, and mobile-friendly design.">
    <meta name="keywords" content="Grade Calculator, final grade calculator, class grade calculator, weighted grade calculator, toolshub365.com, calculate grades">
    <meta name="robots" content="index, follow, max-snippet:-1, max-video-preview:-1, max-image-preview:large">
    <link rel="canonical" href="https://toolshub365.com/grade-calculator">
    
    <!-- Open Graph for Social and Search Engines -->
    <meta property="og:title" content="Grade Calculator">
    <meta property="og:description" content="Easily calculate your weighted school or college grades. Free online Grade Calculator tool with automatic save functionality.">
    <meta property="og:url" content="https://toolshub365.com/grade-calculator">
    <meta property="og:type" content="website">

    <!-- JSON-LD Schema Markup for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Grade Calculator",
      "url": "https://toolshub365.com/grade-calculator",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "All",
      "description": "An interactive web utility designed to calculate weighted averages and final course grades. Features dynamic row addition, offline auto-save, and responsive design."
    }
    </script>

    <style>
        :root {
            --primary-color: #059669;
            --primary-hover: #047857;
            --secondary-color: #3b82f6;
            --secondary-hover: #2563eb;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --header-height: 50px;
        }

        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--header-height); /* Offset for fixed header */
            -webkit-font-smoothing: antialiased;
        }

        /* Header (Fixed 50px height) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Desktop Container (Max 1200px) */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Interactive UI Card */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
        }

        /* Grade Rows Setup */
        .row-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 40px;
            gap: 15px;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .grade-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 40px;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #f1f5f9;
            color: var(--text-main);
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.2);
            background-color: #ffffff;
        }

        .remove-btn {
            background-color: transparent;
            color: var(--danger-color);
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            border-radius: 8px;
            transition: background-color 0.2s ease;
        }

        .remove-btn:hover {
            background-color: #fee2e2;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            color: #ffffff;
        }

        .btn-add {
            background-color: var(--secondary-color);
        }

        .btn-add:hover {
            background-color: var(--secondary-hover);
        }

        .btn-clear {
            background-color: var(--danger-color);
        }

        .btn-clear:hover {
            background-color: var(--danger-hover);
        }

        /* Results Display */
        .result-container {
            margin-top: 30px;
            padding: 25px 15px;
            background-color: #ecfdf5;
            border: 1px solid #a7f3d0;
            border-radius: 8px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .result-label {
            font-size: 0.95rem;
            color: #047857;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 3rem;
            font-weight: 800;
            color: #064e3b;
            line-height: 1.2;
        }

        .result-subtext {
            font-size: 1rem;
            color: #059669;
            margin-top: 5px;
            font-weight: 500;
        }

        /* Mobile Adjustments */
        @media screen and (max-width: 768px) {
            .container {
                /* Both side blank space removed for mobile users */
                padding: 20px 0;
                width: 100%;
            }
            .card {
                /* Edge to edge */
                border-radius: 0;
                border-left: none;
                border-right: none;
                box-shadow: none;
                padding: 20px 15px;
            }
            .row-header {
                display: none; /* Hide headers on mobile to save space */
            }
            .grade-row {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                background-color: #f8fafc;
                padding: 15px;
                border-radius: 8px;
                border: 1px solid var(--border-color);
                position: relative;
            }
            .grade-row input[type="text"] {
                grid-column: span 2;
            }
            .grade-row::before {
                content: attr(data-label-grade);
                font-size: 0.8rem;
                color: var(--text-muted);
                grid-column: 1;
            }
            .grade-row::after {
                content: attr(data-label-weight);
                font-size: 0.8rem;
                color: var(--text-muted);
                grid-column: 2;
            }
            .remove-btn {
                position: absolute;
                top: 5px;
                right: 5px;
                height: 30px;
                width: 30px;
                font-size: 1.2rem;
            }
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Grade Calculator</h1>
    </header>

    <div class="container">
        <div class="card">
            
            <div class="row-header">
                <div>Assignment / Course</div>
                <div>Grade (%)</div>
                <div>Weight (%)</div>
                <div></div>
            </div>

            <div id="rowsContainer">
                <!-- Rows will be injected here dynamically -->
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-add" id="addRowBtn">+ Add Row</button>
                <button type="button" class="btn btn-clear" id="clearDataBtn">Clear Data</button>
            </div>

            <div class="result-container">
                <div class="result-label">Final Grade</div>
                <div id="resultValue" class="result-value">0.00%</div>
                <div id="resultSubtext" class="result-subtext">Total Weight: 0%</div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rowsContainer = document.getElementById('rowsContainer');
            const addRowBtn = document.getElementById('addRowBtn');
            const clearDataBtn = document.getElementById('clearDataBtn');
            const resultValue = document.getElementById('resultValue');
            const resultSubtext = document.getElementById('resultSubtext');

            // Default initial state
            let assignments =[
                { id: generateId(), name: '', grade: '', weight: '' },
                { id: generateId(), name: '', grade: '', weight: '' }
            ];

            // Initialize app
            loadData();
            renderRows();

            // Event Listeners
            addRowBtn.addEventListener('click', () => {
                assignments.push({ id: generateId(), name: '', grade: '', weight: '' });
                renderRows();
                saveData();
            });

            clearDataBtn.addEventListener('click', () => {
                assignments =[
                    { id: generateId(), name: '', grade: '', weight: '' },
                    { id: generateId(), name: '', grade: '', weight: '' }
                ];
                localStorage.removeItem('gradeCalcData_toolshub365');
                renderRows();
                calculateGrade();
            });

            // Input delegation for dynamic elements
            rowsContainer.addEventListener('input', (e) => {
                if (e.target.tagName.toLowerCase() === 'input') {
                    const id = e.target.dataset.id;
                    const field = e.target.dataset.field;
                    const index = assignments.findIndex(item => item.id === id);
                    if (index > -1) {
                        assignments[index][field] = e.target.value;
                        calculateGrade();
                        saveData();
                    }
                }
            });

            // Click delegation for remove buttons
            rowsContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('remove-btn') || e.target.parentElement.classList.contains('remove-btn')) {
                    const btn = e.target.classList.contains('remove-btn') ? e.target : e.target.parentElement;
                    const id = btn.dataset.id;
                    assignments = assignments.filter(item => item.id !== id);
                    
                    // Keep at least one row
                    if (assignments.length === 0) {
                        assignments.push({ id: generateId(), name: '', grade: '', weight: '' });
                    }
                    
                    renderRows();
                    calculateGrade();
                    saveData();
                }
            });

            // Helper to generate unique IDs
            function generateId() {
                return '_' + Math.random().toString(36).substr(2, 9);
            }

            // Render HTML for rows
            function renderRows() {
                rowsContainer.innerHTML = '';
                assignments.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'grade-row';
                    
                    row.innerHTML = `
                        <input type="text" placeholder="Assignment Name" data-id="${item.id}" data-field="name" value="${item.name}">
                        <input type="number" placeholder="Grade %" min="0" data-id="${item.id}" data-field="grade" value="${item.grade}">
                        <input type="number" placeholder="Weight %" min="0" data-id="${item.id}" data-field="weight" value="${item.weight}">
                        <button type="button" class="remove-btn" data-id="${item.id}" title="Remove row">×</button>
                    `;
                    rowsContainer.appendChild(row);
                });
            }

            // Logic to calculate the grade
            function calculateGrade() {
                let totalScore = 0;
                let totalWeight = 0;
                let hasValidEntry = false;

                assignments.forEach(item => {
                    const grade = parseFloat(item.grade);
                    const weight = parseFloat(item.weight);

                    if (!isNaN(grade) && !isNaN(weight) && weight > 0) {
                        totalScore += (grade * weight);
                        totalWeight += weight;
                        hasValidEntry = true;
                    }
                });

                if (hasValidEntry && totalWeight > 0) {
                    const finalGrade = totalScore / totalWeight;
                    resultValue.textContent = finalGrade.toFixed(2) + '%';
                    resultSubtext.textContent = `Total Weight: ${totalWeight.toFixed(2)}%`;
                } else {
                    resultValue.textContent = '0.00%';
                    resultSubtext.textContent = 'Total Weight: 0%';
                }
            }

            // LocalStorage Save
            function saveData() {
                localStorage.setItem('gradeCalcData_toolshub365', JSON.stringify(assignments));
            }

            // LocalStorage Load
            function loadData() {
                const savedData = localStorage.getItem('gradeCalcData_toolshub365');
                if (savedData) {
                    try {
                        const parsed = JSON.parse(savedData);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            assignments = parsed;
                        }
                    } catch (e) {
                        console.error('Failed to parse saved grade data', e);
                    }
                }
                calculateGrade();
            }
        });
    </script>
</body>
</html>
