<!DOCTYPE html>
<!-- Category: Financial Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Salary Calculator</title>
    <meta name="description" content="Free online Salary Calculator by toolshub365.com. Convert between hourly, daily, weekly, monthly, and yearly salary amounts instantly. Mobile-friendly.">
    <meta name="keywords" content="Salary Calculator, Paycheck Converter, Wage Calculator, Hourly to Salary, Annual Income Estimator, toolshub365">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/salary-calculator">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://toolshub365.com/salary-calculator">
    <meta property="og:title" content="Salary Calculator">
    <meta property="og:description" content="Convert your salary to hourly, monthly, or yearly rates easily.">
    
    <!-- Technical SEO for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Salary Calculator",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": "Salary conversion (Hourly/Monthly/Yearly), Custom work hours, Auto-save data"
    }
    </script>

    <style>
        :root {
            /* Theme: Prosperous Green & Corporate Slate */
            --primary-color: #059669; /* Green */
            --primary-dark: #047857;
            --secondary-color: #374151; /* Slate */
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-light: #6b7280;
            --border-color: #e5e7eb;
            --header-height: 50px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--header-height);
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
        }

        /* --- Header --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- Container --- */
        .container {
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Desktop Design */
        @media (min-width: 769px) {
            .container {
                max-width: 1200px;
                padding: 40px 20px;
            }
            .panel {
                flex: 1;
                background: var(--card-bg);
                border-radius: 12px;
                padding: 30px;
                box-shadow: var(--shadow);
            }
            .panel-inputs {
                max-width: 400px;
            }
        }

        /* Mobile Design */
        @media (max-width: 768px) {
            .container {
                padding: 0;
                gap: 0;
            }
            .panel {
                width: 100%;
                border-radius: 0;
                padding: 25px 20px;
                background: var(--card-bg);
                border-bottom: 1px solid var(--border-color);
            }
            /* Visual hierarchy */
            .panel-inputs { order: 1; }
            .panel-results { order: 2; }
        }

        /* --- Typography & Forms --- */
        h2 {
            font-size: 1.2rem;
            color: var(--secondary-color);
            margin-bottom: 20px;
            font-weight: 700;
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-prefix {
            position: absolute;
            left: 14px;
            color: var(--text-light);
            font-weight: 500;
            pointer-events: none;
        }

        input[type="number"], select {
            width: 100%;
            padding: 12px 12px 12px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background-color: #fff;
            color: var(--text-main);
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
        }

        .has-prefix input {
            padding-left: 25px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.15);
        }

        .row-group {
            display: flex;
            gap: 15px;
        }
        .col-half {
            flex: 1;
        }

        /* --- Buttons --- */
        .btn-clear {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-light);
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-clear:hover {
            background-color: #f9fafb;
            color: var(--secondary-color);
            border-color: #d1d5db;
        }

        /* --- Results Area --- */
        .highlight-card {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.3);
        }

        .highlight-label {
            text-transform: uppercase;
            font-size: 0.85rem;
            opacity: 0.9;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .highlight-amount {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.1;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .comparison-table td {
            padding: 14px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .comparison-table tr:last-child td {
            border-bottom: none;
        }

        .period-name {
            color: var(--text-light);
            font-weight: 500;
        }

        .period-value {
            text-align: right;
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.05rem;
        }

        /* Visual bar */
        .salary-visual {
            height: 6px;
            background-color: #e5e7eb;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
            width: 100%;
        }
        .salary-bar {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.5s ease;
        }

    </style>
</head>
<body>

<header>
    <h1>Salary Calculator</h1>
</header>

<div class="container">
    
    <!-- Input Panel -->
    <div class="panel panel-inputs">
        <h2>Income Details</h2>
        <form id="salaryForm">
            
            <!-- Amount & Frequency -->
            <div class="form-group">
                <label for="salaryAmount">Salary Amount</label>
                <div class="input-wrapper has-prefix">
                    <span class="input-prefix">$</span>
                    <input type="number" id="salaryAmount" min="0" step="0.01" placeholder="5000">
                </div>
            </div>

            <div class="form-group">
                <label for="payFrequency">Pay Frequency</label>
                <select id="payFrequency">
                    <option value="hourly">Hourly</option>
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="biweekly">Bi-Weekly (Every 2 weeks)</option>
                    <option value="monthly" selected>Monthly</option>
                    <option value="annual">Annually (Yearly)</option>
                </select>
            </div>

            <hr style="border:0; border-top:1px dashed #e5e7eb; margin:20px 0;">

            <!-- Work Schedule -->
            <div class="row-group">
                <div class="col-half form-group">
                    <label for="hoursPerWeek">Hours / Week</label>
                    <input type="number" id="hoursPerWeek" min="1" max="168" value="40">
                </div>
                <div class="col-half form-group">
                    <label for="daysPerWeek">Days / Week</label>
                    <input type="number" id="daysPerWeek" min="1" max="7" value="5">
                </div>
            </div>

            <button type="button" class="btn-clear" id="clearBtn">Clear Data</button>
        </form>
    </div>

    <!-- Result Panel -->
    <div class="panel panel-results">
        <h2>Paycheck Breakdown</h2>
        
        <!-- Highlight Cards -->
        <div class="highlight-card">
            <div class="highlight-label">Annual Salary</div>
            <div class="highlight-amount" id="hlAnnual">$0</div>
        </div>

        <div class="row-group" style="margin-bottom: 25px;">
            <div class="col-half" style="background:#f9fafb; padding:15px; border-radius:8px; text-align:center; border:1px solid #e5e7eb;">
                <div style="font-size:0.8rem; color:#6b7280; text-transform:uppercase;">Monthly</div>
                <div style="font-size:1.3rem; font-weight:700; color:#374151;" id="hlMonthly">$0</div>
            </div>
            <div class="col-half" style="background:#f9fafb; padding:15px; border-radius:8px; text-align:center; border:1px solid #e5e7eb;">
                <div style="font-size:0.8rem; color:#6b7280; text-transform:uppercase;">Hourly</div>
                <div style="font-size:1.3rem; font-weight:700; color:#374151;" id="hlHourly">$0</div>
            </div>
        </div>

        <!-- Detailed Table -->
        <table class="comparison-table">
            <tbody>
                <tr>
                    <td class="period-name">Yearly</td>
                    <td class="period-value" id="valYearly">$0.00</td>
                </tr>
                <tr>
                    <td class="period-name">Monthly</td>
                    <td class="period-value" id="valMonthly">$0.00</td>
                </tr>
                <tr>
                    <td class="period-name">Bi-Weekly (26/yr)</td>
                    <td class="period-value" id="valBiWeekly">$0.00</td>
                </tr>
                <tr>
                    <td class="period-name">Weekly (52/yr)</td>
                    <td class="period-value" id="valWeekly">$0.00</td>
                </tr>
                <tr>
                    <td class="period-name">Daily</td>
                    <td class="period-value" id="valDaily">$0.00</td>
                </tr>
                <tr>
                    <td class="period-name">Hourly</td>
                    <td class="period-value" id="valHourly">$0.00</td>
                </tr>
            </tbody>
        </table>

        <!-- Simple visual bar for fun/design -->
        <div style="margin-top:20px;">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#9ca3af; margin-bottom:5px;">
                <span>Income Scale</span>
                <span>Max (Ref)</span>
            </div>
            <div class="salary-visual">
                <div class="salary-bar" id="salaryBar"></div>
            </div>
        </div>

    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        
        // --- DOM Elements ---
        const inputs = {
            amount: document.getElementById('salaryAmount'),
            freq: document.getElementById('payFrequency'),
            hoursWeek: document.getElementById('hoursPerWeek'),
            daysWeek: document.getElementById('daysPerWeek')
        };

        const outputs = {
            hlAnnual: document.getElementById('hlAnnual'),
            hlMonthly: document.getElementById('hlMonthly'),
            hlHourly: document.getElementById('hlHourly'),
            valYearly: document.getElementById('valYearly'),
            valMonthly: document.getElementById('valMonthly'),
            valBiWeekly: document.getElementById('valBiWeekly'),
            valWeekly: document.getElementById('valWeekly'),
            valDaily: document.getElementById('valDaily'),
            valHourly: document.getElementById('valHourly'),
            bar: document.getElementById('salaryBar')
        };

        const clearBtn = document.getElementById('clearBtn');

        // --- Configuration ---
        const WEEKS_IN_YEAR = 52;

        // --- Formatting ---
        const formatMoney = (num) => {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 2
            }).format(num);
        };

        // --- Calculation ---
        const calculate = () => {
            let amount = parseFloat(inputs.amount.value);
            let freq = inputs.freq.value;
            let hoursPerWeek = parseFloat(inputs.hoursWeek.value) || 40;
            let daysPerWeek = parseFloat(inputs.daysWeek.value) || 5;

            if (!amount || isNaN(amount)) amount = 0;

            // 1. Normalize everything to ANNUAL first
            let annualSalary = 0;

            switch(freq) {
                case 'hourly':
                    annualSalary = amount * hoursPerWeek * WEEKS_IN_YEAR;
                    break;
                case 'daily':
                    // Daily * DaysPerWeek * 52
                    annualSalary = amount * daysPerWeek * WEEKS_IN_YEAR;
                    break;
                case 'weekly':
                    annualSalary = amount * WEEKS_IN_YEAR;
                    break;
                case 'biweekly':
                    annualSalary = amount * 26; // Standard 26 pay periods
                    break;
                case 'monthly':
                    annualSalary = amount * 12;
                    break;
                case 'annual':
                    annualSalary = amount;
                    break;
            }

            // 2. Derive other periods from Annual
            let monthly = annualSalary / 12;
            let biweekly = annualSalary / 26;
            let weekly = annualSalary / WEEKS_IN_YEAR;
            
            // For daily/hourly, we use the work schedule settings
            let daily = 0;
            let hourly = 0;

            if (daysPerWeek > 0) {
                // Annual / (52 * DaysPerWeek)
                daily = annualSalary / (WEEKS_IN_YEAR * daysPerWeek);
            }
            if (hoursPerWeek > 0) {
                // Annual / (52 * HoursPerWeek)
                hourly = annualSalary / (WEEKS_IN_YEAR * hoursPerWeek);
            }

            // 3. Update UI
            // Highlights
            outputs.hlAnnual.textContent = formatMoney(annualSalary);
            outputs.hlMonthly.textContent = formatMoney(monthly);
            outputs.hlHourly.textContent = formatMoney(hourly);

            // Table
            outputs.valYearly.textContent = formatMoney(annualSalary);
            outputs.valMonthly.textContent = formatMoney(monthly);
            outputs.valBiWeekly.textContent = formatMoney(biweekly);
            outputs.valWeekly.textContent = formatMoney(weekly);
            outputs.valDaily.textContent = formatMoney(daily);
            outputs.valHourly.textContent = formatMoney(hourly);

            // Visual Bar (Arbitrary scale logic for visual flair)
            // Let's say $200k is 100% width for reference, capped at 100%
            let widthPct = Math.min((annualSalary / 200000) * 100, 100);
            outputs.bar.style.width = `${widthPct}%`;

            saveData();
        };

        // --- Data Persistence ---
        const saveData = () => {
            const data = {
                amount: inputs.amount.value,
                freq: inputs.freq.value,
                hoursWeek: inputs.hoursWeek.value,
                daysWeek: inputs.daysWeek.value
            };
            localStorage.setItem('salaryCalc_v1', JSON.stringify(data));
        };

        const loadData = () => {
            const saved = localStorage.getItem('salaryCalc_v1');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    inputs.amount.value = data.amount;
                    inputs.freq.value = data.freq;
                    inputs.hoursWeek.value = data.hoursWeek;
                    inputs.daysWeek.value = data.daysWeek;
                } catch (e) {
                    resetDefaults();
                }
            } else {
                resetDefaults();
            }
            calculate();
        };

        const resetDefaults = () => {
            inputs.amount.value = 5000;
            inputs.freq.value = 'monthly';
            inputs.hoursWeek.value = 40;
            inputs.daysWeek.value = 5;
        };

        const clearData = () => {
            localStorage.removeItem('salaryCalc_v1');
            resetDefaults();
            inputs.amount.value = ''; // Visual clear
            calculate();
        };

        // --- Event Listeners ---
        Object.values(inputs).forEach(el => {
            el.addEventListener('input', calculate);
            if(el.tagName === 'SELECT') el.addEventListener('change', calculate);
        });

        clearBtn.addEventListener('click', clearData);

        // Init
        loadData();
    });
</script>

</body>
</html>
