    <style>
        :root {
            --primary: #107c41; /* Excel Green */
            --primary-dark: #0c5e31;
            --bg-color: #f3f2f1;
            --text-main: #201f1e;
            --text-muted: #605e5c;
            --card-bg: #ffffff;
            --border-color: #edebe9;
            --code-bg: #f8f9fa;
            --code-text: #d63384;
            --header-height: 50px;
            --max-width: 1200px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--header-height);
            -webkit-font-smoothing: antialiased;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* Container */
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 20px;
        }

        /* Search Bar */
        .search-container {
            position: sticky;
            top: calc(var(--header-height) + 10px);
            z-index: 999;
            margin-bottom: 25px;
            background: var(--bg-color);
            padding: 10px 0;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 124, 65, 0.2);
        }

        /* Categories */
        .category-group {
            margin-bottom: 35px;
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .category-title {
            font-size: 1.3rem;
            color: var(--primary-dark);
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary);
        }

        /* Function Cards (Accordion) */
        .func-card {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .func-card:hover {
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .func-header {
            padding: 16px 20px;
            background: var(--card-bg);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
            transition: background-color 0.2s, color 0.2s;
            user-select: none;
        }

        .func-header:hover {
            background-color: #fcfcfc;
            color: var(--primary);
        }

        .func-header::after {
            content: '+';
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--primary);
            transition: transform 0.3s ease;
        }

        .func-card.active .func-header {
            border-bottom: 1px solid var(--border-color);
            color: var(--primary);
        }

        .func-card.active .func-header::after {
            transform: rotate(45deg);
        }
        
        .func-body {
            display: none;
            padding: 20px;
            background: #faf9f8;
        }

        .func-card.active .func-body {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* Content Structure */
        .section-wrap { margin-bottom: 15px; }
        .section-wrap:last-child { margin-bottom: 0; }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        
        .content-text {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-main);
        }

        .code-block {
            background: var(--code-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px 16px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.95rem;
            color: var(--code-text);
            overflow-x: auto;
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #e1dfdd;
            border: none;
            border-radius: 4px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: var(--primary);
            color: white;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 1.2rem;
            display: none;
            background: var(--card-bg);
            border-radius: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments (0 blank space on sides) */
        @media (max-width: 768px) {
            .container {
                padding: 0;
                width: 100%;
            }
            .search-container {
                padding: 15px 10px;
                top: var(--header-height);
                margin-bottom: 10px;
            }
            .category-group {
                border-radius: 0;
                margin-bottom: 15px;
                padding: 15px 10px;
                box-shadow: none;
                border-top: 1px solid var(--border-color);
                border-bottom: 1px solid var(--border-color);
            }
            .category-title {
                font-size: 1.2rem;
            }
            .func-card {
                border-radius: 0;
                border-left: none;
                border-right: none;
                margin-bottom: -1px; /* Overlap borders */
            }
            .func-header {
                font-size: 1.05rem;
                padding: 14px 10px;
            }
            .func-body {
                padding: 15px 10px;
            }
            .copy-btn {
                padding: 4px 10px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Excel Text Formulas</h1>
    </header>

    <div class="container">
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search function, syntax, or keywords...">
        </div>

        <div id="noResults" class="no-results">No matching formulas found. Try a different keyword.</div>
        <div id="contentArea"></div>
    </div>

    <script>
        const formulaData = [
            {
                category: "Core Text Functions",
                items: [
                    { name: "TEXTJOIN", purpose: "Combines text from multiple ranges and/or strings, and includes a delimiter between each text value.", returnValue: "A single text string.", syntax: "TEXTJOIN(delimiter, ignore_empty, text1, [text2], ...)", example: '=TEXTJOIN(", ", TRUE, A1:A5) // Joins values with commas, ignoring empty cells' },
                    { name: "CONCATENATE", purpose: "Joins two or more text strings into one string. (Legacy function, replaced by CONCAT but still widely used).", returnValue: "A single concatenated text string.", syntax: "CONCATENATE(text1, [text2], ...)", example: '=CONCATENATE(A1, " ", B1) // Joins First and Last name with a space' },
                    { name: "CONCAT", purpose: "Combines text from multiple ranges and/or strings. Modern replacement for CONCATENATE.", returnValue: "A single text string.", syntax: "CONCAT(text1, [text2], ...)", example: '=CONCAT(A1:B2) // Concatenates an entire range into one string' }
                ]
            },
            {
                category: "✅ Text Extraction Functions",
                items: [
                    { name: "LEFT", purpose: "Returns the first character(s) in a text string, based on the number of characters you specify.", returnValue: "Text string (extracted from the left).", syntax: "LEFT(text, [num_chars])", example: '=LEFT("Apple", 3) // Returns "App"' },
                    { name: "RIGHT", purpose: "Returns the last character(s) in a text string, based on the number of characters you specify.", returnValue: "Text string (extracted from the right).", syntax: "RIGHT(text, [num_chars])", example: '=RIGHT("Excel", 3) // Returns "cel"' },
                    { name: "MID", purpose: "Returns a specific number of characters from a text string, starting at the position you specify.", returnValue: "Text string (extracted from the middle).", syntax: "MID(text, start_num, num_chars)", example: '=MID("Financial", 3, 4) // Returns "nanc"' }
                ]
            },
            {
                category: "✅ Text Length & Case",
                items: [
                    { name: "LEN", purpose: "Returns the number of characters in a text string, including spaces.", returnValue: "Integer.", syntax: "LEN(text)", example: '=LEN("Hello World") // Returns 11' },
                    { name: "UPPER", purpose: "Converts text to uppercase.", returnValue: "Uppercase text string.", syntax: "UPPER(text)", example: '=UPPER("john doe") // Returns "JOHN DOE"' },
                    { name: "LOWER", purpose: "Converts text to lowercase.", returnValue: "Lowercase text string.", syntax: "LOWER(text)", example: '=LOWER("EXCEL") // Returns "excel"' },
                    { name: "PROPER", purpose: "Capitalizes the first letter in each word of a text value.", returnValue: "Proper/Title case text string.", syntax: "PROPER(text)", example: '=PROPER("jane doe") // Returns "Jane Doe"' }
                ]
            },
            {
                category: "✅ Find & Search Functions",
                items: [
                    { name: "FIND", purpose: "Returns the starting position of one text string within another. (Case-sensitive).", returnValue: "Integer (position number).", syntax: "FIND(find_text, within_text, [start_num])", example: '=FIND("x", "Excel") // Returns 2' },
                    { name: "SEARCH", purpose: "Returns the starting position of one text string within another. (Case-insensitive, supports wildcards).", returnValue: "Integer (position number).", syntax: "SEARCH(find_text, within_text, [start_num])", example: '=SEARCH("e", "Excel") // Returns 1' }
                ]
            },
            {
                category: "✅ Replace & Modify Text",
                items: [
                    { name: "REPLACE", purpose: "Replaces part of a text string, based on the number of characters you specify, with a different text string.", returnValue: "Modified text string.", syntax: "REPLACE(old_text, start_num, num_chars, new_text)", example: '=REPLACE("2023-Data", 1, 4, "2024") // Returns "2024-Data"' },
                    { name: "SUBSTITUTE", purpose: "Substitutes new text for old text in a text string. Used when you know the specific text to replace rather than position.", returnValue: "Modified text string.", syntax: "SUBSTITUTE(text, old_text, new_text, [instance_num])", example: '=SUBSTITUTE("sales-report", "-", " ") // Returns "sales report"' }
                ]
            },
            {
                category: "✅ Text Formatting",
                items: [
                    { name: "TEXT", purpose: "Converts a numeric value to text and lets you specify the display formatting.", returnValue: "Formatted text string.", syntax: "TEXT(value, format_text)", example: '=TEXT(1234.5, "$#,##0.00") // Returns "$1,234.50"' },
                    { name: "DOLLAR", purpose: "Converts a number to text using currency format, with the decimals rounded to the specified place.", returnValue: "Text formatted as currency.", syntax: "DOLLAR(number, [decimals])", example: '=DOLLAR(1234.567, 2) // Returns "$1,234.57"' },
                    { name: "FIXED", purpose: "Formats a number as text with a fixed number of decimals, optionally preventing commas.", returnValue: "Text string representing a number.", syntax: "FIXED(number, [decimals], [no_commas])", example: '=FIXED(1234.56, 1, TRUE) // Returns "1234.6"' }
                ]
            },
            {
                category: "✅ Clean & Trim Functions",
                items: [
                    { name: "TRIM", purpose: "Removes all spaces from text except for single spaces between words.", returnValue: "Cleaned text string.", syntax: "TRIM(text)", example: '=TRIM("   John   Doe   ") // Returns "John Doe"' },
                    { name: "CLEAN", purpose: "Removes all non-printable characters from text. Commonly used for imported data.", returnValue: "Cleaned text string.", syntax: "CLEAN(text)", example: '=CLEAN(A1) // Removes line breaks and unprintable ascii characters' }
                ]
            },
            {
                category: "✅ Text Comparison",
                items: [
                    { name: "EXACT", purpose: "Compares two text strings and returns TRUE if they are exactly the same (Case-sensitive).", returnValue: "Boolean (TRUE/FALSE).", syntax: "EXACT(text1, text2)", example: '=EXACT("Apple", "apple") // Returns FALSE' }
                ]
            },
            {
                category: "✅ Text Split & Dynamic (Excel 365)",
                items: [
                    { name: "TEXTSPLIT", purpose: "Splits text strings by a given column and row delimiter into a dynamic array.", returnValue: "Dynamic Array of text strings.", syntax: "TEXTSPLIT(text, col_delimiter, [row_delimiter], [ignore_empty], [match_mode], [pad_with])", example: '=TEXTSPLIT("Red,Green,Blue", ",") // Spills Red, Green, Blue into 3 cells' },
                    { name: "TEXTBEFORE", purpose: "Returns text that occurs before a given character or string.", returnValue: "Text string.", syntax: "TEXTBEFORE(text, delimiter, [instance_num], [match_mode], [match_end], [if_not_found])", example: '=TEXTBEFORE("john.doe@email.com", "@") // Returns "john.doe"' },
                    { name: "TEXTAFTER", purpose: "Returns text that occurs after a given character or string.", returnValue: "Text string.", syntax: "TEXTAFTER(text, delimiter, [instance_num], [match_mode], [match_end], [if_not_found])", example: '=TEXTAFTER("john.doe@email.com", "@") // Returns "email.com"' }
                ]
            },
            {
                category: "✅ Combine & Advanced Text",
                items: [
                    { name: "REPT", purpose: "Repeats text a given number of times. Often used to build in-cell text charts.", returnValue: "Repeated text string.", syntax: "REPT(text, number_times)", example: '=REPT("|", 5) // Returns "|||||"' },
                    { name: "VALUE", purpose: "Converts a text string that represents a number to a true number.", returnValue: "Numeric value.", syntax: "VALUE(text)", example: '=VALUE("1000") // Returns the number 1000' },
                    { name: "NUMBERVALUE", purpose: "Converts text to number in a locale-independent manner (lets you specify decimal/group separators).", returnValue: "Numeric value.", syntax: "NUMBERVALUE(text, [decimal_separator], [group_separator])", example: '=NUMBERVALUE("1.234,56", ",", ".") // Returns 1234.56' }
                ]
            },
            {
                category: "✅ Encoding & Conversion",
                items: [
                    { name: "CODE", purpose: "Returns a numeric code for the first character in a text string (ANSI).", returnValue: "Integer (1-255).", syntax: "CODE(text)", example: '=CODE("A") // Returns 65' },
                    { name: "CHAR", purpose: "Returns the character specified by the code number from the character set (ANSI).", returnValue: "A single text character.", syntax: "CHAR(number)", example: '=CHAR(65) // Returns "A"' },
                    { name: "UNICODE", purpose: "Returns the number (code point) corresponding to the first character of the text (Unicode).", returnValue: "Integer code point.", syntax: "UNICODE(text)", example: '=UNICODE("😊") // Returns 128522' },
                    { name: "UNICHAR", purpose: "Returns the Unicode character that is referenced by the given numeric value.", returnValue: "Unicode text character.", syntax: "UNICHAR(number)", example: '=UNICHAR(128522) // Returns "😊"' }
                ]
            },
            {
                category: "✅ Logical / Conditional Text",
                items: [
                    { name: "IF (with text)", purpose: "Returns one text string if a condition is true and another if it's false.", returnValue: "Text string based on condition.", syntax: "IF(logical_test, value_if_true, value_if_false)", example: '=IF(A1>100, "High", "Low")' },
                    { name: "IFERROR (text handling)", purpose: "Returns specified text if a formula evaluates to an error; otherwise, returns the formula result.", returnValue: "Formula result or alternative text.", syntax: "IFERROR(value, value_if_error)", example: '=IFERROR(VLOOKUP(A1,B:C,2,0), "Not Found")' },
                    { name: "IFNA", purpose: "Returns specified text if the expression resolves to #N/A; otherwise returns the result.", returnValue: "Formula result or alternative text.", syntax: "IFNA(value, value_if_na)", example: '=IFNA(MATCH("Apple", A:A, 0), "Missing Item")' }
                ]
            },
            {
                category: "✅ Advanced Dynamic Array (Text)",
                items: [
                    { name: "FILTER (text data)", purpose: "Filters a text array based on boolean conditions, spilling results into an array.", returnValue: "Dynamic Array of text values.", syntax: "FILTER(array, include, [if_empty])", example: '=FILTER(A2:A10, B2:B10="Active", "None") // Returns array of active names' },
                    { name: "UNIQUE (text values)", purpose: "Extracts a list of unique text strings from a range, removing duplicates.", returnValue: "Dynamic Array of unique text.", syntax: "UNIQUE(array, [by_col], [exactly_once])", example: '=UNIQUE(A2:A100) // Returns distinct text names' },
                    { name: "SORT (text sorting)", purpose: "Sorts a range or array of text values alphabetically.", returnValue: "Sorted Dynamic Array.", syntax: "SORT(array, [sort_index], [sort_order], [by_col])", example: '=SORT(UNIQUE(A2:A100), 1, 1) // Returns unique names sorted A-Z' }
                ]
            },
            {
                category: "✅ Text with Lookup",
                items: [
                    { name: "TEXT + VLOOKUP", purpose: "Combine text with a lookup result for dynamic reporting strings.", returnValue: "Concatenated string.", syntax: "Text & VLOOKUP(...)", example: '="Status: " & VLOOKUP(A2, Data!A:C, 3, FALSE)' },
                    { name: "TEXT + XLOOKUP", purpose: "Append descriptive text to modern XLOOKUP results.", returnValue: "Concatenated string.", syntax: "Text & XLOOKUP(...)", example: '="Manager is " & XLOOKUP("Jane", A:A, B:B, "Unknown")' },
                    { name: "TEXT + INDEX + MATCH", purpose: "Generate dynamic text combining INDEX MATCH lookups.", returnValue: "Concatenated string.", syntax: "Text & INDEX(..., MATCH(...))", example: '="Price: " & TEXT(INDEX(C:C, MATCH("ItemA", A:A, 0)), "$0.00")' }
                ]
            },
            {
                category: "🔥 Bonus Text Techniques",
                items: [
                    { name: "Remove Extra Spaces (TRIM)", purpose: "Clean messy data exports containing random leading, trailing, or double spaces.", returnValue: "Clean string.", syntax: "TRIM(text)", example: '=TRIM(A2)' },
                    { name: "Extract Numbers from Text", purpose: "A complex formula to extract numeric digits from a mixed string (pre-365 method).", returnValue: "Numeric text.", syntax: "SUMPRODUCT/MID combination", example: '=SUMPRODUCT(MID(0&A2,LARGE(INDEX(ISNUMBER(--MID(A2,ROW($1:$50),1))*ROW($1:$50),0),ROW($1:$50))+1,1)*10^ROW($1:$50)/10)' },
                    { name: "Split Full Name (LEFT/MID/RIGHT)", purpose: "Extract First and Last Name without TEXTSPLIT using FIND and LEFT/RIGHT.", returnValue: "First/Last Name string.", syntax: "LEFT/RIGHT with FIND", example: '=LEFT(A2, FIND(" ", A2)-1) // Extracts First Name' },
                    { name: "Join Text with Delimiter (TEXTJOIN)", purpose: "Aggregate lists dynamically inside one cell based on conditions.", returnValue: "Delimited String.", syntax: "TEXTJOIN + IF array", example: '=TEXTJOIN(", ", TRUE, IF(B2:B10="Active", A2:A10, ""))' },
                    { name: "Case-Sensitive Compare (EXACT)", purpose: "Validate passwords, unique IDs, or codes where case matters.", returnValue: "Boolean TRUE/FALSE.", syntax: "EXACT(A, B)", example: '=IF(EXACT(A2, B2), "Match", "Mismatch")' }
                ]
            }
        ];

        const contentArea = document.getElementById('contentArea');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');

        function renderContent() {
            contentArea.innerHTML = '';
            
            formulaData.forEach(cat => {
                const catGroup = document.createElement('div');
                catGroup.className = 'category-group';
                
                const catTitle = document.createElement('h2');
                catTitle.className = 'category-title';
                catTitle.textContent = cat.category;
                catGroup.appendChild(catTitle);

                cat.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'func-card';
                    card.setAttribute('data-name', item.name.toLowerCase());
                    card.setAttribute('data-keywords', `${item.purpose} ${item.category}`.toLowerCase());

                    // Escape HTML in example
                    const escapedExample = item.example.replace(/</g, "&lt;").replace(/>/g, "&gt;");

                    card.innerHTML = `
                        <div class="func-header">${item.name}</div>
                        <div class="func-body">
                            <div class="section-wrap">
                                <div class="section-title">Purpose</div>
                                <div class="content-text">${item.purpose}</div>
                            </div>
                            <div class="section-wrap">
                                <div class="section-title">Return Value</div>
                                <div class="content-text">${item.returnValue}</div>
                            </div>
                            <div class="section-wrap">
                                <div class="section-title">Syntax</div>
                                <div class="code-block">
                                    ${item.syntax}
                                </div>
                            </div>
                            <div class="section-wrap">
                                <div class="section-title">Examples</div>
                                <div class="code-block">
                                    <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                                    <span class="code-text">${escapedExample}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    catGroup.appendChild(card);
                });

                contentArea.appendChild(catGroup);
            });

            attachEvents();
        }

        function attachEvents() {
            const headers = document.querySelectorAll('.func-header');
            headers.forEach(header => {
                header.addEventListener('click', function() {
                    const card = this.parentElement;
                    card.classList.toggle('active');
                });
            });
        }

        function copyCode(btn) {
            const codeSpan = btn.nextElementSibling;
            // Extract code before the comment for clean copying (optional, keeping comment can also be helpful, but we split here)
            const textToCopy = codeSpan.textContent.split('//')[0].trim();
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                btn.style.background = '#107c41';
                btn.style.color = '#fff';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '';
                    btn.style.color = '';
                }, 2000);
            });
        }

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            const groups = document.querySelectorAll('.category-group');
            let hasVisibleCards = false;

            groups.forEach(group => {
                const cards = group.querySelectorAll('.func-card');
                let groupHasVisible = false;

                cards.forEach(card => {
                    const name = card.getAttribute('data-name');
                    const keywords = card.getAttribute('data-keywords');
                    
                    if (name.includes(term) || keywords.includes(term)) {
                        card.style.display = 'block';
                        groupHasVisible = true;
                        hasVisibleCards = true;
                        // Auto-expand if searching
                        if (term !== '') {
                            card.classList.add('active');
                        } else {
                            card.classList.remove('active');
                        }
                    } else {
                        card.style.display = 'none';
                        card.classList.remove('active');
                    }
                });

                group.style.display = groupHasVisible ? 'block' : 'none';
            });

            noResults.style.display = hasVisibleCards ? 'none' : 'block';
        });

        // Initial render
        renderContent();
    </script>
</body>
</html>
