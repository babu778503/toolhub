<body>

    <header>
        <h1>WhatsApp Link Generator (Click to Chat)</h1>
    </header>

    <main class="container">
        <!-- Input Section -->
        <div class="card">
            <div class="form-group">
                <label for="wa-phone">WhatsApp Phone Number</label>
                <input type="text" id="wa-phone" placeholder="e.g., 1234567890" inputmode="tel" autocomplete="tel">
                <div class="help-text">Enter your full number with country code. Do not include '+', dashes, or brackets. (Example: 1 for US, 44 for UK, 91 for India).</div>
            </div>

            <div class="form-group">
                <label for="wa-message">Pre-filled Message (Optional)</label>
                <textarea id="wa-message" placeholder="Hello, I'm interested in your services..."></textarea>
                <div class="help-text">This exact text will automatically appear in the chat box when a user clicks your link.</div>
            </div>
        </div>

        <!-- Output Section -->
        <div class="card">
            <div class="form-group">
                <label for="wa-link-output">Your Generated Link</label>
                <div class="result-wrapper">
                    <!-- Readonly input makes it perfectly selectable and workable on all devices -->
                    <input type="text" id="wa-link-output" class="result-box" readonly value="https://wa.me/">
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="btn btn-primary" id="copy-btn">Copy Link</button>
                <button type="button" class="btn btn-secondary" id="open-btn">Open Chat</button>
                <button type="button" class="btn btn-danger" id="clear-btn">Clear Data</button>
            </div>
        </div>
    </main>

    <!-- Notification Toast -->
    <div id="toast">Link copied to clipboard!</div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // DOM Elements
            const phoneInput = document.getElementById('wa-phone');
            const messageInput = document.getElementById('wa-message');
            const linkOutput = document.getElementById('wa-link-output');
            const copyBtn = document.getElementById('copy-btn');
            const openBtn = document.getElementById('open-btn');
            const clearBtn = document.getElementById('clear-btn');
            const toast = document.getElementById('toast');

            // LocalStorage Keys
            const STORAGE_KEY_PHONE = 'toolshub365_wa_phone_v2';
            const STORAGE_KEY_MSG = 'toolshub365_wa_msg_v2';

            // Function to generate the workable WhatsApp link
            function generateLink() {
                // Remove any non-numeric characters from the phone number
                let phone = phoneInput.value.replace(/\D/g, '');
                let message = messageInput.value.trim();
                
                let finalLink = 'https://wa.me/';
                
                // Append phone if it exists
                if (phone) {
                    finalLink += phone;
                }

                // Append message if it exists
                if (message) {
                    finalLink += `?text=${encodeURIComponent(message)}`;
                }

                // Display the generated link
                linkOutput.value = finalLink;

                // Auto-save user data seamlessly to the device
                localStorage.setItem(STORAGE_KEY_PHONE, phoneInput.value);
                localStorage.setItem(STORAGE_KEY_MSG, messageInput.value);
            }

            // Function to load saved data securely from device memory
            function loadSavedData() {
                const savedPhone = localStorage.getItem(STORAGE_KEY_PHONE);
                const savedMsg = localStorage.getItem(STORAGE_KEY_MSG);

                if (savedPhone !== null) phoneInput.value = savedPhone;
                if (savedMsg !== null) messageInput.value = savedMsg;

                generateLink();
            }

            // Toast Notification UI Logic
            let toastTimeout;
            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add("show");
                
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(function() { 
                    toast.classList.remove("show"); 
                }, 2500);
            }

            // Attach Real-time Event Listeners
            phoneInput.addEventListener('input', generateLink);
            messageInput.addEventListener('input', generateLink);

            // Copy Link Workable Implementation (Cross-browser compatible)
            copyBtn.addEventListener('click', function() {
                const linkToCopy = linkOutput.value;
                
                if (linkToCopy === 'https://wa.me/') {
                    showToast("Please enter a phone number or message first!");
                    phoneInput.focus();
                    return;
                }

                // Modern Clipboard API
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(linkToCopy).then(() => {
                        showToast("Link copied to clipboard!");
                    }).catch(err => {
                        fallbackCopy(linkToCopy);
                    });
                } else {
                    // Fallback for older browsers or non-HTTPS
                    fallbackCopy(linkToCopy);
                }
            });

            // Fallback Copy Function
            function fallbackCopy(text) {
                linkOutput.select();
                linkOutput.setSelectionRange(0, 99999); // For mobile devices
                try {
                    document.execCommand('copy');
                    showToast("Link copied to clipboard!");
                } catch (err) {
                    showToast("Failed to copy. Please copy manually.");
                }
            }

            // Open Chat Workable Implementation
            openBtn.addEventListener('click', function() {
                const linkToOpen = linkOutput.value;
                if (linkToOpen === 'https://wa.me/') {
                    showToast("Please enter a phone number or message first!");
                    phoneInput.focus();
                    return;
                }
                // Safely open the WhatsApp link in a new tab
                window.open(linkToOpen, '_blank', 'noopener,noreferrer');
            });

            // Clear Data Workable Implementation
            clearBtn.addEventListener('click', function() {
                if (confirm("Are you sure you want to clear your saved data from this device?")) {
                    localStorage.removeItem(STORAGE_KEY_PHONE);
                    localStorage.removeItem(STORAGE_KEY_MSG);
                    
                    phoneInput.value = '';
                    messageInput.value = '';
                    
                    generateLink();
                    showToast("Device data cleared successfully!");
                }
            });

            // Initialize the tool with saved data
            loadSavedData();
        });
    </script>
