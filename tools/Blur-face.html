    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #e67e22;
            --primary-hover: #d35400;
            --bg-color: #f5f6fa;
            --text-color: #2f3640;
            --card-bg: #ffffff;
            --border-radius: 8px;
            --header-height: 50px;
            --border-color: #dcdde1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height); /* Offset for fixed header */
            overscroll-behavior-y: contain; /* Prevent pull-to-refresh on mobile canvas drawing */
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: #2f3640;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }

        /* Desktop Layout */
        @media (min-width: 769px) {
            .container {
                max-width: 1200px;
                flex-direction: row;
                padding: 30px 20px;
                gap: 20px;
                align-items: flex-start;
            }
            .controls-panel {
                flex: 0 0 320px;
                border-radius: var(--border-radius);
                box-shadow: 0 4px 6px rgba(0,0,0,0.05);
                border: 1px solid var(--border-color);
            }
            .canvas-panel {
                flex: 1;
                min-width: 0;
                border-radius: var(--border-radius);
                box-shadow: 0 4px 6px rgba(0,0,0,0.05);
                border: 1px solid var(--border-color);
            }
        }

        /* Mobile Layout */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 0; /* Remove blank space on sides */
                gap: 0;
            }
            .controls-panel {
                width: 100%;
                border-bottom: 2px solid var(--border-color);
                padding: 15px;
            }
            .canvas-panel {
                width: 100%;
                padding: 10px;
            }
        }

        /* Panels */
        .panel {
            background: var(--card-bg);
            padding: 20px;
        }

        /* Controls */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.95rem;
        }

        .val-display {
            color: var(--primary-color);
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #e1e2e6;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-bottom: 10px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-upload {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-upload:hover {
            background-color: var(--primary-hover);
        }

        .btn-download {
            background-color: #27ae60;
            color: white;
            margin-top: 10px;
        }

        .btn-download:hover {
            background-color: #219653;
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        input[type="file"] {
            display: none;
        }

        /* Canvas Area */
        .canvas-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #dcdde1;
            border-radius: 4px;
            overflow: hidden;
            min-height: 350px;
            position: relative;
            touch-action: none; /* Crucial for drawing on mobile without scrolling */
        }

        canvas {
            max-width: 100%;
            height: auto;
            cursor: crosshair;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .placeholder-text {
            color: #718093;
            font-size: 1.1rem;
            text-align: center;
            padding: 20px;
            position: absolute;
            pointer-events: none;
        }

        /* Instructions */
        .instructions {
            font-size: 0.85rem;
            color: #7f8fa6;
            margin-top: -10px;
            margin-bottom: 15px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <header>
        <h1>Blur face</h1>
    </header>

    <main class="container">
        
        <!-- Controls Panel -->
        <div class="panel controls-panel">
            <div class="form-group">
                <label for="imageUpload" class="btn btn-upload">Upload Image</label>
                <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/webp">
            </div>

            <p class="instructions">Upload an image, then click and drag over the image to blur faces or sensitive areas.</p>

            <div class="form-group">
                <label>
                    <span>Brush Size</span>
                    <span id="brushSizeVal" class="val-display">40px</span>
                </label>
                <input type="range" id="brushSize" min="10" max="150" value="40">
            </div>

            <div class="form-group">
                <label>
                    <span>Blur Intensity</span>
                    <span id="blurIntensityVal" class="val-display">15px</span>
                </label>
                <input type="range" id="blurIntensity" min="5" max="50" value="15">
            </div>

            <button class="btn btn-download" id="downloadBtn">Download Image</button>
            <button class="btn btn-clear" id="clearBtn">Clear Data</button>
        </div>

        <!-- Canvas Panel -->
        <div class="panel canvas-panel">
            <div class="canvas-container" id="canvasWrapper">
                <span class="placeholder-text" id="placeholder">Upload an image to start blurring</span>
                <canvas id="mainCanvas" style="display: none;"></canvas>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // UI Elements
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const imageUpload = document.getElementById('imageUpload');
            const brushSizeSlider = document.getElementById('brushSize');
            const blurIntensitySlider = document.getElementById('blurIntensity');
            const brushSizeVal = document.getElementById('brushSizeVal');
            const blurIntensityVal = document.getElementById('blurIntensityVal');
            const downloadBtn = document.getElementById('downloadBtn');
            const clearBtn = document.getElementById('clearBtn');
            const placeholder = document.getElementById('placeholder');
            const canvasWrapper = document.getElementById('canvasWrapper');

            // State
            let baseImage = null;
            let isDrawing = false;
            let offscreenCanvas = document.createElement('canvas');
            let offscreenCtx = offscreenCanvas.getContext('2d');

            // Storage Keys
            const STORAGE_KEY = 'blurface_image_data';

            // Initialization & Event Listeners for UI
            brushSizeSlider.addEventListener('input', (e) => brushSizeVal.textContent = `${e.target.value}px`);
            
            blurIntensitySlider.addEventListener('change', (e) => {
                blurIntensityVal.textContent = `${e.target.value}px`;
                if(baseImage) generateBlurredCanvas(); // Regenerate blur map when intensity changes
            });
            blurIntensitySlider.addEventListener('input', (e) => blurIntensityVal.textContent = `${e.target.value}px`);

            // Load Data from Local Storage
            const loadData = () => {
                const savedImage = localStorage.getItem(STORAGE_KEY);
                if (savedImage) {
                    const img = new Image();
                    img.onload = () => {
                        baseImage = img;
                        setupCanvasDimensions();
                        // Draw saved image (which might already have blurs)
                        ctx.drawImage(img, 0, 0);
                        generateBlurredCanvas();
                        showCanvas();
                    };
                    img.src = savedImage;
                }
            };

            // Save Data
            const saveData = () => {
                try {
                    // Save the current state of the canvas
                    localStorage.setItem(STORAGE_KEY, canvas.toDataURL('image/png'));
                } catch (e) {
                    console.warn("Image too large to save to LocalStorage.");
                    localStorage.removeItem(STORAGE_KEY);
                }
            };

            // Image Upload Logic
            imageUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            baseImage = img;
                            setupCanvasDimensions();
                            ctx.drawImage(baseImage, 0, 0);
                            generateBlurredCanvas();
                            showCanvas();
                            saveData();
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            const showCanvas = () => {
                placeholder.style.display = 'none';
                canvas.style.display = 'block';
                canvasWrapper.style.background = 'transparent';
            };

            const setupCanvasDimensions = () => {
                // Determine limits for performance/memory (e.g., max 2500px width/height)
                const MAX_DIMENSION = 2500;
                let width = baseImage.width;
                let height = baseImage.height;

                if (width > MAX_DIMENSION || height > MAX_DIMENSION) {
                    const ratio = Math.min(MAX_DIMENSION / width, MAX_DIMENSION / height);
                    width = width * ratio;
                    height = height * ratio;
                }

                canvas.width = width;
                canvas.height = height;
                offscreenCanvas.width = width;
                offscreenCanvas.height = height;
            };

            // Creates a fully blurred version of the current canvas in memory
            const generateBlurredCanvas = () => {
                const blurAmount = blurIntensitySlider.value;
                offscreenCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
                offscreenCtx.filter = `blur(${blurAmount}px)`;
                // Draw current visible canvas into offscreen to get blur effect
                offscreenCtx.drawImage(canvas, 0, 0);
                offscreenCtx.filter = 'none'; // reset
            };

            // Drawing / Blurring Logic
            const getMousePos = (evt) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                let clientX = evt.clientX;
                let clientY = evt.clientY;

                // Handle touch events
                if (evt.touches && evt.touches.length > 0) {
                    clientX = evt.touches[0].clientX;
                    clientY = evt.touches[0].clientY;
                }

                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            };

            const applyBlurAtPoint = (pos) => {
                if (!baseImage) return;
                
                const radius = parseInt(brushSizeSlider.value);

                ctx.save();
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
                ctx.clip();
                // Draw from the fully blurred offscreen canvas into the clipped region
                ctx.drawImage(offscreenCanvas, 0, 0);
                ctx.restore();
            };

            // Mouse / Touch Event Listeners for Canvas
            const startDrawing = (e) => {
                e.preventDefault(); // prevent scrolling on mobile
                isDrawing = true;
                applyBlurAtPoint(getMousePos(e));
            };

            const stopDrawing = () => {
                if (isDrawing) {
                    isDrawing = false;
                    saveData(); // Save state after stroke finishes
                    // Update offscreen canvas so next blurs apply over existing ones properly
                    generateBlurredCanvas(); 
                }
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault(); // prevent scrolling
                applyBlurAtPoint(getMousePos(e));
            };

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseleave', stopDrawing);

            canvas.addEventListener('touchstart', startDrawing, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', stopDrawing);

            // Download Logic
            downloadBtn.addEventListener('click', () => {
                if (!baseImage) {
                    alert('Please upload an image first.');
                    return;
                }
                const dataURL = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'blurred-image.png';
                link.href = dataURL;
                link.click();
            });

            // Clear Logic
            clearBtn.addEventListener('click', () => {
                if(confirm('Are you sure you want to clear the image and reset?')) {
                    localStorage.removeItem(STORAGE_KEY);
                    baseImage = null;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    offscreenCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
                    imageUpload.value = '';
                    
                    canvas.style.display = 'none';
                    placeholder.style.display = 'block';
                    canvasWrapper.style.background = '#dcdde1';
                }
            });

            // Initialize Load
            loadData();
        });
    </script>
</body>
</html>
