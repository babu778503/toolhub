    <style>
        /* CSS Reset & Global Styles */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            padding: 0;

        body {
            background-color: #f0f4f8;

        /* Fixed Header - Exactly 50px */
        header {
            height: 50px;
            background-color: #1a365d;
            color: #ffffff;
            display: flex;
            align-items: center;

        /* Main Container - Desktop Max Width 1200px */
        .container {
            max-width: 1200px;
            margin: 80px auto 30px auto; /* 50px header + 30px gap */

        input[type="number"] {
            flex-grow: 1;

        input[type="number"]:focus {

            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);

        select {

        /* Results Display */

        /* Mobile Optimization: Remove side spacing */

            .container {

<body>

    <!-- 50px Fixed Header (No duplicates, no subtitles, no icons) -->
    <header>
        <h1>Wind Chill Calculator</h1>
    </header>

    <div class="container">
        <div class="content-wrapper">
            
            <div class="form-group">
                <label for="temp">Air Temperature</label>
                <div class="input-row">
                    <input type="number" id="temp" step="any" placeholder="Enter temperature">
                    <select id="tempUnit">
                        <option value="F">°F</option>
                        <option value="C">°C</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="wind">Wind Speed</label>
                <div class="input-row">
                    <input type="number" id="wind" step="any" placeholder="Enter wind speed">
                    <select id="windUnit">
                        <option value="mph">mph</option>
                        <option value="kmh">km/h</option>
                        <option value="ms">m/s</option>
                        <option value="knots">knots</option>
                    </select>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-calc" onclick="calculateWindChill()">Calculate Wind Chill</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div class="result-box" id="resultBox">
                <h2>Feels Like Temperature</h2>
                <div class="result-value" id="resultValue">--</div>
                <div class="result-msg" id="resultMsg"></div>
            </div>

        </div>
    </div>

    <!-- JavaScript integrated for functionality and auto-saving -->
    <script>
        // DOM Elements setup
        const tempInput = document.getElementById('temp');
        const tempUnitSelect = document.getElementById('tempUnit');
        const windInput = document.getElementById('wind');
        const windUnitSelect = document.getElementById('windUnit');
        const resultBox = document.getElementById('resultBox');
        const resultValue = document.getElementById('resultValue');
        const resultMsg = document.getElementById('resultMsg');

        // Automatically load saved data from LocalStorage
        function loadSavedData() {
            if (localStorage.getItem('wcc_temp')) tempInput.value = localStorage.getItem('wcc_temp');
            if (localStorage.getItem('wcc_tempUnit')) tempUnitSelect.value = localStorage.getItem('wcc_tempUnit');
            if (localStorage.getItem('wcc_wind')) windInput.value = localStorage.getItem('wcc_wind');
            if (localStorage.getItem('wcc_windUnit')) windUnitSelect.value = localStorage.getItem('wcc_windUnit');
        }

        // Save data to LocalStorage automatically
        function saveCurrentData() {
            localStorage.setItem('wcc_temp', tempInput.value);
            localStorage.setItem('wcc_tempUnit', tempUnitSelect.value);
            localStorage.setItem('wcc_wind', windInput.value);
            localStorage.setItem('wcc_windUnit', windUnitSelect.value);
        }

        // Event listeners attached to inputs for automatic saving
        tempInput.addEventListener('input', saveCurrentData);
        tempUnitSelect.addEventListener('change', saveCurrentData);
        windInput.addEventListener('input', saveCurrentData);
        windUnitSelect.addEventListener('change', saveCurrentData);

        // Core Calculation Logic
        function calculateWindChill() {
            const tempVal = parseFloat(tempInput.value);
            const windVal = parseFloat(windInput.value);
            const tUnit = tempUnitSelect.value;
            const wUnit = windUnitSelect.value;

            // Trigger manual save
            saveCurrentData();

            // Input Validation
            if (isNaN(tempVal) || isNaN(windVal)) {
                alert('Please enter valid numerical values for both Temperature and Wind Speed.');
                return;
            }

            // Standardize inputs to Fahrenheit and MPH to apply the NWS formula
            let tempF = tUnit === 'C' ? (tempVal * 9/5) + 32 : tempVal;
            let windMph = windVal;

            if (wUnit === 'kmh') {
                windMph = windVal / 1.609344;
            } else if (wUnit === 'ms') {
                windMph = windVal * 2.23694;
            } else if (wUnit === 'knots') {
                windMph = windVal * 1.15078;
            }

            resultBox.style.display = 'block';

            // Wind Chill formula valid condition: Temp <= 50°F and Wind > 3 mph
            if (tempF > 50 || windMph <= 3) {
                resultValue.innerText = tempVal.toFixed(1) + ' °' + tUnit;
                resultMsg.innerText = "Wind chill is undefined for temperatures above 50°F (10°C) or wind speeds 3 mph (4.8 km/h) or lower. The feels-like temperature matches the actual air temperature.";
                return;
            }

            // US National Weather Service Formula
            let windChillF = 35.74 + (0.6215 * tempF) - (35.75 * Math.pow(windMph, 0.16)) + (0.4275 * tempF * Math.pow(windMph, 0.16));

            // Re-convert to Celsius if required
            let finalWindChill = tUnit === 'C' ? (windChillF - 32) * 5/9 : windChillF;

            resultValue.innerText = finalWindChill.toFixed(1) + ' °' + tUnit;
            resultMsg.innerText = "Calculated successfully using the standard NWS wind chill formula.";
        }

        // Clear Data Function
        function clearData() {
            // Reset fields
            tempInput.value = '';
            windInput.value = '';
            tempUnitSelect.value = 'F';
            windUnitSelect.value = 'mph';
            
            // Hide result box
            resultBox.style.display = 'none';
            resultValue.innerText = '--';
            resultMsg.innerText = '';
            
            // Clear LocalStorage data
            localStorage.removeItem('wcc_temp');
            localStorage.removeItem('wcc_tempUnit');
            localStorage.removeItem('wcc_wind');
            localStorage.removeItem('wcc_windUnit');
        }

        // Initialize tool on page load
        window.onload = loadSavedData;
    </script>
</body>
