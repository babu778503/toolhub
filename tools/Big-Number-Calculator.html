<!DOCTYPE html>
<!-- Category: Math Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Big Number Calculator</title>
    <meta name="description" content="Free online Big Number Calculator. Perform arithmetic operations (Addition, Multiplication, Power, Factorial) on massive integers with arbitrary precision.">
    <meta name="keywords" content="Big Number Calculator, BigInt Calculator, Large Integer Calculation, Arbitrary Precision Calculator, Huge Number Math, ToolsHub365">
    <meta name="author" content="ToolsHub365">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/big-number-calculator">

    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Big Number Calculator",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Any",

        "price": "0",
        "priceCurrency": "USD"
      },

    <style>
        /* --- CSS Reset & Variables --- */
        :root {
            --primary-color: #6c5ce7;
            --primary-hover: #5b4cc4;
            --bg-color: #f1f2f6;
            --container-bg: #ffffff;
            --text-color: #2d3436;
            --border-color: #dfe6e9;
            --header-height: 50px;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* --- Header --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        /* --- Container --- */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 30px auto;
            background-color: var(--container-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- Inputs --- */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            color: #555;
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-family: 'Courier New', monospace; /* Monospace for numbers */
            border: 2px solid var(--border-color);
            border-radius: 6px;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }

        /* --- Operations Grid --- */
        .operations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }

        .btn-op {
            padding: 12px;
            background-color: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-color);
        }

        .btn-op:hover {
            background-color: #e1e4e8;
            transform: translateY(-2px);
        }

        .btn-op.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* --- Action Buttons --- */
        .action-row {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-main {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
            flex: 2;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
        }

        .btn-clear {
            background-color: #ff7675;
            color: white;
            flex: 1;
        }

        .btn-clear:hover {
            background-color: #d63031;
        }

        /* --- Result Area --- */
        .result-area {
            background-color: #2d3436;
            color: #00cec9;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            position: relative;
            display: none; /* Hidden by default */
        }

        .result-label {
            font-size: 0.8rem;
            color: #b2bec3;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .result-value {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            word-wrap: break-word; /* Crucial for big numbers */
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .btn-copy {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 5px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn-copy:hover {
            background: rgba(255,255,255,0.2);
        }

        /* --- Helper Text --- */
        .info-text {
            font-size: 0.85rem;
            color: #636e72;
            margin-top: -15px;
            font-style: italic;
        }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;
                margin: 0;
                padding: 20px;
                border-radius: 0;
                box-shadow: none;
                min-height: calc(100vh - var(--header-height));
            }

            .action-row {
                flex-direction: column;
            }

            .btn-main {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Big Number Calculator</h1>
    </header>

    <div class="container">
        
        <div class="input-group">
            <label for="num1">First Number (BigInt)</label>
            <textarea id="num1" placeholder="Enter a very large integer..." oninput="autoSave()"></textarea>
        </div>

        <div class="operations-grid">
            <button class="btn-op active" onclick="selectOp('add')" id="btn-add">Add (+)</button>
            <button class="btn-op" onclick="selectOp('sub')" id="btn-sub">Subtract (-)</button>
            <button class="btn-op" onclick="selectOp('mul')" id="btn-mul">Multiply (×)</button>
            <button class="btn-op" onclick="selectOp('div')" id="btn-div">Divide (÷)</button>
            <button class="btn-op" onclick="selectOp('mod')" id="btn-mod">Modulo (%)</button>
            <button class="btn-op" onclick="selectOp('pow')" id="btn-pow">Power (^)</button>
        </div>
        <input type="hidden" id="selectedOp" value="add">

        <div class="input-group" id="group-num2">
            <label for="num2">Second Number (BigInt)</label>
            <textarea id="num2" placeholder="Enter second number..." oninput="autoSave()"></textarea>
        </div>

        <p class="info-text">Note: Supports arbitrary-precision integers. Decimals are not supported.</p>

        <div class="action-row">
            <button class="btn-main btn-calc" onclick="calculate()">Calculate Result</button>
            <button class="btn-main btn-clear" onclick="clearData()">Clear Data</button>
        </div>

        <div id="result-box" class="result-area">
            <button class="btn-copy" onclick="copyResult()">Copy</button>
            <div class="result-label">Result</div>
            <div class="result-value" id="output"></div>
        </div>

    </div>

    <script>
        // --- State Management ---
        let currentOp = 'add';

        function selectOp(op) {
            currentOp = op;
            document.getElementById('selectedOp').value = op;
            
            // UI Updates
            document.querySelectorAll('.btn-op').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + op).classList.add('active');

            // Handle UI logic for operations
            const num2Group = document.getElementById('group-num2');
            const num2Label = num2Group.querySelector('label');

            if (op === 'pow') {
                num2Label.innerText = "Exponent (Integer)";
            } else {
                num2Label.innerText = "Second Number (BigInt)";
            }
            
            autoSave();
        }

        // --- Calculation Logic ---
        function calculate() {
            const val1 = document.getElementById('num1').value.trim();
            const val2 = document.getElementById('num2').value.trim();
            const resultBox = document.getElementById('result-box');
            const output = document.getElementById('output');

            if (!val1 || !val2) {
                alert("Please enter both numbers.");
                return;
            }

            try {
                // Remove non-numeric chars except minus sign
                // BigInt strictly accepts integers.
                const n1 = BigInt(val1);
                const n2 = BigInt(val2);
                let res;

                switch (currentOp) {
                    case 'add':
                        res = n1 + n2;
                        break;
                    case 'sub':
                        res = n1 - n2;
                        break;
                    case 'mul':
                        res = n1 * n2;
                        break;
                    case 'div':
                        if (n2 === 0n) throw "Cannot divide by zero.";
                        res = n1 / n2; // BigInt division truncates towards zero
                        break;
                    case 'mod':
                        if (n2 === 0n) throw "Cannot divide by zero.";
                        res = n1 % n2;
                        break;
                    case 'pow':
                        if (n2 < 0n) throw "Negative exponents not supported for BigInt.";
                        // Warning for massive exponents to prevent browser freeze
                        if (n2 > 10000n) {
                            if(!confirm("Warning: A large exponent might freeze your browser. Continue?")) return;
                        }
                        res = n1 ** n2;
                        break;
                }

                output.innerText = res.toString();
                resultBox.style.display = 'block';
                
                // Scroll to result on mobile
                if (window.innerWidth < 768) {
                    resultBox.scrollIntoView({ behavior: 'smooth' });
                }

            } catch (e) {
                output.innerText = "Error: " + (e.message || e);
                resultBox.style.display = 'block';
            }
        }

        // --- Clipboard ---
        function copyResult() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.btn-copy');
                const orig = btn.innerText;
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = orig, 1500);
            });
        }

        // --- Local Storage ---
        function autoSave() {
            const data = {
                num1: document.getElementById('num1').value,
                num2: document.getElementById('num2').value,
                op: currentOp
            };
            localStorage.setItem('bigNumCalcData', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('bigNumCalcData');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('num1').value = data.num1 || '';
                document.getElementById('num2').value = data.num2 || '';
                if (data.op) {
                    selectOp(data.op);
                }
            }
        }

        function clearData() {
            if (confirm("Are you sure you want to clear all data?")) {
                localStorage.removeItem('bigNumCalcData');
                document.getElementById('num1').value = '';
                document.getElementById('num2').value = '';
                document.getElementById('result-box').style.display = 'none';
                selectOp('add');
            }
        }

        // --- Init ---
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
