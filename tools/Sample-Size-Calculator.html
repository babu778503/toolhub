    <style>
        :root {
            --primary-color: #059669; /* Emerald Green */
            --primary-hover: #047857;
            --header-bg: #111827; /* Dark Gray */
            --header-text: #ffffff;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --header-height: 50px;
            --danger-color: #dc2626;
            --input-bg: #f9fafb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Tool Wrapper */
        .tool-wrapper {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        /* Input Grid */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #4b5563;
            font-size: 0.95rem;
        }

        .helper-text {
            font-size: 0.8rem;
            color: #9ca3af;
            margin-bottom: 5px;

        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background-color: var(--input-bg);
            transition: border-color 0.2s, box-shadow 0.2s;

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
            background-color: #fff;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;

            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-clear {
            background-color: white;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        button:hover {
            opacity: 0.9;
        }

        /* Results */
        .result-section {
            display: none; /* Hidden by default */
            margin-top: 20px;
            border-top: 2px dashed var(--border-color);
            padding-top: 25px;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: #ecfdf5;
            border: 1px solid #d1fae5;
            border-radius: 12px;
            padding: 30px;
            text-align: center;

        .result-label {
            font-size: 0.9rem;
            text-transform: uppercase;

            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
        }

        .result-note {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #064e3b;
        }

        .explanation-box {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.95rem;
            color: #374151;
            line-height: 1.6;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 0;
                margin: 0;
            }

            .tool-wrapper {
                border-radius: 0;
                box-shadow: none;
                border: none;
                width: 100%;
                min-height: calc(100vh - var(--header-height));
                padding: 20px;
            }

            .input-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .full-width {
                grid-column: span 1;
            }

            .btn-row {
                flex-direction: column;
            }

            .result-value {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Sample Size Calculator</h1>
    </header>

    <div class="container">
        <main class="tool-wrapper">
            
            <div class="input-grid">
                
                <!-- Confidence Level -->
                <div class="input-group">
                    <label for="confidence">Confidence Level (%)</label>
                    <div class="helper-text">How sure you want to be (Standard: 95%).</div>
                    <select id="confidence" onchange="saveData()">
                        <option value="90">90%</option>
                        <option value="95" selected>95%</option>
                        <option value="99">99%</option>
                    </select>
                </div>

                <!-- Margin of Error -->
                <div class="input-group">
                    <label for="margin">Margin of Error (%)</label>
                    <div class="helper-text">Allowed error range (Standard: 5%).</div>
                    <input type="number" id="margin" placeholder="5" value="5" oninput="saveData()">
                </div>

                <!-- Population Proportion -->
                <div class="input-group">
                    <label for="proportion">Population Proportion (%)</label>
                    <div class="helper-text">Leave at 50% if unsure (most conservative).</div>
                    <input type="number" id="proportion" placeholder="50" value="50" oninput="saveData()">
                </div>

                <!-- Population Size -->
                <div class="input-group">
                    <label for="population">Population Size</label>
                    <div class="helper-text">Optional. Leave blank if infinite/unknown.</div>
                    <input type="number" id="population" placeholder="e.g. 10000" oninput="saveData()">
                </div>

            </div>

            <div class="btn-row">
                <button class="btn-calc" onclick="calculate()">Calculate Sample Size</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div id="result-section" class="result-section">
                
                <div class="result-card">
                    <div class="result-label">Recommended Sample Size</div>
                    <div class="result-value" id="final-result">-</div>
                    <div class="result-note">Respondents needed</div>
                </div>

                <div class="explanation-box">
                    <strong>Interpretation:</strong>
                    <div id="explanation-text" style="margin-top: 5px;"></div>
                </div>

            </div>

        </main>
    </div>

    <script>
        // --- Logic ---
        
        // Z-Score Lookup based on Confidence Level
        const Z_SCORES = {
            '90': 1.645,
            '95': 1.96,
            '99': 2.576
        };

        function calculate() {
            // Get Inputs
            const confidenceLvl = document.getElementById('confidence').value;
            const marginErrorPercent = parseFloat(document.getElementById('margin').value);
            const proportionPercent = parseFloat(document.getElementById('proportion').value);
            let population = document.getElementById('population').value;

            // Validation
            if (isNaN(marginErrorPercent) || marginErrorPercent <= 0) {
                alert("Please enter a valid Margin of Error (greater than 0).");
                return;
            }
            if (isNaN(proportionPercent) || proportionPercent <= 0 || proportionPercent >= 100) {
                alert("Proportion must be between 0 and 100.");
                return;
            }

            // Convert percentages to decimals
            const Z = Z_SCORES[confidenceLvl];
            const e = marginErrorPercent / 100;
            const p = proportionPercent / 100;

            // 1. Calculate Sample Size for Infinite Population (Cochran's Formula)
            // n = (Z^2 * p * (1-p)) / e^2
            let ss = (Math.pow(Z, 2) * p * (1 - p)) / Math.pow(e, 2);

            // 2. Finite Population Correction (if population is provided)
            let usedPop = false;
            if (population && population.trim() !== "" && parseFloat(population) > 0) {
                const popSize = parseFloat(population);
                // Formula: n_adj = n / (1 + ((n-1)/pop))
                ss = ss / (1 + ((ss - 1) / popSize));
                usedPop = true;
            }

            // Round up to nearest whole person
            const result = Math.ceil(ss);

            // Display
            displayResult(result, confidenceLvl, marginErrorPercent, usedPop);
            saveData();
        }

        function displayResult(size, conf, margin, isFinite) {
            document.getElementById('final-result').textContent = size.toLocaleString();
            
            const explanation = `
                To be <strong>${conf}%</strong> confident that your survey results are within a <strong>±${margin}%</strong> margin of error, 
                you need to collect valid responses from <strong>${size.toLocaleString()}</strong> individuals.
                ${isFinite ? '<br><small><em>(Finite Population Correction applied)</em></small>' : '<br><small><em>(Calculated for an Infinite Population)</em></small>'}
            `;
            
            document.getElementById('explanation-text').innerHTML = explanation;
            document.getElementById('result-section').style.display = 'block';
        }


        // --- Data Persistence ---
        const STORAGE_KEY = 'sampleSizeCalcData';

        function saveData() {
            const data = {
                confidence: document.getElementById('confidence').value,
                margin: document.getElementById('margin').value,
                proportion: document.getElementById('proportion').value,
                population: document.getElementById('population').value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                if (data.confidence) document.getElementById('confidence').value = data.confidence;
                if (data.margin) document.getElementById('margin').value = data.margin;
                if (data.proportion) document.getElementById('proportion').value = data.proportion;
                if (data.population) document.getElementById('population').value = data.population;
                
                // Optional: Auto Calculate on load if valid data exists
                if (data.margin) calculate();
            }
        }

        function clearData() {
            document.getElementById('confidence').value = '95';
            document.getElementById('margin').value = '5';
            document.getElementById('proportion').value = '50';
            document.getElementById('population').value = '';
            document.getElementById('result-section').style.display = 'none';
            localStorage.removeItem(STORAGE_KEY);
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
