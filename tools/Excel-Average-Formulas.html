                ["AVERAGE + IFERROR", "Prevents #DIV/0! errors when ranges are empty.", "Numeric or string.", "=IFERROR(AVERAGE(range), \"\")", "=IFERROR(AVERAGE(A1:A10), 0)", "=IFERROR(SUM(A1:A10)/COUNT(A1:A10), 0)"],
                ["AVERAGE + IFNA", "Handles #N/A errors specifically.", "Numeric or string.", "=IFNA(AVERAGE(range), 0)", "=IFNA(AVERAGEIFS(B:B, A:A, \"X\"), 0)", "=IFNA(SUM(A1:A10)/COUNT(A1:A10), 0)"],
                ["AVERAGE ignoring zeros", "Calculates the average of only non-zero values.", "Numeric mean.", "=AVERAGEIF(range, \"<>0\")", "=AVERAGEIF(A1:A10, \"<>0\")", "=SUM(A1:A10)/COUNTIF(A1:A10, \"<>0\")"],
                ["AVERAGE ignoring blanks", "Native Excel behavior which skips empty cells in calculation.", "Numeric mean.", "=AVERAGE(range)", "=AVERAGE(A1:A100)", "=SUM(A1:A10)/COUNT(A1:A10)"]
            ]]
        ];

        const container = document.getElementById('dataContainer');
        const searchInput = document.getElementById('searchInput');

        function renderUI() {
            container.innerHTML = '';
            excelData.forEach((category, catIndex) => {
                const catName = category[0];
                const functions = category[1];

                const catDiv = document.createElement('div');
                catDiv.className = 'category-block' + (catIndex === 0 ? ' active' : '');
                catDiv.dataset.catName = catName.toLowerCase();

                const catHeader = document.createElement('div');
                catHeader.className = 'category-header';
                catHeader.textContent = catName;
                catHeader.onclick = () => catDiv.classList.toggle('active');

                const funcList = document.createElement('ul');
                funcList.className = 'func-list';

                functions.forEach(func => {
                    const [fName, fPurpose, fReturn, fSyntax, fExample, fSum] = func;
                    const funcItem = document.createElement('li');
                    funcItem.className = 'func-item';
                    funcItem.dataset.funcName = fName.toLowerCase();
                    funcItem.dataset.funcDesc = fPurpose.toLowerCase();

                    const funcHeader = document.createElement('div');
                    funcHeader.className = 'func-header';
                    funcHeader.textContent = fName;
                    funcHeader.onclick = () => funcItem.classList.toggle('active');

                    const funcDetails = document.createElement('div');
                    funcDetails.className = 'func-details';
                    
                    funcDetails.innerHTML = `
                        <div class="detail-section">
                            <h4>Purpose</h4>
                            <p>${fPurpose}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Return value</h4>
                            <p>${fReturn}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Syntax</h4>
                            <code>${fSyntax.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>
                        </div>
                        <div class="detail-section">
                            <h4>Examples</h4>
                            <code>${fExample.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>
                        </div>
                        <div class="detail-section">
                            <h4>Using the SUM function</h4>
                            <code>${fSum.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>
                        </div>
                    `;

                    funcItem.appendChild(funcHeader);
                    funcItem.appendChild(funcDetails);
                    funcList.appendChild(funcItem);
                });

                catDiv.appendChild(catHeader);
                catDiv.appendChild(funcList);
                container.appendChild(catDiv);
            });
        }

        function filterUI() {
            const query = searchInput.value.toLowerCase().trim();
            const categories = document.querySelectorAll('.category-block');

            categories.forEach(cat => {
                let hasVisibleItems = false;
                const items = cat.querySelectorAll('.func-item');

                items.forEach(item => {
                    const fName = item.dataset.funcName;
                    const fDesc = item.dataset.funcDesc;
                    if (fName.includes(query) || fDesc.includes(query)) {
                        item.style.display = 'block';
                        hasVisibleItems = true;
                    } else {
                        item.style.display = 'none';
                    }
                });

                if (hasVisibleItems) {
                    cat.style.display = 'block';
                    if(query.length > 0) cat.classList.add('active');
                } else {
                    cat.style.display = 'none';
                }
            });
        }

        searchInput.addEventListener('input', filterUI);
        document.addEventListener('DOMContentLoaded', renderUI);
    </script>
</body>
</html>
