<header>
    <h1>Excel Average Formulas</h1>
</header>

<div class="container">
    <!-- Persistent Search Feature -->
    <section class="search-box">
        <input type="text" id="formulaSearch" placeholder="Search averages (e.g. '365', 'weighted', 'if')..." onkeyup="filterResults()">
        <button class="clear-btn" onclick="clearSearch()">Reset</button>
    </section>

    <div class="formula-grid" id="mainDisplay">
        <!-- JavaScript will inject content here -->
    </div>
</div>

<script>
    const formulaLibrary = [
        {
            cat: "Core Average Functions",
            items: [
                { name: "AVERAGE", p: "Calculates the arithmetic mean of numbers.", r: "Number", s: "=AVERAGE(number1, [number2], ...)", e: "=AVERAGE(A1:A10)", u: "Equivalent to SUM(A1:A10)/COUNT(A1:A10)" },
                { name: "AVERAGEA", p: "Calculates average including text and logicals (Text=0, TRUE=1).", r: "Number", s: "=AVERAGEA(value1, ...)", e: "=AVERAGEA(A1:A10)", u: "Equivalent to SUM logic including non-numeric counts." },
                { name: "AVERAGEIF", p: "Averages cells based on a single criterion.", r: "Number", s: "=AVERAGEIF(range, criteria, [average_range])", e: "=AVERAGEIF(B1:B10, \">100\", A1:A10)", u: "Equivalent to SUMIF(...) / COUNTIF(...)" },
                { name: "AVERAGEIFS", p: "Averages cells based on multiple criteria.", r: "Number", s: "=AVERAGEIFS(average_range, criteria_range1, criteria1, ...)", e: "=AVERAGEIFS(A1:A10, B1:B10, \"Red\", C1:C10, \">5\")", u: "Equivalent to SUMIFS(...) / COUNTIFS(...)" }
            ]
        },
        {
            cat: "Conditional & Logical Combinations",
            items: [
                { name: "AVERAGE + IF", p: "Array formula to average based on complex logic.", r: "Number", s: "=AVERAGE(IF(range=val, average_range))", e: "{=AVERAGE(IF(A1:A10>0, A1:A10))}", u: "Sums items matching IF condition divided by matching count." },
                { name: "AVERAGEIF + OR (array)", p: "Average based on multiple OR conditions.", r: "Number", s: "=AVERAGE(AVERAGEIF(range, {\"A\",\"B\"}, avg_range))", e: "=AVERAGE(AVERAGEIF(A1:A10, {\"High\",\"Med\"}, B1:B10))", u: "Uses the SUM function logic across multiple categories." },
                { name: "AVERAGEIFS + AND", p: "Standard multi-criteria average.", r: "Number", s: "=AVERAGEIFS(...)", e: "=AVERAGEIFS(A:A, B:B, \"X\", C:C, \"Y\")", u: "SUMIFS/COUNTIFS logic." },
                { name: "AVERAGEIFS + OR", p: "Average results from multiple criteria sets.", r: "Number", s: "=AVERAGE(AVERAGEIFS(range, crit_r, {\"v1\",\"v2\"}))", e: "=AVERAGE(AVERAGEIFS(C:C, A:A, {\"A\",\"B\"}))", u: "Combines multiple sum-based results." },
                { name: "AVERAGE + IFERROR", p: "Average while ignoring error cells.", r: "Number", s: "=AVERAGE(IFERROR(range, \"\"))", e: "{=AVERAGE(IFERROR(A1:A10, \"\"))}", u: "Prevents SUM calculation from breaking on errors." },
                { name: "AVERAGE + ISNUMBER", p: "Average only numeric values in mixed range.", r: "Number", s: "=AVERAGE(IF(ISNUMBER(range), range))", e: "=AVERAGE(FILTER(A1:A10, ISNUMBER(A1:A10)))", u: "Calculates sum of numbers / count of numbers." },
                { name: "AVERAGE + ISBLANK", p: "Exclude or include blanks in average logic.", r: "Number", s: "=AVERAGE(IF(ISBLANK(range)=FALSE, range))", e: "=AVERAGEIF(A1:A10, \"<>\")", u: "Controls the divisor in the average sum." }
            ]
        },
        {
            cat: "Advanced Dynamic Excel (365)",
            items: [
                { name: "AVERAGE + FILTER", p: "Average a dynamically filtered range.", r: "Number", s: "=AVERAGE(FILTER(range, criteria))", e: "=AVERAGE(FILTER(A1:A10, B1:B10=\"Sales\"))", u: "Modern replacement for SUMIF-based averaging." },
                { name: "AVERAGE + UNIQUE", p: "Average only unique values.", r: "Number", s: "=AVERAGE(UNIQUE(range))", e: "=AVERAGE(UNIQUE(A1:A20))", u: "Sums unique items / count of unique items." },
                { name: "AVERAGE + SORT / SORTBY", p: "Average data while maintaining sorting logic.", r: "Number", s: "=AVERAGE(SORT(range))", e: "=AVERAGE(SORT(A1:A10))", u: "Basic SUM/COUNT on a sorted array." },
                { name: "AVERAGE + LET", p: "Store intermediate sums in variables.", r: "Number", s: "=LET(x, FILTER(...), AVERAGE(x))", e: "=LET(data, A1:A10, AVERAGE(data))", u: "Cleanly manages the SUM function parts." },
                { name: "AVERAGE + LAMBDA", p: "Create custom reusable average functions.", r: "Custom", s: "=LAMBDA(r, AVERAGE(r))", e: "=MYAVG(A1:A10)", u: "Customized math logic." },
                { name: "AVERAGE + BYROW / BYCOL", p: "Average every row or column in a matrix.", r: "Array", s: "=BYROW(array, LAMBDA(r, AVERAGE(r)))", e: "=BYROW(A1:C10, AVERAGE)", u: "Applies the SUM/COUNT logic across dimensions." },
                { name: "AVERAGE + TAKE / DROP", p: "Average a subset of data (top/bottom).", r: "Number", s: "=AVERAGE(TAKE(range, 5))", e: "=AVERAGE(TAKE(A1:A100, 10))", u: "Average of first 10 rows." },
                { name: "AVERAGE + CHOOSECOLS / CHOOSEROWS", p: "Average specific parts of an array.", r: "Number", s: "=AVERAGE(CHOOSECOLS(array, 2))", e: "=AVERAGE(CHOOSECOLS(A1:D10, 3))", u: "Sums specific column indices." }
            ]
        },
        {
            cat: "Text-Based Criteria Averaging",
            items: [
                { name: "AVERAGEIF + LEFT / RIGHT / MID", p: "Average based on partial text match.", r: "Number", s: "=AVERAGEIF(range, \"Text*\", avg_range)", e: "=AVERAGEIF(A1:A10, \"A*\", B1:B10)", u: "Uses wildcards to determine the SUM range." },
                { name: "AVERAGEIF + FIND / SEARCH", p: "Average based on keyword existence.", r: "Number", s: "=AVERAGE(FILTER(range, ISNUMBER(SEARCH(\"key\", range))))", e: "=AVERAGEIFS(B:B, A:A, \"*Contract*\")", u: "Sum matching strings / count matching strings." },
                { name: "AVERAGEIF + LEN", p: "Average based on text length.", r: "Number", s: "=AVERAGE(FILTER(avg_r, LEN(r)>5))", e: "=AVERAGE(IF(LEN(A1:A10)>3, B1:B10))", u: "Filters based on length before SUM." },
                { name: "AVERAGEIF + TEXTBEFORE / AFTER", p: "Average based on extracted text segments.", r: "Number", s: "=AVERAGE(VALUE(TEXTBEFORE(...)))", e: "=AVERAGE(VALUE(TEXTBEFORE(A1:A10, \"-\")))", u: "Parses text into numbers then applies the SUM function." },
                { name: "AVERAGEIF + EXACT", p: "Case-sensitive average.", r: "Number", s: "=AVERAGE(FILTER(range, EXACT(r, \"Val\")))", e: "=AVERAGE(IF(EXACT(\"Excel\", A1:A10), B1:B10))", u: "Strict sum based on case match." }
            ]
        },
        {
            cat: "Lookup-Based Averaging",
            items: [
                { name: "AVERAGE + VLOOKUP / HLOOKUP", p: "Average values retrieved from lookups.", r: "Number", s: "=AVERAGE(VLOOKUP(val, table, {2,3}, 0))", e: "=AVERAGE(VLOOKUP(\"ID1\", A1:D10, {2,3}, 0))", u: "Aggregates multiple lookup returns." },
                { name: "AVERAGE + XLOOKUP", p: "Average a range returned by XLOOKUP.", r: "Number", s: "=AVERAGE(XLOOKUP(val, lookup_r, return_r))", e: "=AVERAGE(XLOOKUP(\"A\", A1:A5, B1:C5))", u: "Direct average of dynamic lookup array." },
                { name: "AVERAGE + INDEX + MATCH", p: "Average dynamic rows or columns.", r: "Number", s: "=AVERAGE(INDEX(array, 0, MATCH(...)))", e: "=AVERAGE(INDEX(A1:Z10, 0, 2))", u: "Sums specific dynamic column / count." }
            ]
        },
        {
            cat: "Array & Advanced Techniques",
            items: [
                { name: "SUMPRODUCT / COUNT", p: "Weighted average calculation.", r: "Number", s: "=SUMPRODUCT(values, weights) / SUM(weights)", e: "=SUMPRODUCT(A1:A10, B1:B10)/SUM(B1:B10)", u: "The standard weighted SUM function approach." },
                { name: "SUM / COUNTIF", p: "Custom manual average.", r: "Number", s: "=SUM(range)/COUNTIF(range, \">0\")", e: "=SUM(A1:A10)/COUNTIF(A1:A10, \">0\")", u: "Manual average excluding zeros." }
            ]
        },
        {
            cat: "Statistical & Specialized Averages",
            items: [
                { name: "TRIMMEAN", p: "Average excluding the outliers.", r: "Number", s: "=TRIMMEAN(range, percent)", e: "=TRIMMEAN(A1:A100, 0.1)", u: "Truncated SUM logic." },
                { name: "GEOMEAN / HARMEAN", p: "Geometric and Harmonic means.", r: "Number", s: "=GEOMEAN(range)", e: "=GEOMEAN(B1:B5)", u: "Non-arithmetic summation logic." },
                { name: "MOVING AVERAGE", p: "Average of trailing N periods.", r: "Number", s: "=AVERAGE(A1:A10) -> =AVERAGE(A2:A11)", e: "=AVERAGE(B2:B5)", u: "Rolling SUM / window size." }
            ]
        },
        {
            cat: "Visibility & Filter-Based",
            items: [
                { name: "AVERAGE VISIBLE CELLS", p: "Average ignoring hidden filtered rows.", r: "Number", s: "=SUBTOTAL(1, range)", e: "=SUBTOTAL(1, A1:A100)", u: "Visible SUM / Visible COUNT." },
                { name: "AVERAGE FILTERED DATA", p: "Aggregate average ignoring errors/hidden rows.", r: "Number", s: "=AGGREGATE(1, 4, range)", e: "=AGGREGATE(1, 6, A1:A20)", u: "Error-resistant SUM function logic." }
            ]
        }
    ];

    function renderFormulas() {
        const container = document.getElementById('mainDisplay');
        let html = '';
        
        formulaLibrary.forEach(section => {
            html += `<div class="category-label">${section.cat}</div>`;
            section.items.forEach(item => {
                html += `
                    <div class="card" data-search="${(item.name + item.p + section.cat).toLowerCase()}">
                        <h2>${item.name}</h2>
                        <div class="detail-row"><span class="label">Purpose:</span>${item.p}</div>
                        <div class="detail-row"><span class="label">Return Value:</span>${item.r}</div>
                        <div class="detail-row"><span class="label">Syntax:</span><code>${item.s}</code></div>
                        <div class="detail-row"><span class="label">Examples:</span>${item.e}</div>
                        <div class="detail-row"><span class="label">Using the SUM function:</span>${item.u}</div>
                    </div>
                `;
            });
        });
        container.innerHTML = html;
    }

    function filterResults() {
        const query = document.getElementById('formulaSearch').value.toLowerCase();
        localStorage.setItem('avgSearch', query);
        const cards = document.querySelectorAll('.card');
        const cats = document.querySelectorAll('.category-label');

        cards.forEach(card => {
            if (card.getAttribute('data-search').includes(query)) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });

        cats.forEach(cat => {
            let sibling = cat.nextElementSibling;
            let visible = false;
            while (sibling && sibling.classList.contains('card')) {
                if (!sibling.classList.contains('hidden')) {
                    visible = true;
                    break;
                }
                sibling = sibling.nextElementSibling;
            }
            cat.style.display = visible ? 'block' : 'none';
        });
    }

    function clearSearch() {
        document.getElementById('formulaSearch').value = '';
        localStorage.removeItem('avgSearch');
        filterResults();
    }

    window.onload = () => {
        renderFormulas();
        const saved = localStorage.getItem('avgSearch');
        if(saved) {
            document.getElementById('formulaSearch').value = saved;
            filterResults();
        }
    };
</script>
