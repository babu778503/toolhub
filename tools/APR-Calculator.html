    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #0056b3;
            --secondary-color: #004494;
            --accent-color: #28a745;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --border-color: #ddd;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Space for fixed header */
        }

        /* Header Styling */
        header {
            height: 50px;
            width: 100%;
            background-color: var(--primary-color);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            background: var(--white);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
            padding: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }

        /* Layout Columns */
        .input-section {
            flex: 1;
            min-width: 300px;
            padding-right: 20px;
            border-right: 1px solid #eee;
        }

        .result-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper span {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 12px 12px 30px; /* space for icon */
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-wrapper.no-icon input {
            padding-left: 12px;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
            flex: 1;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: var(--white);
        }

        .btn-calc:hover {
            background-color: var(--secondary-color);
        }

        .btn-clear {
            background-color: #e9ecef;
            color: #495057;
        }

        .btn-clear:hover {
            background-color: #dde2e6;
        }

        /* Result Cards */
        .result-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .apr-display {
            margin-bottom: 25px;
        }

        .apr-display h2 {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 10px;
        }

        .apr-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        .detail-item span {
            display: block;
            font-size: 0.9rem;
            color: #777;
        }

        .detail-item strong {
            display: block;
            font-size: 1.1rem;
            color: #333;
        }

        /* Mobile Optimization */
        @media screen and (max-width: 768px) {
            body {
                padding-top: 50px;
            }

            .container {
                width: 100%;
                margin: 0;
                border-radius: 0;
                box-shadow: none;
                padding: 20px 0; /* Remove side padding, content handles it */
                display: block; /* Stack columns */
            }

            .input-section, .result-section {
                padding: 0 15px; /* Add internal padding for content */
                border-right: none;
                width: 100%;
            }

            .result-section {
                margin-top: 30px;
                border-top: 5px solid #f4f7f6;
                padding-top: 20px;
            }

            .apr-value {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>APR Calculator</h1>
    </header>

    <div class="container">
        <!-- Input Section -->
        <div class="input-section">
            <form id="aprForm" onsubmit="event.preventDefault(); calculateAPR();">
                
                <div class="form-group">
                    <label for="loanAmount">Loan Amount</label>
                    <div class="input-wrapper">
                        <span>$</span>
                        <input type="number" id="loanAmount" placeholder="e.g. 10000" min="1" step="0.01" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="interestRate">Interest Rate (Yearly %)</label>
                    <div class="input-wrapper">
                        <span>%</span>
                        <input type="number" id="interestRate" placeholder="e.g. 5.5" min="0" step="0.01" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="loanTerm">Loan Term (Years)</label>
                    <div class="input-wrapper no-icon">
                        <input type="number" id="loanTerm" placeholder="e.g. 5" min="0.1" step="0.1" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="extraCost">Extra Fees / Closing Costs</label>
                    <div class="input-wrapper">
                        <span>$</span>
                        <input type="number" id="extraCost" placeholder="e.g. 200" min="0" step="0.01" value="0">
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-calc">Calculate APR</button>
                    <button type="button" class="btn-clear" onclick="clearData()">Clear Data</button>
                </div>
            </form>
        </div>

        <!-- Result Section -->
        <div class="result-section">
            <div class="result-box">
                <div class="apr-display">
                    <h2>Real APR</h2>
                    <div class="apr-value" id="resultAPR">0.00%</div>
                </div>
                
                <div class="details-grid">
                    <div class="detail-item">
                        <span>Monthly Payment</span>
                        <strong id="resultMonthly">$0.00</strong>
                    </div>
                    <div class="detail-item">
                        <span>Total Payback</span>
                        <strong id="resultTotal">$0.00</strong>
                    </div>
                    <div class="detail-item">
                        <span>Total Interest</span>
                        <strong id="resultInterest">$0.00</strong>
                    </div>
                    <div class="detail-item">
                        <span>Total Cost (Fees+Int)</span>
                        <strong id="resultTotalCost">$0.00</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const elLoanAmount = document.getElementById('loanAmount');
        const elInterestRate = document.getElementById('interestRate');
        const elLoanTerm = document.getElementById('loanTerm');
        const elExtraCost = document.getElementById('extraCost');
        
        const elResultAPR = document.getElementById('resultAPR');
        const elResultMonthly = document.getElementById('resultMonthly');
        const elResultTotal = document.getElementById('resultTotal');
        const elResultInterest = document.getElementById('resultInterest');
        const elResultTotalCost = document.getElementById('resultTotalCost');

        // Load data on start
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            // Optional: trigger calculation if data exists
            if(elLoanAmount.value && elInterestRate.value && elLoanTerm.value) {
                calculateAPR();
            }
        });

        // Event listeners for auto-save
        const inputs = [elLoanAmount, elInterestRate, elLoanTerm, elExtraCost];
        inputs.forEach(input => {
            input.addEventListener('input', saveData);
        });

        function saveData() {
            const data = {
                amount: elLoanAmount.value,
                rate: elInterestRate.value,
                term: elLoanTerm.value,
                cost: elExtraCost.value
            };
            localStorage.setItem('aprCalcData', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('aprCalcData');
            if (saved) {
                const data = JSON.parse(saved);
                elLoanAmount.value = data.amount || '';
                elInterestRate.value = data.rate || '';
                elLoanTerm.value = data.term || '';
                elExtraCost.value = data.cost || '0';
            }
        }

        function clearData() {
            elLoanAmount.value = '';
            elInterestRate.value = '';
            elLoanTerm.value = '';
            elExtraCost.value = '0';
            
            // Reset results
            elResultAPR.innerText = "0.00%";
            elResultMonthly.innerText = "$0.00";
            elResultTotal.innerText = "$0.00";
            elResultInterest.innerText = "$0.00";
            elResultTotalCost.innerText = "$0.00";

            localStorage.removeItem('aprCalcData');
        }

        function calculateAPR() {
            // Get Values
            const P = parseFloat(elLoanAmount.value);
            const nominalRate = parseFloat(elInterestRate.value);
            const years = parseFloat(elLoanTerm.value);
            const fees = parseFloat(elExtraCost.value) || 0;

            if (!P || !years) {
                alert("Please enter valid loan details.");
                return;
            }

            const months = years * 12;
            
            // Calculate Monthly Payment (Standard)
            // r = monthly interest rate
            let monthlyPayment = 0;
            let totalPayment = 0;
            let totalInterest = 0;

            if (nominalRate === 0) {
                monthlyPayment = P / months;
            } else {
                const r = (nominalRate / 100) / 12;
                monthlyPayment = P * (r * Math.pow(1 + r, months)) / (Math.pow(1 + r, months) - 1);
            }

            totalPayment = monthlyPayment * months;
            totalInterest = totalPayment - P;

            // Calculate Real APR
            // The APR is the interest rate (r) that makes the present value of the future payments 
            // equal to the loan amount minus the fees.
            // P - Fees = Sum (MonthlyPayment / (1+r)^n)
            // We use Newton-Raphson method or Binary Search to find the rate.
            
            const loanAmountEffective = P - fees;
            let apr = 0;

            if (loanAmountEffective <= 0) {
                // If fees >= loan amount, APR is effectively infinite
                elResultAPR.innerText = "N/A";
                return;
            }

            if (fees === 0) {
                apr = nominalRate;
            } else {
                apr = findAPR(loanAmountEffective, monthlyPayment, months) * 12 * 100;
            }

            // Display Results
            elResultAPR.innerText = apr.toFixed(3) + "%";
            elResultMonthly.innerText = formatCurrency(monthlyPayment);
            elResultTotal.innerText = formatCurrency(totalPayment);
            elResultInterest.innerText = formatCurrency(totalInterest);
            elResultTotalCost.innerText = formatCurrency(totalInterest + fees);
        }

        // Helper to find APR rate using binary search
        function findAPR(loanAmount, monthlyPayment, months) {
            let min = 0;
            let max = 100; // 10000% Upper bound guess
            let guess = 0;
            
            for (let i = 0; i < 50; i++) { // 50 iterations is plenty for precision
                let mid = (min + max) / 2;
                guess = mid; // Monthly rate guess
                
                // Calculate Present Value of stream at this rate
                let pv = 0;
                if (mid === 0) {
                    pv = monthlyPayment * months;
                } else {
                    pv = (monthlyPayment * (1 - Math.pow(1 + mid, -months))) / mid;
                }

                if (pv > loanAmount) {
                    min = mid;
                } else {
                    max = mid;
                }
            }
            return guess;
        }

        function formatCurrency(num) {
            return "$" + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
    </script>
</body>
</html>
