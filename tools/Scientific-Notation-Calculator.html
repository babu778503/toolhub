<!DOCTYPE html>
<!-- Category: Math Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO & Technical Metadata -->
    <title>Scientific Notation Calculator</title>
    <meta name="description" content="Free online Scientific Notation Calculator by toolshub365.com. Convert decimal numbers to scientific notation and perform arithmetic operations (add, subtract, multiply, divide) automatically.">
    <meta name="keywords" content="Scientific Notation Calculator, Standard Form Calculator, Sig Fig Calculator, Exponential Notation, Math Tool, toolshub365, Engineering Notation, Physics Calculator">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/scientific-notation-calculator">
    
    <!-- JSON-LD for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Scientific Notation Calculator",
      "operatingSystem": "Any",
      "applicationCategory": "MathApplication",
      "offer": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "A responsive tool to convert and calculate numbers in scientific notation (standard form)."
    }
    </script>

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #3f51b5;
            --primary-hover: #303f9f;
            --header-bg: #1a237e;
            --header-text: #ffffff;
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dcdde1;
            --input-bg: #fdfdfd;
            --result-bg: #e8eaf6;
            --result-border: #3f51b5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Space for fixed header */
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Calculator Card */
        .calculator-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #e0e0e0;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            background: #fff;
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab-content {
            padding: 30px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        /* Inputs and Grid */
        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color);
            font-size: 0.95rem;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.1rem;
            background-color: var(--input-bg);
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(63, 81, 181, 0.15);
        }

        /* Scientific Input Row */
        .sci-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sci-part {
            flex: 1;
        }

        .sci-x10 {
            font-size: 1.2rem;
            font-weight: bold;
            color: #666;
            white-space: nowrap;
        }

        .operator-select {
            width: 80px;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid var(--border-color);
            font-size: 1.2rem;
            text-align: center;
            background: #fff;
            cursor: pointer;
        }

        /* Buttons */
        .btn-controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button.action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s;
        }

        button.action-btn:active {
            transform: scale(0.98);
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
        }

        .btn-clear {
            background-color: #ef5350;
            color: white;
        }

        .btn-clear:hover {
            background-color: #d32f2f;
        }

        /* Results */
        .result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: var(--result-bg);
            border-left: 5px solid var(--result-border);
            border-radius: 4px;
            display: none; /* Hidden by default */
        }

        .result-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .result-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
            word-break: break-all;
        }

        .result-sub {
            font-size: 1.1rem;
            color: #444;
        }

        .sup {
            font-size: 0.7em;
            vertical-align: super;
        }

        .error-msg {
            color: #d32f2f;
            text-align: center;
            margin-top: 10px;
            display: none;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;
                padding: 0; /* Remove blank space */
                margin: 0;
            }

            .calculator-card {
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
                border: none;
                min-height: calc(100vh - 50px);
                padding: 10px;
                display: flex;
                flex-direction: column;
            }

            .tab-content {
                padding: 20px 15px;
                flex: 1;
            }

            .btn-controls {
                flex-direction: column;
            }

            .sci-row {
                flex-wrap: wrap;
            }
            
            .sci-x10 {
                width: 100%;
                text-align: center;
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>

    <header>
        Scientific Notation Calculator
    </header>

    <div class="container">
        <div class="calculator-card">
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('convert')">Converter</button>
                <button class="tab-btn" onclick="switchTab('calculate')">Math Operations</button>
            </div>

            <!-- Tab 1: Converter -->
            <div id="tab-convert" class="tab-content active">
                <div class="input-group">
                    <label for="decimalInput">Enter Decimal Number (Standard Form)</label>
                    <input type="number" id="decimalInput" placeholder="e.g. 12300 or 0.005" step="any" oninput="convertFromDecimal()">
                </div>

                <div style="text-align: center; margin: 20px 0; color: #999; font-weight: bold;">OR</div>

                <div class="input-group">
                    <label>Enter Scientific Notation</label>
                    <div class="sci-row">
                        <input type="number" id="sciCoeff" class="sci-part" placeholder="Coefficient (a)" step="any" oninput="convertFromSci()">
                        <span class="sci-x10">× 10</span>
                        <input type="number" id="sciExp" class="sci-part" placeholder="Exponent (n)" step="1" oninput="convertFromSci()">
                    </div>
                </div>

                <div class="btn-controls">
                    <button class="action-btn btn-clear" onclick="clearConverter()">Clear</button>
                </div>

                <div class="result-box" id="resBoxConvert">
                    <div class="result-label">Scientific Notation</div>
                    <div class="result-value" id="resSci">0 × 10<span class="sup">0</span></div>
                    
                    <div class="result-label" style="margin-top:15px;">Decimal Notation</div>
                    <div class="result-sub" id="resDec">0</div>
                    
                    <div class="result-label" style="margin-top:15px;">E-Notation</div>
                    <div class="result-sub" id="resE">0e0</div>
                </div>
            </div>

            <!-- Tab 2: Calculator -->
            <div id="tab-calculate" class="tab-content">
                
                <!-- First Number -->
                <div class="input-group">
                    <label>First Number</label>
                    <div class="sci-row">
                        <input type="number" id="calcCoeff1" class="sci-part" placeholder="a" step="any" oninput="autoSave()">
                        <span class="sci-x10">× 10</span>
                        <input type="number" id="calcExp1" class="sci-part" placeholder="n" step="1" oninput="autoSave()">
                    </div>
                </div>

                <!-- Operator -->
                <div style="display: flex; justify-content: center; margin: 15px 0;">
                    <select id="calcOp" class="operator-select" onchange="autoSave()">
                        <option value="+">+</option>
                        <option value="-">-</option>
                        <option value="*">×</option>
                        <option value="/">÷</option>
                    </select>
                </div>

                <!-- Second Number -->
                <div class="input-group">
                    <label>Second Number</label>
                    <div class="sci-row">
                        <input type="number" id="calcCoeff2" class="sci-part" placeholder="b" step="any" oninput="autoSave()">
                        <span class="sci-x10">× 10</span>
                        <input type="number" id="calcExp2" class="sci-part" placeholder="m" step="1" oninput="autoSave()">
                    </div>
                </div>

                <p class="error-msg" id="calcError">Invalid Calculation</p>

                <div class="btn-controls">
                    <button class="action-btn btn-calc" onclick="performCalculation()">Calculate</button>
                    <button class="action-btn btn-clear" onclick="clearCalculator()">Clear</button>
                </div>

                <div class="result-box" id="resBoxCalc">
                    <div class="result-label">Result (Scientific)</div>
                    <div class="result-value" id="calcResSci">0 × 10<span class="sup">0</span></div>
                    
                    <div class="result-label" style="margin-top:15px;">Result (Decimal)</div>
                    <div class="result-sub" id="calcResDec">0</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const STORAGE_KEY = 'toolshub365_sci_calc';
        let currentTab = 'convert';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // Tab Switching
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`button[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            autoSave();
        }

        // --- Converter Logic ---

        function convertFromDecimal() {
            const decInput = document.getElementById('decimalInput').value;
            const resBox = document.getElementById('resBoxConvert');

            if (decInput === '') {
                // Do not clear the other input yet, user might be switching fields
                return;
            }

            const num = parseFloat(decInput);
            if (isNaN(num)) return;

            // Fill Sci Inputs
            const expStr = num.toExponential(); // "1.23e+5"
            const parts = expStr.split('e');
            const coeff = parseFloat(parts[0]);
            const exp = parseInt(parts[1]);

            // Update UI fields
            document.getElementById('sciCoeff').value = coeff;
            document.getElementById('sciExp').value = exp;

            displayConvertResult(coeff, exp, num, expStr);
            autoSave();
        }

        function convertFromSci() {
            const coeffVal = document.getElementById('sciCoeff').value;
            const expVal = document.getElementById('sciExp').value;
            
            if (coeffVal === '' || expVal === '') return;

            const coeff = parseFloat(coeffVal);
            const exp = parseFloat(expVal); // Handle decimals in exp usually int but just in case

            if (isNaN(coeff) || isNaN(exp)) return;

            const num = coeff * Math.pow(10, exp);
            
            // Update Decimal Input
            // Avoid extreme length strings
            let decStr;
            if (Math.abs(exp) > 20) {
                 decStr = num.toPrecision(10); // Fallback for very large/small
            } else {
                 decStr = num.toString();
                 // If toString converts back to e-notation, force it? 
                 // JS toString automatically uses e-notation for very large/small.
                 if(decStr.includes('e')) decStr = num.toFixed(Math.abs(exp) + 5).replace(/\.?0+$/, "");
            }

            document.getElementById('decimalInput').value = decStr;
            
            displayConvertResult(coeff, exp, num, `${coeff}e${exp >=0 ? '+' : ''}${exp}`);
            autoSave();
        }

        function displayConvertResult(coeff, exp, dec, eNot) {
            document.getElementById('resBoxConvert').style.display = 'block';
            document.getElementById('resSci').innerHTML = `${coeff} × 10<span class="sup">${exp}</span>`;
            document.getElementById('resDec').innerText = dec; // Shows JS representation
            document.getElementById('resE').innerText = eNot;
        }

        function clearConverter() {
            document.getElementById('decimalInput').value = '';
            document.getElementById('sciCoeff').value = '';
            document.getElementById('sciExp').value = '';
            document.getElementById('resBoxConvert').style.display = 'none';
            autoSave();
        }

        // --- Calculator Logic ---

        function performCalculation() {
            const c1 = parseFloat(document.getElementById('calcCoeff1').value);
            const e1 = parseFloat(document.getElementById('calcExp1').value);
            const c2 = parseFloat(document.getElementById('calcCoeff2').value);
            const e2 = parseFloat(document.getElementById('calcExp2').value);
            const op = document.getElementById('calcOp').value;
            
            const errorMsg = document.getElementById('calcError');
            const resBox = document.getElementById('resBoxCalc');

            if (isNaN(c1) || isNaN(e1) || isNaN(c2) || isNaN(e2)) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Please fill all fields with valid numbers.";
                resBox.style.display = 'none';
                return;
            }

            const num1 = c1 * Math.pow(10, e1);
            const num2 = c2 * Math.pow(10, e2);
            let result;

            switch(op) {
                case '+': result = num1 + num2; break;
                case '-': result = num1 - num2; break;
                case '*': result = num1 * num2; break;
                case '/': 
                    if(num2 === 0) {
                        errorMsg.style.display = 'block';
                        errorMsg.innerText = "Cannot divide by zero.";
                        resBox.style.display = 'none';
                        return;
                    }
                    result = num1 / num2; 
                    break;
            }

            errorMsg.style.display = 'none';
            resBox.style.display = 'block';

            // Format Result
            const expStr = result.toExponential();
            const parts = expStr.split('e');
            const resCoeff = parseFloat(parts[0]);
            const resExp = parseInt(parts[1]);

            document.getElementById('calcResSci').innerHTML = `${resCoeff} × 10<span class="sup">${resExp}</span>`;
            document.getElementById('calcResDec').innerText = result.toString();
            
            autoSave();
        }

        function clearCalculator() {
            document.getElementById('calcCoeff1').value = '';
            document.getElementById('calcExp1').value = '';
            document.getElementById('calcCoeff2').value = '';
            document.getElementById('calcExp2').value = '';
            document.getElementById('calcOp').value = '+';
            document.getElementById('resBoxCalc').style.display = 'none';
            document.getElementById('calcError').style.display = 'none';
            autoSave();
        }

        // --- Local Storage ---

        function autoSave() {
            const data = {
                tab: currentTab,
                convert: {
                    dec: document.getElementById('decimalInput').value,
                    coeff: document.getElementById('sciCoeff').value,
                    exp: document.getElementById('sciExp').value,
                    visible: document.getElementById('resBoxConvert').style.display
                },
                calc: {
                    c1: document.getElementById('calcCoeff1').value,
                    e1: document.getElementById('calcExp1').value,
                    c2: document.getElementById('calcCoeff2').value,
                    e2: document.getElementById('calcExp2').value,
                    op: document.getElementById('calcOp').value,
                    visible: document.getElementById('resBoxCalc').style.display
                }
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) return;

            try {
                const data = JSON.parse(saved);
                
                // Restore Tab
                if (data.tab) switchTab(data.tab);

                // Restore Converter
                if (data.convert) {
                    document.getElementById('decimalInput').value = data.convert.dec;
                    document.getElementById('sciCoeff').value = data.convert.coeff;
                    document.getElementById('sciExp').value = data.convert.exp;
                    
                    // If we have values, trigger calculation to update visual results
                    if(data.convert.dec) convertFromDecimal();
                    else if(data.convert.coeff) convertFromSci();
                }

                // Restore Calculator
                if (data.calc) {
                    document.getElementById('calcCoeff1').value = data.calc.c1;
                    document.getElementById('calcExp1').value = data.calc.e1;
                    document.getElementById('calcCoeff2').value = data.calc.c2;
                    document.getElementById('calcExp2').value = data.calc.e2;
                    document.getElementById('calcOp').value = data.calc.op || '+';

                    if (data.calc.visible === 'block' && data.calc.c1) {
                        performCalculation();
                    }
                }

            } catch (e) {
                console.error("Error loading saved data");
            }
        }

    </script>
</body>
</html>
