                    { label: 'Bold Cursive Script', value: applyFancyMap(text, 'scriptBold') },
                    { label: 'Gothic Fraktur', value: applyFancyMap(text, 'fraktur') },
                    { label: 'Bold Gothic Fraktur', value: applyFancyMap(text, 'frakturBold') },
                    { label: 'Double Struck (Outline)', value: applyFancyMap(text, 'doubleStruck') },
                    { label: 'Circled Letters', value: applyFancyMap(text, 'circled') },
                    { label: 'Dark Circled Letters', value: applyFancyMap(text, 'darkCircled') },
                    { label: 'Squared Letters', value: applyFancyMap(text, 'squared') },
                    { label: 'Dark Squared Letters', value: applyFancyMap(text, 'darkSquared') },
                    { label: 'Small Caps', value: applyFancyMap(text, 'smallCaps') },
                    { label: 'Wide / Vaporwave', value: applyFancyMap(text, 'wide') },
                    { label: 'Typewriter Monospace', value: applyFancyMap(text, 'monospace') },
                    { label: 'Modern Sans Bold', value: applyFancyMap(text, 'sansBold') },
                    { label: 'Modern Sans Italic', value: applyFancyMap(text, 'sansItalic') },
                    { label: 'Modern Sans Bold Italic', value: applyFancyMap(text, 'sansBoldItalic') },
                    { label: 'Reversed Text', value: reverseText(text) },
                    { label: 'Upside Down', value: reverseText(applyFancyMap(text, 'inverted')) }
                ];

                stylesList.forEach((item) => {
                    const wrapDiv = document.createElement('div');
                    wrapDiv.className = 'result-item';

                    const textDiv = document.createElement('div');
                    textDiv.className = 'text-container';
                    
                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'style-name';
                    labelDiv.innerText = item.label;

                    const valDiv = document.createElement('div');
                    valDiv.className = 'result-text';
                    valDiv.innerText = item.value;

                    textDiv.appendChild(labelDiv);
                    textDiv.appendChild(valDiv);

                    const copyButton = document.createElement('button');
                    copyButton.className = 'copy-btn';
                    copyButton.innerText = 'Copy';
                    
                    // 100% Workable Mobile & Desktop Copy Function
                    copyButton.onclick = () => {
                        const textToCopy = item.value;

                        const handleSuccess = () => {
                            const originalText = copyButton.innerText;
                            copyButton.innerText = 'Copied!';
                            copyButton.style.backgroundColor = '#075E54';
                            setTimeout(() => {
                                copyButton.innerText = originalText;
                                copyButton.style.backgroundColor = ''; // Reverts to default CSS hover/background
                            }, 2000);
                        };

                        const handleFailure = () => {
                            alert("Clipboard copy failed. Please copy manually.");
                        };

                        const executeFallbackCopy = () => {
                            // Create temporary textarea for mobile selection
                            const tempTextArea = document.createElement('textarea');
                            tempTextArea.value = textToCopy;
                            
                            // Styling to prevent layout shifting or scrolling to bottom
                            tempTextArea.style.position = 'fixed';
                            tempTextArea.style.top = '0';
                            tempTextArea.style.left = '-9999px';
                            tempTextArea.style.opacity = '0';
                            
                            document.body.appendChild(tempTextArea);
                            
                            // Step 1: Select the text for Mobile Devices (iOS/Android fallback requirement)
                            tempTextArea.select();
                            tempTextArea.setSelectionRange(0, 99999); 

                            try {
                                const successful = document.execCommand('copy');
                                if (successful) {
                                    handleSuccess();
                                } else {
                                    handleFailure();
                                }
                            } catch (err) {
                                handleFailure();
                            }
                            
                            // Cleanup
                            document.body.removeChild(tempTextArea);
                            window.getSelection().removeAllRanges(); // Deselect text
                        };

                        // Step 2: Try modern Clipboard API first, fallback to execCommand for Mobile WebView/Older browsers
                        if (navigator.clipboard && window.isSecureContext) {
                            navigator.clipboard.writeText(textToCopy)
                                .then(handleSuccess)
                                .catch(err => {
                                    executeFallbackCopy();
                                });
                        } else {
                            executeFallbackCopy();
                        }
                    };

                    wrapDiv.appendChild(textDiv);
                    wrapDiv.appendChild(copyButton);

                    resultsContainer.appendChild(wrapDiv);
                });
            }

            // Real-time Event Listener
            inputField.addEventListener('input', (event) => {
                const currentText = event.target.value;
                localStorage.setItem(storageKey, currentText); // Auto-save
                processFancyStyles(currentText);
            });

            // Clear Data Button functionality
            clearBtn.addEventListener('click', () => {
                inputField.value = '';
                localStorage.removeItem(storageKey);
                processFancyStyles('');
                inputField.focus();
            });

            // Initial Generate (if data exists on load)
            processFancyStyles(inputField.value);
        });
    </script>
</body>
</html>
