<!DOCTYPE html>
<!-- Category: Financial Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inflation Calculator</title>
    <meta name="description" content="Calculate the changing value of money over time with our free Inflation Calculator. Adjust for inflation rates to see future purchasing power.">
    <meta name="keywords" content="Inflation Calculator, purchasing power, future value of money, CPI calculator, financial planning, toolshub365.com, AI crawler optimized">
    <meta name="author" content="toolshub365.com">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://toolshub365.com/">
    <meta property="og:title" content="Inflation Calculator">
    <meta property="og:description" content="Calculate the real value of money adjusted for inflation over time.">
    
    <!-- Schema.org for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Inflation Calculator",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "offer": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "A tool to calculate the purchasing power of money over time based on inflation rates."
    }
    </script>

    <style>
        :root {
            --primary-color: #0056b3; /* Professional Blue */
            --accent-color: #00a8cc;
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #333333;
            --header-height: 50px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height); /* Space for fixed header */
            min-height: 100vh;
        }

        /* Header Styling */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* Main Container */
        main {
            width: 100%;
            max-width: 1200px; /* Desktop Constraint */
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Calculator Wrapper */
        .calculator-wrapper {
            background-color: var(--container-bg);
            width: 100%;
            padding: 40px;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: 1fr 1fr; /* Split View for Desktop */
            gap: 40px;
        }

        /* Form Section */
        .form-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        .input-group input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        .year-row {
            display: flex;
            gap: 20px;
        }
        
        .year-row .input-group {
            flex: 1;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
            flex: 2;
        }

        .btn-calc:hover {
            background-color: #004494;
        }

        .btn-clear {
            background-color: #e0e0e0;
            color: #333;
            flex: 1;
        }

        .btn-clear:hover {
            background-color: #d0d0d0;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Results Section */
        .result-section {
            background-color: #f8fbfd;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .result-title {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .result-sub {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 20px;
        }

        .breakdown {
            margin-top: 20px;
            text-align: left;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .breakdown-item span:last-child {
            font-weight: 600;
        }

        .inflation-warning {
            color: #d9534f;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* Mobile Optimization */
        @media screen and (max-width: 768px) {
            /* Remove Side Margins/Padding for Mobile */
            main {
                width: 100%;
                margin-top: 0; 
            }

            .calculator-wrapper {
                width: 100%;
                margin-top: 0;
                border-radius: 0;
                box-shadow: none;
                padding: 20px; /* Internal padding only */
                grid-template-columns: 1fr; /* Stack layout */
                gap: 30px;
            }

            .year-row {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Inflation Calculator</h1>
    </header>

    <main>
        <div class="calculator-wrapper">
            <!-- Input Section -->
            <div class="form-section">
                <div class="input-group">
                    <label for="amount">Initial Amount ($)</label>
                    <input type="number" id="amount" placeholder="e.g. 1000" step="0.01" min="0">
                </div>

                <div class="input-group">
                    <label for="rate">Average Annual Inflation Rate (%)</label>
                    <input type="number" id="rate" placeholder="e.g. 3.5" step="0.1" value="3.5">
                    <span class="inflation-warning" style="color: #666; font-size: 0.8rem;">Historic avg is approx 3-4%</span>
                </div>

                <div class="year-row">
                    <div class="input-group">
                        <label for="startYear">Start Year</label>
                        <input type="number" id="startYear" placeholder="e.g. 2000">
                    </div>
                    <div class="input-group">
                        <label for="endYear">End Year</label>
                        <input type="number" id="endYear" placeholder="e.g. 2024">
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn-calc" onclick="calculateInflation()">Calculate</button>
                    <button class="btn-clear" onclick="clearData()">Clear Data</button>
                </div>
            </div>

            <!-- Result Section -->
            <div class="result-section" id="resultContainer" style="opacity: 0.5;">
                <div class="result-title">Future Value / Buying Power</div>
                <div class="result-value" id="finalValue">$0.00</div>
                <div class="result-sub" id="resultDescription">Enter details to calculate</div>

                <div class="breakdown" id="breakdownSection" style="display: none;">
                    <div class="breakdown-item">
                        <span>Cumulative Inflation:</span>
                        <span id="totalPercentage">0%</span>
                    </div>
                    <div class="breakdown-item">
                        <span>Value Loss/Gain difference:</span>
                        <span id="differenceVal">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // DOM Elements
        const amountInput = document.getElementById('amount');
        const rateInput = document.getElementById('rate');
        const startYearInput = document.getElementById('startYear');
        const endYearInput = document.getElementById('endYear');
        
        const finalValueDisplay = document.getElementById('finalValue');
        const resultDescDisplay = document.getElementById('resultDescription');
        const resultContainer = document.getElementById('resultContainer');
        const breakdownSection = document.getElementById('breakdownSection');
        const totalPercentageDisplay = document.getElementById('totalPercentage');
        const differenceValDisplay = document.getElementById('differenceVal');

        // Storage Key
        const STORAGE_KEY = 'toolshub365_inflation_data';

        // Initialize
        window.onload = function() {
            loadData();
            // Optional: Auto calculate if data exists
            if(amountInput.value && startYearInput.value && endYearInput.value) {
                calculateInflation();
            }
        };

        // Event Listeners for Auto-Save
        const inputs = [amountInput, rateInput, startYearInput, endYearInput];
        inputs.forEach(input => {
            input.addEventListener('input', saveData);
        });

        // Main Calculation Function
        function calculateInflation() {
            // Get values
            const amount = parseFloat(amountInput.value);
            const rate = parseFloat(rateInput.value);
            const startYear = parseInt(startYearInput.value);
            const endYear = parseInt(endYearInput.value);

            // Validation
            if (isNaN(amount) || isNaN(rate) || isNaN(startYear) || isNaN(endYear)) {
                alert("Please fill in all fields with valid numbers.");
                return;
            }

            if (startYear >= endYear) {
                alert("End Year must be greater than Start Year.");
                return;
            }

            // Math: Future Value = Present Value * (1 + rate/100)^(years)
            const years = endYear - startYear;
            
            // Formula for Compound Inflation
            const multiplier = Math.pow((1 + (rate / 100)), years);
            const futureValue = amount * multiplier;
            const difference = futureValue - amount;
            const totalPercentChange = ((futureValue - amount) / amount) * 100;

            // Update UI
            resultContainer.style.opacity = "1";
            finalValueDisplay.innerText = formatCurrency(futureValue);
            
            resultDescDisplay.innerHTML = `
                In <strong>${endYear}</strong>, you would need <strong>${formatCurrency(futureValue)}</strong><br>
                to equal the purchasing power of <strong>${formatCurrency(amount)}</strong> in <strong>${startYear}</strong>.
            `;

            breakdownSection.style.display = "block";
            totalPercentageDisplay.innerText = totalPercentChange.toFixed(2) + "%";
            differenceValDisplay.innerText = formatCurrency(difference);
            
            // Re-save to ensure state is captured
            saveData();
        }

        // Helper: Format Currency
        function formatCurrency(num) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num);
        }

        // Local Storage: Save
        function saveData() {
            const data = {
                amount: amountInput.value,
                rate: rateInput.value,
                startYear: startYearInput.value,
                endYear: endYearInput.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // Local Storage: Load
        function loadData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                const data = JSON.parse(savedData);
                if(data.amount) amountInput.value = data.amount;
                if(data.rate) rateInput.value = data.rate;
                if(data.startYear) startYearInput.value = data.startYear;
                if(data.endYear) endYearInput.value = data.endYear;
            }
        }

        // Local Storage: Clear
        function clearData() {
            if(confirm('Are you sure you want to clear all data?')) {
                localStorage.removeItem(STORAGE_KEY);
                amountInput.value = '';
                rateInput.value = '3.5'; // Reset to default average
                startYearInput.value = '';
                endYearInput.value = '';
                
                // Reset Results
                resultContainer.style.opacity = "0.5";
                finalValueDisplay.innerText = "$0.00";
                resultDescDisplay.innerText = "Enter details to calculate";
                breakdownSection.style.display = "none";
            }
        }
    </script>
</body>
</html>
