                ["COUNTIF", "Counts number of cells that meet a single condition.", "Count integer.", "COUNTIF(range, criteria)", '=COUNTIF(A1:A10, ">10")', '=IF(COUNTIF(A1:A10, "Error")>0, SUM(B1:B10), 0)'],
                ["COUNTIFS", "Counts number of cells that meet multiple conditions.", "Count integer.", "COUNTIFS(criteria_range1, criteria1, ...)", '=COUNTIFS(A1:A10, "Active", B1:B10, ">50")', '=IF(COUNTIFS(A:A, "X", B:B, "Y")>5, SUM(C:C), 0)'],
                ["AVERAGEIF", "Averages cells that meet a single condition.", "Average number.", "AVERAGEIF(range, criteria, [average_range])", '=AVERAGEIF(A1:A10, ">0", B1:B10)', '=IF(AVERAGEIF(A1:A10, ">0")>50, SUM(A1:A10), 0)'],
                ["AVERAGEIFS", "Averages cells that meet multiple conditions.", "Average number.", "AVERAGEIFS(avg_range, criteria_range1, criteria1, ...)", '=AVERAGEIFS(C1:C10, A1:A10, "Male", B1:B10, ">18")', '=IF(AVERAGEIFS(C:C, A:A, "A", B:B, "B")>100, SUM(C:C), 0)']
            ]],
            ["✅ Array & Advanced Techniques", [
                ["IF (Array Formula)", "Performs multiple logical tests at once across arrays (Ctrl+Shift+Enter legacy).", "Array of True/False outcomes.", "{=IF(A1:A10>5, B1:B10, 0)}", '=MAX(IF(A1:A10="Sales", B1:B10))', '=SUM(IF(A1:A10="Product A", B1:B10*C1:C10, 0))'],
                ["IF + SUMPRODUCT", "Uses SUMPRODUCT for advanced conditional logic without requiring CSE arrays.", "Sum of arrays conditionally multiplied.", "SUMPRODUCT(--(cond_range=val), sum_range)", '=SUMPRODUCT(--(A1:A10="Sales"), B1:B10)', '=IF(SUMPRODUCT(--(A1:A10="A"), B1:B10)>100, SUM(C1:C10), 0)'],
                ["IF + MATCH", "Executes logic based on the position of an item in an array.", "Outcome based on match index.", "IF(ISNUMBER(MATCH(val, range, 0)), true, false)", '=IF(ISNUMBER(MATCH(A1, B:B, 0)), "Found", "Missing")', '=IF(ISNUMBER(MATCH("Goal", A1:A10, 0)), SUM(B1:B10), 0)'],
                ["IF + OFFSET", "Conditionally shifts referenced ranges dynamically.", "Dynamic range reference or value.", "IF(cond, OFFSET(ref, rows, cols), val)", '=SUM(IF(A1=1, OFFSET(B1, 0, 0, 5, 1), 0))', '=SUM(OFFSET(A1, 0, IF(B1="Next Month", 1, 0), 10, 1))'],
                ["IF + INDIRECT", "Conditionally builds cell reference strings on the fly.", "Evaluated reference data.", "IF(cond, INDIRECT(\"string\"), val)", '=IF(A1="Sht1", INDIRECT("Sheet1!A1"), INDIRECT("Sheet2!A1"))', '=SUM(INDIRECT(IF(A1="2023", "Data2023!B:B", "Data2024!B:B")))']
            ]],
            ["🔥 Bonus Techniques", [
                ["Conditional Formatting (IF logic)", "Formula based logic inside Home > Conditional Formatting rules.", "Applies formatting (colors, borders) instead of cell text.", "=logical_test", '=AND($A1="Done", $B1>100) (applies green fill)', '=$C1>SUM($A$1:$A$10) (highlights cells greater than sum)'],
                ["Case-Sensitive IF (EXACT)", "Using EXACT inside IF to force strict casing rules.", "Outcome based on exact case string match.", "IF(EXACT(A1, \"Target\"), true, false)", '=IF(EXACT(A1, "admin"), "Yes", "No")', '=IF(EXACT(A1, "TOTAL"), SUM(B1:B10), 0)'],
                ["Multiple Criteria IF", "Combining nested logical arrays for deep filtering.", "Outcome based on deep logical grids.", "IF((A1:A10=\"X\")*(B1:B10=\"Y\"), true, false)", '=IF((A1="X")*(B1="Y"), "Match", "No")', '=SUM(IF((A1:A10="X")*(B1:B10="Y"), C1:C10, 0))'],
                ["IF with Dates", "Executing logic based on Excel serial dates.", "Outcome based on time/date comparisons.", "IF(A1 > DATE(2023,1,1), true, false)", '=IF(A1>TODAY(), "Future", "Past")', '=IF(A1>TODAY(), SUM(B1:B10), SUM(C1:C10))'],
                ["IF with Blank Cells", "Distinguishing between 0, null strings \"\", and truly blank cells.", "Specific values ensuring blanks don't evaluate as 0.", "IF(A1=\"\", true, false)", '=IF(A1="", "Please Fill", A1*2)', '=IF(COUNTBLANK(A1:A5)=0, SUM(A1:A5), "Incomplete")']
            ]]
        ];

        // Render Data into DOM
        const container = document.getElementById('dataContainer');
        const searchInput = document.getElementById('searchInput');

        function renderUI() {
            container.innerHTML = '';
            
            excelData.forEach((category, catIndex) => {
                const catName = category[0];
                const functions = category[1];

                // Create Category Block
                const catDiv = document.createElement('div');
                catDiv.className = 'category-block active'; // Default open initially to structure DOM
                catDiv.dataset.catName = catName.toLowerCase();

                // Header
                const catHeader = document.createElement('div');
                catHeader.className = 'category-header';
                catHeader.textContent = catName;
                catHeader.onclick = () => {
                    catDiv.classList.toggle('active');
                };

                // Function List
                const funcList = document.createElement('ul');
                funcList.className = 'func-list';

                functions.forEach((func, funcIndex) => {
                    const [fName, fPurpose, fReturn, fSyntax, fExample, fSum] = func;

                    const funcItem = document.createElement('li');
                    funcItem.className = 'func-item';
                    funcItem.dataset.funcName = fName.toLowerCase();
                    funcItem.dataset.funcDesc = fPurpose.toLowerCase();

                    // Func Header
                    const funcHeader = document.createElement('div');
                    funcHeader.className = 'func-header';
                    funcHeader.textContent = fName;
                    funcHeader.onclick = () => {
                        funcItem.classList.toggle('active');
                    };

                    // Func Details
                    const funcDetails = document.createElement('div');
                    funcDetails.className = 'func-details';
                    
                    // Detail Sections HTML (Purpose > Return value > Syntax > Examples > Using the SUM function)
                    funcDetails.innerHTML = `
                        <div class="detail-section">
                            <h4>Purpose</h4>
                            <p>${fPurpose}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Return value</h4>
                            <p>${fReturn}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Syntax</h4>
                            <code>${fSyntax.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>
                        </div>
                        <div class="detail-section">
                            <h4>Examples</h4>
                            <code>${fExample.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>
                        </div>
                        <div class="detail-section">
                            <h4>Using the SUM function</h4>
                            <code>${fSum.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>
                        </div>
                    `;

                    funcItem.appendChild(funcHeader);
                    funcItem.appendChild(funcDetails);
                    funcList.appendChild(funcItem);
                });

                catDiv.appendChild(catHeader);
                catDiv.appendChild(funcList);
                container.appendChild(catDiv);
            });
        }

        // Search/Filter functionality
        function filterUI() {
            const query = searchInput.value.toLowerCase().trim();
            const categories = document.querySelectorAll('.category-block');

            categories.forEach(cat => {
                let hasVisibleItems = false;
                const items = cat.querySelectorAll('.func-item');

                items.forEach(item => {
                    const fName = item.dataset.funcName;
                    const fDesc = item.dataset.funcDesc;
                    
                    if (fName.includes(query) || fDesc.includes(query)) {
                        item.style.display = 'block';
                        hasVisibleItems = true;
                        // Auto-expand item if search exactly matches part of the text and query is long enough
                        if(query.length > 2) {
                            item.classList.add('active');
                        }
                    } else {
                        item.style.display = 'none';
                        item.classList.remove('active');
                    }
                });

                if (hasVisibleItems) {
                    cat.style.display = 'block';
                    if(query.length > 0) cat.classList.add('active');
                } else {
                    cat.style.display = 'none';
                }
            });
        }

        searchInput.addEventListener('input', filterUI);

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderUI();
            // Start with only the first category open to keep UI clean upon load
            const cats = document.querySelectorAll('.category-block');
            cats.forEach((cat, index) => {
                if(index !== 0) cat.classList.remove('active');
            });
        });
    </script>
</body>
</html>
