    <style>
        :root {
            --primary-color: #2563eb; /* Blue */
            --primary-hover: #1d4ed8;
            --header-bg: #1e293b; /* Slate 800 */
            --header-text: #ffffff;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
            --header-height: 50px;
            --danger-color: #dc2626;
            --success-color: #16a34a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Tool Wrapper */
        .tool-wrapper {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        /* Equation Visualizer */
        .equation-visual {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 30px;
            font-family: "Times New Roman", serif;
            font-style: italic;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
        }

        .highlight-var {
            color: var(--primary-color);
            font-weight: bold;
            font-style: normal;
        }

        /* Input Grid */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #64748b;
            font-size: 0.9rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.1rem;
            text-align: center;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-clear {
            background-color: white;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        button:hover {
            opacity: 0.9;
        }

        /* Results Section */
        .result-section {
            margin-top: 30px;
            border-top: 2px dashed var(--border-color);
            padding-top: 20px;
            display: none;
        }

        .result-card {
            background: #f0f9ff;
            border-left: 5px solid var(--primary-color);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 6px;
        }

        .result-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #64748b;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--text-color);
        }

        .steps-box {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .math-step {
            font-family: "Courier New", Courier, monospace;
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 0;
                margin: 0;
            }

            .tool-wrapper {
                border-radius: 0;
                box-shadow: none;
                border: none;
                width: 100%;
                min-height: calc(100vh - var(--header-height));
                padding: 20px;
            }

            .input-grid {
                grid-template-columns: 1fr; /* Stack inputs vertically */
                gap: 15px;
            }

            .btn-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Quadratic Formula Calculator</h1>
    </header>

    <div class="container">
        <main class="tool-wrapper">
            
            <!-- Visual Equation -->
            <div class="equation-visual">
                <span class="highlight-var" id="disp-a">a</span>x² + 
                <span class="highlight-var" id="disp-b">b</span>x + 
                <span class="highlight-var" id="disp-c">c</span> = 0
            </div>

            <!-- Input Fields -->
            <div class="input-grid">
                <div class="input-group">
                    <label for="val-a">Coefficient (a)</label>
                    <input type="number" id="val-a" placeholder="e.g. 1" oninput="updateVisual(); saveData();">
                </div>
                <div class="input-group">
                    <label for="val-b">Coefficient (b)</label>
                    <input type="number" id="val-b" placeholder="e.g. 5" oninput="updateVisual(); saveData();">
                </div>
                <div class="input-group">
                    <label for="val-c">Constant (c)</label>
                    <input type="number" id="val-c" placeholder="e.g. 6" oninput="updateVisual(); saveData();">
                </div>
            </div>

            <!-- Buttons -->
            <div class="btn-row">
                <button class="btn-calc" onclick="calculate()">Calculate Roots</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <!-- Results -->
            <div id="result-section" class="result-section">
                
                <div class="result-card">
                    <div class="result-title">Discriminant (Δ)</div>
                    <div class="result-value" id="res-discriminant">-</div>
                </div>

                <div class="result-card" style="border-left-color: var(--success-color);">
                    <div class="result-title">Roots (Solutions)</div>
                    <div class="result-value">
                        x₁ = <span id="res-x1">-</span><br>
                        x₂ = <span id="res-x2">-</span>
                    </div>
                </div>

                <div class="result-card" style="border-left-color: #f59e0b;">
                    <div class="result-title">Vertex (h, k)</div>
                    <div class="result-value" id="res-vertex">-</div>
                </div>

                <div class="steps-box">
                    <h3 style="margin-bottom:10px;">Calculation Steps</h3>
                    <div id="steps-content"></div>
                </div>

            </div>

        </main>
    </div>

    <script>
        // --- Visual Logic ---
        function updateVisual() {
            const a = document.getElementById('val-a').value;
            const b = document.getElementById('val-b').value;
            const c = document.getElementById('val-c').value;

            document.getElementById('disp-a').textContent = a ? a : 'a';
            // Handle visual operator signs (+/-)
            let bText = 'b';
            if (b) {
                bText = parseFloat(b) < 0 ? `(${b})` : b;
            }
            document.getElementById('disp-b').textContent = bText;

            let cText = 'c';
            if (c) {
                cText = parseFloat(c) < 0 ? `(${c})` : c;
            }
            document.getElementById('disp-c').textContent = cText;
        }

        // --- Calculation Logic ---
        function calculate() {
            const a = parseFloat(document.getElementById('val-a').value);
            const b = parseFloat(document.getElementById('val-b').value);
            const c = parseFloat(document.getElementById('val-c').value);

            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                alert("Please enter valid numbers for a, b, and c.");
                return;
            }

            if (a === 0) {
                alert("Coefficient 'a' cannot be zero (that would be a linear equation, not quadratic).");
                return;
            }

            // 1. Discriminant
            const delta = (b * b) - (4 * a * c);

            // 2. Vertex
            const vertX = -b / (2 * a);
            const vertY = (a * vertX * vertX) + (b * vertX) + c;

            // 3. Roots
            let x1, x2;
            let type = "";
            let stepsHTML = `<p>Formula: <span class="math-step">x = (-b ± √Δ) / 2a</span> where <span class="math-step">Δ = b² - 4ac</span></p>`;
            
            stepsHTML += `<p>1. Calculate Discriminant (Δ):<br>
                Δ = (${b})² - 4(${a})(${c})<br>
                Δ = ${b*b} - (${4*a*c})<br>
                <strong>Δ = ${delta}</strong></p>`;

            if (delta > 0) {
                type = "Two Real Roots";
                x1 = (-b + Math.sqrt(delta)) / (2 * a);
                x2 = (-b - Math.sqrt(delta)) / (2 * a);
                
                document.getElementById('res-x1').textContent = round(x1);
                document.getElementById('res-x2').textContent = round(x2);

                stepsHTML += `<p>Since Δ > 0, there are two distinct real roots.</p>`;
                stepsHTML += `<p>x = (-(${b}) ± √${delta}) / (2 × ${a})<br>`;
                stepsHTML += `x = (${-b} ± ${round(Math.sqrt(delta))}) / ${2*a}</p>`;

            } else if (delta === 0) {
                type = "One Real Root";
                x1 = -b / (2 * a);
                x2 = x1;
                
                document.getElementById('res-x1').textContent = round(x1);
                document.getElementById('res-x2').textContent = round(x1);

                stepsHTML += `<p>Since Δ = 0, there is exactly one real root.</p>`;
                stepsHTML += `<p>x = -(${b}) / (2 × ${a}) = ${-b}/${2*a}</p>`;

            } else {
                type = "Two Complex Roots";
                const realPart = -b / (2 * a);
                const imagPart = Math.sqrt(Math.abs(delta)) / (2 * a);
                
                const r = round(realPart);
                const i = round(imagPart); // Make positive for display
                
                // Format: a + bi
                const x1Str = `${r} + ${Math.abs(i)}i`;
                const x2Str = `${r} - ${Math.abs(i)}i`;

                document.getElementById('res-x1').textContent = x1Str;
                document.getElementById('res-x2').textContent = x2Str;

                stepsHTML += `<p>Since Δ < 0, the roots are complex.</p>`;
                stepsHTML += `<p>x = (${-b} ± i√${Math.abs(delta)}) / ${2*a}</p>`;
            }

            // Display Results
            document.getElementById('res-discriminant').textContent = `${delta} (${type})`;
            document.getElementById('res-vertex').textContent = `(${round(vertX)}, ${round(vertY)})`;
            document.getElementById('steps-content').innerHTML = stepsHTML;
            document.getElementById('result-section').style.display = 'block';

            saveData();
        }

        function round(num) {
            return Math.round((num + Number.EPSILON) * 10000) / 10000;
        }

        // --- Data Persistence ---
        const STORAGE_KEY = 'quadraticCalcData';

        function saveData() {
            const data = {
                a: document.getElementById('val-a').value,
                b: document.getElementById('val-b').value,
                c: document.getElementById('val-c').value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                if (data.a) document.getElementById('val-a').value = data.a;
                if (data.b) document.getElementById('val-b').value = data.b;
                if (data.c) document.getElementById('val-c').value = data.c;
                
                updateVisual();
                
                // Auto calculate if complete data exists
                if (data.a && data.b && data.c) {
                    calculate();
                }
            }
        }

        function clearData() {
            document.getElementById('val-a').value = '';
            document.getElementById('val-b').value = '';
            document.getElementById('val-c').value = '';
            updateVisual();
            document.getElementById('result-section').style.display = 'none';
            localStorage.removeItem(STORAGE_KEY);
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
