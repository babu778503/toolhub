    <style>
        :root {
            --primary-color: #0ea5e9; /* Sky Blue */
            --primary-hover: #0284c7;
            --header-bg: #0f172a;
            --header-text: #ffffff;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #334155;
            --border-color: #e2e8f0;
            --header-height: 50px;
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tool-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 700px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        /* Controls */
        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background-color: #fff;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        /* Input Grid */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .full-width {
            grid-column: span 2;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-clear {
            background-color: #f1f5f9;
            color: var(--danger-color);
            border: 1px solid var(--border-color);
        }

        button:hover {
            opacity: 0.9;
        }

        /* Results */
        .result-section {
            margin-top: 30px;
            border-top: 2px dashed var(--border-color);
            padding-top: 20px;
            display: none;
        }

        .result-card {
            background-color: #f8fafc;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary-color);
        }

        .result-title {
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 700;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .angle-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .angle-box {
            text-align: center;
            background: white;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 0;
                margin: 0;
            }

            .tool-card {
                border-radius: 0;
                box-shadow: none;
                border: none;
                padding: 20px;
                min-height: calc(100vh - var(--header-height));
            }

            .input-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .full-width {
                grid-column: span 1;
            }
        }
    </style>

<body>

    <header>
        <h1>Triangle Calculator</h1>
    </header>

    <div class="container">
        <main class="tool-card">
            
            <!-- Calculation Method Selection -->
            <div class="control-group">
                <label for="calc-mode">What do you know?</label>
                <select id="calc-mode" onchange="updateForm()">
                    <option value="base-height">Base & Height</option>
                    <option value="sss">3 Sides (SSS)</option>
                    <option value="sas">2 Sides & Included Angle (SAS)</option>
                </select>
            </div>

            <!-- Dynamic Input Forms -->
            <div id="inputs-container" class="input-grid">
                <!-- Fields injected by JS -->
            </div>

            <div class="btn-row">
                <button class="btn-calc" onclick="calculate()">Calculate</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <!-- Results Display -->
            <div id="result-section" class="result-section">
                
                <div class="result-card">
                    <div class="result-title">Area</div>
                    <div class="result-value" id="res-area">0</div>
                </div>

                <div class="result-card" id="card-perimeter">
                    <div class="result-title">Perimeter</div>
                    <div class="result-value" id="res-perimeter">0</div>
                </div>

                <!-- Angles Section (Only for SSS/SAS) -->
                <div id="angles-container" style="display:none;">
                    <label style="margin-top: 15px;">Angles (Degrees)</label>
                    <div class="angle-grid">
                        <div class="angle-box">
                            <small>∠A</small><br>
                            <strong id="angle-a">-</strong>
                        </div>
                        <div class="angle-box">
                            <small>∠B</small><br>
                            <strong id="angle-b">-</strong>
                        </div>
                        <div class="angle-box">
                            <small>∠C</small><br>
                            <strong id="angle-c">-</strong>
                        </div>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script>
        // --- Tool Logic ---

        const inputsContainer = document.getElementById('inputs-container');
        const modeSelect = document.getElementById('calc-mode');
        
        // Input Templates
        const templates = {
            'base-height': `
                <div class="full-width">
                    <label>Base (b)</label>
                    <input type="number" id="inp-b" placeholder="Enter base length" oninput="saveData()">
                </div>
                <div class="full-width">
                    <label>Height (h)</label>
                    <input type="number" id="inp-h" placeholder="Enter height" oninput="saveData()">
                </div>
            `,
            'sss': `
                <div>
                    <label>Side A</label>
                    <input type="number" id="side-a" placeholder="Length A" oninput="saveData()">
                </div>
                <div>
                    <label>Side B</label>
                    <input type="number" id="side-b" placeholder="Length B" oninput="saveData()">
                </div>
                <div class="full-width">
                    <label>Side C</label>
                    <input type="number" id="side-c" placeholder="Length C" oninput="saveData()">
                </div>
            `,
            'sas': `
                <div>
                    <label>Side A</label>
                    <input type="number" id="sas-a" placeholder="Length A" oninput="saveData()">
                </div>
                <div>
                    <label>Side B</label>
                    <input type="number" id="sas-b" placeholder="Length B" oninput="saveData()">
                </div>
                <div class="full-width">
                    <label>Angle γ (deg) - Between A & B</label>
                    <input type="number" id="sas-angle" placeholder="Angle in degrees" oninput="saveData()">
                </div>
            `
        };

        // Render inputs based on selection
        function updateForm() {
            const mode = modeSelect.value;
            inputsContainer.innerHTML = templates[mode];
            document.getElementById('result-section').style.display = 'none';
            // Try to restore values for this mode if they exist in memory from immediate switch
            loadDataForMode(mode); 
        }

        // Main Calculation
        function calculate() {
            const mode = modeSelect.value;
            let area = 0, perimeter = 0;
            let angA = 0, angB = 0, angC = 0;
            let showAngles = false;
            let showPerimeter = true;

            try {
                if (mode === 'base-height') {
                    const b = parseFloat(document.getElementById('inp-b').value);
                    const h = parseFloat(document.getElementById('inp-h').value);
                    
                    if (isNaN(b) || isNaN(h) || b <= 0 || h <= 0) throw "Please enter valid positive numbers.";
                    
                    area = 0.5 * b * h;
                    showPerimeter = false; // Cannot calculate perimeter with just B & H
                    
                } else if (mode === 'sss') {
                    const a = parseFloat(document.getElementById('side-a').value);
                    const b = parseFloat(document.getElementById('side-b').value);
                    const c = parseFloat(document.getElementById('side-c').value);

                    if (isNaN(a) || isNaN(b) || isNaN(c) || a<=0 || b<=0 || c<=0) throw "Enter valid side lengths.";
                    if (a + b <= c || a + c <= b || b + c <= a) throw "Invalid Triangle: Sum of two sides must be greater than the third.";

                    // Perimeter
                    perimeter = a + b + c;
                    const s = perimeter / 2;
                    // Area (Heron's)
                    area = Math.sqrt(s * (s - a) * (s - b) * (s - c));

                    // Angles (Law of Cosines)
                    // a^2 = b^2 + c^2 - 2bc cosA
                    // cosA = (b^2 + c^2 - a^2) / 2bc
                    angA = Math.acos((b*b + c*c - a*a) / (2*b*c)) * (180 / Math.PI);
                    angB = Math.acos((a*a + c*c - b*b) / (2*a*c)) * (180 / Math.PI);
                    angC = 180 - angA - angB;
                    showAngles = true;

                } else if (mode === 'sas') {
                    const a = parseFloat(document.getElementById('sas-a').value);
                    const b = parseFloat(document.getElementById('sas-b').value);
                    const angleDeg = parseFloat(document.getElementById('sas-angle').value);

                    if (isNaN(a) || isNaN(b) || isNaN(angleDeg) || a<=0 || b<=0 || angleDeg<=0 || angleDeg>=180) throw "Enter valid sides and angle (<180).";

                    const angleRad = angleDeg * (Math.PI / 180);
                    
                    // Area = 0.5 * a * b * sin(C)
                    area = 0.5 * a * b * Math.sin(angleRad);

                    // Find Side C using Law of Cosines
                    // c^2 = a^2 + b^2 - 2ab cos(angle)
                    const c = Math.sqrt(a*a + b*b - 2*a*b*Math.cos(angleRad));
                    perimeter = a + b + c;

                    // Find remaining angles
                    // Angle C is known (angleDeg)
                    angC = angleDeg;
                    // Find Angle A
                    angA = Math.acos((b*b + c*c - a*a) / (2*b*c)) * (180 / Math.PI);
                    angB = 180 - angA - angC;
                    showAngles = true;
                }

                // Display
                document.getElementById('res-area').innerText = formatNum(area);
                
                if(showPerimeter) {
                    document.getElementById('card-perimeter').style.display = 'block';
                    document.getElementById('res-perimeter').innerText = formatNum(perimeter);
                } else {
                    document.getElementById('card-perimeter').style.display = 'none';
                }

                if(showAngles) {
                    document.getElementById('angles-container').style.display = 'block';
                    document.getElementById('angle-a').innerText = formatNum(angA) + "°";
                    document.getElementById('angle-b').innerText = formatNum(angB) + "°";
                    document.getElementById('angle-c').innerText = formatNum(angC) + "°";
                } else {
                    document.getElementById('angles-container').style.display = 'none';
                }

                document.getElementById('result-section').style.display = 'block';
                saveData(); // Save successful calculation data

            } catch (e) {
                alert(e);
            }
        }

        function formatNum(num) {
            // If whole number, show whole. If decimal, max 4 places.
            if (Number.isInteger(num)) return num;
            return parseFloat(num.toFixed(4));
        }

        // --- Data Persistence ---

        const STORAGE_KEY = 'triangleToolData';

        function saveData() {
            const mode = modeSelect.value;
            const data = {
                mode: mode,
                values: {}
            };

            // Capture inputs based on current mode
            const inputs = inputsContainer.querySelectorAll('input');
            inputs.forEach(input => {
                data.values[input.id] = input.value;
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                
                // Set Mode
                if(data.mode) {
                    modeSelect.value = data.mode;
                    updateForm(); // This resets inputs, so we fill them next
                }

                // Fill Values
                if(data.values) {
                    for (const [id, val] of Object.entries(data.values)) {
                        const el = document.getElementById(id);
                        if(el) el.value = val;
                    }
                    // Optional: Calculate automatically if data exists
                    // calculate(); 
                }
            } else {
                updateForm(); // Default init
            }
        }

        // Helper for internal mode switching (preserves data between tab switches slightly if desired, but here we just load from LS)
        function loadDataForMode(mode) {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                if (data.mode === mode && data.values) {
                    for (const [id, val] of Object.entries(data.values)) {
                        const el = document.getElementById(id);
                        if(el) el.value = val;
                    }
                }
            }
        }

        function clearData() {
            localStorage.removeItem(STORAGE_KEY);
            modeSelect.value = 'base-height';
            updateForm();
            document.getElementById('result-section').style.display = 'none';
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
