<!DOCTYPE html>
<!-- Category: Financial Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- SEO & Metadata -->
    <title>Retirement Calculator</title>
    <meta name="description" content="Free Retirement Calculator to estimate your future savings. Calculate 401k, IRA, and pension growth with compound interest. Mobile-friendly with auto-save.">
    <meta name="keywords" content="Retirement Calculator, 401k calculator, pension calculator, retirement savings, investment growth, fire movement, toolshub365">
    <meta name="author" content="ToolsHub365">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/retirement-calculator">

    <!-- Open Graph for Social Media -->
    <meta property="og:title" content="Retirement Calculator">
    <meta property="og:description" content="Plan your future with this easy-to-use Retirement Calculator. See how your savings grow over time.">
    <meta property="og:url" content="https://toolshub365.com/retirement-calculator">
    <meta property="og:type" content="website">

    <!-- Schema.org for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Retirement Calculator",
      "url": "https://toolshub365.com/retirement-calculator",
      "description": "A financial tool to calculate estimated retirement savings based on current contributions and interest rates.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <style>
        /* CSS Variables & Reset */
        :root {
            --primary-color: #27ae60; /* Growth Green */
            --primary-dark: #219150;
            --accent-color: #3498db; /* Blue */
            --header-bg: #2c3e50;
            --header-text: #ffffff;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-radius: 8px;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Space for fixed header */
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            width: 100%;
            height: 50px;
            background-color: var(--header-bg);
            color: var(--header-text);
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* Main Container */
        .container {
            margin: 0 auto;
            background-color: var(--card-bg);
            min-height: calc(100vh - 50px);
        }

        /* Desktop specific layout */
        @media (min-width: 769px) {
            .container {
                max-width: 1200px;
                margin: 30px auto;
                border-radius: var(--border-radius);
                box-shadow: var(--shadow);
                padding: 40px;
                min-height: auto;
            }
            
            .calculator-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 50px;
                align-items: start;
            }
        }

        /* Mobile specific layout */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 20px; /* Content padding */
                box-shadow: none;
                border-radius: 0;
            }

            .calculator-grid {
                display: flex;
                flex-direction: column;
                gap: 30px;
            }
        }

        /* Input Styles */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-prefix, .input-suffix {
            position: absolute;
            color: #7f8c8d;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .input-prefix { left: 15px; }
        .input-suffix { right: 15px; }

        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
            background-color: #fff;
        }

        /* Adjust padding based on prefix/suffix */
        .has-prefix input { padding-left: 30px; }
        .has-suffix input { padding-right: 35px; }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.2);
        }

        .row {
            display: flex;
            gap: 15px;
        }
        
        .col {
            flex: 1;
        }

        /* Buttons */
        .btn-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        /* Results Display */
        .results-section {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            text-align: center;
        }

        .result-title {
            font-size: 1rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .main-result {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 25px;
        }

        /* Visual Breakdown Bars */
        .breakdown-container {
            margin-top: 30px;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #555;
        }

        .visual-bar-wrapper {
            height: 15px;
            background-color: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            margin-bottom: 20px;
        }

        .bar-contrib {
            height: 100%;
            background-color: var(--accent-color);
        }

        .bar-interest {
            height: 100%;
            background-color: var(--primary-color);
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* Accessibility Focus */
        *:focus-visible {
            outline: 2px solid var(--primary-dark);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Retirement Calculator</h1>
    </header>

    <div class="container">
        <div class="calculator-grid">
            
            <!-- Inputs -->
            <div class="inputs-section">
                
                <div class="row">
                    <div class="col">
                        <div class="input-group">
                            <label for="currentAge">Current Age</label>
                            <div class="input-wrapper has-suffix">
                                <input type="number" id="currentAge" placeholder="30" min="1" max="100" oninput="calculate()">
                                <span class="input-suffix">Yrs</span>
                            </div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="input-group">
                            <label for="retireAge">Retirement Age</label>
                            <div class="input-wrapper has-suffix">
                                <input type="number" id="retireAge" placeholder="65" min="1" max="100" oninput="calculate()">
                                <span class="input-suffix">Yrs</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="currentSavings">Current Savings</label>
                    <div class="input-wrapper has-prefix">
                        <span class="input-prefix">$</span>
                        <input type="number" id="currentSavings" placeholder="10000" min="0" oninput="calculate()">
                    </div>
                </div>

                <div class="input-group">
                    <label for="annualContrib">Annual Contribution</label>
                    <div class="input-wrapper has-prefix">
                        <span class="input-prefix">$</span>
                        <input type="number" id="annualContrib" placeholder="5000" min="0" oninput="calculate()">
                    </div>
                </div>

                <div class="input-group">
                    <label for="interestRate">Expected Annual Return</label>
                    <div class="input-wrapper has-suffix">
                        <input type="number" id="interestRate" placeholder="7" min="0" max="15" step="0.1" oninput="calculate()">
                        <span class="input-suffix">%</span>
                    </div>
                </div>

                <div class="btn-container">
                    <button class="btn-clear" onclick="clearData()">Clear Data</button>
                </div>

            </div>

            <!-- Results -->
            <div class="results-section">
                <div class="result-title">Estimated Retirement Savings</div>
                <div class="main-result" id="totalResult">$0.00</div>

                <div class="breakdown-container">
                    
                    <div class="bar-label">
                        <span>Total Contributed: <strong id="valContrib">$0.00</strong></span>
                    </div>
                    
                    <div class="visual-bar-wrapper">
                        <div class="bar-contrib" id="barContrib" style="width: 50%"></div>
                        <div class="bar-interest" id="barInterest" style="width: 50%"></div>
                    </div>

                    <div class="bar-label" style="justify-content: flex-end;">
                        <span>Total Interest: <strong id="valInterest" style="color: var(--primary-color);">$0.00</strong></span>
                    </div>

                    <div class="legend">
                        <div class="legend-item">
                            <div class="dot" style="background-color: var(--accent-color);"></div> Your Contributions
                        </div>
                        <div class="legend-item">
                            <div class="dot" style="background-color: var(--primary-color);"></div> Interest Earned
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // DOM Elements
        const elCurrentAge = document.getElementById('currentAge');
        const elRetireAge = document.getElementById('retireAge');
        const elCurrentSavings = document.getElementById('currentSavings');
        const elAnnualContrib = document.getElementById('annualContrib');
        const elRate = document.getElementById('interestRate');
        
        const elTotalResult = document.getElementById('totalResult');
        const elValContrib = document.getElementById('valContrib');
        const elValInterest = document.getElementById('valInterest');
        const barContrib = document.getElementById('barContrib');
        const barInterest = document.getElementById('barInterest');

        // Formatter
        const money = new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
            maximumFractionDigits: 0
        });

        // Init
        window.addEventListener('DOMContentLoaded', loadData);

        function calculate() {
            // Get inputs
            const currentAge = parseFloat(elCurrentAge.value) || 0;
            const retireAge = parseFloat(elRetireAge.value) || 0;
            const currentSavings = parseFloat(elCurrentSavings.value) || 0;
            const annualContrib = parseFloat(elAnnualContrib.value) || 0;
            const rate = parseFloat(elRate.value) || 0;

            let yearsToGrow = retireAge - currentAge;
            
            // Basic Validation
            if (yearsToGrow <= 0) yearsToGrow = 0;
            
            // 1. Future Value of Current Savings: FV = PV * (1+r)^n
            const r = rate / 100;
            let futureSavings = currentSavings * Math.pow((1 + r), yearsToGrow);

            // 2. Future Value of Annual Contributions: FV = PMT * (((1+r)^n - 1) / r)
            let futureContrib = 0;
            if (r > 0) {
                futureContrib = annualContrib * ((Math.pow((1 + r), yearsToGrow) - 1) / r);
            } else {
                futureContrib = annualContrib * yearsToGrow;
            }

            // Totals
            const totalRetirement = futureSavings + futureContrib;
            
            // Breakdown Calculation
            const totalPrincipal = currentSavings + (annualContrib * yearsToGrow);
            const totalInterest = totalRetirement - totalPrincipal;

            // UI Update
            elTotalResult.textContent = money.format(totalRetirement);
            elValContrib.textContent = money.format(totalPrincipal);
            elValInterest.textContent = money.format(totalInterest);

            // Bar Update
            if (totalRetirement > 0) {
                const contribPercent = (totalPrincipal / totalRetirement) * 100;
                const interestPercent = 100 - contribPercent;
                
                barContrib.style.width = `${contribPercent}%`;
                barInterest.style.width = `${interestPercent}%`;
            } else {
                barContrib.style.width = '0%';
                barInterest.style.width = '0%';
            }

            saveData();
        }

        function saveData() {
            const data = {
                currAge: elCurrentAge.value,
                retireAge: elRetireAge.value,
                currSav: elCurrentSavings.value,
                annCon: elAnnualContrib.value,
                rate: elRate.value
            };
            localStorage.setItem('toolshub365_retire_calc', JSON.stringify(data));
        }

        function loadData() {
            const stored = localStorage.getItem('toolshub365_retire_calc');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    if(data.currAge) elCurrentAge.value = data.currAge;
                    if(data.retireAge) elRetireAge.value = data.retireAge;
                    if(data.currSav) elCurrentSavings.value = data.currSav;
                    if(data.annCon) elAnnualContrib.value = data.annCon;
                    if(data.rate) elRate.value = data.rate;
                    
                    if(data.currAge || data.currSav) calculate();
                } catch (e) {
                    console.error("Error loading data");
                }
            }
        }

        function clearData() {
            elCurrentAge.value = '';
            elRetireAge.value = '';
            elCurrentSavings.value = '';
            elAnnualContrib.value = '';
            elRate.value = '';
            
            elTotalResult.textContent = '$0';
            elValContrib.textContent = '$0';
            elValInterest.textContent = '$0';
            barContrib.style.width = '0%';
            barInterest.style.width = '0%';
            
            localStorage.removeItem('toolshub365_retire_calc');
        }
    </script>
</body>
</html>
