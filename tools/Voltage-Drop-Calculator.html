    <style>

<body>

    <header>
        <h1>Voltage Drop Calculator</h1>
    </header>

    <main class="container">
        <section class="app-wrapper">
            
            <!-- Input Area -->
            <div class="inputs-panel">
                <div class="input-row">
                    <div class="input-group">
                        <label for="material">Wire Material</label>
                        <select id="material" onchange="calculate()">
                            <option value="copper">Copper</option>
                            <option value="aluminum">Aluminum</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="phase">Phase System</label>
                        <select id="phase" onchange="calculate()">
                            <option value="1">Single Phase (or DC)</option>
                            <option value="3">Three Phase</option>
                        </select>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="voltage">System Voltage (V)</label>
                        <input type="number" id="voltage" min="1" step="any" placeholder="e.g. 120" oninput="calculate()">
                    </div>
                    <div class="input-group">
                        <label for="current">Load Current (A)</label>
                        <input type="number" id="current" min="0" step="any" placeholder="e.g. 20" oninput="calculate()">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="distance">One-Way Distance</label>
                        <div class="input-with-unit">
                            <input type="number" id="distance" min="0" step="any" placeholder="e.g. 100" oninput="calculate()">
                            <select id="dist-unit" onchange="calculate()">
                                <option value="ft">Feet</option>
                                <option value="m">Meters</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="awg">Wire Size (AWG)</label>
                        <select id="awg" onchange="calculate()">
                            <option value="4110">14 AWG</option>
                            <option value="6530">12 AWG</option>
                            <option value="10380" selected>10 AWG</option>
                            <option value="16510">8 AWG</option>
                            <option value="26240">6 AWG</option>
                            <option value="41740">4 AWG</option>
                            <option value="52620">3 AWG</option>
                            <option value="66360">2 AWG</option>
                            <option value="83690">1 AWG</option>
                            <option value="105600">1/0 AWG</option>
                            <option value="133100">2/0 AWG</option>
                            <option value="167800">3/0 AWG</option>
                            <option value="211600">4/0 AWG</option>
                        </select>
                    </div>
                </div>

                <!-- Controls -->
                <div class="controls">
                    <button class="btn-clear" onclick="clearData()">Clear Data</button>
                </div>
            </div>

            <!-- Results Area -->
            <div class="results-panel">
                <div class="result-box">
                    <div class="value" id="res-vdrop">0.00 V</div>
                    <div class="label">Voltage Drop</div>
                </div>
                <div class="result-box">
                    <div class="value" id="res-percent">0.00 %</div>
                    <div class="label">Percentage Drop</div>
                </div>
                <div class="result-box">
                    <div class="value" id="res-endvolt">0.00 V</div>
                    <div class="label">Voltage at End of Circuit</div>
                </div>
            </div>

        </section>
    </main>

    <script>
        // DOM Elements
        const elMaterial = document.getElementById('material');
        const elPhase = document.getElementById('phase');
        const elVoltage = document.getElementById('voltage');
        const elCurrent = document.getElementById('current');
        const elDistance = document.getElementById('distance');
        const elDistUnit = document.getElementById('dist-unit');
        const elAwg = document.getElementById('awg');

        const resVdrop = document.getElementById('res-vdrop');
        const resPercent = document.getElementById('res-percent');
        const resEndvolt = document.getElementById('res-endvolt');

        // Storage Key
        const STORAGE_KEY = 'voltageDropCalc_toolshub365';

        // Initialize
        function init() {
            loadData();
            calculate();
        }

        // Core Calculation Engine
        function calculate() {
            // Retrieve Input Values
            const material = elMaterial.value;
            const phase = parseInt(elPhase.value);
            const voltage = parseFloat(elVoltage.value);
            const current = parseFloat(elCurrent.value);
            let distance = parseFloat(elDistance.value);
            const distUnit = elDistUnit.value;
            const cmil = parseFloat(elAwg.value); // Circular mils corresponding to AWG

            // Validate inputs
            if (isNaN(voltage) || isNaN(current) || isNaN(distance) || voltage <= 0) {
                resetUI();
                saveData();
                return;
            }

            // Convert distance to feet if necessary
            if (distUnit === 'm') {
                distance = distance * 3.28084;
            }

            // K = Ohms-cmil/ft factor (Standard values for Copper and Aluminum)
            const K = (material === 'copper') ? 12.9 : 21.2;

            let vDrop = 0;

            // Voltage Drop Formula
            if (phase === 1) {
                // Single Phase / DC: VD = (2 * K * I * D) / CM
                vDrop = (2 * K * current * distance) / cmil;
            } else {
                // Three Phase: VD = (sqrt(3) * K * I * D) / CM
                vDrop = (1.732 * K * current * distance) / cmil;
            }

            const percentDrop = (vDrop / voltage) * 100;
            const endVoltage = voltage - vDrop;

            // Display Results
            resVdrop.textContent = vDrop.toFixed(2) + ' V';
            resPercent.textContent = percentDrop.toFixed(2) + ' %';
            resEndvolt.textContent = endVoltage.toFixed(2) + ' V';

            // Warning color if percent drop > 3% (Standard NEC recommendation for branch circuits)
            if (percentDrop > 3) {
                resPercent.style.color = '#e74c3c'; // Red warning
            } else {
                resPercent.style.color = '#e67e22'; // Default orange
            }

            saveData();
        }

        // Reset UI defaults on empty/invalid inputs
        function resetUI() {
            resVdrop.textContent = '0.00 V';
            resPercent.textContent = '0.00 %';
            resEndvolt.textContent = '0.00 V';
            resPercent.style.color = '#e67e22';
        }

        // Local Storage Methods
        function saveData() {
            const appState = {
                material: elMaterial.value,
                phase: elPhase.value,
                voltage: elVoltage.value,
                current: elCurrent.value,
                distance: elDistance.value,
                distUnit: elDistUnit.value,
                awg: elAwg.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
        }

        function loadData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    if(parsed.material) elMaterial.value = parsed.material;
                    if(parsed.phase) elPhase.value = parsed.phase;
                    if(parsed.voltage) elVoltage.value = parsed.voltage;
                    if(parsed.current) elCurrent.value = parsed.current;
                    if(parsed.distance) elDistance.value = parsed.distance;
                    if(parsed.distUnit) elDistUnit.value = parsed.distUnit;
                    if(parsed.awg) elAwg.value = parsed.awg;
                } catch (e) {
                    // Fail silently and use defaults
                }
            } else {
                // Default setup if no data saved
                elVoltage.value = "120";
                elCurrent.value = "15";
                elDistance.value = "50";
            }
        }

        function clearData() {
            if (confirm("Are you sure you want to clear your data?")) {
                localStorage.removeItem(STORAGE_KEY);
                
                // Reset to default
                elMaterial.value = "copper";
                elPhase.value = "1";
                elVoltage.value = "120";
                elCurrent.value = "15";
                elDistance.value = "50";
                elDistUnit.value = "ft";
                elAwg.value = "10380"; // 10 AWG
                
                calculate();
            }
        }

        // Initialize App on window load
        window.onload = init;
    </script>
</body>
</html>
