<!DOCTYPE html>
<!-- Category: Math Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO & Technical Metadata -->
    <title>Z-score Calculator</title>
    <meta name="description" content="Free online Z-score Calculator by toolshub365.com. Calculate the standard score (Z-score) from a raw score, population mean, and standard deviation instantly.">
    <meta name="keywords" content="Z-score Calculator, Standard Score Calculator, Normal Distribution Tool, Statistics Calculator, Probability Calculator, toolshub365, Data Analysis">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/z-score-calculator">
    
    <!-- JSON-LD for AI Crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Z-score Calculator",
      "operatingSystem": "Any",
      "applicationCategory": "MathApplication",
      "offer": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "A responsive statistics tool to calculate Z-score and probability percentages from raw data."
    }
    </script>

    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #00cec9;
            --primary-dark: #00b894;
            --header-bg: #2d3436;
            --header-text: #ffffff;
            --bg-color: #dfe6e9;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --border-color: #b2bec3;
            --input-bg: #f5f6fa;
            --result-bg: #e0f7fa;
            --result-border: #00cec9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 50px; /* Space for fixed header */
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Calculator Card */
        .calculator-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            padding: 30px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Input Fields */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #636e72;
            font-size: 0.95rem;
        }

        .symbol {
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
            color: var(--primary-dark);
            font-weight: bold;
        }

        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.1rem;
            background-color: var(--input-bg);
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 206, 201, 0.2);
            background-color: #fff;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-calc:hover {
            background-color: var(--primary-dark);
        }

        .btn-clear {
            background-color: #fab1a0;
            color: #d63031;
        }

        .btn-clear:hover {
            background-color: #ff7675;
            color: white;
        }

        /* Result Display */
        .result-container {
            margin-top: 30px;
            display: none; /* Hidden by default */
            animation: fadeIn 0.4s ease-out;
        }

        .result-box {
            background: var(--result-bg);
            border-left: 5px solid var(--result-border);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
        }

        .result-label {
            font-size: 0.9rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary-dark);
        }

        .formula-display {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            color: #555;
            font-size: 1rem;
            text-align: center;
            border: 1px dashed #ccc;
        }

        .error-msg {
            color: #d63031;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;
                padding: 0; /* Remove blank space */
                margin: 0;
            }

            .calculator-card {
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
                border: none;
                min-height: calc(100vh - 50px);
                padding: 20px;
            }

            .btn-group {
                flex-direction: column;
            }

            h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        Z-score Calculator
    </header>

    <div class="container">
        <div class="calculator-card">
            
            <div class="form-group">
                <label for="rawScore">Raw Score (<span class="symbol">x</span>)</label>
                <input type="number" id="rawScore" placeholder="Enter value (e.g. 85)" step="any" oninput="autoSave()">
            </div>

            <div class="form-group">
                <label for="mean">Population Mean (<span class="symbol">μ</span>)</label>
                <input type="number" id="mean" placeholder="Enter mean (e.g. 70)" step="any" oninput="autoSave()">
            </div>

            <div class="form-group">
                <label for="stdDev">Standard Deviation (<span class="symbol">σ</span>)</label>
                <input type="number" id="stdDev" placeholder="Enter deviation (e.g. 10)" step="any" oninput="autoSave()">
            </div>

            <p class="error-msg" id="errorDisplay">Standard Deviation cannot be zero.</p>

            <div class="btn-group">
                <button class="btn-calc" onclick="calculateZScore()">Calculate</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <div class="result-container" id="resultContainer">
                <div class="result-box">
                    <div class="result-label">Z-score (Z)</div>
                    <div class="result-value" id="zResult">0.000</div>
                </div>

                <div class="formula-display" id="formulaResult">
                    Z = (x - μ) / σ
                </div>
            </div>

        </div>
    </div>

    <script>
        const STORAGE_KEY = 'toolshub365_zscore_data';

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        function calculateZScore() {
            // Get inputs
            const x = parseFloat(document.getElementById('rawScore').value);
            const mu = parseFloat(document.getElementById('mean').value);
            const sigma = parseFloat(document.getElementById('stdDev').value);
            
            const errorEl = document.getElementById('errorDisplay');
            const resultContainer = document.getElementById('resultContainer');
            
            // Validation
            if (isNaN(x) || isNaN(mu) || isNaN(sigma)) {
                errorEl.innerText = "Please enter valid numbers for all fields.";
                errorEl.style.display = 'block';
                resultContainer.style.display = 'none';
                return;
            }

            if (sigma === 0) {
                errorEl.innerText = "Standard Deviation (σ) cannot be zero.";
                errorEl.style.display = 'block';
                resultContainer.style.display = 'none';
                return;
            }

            // Calculation
            const zScore = (x - mu) / sigma;
            
            // Update UI
            errorEl.style.display = 'none';
            resultContainer.style.display = 'block';
            
            document.getElementById('zResult').innerText = formatNumber(zScore);
            document.getElementById('formulaResult').innerText = 
                `Z = (${x} - ${mu}) / ${sigma} = ${formatNumber(zScore)}`;
            
            // Save state
            saveData(true);
        }

        function formatNumber(num) {
            if (Number.isInteger(num)) return num;
            return parseFloat(num.toFixed(5));
        }

        // --- Data Persistence ---

        function autoSave() {
            // Save inputs while typing, do not flag as calculated yet
            saveData(false);
            // Hide error when user types
            document.getElementById('errorDisplay').style.display = 'none';
        }

        function saveData(isCalculated) {
            const data = {
                raw: document.getElementById('rawScore').value,
                mean: document.getElementById('mean').value,
                stdDev: document.getElementById('stdDev').value,
                showResult: isCalculated || (document.getElementById('resultContainer').style.display === 'block')
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    document.getElementById('rawScore').value = data.raw || '';
                    document.getElementById('mean').value = data.mean || '';
                    document.getElementById('stdDev').value = data.stdDev || '';

                    // If previously calculated and inputs exist, recalculate
                    if (data.showResult && data.raw && data.mean && data.stdDev) {
                        calculateZScore();
                    }
                } catch (e) {
                    console.error("Error loading saved data");
                }
            }
        }

        function clearData() {
            if(confirm("Are you sure you want to clear all data?")) {
                localStorage.removeItem(STORAGE_KEY);
                document.getElementById('rawScore').value = '';
                document.getElementById('mean').value = '';
                document.getElementById('stdDev').value = '';
                
                document.getElementById('resultContainer').style.display = 'none';
                document.getElementById('errorDisplay').style.display = 'none';
            }
        }
    </script>
</body>
</html>
