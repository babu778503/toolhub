            justify-content: space-between;
            align-items: center;

        .func-header-left {

            align-items: center;
            gap: 10px;

            font-size: 1rem;

            display: inline-block;
        }

        .func-header::after {
            content: '+';
            font-size: 1.3rem;
            color: var(--excel-green);
            font-weight: bold;
        }

        .func-item.active .func-header::after {
            content: '-';

        /* Function Details */
        .func-details {
            display: none;
            padding: 20px;
            background: var(--card-bg);
            position: relative;

        .func-item.active .func-details {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        .detail-section {
            margin-bottom: 18px;

        .btn-copy {

            top: 6px;
            right: 6px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            z-index: 10;
        }

        .code-wrapper:hover .btn-copy {
            opacity: 1;
        }

        .btn-copy:hover {
            background: var(--btn-hover);
            color: var(--text-main);
        }

        .syn-fn { color: var(--syn-fn); font-weight: bold; }
        .syn-str { color: var(--syn-str); }
        .syn-ref { color: var(--syn-ref); }

        /* Practice Mode Logic */
        body.practice-mode-active .code-block {
            filter: blur(6px);
            cursor: pointer;
            user-select: none;
        }
        
        body.practice-mode-active .code-wrapper::after {
            content: "Click to reveal 👀";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            text-shadow: 0 0 5px var(--card-bg);
            pointer-events: none;
            opacity: 1;
        }

        body.practice-mode-active .code-block.revealed {
            filter: none;
            cursor: text;
            user-select: auto;
        }
        
        body.practice-mode-active .code-block.revealed + .btn-copy,
        body.practice-mode-active .code-wrapper:has(.revealed)::after {
            display: none;
        }

        /* Mastery Button */
        .mastery-action {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
            display: flex;
            justify-content: flex-end;
        }

        .btn-mastery {
            padding: 10px 18px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-muted);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-mastery:hover {
            background: var(--btn-hover);
            border-color: var(--excel-green);
        }

        .btn-mastery.mastered {
            background: var(--gold-light);
            border-color: var(--gold);
            color: #b38100;
        }

        /* Confetti Animation */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 9999;
            animation: fall 1.5s ease-out forwards;
        }
        
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(150px) rotate(360deg) scale(0.5); opacity: 0; }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 10px 0 0 0; /* Strictly no left/right padding */
            }
            .game-dashboard, .quiz-section {
                border-radius: 0;
                border-left: none;
                border-right: none;
                margin-bottom: 10px;
            }
            .quiz-section {
                border-left: 4px solid var(--gold);
            }
            .game-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .search-wrapper {
                padding: 0 10px 10px 10px;
            }
            .category-block {
                border-radius: 0;
                border-left: none;
                border-right: none;
                margin-bottom: 8px;
            }
            .btn-copy { opacity: 1; }
        }
    </style>
</head>

    <script>
        // --- DATA SETUP ---
        const excelData = [
            ["✅ Core Range / Reference Functions", [
                ["ADDRESS", "Creates a cell reference as text, given specified row and column numbers.", "Text string.", "=ADDRESS(row_num, column_num, [abs_num], [a1], [sheet_text])", "=ADDRESS(1, 1)\n// Returns \"$A$1\"\n=ADDRESS(1, 1, 4)\n// Returns \"A1\""],
                ["INFO", "Returns information about the current operating environment and workspace.", "Text string.", "=INFO(type_text)", "=INFO(\"directory\")\n// Returns the current folder path"],
                ["INDIRECT", "Returns the reference specified by a text string. Evaluates immediately and dynamically.", "Cell reference / Range.", "=INDIRECT(ref_text, [a1])", "=INDIRECT(\"A\"&2)\n// Evaluates to cell A2\n=SUM(INDIRECT(\"B1:B10\"))"],
                ["OFFSET", "Returns a reference to a range that is a specific number of rows and columns from a starting cell.", "Range reference.", "=OFFSET(reference, rows, cols, [height], [width])", "=OFFSET(A1, 1, 2, 5, 1)\n// Returns a 5-cell tall range starting at C2"]
            ]],
            ["✅ Cell & Range Information", [
                ["CELL", "Returns information about the formatting, location, or contents of a cell.", "Text string or Number.", "=CELL(info_type, [reference])", "=CELL(\"address\", A1)\n// Returns \"$A$1\"\n=CELL(\"type\", B2)"],
                ["ROW", "Returns the row number of a given cell reference.", "Number.", "=ROW([reference])", "=ROW(C5)\n// Returns 5\n=ROW()\n// Returns current row"],
                ["ROWS", "Returns the total number of rows within a specified array or reference.", "Number.", "=ROWS(array)", "=ROWS(A1:C10)\n// Returns 10"],
                ["COLUMN", "Returns the column number of a given cell reference.", "Number.", "=COLUMN([reference])", "=COLUMN(C5)\n// Returns 3\n=COLUMN()\n// Returns current column"],
                ["COLUMNS", "Returns the total number of columns within a specified array or reference.", "Number.", "=COLUMNS(array)", "=COLUMNS(A1:C10)\n// Returns 3"]
            ]],
            ["✅ Lookup & Reference Functions", [
                ["INDEX", "Returns the value or reference of a cell in a particular row and column of a given range.", "Value or Reference.", "=INDEX(array, row_num, [column_num])", "=INDEX(A1:C10, 2, 3)\n// Returns the value in C2"],
                ["MATCH", "Searches for a specified item in a range of cells and returns its relative position.", "Number.", "=MATCH(lookup_value, lookup_array, [match_type])", "=MATCH(\"Apple\", A1:A10, 0)\n// Returns the row index where Apple is found"],
                ["XMATCH", "A modern, robust replacement for MATCH that defaults to exact matching.", "Number.", "=XMATCH(lookup_value, lookup_array, [match_mode], [search_mode])", "=XMATCH(\"Apple\", A1:A10)\n// Searches top-to-bottom for Apple"],
                ["XLOOKUP", "Searches a range or an array, and returns an item corresponding to the first match it finds. Can return entire ranges/arrays.", "Value / Range.", "=XLOOKUP(lookup_value, lookup_array, return_array, [if_not_found])", "=XLOOKUP(\"ID123\", A:A, B:D)\n// Returns entire row from columns B through D"],
                ["LOOKUP", "Legacy function that returns a value from a single row or column or an array (requires sorted data).", "Value.", "=LOOKUP(lookup_value, lookup_vector, [result_vector])", "=LOOKUP(4.5, A1:A5, B1:B5)"]
            ]],
            ["✅ Range Selection & Dynamic Arrays", [
                ["FILTER", "Filters a range of data based on criteria you define, spilling the results into a dynamic array.", "Array / Range.", "=FILTER(array, include, [if_empty])", "=FILTER(A2:D100, B2:B100=\"Active\", \"None\")"],
                ["SORT", "Sorts the contents of a range or array automatically.", "Array / Range.", "=SORT(array, [sort_index], [sort_order], [by_col])", "=SORT(A2:D100, 2, -1)\n// Sorts range by the 2nd column descending"],
                ["SORTBY", "Sorts the contents of a range or array based on the values in a corresponding range or array.", "Array / Range.", "=SORTBY(array, by_array1, [sort_order1], ...)", "=SORTBY(A2:A100, B2:B100, 1)"],
                ["UNIQUE", "Returns a list of unique values from a range or array.", "Array / Range.", "=UNIQUE(array, [by_col], [exactly_once])", "=UNIQUE(A2:A100)\n// Removes all duplicate rows"],
                ["SEQUENCE", "Generates a dynamic array of sequential numbers, highly useful for indexing ranges.", "Array.", "=SEQUENCE(rows, [columns], [start], [step])", "=SEQUENCE(10, 1, 1, 1)\n// Generates numbers 1 through 10"]

            { q: "What does the `#` (Spill) operator do?", options: ["Comments out code", "References the entirety of a spilled dynamic array without needing to hardcode its changing dimensions", "Multiplies arrays", "Finds the intersection of ranges"], answer: 1, explanation: "Typing =A2# tells Excel to grab the entire array that originates from A2, no matter how much it shrinks or grows." },
            { q: "What causes a #SPILL! error?", options: ["The formula is misspelled", "A dynamic array is trying to output data, but a non-empty cell is blocking its expansion path", "The data model is corrupt", "The array is too small"], answer: 1, explanation: "Spilled arrays require empty space. If anything (even a space character) is in the way, Excel throws a #SPILL! error to prevent overwriting." },
            { q: "What does =INFO(\"directory\") return?", options: ["The name of the active worksheet", "The name of the user", "The file path of the current operating directory", "An error"], answer: 2, explanation: "INFO returns system environment data. 'Directory' provides the current default folder path." }
        ];

        // --- DOM ELEMENTS ---
        const container = document.getElementById('dataContainer');
        const searchInput = document.getElementById('searchInput');
        const practiceToggle = document.getElementById('practiceModeToggle');
        
        // Gamification
        const totalCountEl = document.getElementById('totalCount');
        const masteredCountEl = document.getElementById('masteredCount');
        const gameProgressBar = document.getElementById('gameProgressBar');
        const xpDisplay = document.getElementById('xpDisplay');
        const levelDisplay = document.getElementById('levelDisplay');
        const quizScoreDisplay = document.getElementById('quizScoreDisplay');

        // Quiz
        const btnToggleQuiz = document.getElementById('btnToggleQuiz');
        const quizContainer = document.getElementById('quizContainer');
        const quizQuestion = document.getElementById('quizQuestion');
        const quizOptions = document.getElementById('quizOptions');
        const quizFeedback = document.getElementById('quizFeedback');
        const btnNextQuestion = document.getElementById('btnNextQuestion');

        // --- STATE & STORAGE ---
        const STORAGE_KEY_SEARCH = 'excelRangeSearchQuery';
        const STORAGE_KEY_OPEN_CATS = 'excelRangeOpenCats';
        const STORAGE_KEY_MASTERY = 'excelRangeMasteryArray';
        const STORAGE_KEY_PRACTICE = 'excelRangePracticeMode';
        const STORAGE_KEY_QUIZ_CORRECT = 'excelRangeQuizCorrect';

        const TOTAL_FORMULAS = excelData.reduce((acc, cat) => acc + cat[1].length, 0);
        const XP_PER_MASTERY = 10;
        const XP_PER_QUIZ = 5;

        let currentQuizIndex = 0;
        let isQuizActive = false;
        let shuffledQuiz = [];

        function saveState() {
            localStorage.setItem(STORAGE_KEY_SEARCH, searchInput.value);
            const openCats = [];
            document.querySelectorAll('.category-block.active').forEach(cat => {
                openCats.push(cat.dataset.catName);
            });
            localStorage.setItem(STORAGE_KEY_OPEN_CATS, JSON.stringify(openCats));
        }

        // --- VISUAL EFFECTS ---
        function shootConfetti(x, y) {
            const colors = ['#ffb900', '#107c41', '#0078d4', '#e81123'];
            for(let i=0; i<40; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti-piece';
                
                let dx = (Math.random() - 0.5) * 200;
                let dy = (Math.random() - 0.5) * 200;
                
                conf.style.left = x + 'px';
                conf.style.top = y + 'px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                conf.style.setProperty('--dx', `${dx}px`);
                conf.style.setProperty('--dy', `${dy}px`);
                
                conf.style.animation = 'none';
                conf.offsetHeight; 
                conf.style.animation = `scatter ${1 + Math.random()*0.5}s ease-out forwards`;
                
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 1500);
            }
        }
        
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes scatter {
                0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
                100% { transform: translate(var(--dx), calc(var(--dy) + 150px)) rotate(720deg) scale(0); opacity: 0; }
            }
        `;
        document.head.appendChild(styleSheet);

        function highlightSyntax(codeStr) {
            let s = codeStr.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            s = s.replace(/("[^"]*")/g, '<span class="syn-str">$1</span>');
            s = s.replace(/\b([A-Z.0-9_]+)(\()/g, '<span class="syn-fn">$1</span>$2');
            s = s.replace(/\b([A-Z]{1,3}[0-9]{1,7}(:[A-Z]{1,3}[0-9]{1,7})?)\b/g, '<span class="syn-ref">$1</span>');
            return s;
        }

        // Robust mobile-friendly copy-to-clipboard function
        function copyToClipboard(text, btnElement) {
            const onSuccess = () => {
                let oldText = btnElement.innerText;
                if(oldText === "✅ Copied!") return;
                btnElement.innerText = "✅ Copied!";
                btnElement.style.color = "var(--excel-green)";
                setTimeout(() => {
                    btnElement.innerText = "📋 Copy";
                    btnElement.style.color = "";
                }, 2000);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(onSuccess).catch(() => {
                    fallbackCopy(text, onSuccess);
                });
            } else {
                fallbackCopy(text, onSuccess);
            }
        }

        function fallbackCopy(text, onSuccess) {
            let textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            textArea.setSelectionRange(0, 99999);
            
            try {
                let successful = document.execCommand('copy');
                if (successful) onSuccess();
            } catch (err) {
                console.error("Fallback copy failed", err);
            }
            document.body.removeChild(textArea);
        }

        // --- GAMIFICATION LOGIC ---
        function getMasteryData() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY_MASTERY)) || []; } catch (e) { return []; }
        }
        function saveMasteryData(data) { localStorage.setItem(STORAGE_KEY_MASTERY, JSON.stringify(data)); }
        function getQuizCorrect() { return parseInt(localStorage.getItem(STORAGE_KEY_QUIZ_CORRECT)) || 0; }
        function addQuizCorrect(e) {
            let correct = getQuizCorrect() + 1;
            localStorage.setItem(STORAGE_KEY_QUIZ_CORRECT, correct);
            updateGamificationDashboard();
            if(e) shootConfetti(e.clientX, e.clientY);
        }

        function toggleMastery(formulaId, btnElement, liElement, event) {
            let mastery = getMasteryData();
            if (mastery.includes(formulaId)) {
                mastery = mastery.filter(id => id !== formulaId);
                btnElement.classList.remove('mastered');
                btnElement.innerHTML = `Mark as Mastered (+${XP_PER_MASTERY} XP)`;
                liElement.classList.remove('is-mastered');
            } else {
                mastery.push(formulaId);
                btnElement.classList.add('mastered');
                btnElement.innerHTML = `⭐ Mastered (+${XP_PER_MASTERY} XP)`;
                liElement.classList.add('is-mastered');
                shootConfetti(event.clientX, event.clientY);
            }
            saveMasteryData(mastery);
            updateGamificationDashboard();
        }

        function updateGamificationDashboard() {
            const masteryCount = getMasteryData().length;
            const quizCorrect = getQuizCorrect();
            
            const progress = (masteryCount / TOTAL_FORMULAS) * 100;
            const totalXp = (masteryCount * XP_PER_MASTERY) + (quizCorrect * XP_PER_QUIZ);

            masteredCountEl.textContent = masteryCount;
            totalCountEl.textContent = TOTAL_FORMULAS;
            quizScoreDisplay.textContent = quizCorrect;
            gameProgressBar.style.width = `${progress}%`;
            xpDisplay.textContent = `⭐ ${totalXp} XP`;

            let levelText = "Novice";
            if (totalXp >= 600) levelText = "Excel Grandmaster";
            else if (totalXp >= 300) levelText = "Formula Wizard";
            else if (totalXp >= 100) levelText = "Data Analyst";
            else if (totalXp >= 40) levelText = "Intermediate";

            levelDisplay.textContent = `Rank: ${levelText}`;
        }

        // --- QUIZ LOGIC ---
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        btnToggleQuiz.addEventListener('click', () => {
            if (!isQuizActive) {
                quizContainer.style.display = 'block';
                btnToggleQuiz.textContent = "Close Quiz";
                isQuizActive = true;
                startQuiz();
            } else {
                quizContainer.style.display = 'none';
                btnToggleQuiz.textContent = "Start Practice Quiz";
                isQuizActive = false;
            }
        });

        function startQuiz() {
            shuffledQuiz = shuffleArray([...quizQuestions]);
            currentQuizIndex = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const qData = shuffledQuiz[currentQuizIndex];
            quizQuestion.textContent = `${currentQuizIndex + 1}. ${qData.q}`;
            quizOptions.innerHTML = '';
            quizFeedback.style.display = 'none';
            btnNextQuestion.style.display = 'none';

            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option-btn';
                btn.textContent = opt;
                btn.onclick = (e) => handleAnswer(index, qData.answer, qData.explanation, btn, e);
                quizOptions.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex, correctIndex, explanation, btnClicked, event) {
            const buttons = quizOptions.querySelectorAll('.quiz-option-btn');
            buttons.forEach(btn => btn.disabled = true); 

            quizFeedback.style.display = 'block';

            if (selectedIndex === correctIndex) {
                btnClicked.classList.add('correct');
                quizFeedback.className = 'quiz-feedback success';
                quizFeedback.innerHTML = `<strong>✅ Correct! (+${XP_PER_QUIZ} XP)</strong><br>${explanation}`;
                addQuizCorrect(event); 
            } else {
                btnClicked.classList.add('incorrect');
                buttons[correctIndex].classList.add('correct'); 
                quizFeedback.className = 'quiz-feedback error';
                quizFeedback.innerHTML = `<strong>❌ Incorrect.</strong><br>${explanation}`;
            }

            btnNextQuestion.style.display = 'inline-block';
        }

        btnNextQuestion.addEventListener('click', () => {
            currentQuizIndex++;
            if (currentQuizIndex >= shuffledQuiz.length) {
                shuffledQuiz = shuffleArray([...quizQuestions]);
                currentQuizIndex = 0;
            }
            loadQuestion();
        });

        // --- PRACTICE MODE LOGIC ---
        function applyPracticeMode() {
            const isChecked = practiceToggle.checked;
            localStorage.setItem(STORAGE_KEY_PRACTICE, isChecked);
            if(isChecked) {
                document.body.classList.add('practice-mode-active');
            } else {
                document.body.classList.remove('practice-mode-active');
                document.querySelectorAll('.code-block').forEach(el => el.classList.remove('revealed'));
            }
        }

        // --- RENDER CONTENT ---
        function renderUI() {
            container.innerHTML = '';
            let savedCats = [];
            try { savedCats = JSON.parse(localStorage.getItem(STORAGE_KEY_OPEN_CATS)) || []; } catch (e) {}
            const masteryData = getMasteryData();

            excelData.forEach((category, catIndex) => {
                const catName = category[0];
                const functions = category[1];

                const catDiv = document.createElement('div');
                catDiv.className = 'category-block';
                const catId = catName.toLowerCase().replace(/[^a-z0-9]/g, '-');
                catDiv.dataset.catName = catId;

                if (savedCats.includes(catId) || (savedCats.length === 0 && catIndex === 0)) {
                    catDiv.classList.add('active');
                }

                const catHeader = document.createElement('div');
                catHeader.className = 'category-header';
                catHeader.textContent = catName;
                catHeader.onclick = () => {
                    catDiv.classList.toggle('active');
                    saveState();
                };

                const funcList = document.createElement('ul');
                funcList.className = 'func-list';

                functions.forEach((func) => {
                    // Structure: Name, Purpose, Return, Syntax, Example
                    const [fName, fPurpose, fReturn, fSyntax, fExample] = func;
                    const fId = fName.toLowerCase().replace(/[^a-z0-9]/g, '-');
                    const isMastered = masteryData.includes(fId);

                    const funcItem = document.createElement('li');
                    funcItem.className = `func-item ${isMastered ? 'is-mastered' : ''}`;
                    funcItem.dataset.funcName = fName.toLowerCase();
                    funcItem.dataset.funcDesc = fPurpose.toLowerCase();

                    const funcHeader = document.createElement('div');
                    funcHeader.className = 'func-header';
                    const headerLeft = document.createElement('div');
                    headerLeft.className = 'func-header-left';
                    headerLeft.innerHTML = `<span>${fName}</span> <span class="badge-icon" title="Mastered">⭐</span>`;
                    funcHeader.appendChild(headerLeft);
                    funcHeader.onclick = () => funcItem.classList.toggle('active');

                    const funcDetails = document.createElement('div');
                    funcDetails.className = 'func-details';
                    
                    const safeSyntax = highlightSyntax(fSyntax);
                    const safeExample = highlightSyntax(fExample);
                    
                    // Escape string to prevent quotes/newlines breaking the inline JS handler
                    const copySyntaxStr = fSyntax.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
                    const copyExampleStr = fExample.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');

                    funcDetails.innerHTML = `
                        <div class="detail-section">
                            <h4>Purpose</h4>
                            <p>${fPurpose}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Return value</h4>
                            <p>${fReturn}</p>
                        </div>
                        <div class="detail-section">
                            <h4>Syntax</h4>
                            <div class="code-wrapper">
                                <code class="code-block" onclick="this.classList.add('revealed')">${safeSyntax}</code>
                                <button type="button" class="btn-copy" onclick="event.stopPropagation(); copyToClipboard('${copySyntaxStr}', this)">📋 Copy</button>
                            </div>
                        </div>
                        <div class="detail-section">
                            <h4>Examples</h4>
                            <div class="code-wrapper">
                                <code class="code-block" onclick="this.classList.add('revealed')">${safeExample}</code>
                                <button type="button" class="btn-copy" onclick="event.stopPropagation(); copyToClipboard('${copyExampleStr}', this)">📋 Copy</button>
                            </div>
                        </div>
                    `;

                    const masteryActionDiv = document.createElement('div');
                    masteryActionDiv.className = 'mastery-action';
                    const masteryBtn = document.createElement('button');
                    masteryBtn.className = `btn-mastery ${isMastered ? 'mastered' : ''}`;
                    masteryBtn.innerHTML = isMastered ? `⭐ Mastered (+${XP_PER_MASTERY} XP)` : `Mark as Mastered (+${XP_PER_MASTERY} XP)`;
                    masteryBtn.onclick = (e) => {
                        e.stopPropagation(); 
                        toggleMastery(fId, masteryBtn, funcItem, e);
                    };
                    masteryActionDiv.appendChild(masteryBtn);
                    funcDetails.appendChild(masteryActionDiv);

                    funcItem.appendChild(funcHeader);
                    funcItem.appendChild(funcDetails);
                    funcList.appendChild(funcItem);
                });

                catDiv.appendChild(catHeader);
                catDiv.appendChild(funcList);
                container.appendChild(catDiv);
            });

            updateGamificationDashboard();
        }

        // --- SEARCH FILTER ---
        function filterUI() {
            const query = searchInput.value.toLowerCase().trim();
            const categories = document.querySelectorAll('.category-block');

            categories.forEach(cat => {
                let hasVisibleItems = false;
                const items = cat.querySelectorAll('.func-item');

                items.forEach(item => {
                    const fName = item.dataset.funcName;
                    const fDesc = item.dataset.funcDesc;
                    
                    if (fName.includes(query) || fDesc.includes(query)) {
                        item.style.display = 'block';
                        hasVisibleItems = true;
                        if(query.length > 2) item.classList.add('active');
                    } else {
                        item.style.display = 'none';
                        item.classList.remove('active');
                    }
                });

                if (hasVisibleItems) {
                    cat.style.display = 'block';
                    if(query.length > 0) cat.classList.add('active');
                } else {
                    cat.style.display = 'none';
                }
            });
            saveState();
        }

        // Listeners
        searchInput.addEventListener('input', filterUI);
        practiceToggle.addEventListener('change', applyPracticeMode);

        // Keyboard Shortcut for Search
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderUI();
            
            const savedSearch = localStorage.getItem(STORAGE_KEY_SEARCH);
            if (savedSearch) searchInput.value = savedSearch;
            
            const savedPractice = localStorage.getItem(STORAGE_KEY_PRACTICE);
            if (savedPractice === 'true') {
                practiceToggle.checked = true;
                applyPracticeMode();
            }

            filterUI();
        });
    </script>
</body>
</html>
