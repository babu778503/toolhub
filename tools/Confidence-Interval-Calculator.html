    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --bg-color: #f4f7f6;
            --header-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --header-height: 50px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding-top: var(--header-height); /* Prevent content hiding behind fixed header */
        }

        /* Header Styling */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--header-bg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Container Styling */
        .main-container {
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
            padding: 30px;
        }

        /* Calculator Layout */
        .calculator-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Mode Toggle Tabs */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #777;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            background-color: rgba(0, 123, 255, 0.05);
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-group input:focus, 
        .input-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .input-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .input-row .input-group {
            flex: 1;
            min-width: 250px;
        }

        /* Action Buttons */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .btn-calculate {
            background-color: var(--primary-color);
            color: white;
            flex: 2;
        }

        .btn-calculate:hover {
            background-color: var(--primary-hover);
        }

        .btn-clear {
            background-color: #dc3545;
            color: white;
            flex: 1;
        }

        .btn-clear:hover {
            background-color: #c82333;
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Results Section */
        #result-area {
            margin-top: 30px;
            padding: 20px;
            background-color: #f8f9fa;
            border-left: 5px solid var(--primary-color);
            border-radius: 4px;
            display: none; /* Hidden by default */
        }

        .result-header {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #333;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .result-detail {
            font-size: 0.95rem;
            color: #555;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding: 5px 0;
        }

        /* Desktop specific styling */
        @media (min-width: 769px) {
            .main-container {
                width: 100%;
                max-width: 1200px;
                margin: 40px auto; 
            }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            body {
                padding-top: var(--header-height);
            }
            
            .main-container {
                width: 100%;
                max-width: 100%;
                margin: 0;
                padding: 20px;
                border-radius: 0;
                box-shadow: none;
                min-height: calc(100vh - 50px);
            }

            .input-row {
                flex-direction: column;
                gap: 0;
            }

            .input-row .input-group {
                width: 100%;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Confidence Interval Calculator</h1>
    </header>

    <div class="main-container">
        <!-- Tabs to switch between Mean and Proportion -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchMode('mean')">Mean (Avg)</button>
            <button class="tab-btn" onclick="switchMode('proportion')">Proportion (%)</button>
        </div>

        <form id="calcForm" onsubmit="return false;">
            <input type="hidden" id="calcMode" value="mean">

            <!-- Confidence Level (Common for both) -->
            <div class="input-group">
                <label for="confidenceLevel">Confidence Level</label>
                <select id="confidenceLevel" onchange="saveData()">
                    <option value="0.80">80%</option>
                    <option value="0.85">85%</option>
                    <option value="0.90">90%</option>
                    <option value="0.95" selected>95%</option>
                    <option value="0.98">98%</option>
                    <option value="0.99">99%</option>
                    <option value="0.995">99.5%</option>
                    <option value="0.999">99.9%</option>
                </select>
            </div>

            <!-- MEAN INPUTS -->
            <div id="meanInputs">
                <div class="input-row">
                    <div class="input-group">
                        <label for="sampleMean">Sample Mean (x̄)</label>
                        <input type="number" id="sampleMean" step="any" placeholder="e.g. 50" oninput="saveData()">
                    </div>
                    <div class="input-group">
                        <label for="sampleSizeMean">Sample Size (n)</label>
                        <input type="number" id="sampleSizeMean" min="1" step="1" placeholder="e.g. 100" oninput="saveData()">
                    </div>
                </div>
                <div class="input-group">
                    <label for="stdDev">Standard Deviation (s or σ)</label>
                    <input type="number" id="stdDev" min="0" step="any" placeholder="e.g. 5" oninput="saveData()">
                </div>
            </div>

            <!-- PROPORTION INPUTS -->
            <div id="proportionInputs" style="display: none;">
                <div class="input-row">
                    <div class="input-group">
                        <label for="sampleSuccess">Success Count (x)</label>
                        <input type="number" id="sampleSuccess" min="0" step="1" placeholder="e.g. 45" oninput="saveData()">
                    </div>
                    <div class="input-group">
                        <label for="sampleSizeProp">Sample Size (n)</label>
                        <input type="number" id="sampleSizeProp" min="1" step="1" placeholder="e.g. 100" oninput="saveData()">
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-calculate" onclick="calculateCI()">Calculate</button>
                <button class="btn btn-clear" onclick="clearData()">Clear Data</button>
            </div>
        </form>

        <div id="result-area">
            <h2 class="result-header">Result</h2>
            <div class="result-value" id="ciDisplay"></div>
            
            <div id="detailsMean">
                <div class="result-detail"><span>Margin of Error:</span> <span id="moeMean"></span></div>
                <div class="result-detail"><span>Standard Error:</span> <span id="seMean"></span></div>
                <div class="result-detail"><span>Z-Score Used:</span> <span id="zScoreVal"></span></div>
            </div>
            
            <div id="detailsProp" style="display:none;">
                <div class="result-detail"><span>Sample Proportion (p̂):</span> <span id="pHat"></span></div>
                <div class="result-detail"><span>Margin of Error:</span> <span id="moeProp"></span></div>
                <div class="result-detail"><span>Standard Error:</span> <span id="seProp"></span></div>
            </div>
        </div>
    </div>

    <script>
        // Mapping Confidence Levels to Z-scores
        const zScores = {
            "0.80": 1.282,
            "0.85": 1.440,
            "0.90": 1.645,
            "0.95": 1.960,
            "0.98": 2.326,
            "0.99": 2.576,
            "0.995": 2.807,
            "0.999": 3.291
        };

        // --- Layout Logic ---

        function switchMode(mode) {
            const meanInputs = document.getElementById('meanInputs');
            const propInputs = document.getElementById('proportionInputs');
            const btns = document.querySelectorAll('.tab-btn');
            const modeInput = document.getElementById('calcMode');
            const resultArea = document.getElementById('result-area');

            modeInput.value = mode;
            resultArea.style.display = 'none'; // Hide results on toggle

            if (mode === 'mean') {
                meanInputs.style.display = 'block';
                propInputs.style.display = 'none';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                meanInputs.style.display = 'none';
                propInputs.style.display = 'block';
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
            }
            saveData();
        }

        // --- Calculation Logic ---

        function calculateCI() {
            const mode = document.getElementById('calcMode').value;
            const clValue = document.getElementById('confidenceLevel').value;
            const z = zScores[clValue];
            const resultArea = document.getElementById('result-area');
            
            let lower, upper, moe, se;

            if (mode === 'mean') {
                const mean = parseFloat(document.getElementById('sampleMean').value);
                const n = parseFloat(document.getElementById('sampleSizeMean').value);
                const s = parseFloat(document.getElementById('stdDev').value);

                if (isNaN(mean) || isNaN(n) || isNaN(s) || n <= 0 || s < 0) {
                    alert("Please enter valid numeric values for Mean inputs.");
                    return;
                }

                se = s / Math.sqrt(n);
                moe = z * se;
                lower = mean - moe;
                upper = mean + moe;

                // Update UI
                document.getElementById('ciDisplay').innerHTML = `[ ${lower.toFixed(4)}, ${upper.toFixed(4)} ]`;
                document.getElementById('moeMean').innerText = `± ${moe.toFixed(4)}`;
                document.getElementById('seMean').innerText = se.toFixed(4);
                document.getElementById('zScoreVal').innerText = z;

                document.getElementById('detailsMean').style.display = 'block';
                document.getElementById('detailsProp').style.display = 'none';

            } else {
                const x = parseFloat(document.getElementById('sampleSuccess').value);
                const n = parseFloat(document.getElementById('sampleSizeProp').value);

                if (isNaN(x) || isNaN(n) || n <= 0 || x < 0 || x > n) {
                    alert("Please enter valid inputs. Successes (x) cannot be greater than Sample Size (n).");
                    return;
                }

                const p = x / n;
                se = Math.sqrt((p * (1 - p)) / n);
                moe = z * se;
                lower = p - moe;
                upper = p + moe;

                // Clamp probability between 0 and 1
                lower = Math.max(0, lower);
                upper = Math.min(1, upper);

                // Update UI
                document.getElementById('ciDisplay').innerHTML = `[ ${lower.toFixed(4)}, ${upper.toFixed(4)} ] <br><small style='font-size:0.6em; color:#777;'>(${ (lower*100).toFixed(2) }% to ${ (upper*100).toFixed(2) }%)</small>`;
                document.getElementById('pHat').innerText = p.toFixed(4);
                document.getElementById('moeProp').innerText = `± ${moe.toFixed(4)}`;
                document.getElementById('seProp').innerText = se.toFixed(4);

                document.getElementById('detailsMean').style.display = 'none';
                document.getElementById('detailsProp').style.display = 'block';
            }

            resultArea.style.display = 'block';
            resultArea.scrollIntoView({behavior: "smooth"});
        }

        // --- Local Storage Logic ---

        function saveData() {
            const data = {
                mode: document.getElementById('calcMode').value,
                cl: document.getElementById('confidenceLevel').value,
                mean: document.getElementById('sampleMean').value,
                nMean: document.getElementById('sampleSizeMean').value,
                s: document.getElementById('stdDev').value,
                xProp: document.getElementById('sampleSuccess').value,
                nProp: document.getElementById('sampleSizeProp').value
            };
            localStorage.setItem('ci_calc_data', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('ci_calc_data');
            if (saved) {
                const data = JSON.parse(saved);
                
                // Restore values
                document.getElementById('calcMode').value = data.mode || 'mean';
                document.getElementById('confidenceLevel').value = data.cl || '0.95';
                document.getElementById('sampleMean').value = data.mean || '';
                document.getElementById('sampleSizeMean').value = data.nMean || '';
                document.getElementById('stdDev').value = data.s || '';
                document.getElementById('sampleSuccess').value = data.xProp || '';
                document.getElementById('sampleSizeProp').value = data.nProp || '';

                // Restore UI state
                switchMode(data.mode || 'mean');
            }
        }

        function clearData() {
            if(confirm("Are you sure you want to clear all data?")) {
                localStorage.removeItem('ci_calc_data');
                document.getElementById('calcForm').reset();
                document.getElementById('result-area').style.display = 'none';
                // Reset to defaults
                document.getElementById('calcMode').value = 'mean';
                switchMode('mean');
                saveData(); // Save the cleared state
            }
        }

        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

    </script>
</body>
</html>
