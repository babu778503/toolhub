<!DOCTYPE html>
<!-- Category: Math Calculators -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Sequence Calculator</title>

      "featureList": "Sequence Detection, Arithmetic Calculator, Geometric Calculator, Fibonacci Generator, Auto-save"
    }
    </script>

    <style>
        :root {
            --primary-color: #6366f1; /* Indigo */
            --primary-hover: #4f46e5;
            --header-bg: #111827;
            --header-text: #ffffff;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --header-height: 50px;
            --danger-color: #ef4444;
            --accent-color: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Fixed Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tool-wrapper {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        /* Controls */
        .mode-selector {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #374151;
        }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background-color: #fff;
            transition: all 0.2s;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* Input Grids */
        .input-group {
            display: none; /* Hidden by default, toggled by JS */
            gap: 20px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .input-group.active {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .full-width {
            grid-column: span 2;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-calc {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(99, 102, 241, 0.3);
        }

        .btn-clear {
            background-color: #fff;
            color: var(--danger-color);
            border: 1px solid var(--border-color);
        }

        button:hover {
            opacity: 0.9;
        }

        /* Results */
        .result-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed var(--border-color);
            display: none;
        }

        .result-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }

        .card h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 5px;
        }

        .card .value {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--text-color);
            word-wrap: break-word;
        }

        .sequence-display {
            background: #eff6ff;
            color: #1e3a8a;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.1rem;
            margin-bottom: 15px;
            overflow-x: auto;
            white-space: nowrap;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 0;
                margin: 0;
            }

            .tool-wrapper {
                border-radius: 0;
                box-shadow: none;
                border: none;
                width: 100%;
                min-height: calc(100vh - var(--header-height));
                padding: 20px;
            }

            .input-group.active {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: span 1;
            }
            
            .btn-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Number Sequence Calculator</h1>
    </header>

    <div class="container">
        <main class="tool-wrapper">
            
            <!-- Mode Selection -->
            <div class="mode-selector">
                <label for="calc-mode">Select Calculator Mode</label>
                <select id="calc-mode" onchange="changeMode()">
                    <option value="detect">Find Next Number (Auto-Detect)</option>
                    <option value="arithmetic">Arithmetic Sequence (AP)</option>
                    <option value="geometric">Geometric Sequence (GP)</option>
                    <option value="fibonacci">Fibonacci Sequence</option>
                </select>
            </div>

            <!-- Input: Auto Detect -->
            <div id="input-detect" class="input-group active">
                <div class="full-width">
                    <label>Enter Sequence (comma separated)</label>
                    <input type="text" id="seq-input" placeholder="e.g., 2, 4, 6, 8 or 3, 9, 27" oninput="saveData()">
                    <small style="color:#6b7280">Enter at least 3 numbers.</small>
                </div>
            </div>

            <!-- Input: Arithmetic -->
            <div id="input-arithmetic" class="input-group">
                <div>
                    <label>First Term ($a_1$)</label>
                    <input type="number" id="ap-a1" placeholder="0" oninput="saveData()">
                </div>
                <div>
                    <label>Common Difference ($d$)</label>
                    <input type="number" id="ap-d" placeholder="0" oninput="saveData()">
                </div>
                <div class="full-width">
                    <label>Find Term Position ($n$)</label>
                    <input type="number" id="ap-n" placeholder="e.g., 10" oninput="saveData()">
                </div>
            </div>

            <!-- Input: Geometric -->
            <div id="input-geometric" class="input-group">
                <div>
                    <label>First Term ($a_1$)</label>
                    <input type="number" id="gp-a1" placeholder="1" oninput="saveData()">
                </div>
                <div>
                    <label>Common Ratio ($r$)</label>
                    <input type="number" id="gp-r" placeholder="2" oninput="saveData()">
                </div>
                <div class="full-width">
                    <label>Find Term Position ($n$)</label>
                    <input type="number" id="gp-n" placeholder="e.g., 8" oninput="saveData()">
                </div>
            </div>

            <!-- Input: Fibonacci -->
            <div id="input-fibonacci" class="input-group">
                <div class="full-width">
                    <label>Number of Terms to Generate</label>
                    <input type="number" id="fib-n" placeholder="e.g., 15" oninput="saveData()">
                </div>
            </div>

            <!-- Buttons -->
            <div class="btn-row">
                <button class="btn-calc" onclick="calculate()">Calculate Sequence</button>
                <button class="btn-clear" onclick="clearData()">Clear Data</button>
            </div>

            <!-- Results -->
            <div id="result-section" class="result-section">
                <div id="seq-display-container">
                    <label>Sequence Preview:</label>
                    <div class="sequence-display" id="res-preview">...</div>
                </div>

                <div class="result-cards" id="result-cards">
                    <!-- Cards injected via JS -->
                </div>
            </div>

        </main>
    </div>

    <script>
        // --- Tool Logic ---

        const modeSelect = document.getElementById('calc-mode');
        const resultSection = document.getElementById('result-section');
        const resultPreview = document.getElementById('res-preview');
        const resultCards = document.getElementById('result-cards');

        function changeMode() {
            const mode = modeSelect.value;
            // Hide all
            document.querySelectorAll('.input-group').forEach(el => el.classList.remove('active'));
            // Show selected
            document.getElementById(`input-${mode}`).classList.add('active');
            resultSection.style.display = 'none';
            saveData();
        }

        function calculate() {
            const mode = modeSelect.value;
            resultCards.innerHTML = ''; // Clear previous cards

            try {
                if (mode === 'detect') {
                    solveDetect();
                } else if (mode === 'arithmetic') {
                    solveAP();
                } else if (mode === 'geometric') {
                    solveGP();
                } else if (mode === 'fibonacci') {
                    solveFib();
                }
                resultSection.style.display = 'block';
                saveData();
            } catch (e) {
                alert(e.message || "An error occurred.");
            }
        }

        // 1. Auto Detect Logic
        function solveDetect() {
            const raw = document.getElementById('seq-input').value;
            if (!raw) throw new Error("Please enter a sequence.");
            
            // Parse Input
            const arr = raw.split(/[\s,]+/).map(n => parseFloat(n)).filter(n => !isNaN(n));
            if (arr.length < 3) throw new Error("Please enter at least 3 numbers to detect a pattern.");

            // Check Arithmetic
            let isAP = true;
            const d = arr[1] - arr[0];
            for (let i = 1; i < arr.length - 1; i++) {
                if (Math.abs((arr[i+1] - arr[i]) - d) > 0.0001) isAP = false;
            }

            // Check Geometric
            let isGP = true;
            let r = 0;
            if (arr[0] !== 0) {
                r = arr[1] / arr[0];
                for (let i = 1; i < arr.length - 1; i++) {
                    if (arr[i] === 0 || Math.abs((arr[i+1] / arr[i]) - r) > 0.0001) isGP = false;
                }
            } else {
                isGP = false; // Cannot have 0 in GP usually for calculation
            }

            // Display
            if (isAP) {
                const nextVal = arr[arr.length - 1] + d;
                resultPreview.textContent = `${arr.join(', ')}, ${nextVal}, ...`;
                addCard("Pattern Type", "Arithmetic Sequence");
                addCard("Common Difference (d)", d);
                addCard("Next Number", nextVal);
                addCard("Formula", `an = ${arr[0]} + (n-1)${d}`);
            } else if (isGP) {
                const nextVal = arr[arr.length - 1] * r;
                resultPreview.textContent = `${arr.join(', ')}, ${nextVal}, ...`;
                addCard("Pattern Type", "Geometric Sequence");
                addCard("Common Ratio (r)", formatNum(r));
                addCard("Next Number", formatNum(nextVal));
                addCard("Formula", `an = ${arr[0]} × ${formatNum(r)}^(n-1)`);
            } else {
                resultPreview.textContent = arr.join(', ');
                addCard("Result", "Pattern Not Recognized");
                addCard("Info", "Currently supports simple Arithmetic and Geometric patterns.");
            }
        }

        // 2. Arithmetic Logic
        function solveAP() {
            const a1 = parseFloat(document.getElementById('ap-a1').value);
            const d = parseFloat(document.getElementById('ap-d').value);
            const n = parseInt(document.getElementById('ap-n').value);

            if (isNaN(a1) || isNaN(d) || isNaN(n)) throw new Error("Please fill all fields correctly.");

            const an = a1 + (n - 1) * d;
            const sum = (n / 2) * (2 * a1 + (n - 1) * d);
            
            // Generate first 5 terms for preview
            let preview = [];
            for(let i=0; i<5; i++) preview.push(a1 + i*d);
            
            resultPreview.textContent = preview.join(', ') + (n>5 ? "..." : "");
            
            addCard(`${n}th Term ($a_{n}$)`, formatNum(an));
            addCard(`Sum of ${n} Terms ($S_{n}$)`, formatNum(sum));
            addCard("Explicit Formula", `$a_n = ${a1} + (n-1)${d}$`);
        }

        // 3. Geometric Logic
        function solveGP() {
            const a1 = parseFloat(document.getElementById('gp-a1').value);
            const r = parseFloat(document.getElementById('gp-r').value);
            const n = parseInt(document.getElementById('gp-n').value);

            if (isNaN(a1) || isNaN(r) || isNaN(n)) throw new Error("Please fill all fields correctly.");

            const an = a1 * Math.pow(r, n - 1);
            let sum;
            if (r === 1) sum = a1 * n;
            else sum = (a1 * (Math.pow(r, n) - 1)) / (r - 1);

            // Preview
            let preview = [];
            for(let i=0; i<5; i++) preview.push(formatNum(a1 * Math.pow(r, i)));

            resultPreview.textContent = preview.join(', ') + (n>5 ? "..." : "");
            
            addCard(`${n}th Term`, formatNum(an));
            addCard(`Sum of ${n} Terms`, formatNum(sum));
        }

        // 4. Fibonacci Logic
        function solveFib() {
            const n = parseInt(document.getElementById('fib-n').value);
            if (isNaN(n) || n < 1) throw new Error("Please enter a valid number of terms (n > 0).");
            
            // Generate
            let fib = [0, 1];
            if (n === 1) fib = [0];
            else {
                for (let i = 2; i < n; i++) {
                    fib[i] = fib[i - 1] + fib[i - 2];
                }
            }

            // If list is huge, truncate preview
            let displayStr = fib.join(', ');
            if (displayStr.length > 50) displayStr = fib.slice(0, 10).join(', ') + ' ... ' + fib[fib.length-1];

            resultPreview.textContent = displayStr;
            addCard("Total Terms", n);
            addCard("Last Term Value", fib[fib.length-1]);
        }

        // Helper: Add Card
        function addCard(title, value) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<h3>${title}</h3><div class="value">${value}</div>`;
            resultCards.appendChild(div);
        }

        // Helper: Format Number
        function formatNum(num) {
            if (Number.isInteger(num)) return num;
            if (Math.abs(num) > 1000000) return num.toExponential(4);
            return parseFloat(num.toFixed(4));
        }

        // --- Data Persistence ---
        const STORAGE_KEY = 'seqCalcData';

        function saveData() {
            const data = {
                mode: modeSelect.value,
                inputs: {}
            };
            
            // Grab all inputs
            document.querySelectorAll('input').forEach(input => {
                data.inputs[input.id] = input.value;
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                
                // Set Mode
                if (data.mode) {
                    modeSelect.value = data.mode;
                    changeMode(); // Triggers UI update
                }

                // Fill Inputs
                if (data.inputs) {
                    for (const [id, val] of Object.entries(data.inputs)) {
                        const el = document.getElementById(id);
                        if (el) el.value = val;
                    }
                }
            } else {
                changeMode(); // Default init
            }
        }

        function clearData() {
            localStorage.removeItem(STORAGE_KEY);
            document.querySelectorAll('input').forEach(i => i.value = '');
            resultSection.style.display = 'none';
            modeSelect.value = 'detect';
            changeMode();
        }

        // Init
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
