<!DOCTYPE html>
<!-- Category: PDF -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR PDF</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="Free online OCR PDF tool. Convert scanned PDF documents into editable text instantly using AI-powered Optical Character Recognition. No installation required.">
    <meta name="keywords" content="OCR PDF, pdf to text, online ocr, extract text from pdf, scanned pdf to text, toolshub365.com, free ocr tool">
    <meta name="author" content="toolshub365.com">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolshub365.com/ocr-pdf">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="OCR PDF - Extract Text from Scanned PDFs">
    <meta property="og:description" content="Convert scanned PDFs to text instantly in your browser using advanced OCR technology.">
    <meta property="og:url" content="https://toolshub365.com/ocr-pdf">
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "OCR PDF",
      "operatingSystem": "Any",
      "applicationCategory": "UtilitiesApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "Browser-based Optical Character Recognition tool to extract text from PDF files."
    }

    <!-- External Libraries (CDNs) -->
    <!-- PDF.js for rendering PDF to images -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- Tesseract.js for OCR processing -->
    <script src="https://unpkg.com/tesseract.js@v4.0.2/dist/tesseract.min.js"></script>

    <style>
        /* --- CSS Reset & Variables --- */
        :root {
            --primary: #2563EB; /* Royal Blue */
            --primary-dark: #1E40AF;
            --bg-color: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-light: #64748B;
            --header-bg: #0F172A;
            --header-text: #FFFFFF;
            --border: #E2E8F0;
            --success: #10B981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: 50px; /* Space for fixed header */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header (Fixed, 50px) --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* --- Layout Container --- */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }

        /* --- Main Tool Card --- */
        .tool-interface {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Upload Area --- */
        .upload-box {
            width: 100%;
            max-width: 600px;
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #F8FAFC;
            margin-bottom: 20px;
        }

        .upload-box:hover {
            border-color: var(--primary);
            background-color: #EFF6FF;
        }

        .upload-icon {
            font-size: 40px;
            color: var(--text-light);
            margin-bottom: 10px;
            display: block;
        }

        .upload-text {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .upload-hint {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        #fileInput { display: none; }

        /* --- Controls & Status --- */
        .control-panel {
            width: 100%;
            max-width: 800px;
            display: none; /* Hidden until file uploaded */
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .file-badge {
            background: #EFF6FF;
            color: var(--primary-dark);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid #BFDBFE;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .action-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            width: 100%;
            max-width: 300px;
        }

        .action-btn:hover { background-color: var(--primary-dark); }
        .action-btn:disabled { background-color: #94A3B8; cursor: not-allowed; }

        .btn-clear {
            background-color: transparent;
            color: #EF4444; /* Red */
            border: 1px solid #EF4444;
            margin-top: 10px;
        }
        
        .btn-clear:hover { background-color: #FEF2F2; }

        /* --- Progress Bar --- */
        .progress-container {
            width: 100%;
            max-width: 600px;
            display: none;
            margin: 15px 0;
        }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background-color: #E2E8F0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--success);
            transition: width 0.3s ease;
        }

        .status-text {
            margin-top: 5px;
            font-size: 0.85rem;
            color: var(--text-light);
            text-align: center;
        }

        /* --- Result Area --- */
        .result-area {
            width: 100%;
            display: none;
            margin-top: 20px;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            resize: vertical;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            line-height: 1.5;
            background-color: #FAFAFA;
        }

        .download-link {
            display: inline-block;
            margin-top: 15px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        /* --- Mobile Responsive adjustments --- */
        @media screen and (max-width: 768px) {
            .container {
                padding: 0; /* Remove side padding for mobile */
                max-width: 100%;
            }

            .tool-interface {
                border-radius: 0;
                box-shadow: none;
                min-height: calc(100vh - 50px); /* Full height minus header */
                padding: 20px 15px;
            }

            .action-btn {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>OCR PDF</h1>
    </header>

    <div class="container">
        <div class="tool-interface">
            <!-- Initial Upload State -->
            <div class="upload-box" id="dropZone">
                <span class="upload-icon">🔍</span>
                <div class="upload-text">Select PDF File</div>
                <div class="upload-hint">Click to browse or Drag & Drop PDF</div>
                <input type="file" id="fileInput" accept="application/pdf">
            </div>

            <!-- Control Panel (Visible after upload) -->
            <div class="control-panel" id="controlPanel">
                <div class="file-badge" id="fileNameDisplay">filename.pdf</div>
                
                <button class="action-btn" id="startOcrBtn">Start OCR Process</button>
                
                <!-- Progress Indicator -->
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progressBar"></div>
                    </div>
                    <div class="status-text" id="statusText">Initializing...</div>
                </div>

                <!-- Result Area -->
                <div class="result-area" id="resultArea">
                    <label for="ocrOutput" style="display:block; margin-bottom:5px; font-weight:600;">Extracted Text:</label>
                    <textarea id="ocrOutput" readonly placeholder="Text will appear here..."></textarea>
                    <button class="action-btn" id="downloadBtn" style="margin-top: 15px;">Download Text (.txt)</button>
                </div>

                <button class="action-btn btn-clear" id="clearBtn">Clear Data</button>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration ---
        // Point PDF.js to the worker file on the same CDN version
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // --- DOM Elements ---
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const controlPanel = document.getElementById('controlPanel');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const startOcrBtn = document.getElementById('startOcrBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const resultArea = document.getElementById('resultArea');
        const ocrOutput = document.getElementById('ocrOutput');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        // --- State ---
        let currentFile = null;
        let extractedText = "";

        // --- Event Listeners ---
        
        // Drag & Drop
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
            dropZone.style.backgroundColor = '#EFF6FF';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.backgroundColor = '#F8FAFC';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.backgroundColor = '#F8FAFC';
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        startOcrBtn.addEventListener('click', processPDF);
        clearBtn.addEventListener('click', resetTool);
        downloadBtn.addEventListener('click', downloadText);

        // --- Functions ---

        function handleFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Please upload a valid PDF file.');
                return;
            }
            currentFile = file;
            fileNameDisplay.textContent = file.name;
            
            // Switch UI
            dropZone.style.display = 'none';
            controlPanel.style.display = 'flex';
            startOcrBtn.style.display = 'block';
            resultArea.style.display = 'none';
            progressContainer.style.display = 'none';
        }

        async function processPDF() {
            if (!currentFile) return;

            // UI Updates
            startOcrBtn.style.display = 'none'; // Hide start button during process
            progressContainer.style.display = 'block';
            resultArea.style.display = 'block'; // Show textarea so user sees progress
            ocrOutput.value = "";
            extractedText = "";
            
            try {
                const arrayBuffer = await currentFile.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                const totalPages = pdf.numPages;

                updateStatus(0, `Loaded PDF. Found ${totalPages} pages.`);

                // Initialize Tesseract Worker
                const worker = await Tesseract.createWorker();
                await worker.loadLanguage('eng');
                await worker.initialize('eng');

                // Loop through pages
                for (let i = 1; i <= totalPages; i++) {
                    updateStatus((i / totalPages) * 100, `Processing Page ${i} of ${totalPages}...`);
                    
                    // 1. Render PDF page to Canvas
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 }); // Scale up for better OCR accuracy
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({
                        canvasContext: context,
                        viewport: viewport
                    }).promise;

                    // 2. Perform OCR on the Canvas
                    const { data: { text } } = await worker.recognize(canvas);
                    
                    // 3. Append text
                    const pageText = `--- Page ${i} ---\n${text}\n\n`;
                    extractedText += pageText;
                    ocrOutput.value = extractedText;
                    
                    // Auto-scroll textarea to bottom
                    ocrOutput.scrollTop = ocrOutput.scrollHeight;
                }

                await worker.terminate();
                
                updateStatus(100, 'OCR Complete! Saving data...');
                
                // Automatic Save Trigger
                setTimeout(() => {
                    downloadText();
                }, 1000);

            } catch (error) {
                console.error(error);
                updateStatus(0, 'Error processing PDF. Check console for details.');
                alert('An error occurred. The PDF might be password protected or too large.');
                startOcrBtn.style.display = 'block';
            }
        }

        function updateStatus(percent, text) {
            progressBar.style.width = `${percent}%`;
            statusText.textContent = text;
        }

        function downloadText() {
            if (!extractedText) return;
            
            const blob = new Blob([extractedText], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentFile.name}_OCR.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        function resetTool() {
            currentFile = null;
            extractedText = "";
            fileInput.value = "";
            ocrOutput.value = "";
            
            controlPanel.style.display = 'none';
            dropZone.style.display = 'block';
            progressBar.style.width = '0%';
            statusText.textContent = 'Initializing...';
        }
    </script>
</body>
</html>
